ษาตามคำชี้ขาดของอนุญาโตตุลาการ หรือคำพิพากษาของศาลตามคำชี้ขาดของอนุญาโตตุลาการ เว้นแต่ในเหตุต่อไปนี้\n\n(๑) เมื่อมีข้ออ้างแสดงว่าอนุญาโตตุลาการหรือประธานมิได้กระทำการโดยสุจริต หรือคู่ความฝ่ายใดฝ่ายหนึ่งใช้กลฉ้อฉล (๒) เมื่อคำสั่งหรือคำพิพากษานั้นฝ่าฝืนต่อบทกฎหมายอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชน (๓) เมื่อคำพิพากษานั้นไม่ตรงกับคำชี้ขาดของอนุญาโตตุลาการ"},{"id":"๒๒๒_๑","num":"มาตรา ๒๒๒/๑","num_ara":"๒๒๒/๑","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๑ บททั่วไป","paragraphs":["ในหมวดนี้ “กลุ่มบุคคล” หมายความว่า บุคคลหลายคนที่มีสิทธิอย่างเดียวกันอันเนื่องมาจากข้อเท็จจริงและหลักกฎหมายเดียวกัน และมีลักษณะเฉพาะของกลุ่มเหมือนกัน แม้ว่าจะมีลักษณะของความเสียหายที่แตกต่างกันก็ตาม “สมาชิกกลุ่ม” หมายความว่า บุคคลใด ๆ ที่อยู่ในกลุ่มบุคคล “การดำเนินคดีแบบกลุ่ม” หมายความว่า การดำเนินคดีที่ศาลอนุญาตให้เสนอคำฟ้องต่อศาล เพื่อให้ศาลมีคำพิพากษาแสดงสิทธิของโจทก์และสมาชิกกลุ่ม “เจ้าพนักงานคดีแบบกลุ่ม” หมายความว่า บุคคลที่เลขาธิการสำนักงานศาลยุติธรรมแต่งตั้งให้ทำหน้าที่ช่วยเหลือศาลในการดำเนินคดีแบบกลุ่ม"],"text":"ในหมวดนี้ “กลุ่มบุคคล” หมายความว่า บุคคลหลายคนที่มีสิทธิอย่างเดียวกันอันเนื่องมาจากข้อเท็จจริงและหลักกฎหมายเดียวกัน และมีลักษณะเฉพาะของกลุ่มเหมือนกัน แม้ว่าจะมีลักษณะของความเสียหายที่แตกต่างกันก็ตาม “สมาชิกกลุ่ม” หมายความว่า บุคคลใด ๆ ที่อยู่ในกลุ่มบุคคล “การดำเนินคดีแบบกลุ่ม” หมายความว่า การดำเนินคดีที่ศาลอนุญาตให้เสนอคำฟ้องต่อศาล เพื่อให้ศาลมีคำพิพากษาแสดงสิทธิของโจทก์และสมาชิกกลุ่ม “เจ้าพนักงานคดีแบบกลุ่ม” หมายความว่า บุคคลที่เลขาธิการสำนักงานศาลยุติธรรมแต่งตั้งให้ทำหน้าที่ช่วยเหลือศาลในการดำเนินคดีแบบกลุ่ม"},{"id":"๒๒๒_๒","num":"มาตรา ๒๒๒/๒","num_ara":"๒๒๒/๒","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๑ บททั่วไป","paragraphs":["เพื่อความเหมาะสมสำหรับคดีบางประเภท หรือเพื่อให้การดำเนินกระบวนพิจารณา หรือการบังคับคดีเป็นไปโดยสะดวก รวดเร็ว และเที่ยงธรรม ประธานศาลฎีกามีอำนาจออกข้อกำหนดใด ๆ ที่ไม่ขัดหรือแย้งกับบทบัญญัติในหมวดนี้ได้ดังนี้","(๑) กำหนดคุณสมบัติ ส่วนได้เสีย รวมตลอดทั้งการได้มาซึ่งสิทธิการเป็นสมาชิกกลุ่มของโจทก์ที่จะมีอำนาจฟ้องคดีแบบกลุ่มได้ (๒) กำหนดเพิ่มเติมเกี่ยวกับหลักเกณฑ์ วิธีการ และเงื่อนไขในการพิจารณาอนุญาตให้ดำเนินคดีแบบกลุ่ม (๓) กำหนดเพิ่มเติมเกี่ยวกับวิธีการแจ้งเรื่องการดำเนินคดีแบบกลุ่มให้สมาชิกกลุ่มทราบ (๔) กำหนดเพิ่มเติมเกี่ยวกับวิธีการนัดพร้อม การแก้ไขคำฟ้องและคำให้การ การดำเนินกระบวนพิจารณาและการรับฟังพยานหลักฐาน ในการดำเนินคดีแบบกลุ่ม (๕) กำหนดเพิ่มเติมเกี่ยวกับการบังคับคดีและเงินรางวัลของทนายความฝ่ายโจทก์ (๖) ออกข้อกำหนดเกี่ยวกับเรื่องที่จำเป็นอื่น ๆ ในการดำเนินคดีแบบกลุ่ม ข้อกำหนดนั้น เมื่อได้รับความเห็นชอบจากที่ประชุมใหญ่ศาลฎีกาและประกาศในราชกิจจานุเบกษาแล้ว ให้ใช้บังคับได้"],"text":"เพื่อความเหมาะสมสำหรับคดีบางประเภท หรือเพื่อให้การดำเนินกระบวนพิจารณา หรือการบังคับคดีเป็นไปโดยสะดวก รวดเร็ว และเที่ยงธรรม ประธานศาลฎีกามีอำนาจออกข้อกำหนดใด ๆ ที่ไม่ขัดหรือแย้งกับบทบัญญัติในหมวดนี้ได้ดังนี้\n\n(๑) กำหนดคุณสมบัติ ส่วนได้เสีย รวมตลอดทั้งการได้มาซึ่งสิทธิการเป็นสมาชิกกลุ่มของโจทก์ที่จะมีอำนาจฟ้องคดีแบบกลุ่มได้ (๒) กำหนดเพิ่มเติมเกี่ยวกับหลักเกณฑ์ วิธีการ และเงื่อนไขในการพิจารณาอนุญาตให้ดำเนินคดีแบบกลุ่ม (๓) กำหนดเพิ่มเติมเกี่ยวกับวิธีการแจ้งเรื่องการดำเนินคดีแบบกลุ่มให้สมาชิกกลุ่มทราบ (๔) กำหนดเพิ่มเติมเกี่ยวกับวิธีการนัดพร้อม การแก้ไขคำฟ้องและคำให้การ การดำเนินกระบวนพิจารณาและการรับฟังพยานหลักฐาน ในการดำเนินคดีแบบกลุ่ม (๕) กำหนดเพิ่มเติมเกี่ยวกับการบังคับคดีและเงินรางวัลของทนายความฝ่ายโจทก์ (๖) ออกข้อกำหนดเกี่ยวกับเรื่องที่จำเป็นอื่น ๆ ในการดำเนินคดีแบบกลุ่ม ข้อกำหนดนั้น เมื่อได้รับความเห็นชอบจากที่ประชุมใหญ่ศาลฎีกาและประกาศในราชกิจจานุเบกษาแล้ว ให้ใช้บังคับได้"},{"id":"๒๒๒_๓","num":"มาตรา ๒๒๒/๓","num_ara":"๒๒๒/๓","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๑ บททั่วไป","paragraphs":["ศาลตามพระธรรมนูญศาลยุติธรรมที่มีอำนาจพิจารณาพิพากษาคดีแพ่ง เว้นแต่ศาลแขวง มีอำนาจในการดำเนินคดีแบบกลุ่ม"],"text":"ศาลตามพระธรรมนูญศาลยุติธรรมที่มีอำนาจพิจารณาพิพากษาคดีแพ่ง เว้นแต่ศาลแขวง มีอำนาจในการดำเนินคดีแบบกลุ่ม"},{"id":"๒๒๒_๔","num":"มาตรา ๒๒๒/๔","num_ara":"๒๒๒/๔","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๑ บททั่วไป","paragraphs":["กระบวนพิจารณาส่วนใดที่มิได้บัญญัติไว้ในหมวดนี้โดยเฉพาะ ให้นำบทบัญญัติในภาค ๑ บททั่วไป และบทบัญญัติในคดีสามัญมาใช้บังคับโดยอนุโลมเท่าที่ไม่ขัดหรือแย้งกับบทบัญญัติในหมวดนี้ ในกรณีที่มีการร้องขอให้ดำเนินคดีแบบกลุ่มในคดีซึ่งมีกฎหมายกำหนดวิธีพิจารณาความไว้เป็นการเฉพาะ ให้ศาลในคดีนั้นมีอำนาจสั่งให้ดำเนินคดีแบบกลุ่มและนำวิธีพิจารณาตามบทบัญญัติแห่งหมวดนี้มาใช้บังคับโดยอนุโลม"],"text":"กระบวนพิจารณาส่วนใดที่มิได้บัญญัติไว้ในหมวดนี้โดยเฉพาะ ให้นำบทบัญญัติในภาค ๑ บททั่วไป และบทบัญญัติในคดีสามัญมาใช้บังคับโดยอนุโลมเท่าที่ไม่ขัดหรือแย้งกับบทบัญญัติในหมวดนี้ ในกรณีที่มีการร้องขอให้ดำเนินคดีแบบกลุ่มในคดีซึ่งมีกฎหมายกำหนดวิธีพิจารณาความไว้เป็นการเฉพาะ ให้ศาลในคดีนั้นมีอำนาจสั่งให้ดำเนินคดีแบบกลุ่มและนำวิธีพิจารณาตามบทบัญญัติแห่งหมวดนี้มาใช้บังคับโดยอนุโลม"},{"id":"๒๒๒_๕","num":"มาตรา ๒๒๒/๕","num_ara":"๒๒๒/๕","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๑ บททั่วไป","paragraphs":["ให้มีเจ้าพนักงานคดีแบบกลุ่มทำหน้าที่ช่วยเหลือศาลในการดำเนินคดีแบบกลุ่มตามที่ศาลมอบหมาย ดังต่อไปนี้","(๑) ไกล่เกลี่ยคดีแบบกลุ่ม (๒) ตรวจสอบและรวบรวมพยานหลักฐาน (๓) บันทึกคำพยาน (๔) ดำเนินการให้มีการคุ้มครองสิทธิของคู่ความและสมาชิกกลุ่มทั้งก่อนและระหว่างการพิจารณา (๕) ปฏิบัติหน้าที่อื่นตามบทบัญญัติแห่งหมวดนี้หรือตามข้อกำหนดของประธานศาลฎีกาในการทำหน้าที่ช่วยเหลือนั้น ในการปฏิบัติหน้าที่ตามบทบัญญัติแห่งหมวดนี้ ให้เจ้าพนักงานคดีแบบกลุ่มเป็นเจ้าพนักงานตามประมวลกฎหมายอาญาและให้มีอำนาจมีหนังสือเรียกบุคคลใดบุคคลหนึ่งมาให้ข้อมูลหรือให้จัดส่งเอกสารเพื่อประกอบการพิจารณาเรื่องใดเรื่องหนึ่งตามอำนาจหน้าที่ หลักเกณฑ์และวิธีการปฏิบัติหน้าที่ของเจ้าพนักงานคดีแบบกลุ่มให้เป็นไปตามที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกา ในกรณีที่กฎหมายวิธีพิจารณาความใดบัญญัติให้มีเจ้าพนักงานคดีทำหน้าที่ช่วยเหลือศาลในการดำเนินคดีไว้เป็นการเฉพาะ ให้เจ้าพนักงานคดีดังกล่าวนอกจากมีหน้าที่ตามกฎหมายนั้นแล้วมีหน้าที่ตามบทบัญญัติแห่งหมวดนี้ด้วย"],"text":"ให้มีเจ้าพนักงานคดีแบบกลุ่มทำหน้าที่ช่วยเหลือศาลในการดำเนินคดีแบบกลุ่มตามที่ศาลมอบหมาย ดังต่อไปนี้\n\n(๑) ไกล่เกลี่ยคดีแบบกลุ่ม (๒) ตรวจสอบและรวบรวมพยานหลักฐาน (๓) บันทึกคำพยาน (๔) ดำเนินการให้มีการคุ้มครองสิทธิของคู่ความและสมาชิกกลุ่มทั้งก่อนและระหว่างการพิจารณา (๕) ปฏิบัติหน้าที่อื่นตามบทบัญญัติแห่งหมวดนี้หรือตามข้อกำหนดของประธานศาลฎีกาในการทำหน้าที่ช่วยเหลือนั้น ในการปฏิบัติหน้าที่ตามบทบัญญัติแห่งหมวดนี้ ให้เจ้าพนักงานคดีแบบกลุ่มเป็นเจ้าพนักงานตามประมวลกฎหมายอาญาและให้มีอำนาจมีหนังสือเรียกบุคคลใดบุคคลหนึ่งมาให้ข้อมูลหรือให้จัดส่งเอกสารเพื่อประกอบการพิจารณาเรื่องใดเรื่องหนึ่งตามอำนาจหน้าที่ หลักเกณฑ์และวิธีการปฏิบัติหน้าที่ของเจ้าพนักงานคดีแบบกลุ่มให้เป็นไปตามที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกา ในกรณีที่กฎหมายวิธีพิจารณาความใดบัญญัติให้มีเจ้าพนักงานคดีทำหน้าที่ช่วยเหลือศาลในการดำเนินคดีไว้เป็นการเฉพาะ ให้เจ้าพนักงานคดีดังกล่าวนอกจากมีหน้าที่ตามกฎหมายนั้นแล้วมีหน้าที่ตามบทบัญญัติแห่งหมวดนี้ด้วย"},{"id":"๒๒๒_๖","num":"มาตรา ๒๒๒/๖","num_ara":"๒๒๒/๖","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๑ บททั่วไป","paragraphs":["ผู้ที่จะได้รับแต่งตั้งเป็นเจ้าพนักงานคดีแบบกลุ่ม ต้องมีคุณสมบัติอย่างหนึ่งอย่างใด ดังต่อไปนี้","(๑) สำเร็จการศึกษาระดับปริญญาโททางกฎหมายหรือปริญญาเอกทางกฎหมาย (๒) สำเร็จการศึกษาระดับปริญญาตรีทางกฎหมาย เป็นสามัญสมาชิกแห่งเนติบัณฑิตยสภา และได้ประกอบวิชาชีพทางกฎหมายตามที่คณะกรรมการข้าราชการศาลยุติธรรมตามกฎหมายว่าด้วยระเบียบบริหารราชการศาลยุติธรรมกำหนดเป็นเวลาไม่น้อยกว่าหนึ่งปี (๓) สำเร็จการศึกษาระดับปริญญาตรีทางกฎหมายและปริญญาในสาขาวิชาอื่นที่คณะกรรมการข้าราชการศาลยุติธรรมตามกฎหมายว่าด้วยระเบียบบริหารราชการศาลยุติธรรมกำหนดซึ่งไม่ต่ำกว่าปริญญาตรี และได้ประกอบวิชาชีพตามที่คณะกรรมการข้าราชการศาลยุติธรรมตามกฎหมายว่าด้วยระเบียบบริหารราชการศาลยุติธรรมกำหนดเป็นเวลาไม่น้อยกว่าสี่ปี ให้เลขาธิการสำนักงานศาลยุติธรรมมีอำนาจพิจารณาแต่งตั้งบุคคลซึ่งมีคุณสมบัติตามวรรคหนึ่ง เป็นเจ้าพนักงานคดีแบบกลุ่ม ทั้งนี้ ตามระเบียบที่คณะกรรมการข้าราชการศาลยุติธรรมตามกฎหมายว่าด้วยระเบียบบริหารราชการศาลยุติธรรมกำหนด"],"text":"ผู้ที่จะได้รับแต่งตั้งเป็นเจ้าพนักงานคดีแบบกลุ่ม ต้องมีคุณสมบัติอย่างหนึ่งอย่างใด ดังต่อไปนี้\n\n(๑) สำเร็จการศึกษาระดับปริญญาโททางกฎหมายหรือปริญญาเอกทางกฎหมาย (๒) สำเร็จการศึกษาระดับปริญญาตรีทางกฎหมาย เป็นสามัญสมาชิกแห่งเนติบัณฑิตยสภา และได้ประกอบวิชาชีพทางกฎหมายตามที่คณะกรรมการข้าราชการศาลยุติธรรมตามกฎหมายว่าด้วยระเบียบบริหารราชการศาลยุติธรรมกำหนดเป็นเวลาไม่น้อยกว่าหนึ่งปี (๓) สำเร็จการศึกษาระดับปริญญาตรีทางกฎหมายและปริญญาในสาขาวิชาอื่นที่คณะกรรมการข้าราชการศาลยุติธรรมตามกฎหมายว่าด้วยระเบียบบริหารราชการศาลยุติธรรมกำหนดซึ่งไม่ต่ำกว่าปริญญาตรี และได้ประกอบวิชาชีพตามที่คณะกรรมการข้าราชการศาลยุติธรรมตามกฎหมายว่าด้วยระเบียบบริหารราชการศาลยุติธรรมกำหนดเป็นเวลาไม่น้อยกว่าสี่ปี ให้เลขาธิการสำนักงานศาลยุติธรรมมีอำนาจพิจารณาแต่งตั้งบุคคลซึ่งมีคุณสมบัติตามวรรคหนึ่ง เป็นเจ้าพนักงานคดีแบบกลุ่ม ทั้งนี้ ตามระเบียบที่คณะกรรมการข้าราชการศาลยุติธรรมตามกฎหมายว่าด้วยระเบียบบริหารราชการศาลยุติธรรมกำหนด"},{"id":"๒๒๒_๗","num":"มาตรา ๒๒๒/๗","num_ara":"๒๒๒/๗","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๑ บททั่วไป","paragraphs":["ในกรณีที่การฟ้องคดีแบบกลุ่มตามบทบัญญัติแห่งหมวดนี้เป็นคดีแพ่งเกี่ยวเนื่องกับคดีอาญา แม้ว่าจะมีการฟ้องเป็นคดีอาญาแล้วก็ตาม ศาลที่พิจารณาคดีแบบกลุ่มอาจพิจารณาคดีต่อไปโดยไม่ต้องรอให้ศาลคดีอาญามีคำพิพากษาก่อน และหากศาลในคดีอาญาได้มีคำพิพากษาแล้ว","(๑) ในกรณีที่คำพิพากษาคดีส่วนอาญานั้นได้วินิจฉัยว่าจำเลยได้กระทำความผิด ศาลที่พิจารณาคดีแบบกลุ่มต้องถือข้อเท็จจริงตามที่ปรากฏในคำพิพากษาคดีส่วนอาญา (๒) ในกรณีที่คำพิพากษาคดีส่วนอาญานั้นได้วินิจฉัยเป็นอย่างอื่น ศาลที่พิจารณาคดีแบบกลุ่มไม่จำต้องถือข้อเท็จจริงตามที่ปรากฏในคำพิพากษาคดีส่วนอาญา"],"text":"ในกรณีที่การฟ้องคดีแบบกลุ่มตามบทบัญญัติแห่งหมวดนี้เป็นคดีแพ่งเกี่ยวเนื่องกับคดีอาญา แม้ว่าจะมีการฟ้องเป็นคดีอาญาแล้วก็ตาม ศาลที่พิจารณาคดีแบบกลุ่มอาจพิจารณาคดีต่อไปโดยไม่ต้องรอให้ศาลคดีอาญามีคำพิพากษาก่อน และหากศาลในคดีอาญาได้มีคำพิพากษาแล้ว\n\n(๑) ในกรณีที่คำพิพากษาคดีส่วนอาญานั้นได้วินิจฉัยว่าจำเลยได้กระทำความผิด ศาลที่พิจารณาคดีแบบกลุ่มต้องถือข้อเท็จจริงตามที่ปรากฏในคำพิพากษาคดีส่วนอาญา (๒) ในกรณีที่คำพิพากษาคดีส่วนอาญานั้นได้วินิจฉัยเป็นอย่างอื่น ศาลที่พิจารณาคดีแบบกลุ่มไม่จำต้องถือข้อเท็จจริงตามที่ปรากฏในคำพิพากษาคดีส่วนอาญา"},{"id":"๒๒๒_๘","num":"มาตรา ๒๒๒/๘","num_ara":"๒๒๒/๘","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๒ การขออนุญาตให้ดำเนินคดีแบบกลุ่ม","paragraphs":["คดีที่มีสมาชิกกลุ่มจำนวนมากดังต่อไปนี้ โจทก์ซึ่งเป็นสมาชิกกลุ่มอาจร้องขอให้ดำเนินคดีแบบกลุ่มได้","(๑) คดีละเมิด (๒) คดีผิดสัญญา (๓) คดีเรียกร้องสิทธิตามกฎหมายต่าง ๆ เช่น กฎหมายเกี่ยวกับสิ่งแวดล้อม การคุ้มครองผู้บริโภคแรงงาน หลักทรัพย์และตลาดหลักทรัพย์ การแข่งขันทางการค้า"],"text":"คดีที่มีสมาชิกกลุ่มจำนวนมากดังต่อไปนี้ โจทก์ซึ่งเป็นสมาชิกกลุ่มอาจร้องขอให้ดำเนินคดีแบบกลุ่มได้\n\n(๑) คดีละเมิด (๒) คดีผิดสัญญา (๓) คดีเรียกร้องสิทธิตามกฎหมายต่าง ๆ เช่น กฎหมายเกี่ยวกับสิ่งแวดล้อม การคุ้มครองผู้บริโภคแรงงาน หลักทรัพย์และตลาดหลักทรัพย์ การแข่งขันทางการค้า"},{"id":"๒๒๒_๙","num":"มาตรา ๒๒๒/๙","num_ara":"๒๒๒/๙","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๒ การขออนุญาตให้ดำเนินคดีแบบกลุ่ม","paragraphs":["ในการร้องขอให้ดำเนินคดีแบบกลุ่ม ให้โจทก์ยื่นคำร้องต่อศาลพร้อมกับคำฟ้องเริ่มคดี เพื่อขอให้ดำเนินคดีแบบกลุ่มได้ตามบทบัญญัติแห่งหมวดนี้ คำร้องขอให้ดำเนินคดีแบบกลุ่มตามวรรคหนึ่ง โจทก์ต้องแสดงเหตุตามสมควรที่ศาลจะอนุญาตให้ดำเนินคดีแบบกลุ่ม"],"text":"ในการร้องขอให้ดำเนินคดีแบบกลุ่ม ให้โจทก์ยื่นคำร้องต่อศาลพร้อมกับคำฟ้องเริ่มคดี เพื่อขอให้ดำเนินคดีแบบกลุ่มได้ตามบทบัญญัติแห่งหมวดนี้ คำร้องขอให้ดำเนินคดีแบบกลุ่มตามวรรคหนึ่ง โจทก์ต้องแสดงเหตุตามสมควรที่ศาลจะอนุญาตให้ดำเนินคดีแบบกลุ่ม"},{"id":"๒๒๒_๑๐","num":"มาตรา ๒๒๒/๑๐","num_ara":"๒๒๒/๑๐","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๒ การขออนุญาตให้ดำเนินคดีแบบกลุ่ม","paragraphs":["คำฟ้องของโจทก์ต้องทำเป็นหนังสือและแสดงโดยแจ้งชัดซึ่งสภาพแห่งข้อหา คำขอบังคับ รวมทั้งข้ออ้างที่อาศัยเป็นหลักแห่งข้อหาของโจทก์และของกลุ่มบุคคลที่มีลักษณะเดียวกับโจทก์ด้วย และในกรณีที่โจทก์มีคำขอบังคับให้จำเลยชำระหนี้เป็นเงิน คำขอบังคับของกลุ่มบุคคลต้องระบุหลักการและวิธีการคำนวณเพื่อชำระเงินให้แก่สมาชิกกลุ่มเท่าที่จะระบุได้ แต่ไม่จำเป็นต้องแสดงจำนวนเงินที่สมาชิกกลุ่มแต่ละรายจะได้รับด้วย ในการดำเนินคดีแบบกลุ่ม ให้โจทก์ผู้เริ่มคดีเสียค่าขึ้นศาลตามคำขอบังคับเฉพาะในส่วนของโจทก์ผู้เริ่มคดีเท่านั้น"],"text":"คำฟ้องของโจทก์ต้องทำเป็นหนังสือและแสดงโดยแจ้งชัดซึ่งสภาพแห่งข้อหา คำขอบังคับ รวมทั้งข้ออ้างที่อาศัยเป็นหลักแห่งข้อหาของโจทก์และของกลุ่มบุคคลที่มีลักษณะเดียวกับโจทก์ด้วย และในกรณีที่โจทก์มีคำขอบังคับให้จำเลยชำระหนี้เป็นเงิน คำขอบังคับของกลุ่มบุคคลต้องระบุหลักการและวิธีการคำนวณเพื่อชำระเงินให้แก่สมาชิกกลุ่มเท่าที่จะระบุได้ แต่ไม่จำเป็นต้องแสดงจำนวนเงินที่สมาชิกกลุ่มแต่ละรายจะได้รับด้วย ในการดำเนินคดีแบบกลุ่ม ให้โจทก์ผู้เริ่มคดีเสียค่าขึ้นศาลตามคำขอบังคับเฉพาะในส่วนของโจทก์ผู้เริ่มคดีเท่านั้น"},{"id":"๒๒๒_๑๑","num":"มาตรา ๒๒๒/๑๑","num_ara":"๒๒๒/๑๑","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๒ การขออนุญาตให้ดำเนินคดีแบบกลุ่ม","paragraphs":["ในกรณีที่โจทก์ยื่นคำร้องขอให้ดำเนินคดีแบบกลุ่ม หากศาลเห็นว่าคำฟ้องของโจทก์ไม่มีข้อขัดข้องที่จะรับไว้ตามมาตรา ๑๘ หรือมีข้อขัดข้องแต่โจทก์ได้แก้ไขให้ถูกต้องแล้ว ก่อนที่ศาลจะมีคำสั่งรับคำฟ้อง ให้ศาลพิจารณาคำร้องของโจทก์ตามมาตรา ๒๒๒/๑๒ แล้วมีคำสั่งอนุญาตหรือไม่อนุญาตให้ดำเนินคดีแบบกลุ่มโดยไม่ชักช้า"],"text":"ในกรณีที่โจทก์ยื่นคำร้องขอให้ดำเนินคดีแบบกลุ่ม หากศาลเห็นว่าคำฟ้องของโจทก์ไม่มีข้อขัดข้องที่จะรับไว้ตามมาตรา ๑๘ หรือมีข้อขัดข้องแต่โจทก์ได้แก้ไขให้ถูกต้องแล้ว ก่อนที่ศาลจะมีคำสั่งรับคำฟ้อง ให้ศาลพิจารณาคำร้องของโจทก์ตามมาตรา ๒๒๒/๑๒ แล้วมีคำสั่งอนุญาตหรือไม่อนุญาตให้ดำเนินคดีแบบกลุ่มโดยไม่ชักช้า"},{"id":"๒๒๒_๑๒","num":"มาตรา ๒๒๒/๑๒","num_ara":"๒๒๒/๑๒","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๒ การขออนุญาตให้ดำเนินคดีแบบกลุ่ม","paragraphs":["ในการพิจารณาคำร้องขออนุญาตให้ดำเนินคดีแบบกลุ่ม ให้ศาลจัดส่งสำเนาคำฟ้องและคำร้องเช่นว่านั้นไปให้จำเลย เมื่อศาลได้ฟังคู่ความทุกฝ่ายและทำการไต่สวนตามที่เห็นสมควรแล้ว ศาลจะอนุญาตให้ดำเนินคดีแบบกลุ่มได้ต่อเมื่อเป็นที่พอใจแก่ศาลว่า","(๑) สภาพแห่งข้อหา คำขอบังคับ และข้ออ้างที่อาศัยเป็นหลักแห่งข้อหาของโจทก์และของกลุ่มบุคคล มีลักษณะตามที่กำหนดไว้ในมาตรา ๒๒๒/๑๐ (๒) โจทก์ได้แสดงให้เห็นถึงลักษณะเฉพาะที่เหมือนกันของกลุ่มบุคคลที่ชัดเจนเพียงพอ เพื่อให้รู้ได้ว่าเป็นกลุ่มบุคคลใด (๓) กลุ่มบุคคลมีสมาชิกกลุ่มจำนวนมาก ซึ่งการดำเนินคดีอย่างคดีสามัญจะทำให้เกิดความยุ่งยากและไม่สะดวก (๔) การดำเนินคดีแบบกลุ่มจะเป็นธรรมและมีประสิทธิภาพมากกว่าการดำเนินคดีอย่างคดีสามัญ (๕) โจทก์ได้แสดงให้เห็นว่าโจทก์เป็นสมาชิกกลุ่มที่มีคุณสมบัติ ส่วนได้เสีย รวมตลอดทั้งการได้มาซึ่งสิทธิการเป็นสมาชิกกลุ่ม ตามข้อกำหนดของประธานศาลฎีกา ถ้ามี และโจทก์รวมทั้งทนายความที่โจทก์เสนอให้เป็นทนายความของกลุ่มสามารถดำเนินคดีคุ้มครองสิทธิของกลุ่มบุคคลได้อย่างเพียงพอและเป็นธรรม คำสั่งศาลที่อนุญาตให้ดำเนินคดีแบบกลุ่ม ศาลอาจจำกัดขอบเขตของกลุ่มบุคคลให้ชัดเจนเพียงพอ เพื่อให้รู้ว่าเป็นกลุ่มบุคคลใดก็ได้ คำสั่งอนุญาตหรือไม่อนุญาตให้ดำเนินคดีแบบกลุ่มอาจอุทธรณ์ไปยังศาลอุทธรณ์ภายในกำหนดเวลาเจ็ดวันนับแต่วันที่ศาลมีคำสั่ง และให้งดการพิจารณาไว้จนกว่าคำสั่งนั้นจะถึงที่สุด ทั้งนี้ ให้ศาลอุทธรณ์วินิจฉัยชี้ขาดโดยเร็ว คำวินิจฉัยของศาลอุทธรณ์ให้เป็นที่สุด ในกรณีที่ศาลมีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่ม ให้ศาลสั่งรับคำฟ้องไว้พิจารณาเมื่อได้ส่งหมายเรียกให้จำเลยแล้ว ให้จำเลยทำคำให้การเป็นหนังสือยื่นต่อศาลภายในหนึ่งเดือนและให้ถือว่าทนายความของโจทก์เป็นทนายความของกลุ่มด้วย ในกรณีที่ศาลมีคำสั่งไม่อนุญาตให้ดำเนินคดีแบบกลุ่ม ให้ศาลดำเนินกระบวนพิจารณาต่อไปอย่างคดีสามัญ"],"text":"ในการพิจารณาคำร้องขออนุญาตให้ดำเนินคดีแบบกลุ่ม ให้ศาลจัดส่งสำเนาคำฟ้องและคำร้องเช่นว่านั้นไปให้จำเลย เมื่อศาลได้ฟังคู่ความทุกฝ่ายและทำการไต่สวนตามที่เห็นสมควรแล้ว ศาลจะอนุญาตให้ดำเนินคดีแบบกลุ่มได้ต่อเมื่อเป็นที่พอใจแก่ศาลว่า\n\n(๑) สภาพแห่งข้อหา คำขอบังคับ และข้ออ้างที่อาศัยเป็นหลักแห่งข้อหาของโจทก์และของกลุ่มบุคคล มีลักษณะตามที่กำหนดไว้ในมาตรา ๒๒๒/๑๐ (๒) โจทก์ได้แสดงให้เห็นถึงลักษณะเฉพาะที่เหมือนกันของกลุ่มบุคคลที่ชัดเจนเพียงพอ เพื่อให้รู้ได้ว่าเป็นกลุ่มบุคคลใด (๓) กลุ่มบุคคลมีสมาชิกกลุ่มจำนวนมาก ซึ่งการดำเนินคดีอย่างคดีสามัญจะทำให้เกิดความยุ่งยากและไม่สะดวก (๔) การดำเนินคดีแบบกลุ่มจะเป็นธรรมและมีประสิทธิภาพมากกว่าการดำเนินคดีอย่างคดีสามัญ (๕) โจทก์ได้แสดงให้เห็นว่าโจทก์เป็นสมาชิกกลุ่มที่มีคุณสมบัติ ส่วนได้เสีย รวมตลอดทั้งการได้มาซึ่งสิทธิการเป็นสมาชิกกลุ่ม ตามข้อกำหนดของประธานศาลฎีกา ถ้ามี และโจทก์รวมทั้งทนายความที่โจทก์เสนอให้เป็นทนายความของกลุ่มสามารถดำเนินคดีคุ้มครองสิทธิของกลุ่มบุคคลได้อย่างเพียงพอและเป็นธรรม คำสั่งศาลที่อนุญาตให้ดำเนินคดีแบบกลุ่ม ศาลอาจจำกัดขอบเขตของกลุ่มบุคคลให้ชัดเจนเพียงพอ เพื่อให้รู้ว่าเป็นกลุ่มบุคคลใดก็ได้ คำสั่งอนุญาตหรือไม่อนุญาตให้ดำเนินคดีแบบกลุ่มอาจอุทธรณ์ไปยังศาลอุทธรณ์ภายในกำหนดเวลาเจ็ดวันนับแต่วันที่ศาลมีคำสั่ง และให้งดการพิจารณาไว้จนกว่าคำสั่งนั้นจะถึงที่สุด ทั้งนี้ ให้ศาลอุทธรณ์วินิจฉัยชี้ขาดโดยเร็ว คำวินิจฉัยของศาลอุทธรณ์ให้เป็นที่สุด ในกรณีที่ศาลมีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่ม ให้ศาลสั่งรับคำฟ้องไว้พิจารณาเมื่อได้ส่งหมายเรียกให้จำเลยแล้ว ให้จำเลยทำคำให้การเป็นหนังสือยื่นต่อศาลภายในหนึ่งเดือนและให้ถือว่าทนายความของโจทก์เป็นทนายความของกลุ่มด้วย ในกรณีที่ศาลมีคำสั่งไม่อนุญาตให้ดำเนินคดีแบบกลุ่ม ให้ศาลดำเนินกระบวนพิจารณาต่อไปอย่างคดีสามัญ"},{"id":"๒๒๒_๑๓","num":"มาตรา ๒๒๒/๑๓","num_ara":"๒๒๒/๑๓","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๒ การขออนุญาตให้ดำเนินคดีแบบกลุ่ม","paragraphs":["ในกรณีที่มีการยื่นคำร้องขอให้ดำเนินคดีแบบกลุ่มเกี่ยวกับสิทธิอย่างเดียวกันหลายรายในศาลเดียวกันหรือต่างศาลกัน ให้ศาลรวมการพิจารณาคำร้องขอเหล่านั้นเข้าด้วยกัน และมีคำสั่งให้ผู้ร้องรายหนึ่งรายใดเป็นโจทก์ในการดำเนินคดีแบบกลุ่ม ทั้งนี้ ตามหลักเกณฑ์ วิธีการ และเงื่อนไขในข้อกำหนดของประธานศาลฎีกาตามมาตรา ๒๒๒/๒ คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด เว้นแต่จะเป็นกรณีตามมาตรา ๒๒๒/๑๒ วรรคสาม"],"text":"ในกรณีที่มีการยื่นคำร้องขอให้ดำเนินคดีแบบกลุ่มเกี่ยวกับสิทธิอย่างเดียวกันหลายรายในศาลเดียวกันหรือต่างศาลกัน ให้ศาลรวมการพิจารณาคำร้องขอเหล่านั้นเข้าด้วยกัน และมีคำสั่งให้ผู้ร้องรายหนึ่งรายใดเป็นโจทก์ในการดำเนินคดีแบบกลุ่ม ทั้งนี้ ตามหลักเกณฑ์ วิธีการ และเงื่อนไขในข้อกำหนดของประธานศาลฎีกาตามมาตรา ๒๒๒/๒ คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด เว้นแต่จะเป็นกรณีตามมาตรา ๒๒๒/๑๒ วรรคสาม"},{"id":"๒๒๒_๑๔","num":"มาตรา ๒๒๒/๑๔","num_ara":"๒๒๒/๑๔","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["เมื่อคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มถึงที่สุดแล้ว ให้ศาลสั่งให้โจทก์นำเงินค่าใช้จ่ายในการดำเนินคดีแบบกลุ่มมาวางต่อศาลตามจำนวนที่เห็นสมควรภายในเจ็ดวันนับแต่วันที่ศาลมีคำสั่ง ในกรณีที่โจทก์เพิกเฉยไม่ดำเนินการตามคำสั่งดังกล่าวและไม่แจ้งให้ศาลทราบเหตุแห่งการเพิกเฉยเช่นว่านั้น ให้ศาลมีคำสั่งยกเลิกการดำเนินคดีแบบกลุ่มและให้ดำเนินกระบวนพิจารณาต่อไปอย่างคดีสามัญ หากต่อมาปรากฏว่าค่าใช้จ่ายที่วางไว้มีจำนวนไม่เพียงพอ ศาลจะสั่งให้มีการวางเงินค่าใช้จ่ายดังกล่าวเพิ่มเติมตามจำนวนที่เห็นสมควรก็ได้ ในกรณีที่โจทก์เพิกเฉยไม่ดำเนินการตามคำสั่งดังกล่าวและไม่แจ้งให้ศาลทราบเหตุแห่งการเพิกเฉยเช่นว่านั้น ให้ถือว่าโจทก์ทิ้งฟ้อง"],"text":"เมื่อคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มถึงที่สุดแล้ว ให้ศาลสั่งให้โจทก์นำเงินค่าใช้จ่ายในการดำเนินคดีแบบกลุ่มมาวางต่อศาลตามจำนวนที่เห็นสมควรภายในเจ็ดวันนับแต่วันที่ศาลมีคำสั่ง ในกรณีที่โจทก์เพิกเฉยไม่ดำเนินการตามคำสั่งดังกล่าวและไม่แจ้งให้ศาลทราบเหตุแห่งการเพิกเฉยเช่นว่านั้น ให้ศาลมีคำสั่งยกเลิกการดำเนินคดีแบบกลุ่มและให้ดำเนินกระบวนพิจารณาต่อไปอย่างคดีสามัญ หากต่อมาปรากฏว่าค่าใช้จ่ายที่วางไว้มีจำนวนไม่เพียงพอ ศาลจะสั่งให้มีการวางเงินค่าใช้จ่ายดังกล่าวเพิ่มเติมตามจำนวนที่เห็นสมควรก็ได้ ในกรณีที่โจทก์เพิกเฉยไม่ดำเนินการตามคำสั่งดังกล่าวและไม่แจ้งให้ศาลทราบเหตุแห่งการเพิกเฉยเช่นว่านั้น ให้ถือว่าโจทก์ทิ้งฟ้อง"},{"id":"๒๒๒_๑๕","num":"มาตรา ๒๒๒/๑๕","num_ara":"๒๒๒/๑๕","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ให้ศาลส่งคำบอกกล่าวคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มให้สมาชิกกลุ่มเท่าที่ทราบ และประกาศทางหนังสือพิมพ์รายวันที่แพร่หลายเป็นเวลาสามวันติดต่อกัน รวมทั้งทางสื่อมวลชนอื่นหรือวิธีการอื่นใดเพิ่มเติมตามที่เห็นสมควร คำบอกกล่าวและประกาศอย่างน้อยต้องมีรายการดังต่อไปนี้","(๑) ชื่อศาลและเลขคดี (๒) ชื่อและที่อยู่ของคู่ความและทนายความฝ่ายโจทก์ (๓) ข้อความโดยย่อของคำฟ้องและลักษณะของกลุ่มบุคคลที่ชัดเจน (๔) ข้อความที่แสดงว่าศาลอนุญาตให้ดำเนินคดีแบบกลุ่ม และวันเดือนปีที่ศาลมีคำสั่ง (๕) สิทธิของสมาชิกกลุ่มตามมาตรา ๒๒๒/๑๖ และมาตรา ๒๒๒/๑๗ (๖) กำหนดวันเพื่อให้สมาชิกกลุ่มแจ้งความประสงค์ออกจากการเป็นสมาชิกกลุ่ม ทั้งนี้ ตามที่ศาลเห็นสมควรแต่ต้องไม่น้อยกว่าสี่สิบห้าวัน (๗) ผลของการออกจากการเป็นสมาชิกกลุ่ม (๘) ผลของคำพิพากษาที่จะผูกพันสมาชิกกลุ่ม (๙) ชื่อและตำแหน่งผู้พิพากษาผู้ออกคำบอกกล่าวและประกาศ"],"text":"ให้ศาลส่งคำบอกกล่าวคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มให้สมาชิกกลุ่มเท่าที่ทราบ และประกาศทางหนังสือพิมพ์รายวันที่แพร่หลายเป็นเวลาสามวันติดต่อกัน รวมทั้งทางสื่อมวลชนอื่นหรือวิธีการอื่นใดเพิ่มเติมตามที่เห็นสมควร คำบอกกล่าวและประกาศอย่างน้อยต้องมีรายการดังต่อไปนี้\n\n(๑) ชื่อศาลและเลขคดี (๒) ชื่อและที่อยู่ของคู่ความและทนายความฝ่ายโจทก์ (๓) ข้อความโดยย่อของคำฟ้องและลักษณะของกลุ่มบุคคลที่ชัดเจน (๔) ข้อความที่แสดงว่าศาลอนุญาตให้ดำเนินคดีแบบกลุ่ม และวันเดือนปีที่ศาลมีคำสั่ง (๕) สิทธิของสมาชิกกลุ่มตามมาตรา ๒๒๒/๑๖ และมาตรา ๒๒๒/๑๗ (๖) กำหนดวันเพื่อให้สมาชิกกลุ่มแจ้งความประสงค์ออกจากการเป็นสมาชิกกลุ่ม ทั้งนี้ ตามที่ศาลเห็นสมควรแต่ต้องไม่น้อยกว่าสี่สิบห้าวัน (๗) ผลของการออกจากการเป็นสมาชิกกลุ่ม (๘) ผลของคำพิพากษาที่จะผูกพันสมาชิกกลุ่ม (๙) ชื่อและตำแหน่งผู้พิพากษาผู้ออกคำบอกกล่าวและประกาศ"},{"id":"๒๒๒_๑๖","num":"มาตรา ๒๒๒/๑๖","num_ara":"๒๒๒/๑๖","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["สมาชิกกลุ่มมีสิทธิออกจากการเป็นสมาชิกกลุ่มได้โดยแจ้งความประสงค์เป็นหนังสือยื่นต่อศาลภายในระยะเวลาที่ศาลกำหนดตามมาตรา ๒๒๒/๑๕ (๖) และให้ถือว่าสมาชิกกลุ่มดังกล่าวไม่เป็นสมาชิกกลุ่มนับแต่วันที่ได้แจ้งความประสงค์นั้นต่อศาล เมื่อพ้นกำหนดระยะเวลาตามวรรคหนึ่ง สมาชิกกลุ่มจะออกจากการเป็นสมาชิกกลุ่มไม่ได้ เว้นแต่จะได้รับอนุญาตจากศาล และคำสั่งของศาลให้เป็นที่สุด บุคคลที่ออกจากการเป็นสมาชิกกลุ่มแล้ว จะร้องขอกลับเข้ามาเป็นสมาชิกกลุ่มอีกไม่ได้ สมาชิกกลุ่มและบุคคลที่ออกจากการเป็นสมาชิกกลุ่มจะร้องสอดเข้ามาเป็นโจทก์ร่วมในการดำเนินคดีแบบกลุ่มโดยอาศัยสิทธิตามมาตรา ๕๗ ไม่ได้"],"text":"สมาชิกกลุ่มมีสิทธิออกจากการเป็นสมาชิกกลุ่มได้โดยแจ้งความประสงค์เป็นหนังสือยื่นต่อศาลภายในระยะเวลาที่ศาลกำหนดตามมาตรา ๒๒๒/๑๕ (๖) และให้ถือว่าสมาชิกกลุ่มดังกล่าวไม่เป็นสมาชิกกลุ่มนับแต่วันที่ได้แจ้งความประสงค์นั้นต่อศาล เมื่อพ้นกำหนดระยะเวลาตามวรรคหนึ่ง สมาชิกกลุ่มจะออกจากการเป็นสมาชิกกลุ่มไม่ได้ เว้นแต่จะได้รับอนุญาตจากศาล และคำสั่งของศาลให้เป็นที่สุด บุคคลที่ออกจากการเป็นสมาชิกกลุ่มแล้ว จะร้องขอกลับเข้ามาเป็นสมาชิกกลุ่มอีกไม่ได้ สมาชิกกลุ่มและบุคคลที่ออกจากการเป็นสมาชิกกลุ่มจะร้องสอดเข้ามาเป็นโจทก์ร่วมในการดำเนินคดีแบบกลุ่มโดยอาศัยสิทธิตามมาตรา ๕๗ ไม่ได้"},{"id":"๒๒๒_๑๗","num":"มาตรา ๒๒๒/๑๗","num_ara":"๒๒๒/๑๗","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["สมาชิกกลุ่มที่ไม่ได้ออกจากการเป็นสมาชิกกลุ่มตามมาตรา ๒๒๒/๑๖ ย่อมมีสิทธิดังต่อไปนี้","(๑) เข้าฟังการพิจารณาคดี (๒) ร้องขอให้ศาลสั่งแสดงว่าโจทก์มิได้มีคุณสมบัติ ส่วนได้เสีย รวมตลอดทั้งการได้มาซึ่งสิทธิการเป็นสมาชิกกลุ่มตามที่บัญญัติไว้ในมาตรา ๒๒๒/๑๒ (๕) (๓) ขอตรวจเอกสารทั้งหมดหรือบางส่วนในสำนวนความหรือขอคัดสำเนาเอกสารเหล่านั้น (๔) จัดหาทนายความคนใหม่มาดำเนินคดีแทนทนายความของกลุ่มตามมาตรา ๒๒๒/๑๙ วรรคสอง (๕) ร้องขอเข้าแทนที่โจทก์โดยอาศัยสิทธิตามบทบัญญัติในส่วนนี้ (๖) คัดค้านการร้องขอเข้าแทนที่โจทก์ตามมาตรา ๒๒๒/๒๕ การที่โจทก์ขอถอนฟ้องตามมาตรา ๒๒๒/๒๘ การที่มีการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดีตามมาตรา ๒๒๒/๒๙ และการที่คู่ความตกลงกันเสนอข้อพิพาทให้อนุญาโตตุลาการเป็นผู้ชี้ขาดตามมาตรา ๒๒๒/๓๐ (๗) ตรวจและโต้แย้งคำขอรับชำระหนี้ตามมาตรา ๒๒๒/๔๐ สมาชิกกลุ่มจะแต่งตั้งทนายความเพื่อดำเนินการตามวรรคหนึ่งก็ได้"],"text":"สมาชิกกลุ่มที่ไม่ได้ออกจากการเป็นสมาชิกกลุ่มตามมาตรา ๒๒๒/๑๖ ย่อมมีสิทธิดังต่อไปนี้\n\n(๑) เข้าฟังการพิจารณาคดี (๒) ร้องขอให้ศาลสั่งแสดงว่าโจทก์มิได้มีคุณสมบัติ ส่วนได้เสีย รวมตลอดทั้งการได้มาซึ่งสิทธิการเป็นสมาชิกกลุ่มตามที่บัญญัติไว้ในมาตรา ๒๒๒/๑๒ (๕) (๓) ขอตรวจเอกสารทั้งหมดหรือบางส่วนในสำนวนความหรือขอคัดสำเนาเอกสารเหล่านั้น (๔) จัดหาทนายความคนใหม่มาดำเนินคดีแทนทนายความของกลุ่มตามมาตรา ๒๒๒/๑๙ วรรคสอง (๕) ร้องขอเข้าแทนที่โจทก์โดยอาศัยสิทธิตามบทบัญญัติในส่วนนี้ (๖) คัดค้านการร้องขอเข้าแทนที่โจทก์ตามมาตรา ๒๒๒/๒๕ การที่โจทก์ขอถอนฟ้องตามมาตรา ๒๒๒/๒๘ การที่มีการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดีตามมาตรา ๒๒๒/๒๙ และการที่คู่ความตกลงกันเสนอข้อพิพาทให้อนุญาโตตุลาการเป็นผู้ชี้ขาดตามมาตรา ๒๒๒/๓๐ (๗) ตรวจและโต้แย้งคำขอรับชำระหนี้ตามมาตรา ๒๒๒/๔๐ สมาชิกกลุ่มจะแต่งตั้งทนายความเพื่อดำเนินการตามวรรคหนึ่งก็ได้"},{"id":"๒๒๒_๑๘","num":"มาตรา ๒๒๒/๑๘","num_ara":"๒๒๒/๑๘","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ห้ามมิให้สมาชิกกลุ่มที่ไม่ได้ออกจากการเป็นสมาชิกกลุ่มตามมาตรา ๒๒๒/๑๖ ยื่นฟ้องจำเลยในเรื่องเดียวกันกับที่โจทก์ได้ยื่นฟ้อง ในกรณีที่สมาชิกกลุ่มที่ไม่ได้ออกจากการเป็นสมาชิกกลุ่มได้ยื่นฟ้องคดีไว้ก่อนสิ้นกำหนดระยะเวลาของการออกจากสมาชิกกลุ่ม ให้ศาลที่ได้รับฟ้องไว้นั้นมีคำสั่งจำหน่ายคดีออกจากสารบบความ"],"text":"ห้ามมิให้สมาชิกกลุ่มที่ไม่ได้ออกจากการเป็นสมาชิกกลุ่มตามมาตรา ๒๒๒/๑๖ ยื่นฟ้องจำเลยในเรื่องเดียวกันกับที่โจทก์ได้ยื่นฟ้อง ในกรณีที่สมาชิกกลุ่มที่ไม่ได้ออกจากการเป็นสมาชิกกลุ่มได้ยื่นฟ้องคดีไว้ก่อนสิ้นกำหนดระยะเวลาของการออกจากสมาชิกกลุ่ม ให้ศาลที่ได้รับฟ้องไว้นั้นมีคำสั่งจำหน่ายคดีออกจากสารบบความ"},{"id":"๒๒๒_๑๙","num":"มาตรา ๒๒๒/๑๙","num_ara":"๒๒๒/๑๙","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ในกรณีที่การดำเนินคดีแบบกลุ่มจะไม่คุ้มครองหรือเป็นประโยชน์ต่อสมาชิกกลุ่มอย่างเพียงพอ หรือไม่มีความจำเป็นที่จะดำเนินคดีแบบกลุ่มอีกต่อไป เมื่อความปรากฏต่อศาลเองหรือตามคำแถลงของคู่ความฝ่ายใดฝ่ายหนึ่ง ให้ศาลมีอำนาจที่จะสั่งยกเลิกการดำเนินคดีแบบกลุ่มและดำเนินกระบวนพิจารณาต่อไปอย่างคดีสามัญ โดยให้ถือว่ากระบวนพิจารณาที่ได้กระทำไปแล้วมีผลผูกพันการดำเนินคดีสามัญของโจทก์และจำเลยต่อไปด้วย หากความปรากฏต่อศาลในระหว่างการพิจารณาว่าทนายความฝ่ายโจทก์ไม่สามารถดำเนินคดีคุ้มครองสิทธิของกลุ่มบุคคลได้อย่างเพียงพอและเป็นธรรม หรือทนายความฝ่ายโจทก์ขอถอนตัวจากการดำเนินคดีแบบกลุ่ม ศาลอาจมีคำสั่งให้โจทก์และสมาชิกกลุ่มจัดหาทนายความคนใหม่มาดำเนินคดีแทนภายในระยะเวลาที่ศาลกำหนด หากโจทก์และสมาชิกกลุ่มเพิกเฉยไม่ดำเนินการดังกล่าว ให้นำความในวรรคหนึ่งมาใช้บังคับโดยอนุโลม คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด"],"text":"ในกรณีที่การดำเนินคดีแบบกลุ่มจะไม่คุ้มครองหรือเป็นประโยชน์ต่อสมาชิกกลุ่มอย่างเพียงพอ หรือไม่มีความจำเป็นที่จะดำเนินคดีแบบกลุ่มอีกต่อไป เมื่อความปรากฏต่อศาลเองหรือตามคำแถลงของคู่ความฝ่ายใดฝ่ายหนึ่ง ให้ศาลมีอำนาจที่จะสั่งยกเลิกการดำเนินคดีแบบกลุ่มและดำเนินกระบวนพิจารณาต่อไปอย่างคดีสามัญ โดยให้ถือว่ากระบวนพิจารณาที่ได้กระทำไปแล้วมีผลผูกพันการดำเนินคดีสามัญของโจทก์และจำเลยต่อไปด้วย หากความปรากฏต่อศาลในระหว่างการพิจารณาว่าทนายความฝ่ายโจทก์ไม่สามารถดำเนินคดีคุ้มครองสิทธิของกลุ่มบุคคลได้อย่างเพียงพอและเป็นธรรม หรือทนายความฝ่ายโจทก์ขอถอนตัวจากการดำเนินคดีแบบกลุ่ม ศาลอาจมีคำสั่งให้โจทก์และสมาชิกกลุ่มจัดหาทนายความคนใหม่มาดำเนินคดีแทนภายในระยะเวลาที่ศาลกำหนด หากโจทก์และสมาชิกกลุ่มเพิกเฉยไม่ดำเนินการดังกล่าว ให้นำความในวรรคหนึ่งมาใช้บังคับโดยอนุโลม คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด"},{"id":"๒๒๒_๒๐","num":"มาตรา ๒๒๒/๒๐","num_ara":"๒๒๒/๒๐","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["เมื่อศาลได้มีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มและจำเลยได้ยื่นคำให้การแล้ว ให้ศาลกำหนดวันนัดพร้อมโดยสั่งให้คู่ความทุกฝ่ายมาศาลเพื่อดำเนินการดังนี้","(๑) ไกล่เกลี่ยหรือนำวิธีอนุญาโตตุลาการมาใช้เพื่อให้คดีเสร็จไปทั้งหมดหรือบางส่วน (๒) ให้คู่ความนำต้นฉบับพยานเอกสารหรือพยานวัตถุทั้งหมดที่ประสงค์จะอ้างอิงและอยู่ในความครอบครองของตนที่สามารถนำมาศาลได้มาแสดงต่อศาล เพื่อให้ศาลและคู่ความอีกฝ่ายหนึ่งตรวจดู ถ้าพยานหลักฐานดังกล่าวอยู่ในความครอบครองของคู่ความฝ่ายอื่นหรือของบุคคลภายนอก คู่ความฝ่ายที่ประสงค์จะอ้างอิงต้องขอให้ศาลมีคำสั่งเรียกพยานหลักฐานนั้นมาจากผู้ครอบครอง โดยยื่นคำขอต่อศาลพร้อมกับการยื่นบัญชีระบุพยานเพื่อให้ได้พยานหลักฐานนั้นมาก่อนวันนัดพร้อม ในกรณีที่มีเหตุขัดข้องทำให้คู่ความไม่สามารถนำพยานหลักฐานที่อยู่ในความครอบครองของตนมา หรือยังไม่ได้มาซึ่งพยานหลักฐานที่ศาลออกคำสั่งเรียกจากคู่ความฝ่ายอื่นหรือบุคคลภายนอก หรือมีเหตุจำเป็นอื่นใด ถ้าศาลเห็นสมควร ก็ให้ศาลเลื่อนวันนัดพร้อมออกไปตามที่เห็นสมควร หากคู่ความฝ่ายใดจงใจไม่ดำเนินการดังกล่าวในวันนัดพร้อมหรือวันอื่นที่ศาลได้เลื่อนไป คู่ความฝ่ายนั้นไม่มีสิทธิที่จะนำพยานหลักฐานดังกล่าวมาสืบในภายหลัง แต่ถ้าศาลเห็นว่าเพื่อประโยชน์แห่งความยุติธรรมจำเป็นจะต้องสืบพยานหลักฐานอันสำคัญซึ่งเกี่ยวกับประเด็นข้อสำคัญในคดีโดยฝ่าฝืนต่อบทบัญญัติแห่งอนุมาตรานี้ ให้ศาลมีอำนาจรับฟังพยานหลักฐานเช่นว่านั้นได้ (๓) ให้ศาลตรวจคำคู่ความและคำแถลงของคู่ความแล้วนำข้ออ้าง ข้อเถียง ที่ปรากฏในคำคู่ความและคำแถลงของคู่ความเทียบกันดูและสอบถามคู่ความทุกฝ่ายถึงข้ออ้าง ข้อเถียง และพยานหลักฐานที่ยื่นต่อศาล ว่าฝ่ายใดยอมรับหรือโต้แย้งข้ออ้าง ข้อเถียง นั้นอย่างไร ข้อเท็จจริงใดที่คู่ความยอมรับกันก็เป็นอันยุติไปตามนั้น ส่วนข้อกฎหมายหรือข้อเท็จจริงที่คู่ความฝ่ายหนึ่งยกขึ้นอ้างแต่คู่ความฝ่ายอื่นไม่รับและเกี่ยวเนื่องโดยตรงกับประเด็นข้อพิพาทตามคำคู่ความ ให้ศาลกำหนดไว้เป็นประเด็นข้อพิพาทและกำหนดให้คู่ความฝ่ายใดนำพยานหลักฐานมาสืบในประเด็นข้อใดก่อนหรือหลังก็ได้ ในการสอบถามคู่ความดังกล่าว คู่ความแต่ละฝ่ายต้องตอบคำถามที่ศาลถามเอง หรือถามตามคำขอของคู่ความฝ่ายอื่น เกี่ยวกับข้อเท็จจริงที่คู่ความฝ่ายอื่นยกเป็นข้ออ้าง ข้อเถียง และพยานหลักฐานต่าง ๆ ที่คู่ความได้ยื่นต่อศาล ถ้าคู่ความฝ่ายใดไม่ตอบคำถามเกี่ยวกับข้อเท็จจริงใด หรือปฏิเสธข้อเท็จจริงใดโดยไม่มีเหตุแห่งการปฏิเสธโดยชัดแจ้ง ให้ถือว่ายอมรับข้อเท็จจริงนั้นแล้ว เว้นแต่ศาลจะเห็นว่าคู่ความฝ่ายนั้นไม่อยู่ในวิสัยที่จะตอบหรือแสดงเหตุแห่งการปฏิเสธโดยชัดแจ้งได้ในขณะนั้นและเป็นข้อเท็จจริงที่จำเป็นต่อการกำหนดประเด็นข้อพิพาท ศาลจะมีคำสั่งให้เลื่อนวันนัดพร้อมเฉพาะส่วนที่ยังไม่เสร็จสิ้นออกไป และให้คู่ความฝ่ายนั้นทำคำแถลงเกี่ยวกับข้อเท็จจริงนั้นมายื่นต่อศาลภายในเวลาที่ศาลเห็นสมควรก็ได้ (๔) กำหนดระยะเวลาทั้งหมดในการดำเนินคดีแบบกลุ่ม (๕) กำหนดวัน เวลา วิธีการ และขั้นตอนในการดำเนินคดีแบบกลุ่มที่จำเป็น เช่น จำนวนและรายละเอียดเกี่ยวกับพยานที่จะนำมาเบิกความ บันทึกถ้อยคำแทนการสืบพยานบุคคล พยานผู้เชี่ยวชาญ พยานเอกสาร และพยานหลักฐานที่ต้องการให้ศาลเรียกจากคู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอก รวมทั้งการพิสูจน์ทางวิทยาศาสตร์ การเดินเผชิญสืบ และการส่งประเด็นไปสืบยังศาลอื่น ในกรณีที่คู่ความฝ่ายใดฝ่ายหนึ่งไม่มาศาลในวันนัดพร้อมหรือวันอื่นที่ศาลได้เลื่อนไป ให้ศาลดำเนินการตามมาตรานี้โดยให้ถือว่าคู่ความที่ไม่มาศาลได้ทราบการดำเนินการในวันนั้นแล้ว และคู่ความที่ไม่มาศาลไม่มีสิทธิขอเลื่อนกำหนดนัดหรือคัดค้านประเด็นข้อพิพาทและหน้าที่นำสืบที่ศาลกำหนด เว้นแต่เป็นกรณีที่ไม่สามารถมาศาลได้ในวันนัดพร้อมหรือวันอื่นที่ศาลได้เลื่อนไปเพราะเหตุจำเป็นอันไม่อาจก้าวล่วงเสียได้หรือเป็นการคัดค้านประเด็นข้อพิพาทเกี่ยวกับความสงบเรียบร้อยของประชาชน เมื่อศาลได้ดำเนินการตามมาตรานี้เสร็จสิ้นแล้ว ให้ศาลกำหนดวันสืบพยานซึ่งมีระยะเวลาไม่น้อยกว่าสิบวันนับแต่วันนัดพร้อมวันสุดท้าย ให้ถือว่าวันนัดพร้อมวันแรกตามมาตรานี้เป็นวันชี้สองสถานตามประมวลกฎหมายนี้"],"text":"เมื่อศาลได้มีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มและจำเลยได้ยื่นคำให้การแล้ว ให้ศาลกำหนดวันนัดพร้อมโดยสั่งให้คู่ความทุกฝ่ายมาศาลเพื่อดำเนินการดังนี้\n\n(๑) ไกล่เกลี่ยหรือนำวิธีอนุญาโตตุลาการมาใช้เพื่อให้คดีเสร็จไปทั้งหมดหรือบางส่วน (๒) ให้คู่ความนำต้นฉบับพยานเอกสารหรือพยานวัตถุทั้งหมดที่ประสงค์จะอ้างอิงและอยู่ในความครอบครองของตนที่สามารถนำมาศาลได้มาแสดงต่อศาล เพื่อให้ศาลและคู่ความอีกฝ่ายหนึ่งตรวจดู ถ้าพยานหลักฐานดังกล่าวอยู่ในความครอบครองของคู่ความฝ่ายอื่นหรือของบุคคลภายนอก คู่ความฝ่ายที่ประสงค์จะอ้างอิงต้องขอให้ศาลมีคำสั่งเรียกพยานหลักฐานนั้นมาจากผู้ครอบครอง โดยยื่นคำขอต่อศาลพร้อมกับการยื่นบัญชีระบุพยานเพื่อให้ได้พยานหลักฐานนั้นมาก่อนวันนัดพร้อม ในกรณีที่มีเหตุขัดข้องทำให้คู่ความไม่สามารถนำพยานหลักฐานที่อยู่ในความครอบครองของตนมา หรือยังไม่ได้มาซึ่งพยานหลักฐานที่ศาลออกคำสั่งเรียกจากคู่ความฝ่ายอื่นหรือบุคคลภายนอก หรือมีเหตุจำเป็นอื่นใด ถ้าศาลเห็นสมควร ก็ให้ศาลเลื่อนวันนัดพร้อมออกไปตามที่เห็นสมควร หากคู่ความฝ่ายใดจงใจไม่ดำเนินการดังกล่าวในวันนัดพร้อมหรือวันอื่นที่ศาลได้เลื่อนไป คู่ความฝ่ายนั้นไม่มีสิทธิที่จะนำพยานหลักฐานดังกล่าวมาสืบในภายหลัง แต่ถ้าศาลเห็นว่าเพื่อประโยชน์แห่งความยุติธรรมจำเป็นจะต้องสืบพยานหลักฐานอันสำคัญซึ่งเกี่ยวกับประเด็นข้อสำคัญในคดีโดยฝ่าฝืนต่อบทบัญญัติแห่งอนุมาตรานี้ ให้ศาลมีอำนาจรับฟังพยานหลักฐานเช่นว่านั้นได้ (๓) ให้ศาลตรวจคำคู่ความและคำแถลงของคู่ความแล้วนำข้ออ้าง ข้อเถียง ที่ปรากฏในคำคู่ความและคำแถลงของคู่ความเทียบกันดูและสอบถามคู่ความทุกฝ่ายถึงข้ออ้าง ข้อเถียง และพยานหลักฐานที่ยื่นต่อศาล ว่าฝ่ายใดยอมรับหรือโต้แย้งข้ออ้าง ข้อเถียง นั้นอย่างไร ข้อเท็จจริงใดที่คู่ความยอมรับกันก็เป็นอันยุติไปตามนั้น ส่วนข้อกฎหมายหรือข้อเท็จจริงที่คู่ความฝ่ายหนึ่งยกขึ้นอ้างแต่คู่ความฝ่ายอื่นไม่รับและเกี่ยวเนื่องโดยตรงกับประเด็นข้อพิพาทตามคำคู่ความ ให้ศาลกำหนดไว้เป็นประเด็นข้อพิพาทและกำหนดให้คู่ความฝ่ายใดนำพยานหลักฐานมาสืบในประเด็นข้อใดก่อนหรือหลังก็ได้ ในการสอบถามคู่ความดังกล่าว คู่ความแต่ละฝ่ายต้องตอบคำถามที่ศาลถามเอง หรือถามตามคำขอของคู่ความฝ่ายอื่น เกี่ยวกับข้อเท็จจริงที่คู่ความฝ่ายอื่นยกเป็นข้ออ้าง ข้อเถียง และพยานหลักฐานต่าง ๆ ที่คู่ความได้ยื่นต่อศาล ถ้าคู่ความฝ่ายใดไม่ตอบคำถามเกี่ยวกับข้อเท็จจริงใด หรือปฏิเสธข้อเท็จจริงใดโดยไม่มีเหตุแห่งการปฏิเสธโดยชัดแจ้ง ให้ถือว่ายอมรับข้อเท็จจริงนั้นแล้ว เว้นแต่ศาลจะเห็นว่าคู่ความฝ่ายนั้นไม่อยู่ในวิสัยที่จะตอบหรือแสดงเหตุแห่งการปฏิเสธโดยชัดแจ้งได้ในขณะนั้นและเป็นข้อเท็จจริงที่จำเป็นต่อการกำหนดประเด็นข้อพิพาท ศาลจะมีคำสั่งให้เลื่อนวันนัดพร้อมเฉพาะส่วนที่ยังไม่เสร็จสิ้นออกไป และให้คู่ความฝ่ายนั้นทำคำแถลงเกี่ยวกับข้อเท็จจริงนั้นมายื่นต่อศาลภายในเวลาที่ศาลเห็นสมควรก็ได้ (๔) กำหนดระยะเวลาทั้งหมดในการดำเนินคดีแบบกลุ่ม (๕) กำหนดวัน เวลา วิธีการ และขั้นตอนในการดำเนินคดีแบบกลุ่มที่จำเป็น เช่น จำนวนและรายละเอียดเกี่ยวกับพยานที่จะนำมาเบิกความ บันทึกถ้อยคำแทนการสืบพยานบุคคล พยานผู้เชี่ยวชาญ พยานเอกสาร และพยานหลักฐานที่ต้องการให้ศาลเรียกจากคู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอก รวมทั้งการพิสูจน์ทางวิทยาศาสตร์ การเดินเผชิญสืบ และการส่งประเด็นไปสืบยังศาลอื่น ในกรณีที่คู่ความฝ่ายใดฝ่ายหนึ่งไม่มาศาลในวันนัดพร้อมหรือวันอื่นที่ศาลได้เลื่อนไป ให้ศาลดำเนินการตามมาตรานี้โดยให้ถือว่าคู่ความที่ไม่มาศาลได้ทราบการดำเนินการในวันนั้นแล้ว และคู่ความที่ไม่มาศาลไม่มีสิทธิขอเลื่อนกำหนดนัดหรือคัดค้านประเด็นข้อพิพาทและหน้าที่นำสืบที่ศาลกำหนด เว้นแต่เป็นกรณีที่ไม่สามารถมาศาลได้ในวันนัดพร้อมหรือวันอื่นที่ศาลได้เลื่อนไปเพราะเหตุจำเป็นอันไม่อาจก้าวล่วงเสียได้หรือเป็นการคัดค้านประเด็นข้อพิพาทเกี่ยวกับความสงบเรียบร้อยของประชาชน เมื่อศาลได้ดำเนินการตามมาตรานี้เสร็จสิ้นแล้ว ให้ศาลกำหนดวันสืบพยานซึ่งมีระยะเวลาไม่น้อยกว่าสิบวันนับแต่วันนัดพร้อมวันสุดท้าย ให้ถือว่าวันนัดพร้อมวันแรกตามมาตรานี้เป็นวันชี้สองสถานตามประมวลกฎหมายนี้"},{"id":"๒๒๒_๒๑","num":"มาตรา ๒๒๒/๒๑","num_ara":"๒๒๒/๒๑","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ก่อนวันนัดพร้อมตามมาตรา ๒๒๒/๒๐ ไม่น้อยกว่าสิบห้าวัน ให้คู่ความยื่นบัญชีระบุพยานต่อศาลพร้อมสำเนาในจำนวนที่เพียงพอเพื่อให้คู่ความฝ่ายอื่นรับไปจากเจ้าพนักงานศาล และถ้าคู่ความฝ่ายใดมีความจำนงจะยื่นบัญชีระบุพยานเพิ่มเติม ให้ยื่นต่อศาลก่อนกระบวนพิจารณาที่ต้องกระทำในวันนัดพร้อมเสร็จสิ้น การยื่นบัญชีระบุพยานเพิ่มเติมเมื่อล่วงพ้นระยะเวลาตามวรรคหนึ่ง จะกระทำได้ต่อเมื่อได้รับอนุญาตจากศาลเมื่อผู้ร้องขอแสดงเหตุอันสมควรว่าไม่สามารถทราบถึงพยานหลักฐานนั้นหรือเป็นกรณีจำเป็นเพื่อประโยชน์แห่งความยุติธรรม หรือเพื่อให้โอกาสแก่คู่ความในการต่อสู้คดีอย่างเต็มที่"],"text":"ก่อนวันนัดพร้อมตามมาตรา ๒๒๒/๒๐ ไม่น้อยกว่าสิบห้าวัน ให้คู่ความยื่นบัญชีระบุพยานต่อศาลพร้อมสำเนาในจำนวนที่เพียงพอเพื่อให้คู่ความฝ่ายอื่นรับไปจากเจ้าพนักงานศาล และถ้าคู่ความฝ่ายใดมีความจำนงจะยื่นบัญชีระบุพยานเพิ่มเติม ให้ยื่นต่อศาลก่อนกระบวนพิจารณาที่ต้องกระทำในวันนัดพร้อมเสร็จสิ้น การยื่นบัญชีระบุพยานเพิ่มเติมเมื่อล่วงพ้นระยะเวลาตามวรรคหนึ่ง จะกระทำได้ต่อเมื่อได้รับอนุญาตจากศาลเมื่อผู้ร้องขอแสดงเหตุอันสมควรว่าไม่สามารถทราบถึงพยานหลักฐานนั้นหรือเป็นกรณีจำเป็นเพื่อประโยชน์แห่งความยุติธรรม หรือเพื่อให้โอกาสแก่คู่ความในการต่อสู้คดีอย่างเต็มที่"},{"id":"๒๒๒_๒๒","num":"มาตรา ๒๒๒/๒๒","num_ara":"๒๒๒/๒๒","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ในกรณีที่จำเลยขาดนัดยื่นคำให้การหรือขาดนัดพิจารณาศาลจะมีคำพิพากษาหรือคำสั่งชี้ขาดให้โจทก์เป็นฝ่ายชนะคดีโดยจำเลยขาดนัดยื่นคำให้การหรือขาดนัดพิจารณามิได้ ให้ศาลสืบพยานหลักฐานโจทก์ไปฝ่ายเดียว และศาลอาจเรียกพยานหลักฐานอื่นมาสืบได้เองตามที่เห็นว่าจำเป็นเพื่อประโยชน์แห่งความยุติธรรม ถ้าโจทก์ไม่นำพยานหลักฐานมาสืบตามความในวรรคหนึ่งภายในระยะเวลาที่ศาลกำหนด หรือในกรณีที่คู่ความทั้งสองฝ่ายหรือโจทก์ขาดนัดพิจารณา ให้บังคับตามบทบัญญัติมาตรา ๒๒๒/๒๕ นอกจากที่บัญญัติไว้ในวรรคหนึ่งและวรรคสอง ให้นำบทบัญญัติว่าด้วยการพิจารณาโดยขาดนัดมาใช้บังคับโดยอนุโลม"],"text":"ในกรณีที่จำเลยขาดนัดยื่นคำให้การหรือขาดนัดพิจารณาศาลจะมีคำพิพากษาหรือคำสั่งชี้ขาดให้โจทก์เป็นฝ่ายชนะคดีโดยจำเลยขาดนัดยื่นคำให้การหรือขาดนัดพิจารณามิได้ ให้ศาลสืบพยานหลักฐานโจทก์ไปฝ่ายเดียว และศาลอาจเรียกพยานหลักฐานอื่นมาสืบได้เองตามที่เห็นว่าจำเป็นเพื่อประโยชน์แห่งความยุติธรรม ถ้าโจทก์ไม่นำพยานหลักฐานมาสืบตามความในวรรคหนึ่งภายในระยะเวลาที่ศาลกำหนด หรือในกรณีที่คู่ความทั้งสองฝ่ายหรือโจทก์ขาดนัดพิจารณา ให้บังคับตามบทบัญญัติมาตรา ๒๒๒/๒๕ นอกจากที่บัญญัติไว้ในวรรคหนึ่งและวรรคสอง ให้นำบทบัญญัติว่าด้วยการพิจารณาโดยขาดนัดมาใช้บังคับโดยอนุโลม"},{"id":"๒๒๒_๒๓","num":"มาตรา ๒๒๒/๒๓","num_ara":"๒๒๒/๒๓","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ในการพิจารณาพิพากษาคดี เพื่อประโยชน์แห่งความยุติธรรมให้ศาลมีอำนาจแสวงหาข้อเท็จจริงเพิ่มเติมได้ ในการนี้ ศาลจะรับฟังพยานบุคคล พยานเอกสาร หรือพยานหลักฐานอื่นนอกเหนือจากพยานหลักฐานของคู่ความก็ได้ แต่ต้องให้คู่ความทุกฝ่ายทราบและไม่ตัดสิทธิคู่ความในอันที่จะโต้แย้งพยานหลักฐานดังกล่าว ศาลอาจขอให้ผู้ทรงคุณวุฒิหรือผู้เชี่ยวชาญมาให้ความเห็นเพื่อประกอบการพิจารณาพิพากษาคดีได้ แต่ต้องให้คู่ความทุกฝ่ายทราบและไม่ตัดสิทธิคู่ความในอันที่จะขอให้เรียกผู้ทรงคุณวุฒิหรือผู้เชี่ยวชาญฝ่ายตนมาให้ความเห็นโต้แย้งหรือเพิ่มเติมความเห็นของผู้ทรงคุณวุฒิหรือผู้เชี่ยวชาญดังกล่าว บุคคลที่ศาลขอให้มาตามวรรคหนึ่งและวรรคสองมีสิทธิได้รับค่าป่วยการ ค่าพาหนะเดินทาง ค่าเช่าที่พัก และการชดใช้ค่าใช้จ่ายที่ต้องเสียไป ตามข้อบังคับของประธานศาลฎีกาโดยได้รับความเห็นชอบของคณะกรรมการบริหารศาลยุติธรรม และไม่ถือว่าเงินที่ศาลสั่งจ่ายตามวรรคนี้เป็นค่าฤชาธรรมเนียมในการดำเนินคดีแบบกลุ่มที่คู่ความจะต้องชำระ"],"text":"ในการพิจารณาพิพากษาคดี เพื่อประโยชน์แห่งความยุติธรรมให้ศาลมีอำนาจแสวงหาข้อเท็จจริงเพิ่มเติมได้ ในการนี้ ศาลจะรับฟังพยานบุคคล พยานเอกสาร หรือพยานหลักฐานอื่นนอกเหนือจากพยานหลักฐานของคู่ความก็ได้ แต่ต้องให้คู่ความทุกฝ่ายทราบและไม่ตัดสิทธิคู่ความในอันที่จะโต้แย้งพยานหลักฐานดังกล่าว ศาลอาจขอให้ผู้ทรงคุณวุฒิหรือผู้เชี่ยวชาญมาให้ความเห็นเพื่อประกอบการพิจารณาพิพากษาคดีได้ แต่ต้องให้คู่ความทุกฝ่ายทราบและไม่ตัดสิทธิคู่ความในอันที่จะขอให้เรียกผู้ทรงคุณวุฒิหรือผู้เชี่ยวชาญฝ่ายตนมาให้ความเห็นโต้แย้งหรือเพิ่มเติมความเห็นของผู้ทรงคุณวุฒิหรือผู้เชี่ยวชาญดังกล่าว บุคคลที่ศาลขอให้มาตามวรรคหนึ่งและวรรคสองมีสิทธิได้รับค่าป่วยการ ค่าพาหนะเดินทาง ค่าเช่าที่พัก และการชดใช้ค่าใช้จ่ายที่ต้องเสียไป ตามข้อบังคับของประธานศาลฎีกาโดยได้รับความเห็นชอบของคณะกรรมการบริหารศาลยุติธรรม และไม่ถือว่าเงินที่ศาลสั่งจ่ายตามวรรคนี้เป็นค่าฤชาธรรมเนียมในการดำเนินคดีแบบกลุ่มที่คู่ความจะต้องชำระ"},{"id":"๒๒๒_๒๔","num":"มาตรา ๒๒๒/๒๔","num_ara":"๒๒๒/๒๔","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ไม่ว่าการพิจารณาคดีจะได้ดำเนินไปแล้วเพียงใด ศาลอาจมีคำสั่งให้มีการแบ่งกลุ่มย่อยเนื่องจากมีลักษณะของความเสียหายที่แตกต่างกันระหว่างบุคคลในกลุ่ม และในกรณีเช่นนี้ศาลอาจสั่งให้มีการนำสืบถึงความเสียหายของกลุ่มย่อยให้ชัดเจนด้วยก็ได้ คำสั่งของศาลให้เป็นที่สุด"],"text":"ไม่ว่าการพิจารณาคดีจะได้ดำเนินไปแล้วเพียงใด ศาลอาจมีคำสั่งให้มีการแบ่งกลุ่มย่อยเนื่องจากมีลักษณะของความเสียหายที่แตกต่างกันระหว่างบุคคลในกลุ่ม และในกรณีเช่นนี้ศาลอาจสั่งให้มีการนำสืบถึงความเสียหายของกลุ่มย่อยให้ชัดเจนด้วยก็ได้ คำสั่งของศาลให้เป็นที่สุด"},{"id":"๒๒๒_๒๕","num":"มาตรา ๒๒๒/๒๕","num_ara":"๒๒๒/๒๕","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ในกรณีดังต่อไปนี้ ให้ศาลกำหนดวันตามที่เห็นสมควรแต่ต้องไม่น้อยกว่าสี่สิบห้าวันเพื่อให้สมาชิกกลุ่มยื่นคำขอเข้าแทนที่โจทก์ รวมทั้งกำหนดวันยื่นคำคัดค้าน คำขอเข้าแทนที่โจทก์ วันนัดไต่สวนคำขอเข้าแทนที่โจทก์ และส่งคำบอกกล่าวให้สมาชิกกลุ่มเท่าที่ทราบ กับประกาศโดยใช้วิธีการตามที่เห็นสมควร","(๑) เมื่อโจทก์มิได้มีคุณสมบัติตามที่บัญญัติไว้ในมาตรา ๒๒๒/๑๒ (๕) (๒) เมื่อโจทก์มรณะหรือตกเป็นผู้ไร้ความสามารถ (๓) เมื่อศาลมีคำสั่งพิทักษ์ทรัพย์โจทก์ (๔) เมื่อโจทก์ทิ้งฟ้อง (๕) เมื่อคู่ความทั้งสองฝ่ายหรือโจทก์ขาดนัดพิจารณา (๖) เมื่อโจทก์ไม่นำพยานหลักฐานมาสืบตามมาตรา ๒๒๒/๒๒ (๗) เมื่อโจทก์ร้องขอต่อศาลว่าไม่ประสงค์ที่จะเป็นโจทก์ดำเนินคดีแทนกลุ่มอีกต่อไป ในกรณีตาม (๒) นอกจากสมาชิกกลุ่มแล้ว บุคคลตามมาตรา ๔๒ หรือมาตรา ๔๕ แล้วแต่กรณี อาจร้องขอเข้าแทนที่โจทก์ได้ด้วย โดยให้นำมาตรา ๒๒๒/๒๖ และมาตรา ๒๒๒/๒๗ มาใช้บังคับโดยอนุโลม"],"text":"ในกรณีดังต่อไปนี้ ให้ศาลกำหนดวันตามที่เห็นสมควรแต่ต้องไม่น้อยกว่าสี่สิบห้าวันเพื่อให้สมาชิกกลุ่มยื่นคำขอเข้าแทนที่โจทก์ รวมทั้งกำหนดวันยื่นคำคัดค้าน คำขอเข้าแทนที่โจทก์ วันนัดไต่สวนคำขอเข้าแทนที่โจทก์ และส่งคำบอกกล่าวให้สมาชิกกลุ่มเท่าที่ทราบ กับประกาศโดยใช้วิธีการตามที่เห็นสมควร\n\n(๑) เมื่อโจทก์มิได้มีคุณสมบัติตามที่บัญญัติไว้ในมาตรา ๒๒๒/๑๒ (๕) (๒) เมื่อโจทก์มรณะหรือตกเป็นผู้ไร้ความสามารถ (๓) เมื่อศาลมีคำสั่งพิทักษ์ทรัพย์โจทก์ (๔) เมื่อโจทก์ทิ้งฟ้อง (๕) เมื่อคู่ความทั้งสองฝ่ายหรือโจทก์ขาดนัดพิจารณา (๖) เมื่อโจทก์ไม่นำพยานหลักฐานมาสืบตามมาตรา ๒๒๒/๒๒ (๗) เมื่อโจทก์ร้องขอต่อศาลว่าไม่ประสงค์ที่จะเป็นโจทก์ดำเนินคดีแทนกลุ่มอีกต่อไป ในกรณีตาม (๒) นอกจากสมาชิกกลุ่มแล้ว บุคคลตามมาตรา ๔๒ หรือมาตรา ๔๕ แล้วแต่กรณี อาจร้องขอเข้าแทนที่โจทก์ได้ด้วย โดยให้นำมาตรา ๒๒๒/๒๖ และมาตรา ๒๒๒/๒๗ มาใช้บังคับโดยอนุโลม"},{"id":"๒๒๒_๒๖","num":"มาตรา ๒๒๒/๒๖","num_ara":"๒๒๒/๒๖","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ในการพิจารณาอนุญาตให้สมาชิกกลุ่มคนใดเข้าแทนที่โจทก์ต้องเป็นที่พอใจแก่ศาลว่าสมาชิกกลุ่มคนนั้นมีคุณสมบัติตามที่บัญญัติไว้ในมาตรา ๒๒๒/๑๒ (๕) ถ้าศาลอนุญาตให้สมาชิกกลุ่มเข้าแทนที่โจทก์ ให้โจทก์เดิมยังคงมีฐานะเป็นสมาชิกกลุ่มคนหนึ่งและทนายความของโจทก์เดิมยังคงเป็นทนายความของกลุ่มต่อไป ในกรณีตามมาตรา ๒๒๒/๒๕ (๕) และ (๖) ให้ศาลกำหนดวันสืบพยานใหม่โดยเร็ว ถ้าศาลไม่อนุญาตให้สมาชิกกลุ่มเข้าแทนที่โจทก์หรือไม่มีการร้องขอเข้าแทนที่โจทก์ ให้ศาลมีคำสั่งยกเลิกการดำเนินคดีแบบกลุ่มและให้ดำเนินกระบวนพิจารณาต่อไปอย่างคดีสามัญ โดยให้ถือว่ากระบวนพิจารณาที่ได้กระทำไปแล้วมีผลผูกพันการดำเนินคดีสามัญของโจทก์ต่อไปด้วย คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด"],"text":"ในการพิจารณาอนุญาตให้สมาชิกกลุ่มคนใดเข้าแทนที่โจทก์ต้องเป็นที่พอใจแก่ศาลว่าสมาชิกกลุ่มคนนั้นมีคุณสมบัติตามที่บัญญัติไว้ในมาตรา ๒๒๒/๑๒ (๕) ถ้าศาลอนุญาตให้สมาชิกกลุ่มเข้าแทนที่โจทก์ ให้โจทก์เดิมยังคงมีฐานะเป็นสมาชิกกลุ่มคนหนึ่งและทนายความของโจทก์เดิมยังคงเป็นทนายความของกลุ่มต่อไป ในกรณีตามมาตรา ๒๒๒/๒๕ (๕) และ (๖) ให้ศาลกำหนดวันสืบพยานใหม่โดยเร็ว ถ้าศาลไม่อนุญาตให้สมาชิกกลุ่มเข้าแทนที่โจทก์หรือไม่มีการร้องขอเข้าแทนที่โจทก์ ให้ศาลมีคำสั่งยกเลิกการดำเนินคดีแบบกลุ่มและให้ดำเนินกระบวนพิจารณาต่อไปอย่างคดีสามัญ โดยให้ถือว่ากระบวนพิจารณาที่ได้กระทำไปแล้วมีผลผูกพันการดำเนินคดีสามัญของโจทก์ต่อไปด้วย คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด"},{"id":"๒๒๒_๒๗","num":"มาตรา ๒๒๒/๒๗","num_ara":"๒๒๒/๒๗","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ห้ามมิให้สมาชิกกลุ่มที่เข้าแทนที่โจทก์ตามมาตรา ๒๒๒/๒๕ ใช้สิทธิอย่างอื่นนอกจากสิทธิที่มีอยู่แก่โจทก์ในชั้นพิจารณาเมื่อตนร้องขอเข้าแทนที่โจทก์ และห้ามมิให้ใช้สิทธิเช่นว่านั้นในทางที่ขัดกับสิทธิของโจทก์เดิม เว้นแต่เป็นที่พอใจแก่ศาลตามคำร้องของสมาชิกกลุ่มที่เข้าแทนที่โจทก์ว่าการดำเนินกระบวนพิจารณาของโจทก์ที่ได้ทำไปแล้วซึ่งก่อให้เกิดความเสียหายแก่สมาชิกกลุ่มนั้นเกิดจากความจงใจหรือประมาทเลินเล่ออย่างร้ายแรงของโจทก์ ในกรณีเช่นว่านี้ เพื่อประโยชน์แห่งความยุติธรรม ศาลอาจมีคำสั่งอย่างใด ๆ ตามที่เห็นสมควรก็ได้"],"text":"ห้ามมิให้สมาชิกกลุ่มที่เข้าแทนที่โจทก์ตามมาตรา ๒๒๒/๒๕ ใช้สิทธิอย่างอื่นนอกจากสิทธิที่มีอยู่แก่โจทก์ในชั้นพิจารณาเมื่อตนร้องขอเข้าแทนที่โจทก์ และห้ามมิให้ใช้สิทธิเช่นว่านั้นในทางที่ขัดกับสิทธิของโจทก์เดิม เว้นแต่เป็นที่พอใจแก่ศาลตามคำร้องของสมาชิกกลุ่มที่เข้าแทนที่โจทก์ว่าการดำเนินกระบวนพิจารณาของโจทก์ที่ได้ทำไปแล้วซึ่งก่อให้เกิดความเสียหายแก่สมาชิกกลุ่มนั้นเกิดจากความจงใจหรือประมาทเลินเล่ออย่างร้ายแรงของโจทก์ ในกรณีเช่นว่านี้ เพื่อประโยชน์แห่งความยุติธรรม ศาลอาจมีคำสั่งอย่างใด ๆ ตามที่เห็นสมควรก็ได้"},{"id":"๒๒๒_๒๘","num":"มาตรา ๒๒๒/๒๘","num_ara":"๒๒๒/๒๘","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["เมื่อศาลมีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มแล้วโจทก์จะถอนคำฟ้องไม่ได้ เว้นแต่ศาลจะอนุญาต ในกรณีที่จำเลยยื่นคำให้การแล้ว ห้ามไม่ให้ศาลอนุญาตให้ถอนฟ้องโดยมิได้ฟังจำเลยก่อน ในกรณีที่ได้มีการส่งคำบอกกล่าวกับประกาศให้สมาชิกกลุ่มตามมาตรา ๒๒๒/๑๕ แล้ว หากศาลจะมีคำสั่งอนุญาตให้ถอนคำฟ้อง ให้ศาลกำหนดวันตามที่เห็นสมควรแต่ต้องไม่น้อยกว่าสี่สิบห้าวันเพื่อให้สมาชิกกลุ่มคัดค้านโดยทำเป็นหนังสือยื่นต่อศาล และสั่งให้โจทก์นำเงินค่าใช้จ่ายมาวางศาล รวมทั้งแจ้งเรื่องการถอนฟ้องให้สมาชิกกลุ่มทราบตามวิธีการเช่นเดียวกับที่กำหนดไว้ในมาตรา ๒๒๒/๑๕ วรรคหนึ่ง ในกรณีที่โจทก์เพิกเฉยไม่นำเงินค่าใช้จ่ายมาวางศาลตามวรรคสามโดยไม่แจ้งให้ศาลทราบเหตุแห่งการเพิกเฉยเช่นว่านั้น ให้ศาลมีคำสั่งไม่อนุญาตให้ถอนคำฟ้อง"],"text":"เมื่อศาลมีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มแล้วโจทก์จะถอนคำฟ้องไม่ได้ เว้นแต่ศาลจะอนุญาต ในกรณีที่จำเลยยื่นคำให้การแล้ว ห้ามไม่ให้ศาลอนุญาตให้ถอนฟ้องโดยมิได้ฟังจำเลยก่อน ในกรณีที่ได้มีการส่งคำบอกกล่าวกับประกาศให้สมาชิกกลุ่มตามมาตรา ๒๒๒/๑๕ แล้ว หากศาลจะมีคำสั่งอนุญาตให้ถอนคำฟ้อง ให้ศาลกำหนดวันตามที่เห็นสมควรแต่ต้องไม่น้อยกว่าสี่สิบห้าวันเพื่อให้สมาชิกกลุ่มคัดค้านโดยทำเป็นหนังสือยื่นต่อศาล และสั่งให้โจทก์นำเงินค่าใช้จ่ายมาวางศาล รวมทั้งแจ้งเรื่องการถอนฟ้องให้สมาชิกกลุ่มทราบตามวิธีการเช่นเดียวกับที่กำหนดไว้ในมาตรา ๒๒๒/๑๕ วรรคหนึ่ง ในกรณีที่โจทก์เพิกเฉยไม่นำเงินค่าใช้จ่ายมาวางศาลตามวรรคสามโดยไม่แจ้งให้ศาลทราบเหตุแห่งการเพิกเฉยเช่นว่านั้น ให้ศาลมีคำสั่งไม่อนุญาตให้ถอนคำฟ้อง"},{"id":"๒๒๒_๒๙","num":"มาตรา ๒๒๒/๒๙","num_ara":"๒๒๒/๒๙","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["เมื่อศาลมีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มและพ้นระยะเวลาตามมาตรา ๒๒๒/๑๕ (๖) แล้ว ก่อนที่ศาลจะอนุญาตให้มีการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดี ให้ศาลกำหนดวันตามที่เห็นสมควรแต่ต้องไม่น้อยกว่าสี่สิบห้าวันเพื่อให้สมาชิกกลุ่มคัดค้านหรือแจ้งความประสงค์ออกจากการเป็นสมาชิกกลุ่มโดยทำเป็นหนังสือยื่นต่อศาล และสั่งให้โจทก์นำเงินค่าใช้จ่ายมาวางศาล เพื่อแจ้งเรื่องการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดีให้สมาชิกกลุ่มทราบตามวิธีการเช่นเดียวกับที่กำหนดไว้ในมาตรา ๒๒๒/๑๕ วรรคหนึ่ง เมื่อศาลมีคำสั่งอนุญาตให้มีการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดีแล้ว ให้ถือว่าสมาชิกกลุ่มรายที่แจ้งความประสงค์ออกจากการเป็นสมาชิกกลุ่มและมิได้ขอถอนความประสงค์ดังกล่าวก่อนศาลมีคำสั่งอนุญาต ไม่เป็นสมาชิกกลุ่มนับแต่วันที่ศาลมีคำสั่งอนุญาต ในกรณีที่โจทก์เพิกเฉยไม่นำเงินค่าใช้จ่ายมาวางศาลตามวรรคหนึ่งโดยไม่แจ้งให้ศาลทราบเหตุแห่งการเพิกเฉยเช่นว่านั้น ให้ศาลมีคำสั่งไม่อนุญาตให้มีการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดี"],"text":"เมื่อศาลมีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มและพ้นระยะเวลาตามมาตรา ๒๒๒/๑๕ (๖) แล้ว ก่อนที่ศาลจะอนุญาตให้มีการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดี ให้ศาลกำหนดวันตามที่เห็นสมควรแต่ต้องไม่น้อยกว่าสี่สิบห้าวันเพื่อให้สมาชิกกลุ่มคัดค้านหรือแจ้งความประสงค์ออกจากการเป็นสมาชิกกลุ่มโดยทำเป็นหนังสือยื่นต่อศาล และสั่งให้โจทก์นำเงินค่าใช้จ่ายมาวางศาล เพื่อแจ้งเรื่องการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดีให้สมาชิกกลุ่มทราบตามวิธีการเช่นเดียวกับที่กำหนดไว้ในมาตรา ๒๒๒/๑๕ วรรคหนึ่ง เมื่อศาลมีคำสั่งอนุญาตให้มีการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดีแล้ว ให้ถือว่าสมาชิกกลุ่มรายที่แจ้งความประสงค์ออกจากการเป็นสมาชิกกลุ่มและมิได้ขอถอนความประสงค์ดังกล่าวก่อนศาลมีคำสั่งอนุญาต ไม่เป็นสมาชิกกลุ่มนับแต่วันที่ศาลมีคำสั่งอนุญาต ในกรณีที่โจทก์เพิกเฉยไม่นำเงินค่าใช้จ่ายมาวางศาลตามวรรคหนึ่งโดยไม่แจ้งให้ศาลทราบเหตุแห่งการเพิกเฉยเช่นว่านั้น ให้ศาลมีคำสั่งไม่อนุญาตให้มีการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดี"},{"id":"๒๒๒_๓๐","num":"มาตรา ๒๒๒/๓๐","num_ara":"๒๒๒/๓๐","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["เมื่อศาลมีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มและพ้นระยะเวลาตามมาตรา ๒๒๒/๑๕ (๖) แล้ว ก่อนที่ศาลจะอนุญาตให้มีการเสนอข้อพิพาทให้อนุญาโตตุลาการเป็นผู้ชี้ขาด ตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยอนุญาโตตุลาการ ให้นำความในมาตรา ๒๒๒/๒๙ มาใช้บังคับโดยอนุโลม"],"text":"เมื่อศาลมีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มและพ้นระยะเวลาตามมาตรา ๒๒๒/๑๕ (๖) แล้ว ก่อนที่ศาลจะอนุญาตให้มีการเสนอข้อพิพาทให้อนุญาโตตุลาการเป็นผู้ชี้ขาด ตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยอนุญาโตตุลาการ ให้นำความในมาตรา ๒๒๒/๒๙ มาใช้บังคับโดยอนุโลม"},{"id":"๒๒๒_๓๑","num":"มาตรา ๒๒๒/๓๑","num_ara":"๒๒๒/๓๑","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["คำบอกกล่าวและประกาศตามมาตรา ๒๒๒/๒๘ มาตรา ๒๒๒/๒๙ และมาตรา ๒๒๒/๓๐ อย่างน้อยต้องมีรายการดังต่อไปนี้","(๑) ชื่อศาลและเลขคดี (๒) ชื่อและที่อยู่ของคู่ความ (๓) ข้อความโดยย่อของคำฟ้องและลักษณะของกลุ่มบุคคลที่ชัดเจน (๔) ข้อความโดยย่อของการดำเนินกระบวนพิจารณาที่ได้กระทำไปแล้วและเหตุที่ต้องมีคำบอกกล่าวและประกาศ (๕) สิทธิของสมาชิกกลุ่มและผลของคำสั่งอนุญาตของศาลตามมาตรา ๒๒๒/๒๘ มาตรา ๒๒๒/๒๙ หรือมาตรา ๒๒๒/๓๐ แล้วแต่กรณี (๖) ผลของการออกจากการเป็นสมาชิกกลุ่มตามมาตรา ๒๒๒/๒๙ หรือมาตรา ๒๒๒/๓๐ แล้วแต่กรณี (๗) ชื่อและตำแหน่งผู้พิพากษาผู้ออกคำบอกกล่าวและประกาศ"],"text":"คำบอกกล่าวและประกาศตามมาตรา ๒๒๒/๒๘ มาตรา ๒๒๒/๒๙ และมาตรา ๒๒๒/๓๐ อย่างน้อยต้องมีรายการดังต่อไปนี้\n\n(๑) ชื่อศาลและเลขคดี (๒) ชื่อและที่อยู่ของคู่ความ (๓) ข้อความโดยย่อของคำฟ้องและลักษณะของกลุ่มบุคคลที่ชัดเจน (๔) ข้อความโดยย่อของการดำเนินกระบวนพิจารณาที่ได้กระทำไปแล้วและเหตุที่ต้องมีคำบอกกล่าวและประกาศ (๕) สิทธิของสมาชิกกลุ่มและผลของคำสั่งอนุญาตของศาลตามมาตรา ๒๒๒/๒๘ มาตรา ๒๒๒/๒๙ หรือมาตรา ๒๒๒/๓๐ แล้วแต่กรณี (๖) ผลของการออกจากการเป็นสมาชิกกลุ่มตามมาตรา ๒๒๒/๒๙ หรือมาตรา ๒๒๒/๓๐ แล้วแต่กรณี (๗) ชื่อและตำแหน่งผู้พิพากษาผู้ออกคำบอกกล่าวและประกาศ"},{"id":"๒๒๒_๓๒","num":"มาตรา ๒๒๒/๓๒","num_ara":"๒๒๒/๓๒","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ในการพิจารณามีคำสั่งตามมาตรา ๒๒๒/๒๘ มาตรา ๒๒๒/๒๙ หรือมาตรา ๒๒๒/๓๐ ให้ศาลคำนึงถึง","(๑) ความจำเป็นในการดำเนินคดีแบบกลุ่มต่อไป (๒) ความคุ้มครองหรือประโยชน์ของสมาชิกกลุ่ม (๓) ความยุ่งยากหรือความสะดวกในการดำเนินคดีแบบกลุ่มต่อไป (๔) ความเป็นธรรมและความมีประสิทธิภาพในการดำเนินคดีแบบกลุ่มต่อไป (๕) จำนวนของสมาชิกกลุ่มที่คัดค้าน (๖) ความสามารถของจำเลยในการชดใช้ค่าเสียหายในกรณีมีการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดี (๗) การตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดีของคู่ความมีความเป็นธรรมและเป็นประโยชน์กับสมาชิกกลุ่ม"],"text":"ในการพิจารณามีคำสั่งตามมาตรา ๒๒๒/๒๘ มาตรา ๒๒๒/๒๙ หรือมาตรา ๒๒๒/๓๐ ให้ศาลคำนึงถึง\n\n(๑) ความจำเป็นในการดำเนินคดีแบบกลุ่มต่อไป (๒) ความคุ้มครองหรือประโยชน์ของสมาชิกกลุ่ม (๓) ความยุ่งยากหรือความสะดวกในการดำเนินคดีแบบกลุ่มต่อไป (๔) ความเป็นธรรมและความมีประสิทธิภาพในการดำเนินคดีแบบกลุ่มต่อไป (๕) จำนวนของสมาชิกกลุ่มที่คัดค้าน (๖) ความสามารถของจำเลยในการชดใช้ค่าเสียหายในกรณีมีการตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดี (๗) การตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดีของคู่ความมีความเป็นธรรมและเป็นประโยชน์กับสมาชิกกลุ่ม"},{"id":"๒๒๒_๓๓","num":"มาตรา ๒๒๒/๓๓","num_ara":"๒๒๒/๓๓","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ในกรณีที่ศาลมีคำสั่งถึงที่สุดอนุญาตให้ดำเนินคดีแบบกลุ่มให้อายุความในการฟ้องคดีของสมาชิกกลุ่มสะดุดหยุดลงนับแต่วันที่โจทก์ยื่นคำร้องขออนุญาตให้ดำเนินคดีแบบกลุ่ม ในกรณีที่ศาลมีคำสั่งถึงที่สุดไม่อนุญาตให้ดำเนินคดีแบบกลุ่ม หากปรากฏว่าอายุความการฟ้องคดีของสมาชิกกลุ่มครบกำหนดไปแล้วในระหว่างการพิจารณาคำร้องขออนุญาตให้ดำเนินคดีแบบกลุ่ม หรือจะครบกำหนดภายในกำหนดเวลาหกสิบวันนับแต่วันที่ศาลมีคำสั่งถึงที่สุด ให้สมาชิกกลุ่มมีสิทธิฟ้องคดีเพื่อตั้งหลักฐานสิทธิเรียกร้องหรือเพื่อให้ชำระหนี้ภายในหกสิบวันนับแต่วันที่ศาลมีคำสั่งถึงที่สุด"],"text":"ในกรณีที่ศาลมีคำสั่งถึงที่สุดอนุญาตให้ดำเนินคดีแบบกลุ่มให้อายุความในการฟ้องคดีของสมาชิกกลุ่มสะดุดหยุดลงนับแต่วันที่โจทก์ยื่นคำร้องขออนุญาตให้ดำเนินคดีแบบกลุ่ม ในกรณีที่ศาลมีคำสั่งถึงที่สุดไม่อนุญาตให้ดำเนินคดีแบบกลุ่ม หากปรากฏว่าอายุความการฟ้องคดีของสมาชิกกลุ่มครบกำหนดไปแล้วในระหว่างการพิจารณาคำร้องขออนุญาตให้ดำเนินคดีแบบกลุ่ม หรือจะครบกำหนดภายในกำหนดเวลาหกสิบวันนับแต่วันที่ศาลมีคำสั่งถึงที่สุด ให้สมาชิกกลุ่มมีสิทธิฟ้องคดีเพื่อตั้งหลักฐานสิทธิเรียกร้องหรือเพื่อให้ชำระหนี้ภายในหกสิบวันนับแต่วันที่ศาลมีคำสั่งถึงที่สุด"},{"id":"๒๒๒_๓๔","num":"มาตรา ๒๒๒/๓๔","num_ara":"๒๒๒/๓๔","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๓ การพิจารณาคดีแบบกลุ่ม","paragraphs":["ในกรณีที่อายุความสะดุดหยุดลงเพราะเหตุตามมาตรา ๒๒๒/๓๓ หากมีกรณีดังต่อไปนี้ ให้ถือว่าอายุความไม่เคยสะดุดหยุดลง","(๑) ศาลมีคำพิพากษาถึงที่สุดให้ยกฟ้อง (๒) ศาลมีคำสั่งยกเลิกการดำเนินคดีแบบกลุ่ม (๓) ศาลมีคำสั่งจำหน่ายคดีเพราะเหตุถอนฟ้อง (๔) ศาลยกคำฟ้องเพราะเหตุคดีไม่อยู่ในอำนาจศาลหรือโดยไม่ตัดสิทธิสมาชิกกลุ่มที่จะฟ้องคดีใหม่ (๕) สมาชิกกลุ่มออกจากการเป็นสมาชิกกลุ่มตามมาตรา ๒๒๒/๑๖ มาตรา ๒๒๒/๒๙ หรือมาตรา ๒๒๒/๓๐ ในกรณีตาม (๒) (๓) (๔) และ (๕) หากปรากฏว่าอายุความการฟ้องคดีของสมาชิกกลุ่มครบกำหนดไปแล้วในระหว่างการพิจารณา หรือจะครบกำหนดภายในกำหนดเวลาหกสิบวันนับแต่วันที่คำพิพากษาหรือคำสั่งนั้นถึงที่สุด ให้สมาชิกกลุ่มมีสิทธิฟ้องคดีเพื่อตั้งหลักฐานสิทธิเรียกร้องหรือเพื่อให้ชำระหนี้ภายในหกสิบวันนับแต่วันที่คำพิพากษาหรือคำสั่งถึงที่สุดหรือนับแต่วันที่สมาชิกกลุ่มไม่เป็นสมาชิกกลุ่ม แล้วแต่กรณี ความในวรรคสองให้ใช้บังคับในกรณีที่สมาชิกกลุ่มผู้ใดถูกปฏิเสธคำขอรับชำระหนี้โดยอ้างเหตุว่าไม่เป็นสมาชิกกลุ่มตามคำพิพากษา เนื่องจากศาลได้มีคำพิพากษาโดยกำหนดลักษณะเฉพาะของกลุ่มแตกต่างจากลักษณะเฉพาะของกลุ่มตามที่ศาลได้มีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มตามมาตรา ๒๒๒/๑๒ วรรคสอง โดยให้มีสิทธิฟ้องคดีนับแต่วันที่คำสั่งปฏิเสธคำขอรับชำระหนี้ถึงที่สุด"],"text":"ในกรณีที่อายุความสะดุดหยุดลงเพราะเหตุตามมาตรา ๒๒๒/๓๓ หากมีกรณีดังต่อไปนี้ ให้ถือว่าอายุความไม่เคยสะดุดหยุดลง\n\n(๑) ศาลมีคำพิพากษาถึงที่สุดให้ยกฟ้อง (๒) ศาลมีคำสั่งยกเลิกการดำเนินคดีแบบกลุ่ม (๓) ศาลมีคำสั่งจำหน่ายคดีเพราะเหตุถอนฟ้อง (๔) ศาลยกคำฟ้องเพราะเหตุคดีไม่อยู่ในอำนาจศาลหรือโดยไม่ตัดสิทธิสมาชิกกลุ่มที่จะฟ้องคดีใหม่ (๕) สมาชิกกลุ่มออกจากการเป็นสมาชิกกลุ่มตามมาตรา ๒๒๒/๑๖ มาตรา ๒๒๒/๒๙ หรือมาตรา ๒๒๒/๓๐ ในกรณีตาม (๒) (๓) (๔) และ (๕) หากปรากฏว่าอายุความการฟ้องคดีของสมาชิกกลุ่มครบกำหนดไปแล้วในระหว่างการพิจารณา หรือจะครบกำหนดภายในกำหนดเวลาหกสิบวันนับแต่วันที่คำพิพากษาหรือคำสั่งนั้นถึงที่สุด ให้สมาชิกกลุ่มมีสิทธิฟ้องคดีเพื่อตั้งหลักฐานสิทธิเรียกร้องหรือเพื่อให้ชำระหนี้ภายในหกสิบวันนับแต่วันที่คำพิพากษาหรือคำสั่งถึงที่สุดหรือนับแต่วันที่สมาชิกกลุ่มไม่เป็นสมาชิกกลุ่ม แล้วแต่กรณี ความในวรรคสองให้ใช้บังคับในกรณีที่สมาชิกกลุ่มผู้ใดถูกปฏิเสธคำขอรับชำระหนี้โดยอ้างเหตุว่าไม่เป็นสมาชิกกลุ่มตามคำพิพากษา เนื่องจากศาลได้มีคำพิพากษาโดยกำหนดลักษณะเฉพาะของกลุ่มแตกต่างจากลักษณะเฉพาะของกลุ่มตามที่ศาลได้มีคำสั่งอนุญาตให้ดำเนินคดีแบบกลุ่มตามมาตรา ๒๒๒/๑๒ วรรคสอง โดยให้มีสิทธิฟ้องคดีนับแต่วันที่คำสั่งปฏิเสธคำขอรับชำระหนี้ถึงที่สุด"},{"id":"๒๒๒_๓๕","num":"มาตรา ๒๒๒/๓๕","num_ara":"๒๒๒/๓๕","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๔ คำพิพากษาและการบังคับคดี","paragraphs":["คำพิพากษาของศาลมีผลเป็นการผูกพันคู่ความและสมาชิกกลุ่มและในกรณีที่ศาลมีคำพิพากษาให้โจทก์ชนะคดี ให้โจทก์หรือทนายความฝ่ายโจทก์มีอำนาจดำเนินการบังคับคดีแทนโจทก์และสมาชิกกลุ่ม สมาชิกกลุ่มมีสิทธิที่จะยื่นคำขอรับชำระหนี้ แต่ไม่มีสิทธิที่จะดำเนินการบังคับคดีตามส่วนนี้ด้วยตนเอง หากความปรากฏต่อศาลว่าทนายความฝ่ายโจทก์ไม่สามารถดำเนินการบังคับคดีเพื่อคุ้มครองประโยชน์ของสมาชิกกลุ่มได้อย่างเพียงพอและเป็นธรรม ศาลอาจมีคำสั่งให้โจทก์และสมาชิกกลุ่มจัดหาทนายความคนใหม่มาดำเนินการบังคับคดีต่อไปได้"],"text":"คำพิพากษาของศาลมีผลเป็นการผูกพันคู่ความและสมาชิกกลุ่มและในกรณีที่ศาลมีคำพิพากษาให้โจทก์ชนะคดี ให้โจทก์หรือทนายความฝ่ายโจทก์มีอำนาจดำเนินการบังคับคดีแทนโจทก์และสมาชิกกลุ่ม สมาชิกกลุ่มมีสิทธิที่จะยื่นคำขอรับชำระหนี้ แต่ไม่มีสิทธิที่จะดำเนินการบังคับคดีตามส่วนนี้ด้วยตนเอง หากความปรากฏต่อศาลว่าทนายความฝ่ายโจทก์ไม่สามารถดำเนินการบังคับคดีเพื่อคุ้มครองประโยชน์ของสมาชิกกลุ่มได้อย่างเพียงพอและเป็นธรรม ศาลอาจมีคำสั่งให้โจทก์และสมาชิกกลุ่มจัดหาทนายความคนใหม่มาดำเนินการบังคับคดีต่อไปได้"},{"id":"๒๒๒_๓๖","num":"มาตรา ๒๒๒/๓๖","num_ara":"๒๒๒/๓๖","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๔ คำพิพากษาและการบังคับคดี","paragraphs":["คำพิพากษาของศาลต้องกล่าวหรือแสดงรายการดังต่อไปนี้","(๑) รายการตามที่กำหนดไว้ในมาตรา ๑๔๑ (๒) ลักษณะโดยชัดเจนของกลุ่มบุคคลหรือกลุ่มย่อยที่จะต้องถูกผูกพันตามคำพิพากษา (๓) ในกรณีที่ศาลพิพากษาให้จำเลยชำระหนี้เป็นเงิน ต้องระบุจำนวนเงินที่จำเลยจะต้องชำระให้แก่โจทก์ รวมทั้งหลักเกณฑ์และวิธีการคำนวณในการชำระเงินให้สมาชิกกลุ่ม (๔) จำนวนเงินรางวัลของทนายความฝ่ายโจทก์ตามมาตรา ๒๒๒/๓๗"],"text":"คำพิพากษาของศาลต้องกล่าวหรือแสดงรายการดังต่อไปนี้\n\n(๑) รายการตามที่กำหนดไว้ในมาตรา ๑๔๑ (๒) ลักษณะโดยชัดเจนของกลุ่มบุคคลหรือกลุ่มย่อยที่จะต้องถูกผูกพันตามคำพิพากษา (๓) ในกรณีที่ศาลพิพากษาให้จำเลยชำระหนี้เป็นเงิน ต้องระบุจำนวนเงินที่จำเลยจะต้องชำระให้แก่โจทก์ รวมทั้งหลักเกณฑ์และวิธีการคำนวณในการชำระเงินให้สมาชิกกลุ่ม (๔) จำนวนเงินรางวัลของทนายความฝ่ายโจทก์ตามมาตรา ๒๒๒/๓๗"},{"id":"๒๒๒_๓๗","num":"มาตรา ๒๒๒/๓๗","num_ara":"๒๒๒/๓๗","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๔ คำพิพากษาและการบังคับคดี","paragraphs":["ในกรณีที่ศาลมีคำพิพากษาให้จำเลยกระทำการหรืองดเว้นกระทำการหรือส่งมอบทรัพย์สิน ให้ศาลกำหนดจำนวนเงินรางวัลที่จำเลยจะต้องชำระให้แก่ทนายความฝ่ายโจทก์ตามที่เห็นสมควร โดยคำนึงถึงความยากง่ายของคดีประกอบกับระยะเวลาและการทำงานของทนายความฝ่ายโจทก์ รวมทั้งค่าใช้จ่ายเกี่ยวกับการดำเนินคดีแบบกลุ่ม ซึ่งมิใช่ค่าฤชาธรรมเนียมที่ทนายความฝ่ายโจทก์ได้เสียไป และเพื่อประโยชน์แห่งการนี้ เมื่อการพิจารณาสิ้นสุดลงให้ทนายความฝ่ายโจทก์ยื่นบัญชีค่าใช้จ่ายดังกล่าวต่อศาลโดยให้ส่งสำเนาแก่จำเลยด้วย ถ้าคำพิพากษากำหนดให้จำเลยใช้เงิน นอกจากศาลต้องคำนึงถึงหลักเกณฑ์ตามวรรคหนึ่งแล้ว ให้ศาลคำนึงถึงจำนวนเงินที่โจทก์และสมาชิกกลุ่มมีสิทธิได้รับประกอบด้วย โดยกำหนดเป็นจำนวนร้อยละของจำนวนเงินดังกล่าว แต่จำนวนเงินรางวัลของทนายความฝ่ายโจทก์ดังกล่าวต้องไม่เกินร้อยละสามสิบของจำนวนเงินนั้น ถ้าคำพิพากษากำหนดให้จำเลยกระทำการหรืองดเว้นกระทำการหรือส่งมอบทรัพย์สินและให้ใช้เงินรวมอยู่ด้วย ให้นำความในวรรคหนึ่งและวรรคสองมาใช้บังคับโดยอนุโลม ในการกำหนดจำนวนเงินรางวัลของทนายความฝ่ายโจทก์ตามมาตรานี้ หากมีการเปลี่ยนทนายความฝ่ายโจทก์ ให้ศาลกำหนดจำนวนเงินรางวัลของทนายความฝ่ายโจทก์ตามสัดส่วนของการทำงานและค่าใช้จ่ายที่ทนายความแต่ละคนเสียไป ให้ถือว่าทนายความฝ่ายโจทก์เป็นเจ้าหนี้ตามคำพิพากษาและจำเลยเป็นลูกหนี้ตามคำพิพากษาในส่วนของเงินรางวัลของทนายความฝ่ายโจทก์ด้วย และเงินรางวัลดังกล่าวมิใช่ค่าฤชาธรรมเนียม"],"text":"ในกรณีที่ศาลมีคำพิพากษาให้จำเลยกระทำการหรืองดเว้นกระทำการหรือส่งมอบทรัพย์สิน ให้ศาลกำหนดจำนวนเงินรางวัลที่จำเลยจะต้องชำระให้แก่ทนายความฝ่ายโจทก์ตามที่เห็นสมควร โดยคำนึงถึงความยากง่ายของคดีประกอบกับระยะเวลาและการทำงานของทนายความฝ่ายโจทก์ รวมทั้งค่าใช้จ่ายเกี่ยวกับการดำเนินคดีแบบกลุ่ม ซึ่งมิใช่ค่าฤชาธรรมเนียมที่ทนายความฝ่ายโจทก์ได้เสียไป และเพื่อประโยชน์แห่งการนี้ เมื่อการพิจารณาสิ้นสุดลงให้ทนายความฝ่ายโจทก์ยื่นบัญชีค่าใช้จ่ายดังกล่าวต่อศาลโดยให้ส่งสำเนาแก่จำเลยด้วย ถ้าคำพิพากษากำหนดให้จำเลยใช้เงิน นอกจากศาลต้องคำนึงถึงหลักเกณฑ์ตามวรรคหนึ่งแล้ว ให้ศาลคำนึงถึงจำนวนเงินที่โจทก์และสมาชิกกลุ่มมีสิทธิได้รับประกอบด้วย โดยกำหนดเป็นจำนวนร้อยละของจำนวนเงินดังกล่าว แต่จำนวนเงินรางวัลของทนายความฝ่ายโจทก์ดังกล่าวต้องไม่เกินร้อยละสามสิบของจำนวนเงินนั้น ถ้าคำพิพากษากำหนดให้จำเลยกระทำการหรืองดเว้นกระทำการหรือส่งมอบทรัพย์สินและให้ใช้เงินรวมอยู่ด้วย ให้นำความในวรรคหนึ่งและวรรคสองมาใช้บังคับโดยอนุโลม ในการกำหนดจำนวนเงินรางวัลของทนายความฝ่ายโจทก์ตามมาตรานี้ หากมีการเปลี่ยนทนายความฝ่ายโจทก์ ให้ศาลกำหนดจำนวนเงินรางวัลของทนายความฝ่ายโจทก์ตามสัดส่วนของการทำงานและค่าใช้จ่ายที่ทนายความแต่ละคนเสียไป ให้ถือว่าทนายความฝ่ายโจทก์เป็นเจ้าหนี้ตามคำพิพากษาและจำเลยเป็นลูกหนี้ตามคำพิพากษาในส่วนของเงินรางวัลของทนายความฝ่ายโจทก์ด้วย และเงินรางวัลดังกล่าวมิใช่ค่าฤชาธรรมเนียม"},{"id":"๒๒๒_๓๘","num":"มาตรา ๒๒๒/๓๘","num_ara":"๒๒๒/๓๘","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๔ คำพิพากษาและการบังคับคดี","paragraphs":["ในกรณีที่ศาลมีคำพิพากษาให้โจทก์ชนะคดี ให้ศาลมีอำนาจกำหนดหลักเกณฑ์ วิธีการ และเงื่อนไขในการปฏิบัติตามคำพิพากษา โดยจะกำหนดไว้ในคำพิพากษาหรือโดยคำสั่งในภายหลังก็ได้ และในระหว่างการบังคับคดีให้ศาลมีอำนาจออกคำบังคับเพิ่มเติมเพื่อให้เป็นไปตามคำพิพากษาได้ตามที่เห็นสมควร ให้ศาลชั้นต้นมีอำนาจพิจารณาสั่งคำร้องขอทุเลาการบังคับตามคำพิพากษาคำสั่งของศาลชั้นต้นให้เป็นที่สุด"],"text":"ในกรณีที่ศาลมีคำพิพากษาให้โจทก์ชนะคดี ให้ศาลมีอำนาจกำหนดหลักเกณฑ์ วิธีการ และเงื่อนไขในการปฏิบัติตามคำพิพากษา โดยจะกำหนดไว้ในคำพิพากษาหรือโดยคำสั่งในภายหลังก็ได้ และในระหว่างการบังคับคดีให้ศาลมีอำนาจออกคำบังคับเพิ่มเติมเพื่อให้เป็นไปตามคำพิพากษาได้ตามที่เห็นสมควร ให้ศาลชั้นต้นมีอำนาจพิจารณาสั่งคำร้องขอทุเลาการบังคับตามคำพิพากษาคำสั่งของศาลชั้นต้นให้เป็นที่สุด"},{"id":"๒๒๒_๓๙","num":"มาตรา ๒๒๒/๓๙","num_ara":"๒๒๒/๓๙","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๔ คำพิพากษาและการบังคับคดี","paragraphs":["ให้ศาลแจ้งคำพิพากษาให้สมาชิกกลุ่มทราบตามวิธีการเช่นเดียวกับที่กำหนดไว้ในมาตรา ๒๒๒/๑๕ วรรคหนึ่ง และให้แจ้งอธิบดีกรมบังคับคดีทราบด้วย ในกรณีที่ศาลมีคำพิพากษาให้จำเลยชำระหนี้เป็นเงินหรือชำระหนี้เป็นเงินรวมอยู่ด้วย ให้ศาลตั้งเจ้าพนักงานบังคับคดีเพื่อดำเนินการต่อไป รวมทั้งกำหนดวันตามที่เห็นสมควรในคำบอกกล่าวและประกาศตามวรรคหนึ่ง เพื่อให้สมาชิกกลุ่มยื่นคำขอรับชำระหนี้ต่อเจ้าพนักงานบังคับคดี แต่ถ้าเป็นกรณีที่ศาลมีคำพิพากษาให้จำเลยชำระหนี้อย่างอื่นและจำเป็นจะต้องมีการดำเนินการอย่างหนึ่งอย่างใดเพื่อประโยชน์แก่การบังคับตามคำพิพากษา โจทก์อาจยื่นคำขอต่อศาลเพื่อตั้งเจ้าพนักงานบังคับคดีดำเนินการได้ เมื่อพ้นกำหนดระยะเวลาตามวรรคสอง สมาชิกกลุ่มที่ไม่ได้ยื่นคำขอรับชำระหนี้ไม่มีสิทธิขอเฉลี่ยทรัพย์สินหรือเงินในการบังคับคดีตามส่วนนี้ เว้นแต่ในกรณีที่มีเหตุสุดวิสัย สมาชิกกลุ่มที่ไม่ได้ยื่นคำขอรับชำระหนี้ภายในกำหนดระยะเวลา อาจยื่นคำขอรับชำระหนี้ต่อเจ้าพนักงานบังคับคดีได้ภายในสามสิบวันนับแต่วันพ้นกำหนดระยะเวลา"],"text":"ให้ศาลแจ้งคำพิพากษาให้สมาชิกกลุ่มทราบตามวิธีการเช่นเดียวกับที่กำหนดไว้ในมาตรา ๒๒๒/๑๕ วรรคหนึ่ง และให้แจ้งอธิบดีกรมบังคับคดีทราบด้วย ในกรณีที่ศาลมีคำพิพากษาให้จำเลยชำระหนี้เป็นเงินหรือชำระหนี้เป็นเงินรวมอยู่ด้วย ให้ศาลตั้งเจ้าพนักงานบังคับคดีเพื่อดำเนินการต่อไป รวมทั้งกำหนดวันตามที่เห็นสมควรในคำบอกกล่าวและประกาศตามวรรคหนึ่ง เพื่อให้สมาชิกกลุ่มยื่นคำขอรับชำระหนี้ต่อเจ้าพนักงานบังคับคดี แต่ถ้าเป็นกรณีที่ศาลมีคำพิพากษาให้จำเลยชำระหนี้อย่างอื่นและจำเป็นจะต้องมีการดำเนินการอย่างหนึ่งอย่างใดเพื่อประโยชน์แก่การบังคับตามคำพิพากษา โจทก์อาจยื่นคำขอต่อศาลเพื่อตั้งเจ้าพนักงานบังคับคดีดำเนินการได้ เมื่อพ้นกำหนดระยะเวลาตามวรรคสอง สมาชิกกลุ่มที่ไม่ได้ยื่นคำขอรับชำระหนี้ไม่มีสิทธิขอเฉลี่ยทรัพย์สินหรือเงินในการบังคับคดีตามส่วนนี้ เว้นแต่ในกรณีที่มีเหตุสุดวิสัย สมาชิกกลุ่มที่ไม่ได้ยื่นคำขอรับชำระหนี้ภายในกำหนดระยะเวลา อาจยื่นคำขอรับชำระหนี้ต่อเจ้าพนักงานบังคับคดีได้ภายในสามสิบวันนับแต่วันพ้นกำหนดระยะเวลา"},{"id":"๒๒๒_๔๐","num":"มาตรา ๒๒๒/๔๐","num_ara":"๒๒๒/๔๐","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๔ คำพิพากษาและการบังคับคดี","paragraphs":["คู่ความในคดีและสมาชิกกลุ่มรายอื่นอาจขอตรวจและโต้แย้งคำขอรับชำระหนี้ของสมาชิกกลุ่มผู้ยื่นคำขอรับชำระหนี้ได้ แต่ต้องกระทำภายในกำหนดสามสิบวันนับแต่วันที่พ้นกำหนดเวลายื่นคำขอรับชำระหนี้ เว้นแต่ในกรณีที่มีเหตุสุดวิสัย อาจขอขยายระยะเวลาออกไปอีกได้ไม่เกินสามสิบวัน"],"text":"คู่ความในคดีและสมาชิกกลุ่มรายอื่นอาจขอตรวจและโต้แย้งคำขอรับชำระหนี้ของสมาชิกกลุ่มผู้ยื่นคำขอรับชำระหนี้ได้ แต่ต้องกระทำภายในกำหนดสามสิบวันนับแต่วันที่พ้นกำหนดเวลายื่นคำขอรับชำระหนี้ เว้นแต่ในกรณีที่มีเหตุสุดวิสัย อาจขอขยายระยะเวลาออกไปอีกได้ไม่เกินสามสิบวัน"},{"id":"๒๒๒_๔๑","num":"มาตรา ๒๒๒/๔๑","num_ara":"๒๒๒/๔๑","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๔ คำพิพากษาและการบังคับคดี","paragraphs":["ให้เจ้าพนักงานบังคับคดีมีอำนาจเรียกคู่ความในคดี สมาชิกกลุ่ม ผู้มีส่วนได้เสียในการบังคับคดี หรือบุคคลที่เกี่ยวข้อง มาสอบสวนในเรื่องคำขอรับชำระหนี้ของสมาชิกกลุ่มเพื่อพิจารณามีคำสั่งต่อไปได้"],"text":"ให้เจ้าพนักงานบังคับคดีมีอำนาจเรียกคู่ความในคดี สมาชิกกลุ่ม ผู้มีส่วนได้เสียในการบังคับคดี หรือบุคคลที่เกี่ยวข้อง มาสอบสวนในเรื่องคำขอรับชำระหนี้ของสมาชิกกลุ่มเพื่อพิจารณามีคำสั่งต่อไปได้"},{"id":"๒๒๒_๔๒","num":"มาตรา ๒๒๒/๔๒","num_ara":"๒๒๒/๔๒","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๔ คำพิพากษาและการบังคับคดี","paragraphs":["คำขอรับชำระหนี้ของสมาชิกกลุ่มรายใด ถ้าคู่ความในคดีและสมาชิกกลุ่มรายอื่นไม่โต้แย้ง ให้เจ้าพนักงานบังคับคดีมีอำนาจสั่งอนุญาตให้รับชำระหนี้ได้ เว้นแต่มีเหตุอันสมควรสั่งเป็นอย่างอื่น โดยให้เจ้าพนักงานบังคับคดีแจ้งให้ศาลทราบถึงการดำเนินการดังกล่าวด้วย คำขอรับชำระหนี้ของสมาชิกกลุ่มรายใด ถ้ามีผู้โต้แย้ง ให้เจ้าพนักงานบังคับคดีมีคำสั่งอย่างหนึ่งอย่างใด ดังต่อไปนี้","(๑) ให้ยกคำขอรับชำระหนี้ (๒) อนุญาตให้ได้รับชำระหนี้เต็มจำนวน (๓) อนุญาตให้ได้รับชำระหนี้บางส่วน สมาชิกกลุ่มที่ยื่นคำขอรับชำระหนี้และไม่มีผู้โต้แย้งตามวรรคหนึ่ง สมาชิกกลุ่มที่ยื่นคำขอรับชำระหนี้ และมีผู้โต้แย้งตามวรรคสอง หรือผู้โต้แย้ง อาจยื่นคำร้องคัดค้านคำสั่งของเจ้าพนักงานบังคับคดีต่อศาลได้ ภายในกำหนดสิบห้าวันนับแต่วันที่ทราบคำสั่งของเจ้าพนักงานบังคับคดี คำสั่งของศาลตามวรรคสามให้อุทธรณ์และฎีกาได้ภายใต้บทบัญญัติในภาค ๓ อุทธรณ์และฎีกา"],"text":"คำขอรับชำระหนี้ของสมาชิกกลุ่มรายใด ถ้าคู่ความในคดีและสมาชิกกลุ่มรายอื่นไม่โต้แย้ง ให้เจ้าพนักงานบังคับคดีมีอำนาจสั่งอนุญาตให้รับชำระหนี้ได้ เว้นแต่มีเหตุอันสมควรสั่งเป็นอย่างอื่น โดยให้เจ้าพนักงานบังคับคดีแจ้งให้ศาลทราบถึงการดำเนินการดังกล่าวด้วย คำขอรับชำระหนี้ของสมาชิกกลุ่มรายใด ถ้ามีผู้โต้แย้ง ให้เจ้าพนักงานบังคับคดีมีคำสั่งอย่างหนึ่งอย่างใด ดังต่อไปนี้\n\n(๑) ให้ยกคำขอรับชำระหนี้ (๒) อนุญาตให้ได้รับชำระหนี้เต็มจำนวน (๓) อนุญาตให้ได้รับชำระหนี้บางส่วน สมาชิกกลุ่มที่ยื่นคำขอรับชำระหนี้และไม่มีผู้โต้แย้งตามวรรคหนึ่ง สมาชิกกลุ่มที่ยื่นคำขอรับชำระหนี้ และมีผู้โต้แย้งตามวรรคสอง หรือผู้โต้แย้ง อาจยื่นคำร้องคัดค้านคำสั่งของเจ้าพนักงานบังคับคดีต่อศาลได้ ภายในกำหนดสิบห้าวันนับแต่วันที่ทราบคำสั่งของเจ้าพนักงานบังคับคดี คำสั่งของศาลตามวรรคสามให้อุทธรณ์และฎีกาได้ภายใต้บทบัญญัติในภาค ๓ อุทธรณ์และฎีกา"},{"id":"๒๒๒_๔๓","num":"มาตรา ๒๒๒/๔๓","num_ara":"๒๒๒/๔๓","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๔ คำพิพากษาและการบังคับคดี","paragraphs":["เมื่อเจ้าพนักงานบังคับคดีได้ยึดหรืออายัดทรัพย์สินอย่างใดของลูกหนี้ตามคำพิพากษาในคดีอื่นไว้แทนเจ้าหนี้ตามคำพิพากษาแล้ว ให้ทนายความฝ่ายโจทก์ในคดีแบบกลุ่มมีอำนาจยื่นคำขอโดยทำเป็นคำร้องต่อศาลที่ออกหมายบังคับคดีให้ยึดหรืออายัดทรัพย์สินนั้น เพื่อให้ศาลมีคำสั่งให้เฉลี่ยทรัพย์แก่ทนายความฝ่ายโจทก์ โจทก์ และสมาชิกกลุ่มตามมาตรา ๓๒๖ ตามจำนวนที่มีสิทธิได้รับ ในกรณีที่จำนวนเงินที่สมาชิกกลุ่มได้ยื่นคำขอรับชำระหนี้ตามมาตรา ๒๒๒/๔๒ ยังไม่เป็นที่ยุติ ให้ศาลที่ได้รับคำร้องขอเฉลี่ยทรัพย์ตามวรรคหนึ่งรอการมีคำสั่งให้เฉลี่ยทรัพย์ไว้ก่อน และเมื่อได้ข้อยุติในจำนวนเงินดังกล่าวแล้ว ให้ทนายความฝ่ายโจทก์แจ้งให้ศาลนั้นทราบ เมื่อศาลได้มีคำสั่งให้เฉลี่ยทรัพย์แล้ว ให้เจ้าพนักงานบังคับคดีในคดีนั้นส่งเงินให้เจ้าพนักงานบังคับคดีในคดีแบบกลุ่มเพื่อจ่ายให้แก่ผู้มีสิทธิตามมาตรา ๒๒๒/๔๔"],"text":"เมื่อเจ้าพนักงานบังคับคดีได้ยึดหรืออายัดทรัพย์สินอย่างใดของลูกหนี้ตามคำพิพากษาในคดีอื่นไว้แทนเจ้าหนี้ตามคำพิพากษาแล้ว ให้ทนายความฝ่ายโจทก์ในคดีแบบกลุ่มมีอำนาจยื่นคำขอโดยทำเป็นคำร้องต่อศาลที่ออกหมายบังคับคดีให้ยึดหรืออายัดทรัพย์สินนั้น เพื่อให้ศาลมีคำสั่งให้เฉลี่ยทรัพย์แก่ทนายความฝ่ายโจทก์ โจทก์ และสมาชิกกลุ่มตามมาตรา ๓๒๖ ตามจำนวนที่มีสิทธิได้รับ ในกรณีที่จำนวนเงินที่สมาชิกกลุ่มได้ยื่นคำขอรับชำระหนี้ตามมาตรา ๒๒๒/๔๒ ยังไม่เป็นที่ยุติ ให้ศาลที่ได้รับคำร้องขอเฉลี่ยทรัพย์ตามวรรคหนึ่งรอการมีคำสั่งให้เฉลี่ยทรัพย์ไว้ก่อน และเมื่อได้ข้อยุติในจำนวนเงินดังกล่าวแล้ว ให้ทนายความฝ่ายโจทก์แจ้งให้ศาลนั้นทราบ เมื่อศาลได้มีคำสั่งให้เฉลี่ยทรัพย์แล้ว ให้เจ้าพนักงานบังคับคดีในคดีนั้นส่งเงินให้เจ้าพนักงานบังคับคดีในคดีแบบกลุ่มเพื่อจ่ายให้แก่ผู้มีสิทธิตามมาตรา ๒๒๒/๔๔"},{"id":"๒๒๒_๔๔","num":"มาตรา ๒๒๒/๔๔","num_ara":"๒๒๒/๔๔","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๔ คำพิพากษาและการบังคับคดี","paragraphs":["เมื่อจำเลยนำเงินหรือทรัพย์สินมาวางต่อเจ้าพนักงานบังคับคดีหรือเมื่อได้ขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินของจำเลย หรือเมื่อเจ้าพนักงานบังคับคดีได้รวบรวมทรัพย์สินอื่นใดของจำเลยเสร็จ และได้หักค่าฤชาธรรมเนียมในการบังคับคดีแล้ว ให้เจ้าพนักงานบังคับคดีจ่ายเงินให้แก่ผู้มีสิทธิตามลำดับดังนี้","(๑) ผู้มีสิทธิได้รับชำระหนี้ก่อนตามมาตรา ๓๒๒ และมาตรา ๓๒๔ (๒) เงินรางวัลของทนายความฝ่ายโจทก์ตามมาตรา ๒๒๒/๓๗ (๓) ค่าฤชาธรรมเนียมใช้แทนโจทก์ (๔) โจทก์ สมาชิกกลุ่ม และเจ้าหนี้อื่นที่มีสิทธิได้รับเฉลี่ยทรัพย์ตามมาตรา ๓๒๖"],"text":"เมื่อจำเลยนำเงินหรือทรัพย์สินมาวางต่อเจ้าพนักงานบังคับคดีหรือเมื่อได้ขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินของจำเลย หรือเมื่อเจ้าพนักงานบังคับคดีได้รวบรวมทรัพย์สินอื่นใดของจำเลยเสร็จ และได้หักค่าฤชาธรรมเนียมในการบังคับคดีแล้ว ให้เจ้าพนักงานบังคับคดีจ่ายเงินให้แก่ผู้มีสิทธิตามลำดับดังนี้\n\n(๑) ผู้มีสิทธิได้รับชำระหนี้ก่อนตามมาตรา ๓๒๒ และมาตรา ๓๒๔ (๒) เงินรางวัลของทนายความฝ่ายโจทก์ตามมาตรา ๒๒๒/๓๗ (๓) ค่าฤชาธรรมเนียมใช้แทนโจทก์ (๔) โจทก์ สมาชิกกลุ่ม และเจ้าหนี้อื่นที่มีสิทธิได้รับเฉลี่ยทรัพย์ตามมาตรา ๓๒๖"},{"id":"๒๒๒_๔๕","num":"มาตรา ๒๒๒/๔๕","num_ara":"๒๒๒/๔๕","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๕ อุทธรณ์และฎีกา","paragraphs":["ให้คู่ความมีสิทธิอุทธรณ์และฎีกาคำพิพากษาหรือคำสั่งของศาล โดยไม่นำข้อจำกัดสิทธิเรื่องทุนทรัพย์ของการอุทธรณ์และฎีกาในข้อเท็จจริงมาใช้บังคับ"],"text":"ให้คู่ความมีสิทธิอุทธรณ์และฎีกาคำพิพากษาหรือคำสั่งของศาล โดยไม่นำข้อจำกัดสิทธิเรื่องทุนทรัพย์ของการอุทธรณ์และฎีกาในข้อเท็จจริงมาใช้บังคับ"},{"id":"๒๒๒_๔๖","num":"มาตรา ๒๒๒/๔๖","num_ara":"๒๒๒/๔๖","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๕ อุทธรณ์และฎีกา","paragraphs":["สมาชิกกลุ่มไม่มีสิทธิอุทธรณ์และฎีกาคำพิพากษาหรือคำสั่งของศาล ยกเว้นในกรณีตามมาตรา ๒๒๒/๔๒"],"text":"สมาชิกกลุ่มไม่มีสิทธิอุทธรณ์และฎีกาคำพิพากษาหรือคำสั่งของศาล ยกเว้นในกรณีตามมาตรา ๒๒๒/๔๒"},{"id":"๒๒๒_๔๗","num":"มาตรา ๒๒๒/๔๗","num_ara":"๒๒๒/๔๗","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๕ อุทธรณ์และฎีกา","paragraphs":["ในกรณีที่จำเลยยื่นคำร้องอุทธรณ์คำสั่งไม่รับอุทธรณ์หรือฎีกา ให้จำเลยนำค่าฤชาธรรมเนียมทั้งปวงมาวางศาลและนำเงินมาชำระตามคำพิพากษาหรือหาประกันให้ไว้ต่อศาลเฉพาะในส่วนที่จำเลยต้องรับผิดชำระหนี้ให้แก่โจทก์ แต่ไม่ต้องนำเงินมาชำระหรือหาประกันให้ไว้ต่อศาลสำหรับเงินรางวัลของทนายความฝ่ายโจทก์"],"text":"ในกรณีที่จำเลยยื่นคำร้องอุทธรณ์คำสั่งไม่รับอุทธรณ์หรือฎีกา ให้จำเลยนำค่าฤชาธรรมเนียมทั้งปวงมาวางศาลและนำเงินมาชำระตามคำพิพากษาหรือหาประกันให้ไว้ต่อศาลเฉพาะในส่วนที่จำเลยต้องรับผิดชำระหนี้ให้แก่โจทก์ แต่ไม่ต้องนำเงินมาชำระหรือหาประกันให้ไว้ต่อศาลสำหรับเงินรางวัลของทนายความฝ่ายโจทก์"},{"id":"๒๒๒_๔๘","num":"มาตรา ๒๒๒/๔๘","num_ara":"๒๒๒/๔๘","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๕ อุทธรณ์และฎีกา","paragraphs":["คดีที่ศาลชั้นต้นมีคำสั่งรับอุทธรณ์หรือฎีกาส่งมาให้ศาลอุทธรณ์หรือศาลฎีกา หากศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี พิจารณาเห็นว่าอุทธรณ์หรือฎีกานั้นต้องห้ามอุทธรณ์หรือห้ามฎีกา ให้ยกอุทธรณ์หรือฎีกา โดยไม่จำต้องวินิจฉัยประเด็นที่อุทธรณ์หรือฎีกา แต่ถ้าศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี พิจารณาเห็นสมควรเพื่อประโยชน์แห่งความยุติธรรมจำเป็นต้องแก้ไขข้อผิดพลาดจะรับพิจารณาพิพากษาคดีที่ต้องห้ามอุทธรณ์หรือห้ามฎีกาดังกล่าวนั้นก็ได้"],"text":"คดีที่ศาลชั้นต้นมีคำสั่งรับอุทธรณ์หรือฎีกาส่งมาให้ศาลอุทธรณ์หรือศาลฎีกา หากศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี พิจารณาเห็นว่าอุทธรณ์หรือฎีกานั้นต้องห้ามอุทธรณ์หรือห้ามฎีกา ให้ยกอุทธรณ์หรือฎีกา โดยไม่จำต้องวินิจฉัยประเด็นที่อุทธรณ์หรือฎีกา แต่ถ้าศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี พิจารณาเห็นสมควรเพื่อประโยชน์แห่งความยุติธรรมจำเป็นต้องแก้ไขข้อผิดพลาดจะรับพิจารณาพิพากษาคดีที่ต้องห้ามอุทธรณ์หรือห้ามฎีกาดังกล่าวนั้นก็ได้"},{"id":"๒๒๒_๔๙","num":"มาตรา ๒๒๒/๔๙","num_ara":"๒๒๒/๔๙","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๔ การดำเนินคดีแบบกลุ่ม","subsection":"ส่วนที่ ๖ ค่าธรรมเนียม","paragraphs":["ให้คิดค่าธรรมเนียมตามอัตราดังต่อไปนี้","(๑) ค่ายื่นคำขอรับชำระหนี้สองร้อยบาท แต่การขอรับชำระหนี้ที่ไม่เกินสองหมื่นบาทไม่ต้องเสียค่าธรรมเนียม (๒) ค่าคัดค้านคำสั่งของเจ้าพนักงานบังคับคดีต่อศาลในเรื่องการขอรับชำระหนี้เรื่องละสองร้อยบาท (๓) ค่าขึ้นศาลในกรณีที่มีการอุทธรณ์เรื่องการขอรับชำระหนี้ หรือการอุทธรณ์เรื่องเงินรางวัลของทนายความ เรื่องละสองร้อยบาท (๔) ค่าธรรมเนียมอื่นนอกจาก (๑) (๒) และ (๓) ให้คิดอัตราเดียวกับค่าธรรมเนียมตามตารางท้ายประมวลกฎหมายนี้"],"text":"ให้คิดค่าธรรมเนียมตามอัตราดังต่อไปนี้\n\n(๑) ค่ายื่นคำขอรับชำระหนี้สองร้อยบาท แต่การขอรับชำระหนี้ที่ไม่เกินสองหมื่นบาทไม่ต้องเสียค่าธรรมเนียม (๒) ค่าคัดค้านคำสั่งของเจ้าพนักงานบังคับคดีต่อศาลในเรื่องการขอรับชำระหนี้เรื่องละสองร้อยบาท (๓) ค่าขึ้นศาลในกรณีที่มีการอุทธรณ์เรื่องการขอรับชำระหนี้ หรือการอุทธรณ์เรื่องเงินรางวัลของทนายความ เรื่องละสองร้อยบาท (๔) ค่าธรรมเนียมอื่นนอกจาก (๑) (๒) และ (๓) ให้คิดอัตราเดียวกับค่าธรรมเนียมตามตารางท้ายประมวลกฎหมายนี้"},{"id":"๒๒๓","num":"มาตรา ๒๒๓","num_ara":"๒๒๓","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ภายใต้บังคับบทบัญญัติมาตรา ๑๓๘, ๑๖๘, ๑๘๘ และ ๒๒๒ และในลักษณะนี้ คำพิพากษาหรือคำสั่งของศาลชั้นต้นนั้น ให้ยื่นอุทธรณ์ต่อศาลอุทธรณ์ เว้นแต่คำพิพากษาหรือคำสั่งนั้นประมวลกฎหมายนี้หรือกฎหมายอื่นจะได้บัญญัติว่าให้เป็นที่สุด"],"text":"ภายใต้บังคับบทบัญญัติมาตรา ๑๓๘, ๑๖๘, ๑๘๘ และ ๒๒๒ และในลักษณะนี้ คำพิพากษาหรือคำสั่งของศาลชั้นต้นนั้น ให้ยื่นอุทธรณ์ต่อศาลอุทธรณ์ เว้นแต่คำพิพากษาหรือคำสั่งนั้นประมวลกฎหมายนี้หรือกฎหมายอื่นจะได้บัญญัติว่าให้เป็นที่สุด"},{"id":"๒๒๓_ทวิ","num":"มาตรา ๒๒๓ ทวิ","num_ara":"๒๒๓ ทวิ","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["(ยกเลิก)"],"text":"(ยกเลิก)"},{"id":"๒๒๔","num":"มาตรา ๒๒๔","num_ara":"๒๒๔","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ในคดีที่ราคาทรัพย์สินหรือจำนวนทุนทรัพย์ที่พิพาทกันในชั้นอุทธรณ์ไม่เกินห้าหมื่นบาทหรือไม่เกินจำนวนที่กำหนดในพระราชกฤษฎีกา ห้ามมิให้คู่ความอุทธรณ์ในข้อเท็จจริง เว้นแต่ผู้พิพากษาที่นั่งพิจารณาคดีนั้นในศาลชั้นต้นได้ทำความเห็นแย้งไว้หรือได้รับรองว่ามีเหตุอันควรอุทธรณ์ได้ หรือถ้าไม่มีความเห็นแย้งหรือคำรับรองเช่นว่านี้ต้องได้รับอนุญาตให้อุทธรณ์เป็นหนังสือจากอธิบดีผู้พิพากษาศาลชั้นต้นหรืออธิบดีผู้พิพากษาภาคผู้มีอำนาจ แล้วแต่กรณี บทบัญญัติในวรรคหนึ่งมิให้ใช้บังคับในคดีเกี่ยวด้วยสิทธิแห่งสภาพบุคคลหรือสิทธิในครอบครัวและคดีฟ้องขอให้ปลดเปลื้องทุกข์อันไม่อาจคำนวณเป็นราคาเงินได้ เว้นแต่ในคดีฟ้องขับไล่บุคคลใด ๆ ออกจากอสังหาริมทรัพย์อันมีค่าเช่าหรืออาจให้เช่าได้ในขณะยื่นคำฟ้องไม่เกินเดือนละสี่พันบาทหรือไม่เกินจำนวนที่กำหนดในพระราชกฤษฎีกา การขอให้ผู้พิพากษาที่นั่งพิจารณาคดีในศาลชั้นต้นรับรองว่ามีเหตุอันควรอุทธรณ์ได้ ให้ผู้อุทธรณ์ยื่นคำร้องถึงผู้พิพากษานั้น พร้อมกับคำฟ้องอุทธรณ์ต่อศาลชั้นต้น เมื่อศาลได้รับคำร้องเช่นว่านั้น ให้ศาลส่งคำร้องพร้อมด้วยสำนวนความไปยังผู้พิพากษาดังกล่าวเพื่อพิจารณารับรอง"],"text":"ในคดีที่ราคาทรัพย์สินหรือจำนวนทุนทรัพย์ที่พิพาทกันในชั้นอุทธรณ์ไม่เกินห้าหมื่นบาทหรือไม่เกินจำนวนที่กำหนดในพระราชกฤษฎีกา ห้ามมิให้คู่ความอุทธรณ์ในข้อเท็จจริง เว้นแต่ผู้พิพากษาที่นั่งพิจารณาคดีนั้นในศาลชั้นต้นได้ทำความเห็นแย้งไว้หรือได้รับรองว่ามีเหตุอันควรอุทธรณ์ได้ หรือถ้าไม่มีความเห็นแย้งหรือคำรับรองเช่นว่านี้ต้องได้รับอนุญาตให้อุทธรณ์เป็นหนังสือจากอธิบดีผู้พิพากษาศาลชั้นต้นหรืออธิบดีผู้พิพากษาภาคผู้มีอำนาจ แล้วแต่กรณี บทบัญญัติในวรรคหนึ่งมิให้ใช้บังคับในคดีเกี่ยวด้วยสิทธิแห่งสภาพบุคคลหรือสิทธิในครอบครัวและคดีฟ้องขอให้ปลดเปลื้องทุกข์อันไม่อาจคำนวณเป็นราคาเงินได้ เว้นแต่ในคดีฟ้องขับไล่บุคคลใด ๆ ออกจากอสังหาริมทรัพย์อันมีค่าเช่าหรืออาจให้เช่าได้ในขณะยื่นคำฟ้องไม่เกินเดือนละสี่พันบาทหรือไม่เกินจำนวนที่กำหนดในพระราชกฤษฎีกา การขอให้ผู้พิพากษาที่นั่งพิจารณาคดีในศาลชั้นต้นรับรองว่ามีเหตุอันควรอุทธรณ์ได้ ให้ผู้อุทธรณ์ยื่นคำร้องถึงผู้พิพากษานั้น พร้อมกับคำฟ้องอุทธรณ์ต่อศาลชั้นต้น เมื่อศาลได้รับคำร้องเช่นว่านั้น ให้ศาลส่งคำร้องพร้อมด้วยสำนวนความไปยังผู้พิพากษาดังกล่าวเพื่อพิจารณารับรอง"},{"id":"๒๒๕","num":"มาตรา ๒๒๕","num_ara":"๒๒๕","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ข้อเท็จจริงหรือข้อกฎหมายที่จะยกขึ้นอ้างในการยื่นอุทธรณ์นั้นคู่ความจะต้องกล่าวไว้โดยชัดแจ้งในอุทธรณ์และต้องเป็นข้อที่ได้ยกขึ้นว่ากันมาแล้วโดยชอบในศาลชั้นต้น ทั้งจะต้องเป็นสาระแก่คดีอันควรได้รับการวินิจฉัยด้วย ถ้าคู่ความฝ่ายใดมิได้ยกปัญหาข้อใดอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชนขึ้นกล่าวในศาลชั้นต้นหรือคู่ความฝ่ายใดไม่สามารถยกปัญหาข้อกฎหมายใด ๆ ขึ้นกล่าวในศาลชั้นต้น เพราะพฤติการณ์ไม่เปิดช่องให้กระทำได้ หรือเพราะเหตุเป็นเรื่องที่ไม่ปฏิบัติตามบทบัญญัติว่าด้วยกระบวนพิจารณาชั้นอุทธรณ์ คู่ความที่เกี่ยวข้องย่อมมีสิทธิที่จะยกขึ้นอ้างซึ่งปัญหาเช่นว่านั้นได้"],"text":"ข้อเท็จจริงหรือข้อกฎหมายที่จะยกขึ้นอ้างในการยื่นอุทธรณ์นั้นคู่ความจะต้องกล่าวไว้โดยชัดแจ้งในอุทธรณ์และต้องเป็นข้อที่ได้ยกขึ้นว่ากันมาแล้วโดยชอบในศาลชั้นต้น ทั้งจะต้องเป็นสาระแก่คดีอันควรได้รับการวินิจฉัยด้วย ถ้าคู่ความฝ่ายใดมิได้ยกปัญหาข้อใดอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชนขึ้นกล่าวในศาลชั้นต้นหรือคู่ความฝ่ายใดไม่สามารถยกปัญหาข้อกฎหมายใด ๆ ขึ้นกล่าวในศาลชั้นต้น เพราะพฤติการณ์ไม่เปิดช่องให้กระทำได้ หรือเพราะเหตุเป็นเรื่องที่ไม่ปฏิบัติตามบทบัญญัติว่าด้วยกระบวนพิจารณาชั้นอุทธรณ์ คู่ความที่เกี่ยวข้องย่อมมีสิทธิที่จะยกขึ้นอ้างซึ่งปัญหาเช่นว่านั้นได้"},{"id":"๒๒๖","num":"มาตรา ๒๒๖","num_ara":"๒๒๖","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ก่อนศาลชั้นต้นได้มีคำพิพากษาหรือคำสั่งชี้ขาดตัดสินคดี ถ้าศาลนั้นได้มีคำสั่งอย่างใดอย่างหนึ่งนอกจากที่ระบุไว้ในมาตรา ๒๒๗ และ ๒๒๘","(๑) ห้ามมิให้อุทธรณ์คำสั่งนั้นในระหว่างพิจารณา (๒) ถ้าคู่ความฝ่ายใดโต้แย้งคำสั่งใด ให้ศาลจดข้อโต้แย้งนั้นลงไว้ในรายงาน คู่ความที่โต้แย้งชอบที่จะอุทธรณ์คำสั่งได้ภายในกำหนดหนึ่งเดือนนับแต่วันที่ศาลได้มีคำพิพากษาหรือคำสั่งชี้ขาดตัดสินคดีนั้นเป็นต้นไป เพื่อประโยชน์แห่งมาตรานี้ ไม่ว่าศาลจะได้มีคำสั่งให้รับคำฟ้องไว้แล้วหรือไม่ ให้ถือว่าคำสั่งอย่างใดอย่างหนึ่งของศาลนับตั้งแต่มีการยื่นคำฟ้องต่อศาลนอกจากที่ระบุไว้ในมาตรา ๒๒๗ และ ๒๒๘ เป็นคำสั่งระหว่างพิจารณา"],"text":"ก่อนศาลชั้นต้นได้มีคำพิพากษาหรือคำสั่งชี้ขาดตัดสินคดี ถ้าศาลนั้นได้มีคำสั่งอย่างใดอย่างหนึ่งนอกจากที่ระบุไว้ในมาตรา ๒๒๗ และ ๒๒๘\n\n(๑) ห้ามมิให้อุทธรณ์คำสั่งนั้นในระหว่างพิจารณา (๒) ถ้าคู่ความฝ่ายใดโต้แย้งคำสั่งใด ให้ศาลจดข้อโต้แย้งนั้นลงไว้ในรายงาน คู่ความที่โต้แย้งชอบที่จะอุทธรณ์คำสั่งได้ภายในกำหนดหนึ่งเดือนนับแต่วันที่ศาลได้มีคำพิพากษาหรือคำส
