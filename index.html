ด้รับแจ้งคำสั่ง การที่นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมายรับจดทะเบียนหรือแก้ไขเปลี่ยนแปลงทางทะเบียน หรือเพิกถอนการจดทะเบียนที่เกี่ยวกับการกระทำที่ถูกฟ้องร้องภายหลังที่บุคคลดังกล่าวได้รับแจ้งคำสั่งของศาลซึ่งออกตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๓) แล้วนั้น ยังไม่มีผลใช้บังคับตามกฎหมายในระหว่างใช้วิธีชั่วคราวก่อนพิพากษา"],"text":"การที่จำเลยได้ก่อให้เกิด โอน หรือเปลี่ยนแปลงซึ่งสิทธิในทรัพย์สินที่พิพาท หรือทรัพย์สินของจำเลยภายหลังที่คำสั่งของศาลที่ห้ามโอน ขาย ยักย้าย หรือจำหน่าย ซึ่งออกตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๒) มีผลใช้บังคับแล้วนั้น หาอาจใช้ยันแก่โจทก์หรือเจ้าพนักงานบังคับคดีได้ไม่ ถึงแม้ว่าราคาแห่งทรัพย์สินนั้นจะเกินกว่าจำนวนหนี้และค่าฤชาธรรมเนียมในการฟ้องร้องและการบังคับคดี และจำเลยได้จำหน่ายทรัพย์สินเพียงส่วนที่เกินจำนวนนั้นก็ตาม การที่นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมายรับจดทะเบียนหรือแก้ไขเปลี่ยนแปลงทางทะเบียน หรือเพิกถอนการจดทะเบียนที่เกี่ยวกับทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยภายหลังที่คำสั่งของศาลซึ่งออกตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๓) มีผลใช้บังคับแล้วนั้นหาอาจใช้ยันแก่โจทก์หรือเจ้าพนักงานบังคับคดีได้ไม่ เว้นแต่ผู้รับโอนจะพิสูจน์ได้ว่าได้รับโอนโดยสุจริต และเสียค่าตอบแทนก่อนที่นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมายจะได้รับแจ้งคำสั่ง การที่นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมายรับจดทะเบียนหรือแก้ไขเปลี่ยนแปลงทางทะเบียน หรือเพิกถอนการจดทะเบียนที่เกี่ยวกับการกระทำที่ถูกฟ้องร้องภายหลังที่บุคคลดังกล่าวได้รับแจ้งคำสั่งของศาลซึ่งออกตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๓) แล้วนั้น ยังไม่มีผลใช้บังคับตามกฎหมายในระหว่างใช้วิธีชั่วคราวก่อนพิพากษา"},{"id":"๒๕๙","num":"มาตรา ๒๕๙","num_ara":"๒๕๙","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ให้นำบทบัญญัติในลักษณะ ๒ แห่งภาคนี้ว่าด้วยการบังคับคดีตามคำพิพากษาหรือคำสั่งมาใช้บังคับแก่วิธีการชั่วคราวก่อนพิพากษาด้วยโดยอนุโลม"],"text":"ให้นำบทบัญญัติในลักษณะ ๒ แห่งภาคนี้ว่าด้วยการบังคับคดีตามคำพิพากษาหรือคำสั่งมาใช้บังคับแก่วิธีการชั่วคราวก่อนพิพากษาด้วยโดยอนุโลม"},{"id":"๒๖๐","num":"มาตรา ๒๖๐","num_ara":"๒๖๐","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ในกรณีที่คำพิพากษาหรือคำสั่งชี้ขาดตัดสินคดีมิได้กล่าวถึงวิธีการชั่วคราวก่อนพิพากษาที่ศาลได้สั่งไว้ในระหว่างการพิจารณา","(๑) ถ้าคดีนั้นศาลตัดสินให้จำเลยเป็นฝ่ายชนะคดีเต็มตามข้อหาหรือบางส่วน คำสั่งของศาลเกี่ยวกับวิธีการชั่วคราวในส่วนที่จำเลยชนะคดีนั้น ให้ถือว่าเป็นอันยกเลิกเมื่อพ้นกำหนดเจ็ดวันนับแต่วันที่ศาลมีคำพิพากษาหรือคำสั่ง เว้นแต่โจทก์จะได้ยื่นคำขอฝ่ายเดียวต่อศาลชั้นต้นภายในกำหนดเวลาดังกล่าว แสดงว่าตนประสงค์จะยื่นอุทธรณ์หรือฎีกาคำพิพากษาหรือคำสั่งนั้น และมีเหตุอันสมควรที่ศาลจะมีคำสั่งให้วิธีการชั่วคราวเช่นว่านั้นยังคงมีผลใช้บังคับต่อไป ในกรณีเช่นว่านี้ ถ้าศาลชั้นต้นมีคำสั่งให้ยกคำขอของโจทก์ คำสั่งของศาลให้เป็นที่สุด ถ้าศาลชั้นต้นมีคำสั่งให้วิธีการชั่วคราวยังคงมีผลใช้บังคับต่อไป คำสั่งของศาลชั้นต้นให้มีผลใช้บังคับต่อไปจนกว่าจะครบกำหนดยื่นอุทธรณ์หรือฎีกา หรือศาลมีคำสั่งถึงที่สุดไม่รับอุทธรณ์หรือฎีกา แล้วแต่กรณี เมื่อมีการอุทธรณ์หรือฎีกาแล้ว คำสั่งของศาลชั้นต้นให้มีผลใช้บังคับต่อไปจนกว่าศาลอุทธรณ์หรือศาลฎีกาจะมีคำสั่งเป็นอย่างอื่น (๒) ถ้าคดีนั้นศาลตัดสินให้โจทก์เป็นฝ่ายชนะคดี คำสั่งของศาลเกี่ยวกับวิธีการชั่วคราวยังคงมีผลใช้บังคับต่อไปเท่าที่จำเป็นเพื่อปฏิบัติตามคำพิพากษาหรือคำสั่งของศาล"],"text":"ในกรณีที่คำพิพากษาหรือคำสั่งชี้ขาดตัดสินคดีมิได้กล่าวถึงวิธีการชั่วคราวก่อนพิพากษาที่ศาลได้สั่งไว้ในระหว่างการพิจารณา\n\n(๑) ถ้าคดีนั้นศาลตัดสินให้จำเลยเป็นฝ่ายชนะคดีเต็มตามข้อหาหรือบางส่วน คำสั่งของศาลเกี่ยวกับวิธีการชั่วคราวในส่วนที่จำเลยชนะคดีนั้น ให้ถือว่าเป็นอันยกเลิกเมื่อพ้นกำหนดเจ็ดวันนับแต่วันที่ศาลมีคำพิพากษาหรือคำสั่ง เว้นแต่โจทก์จะได้ยื่นคำขอฝ่ายเดียวต่อศาลชั้นต้นภายในกำหนดเวลาดังกล่าว แสดงว่าตนประสงค์จะยื่นอุทธรณ์หรือฎีกาคำพิพากษาหรือคำสั่งนั้น และมีเหตุอันสมควรที่ศาลจะมีคำสั่งให้วิธีการชั่วคราวเช่นว่านั้นยังคงมีผลใช้บังคับต่อไป ในกรณีเช่นว่านี้ ถ้าศาลชั้นต้นมีคำสั่งให้ยกคำขอของโจทก์ คำสั่งของศาลให้เป็นที่สุด ถ้าศาลชั้นต้นมีคำสั่งให้วิธีการชั่วคราวยังคงมีผลใช้บังคับต่อไป คำสั่งของศาลชั้นต้นให้มีผลใช้บังคับต่อไปจนกว่าจะครบกำหนดยื่นอุทธรณ์หรือฎีกา หรือศาลมีคำสั่งถึงที่สุดไม่รับอุทธรณ์หรือฎีกา แล้วแต่กรณี เมื่อมีการอุทธรณ์หรือฎีกาแล้ว คำสั่งของศาลชั้นต้นให้มีผลใช้บังคับต่อไปจนกว่าศาลอุทธรณ์หรือศาลฎีกาจะมีคำสั่งเป็นอย่างอื่น (๒) ถ้าคดีนั้นศาลตัดสินให้โจทก์เป็นฝ่ายชนะคดี คำสั่งของศาลเกี่ยวกับวิธีการชั่วคราวยังคงมีผลใช้บังคับต่อไปเท่าที่จำเป็นเพื่อปฏิบัติตามคำพิพากษาหรือคำสั่งของศาล"},{"id":"๒๖๑","num":"มาตรา ๒๖๑","num_ara":"๒๖๑","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["จำเลยหรือบุคคลภายนอกซึ่งได้รับหมายยึด หมายอายัด หรือคำสั่งตามมาตรา ๒๕๔ (๑) (๒) หรือ (๓) หรือจะต้องเสียหายเพราะหมายยึด หมายอายัด หรือคำสั่งดังกล่าว อาจมีคำขอต่อศาลให้ถอนหมาย เพิกถอนคำสั่ง หรือแก้ไขเปลี่ยนแปลงคำสั่ง หมายยึด หรือหมายอายัด ซึ่งออกตามคำสั่งดังกล่าวได้ แต่ถ้าบุคคลภายนอกเช่นว่านั้นขอให้ปล่อยทรัพย์สินที่ยึดหรือคัดค้านคำสั่งอายัดให้นำมาตรา ๓๒๓ หรือมาตรา ๓๒๕ แล้วแต่กรณี มาใช้บังคับโดยอนุโลม จำเลยซึ่งถูกศาลออกคำสั่งจับกุมตามมาตรา ๒๕๔ (๔) อาจมีคำขอต่อศาลให้เพิกถอนคำสั่งถอนหมาย หรือให้ปล่อยตัวไปโดยไม่มีเงื่อนไขหรือให้ปล่อยตัวไปชั่วคราวโดยมีหลักประกันตามจำนวนที่ศาลเห็นสมควรหรือไม่ก็ได้ ถ้าปรากฏว่าวิธีการที่กำหนดไว้ตามมาตรา ๒๕๔ นั้น ไม่มีเหตุเพียงพอหรือมีเหตุอันสมควรประการอื่น ศาลจะมีคำสั่งอนุญาตตามคำขอหรือมีคำสั่งอื่นใดตามที่เห็นสมควร เพื่อประโยชน์แห่งความยุติธรรมก็ได้ ทั้งนี้ ศาลจะกำหนดให้ผู้ขอวางเงินต่อศาลหรือหาประกันมาให้ตามจำนวนและภายในระยะเวลาที่เห็นสมควรหรือจะกำหนดเงื่อนไขใด ๆ ตามที่เห็นสมควรก็ได้ แต่ในกรณีที่เป็นการฟ้องเรียกเงิน ห้ามไม่ให้ศาลเรียกประกันเกินกว่าจำนวนเงินที่ฟ้องรวมทั้งค่าฤชาธรรมเนียม"],"text":"จำเลยหรือบุคคลภายนอกซึ่งได้รับหมายยึด หมายอายัด หรือคำสั่งตามมาตรา ๒๕๔ (๑) (๒) หรือ (๓) หรือจะต้องเสียหายเพราะหมายยึด หมายอายัด หรือคำสั่งดังกล่าว อาจมีคำขอต่อศาลให้ถอนหมาย เพิกถอนคำสั่ง หรือแก้ไขเปลี่ยนแปลงคำสั่ง หมายยึด หรือหมายอายัด ซึ่งออกตามคำสั่งดังกล่าวได้ แต่ถ้าบุคคลภายนอกเช่นว่านั้นขอให้ปล่อยทรัพย์สินที่ยึดหรือคัดค้านคำสั่งอายัดให้นำมาตรา ๓๒๓ หรือมาตรา ๓๒๕ แล้วแต่กรณี มาใช้บังคับโดยอนุโลม จำเลยซึ่งถูกศาลออกคำสั่งจับกุมตามมาตรา ๒๕๔ (๔) อาจมีคำขอต่อศาลให้เพิกถอนคำสั่งถอนหมาย หรือให้ปล่อยตัวไปโดยไม่มีเงื่อนไขหรือให้ปล่อยตัวไปชั่วคราวโดยมีหลักประกันตามจำนวนที่ศาลเห็นสมควรหรือไม่ก็ได้ ถ้าปรากฏว่าวิธีการที่กำหนดไว้ตามมาตรา ๒๕๔ นั้น ไม่มีเหตุเพียงพอหรือมีเหตุอันสมควรประการอื่น ศาลจะมีคำสั่งอนุญาตตามคำขอหรือมีคำสั่งอื่นใดตามที่เห็นสมควร เพื่อประโยชน์แห่งความยุติธรรมก็ได้ ทั้งนี้ ศาลจะกำหนดให้ผู้ขอวางเงินต่อศาลหรือหาประกันมาให้ตามจำนวนและภายในระยะเวลาที่เห็นสมควรหรือจะกำหนดเงื่อนไขใด ๆ ตามที่เห็นสมควรก็ได้ แต่ในกรณีที่เป็นการฟ้องเรียกเงิน ห้ามไม่ให้ศาลเรียกประกันเกินกว่าจำนวนเงินที่ฟ้องรวมทั้งค่าฤชาธรรมเนียม"},{"id":"๒๖๒","num":"มาตรา ๒๖๒","num_ara":"๒๖๒","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ถ้าข้อเท็จจริงหรือพฤติการณ์ที่ศาลอาศัยเป็นหลักในการมีคำสั่งอนุญาตตามคำขอในวิธีการชั่วคราวอย่างใดอย่างหนึ่งนั้นเปลี่ยนแปลงไป เมื่อศาลเห็นสมควร หรือเมื่อจำเลยหรือบุคคลภายนอกตามที่บัญญัติไว้ในมาตรา ๒๖๑ มีคำขอศาลที่คดีนั้นอยู่ในระหว่างพิจารณาจะมีคำสั่งแก้ไขหรือยกเลิกวิธีการเช่นว่านั้นเสียก็ได้ ในระหว่างระยะเวลานับแต่ศาลชั้นต้นหรือศาลอุทธรณ์ได้อ่านคำพิพากษาหรือคำสั่งชี้ขาดคดีหรือชี้ขาดอุทธรณ์ไปจนถึงเวลาที่ศาลชั้นต้นได้ส่งสำนวนความที่อุทธรณ์หรือฎีกาไปยังศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี คำขอตามมาตรานี้ให้ยื่นต่อศาลชั้นต้นและให้เป็นอำนาจของศาลชั้นต้นที่จะมีคำสั่งคำขอเช่นว่านั้น"],"text":"ถ้าข้อเท็จจริงหรือพฤติการณ์ที่ศาลอาศัยเป็นหลักในการมีคำสั่งอนุญาตตามคำขอในวิธีการชั่วคราวอย่างใดอย่างหนึ่งนั้นเปลี่ยนแปลงไป เมื่อศาลเห็นสมควร หรือเมื่อจำเลยหรือบุคคลภายนอกตามที่บัญญัติไว้ในมาตรา ๒๖๑ มีคำขอศาลที่คดีนั้นอยู่ในระหว่างพิจารณาจะมีคำสั่งแก้ไขหรือยกเลิกวิธีการเช่นว่านั้นเสียก็ได้ ในระหว่างระยะเวลานับแต่ศาลชั้นต้นหรือศาลอุทธรณ์ได้อ่านคำพิพากษาหรือคำสั่งชี้ขาดคดีหรือชี้ขาดอุทธรณ์ไปจนถึงเวลาที่ศาลชั้นต้นได้ส่งสำนวนความที่อุทธรณ์หรือฎีกาไปยังศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี คำขอตามมาตรานี้ให้ยื่นต่อศาลชั้นต้นและให้เป็นอำนาจของศาลชั้นต้นที่จะมีคำสั่งคำขอเช่นว่านั้น"},{"id":"๒๖๓","num":"มาตรา ๒๖๓","num_ara":"๒๖๓","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ในกรณีที่ศาลได้มีคำสั่งอนุญาตตามคำขอในวิธีการชั่วคราวตามลักษณะนี้ จำเลยซึ่งต้องถูกบังคับโดยวิธีการนั้นอาจยื่นคำขอต่อศาลชั้นต้นภายในสามสิบวันนับแต่วันที่มีคำพิพากษาของศาลที่มีคำสั่งตามวิธีการชั่วคราวนั้น ขอให้มีคำสั่งให้โจทก์ชดใช้ค่าสินไหมทดแทนแก่ตนได้ในกรณีดังต่อไปนี้","(๑) คดีนั้นศาลตัดสินให้โจทก์เป็นฝ่ายแพ้ และปรากฏว่าศาลมีคำสั่งโดยมีความเห็นหลงไปว่าสิทธิเรียกร้องของผู้ขอมีมูล โดยความผิดหรือเลินเล่อของผู้ขอ (๒) ไม่ว่าคดีนั้นศาลจะชี้ขาดตัดสินให้โจทก์ชนะหรือแพ้คดี ถ้าปรากฏว่าศาลมีคำสั่งโดยมีความเห็นหลงไปว่าวิธีการเช่นว่านี้มีเหตุผลเพียงพอ โดยความผิดหรือเลินเล่อของผู้ขอ เมื่อได้รับคำขอตามวรรคหนึ่ง ศาลมีอำนาจสั่งให้แยกการพิจารณาเป็นสำนวนต่างหากจากคดีเดิม และเมื่อศาลทำการไต่สวนแล้วเห็นว่าคำขอนั้นรับฟังได้ก็ให้มีคำสั่งให้โจทก์ชดใช้ค่าสินไหมทดแทนให้แก่จำเลยได้ตามจำนวนที่ศาลเห็นสมควร ถ้าศาลที่มีคำสั่งตามวิธีการชั่วคราวเป็นศาลอุทธรณ์หรือศาลฎีกา เมื่อศาลชั้นต้นทำการไต่สวนแล้ว ให้ส่งสำนวนให้ศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี เป็นผู้สั่งคำขอนั้น ถ้าโจทก์ไม่ปฏิบัติตามคำสั่งศาล ศาลมีอำนาจบังคับโจทก์เสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษา แต่ในกรณีที่ศาลมีคำสั่งให้โจทก์ชดใช้ค่าสินไหมทดแทนตาม (๑) ให้งดการบังคับคดีไว้จนกว่าศาลจะมีคำพิพากษาถึงที่สุดให้โจทก์แพ้คดี คำสั่งของศาลชั้นต้นหรือศาลอุทธรณ์ตามวรรคสอง ให้อุทธรณ์หรือฎีกาได้ตามบทบัญญัติว่าด้วยการอุทธรณ์หรือฎีกา"],"text":"ในกรณีที่ศาลได้มีคำสั่งอนุญาตตามคำขอในวิธีการชั่วคราวตามลักษณะนี้ จำเลยซึ่งต้องถูกบังคับโดยวิธีการนั้นอาจยื่นคำขอต่อศาลชั้นต้นภายในสามสิบวันนับแต่วันที่มีคำพิพากษาของศาลที่มีคำสั่งตามวิธีการชั่วคราวนั้น ขอให้มีคำสั่งให้โจทก์ชดใช้ค่าสินไหมทดแทนแก่ตนได้ในกรณีดังต่อไปนี้\n\n(๑) คดีนั้นศาลตัดสินให้โจทก์เป็นฝ่ายแพ้ และปรากฏว่าศาลมีคำสั่งโดยมีความเห็นหลงไปว่าสิทธิเรียกร้องของผู้ขอมีมูล โดยความผิดหรือเลินเล่อของผู้ขอ (๒) ไม่ว่าคดีนั้นศาลจะชี้ขาดตัดสินให้โจทก์ชนะหรือแพ้คดี ถ้าปรากฏว่าศาลมีคำสั่งโดยมีความเห็นหลงไปว่าวิธีการเช่นว่านี้มีเหตุผลเพียงพอ โดยความผิดหรือเลินเล่อของผู้ขอ เมื่อได้รับคำขอตามวรรคหนึ่ง ศาลมีอำนาจสั่งให้แยกการพิจารณาเป็นสำนวนต่างหากจากคดีเดิม และเมื่อศาลทำการไต่สวนแล้วเห็นว่าคำขอนั้นรับฟังได้ก็ให้มีคำสั่งให้โจทก์ชดใช้ค่าสินไหมทดแทนให้แก่จำเลยได้ตามจำนวนที่ศาลเห็นสมควร ถ้าศาลที่มีคำสั่งตามวิธีการชั่วคราวเป็นศาลอุทธรณ์หรือศาลฎีกา เมื่อศาลชั้นต้นทำการไต่สวนแล้ว ให้ส่งสำนวนให้ศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี เป็นผู้สั่งคำขอนั้น ถ้าโจทก์ไม่ปฏิบัติตามคำสั่งศาล ศาลมีอำนาจบังคับโจทก์เสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษา แต่ในกรณีที่ศาลมีคำสั่งให้โจทก์ชดใช้ค่าสินไหมทดแทนตาม (๑) ให้งดการบังคับคดีไว้จนกว่าศาลจะมีคำพิพากษาถึงที่สุดให้โจทก์แพ้คดี คำสั่งของศาลชั้นต้นหรือศาลอุทธรณ์ตามวรรคสอง ให้อุทธรณ์หรือฎีกาได้ตามบทบัญญัติว่าด้วยการอุทธรณ์หรือฎีกา"},{"id":"๒๖๔","num":"มาตรา ๒๖๔","num_ara":"๒๖๔","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["นอกจากกรณีที่บัญญัติไว้ในมาตรา ๒๕๓ และมาตรา ๒๕๔ คู่ความชอบที่จะยื่นคำขอต่อศาล เพื่อให้มีคำสั่งกำหนดวิธีการเพื่อคุ้มครองประโยชน์ของผู้ขอในระหว่างการพิจารณาหรือเพื่อบังคับตามคำพิพากษา เช่น ให้นำทรัพย์สินหรือเงินที่พิพาทมาวางต่อศาลหรือต่อบุคคลภายนอก หรือให้ตั้งผู้จัดการหรือผู้รักษาทรัพย์สินของห้างร้านที่ทำการค้าที่พิพาท หรือให้จัดให้บุคคลผู้ไร้ความสามารถอยู่ในความปกครองของบุคคลภายนอก คำขอตามวรรคหนึ่งให้บังคับตามมาตรา ๒๑ มาตรา ๒๕ มาตรา ๒๒๗ มาตรา ๒๒๘ มาตรา ๒๖๐ และมาตรา ๒๖๒"],"text":"นอกจากกรณีที่บัญญัติไว้ในมาตรา ๒๕๓ และมาตรา ๒๕๔ คู่ความชอบที่จะยื่นคำขอต่อศาล เพื่อให้มีคำสั่งกำหนดวิธีการเพื่อคุ้มครองประโยชน์ของผู้ขอในระหว่างการพิจารณาหรือเพื่อบังคับตามคำพิพากษา เช่น ให้นำทรัพย์สินหรือเงินที่พิพาทมาวางต่อศาลหรือต่อบุคคลภายนอก หรือให้ตั้งผู้จัดการหรือผู้รักษาทรัพย์สินของห้างร้านที่ทำการค้าที่พิพาท หรือให้จัดให้บุคคลผู้ไร้ความสามารถอยู่ในความปกครองของบุคคลภายนอก คำขอตามวรรคหนึ่งให้บังคับตามมาตรา ๒๑ มาตรา ๒๕ มาตรา ๒๒๗ มาตรา ๒๒๘ มาตรา ๒๖๐ และมาตรา ๒๖๒"},{"id":"๒๖๕","num":"มาตรา ๒๖๕","num_ara":"๒๖๕","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ในกรณีที่ศาลยอมรับเอาบุคคลเป็นประกันตามที่บัญญัติไว้ในประมวลกฎหมายนี้ และบุคคลนั้นแสดงกิริยาซึ่งพอจะเห็นได้ว่าจะทำให้โจทก์เสียเปรียบ หรือจะหลีกเลี่ยง ขัดขวาง หรือกระทำให้เนิ่นช้าซึ่งการปฏิบัติตามหน้าที่ของตน ให้นำบทบัญญัติแห่งหมวดนี้มาใช้บังคับโดยอนุโลม"],"text":"ในกรณีที่ศาลยอมรับเอาบุคคลเป็นประกันตามที่บัญญัติไว้ในประมวลกฎหมายนี้ และบุคคลนั้นแสดงกิริยาซึ่งพอจะเห็นได้ว่าจะทำให้โจทก์เสียเปรียบ หรือจะหลีกเลี่ยง ขัดขวาง หรือกระทำให้เนิ่นช้าซึ่งการปฏิบัติตามหน้าที่ของตน ให้นำบทบัญญัติแห่งหมวดนี้มาใช้บังคับโดยอนุโลม"},{"id":"๒๖๖","num":"มาตรา ๒๖๖","num_ara":"๒๖๖","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๒ คำขอในเหตุฉุกเฉิน","subsection":"","paragraphs":["ในกรณีมีเหตุฉุกเฉินเมื่อโจทก์ยื่นคำขอตามมาตรา ๒๕๔ โจทก์จะยื่นคำร้องรวมไปด้วยเพื่อให้ศาลมีคำสั่งหรือออกหมายตามที่ขอโดยไม่ชักช้าก็ได้ เมื่อได้ยื่นคำร้องเช่นว่ามานี้ วิธีพิจารณาและชี้ขาดคำขอนั้น ให้อยู่ภายใต้บังคับบทบัญญัติมาตรา ๒๖๗ มาตรา ๒๖๘ และมาตรา ๒๖๙"],"text":"ในกรณีมีเหตุฉุกเฉินเมื่อโจทก์ยื่นคำขอตามมาตรา ๒๕๔ โจทก์จะยื่นคำร้องรวมไปด้วยเพื่อให้ศาลมีคำสั่งหรือออกหมายตามที่ขอโดยไม่ชักช้าก็ได้ เมื่อได้ยื่นคำร้องเช่นว่ามานี้ วิธีพิจารณาและชี้ขาดคำขอนั้น ให้อยู่ภายใต้บังคับบทบัญญัติมาตรา ๒๖๗ มาตรา ๒๖๘ และมาตรา ๒๖๙"},{"id":"๒๖๗","num":"มาตรา ๒๖๗","num_ara":"๒๖๗","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๒ คำขอในเหตุฉุกเฉิน","subsection":"","paragraphs":["ให้ศาลพิจารณาคำขอเป็นการด่วน ถ้าเป็นที่พอใจจากคำแถลงของโจทก์หรือพยานหลักฐานที่โจทก์ได้นำมาสืบ หรือที่ศาลได้เรียกมาสืบเองว่าคดีนั้นเป็นคดีมีเหตุฉุกเฉินและคำขอนั้นมีเหตุผลสมควรอันแท้จริง ให้ศาลมีคำสั่งหรือออกหมายตามที่ขอภายในขอบเขตและเงื่อนไขไปตามที่เห็นจำเป็นทันที ถ้าศาลมีคำสั่งให้ยกคำขอ คำสั่งเช่นว่านี้ให้เป็นที่สุด จำเลยอาจยื่นคำขอโดยพลัน ให้ศาลยกเลิกคำสั่งหรือหมายนั้นเสีย และให้นำบทบัญญัติแห่งวรรคก่อนมาใช้บังคับโดยอนุโลม คำขอเช่นว่านี้อาจทำเป็นคำขอฝ่ายเดียวโดยได้รับอนุญาตจากศาล ถ้าศาลมีคำสั่งยกเลิกคำสั่งเดิมตามคำขอคำสั่งเช่นว่านี้ให้เป็นที่สุด การที่ศาลยกคำขอในเหตุฉุกเฉินหรือยกเลิกคำสั่งที่ได้ออกตามคำขอในเหตุฉุกเฉินนั้น ย่อมไม่ตัดสิทธิโจทก์ที่จะเสนอคำขอตามมาตรา ๒๕๔ นั้นใหม่"],"text":"ให้ศาลพิจารณาคำขอเป็นการด่วน ถ้าเป็นที่พอใจจากคำแถลงของโจทก์หรือพยานหลักฐานที่โจทก์ได้นำมาสืบ หรือที่ศาลได้เรียกมาสืบเองว่าคดีนั้นเป็นคดีมีเหตุฉุกเฉินและคำขอนั้นมีเหตุผลสมควรอันแท้จริง ให้ศาลมีคำสั่งหรือออกหมายตามที่ขอภายในขอบเขตและเงื่อนไขไปตามที่เห็นจำเป็นทันที ถ้าศาลมีคำสั่งให้ยกคำขอ คำสั่งเช่นว่านี้ให้เป็นที่สุด จำเลยอาจยื่นคำขอโดยพลัน ให้ศาลยกเลิกคำสั่งหรือหมายนั้นเสีย และให้นำบทบัญญัติแห่งวรรคก่อนมาใช้บังคับโดยอนุโลม คำขอเช่นว่านี้อาจทำเป็นคำขอฝ่ายเดียวโดยได้รับอนุญาตจากศาล ถ้าศาลมีคำสั่งยกเลิกคำสั่งเดิมตามคำขอคำสั่งเช่นว่านี้ให้เป็นที่สุด การที่ศาลยกคำขอในเหตุฉุกเฉินหรือยกเลิกคำสั่งที่ได้ออกตามคำขอในเหตุฉุกเฉินนั้น ย่อมไม่ตัดสิทธิโจทก์ที่จะเสนอคำขอตามมาตรา ๒๕๔ นั้นใหม่"},{"id":"๒๖๘","num":"มาตรา ๒๖๘","num_ara":"๒๖๘","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๒ คำขอในเหตุฉุกเฉิน","subsection":"","paragraphs":["ในกรณีที่มีคำขอในเหตุฉุกเฉิน ให้ศาลมีอำนาจที่จะใช้ดุลพินิจวินิจฉัยว่าคดีนั้นมีเหตุฉุกเฉินหรือไม่ ส่วนวิธีการที่ศาลจะกำหนดนั้น หากจำเป็นต้องเสื่อมเสียแก่สิทธิของคู่ความในประเด็นแห่งคดี ก็ให้เสื่อมเสียเท่าที่จำเป็นแก่กรณี"],"text":"ในกรณีที่มีคำขอในเหตุฉุกเฉิน ให้ศาลมีอำนาจที่จะใช้ดุลพินิจวินิจฉัยว่าคดีนั้นมีเหตุฉุกเฉินหรือไม่ ส่วนวิธีการที่ศาลจะกำหนดนั้น หากจำเป็นต้องเสื่อมเสียแก่สิทธิของคู่ความในประเด็นแห่งคดี ก็ให้เสื่อมเสียเท่าที่จำเป็นแก่กรณี"},{"id":"๒๖๙","num":"มาตรา ๒๖๙","num_ara":"๒๖๙","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๒ คำขอในเหตุฉุกเฉิน","subsection":"","paragraphs":["คำสั่งศาลซึ่งอนุญาตตามคำขอในเหตุฉุกเฉินนั้น ให้มีผลบังคับตามที่บัญญัติไว้ในมาตรา ๒๕๘ และมาตรา ๒๕๘ ทวิ อนึ่ง ศาลจะสั่งให้โจทก์รอการบังคับไว้จนกว่าศาลจะได้วินิจฉัยชี้ขาดคำขอให้ยกเลิกคำสั่งหรือจนกว่าโจทก์จะได้วางประกันก็ได้"],"text":"คำสั่งศาลซึ่งอนุญาตตามคำขอในเหตุฉุกเฉินนั้น ให้มีผลบังคับตามที่บัญญัติไว้ในมาตรา ๒๕๘ และมาตรา ๒๕๘ ทวิ อนึ่ง ศาลจะสั่งให้โจทก์รอการบังคับไว้จนกว่าศาลจะได้วินิจฉัยชี้ขาดคำขอให้ยกเลิกคำสั่งหรือจนกว่าโจทก์จะได้วางประกันก็ได้"},{"id":"๒๗๐","num":"มาตรา ๒๗๐","num_ara":"๒๗๐","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๒ คำขอในเหตุฉุกเฉิน","subsection":"","paragraphs":["บทบัญญัติในหมวดนี้ ให้ใช้บังคับแก่คำขออื่น ๆ นอกจากคำขอตามมาตรา ๒๕๔ ได้ต่อเมื่อประมวลกฎหมายนี้หรือกฎหมายอื่นบัญญัติไว้โดยชัดแจ้ง"],"text":"บทบัญญัติในหมวดนี้ ให้ใช้บังคับแก่คำขออื่น ๆ นอกจากคำขอตามมาตรา ๒๕๔ ได้ต่อเมื่อประมวลกฎหมายนี้หรือกฎหมายอื่นบัญญัติไว้โดยชัดแจ้ง"},{"id":"๒๗๑","num":"มาตรา ๒๗๑","num_ara":"๒๗๑","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๑ ศาลที่มีอำนาจในการบังคับคดี","paragraphs":["ศาลที่มีอำนาจในการบังคับคดีซึ่งมีอำนาจกำหนดวิธีการบังคับคดีตามมาตรา ๒๗๖ และมีอำนาจทำคำวินิจฉัยชี้ขาดหรือทำคำสั่งในเรื่องใด ๆ อันเกี่ยวด้วยการบังคับคดีตามคำพิพากษาหรือคำสั่ง คือศาลที่ได้พิจารณาและชี้ขาดตัดสินคดีในชั้นต้น หรือตามที่มีกฎหมายบัญญัติ ถ้าศาลอุทธรณ์หรือศาลฎีกาได้ส่งคดีไปยังศาลชั้นต้นแห่งอื่นที่มิได้มีคำพิพากษาหรือคำสั่งที่อุทธรณ์หรือฎีกานั้นเพื่อการพิจารณาและพิพากษาใหม่ตามมาตรา ๒๔๓ (๒) และ (๓) ให้ศาลที่มีคำพิพากษาหรือคำสั่งใหม่นั้นเป็นศาลที่มีอำนาจในการบังคับคดี เว้นแต่ศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี จะได้กำหนดไว้เป็นอย่างอื่น ในกรณีที่จะต้องบังคับคดีนอกเขตศาล ให้ศาลที่มีอำนาจในการบังคับคดีมีอำนาจตั้งให้ศาลอื่นบังคับคดีแทนได้ หรือเจ้าหนี้ตามคำพิพากษาอาจยื่นคำแถลงหรือเจ้าพนักงานบังคับคดีรายงานให้ศาลที่จะมีการบังคับคดีแทนทราบพร้อมด้วยสำเนาหมายบังคับคดีหรือสำเนาคำสั่งกำหนดวิธีการบังคับคดี ในกรณีเช่นว่านี้ ให้ศาลดังกล่าวแจ้งให้ศาลที่มีอำนาจในการบังคับคดีทราบโดยไม่ชักช้า และให้ศาลที่จะมีการบังคับคดีแทนตั้งเจ้าพนักงานบังคับคดีหรือมีคำสั่งอื่นใดเพื่อดำเนินการบังคับคดีต่อไป ถ้าเป็นการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้อง ให้ศาลที่บังคับคดีแทนส่งทรัพย์สินที่ได้จากการยึดหรืออายัดหรือเงินที่ได้จากการขายทรัพย์สินนั้น แล้วแต่กรณี ไปยังศาลที่มีอำนาจในการบังคับคดีเพื่อดำเนินการไปตามกฎหมาย ในกรณีที่มีการบังคับคดีนอกเขตศาลโดยบกพร่อง ผิดพลาด หรือฝ่าฝืนกฎหมาย ให้ศาลที่บังคับคดีแทนมีอำนาจสั่งเพิกถอนหรือแก้ไขกระบวนวิธีการบังคับคดีทั้งปวงหรือวิธีการบังคับคดีใด ๆ โดยเฉพาะ หรือมีคำสั่งกำหนดวิธีการอย่างใดแก่เจ้าพนักงานบังคับคดีเพื่อแก้ไขข้อบกพร่อง ผิดพลาด หรือฝ่าฝืนกฎหมายนั้น รวมถึงดำเนินกระบวนพิจารณาอื่นใดที่เกี่ยวเนื่องได้ เว้นแต่เมื่อการบังคับคดีได้เสร็จสิ้นและแจ้งผลการบังคับคดีไปยังศาลที่มีอำนาจในการบังคับคดีแล้ว ให้เป็นอำนาจของศาลที่มีอำนาจในการบังคับคดีเท่านั้น"],"text":"ศาลที่มีอำนาจในการบังคับคดีซึ่งมีอำนาจกำหนดวิธีการบังคับคดีตามมาตรา ๒๗๖ และมีอำนาจทำคำวินิจฉัยชี้ขาดหรือทำคำสั่งในเรื่องใด ๆ อันเกี่ยวด้วยการบังคับคดีตามคำพิพากษาหรือคำสั่ง คือศาลที่ได้พิจารณาและชี้ขาดตัดสินคดีในชั้นต้น หรือตามที่มีกฎหมายบัญญัติ ถ้าศาลอุทธรณ์หรือศาลฎีกาได้ส่งคดีไปยังศาลชั้นต้นแห่งอื่นที่มิได้มีคำพิพากษาหรือคำสั่งที่อุทธรณ์หรือฎีกานั้นเพื่อการพิจารณาและพิพากษาใหม่ตามมาตรา ๒๔๓ (๒) และ (๓) ให้ศาลที่มีคำพิพากษาหรือคำสั่งใหม่นั้นเป็นศาลที่มีอำนาจในการบังคับคดี เว้นแต่ศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี จะได้กำหนดไว้เป็นอย่างอื่น ในกรณีที่จะต้องบังคับคดีนอกเขตศาล ให้ศาลที่มีอำนาจในการบังคับคดีมีอำนาจตั้งให้ศาลอื่นบังคับคดีแทนได้ หรือเจ้าหนี้ตามคำพิพากษาอาจยื่นคำแถลงหรือเจ้าพนักงานบังคับคดีรายงานให้ศาลที่จะมีการบังคับคดีแทนทราบพร้อมด้วยสำเนาหมายบังคับคดีหรือสำเนาคำสั่งกำหนดวิธีการบังคับคดี ในกรณีเช่นว่านี้ ให้ศาลดังกล่าวแจ้งให้ศาลที่มีอำนาจในการบังคับคดีทราบโดยไม่ชักช้า และให้ศาลที่จะมีการบังคับคดีแทนตั้งเจ้าพนักงานบังคับคดีหรือมีคำสั่งอื่นใดเพื่อดำเนินการบังคับคดีต่อไป ถ้าเป็นการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้อง ให้ศาลที่บังคับคดีแทนส่งทรัพย์สินที่ได้จากการยึดหรืออายัดหรือเงินที่ได้จากการขายทรัพย์สินนั้น แล้วแต่กรณี ไปยังศาลที่มีอำนาจในการบังคับคดีเพื่อดำเนินการไปตามกฎหมาย ในกรณีที่มีการบังคับคดีนอกเขตศาลโดยบกพร่อง ผิดพลาด หรือฝ่าฝืนกฎหมาย ให้ศาลที่บังคับคดีแทนมีอำนาจสั่งเพิกถอนหรือแก้ไขกระบวนวิธีการบังคับคดีทั้งปวงหรือวิธีการบังคับคดีใด ๆ โดยเฉพาะ หรือมีคำสั่งกำหนดวิธีการอย่างใดแก่เจ้าพนักงานบังคับคดีเพื่อแก้ไขข้อบกพร่อง ผิดพลาด หรือฝ่าฝืนกฎหมายนั้น รวมถึงดำเนินกระบวนพิจารณาอื่นใดที่เกี่ยวเนื่องได้ เว้นแต่เมื่อการบังคับคดีได้เสร็จสิ้นและแจ้งผลการบังคับคดีไปยังศาลที่มีอำนาจในการบังคับคดีแล้ว ให้เป็นอำนาจของศาลที่มีอำนาจในการบังคับคดีเท่านั้น"},{"id":"๒๗๒","num":"มาตรา ๒๗๒","num_ara":"๒๗๒","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๒ คำบังคับ","paragraphs":["ถ้าศาลได้มีคำพิพากษาหรือคำสั่งอย่างใดซึ่งต้องมีการบังคับคดีแก่ลูกหนี้ตามคำพิพากษาก็ให้ศาลออกคำบังคับทันทีที่ได้อ่านหรือถือว่าได้อ่านคำพิพากษาหรือคำสั่งนั้น และให้ถือว่าลูกหนี้ตามคำพิพากษาได้ทราบคำบังคับแล้วในวันนั้น ในคดีที่ลูกหนี้ตามคำพิพากษาขาดนัดยื่นคำให้การหรือขาดนัดพิจารณา และลูกหนี้ตามคำพิพากษา ทนายความ หรือผู้รับมอบฉันทะจากบุคคลใดบุคคลหนึ่งดังกล่าวให้มาฟังคำพิพากษาหรือคำสั่ง มิได้อยู่ในศาลในเวลาที่ออกคำบังคับ ให้บังคับตามมาตรา ๑๙๙ ทวิ หรือมาตรา ๒๐๗ แล้วแต่กรณี"],"text":"ถ้าศาลได้มีคำพิพากษาหรือคำสั่งอย่างใดซึ่งต้องมีการบังคับคดีแก่ลูกหนี้ตามคำพิพากษาก็ให้ศาลออกคำบังคับทันทีที่ได้อ่านหรือถือว่าได้อ่านคำพิพากษาหรือคำสั่งนั้น และให้ถือว่าลูกหนี้ตามคำพิพากษาได้ทราบคำบังคับแล้วในวันนั้น ในคดีที่ลูกหนี้ตามคำพิพากษาขาดนัดยื่นคำให้การหรือขาดนัดพิจารณา และลูกหนี้ตามคำพิพากษา ทนายความ หรือผู้รับมอบฉันทะจากบุคคลใดบุคคลหนึ่งดังกล่าวให้มาฟังคำพิพากษาหรือคำสั่ง มิได้อยู่ในศาลในเวลาที่ออกคำบังคับ ให้บังคับตามมาตรา ๑๙๙ ทวิ หรือมาตรา ๒๐๗ แล้วแต่กรณี"},{"id":"๒๗๓","num":"มาตรา ๒๗๓","num_ara":"๒๗๓","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๒ คำบังคับ","paragraphs":["ถ้าในคำบังคับได้กำหนดให้ใช้เงิน หรือให้ส่งทรัพย์สิน หรือให้กระทำกา รหรืองดเว้นกระทำการอย่างใด ๆ ให้ศาลระบุไว้ในคำบังคับนั้นโดยชัดแจ้ง ซึ่งระยะเวลาและเงื่อนไขอื่น ๆ อันจะต้องใช้เงิน ส่งทรัพย์สิน กระทำการ หรืองดเว้นกระทำการใด ๆ นั้น แต่ถ้าเป็นคดีมโนสาเร่ ศาลไม่จำต้องให้เวลาแก่ลูกหนี้ตามคำพิพากษาเกินกว่าสิบห้าวันในอันที่จะปฏิบัติตามคำพิพากษาหรือคำสั่งนั้น ในคดีที่มีเหตุตามมาตรา ๒๗๒ วรรคสอง ให้ศาลให้เวลาแก่ลูกหนี้ตามคำพิพากษาในอันที่จะปฏิบัติตามคำพิพากษาหรือคำสั่งไม่น้อยกว่าเจ็ดวัน ระยะเวลาตามวรรคหนึ่งและวรรคสอง ให้เริ่มนับแต่วันที่ถือว่าลูกหนี้ตามคำพิพากษาได้ทราบคำบังคับแล้ว เว้นแต่ศาลจะได้กำหนดไว้โดยชัดแจ้งในเวลาที่ออกคำบังคับหรือในภายหลังว่าให้นับแต่วันใดวันหนึ่งตามที่ศาลเห็นสมควรเพื่อประโยชน์แห่งความยุติธรรม ในระหว่างที่ระยะเวลาตามคำบังคับยังไม่ครบกำหนดหรือการปฏิบัติตามวิธีการหรือเงื่อนไขในคำบังคับยังไม่เสร็จสิ้น เจ้าหนี้ตามคำพิพากษาอาจยื่นคำขอฝ่ายเดียวต่อศาลให้มีคำสั่งกำหนดวิธีการอย่างหนึ่งอย่างใดเพื่อคุ้มครองประโยชน์ของตนก็ได้ ในกรณีที่ศาลมีคำสั่งอย่างหนึ่งอย่างใดตามวรรคสี่แล้ว คำสั่งนั้นยังคงมีผลต่อไปเท่าที่จำเป็นเพื่อปฏิบัติตามคำพิพากษาหรือคำสั่งของศาล แต่ถ้าเจ้าหนี้ตามคำพิพากษามิได้ขอบังคับคดีภายในกำหนดสิบห้าวันนับแต่วันสิ้นระยะเวลาที่กำหนดไว้ในคำบังคับเพื่อให้ปฏิบัติตามคำพิพากษาหรือคำสั่ง ให้ถือว่าคำสั่งนั้นเป็นอันยกเลิกเมื่อสิ้นระยะเวลาเช่นว่านั้น"],"text":"ถ้าในคำบังคับได้กำหนดให้ใช้เงิน หรือให้ส่งทรัพย์สิน หรือให้กระทำกา รหรืองดเว้นกระทำการอย่างใด ๆ ให้ศาลระบุไว้ในคำบังคับนั้นโดยชัดแจ้ง ซึ่งระยะเวลาและเงื่อนไขอื่น ๆ อันจะต้องใช้เงิน ส่งทรัพย์สิน กระทำการ หรืองดเว้นกระทำการใด ๆ นั้น แต่ถ้าเป็นคดีมโนสาเร่ ศาลไม่จำต้องให้เวลาแก่ลูกหนี้ตามคำพิพากษาเกินกว่าสิบห้าวันในอันที่จะปฏิบัติตามคำพิพากษาหรือคำสั่งนั้น ในคดีที่มีเหตุตามมาตรา ๒๗๒ วรรคสอง ให้ศาลให้เวลาแก่ลูกหนี้ตามคำพิพากษาในอันที่จะปฏิบัติตามคำพิพากษาหรือคำสั่งไม่น้อยกว่าเจ็ดวัน ระยะเวลาตามวรรคหนึ่งและวรรคสอง ให้เริ่มนับแต่วันที่ถือว่าลูกหนี้ตามคำพิพากษาได้ทราบคำบังคับแล้ว เว้นแต่ศาลจะได้กำหนดไว้โดยชัดแจ้งในเวลาที่ออกคำบังคับหรือในภายหลังว่าให้นับแต่วันใดวันหนึ่งตามที่ศาลเห็นสมควรเพื่อประโยชน์แห่งความยุติธรรม ในระหว่างที่ระยะเวลาตามคำบังคับยังไม่ครบกำหนดหรือการปฏิบัติตามวิธีการหรือเงื่อนไขในคำบังคับยังไม่เสร็จสิ้น เจ้าหนี้ตามคำพิพากษาอาจยื่นคำขอฝ่ายเดียวต่อศาลให้มีคำสั่งกำหนดวิธีการอย่างหนึ่งอย่างใดเพื่อคุ้มครองประโยชน์ของตนก็ได้ ในกรณีที่ศาลมีคำสั่งอย่างหนึ่งอย่างใดตามวรรคสี่แล้ว คำสั่งนั้นยังคงมีผลต่อไปเท่าที่จำเป็นเพื่อปฏิบัติตามคำพิพากษาหรือคำสั่งของศาล แต่ถ้าเจ้าหนี้ตามคำพิพากษามิได้ขอบังคับคดีภายในกำหนดสิบห้าวันนับแต่วันสิ้นระยะเวลาที่กำหนดไว้ในคำบังคับเพื่อให้ปฏิบัติตามคำพิพากษาหรือคำสั่ง ให้ถือว่าคำสั่งนั้นเป็นอันยกเลิกเมื่อสิ้นระยะเวลาเช่นว่านั้น"},{"id":"๒๗๔","num":"มาตรา ๒๗๔","num_ara":"๒๗๔","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๓ การขอบังคับคดี","paragraphs":["ถ้าคู่ความหรือบุคคลซึ่งเป็นฝ่ายแพ้คดีหรือบุคคลที่ศาลมีคำพิพากษาหรือคำสั่งให้ชำระหนี้ (ลูกหนี้ตามคำพิพากษา) มิได้ปฏิบัติตามคำบังคับที่ออกตามคำพิพากษาหรือคำสั่งของศาลทั้งหมดหรือบางส่วน คู่ความหรือบุคคลซึ่งเป็นฝ่ายชนะคดีหรือบุคคลที่ศาลมีคำพิพากษาหรือคำสั่งให้ได้รับชำระหนี้ (เจ้าหนี้ตามคำพิพากษา) ชอบที่จะร้องขอให้มีการบังคับคดีโดยวิธียึดทรัพย์สิน อายัดสิทธิเรียกร้อง หรือบังคับคดีโดยวิธีอื่นตามบทบัญญัติแห่งภาคนี้ภายในสิบปีนับแต่วันที่มีคำพิพากษาหรือคำสั่ง และถ้าเจ้าหนี้ตามคำพิพากษาได้ร้องขอให้เจ้าพนักงานบังคับคดียึดทรัพย์สินหรืออายัดสิทธิเรียกร้องใดไว้ หรือได้ดำเนินการบังคับคดีโดยวิธีอื่นไว้บางส่วนแล้วภายในระยะเวลาดังกล่าว ก็ให้ดำเนินการบังคับคดีแก่ทรัพย์สินหรือสิทธิเรียกร้อง หรือบังคับคดีโดยวิธีอื่นนั้นต่อไปจนแล้วเสร็จได้ ถ้าคำพิพากษาหรือคำสั่งกำหนดให้ชำระหนี้เป็นงวด เป็นรายเดือน หรือเป็นรายปี หรือกำหนดให้ชำระหนี้อย่างใดในอนาคต ให้นับระยะเวลาสิบปีตามวรรคหนึ่งตั้งแต่วันที่หนี้ตามคำพิพากษาหรือคำสั่งนั้นอาจบังคับให้ชำระได้ ถ้าสิทธิเรียกร้องตามคำพิพากษาหรือคำสั่งเป็นการให้ชำระเงิน ส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่ง บุคคลซึ่งได้รับโอนหรือรับช่วงสิทธิตามคำพิพากษาหรือคำสั่งนั้นมีอำนาจบังคับคดีตามความในหมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน หรือหมวด ๓ การบังคับคดีในกรณีที่ให้ส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่ง แล้วแต่กรณี โดยการร้องขอต่อศาลเพื่อเข้าสวมสิทธิเป็นเจ้าหนี้ตามคำพิพากษาต่อไป"],"text":"ถ้าคู่ความหรือบุคคลซึ่งเป็นฝ่ายแพ้คดีหรือบุคคลที่ศาลมีคำพิพากษาหรือคำสั่งให้ชำระหนี้ (ลูกหนี้ตามคำพิพากษา) มิได้ปฏิบัติตามคำบังคับที่ออกตามคำพิพากษาหรือคำสั่งของศาลทั้งหมดหรือบางส่วน คู่ความหรือบุคคลซึ่งเป็นฝ่ายชนะคดีหรือบุคคลที่ศาลมีคำพิพากษาหรือคำสั่งให้ได้รับชำระหนี้ (เจ้าหนี้ตามคำพิพากษา) ชอบที่จะร้องขอให้มีการบังคับคดีโดยวิธียึดทรัพย์สิน อายัดสิทธิเรียกร้อง หรือบังคับคดีโดยวิธีอื่นตามบทบัญญัติแห่งภาคนี้ภายในสิบปีนับแต่วันที่มีคำพิพากษาหรือคำสั่ง และถ้าเจ้าหนี้ตามคำพิพากษาได้ร้องขอให้เจ้าพนักงานบังคับคดียึดทรัพย์สินหรืออายัดสิทธิเรียกร้องใดไว้ หรือได้ดำเนินการบังคับคดีโดยวิธีอื่นไว้บางส่วนแล้วภายในระยะเวลาดังกล่าว ก็ให้ดำเนินการบังคับคดีแก่ทรัพย์สินหรือสิทธิเรียกร้อง หรือบังคับคดีโดยวิธีอื่นนั้นต่อไปจนแล้วเสร็จได้ ถ้าคำพิพากษาหรือคำสั่งกำหนดให้ชำระหนี้เป็นงวด เป็นรายเดือน หรือเป็นรายปี หรือกำหนดให้ชำระหนี้อย่างใดในอนาคต ให้นับระยะเวลาสิบปีตามวรรคหนึ่งตั้งแต่วันที่หนี้ตามคำพิพากษาหรือคำสั่งนั้นอาจบังคับให้ชำระได้ ถ้าสิทธิเรียกร้องตามคำพิพากษาหรือคำสั่งเป็นการให้ชำระเงิน ส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่ง บุคคลซึ่งได้รับโอนหรือรับช่วงสิทธิตามคำพิพากษาหรือคำสั่งนั้นมีอำนาจบังคับคดีตามความในหมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน หรือหมวด ๓ การบังคับคดีในกรณีที่ให้ส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่ง แล้วแต่กรณี โดยการร้องขอต่อศาลเพื่อเข้าสวมสิทธิเป็นเจ้าหนี้ตามคำพิพากษาต่อไป"},{"id":"๒๗๕","num":"มาตรา ๒๗๕","num_ara":"๒๗๕","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๓ การขอบังคับคดี","paragraphs":["ถ้าเจ้าหนี้ตามคำพิพากษาจะขอให้มีการบังคับคดี ให้ยื่นคำขอฝ่ายเดียวต่อศาลให้บังคับคดีโดยระบุให้ชัดแจ้งซึ่ง","(๑) หนี้ที่ลูกหนี้ตามคำพิพากษายังมิได้ปฏิบัติตามคำบังคับ (๒) วิธีการที่ขอให้ศาลบังคับคดีนั้น ในระหว่างที่ศาลยังมิได้กำหนดวิธีการบังคับคดีตามที่เจ้าหนี้ตามคำพิพากษามีคำขอตามวรรคหนึ่ง ถ้ามีเหตุจำเป็น เจ้าหนี้ตามคำพิพากษาจะยื่นคำขอฝ่ายเดียวต่อศาลให้มีคำสั่งกำหนดวิธีการอย่างหนึ่งอย่างใดเพื่อคุ้มครองประโยชน์ของตนไว้ก่อนก็ได้ และถ้าศาลเห็นสมควร จะมีคำสั่งอนุญาตโดยไม่ต้องไต่สวนก็ได้ ในกรณีเช่นว่านี้ ลูกหนี้ตามคำพิพากษาอาจยื่นคำขอโดยพลันให้ศาลยกเลิกคำสั่งอนุญาตดังกล่าวได้ คำขอเช่นว่านี้อาจทำเป็นคำขอฝ่ายเดียวโดยได้รับอนุญาตจากศาล และถ้าศาลเห็นสมควรจะมีคำสั่งยกเลิกคำสั่งอนุญาตนั้นโดยไม่ต้องไต่สวนก็ได้ คำสั่งของศาลตามวรรคนี้ให้เป็นที่สุด ในกรณีที่ศาลมีคำสั่งคุ้มครองประโยชน์ของเจ้าหนี้ตามคำพิพากษาตามวรรคสองแล้ว คำสั่งนั้นยังคงมีผลต่อไปเท่าที่จำเป็นเพื่อปฏิบัติตามคำพิพากษาหรือคำสั่งของศาล"],"text":"ถ้าเจ้าหนี้ตามคำพิพากษาจะขอให้มีการบังคับคดี ให้ยื่นคำขอฝ่ายเดียวต่อศาลให้บังคับคดีโดยระบุให้ชัดแจ้งซึ่ง\n\n(๑) หนี้ที่ลูกหนี้ตามคำพิพากษายังมิได้ปฏิบัติตามคำบังคับ (๒) วิธีการที่ขอให้ศาลบังคับคดีนั้น ในระหว่างที่ศาลยังมิได้กำหนดวิธีการบังคับคดีตามที่เจ้าหนี้ตามคำพิพากษามีคำขอตามวรรคหนึ่ง ถ้ามีเหตุจำเป็น เจ้าหนี้ตามคำพิพากษาจะยื่นคำขอฝ่ายเดียวต่อศาลให้มีคำสั่งกำหนดวิธีการอย่างหนึ่งอย่างใดเพื่อคุ้มครองประโยชน์ของตนไว้ก่อนก็ได้ และถ้าศาลเห็นสมควร จะมีคำสั่งอนุญาตโดยไม่ต้องไต่สวนก็ได้ ในกรณีเช่นว่านี้ ลูกหนี้ตามคำพิพากษาอาจยื่นคำขอโดยพลันให้ศาลยกเลิกคำสั่งอนุญาตดังกล่าวได้ คำขอเช่นว่านี้อาจทำเป็นคำขอฝ่ายเดียวโดยได้รับอนุญาตจากศาล และถ้าศาลเห็นสมควรจะมีคำสั่งยกเลิกคำสั่งอนุญาตนั้นโดยไม่ต้องไต่สวนก็ได้ คำสั่งของศาลตามวรรคนี้ให้เป็นที่สุด ในกรณีที่ศาลมีคำสั่งคุ้มครองประโยชน์ของเจ้าหนี้ตามคำพิพากษาตามวรรคสองแล้ว คำสั่งนั้นยังคงมีผลต่อไปเท่าที่จำเป็นเพื่อปฏิบัติตามคำพิพากษาหรือคำสั่งของศาล"},{"id":"๒๗๖","num":"มาตรา ๒๗๖","num_ara":"๒๗๖","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๔ การพิจารณาคำขอบังคับคดี","paragraphs":["เมื่อเจ้าหนี้ตามคำพิพากษาขอให้บังคับคดี ถ้าศาลเห็นว่าลูกหนี้ตามคำพิพากษาได้ทราบหรือถือว่าได้ทราบคำบังคับแล้ว ทั้งระยะเวลาที่กำหนดไว้เพื่อให้ปฏิบัติตามคำบังคับนั้นได้ล่วงพ้นไปแล้ว และคำขอได้ระบุข้อความไว้ครบถ้วน ให้ศาลกำหนดวิธีการบังคับคดีตามที่บัญญัติไว้ในประมวลกฎหมายนี้และตามมาตรา ๒๑๓ แห่งประมวลกฎหมายแพ่งและพาณิชย์ ดังต่อไปนี้","(๑) ถ้าการบังคับคดีต้องทำโดยทางเจ้าพนักงานบังคับคดี ให้ศาลออกหมายบังคับคดีตั้งเจ้าพนักงานบังคับคดีและแจ้งให้เจ้าพนักงานบังคับคดีทราบเพื่อดำเนินการต่อไปตามที่กำหนดไว้ในหมายนั้น (๒) ถ้าการบังคับคดีอาจทำได้โดยไม่ต้องตั้งเจ้าพนักงานบังคับคดี ให้ศาลมีคำสั่งกำหนดวิธีการตามที่เห็นสมควรเท่าที่สภาพแห่งการบังคับคดีจะเปิดช่องให้กระทำได้ (๓) ถ้าเป็นการขอให้ศาลสั่งจับกุมและกักขังลูกหนี้ตามคำพิพากษา ให้ดำเนินกระบวนพิจารณาต่อไปตามบทบัญญัติว่าด้วยการนั้น ในคดีมโนสาเร่ ก่อนออกหมายบังคับคดี หากศาลเห็นเป็นการสมควร ศาลจะออกหมายเรียกลูกหนี้ตามคำพิพากษาหรือบุคคลอื่นมาสอบถามเกี่ยวกับการปฏิบัติตามคำพิพากษาเพื่อพิจารณาว่าสมควรจะออกหมายบังคับคดีหรือไม่ก็ได้ ในกรณีที่ผู้ขอบังคับคดีขอให้ดำเนินการอย่างหนึ่งอย่างใดเกี่ยวกับการบังคับคดี หากมีเหตุสงสัยว่าไม่สมควรบังคับคดีแก่ทรัพย์สินใดหรือมีเหตุสมควรอย่างอื่นเพื่อคุ้มครองบุคคลภายนอกที่อาจได้รับความเสียหายจากการดำเนินการดังกล่าว ก่อนที่ศาลจะมีคำสั่งอนุญาตตามคำขอ ศาลมีอำนาจสั่งให้ผู้ขอบังคับคดีวางเงินหรือหาประกันต่อศาลตามจำนวนและภายในระยะเวลาที่ศาลเห็นสมควรเพื่อเป็นประกันการชำระค่าสินไหมทดแทนสำหรับความเสียหายอันจะพึงเกิดขึ้นเนื่องจากการดำเนินการบังคับคดีดังกล่าว ถ้าผู้ขอบังคับคดีไม่ปฏิบัติตามคำสั่งศาล ให้ศาลมีคำสั่งยกคำขอให้ดำเนินการบังคับคดีนั้นเสีย ส่วนเงินหรือหลักประกันที่วางไว้ต่อศาลดังกล่าว เมื่อศาลเห็นว่าไม่มีความจำเป็นที่จะต้องวางไว้ต่อไป จะสั่งคืนหรือยกเลิกประกันนั้นก็ได้ คำสั่งของศาลตามวรรคนี้ให้เป็นที่สุด ในกรณีตามวรรคสาม ถ้าเกิดความเสียหายจากการบังคับคดีโดยความผิดหรือเลินเล่อของผู้ขอบังคับคดี ผู้ที่ได้รับความเสียหายอาจยื่นคำร้องต่อศาลภายในสามสิบวันนับแต่วันที่มีการดำเนินการบังคับคดีเพื่อขอให้ศาลสั่งให้ผู้ขอบังคับคดีชดใช้ค่าสินไหมทดแทนสำหรับความเสียหายที่เกิดขึ้นแก่ตนได้ ในกรณีเช่นว่านี้ ให้ศาลมีอำนาจสั่งให้แยกการพิจารณาเป็นสำนวนต่างหากจากคดีเดิม และเมื่อศาลไต่สวนแล้วเห็นว่าคำร้องนั้นฟังได้ ให้ศาลมีคำสั่งให้ผู้ขอบังคับคดีชดใช้ค่าสินไหมทดแทนตามจำนวนที่ศาลเห็นสมควร ถ้าบุคคลดังกล่าวไม่ปฏิบัติตามคำสั่งศาล ผู้ที่ได้รับความเสียหายอาจร้องขอให้ศาลบังคับคดีแก่บุคคลนั้นเสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษา"],"text":"เมื่อเจ้าหนี้ตามคำพิพากษาขอให้บังคับคดี ถ้าศาลเห็นว่าลูกหนี้ตามคำพิพากษาได้ทราบหรือถือว่าได้ทราบคำบังคับแล้ว ทั้งระยะเวลาที่กำหนดไว้เพื่อให้ปฏิบัติตามคำบังคับนั้นได้ล่วงพ้นไปแล้ว และคำขอได้ระบุข้อความไว้ครบถ้วน ให้ศาลกำหนดวิธีการบังคับคดีตามที่บัญญัติไว้ในประมวลกฎหมายนี้และตามมาตรา ๒๑๓ แห่งประมวลกฎหมายแพ่งและพาณิชย์ ดังต่อไปนี้\n\n(๑) ถ้าการบังคับคดีต้องทำโดยทางเจ้าพนักงานบังคับคดี ให้ศาลออกหมายบังคับคดีตั้งเจ้าพนักงานบังคับคดีและแจ้งให้เจ้าพนักงานบังคับคดีทราบเพื่อดำเนินการต่อไปตามที่กำหนดไว้ในหมายนั้น (๒) ถ้าการบังคับคดีอาจทำได้โดยไม่ต้องตั้งเจ้าพนักงานบังคับคดี ให้ศาลมีคำสั่งกำหนดวิธีการตามที่เห็นสมควรเท่าที่สภาพแห่งการบังคับคดีจะเปิดช่องให้กระทำได้ (๓) ถ้าเป็นการขอให้ศาลสั่งจับกุมและกักขังลูกหนี้ตามคำพิพากษา ให้ดำเนินกระบวนพิจารณาต่อไปตามบทบัญญัติว่าด้วยการนั้น ในคดีมโนสาเร่ ก่อนออกหมายบังคับคดี หากศาลเห็นเป็นการสมควร ศาลจะออกหมายเรียกลูกหนี้ตามคำพิพากษาหรือบุคคลอื่นมาสอบถามเกี่ยวกับการปฏิบัติตามคำพิพากษาเพื่อพิจารณาว่าสมควรจะออกหมายบังคับคดีหรือไม่ก็ได้ ในกรณีที่ผู้ขอบังคับคดีขอให้ดำเนินการอย่างหนึ่งอย่างใดเกี่ยวกับการบังคับคดี หากมีเหตุสงสัยว่าไม่สมควรบังคับคดีแก่ทรัพย์สินใดหรือมีเหตุสมควรอย่างอื่นเพื่อคุ้มครองบุคคลภายนอกที่อาจได้รับความเสียหายจากการดำเนินการดังกล่าว ก่อนที่ศาลจะมีคำสั่งอนุญาตตามคำขอ ศาลมีอำนาจสั่งให้ผู้ขอบังคับคดีวางเงินหรือหาประกันต่อศาลตามจำนวนและภายในระยะเวลาที่ศาลเห็นสมควรเพื่อเป็นประกันการชำระค่าสินไหมทดแทนสำหรับความเสียหายอันจะพึงเกิดขึ้นเนื่องจากการดำเนินการบังคับคดีดังกล่าว ถ้าผู้ขอบังคับคดีไม่ปฏิบัติตามคำสั่งศาล ให้ศาลมีคำสั่งยกคำขอให้ดำเนินการบังคับคดีนั้นเสีย ส่วนเงินหรือหลักประกันที่วางไว้ต่อศาลดังกล่าว เมื่อศาลเห็นว่าไม่มีความจำเป็นที่จะต้องวางไว้ต่อไป จะสั่งคืนหรือยกเลิกประกันนั้นก็ได้ คำสั่งของศาลตามวรรคนี้ให้เป็นที่สุด ในกรณีตามวรรคสาม ถ้าเกิดความเสียหายจากการบังคับคดีโดยความผิดหรือเลินเล่อของผู้ขอบังคับคดี ผู้ที่ได้รับความเสียหายอาจยื่นคำร้องต่อศาลภายในสามสิบวันนับแต่วันที่มีการดำเนินการบังคับคดีเพื่อขอให้ศาลสั่งให้ผู้ขอบังคับคดีชดใช้ค่าสินไหมทดแทนสำหรับความเสียหายที่เกิดขึ้นแก่ตนได้ ในกรณีเช่นว่านี้ ให้ศาลมีอำนาจสั่งให้แยกการพิจารณาเป็นสำนวนต่างหากจากคดีเดิม และเมื่อศาลไต่สวนแล้วเห็นว่าคำร้องนั้นฟังได้ ให้ศาลมีคำสั่งให้ผู้ขอบังคับคดีชดใช้ค่าสินไหมทดแทนตามจำนวนที่ศาลเห็นสมควร ถ้าบุคคลดังกล่าวไม่ปฏิบัติตามคำสั่งศาล ผู้ที่ได้รับความเสียหายอาจร้องขอให้ศาลบังคับคดีแก่บุคคลนั้นเสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษา"},{"id":"๒๗๗","num":"มาตรา ๒๗๗","num_ara":"๒๗๗","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๕ การขอให้ศาลไต่สวนเกี่ยวกับกิจการและทรัพย์สินของลูกหนี้ตามคำพิพากษา","paragraphs":["ในการบังคับคดี ถ้าเจ้าหนี้ตามคำพิพากษามีเหตุอันสมควรเชื่อได้ว่าลูกหนี้ตามคำพิพากษามีทรัพย์สินที่จะต้องถูกบังคับคดีมากกว่าที่ตนทราบ หรือมีทรัพย์สินที่จะต้องถูกบังคับคดีแต่ไม่ทราบว่าทรัพย์สินนั้นตั้งอยู่หรือเก็บรักษาไว้ที่ใด หรือมีเหตุอันควรสงสัยว่าทรัพย์สินใดเป็นของลูกหนี้ตามคำพิพากษาหรือไม่ เจ้าหนี้ตามคำพิพากษาอาจยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องเพื่อให้ศาลทำการไต่สวนได้ เมื่อมีคำขอตามวรรคหนึ่ง หรือเมื่อศาลเห็นสมควรเพื่อประโยชน์แก่การบังคับคดีในคดีมโนสาเร่ ศาลมีอำนาจออกหมายเรียกลูกหนี้ตามคำพิพากษาหรือบุคคลอื่นที่เชื่อว่าอยู่ในฐานะที่จะให้ถ้อยคำอันจะเป็นประโยชน์มาศาลด้วยตนเองเพื่อการไต่สวนเช่นว่านั้นได้ และมีอำนาจสั่งให้บุคคลนั้น ๆ ส่งเอกสาร หรือวัตถุพยานซึ่งอยู่ในความยึดถือหรืออำนาจของผู้นั้นอันเกี่ยวกับทรัพย์สินของลูกหนี้ตามคำพิพากษา ทั้งนี้ ตามกำหนดและเงื่อนไขใด ๆ ที่เห็นสมควร"],"text":"ในการบังคับคดี ถ้าเจ้าหนี้ตามคำพิพากษามีเหตุอันสมควรเชื่อได้ว่าลูกหนี้ตามคำพิพากษามีทรัพย์สินที่จะต้องถูกบังคับคดีมากกว่าที่ตนทราบ หรือมีทรัพย์สินที่จะต้องถูกบังคับคดีแต่ไม่ทราบว่าทรัพย์สินนั้นตั้งอยู่หรือเก็บรักษาไว้ที่ใด หรือมีเหตุอันควรสงสัยว่าทรัพย์สินใดเป็นของลูกหนี้ตามคำพิพากษาหรือไม่ เจ้าหนี้ตามคำพิพากษาอาจยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องเพื่อให้ศาลทำการไต่สวนได้ เมื่อมีคำขอตามวรรคหนึ่ง หรือเมื่อศาลเห็นสมควรเพื่อประโยชน์แก่การบังคับคดีในคดีมโนสาเร่ ศาลมีอำนาจออกหมายเรียกลูกหนี้ตามคำพิพากษาหรือบุคคลอื่นที่เชื่อว่าอยู่ในฐานะที่จะให้ถ้อยคำอันจะเป็นประโยชน์มาศาลด้วยตนเองเพื่อการไต่สวนเช่นว่านั้นได้ และมีอำนาจสั่งให้บุคคลนั้น ๆ ส่งเอกสาร หรือวัตถุพยานซึ่งอยู่ในความยึดถือหรืออำนาจของผู้นั้นอันเกี่ยวกับทรัพย์สินของลูกหนี้ตามคำพิพากษา ทั้งนี้ ตามกำหนดและเงื่อนไขใด ๆ ที่เห็นสมควร"},{"id":"๒๗๘","num":"มาตรา ๒๗๘","num_ara":"๒๗๘","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๖ อำนาจทั่วไปของเจ้าพนักงานบังคับคดี","paragraphs":["เมื่อศาลได้ออกหมายบังคับคดีตั้งเจ้าพนักงานบังคับคดีแล้ว ให้เจ้าพนักงานบังคับคดีมีอำนาจในฐานะเป็นเจ้าพนักงานศาลในการดำเนินการบังคับคดีให้เป็นไปตามที่ศาลได้กำหนดไว้ในหมายบังคับคดีและตามบทบัญญัติในลักษณะ ๒ แห่งภาคนี้ ทั้งนี้ จะเรียกให้เจ้าหนี้ตามคำพิพากษาช่วยเหลือก็ได้ คำสั่งของเจ้าพนักงานบังคับคดีในการดำเนินการบังคับคดีต้องกล่าวหรือแสดงเหตุผลไว้ด้วย ให้เจ้าพนักงานบังคับคดีมีอำนาจในฐานะเป็นผู้แทนของเจ้าหนี้ตามคำพิพากษาในอันที่จะรับชำระหนี้หรือทรัพย์สินที่ลูกหนี้ตามคำพิพากษาหรือบุคคลภายนอกนำมาวางและออกใบรับให้ เงินที่ลูกหนี้ตามคำพิพากษาหรือบุคคลภายนอกนำมาวางโดยมิได้เป็นผลมาจากการยึดหรืออายัด ให้นำมาชำระหนี้แก่เจ้าหนี้ตามคำพิพากษาผู้ขอบังคับคดี เว้นแต่ในกรณีที่มีเจ้าหนี้ผู้ขอเฉลี่ยตามมาตรา ๓๒๖ อยู่ก่อนแล้วในขณะที่มีการวางเงินนั้น ก็ให้ถือว่าเป็นเงินที่ได้ยึดหรืออายัดไว้ตามบทบัญญัติในลักษณะ ๒ แห่งภาคนี้ แต่ให้ได้รับยกเว้นค่าธรรมเนียมในการบังคับคดี ให้เจ้าพนักงานบังคับคดีทำบันทึกวิธีการบังคับคดีทั้งหลายที่ได้จัดทำไปและเก็บรักษาไว้ในที่ปลอดภัย แล้วรายงานต่อศาลเป็นระยะ ๆ ไป ในการปฏิบัติหน้าที่ของเจ้าพนักงานบังคับคดี เจ้าพนักงานบังคับคดีจะมอบหมายให้บุคคลอื่นปฏิบัติการแทนก็ได้ ทั้งนี้ ตามคุณสมบัติ หลักเกณฑ์ วิธีการ และเงื่อนไขที่กำหนดในกฎกระทรวง ให้หักค่าธรรมเนียมเจ้าพนักงานบังคับคดีตามตาราง ๕ ท้ายประมวลกฎหมายนี้ เพื่อให้กรมบังคับคดีพิจารณาจ่ายเป็นค่าตอบแทนแก่ผู้ที่ได้รับมอบหมายตามวรรคห้าโดยไม่ต้องนำส่งคลังเป็นรายได้แผ่นดิน ทั้งนี้ ตามที่รัฐมนตรีว่าการกระทรวงยุติธรรมกำหนดโดยได้รับความเห็นชอบจากกระทรวงการคลัง"],"text":"เมื่อศาลได้ออกหมายบังคับคดีตั้งเจ้าพนักงานบังคับคดีแล้ว ให้เจ้าพนักงานบังคับคดีมีอำนาจในฐานะเป็นเจ้าพนักงานศาลในการดำเนินการบังคับคดีให้เป็นไปตามที่ศาลได้กำหนดไว้ในหมายบังคับคดีและตามบทบัญญัติในลักษณะ ๒ แห่งภาคนี้ ทั้งนี้ จะเรียกให้เจ้าหนี้ตามคำพิพากษาช่วยเหลือก็ได้ คำสั่งของเจ้าพนักงานบังคับคดีในการดำเนินการบังคับคดีต้องกล่าวหรือแสดงเหตุผลไว้ด้วย ให้เจ้าพนักงานบังคับคดีมีอำนาจในฐานะเป็นผู้แทนของเจ้าหนี้ตามคำพิพากษาในอันที่จะรับชำระหนี้หรือทรัพย์สินที่ลูกหนี้ตามคำพิพากษาหรือบุคคลภายนอกนำมาวางและออกใบรับให้ เงินที่ลูกหนี้ตามคำพิพากษาหรือบุคคลภายนอกนำมาวางโดยมิได้เป็นผลมาจากการยึดหรืออายัด ให้นำมาชำระหนี้แก่เจ้าหนี้ตามคำพิพากษาผู้ขอบังคับคดี เว้นแต่ในกรณีที่มีเจ้าหนี้ผู้ขอเฉลี่ยตามมาตรา ๓๒๖ อยู่ก่อนแล้วในขณะที่มีการวางเงินนั้น ก็ให้ถือว่าเป็นเงินที่ได้ยึดหรืออายัดไว้ตามบทบัญญัติในลักษณะ ๒ แห่งภาคนี้ แต่ให้ได้รับยกเว้นค่าธรรมเนียมในการบังคับคดี ให้เจ้าพนักงานบังคับคดีทำบันทึกวิธีการบังคับคดีทั้งหลายที่ได้จัดทำไปและเก็บรักษาไว้ในที่ปลอดภัย แล้วรายงานต่อศาลเป็นระยะ ๆ ไป ในการปฏิบัติหน้าที่ของเจ้าพนักงานบังคับคดี เจ้าพนักงานบังคับคดีจะมอบหมายให้บุคคลอื่นปฏิบัติการแทนก็ได้ ทั้งนี้ ตามคุณสมบัติ หลักเกณฑ์ วิธีการ และเงื่อนไขที่กำหนดในกฎกระทรวง ให้หักค่าธรรมเนียมเจ้าพนักงานบังคับคดีตามตาราง ๕ ท้ายประมวลกฎหมายนี้ เพื่อให้กรมบังคับคดีพิจารณาจ่ายเป็นค่าตอบแทนแก่ผู้ที่ได้รับมอบหมายตามวรรคห้าโดยไม่ต้องนำส่งคลังเป็นรายได้แผ่นดิน ทั้งนี้ ตามที่รัฐมนตรีว่าการกระทรวงยุติธรรมกำหนดโดยได้รับความเห็นชอบจากกระทรวงการคลัง"},{"id":"๒๗๙","num":"มาตรา ๒๗๙","num_ara":"๒๗๙","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๖ อำนาจทั่วไปของเจ้าพนักงานบังคับคดี","paragraphs":["ให้เจ้าพนักงานบังคับคดีรักษาไว้โดยปลอดภัยซึ่งเงิน ทรัพย์สิน และเอกสารที่ได้มาตามอำนาจหน้าที่ของตน รวมทั้งให้มีอำนาจขัดขวางมิให้บุคคลใดสอดเข้าเกี่ยวข้องโดยมิชอบด้วยกฎหมายกับเงินหรือทรัพย์สินหรือเอกสารเช่นว่านั้น ตลอดจนมีอำนาจติดตามและเอาคืนซึ่งเงินหรือทรัพย์สินหรือเอกสารดังกล่าวจากบุคคลผู้ไม่มีสิทธิจะยึดถือเอาไว้ ในการดำเนินการตามวรรคหนึ่ง เมื่อมีความจำเป็น เจ้าพนักงานบังคับคดีมีอำนาจแจ้งให้พนักงานฝ่ายปกครองหรือตำรวจช่วยเหลือได้ ในกรณีเช่นนี้ พนักงานฝ่ายปกครองหรือตำรวจมีอำนาจจับกุมและควบคุมตัวผู้สอดเข้าเกี่ยวข้องหรือผู้ไม่มีสิทธิจะยึดถือตามวรรคหนึ่งได้เท่าที่จำเป็นในการปฏิบัติหน้าที่ของเจ้าพนักงานบังคับคดี"],"text":"ให้เจ้าพนักงานบังคับคดีรักษาไว้โดยปลอดภัยซึ่งเงิน ทรัพย์สิน และเอกสารที่ได้มาตามอำนาจหน้าที่ของตน รวมทั้งให้มีอำนาจขัดขวางมิให้บุคคลใดสอดเข้าเกี่ยวข้องโดยมิชอบด้วยกฎหมายกับเงินหรือทรัพย์สินหรือเอกสารเช่นว่านั้น ตลอดจนมีอำนาจติดตามและเอาคืนซึ่งเงินหรือทรัพย์สินหรือเอกสารดังกล่าวจากบุคคลผู้ไม่มีสิทธิจะยึดถือเอาไว้ ในการดำเนินการตามวรรคหนึ่ง เมื่อมีความจำเป็น เจ้าพนักงานบังคับคดีมีอำนาจแจ้งให้พนักงานฝ่ายปกครองหรือตำรวจช่วยเหลือได้ ในกรณีเช่นนี้ พนักงานฝ่ายปกครองหรือตำรวจมีอำนาจจับกุมและควบคุมตัวผู้สอดเข้าเกี่ยวข้องหรือผู้ไม่มีสิทธิจะยึดถือตามวรรคหนึ่งได้เท่าที่จำเป็นในการปฏิบัติหน้าที่ของเจ้าพนักงานบังคับคดี"},{"id":"๒๘๐","num":"มาตรา ๒๘๐","num_ara":"๒๘๐","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๖ อำนาจทั่วไปของเจ้าพนักงานบังคับคดี","paragraphs":["ให้เจ้าพนักงานบังคับคดีมีอำนาจส่งเอกสารเกี่ยวกับการบังคับคดีตามคำพิพากษาหรือคำสั่งตามบทบัญญัติในลักษณะ ๒ แห่งภาคนี้ และให้รายงานการส่งเอกสารนั้นรวมไว้ในสำนวนการบังคับคดีด้วย ทั้งนี้ ให้นำบทบัญญัติมาตรา ๖๘ มาตรา ๗๓ มาตรา ๗๔ มาตรา ๗๖ มาตรา ๗๗ มาตรา ๗๘ และมาตรา ๘๐ มาใช้บังคับโดยอนุโลม นอกจากการส่งเอกสารตามวรรคหนึ่ง ให้เจ้าพนักงานบังคับคดีมีอำนาจสั่งให้ส่งโดยทางไปรษณีย์ลงทะเบียนตอบรับหรือโดยทางไปรษณีย์ด่วนพิเศษในประเทศก็ได้ โดยให้ผู้มีหน้าที่นำส่งเป็นผู้เสียค่าใช้จ่าย กรณีเช่นว่านี้ ให้ถือว่าเอกสารที่ส่งโดยเจ้าพนักงานไปรษณีย์มีผลเสมือนเจ้าพนักงานบังคับคดีเป็นผู้ส่งและให้นำบทบัญญัติมาตรา ๗๔ มาตรา ๗๖ และมาตรา ๗๗ มาใช้บังคับโดยอนุโลม ถ้าการส่งเอกสารไม่สามารถจะทำได้ดังที่บัญญัติไว้ตามวรรคหนึ่งและวรรคสอง เจ้าพนักงานบังคับคดีมีอำนาจสั่งให้ส่งโดยวิธีอื่นแทนได้ กล่าวคือ ปิดเอกสารไว้ในที่แลเห็นได้ง่าย ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลผู้มีชื่อระบุไว้ในเอกสารหรือมอบหมายเอกสารไว้แก่พนักงานฝ่ายปกครองหรือตำรวจแล้วปิดประกาศแสดงการที่ได้มอบหมายดังกล่าวแล้ว หรือลงโฆษณา หรือทำวิธีอื่นใดตามที่เห็นสมควร ทั้งนี้ ให้มีผลใช้ได้ต่อเมื่อกำหนดเวลาสิบห้าวันหรือระยะเวลานานกว่านั้นตามที่เจ้าพนักงานบังคับคดีเห็นสมควรกำหนดไว้ล่วงพ้นไปแล้ว นับแต่เวลาที่เอกสารหรือประกาศแสดงการมอบหมายนั้นได้ปิดไว้หรือการโฆษณาหรือวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีสั่งนั้นได้ทำหรือได้ตั้งต้นแล้ว การส่งเอกสารให้แก่คู่ความและบุคคลภายนอก ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลดังกล่าวนอกราชอาณาจักร ถ้าไม่มีข้อตกลงระหว่างประเทศที่ประเทศไทยเป็นภาคีกำหนดไว้เป็นอย่างอื่น เจ้าพนักงานบังคับคดีมีอำนาจสั่งให้ส่งโดยทางไปรษณีย์ด่วนพิเศษระหว่างประเทศหรือผู้ประกอบกิจการรับส่งพัสดุภัณฑ์ระหว่างประเทศ หรือโดยผ่านกระทรวงยุติธรรมและกระทรวงการต่างประเทศ หากไม่อาจกระทำได้เพราะเหตุที่ภูมิลำเนาและสำนักทำการงานของบุคคลดังกล่าวไม่ปรากฏหรือเพราะเหตุอื่นใด หรือเมื่อได้ดำเนินการส่งให้แก่คู่ความหรือบุคคลภายนอกแล้วแต่ไม่อาจทราบผลการส่งได้ ถ้าเจ้าพนักงานบังคับคดีเห็นสมควร ให้มีอำนาจสั่งให้ส่งเอกสารโดยวิธีอื่นแทนได้ กล่าวคือ ปิดเอกสารไว้ในที่แลเห็นได้ง่าย ณ สำนักงานที่ตั้งของเจ้าพนักงานบังคับคดี หรือลงโฆษณา หรือทำวิธีอื่นใดตามที่เห็นสมควร"],"text":"ให้เจ้าพนักงานบังคับคดีมีอำนาจส่งเอกสารเกี่ยวกับการบังคับคดีตามคำพิพากษาหรือคำสั่งตามบทบัญญัติในลักษณะ ๒ แห่งภาคนี้ และให้รายงานการส่งเอกสารนั้นรวมไว้ในสำนวนการบังคับคดีด้วย ทั้งนี้ ให้นำบทบัญญัติมาตรา ๖๘ มาตรา ๗๓ มาตรา ๗๔ มาตรา ๗๖ มาตรา ๗๗ มาตรา ๗๘ และมาตรา ๘๐ มาใช้บังคับโดยอนุโลม นอกจากการส่งเอกสารตามวรรคหนึ่ง ให้เจ้าพนักงานบังคับคดีมีอำนาจสั่งให้ส่งโดยทางไปรษณีย์ลงทะเบียนตอบรับหรือโดยทางไปรษณีย์ด่วนพิเศษในประเทศก็ได้ โดยให้ผู้มีหน้าที่นำส่งเป็นผู้เสียค่าใช้จ่าย กรณีเช่นว่านี้ ให้ถือว่าเอกสารที่ส่งโดยเจ้าพนักงานไปรษณีย์มีผลเสมือนเจ้าพนักงานบังคับคดีเป็นผู้ส่งและให้นำบทบัญญัติมาตรา ๗๔ มาตรา ๗๖ และมาตรา ๗๗ มาใช้บังคับโดยอนุโลม ถ้าการส่งเอกสารไม่สามารถจะทำได้ดังที่บัญญัติไว้ตามวรรคหนึ่งและวรรคสอง เจ้าพนักงานบังคับคดีมีอำนาจสั่งให้ส่งโดยวิธีอื่นแทนได้ กล่าวคือ ปิดเอกสารไว้ในที่แลเห็นได้ง่าย ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลผู้มีชื่อระบุไว้ในเอกสารหรือมอบหมายเอกสารไว้แก่พนักงานฝ่ายปกครองหรือตำรวจแล้วปิดประกาศแสดงการที่ได้มอบหมายดังกล่าวแล้ว หรือลงโฆษณา หรือทำวิธีอื่นใดตามที่เห็นสมควร ทั้งนี้ ให้มีผลใช้ได้ต่อเมื่อกำหนดเวลาสิบห้าวันหรือระยะเวลานานกว่านั้นตามที่เจ้าพนักงานบังคับคดีเห็นสมควรกำหนดไว้ล่วงพ้นไปแล้ว นับแต่เวลาที่เอกสารหรือประกาศแสดงการมอบหมายนั้นได้ปิดไว้หรือการโฆษณาหรือวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีสั่งนั้นได้ทำหรือได้ตั้งต้นแล้ว การส่งเอกสารให้แก่คู่ความและบุคคลภายนอก ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลดังกล่าวนอกราชอาณาจักร ถ้าไม่มีข้อตกลงระหว่างประเทศที่ประเทศไทยเป็นภาคีกำหนดไว้เป็นอย่างอื่น เจ้าพนักงานบังคับคดีมีอำนาจสั่งให้ส่งโดยทางไปรษณีย์ด่วนพิเศษระหว่างประเทศหรือผู้ประกอบกิจการรับส่งพัสดุภัณฑ์ระหว่างประเทศ หรือโดยผ่านกระทรวงยุติธรรมและกระทรวงการต่างประเทศ หากไม่อาจกระทำได้เพราะเหตุที่ภูมิลำเนาและสำนักทำการงานของบุคคลดังกล่าวไม่ปรากฏหรือเพราะเหตุอื่นใด หรือเมื่อได้ดำเนินการส่งให้แก่คู่ความหรือบุคคลภายนอกแล้วแต่ไม่อาจทราบผลการส่งได้ ถ้าเจ้าพนักงานบังคับคดีเห็นสมควร ให้มีอำนาจสั่งให้ส่งเอกสารโดยวิธีอื่นแทนได้ กล่าวคือ ปิดเอกสารไว้ในที่แลเห็นได้ง่าย ณ สำนักงานที่ตั้งของเจ้าพนักงานบังคับคดี หรือลงโฆษณา หรือทำวิธีอื่นใดตามที่เห็นสมควร"},{"id":"๒๘๑","num":"มาตรา ๒๘๑","num_ara":"๒๘๑","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๖ อำนาจทั่วไปของเจ้าพนักงานบังคับคดี","paragraphs":["เจ้าพนักงานบังคับคดีจะต้องดำเนินการบังคับคดีในวันทำการงานปกติในเวลาระหว่างพระอาทิตย์ขึ้นและพระอาทิตย์ตก ถ้ายังไม่แล้วเสร็จประกอบกับมีความจำเป็นและสมควรจะกระทำต่อไปในเวลาหลังพระอาทิตย์ตกก็ได้ ปิดสถานที่ดังกล่าวรวมทั้งตู้นิรภัย ตู้ หรือที่เก็บของอื่น ๆ"],"text":"ในกรณีที่มีเหตุอันควรเชื่อว่ามีทรัพย์สินของลูกหนี้ตามคำพิพากษาหรือมีบัญชี เอกสาร จดหมาย หรือวัตถุอื่นใดเกี่ยวกับทรัพย์สินหรือกิจการของลูกหนี้ตามคำพิพากษาอยู่ในสถานที่ใด ๆ ที่ลูกหนี้ตามคำพิพากษาครอบครองหรือครอบครองร่วมกับผู้อื่น ให้เจ้าพนักงานบังคับคดีมีอำนาจค้นสถานที่ดังกล่าว ทั้งมีอำนาจตรวจสอบและยึดบัญชี เอกสาร จดหมาย หรือวัตถุอื่นใดอันเกี่ยวกับทรัพย์สินหรือกิจการของลูกหนี้ตามคำพิพากษามาเพื่อตรวจสอบได้ และมีอำนาจกระทำการใด ๆ ตามที่จำเป็น เพื่อเปิดสถานที่ดังกล่าวรวมทั้งตู้นิรภัย ตู้ หรือที่เก็บของอื่น ๆ"},{"id":"๒๘๓","num":"มาตรา ๒๘๓","num_ara":"๒๘๓","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๖ อำนาจทั่วไปของเจ้าพนักงานบังคับคดี","paragraphs":["ในกรณีที่มีเหตุอันควรเชื่อว่ามีทรัพย์สินของลูกหนี้ตามคำพิพากษาหรือมีบัญชี เอกสาร จดหมาย หรือวัตถุอื่นใดอันเกี่ยวกับทรัพย์สินหรือกิจการของลูกหนี้ตามคำพิพากษาอยู่ในสถานที่ที่บุคคลอื่นครอบครองอยู่ เจ้าหนี้ตามคำพิพากษาอาจยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องต่อศาลเพื่อขอให้ศาลออกหมายค้นสถานที่นั้น เมื่อได้รับคำร้องเช่นว่านี้ ให้ศาลไต่สวนโดยไม่ชักช้า ถ้าเป็นที่พอใจจากพยานหลักฐานที่เจ้าหนี้ตามคำพิพากษาได้นำมาสืบหรือที่ศาลได้เรียกมาสืบเองว่ามีเหตุอันควรเชื่อตามที่ร้องขอ ให้ศาลมีอำนาจออกหมายค้นสถานที่นั้นเพื่อให้เจ้าพนักงานบังคับคดีตรวจสอบและยึดทรัพย์สินหรือสิ่งต่าง ๆ ดังกล่าวภายในขอบเขตและเงื่อนไขตามที่ศาลเห็นว่าจำเป็น ถ้าศาลมีคำสั่งยกคำขอคำสั่งเช่นว่านั้นให้เป็นที่สุด"],"text":"ในกรณีที่มีเหตุอันควรเชื่อว่ามีทรัพย์สินของลูกหนี้ตามคำพิพากษาหรือมีบัญชี เอกสาร จดหมาย หรือวัตถุอื่นใดอันเกี่ยวกับทรัพย์สินหรือกิจการของลูกหนี้ตามคำพิพากษาอยู่ในสถานที่ที่บุคคลอื่นครอบครองอยู่ เจ้าหนี้ตามคำพิพากษาอาจยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องต่อศาลเพื่อขอให้ศาลออกหมายค้นสถานที่นั้น เมื่อได้รับคำร้องเช่นว่านี้ ให้ศาลไต่สวนโดยไม่ชักช้า ถ้าเป็นที่พอใจจากพยานหลักฐานที่เจ้าหนี้ตามคำพิพากษาได้นำมาสืบหรือที่ศาลได้เรียกมาสืบเองว่ามีเหตุอันควรเชื่อตามที่ร้องขอ ให้ศาลมีอำนาจออกหมายค้นสถานที่นั้นเพื่อให้เจ้าพนักงานบังคับคดีตรวจสอบและยึดทรัพย์สินหรือสิ่งต่าง ๆ ดังกล่าวภายในขอบเขตและเงื่อนไขตามที่ศาลเห็นว่าจำเป็น ถ้าศาลมีคำสั่งยกคำขอคำสั่งเช่นว่านั้นให้เป็นที่สุด"},{"id":"๒๘๔","num":"มาตรา ๒๘๔","num_ara":"๒๘๔","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๖ อำนาจทั่วไปของเจ้าพนักงานบังคับคดี","paragraphs":["ให้เจ้าพนักงานบังคับคดีมีอำนาจดำเนินการไปตามความจำเป็นและสมควรแห่งพฤติการณ์เพื่อดำเนินการบังคับคดีจนได้ ในกรณีที่มีผู้ขัดขวางหรือมีเหตุอันควรเชื่อว่าจะมีผู้ขัดขวาง เจ้าพนักงานบังคับคดีมีอำนาจแจ้งให้พนักงานฝ่ายปกครองหรือตำรวจช่วยเหลือได้ ในการนี้ ให้พนักงานฝ่ายปกครองหรือตำรวจมีอำนาจจับกุมและควบคุมตัวผู้ขัดขวางได้เท่าที่จำเป็นแก่การปฏิบัติหน้าที่ของเจ้าพนักงานบังคับคดี"],"text":"ให้เจ้าพนักงานบังคับคดีมีอำนาจดำเนินการไปตามความจำเป็นและสมควรแห่งพฤติการณ์เพื่อดำเนินการบังคับคดีจนได้ ในกรณีที่มีผู้ขัดขวางหรือมีเหตุอันควรเชื่อว่าจะมีผู้ขัดขวาง เจ้าพนักงานบังคับคดีมีอำนาจแจ้งให้พนักงานฝ่ายปกครองหรือตำรวจช่วยเหลือได้ ในการนี้ ให้พนักงานฝ่ายปกครองหรือตำรวจมีอำนาจจับกุมและควบคุมตัวผู้ขัดขวางได้เท่าที่จำเป็นแก่การปฏิบัติหน้าที่ของเจ้าพนักงานบังคับคดี"},{"id":"๒๘๕","num":"มาตรา ๒๘๕","num_ara":"๒๘๕","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๖ อำนาจทั่วไปของเจ้าพนักงานบังคับคดี","paragraphs":["ความรับผิดทางละเมิดตามประมวลกฎหมายแพ่งและพาณิชย์ต่อลูกหนี้ตามคำพิพากษาหรือต่อบุคคลภายนอกเพื่อความเสียหายที่เกิดจากหรือเกี่ยวเนื่องกับการยึด อายัด หรือขายทรัพย์สินโดยมิชอบหรือเกินกว่าที่จำเป็นแก่การบังคับคดี หรือการบังคับคดีโดยมิชอบในกรณีอื่นย่อมไม่ตกแก่เจ้าพนักงานบังคับคดี แต่ตกอยู่แก่เจ้าหนี้ตามคำพิพากษา เว้นแต่ในกรณีเจ้าพนักงานบังคับคดีได้กระทำการฝ่าฝืนต่อบทบัญญัติแห่งประมวลกฎหมายนี้ ในกรณีที่ความรับผิดตกแก่เจ้าพนักงานบังคับคดีตามวรรคหนึ่ง และเป็นเรื่องความรับผิดทางละเมิดของเจ้าหน้าที่ในการปฏิบัติหน้าที่ การใช้สิทธิฟ้องคดีต่อศาลตามกฎหมายว่าด้วยความรับผิดทางละเมิดของเจ้าหน้าที่หรือตามกฎหมายอื่นไม่ว่าโดยบุคคลใด ให้อยู่ในอำนาจของศาลยุติธรรม ถ้าเจ้าพนักงานบังคับคดีไม่ยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องอันจะต้องยึดหรืออายัด หรือไม่ขายทรัพย์สิน หรือไม่ดำเนินการบังคับคดีในกรณีอื่น หรือไม่กระทำการดังกล่าวภายในเวลาอันควร โดยจงใจหรือปราศจากความระมัดระวังหรือโดยสมรู้เป็นใจกับลูกหนี้ตามคำพิพากษาเป็นเหตุให้เจ้าหนี้ตามคำพิพากษาได้รับความเสียหาย ให้นำความในวรรคสองมาใช้บังคับโดยอนุโลม"],"text":"ความรับผิดทางละเมิดตามประมวลกฎหมายแพ่งและพาณิชย์ต่อลูกหนี้ตามคำพิพากษาหรือต่อบุคคลภายนอกเพื่อความเสียหายที่เกิดจากหรือเกี่ยวเนื่องกับการยึด อายัด หรือขายทรัพย์สินโดยมิชอบหรือเกินกว่าที่จำเป็นแก่การบังคับคดี หรือการบังคับคดีโดยมิชอบในกรณีอื่นย่อมไม่ตกแก่เจ้าพนักงานบังคับคดี แต่ตกอยู่แก่เจ้าหนี้ตามคำพิพากษา เว้นแต่ในกรณีเจ้าพนักงานบังคับคดีได้กระทำการฝ่าฝืนต่อบทบัญญัติแห่งประมวลกฎหมายนี้ ในกรณีที่ความรับผิดตกแก่เจ้าพนักงานบังคับคดีตามวรรคหนึ่ง และเป็นเรื่องความรับผิดทางละเมิดของเจ้าหน้าที่ในการปฏิบัติหน้าที่ การใช้สิทธิฟ้องคดีต่อศาลตามกฎหมายว่าด้วยความรับผิดทางละเมิดของเจ้าหน้าที่หรือตามกฎหมายอื่นไม่ว่าโดยบุคคลใด ให้อยู่ในอำนาจของศาลยุติธรรม ถ้าเจ้าพนักงานบังคับคดีไม่ยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องอันจะต้องยึดหรืออายัด หรือไม่ขายทรัพย์สิน หรือไม่ดำเนินการบังคับคดีในกรณีอื่น หรือไม่กระทำการดังกล่าวภายในเวลาอันควร โดยจงใจหรือปราศจากความระมัดระวังหรือโดยสมรู้เป็นใจกับลูกหนี้ตามคำพิพากษาเป็นเหตุให้เจ้าหนี้ตามคำพิพากษาได้รับความเสียหาย ให้นำความในวรรคสองมาใช้บังคับโดยอนุโลม"},{"id":"๒๘๖","num":"มาตรา ๒๘๖","num_ara":"๒๘๖","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๖ อำนาจทั่วไปของเจ้าพนักงานบังคับคดี","paragraphs":["ในกรณีที่มีกฎหมายบัญญัติให้นำบทบัญญัติแห่งประมวลกฎหมายวิธีพิจารณาความแพ่งไปใช้บังคับโดยอนุโลมกับการดำเนินการบังคับคดีตามคำพิพากษาหรือคำสั่งของศาลอื่นที่ไม่ใช่ศาลยุติธรรม คำว่า ศาลยุติธรรม ตามมาตรา ๒๘๕ วรรคสอง ให้หมายถึงศาลนั้น"],"text":"ในกรณีที่มีกฎหมายบัญญัติให้นำบทบัญญัติแห่งประมวลกฎหมายวิธีพิจารณาความแพ่งไปใช้บังคับโดยอนุโลมกับการดำเนินการบังคับคดีตามคำพิพากษาหรือคำสั่งของศาลอื่นที่ไม่ใช่ศาลยุติธรรม คำว่า ศาลยุติธรรม ตามมาตรา ๒๘๕ วรรคสอง ให้หมายถึงศาลนั้น"},{"id":"๒๘๗","num":"มาตรา ๒๘๗","num_ara":"๒๘๗","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๗ ผู้มีส่วนได้เสียในการบังคับคดี","paragraphs":["บุคคลผู้มีส่วนได้เสียในการบังคับคดี ได้แก่","(๑) เจ้าหนี้ตามคำพิพากษา ลูกหนี้ตามคำพิพากษา และในกรณีที่มีการอายัดสิทธิเรียกร้อง ให้รวมถึงลูกหนี้แห่งสิทธิเรียกร้อง ผู้ทรงสิทธิเรียกร้อง หรือผู้รับโอนสิทธิเรียกร้องนั้นด้วย (๒) บุคคลผู้มีทรัพยสิทธิหรือได้จดทะเบียนสิทธิของตนเกี่ยวกับทรัพย์สินที่ถูกบังคับคดี (๓) บุคคลซึ่งได้ยื่นคำร้องขอตามมาตรา ๓๒๓ มาตรา ๓๒๔ มาตรา ๓๒๖ และมาตรา ๓๒๙ เกี่ยวกับทรัพย์สินหรือสิทธิเรียกร้องที่ถูกบังคับคดี (๔) บุคคลผู้เป็นเจ้าของรวมหรือบุคคลผู้มีบุริมสิทธิ สิทธิยึดหน่วง หรือสิทธิอื่นตามมาตรา ๓๒๒ เกี่ยวกับทรัพย์สินหรือสิทธิเรียกร้องที่ถูกบังคับคดี (๕) บุคคลอื่นใดซึ่งต้องเสียหายเพราะเหตุแห่งการดำเนินการบังคับคดีนั้น"],"text":"บุคคลผู้มีส่วนได้เสียในการบังคับคดี ได้แก่\n\n(๑) เจ้าหนี้ตามคำพิพากษา ลูกหนี้ตามคำพิพากษา และในกรณีที่มีการอายัดสิทธิเรียกร้อง ให้รวมถึงลูกหนี้แห่งสิทธิเรียกร้อง ผู้ทรงสิทธิเรียกร้อง หรือผู้รับโอนสิทธิเรียกร้องนั้นด้วย (๒) บุคคลผู้มีทรัพยสิทธิหรือได้จดทะเบียนสิทธิของตนเกี่ยวกับทรัพย์สินที่ถูกบังคับคดี (๓) บุคคลซึ่งได้ยื่นคำร้องขอตามมาตรา ๓๒๓ มาตรา ๓๒๔ มาตรา ๓๒๖ และมาตรา ๓๒๙ เกี่ยวกับทรัพย์สินหรือสิทธิเรียกร้องที่ถูกบังคับคดี (๔) บุคคลผู้เป็นเจ้าของรวมหรือบุคคลผู้มีบุริมสิทธิ สิทธิยึดหน่วง หรือสิทธิอื่นตามมาตรา ๓๒๒ เกี่ยวกับทรัพย์สินหรือสิทธิเรียกร้องที่ถูกบังคับคดี (๕) บุคคลอื่นใดซึ่งต้องเสียหายเพราะเหตุแห่งการดำเนินการบังคับคดีนั้น"},{"id":"๒๘๘","num":"มาตรา ๒๘๘","num_ara":"๒๘๘","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๗ ผู้มีส่วนได้เสียในการบังคับคดี","paragraphs":["นอกจากสิทธิอื่นตามที่บัญญัติไว้ในประมวลกฎหมายนี้แล้ว ให้ผู้มีส่วนได้เสียในการบังคับคดีมีสิทธิดังต่อไปนี้","(๑) อยู่รู้เห็นด้วยในการดำเนินการบังคับคดีที่ตนมีส่วนได้เสีย แต่ต้องไม่ทำการป้องกันหรือขัดขวางการบังคับคดี รวมทั้งเข้าสู้ราคาหรือหาบุคคลอื่นเข้าสู้ราคาในการขายทอดตลาด (๒) ขออนุญาตตรวจหรือคัดสำเนาเอกสารอันเกี่ยวด้วยการบังคับคดีทั้งหมดหรือแต่บางฉบับ หรือขอให้เจ้าพนักงานบังคับคดีคัดหรือรับรองสำเนาเอกสารนั้นโดยเสียค่าธรรมเนียมตามที่ระบุไว้ในตาราง ๒ ท้ายประมวลกฎหมายนี้"],"text":"นอกจากสิทธิอื่นตามที่บัญญัติไว้ในประมวลกฎหมายนี้แล้ว ให้ผู้มีส่วนได้เสียในการบังคับคดีมีสิทธิดังต่อไปนี้\n\n(๑) อยู่รู้เห็นด้วยในการดำเนินการบังคับคดีที่ตนมีส่วนได้เสีย แต่ต้องไม่ทำการป้องกันหรือขัดขวางการบังคับคดี รวมทั้งเข้าสู้ราคาหรือหาบุคคลอื่นเข้าสู้ราคาในการขายทอดตลาด (๒) ขออนุญาตตรวจหรือคัดสำเนาเอกสารอันเกี่ยวด้วยการบังคับคดีทั้งหมดหรือแต่บางฉบับ หรือขอให้เจ้าพนักงานบังคับคดีคัดหรือรับรองสำเนาเอกสารนั้นโดยเสียค่าธรรมเนียมตามที่ระบุไว้ในตาราง ๒ ท้ายประมวลกฎหมายนี้"},{"id":"๒๘๙","num":"มาตรา ๒๘๙","num_ara":"๒๘๙","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๘ การงดการบังคับคดี","paragraphs":["ให้เจ้าพนักงานบังคับคดีงดการบังคับคดีในกรณีดังต่อไปนี้","(๑) เมื่อศาลได้มีคำสั่งให้งดการบังคับคดีเพราะเหตุมีการยื่นคำขอให้พิจารณาคดีใหม่และได้แจ้งให้เจ้าพนักงานบังคับคดีทราบตามที่บัญญัติไว้ในมาตรา ๑๙๙ เบญจ วรรคหนึ่ง หรือมาตรา ๒๐๗ ในกรณีดังกล่าว ถ้าเจ้าหนี้ตามคำพิพากษายื่นคำร้องว่าตนอาจได้รับความเสียหายจากการยื่นคำขอดังกล่าวและมีพยานหลักฐานเบื้องต้นแสดงว่าคำขอนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงการบังคับคดี ศาลมีอำนาจสั่งให้ลูกหนี้ตามคำพิพากษาวางเงินหรือหาประกันตามที่ศาลเห็นสมควรภายในระยะเวลาที่ศาลจะกำหนด เพื่อเป็นประกันการชำระค่าสินไหมทดแทนแก่เจ้าหนี้ตามคำพิพากษาสำหรับความเสียหายที่อาจได้รับเนื่องจากเหตุเนิ่นช้าในการบังคับคดีอันเกิดจากการยื่นคำขอนั้น หรือกำหนดวิธีการชั่วคราวเพื่อคุ้มครองอย่างใด ๆ ตามที่เห็นสมควรก็ได้ ถ้าลูกหนี้ตามคำพิพากษาไม่ปฏิบัติตามคำสั่งศาล ให้ศาลสั่งเพิกถอนคำสั่งที่ให้งดการบังคับคดี (๒) เมื่อศาลได้มีคำสั่งให้งดการบังคับคดี และได้ส่งคำสั่งนั้นไปให้เจ้าพนักงานบังคับคดีทราบ ในกรณีเช่นนี้ให้เจ้าพนักงานบังคับคดีงดการบังคับคดีไว้ภายในระยะเวลาหรือเงื่อนไขตามที่ศาลกำหนด (๓) เมื่อเจ้าหนี้ตามคำพิพากษาได้แจ้งเป็นหนังสือไปยังเจ้าพนักงานบังคับคดีว่าตนตกลงงดการบังคับคดีไว้ชั่วระยะเวลาที่กำหนดไว้หรือภายในเงื่อนไขอย่างใดอย่างหนึ่งโดยได้รับความยินยอมเป็นหนังสือจากลูกหนี้ตามคำพิพากษาและบุคคลภายนอกผู้มีส่วนได้เสียในการบังคับคดี (๔) เมื่อเจ้าหนี้ผู้ขอบังคับคดีไม่ปฏิบัติตามมาตรา ๑๕๔ ให้เจ้าพนักงานบังคับคดีส่งคำบอกกล่าวงดการบังคับคดีให้เจ้าหนี้ตามคำพิพากษาและบุคคลภายนอกผู้มีส่วนได้เสียทราบโดยไม่ชักช้า เว้นแต่จะได้งดการบังคับคดีตามคำขอของบุคคลนั้นเอง"],"text":"ให้เจ้าพนักงานบังคับคดีงดการบังคับคดีในกรณีดังต่อไปนี้\n\n(๑) เมื่อศาลได้มีคำสั่งให้งดการบังคับคดีเพราะเหตุมีการยื่นคำขอให้พิจารณาคดีใหม่และได้แจ้งให้เจ้าพนักงานบังคับคดีทราบตามที่บัญญัติไว้ในมาตรา ๑๙๙ เบญจ วรรคหนึ่ง หรือมาตรา ๒๐๗ ในกรณีดังกล่าว ถ้าเจ้าหนี้ตามคำพิพากษายื่นคำร้องว่าตนอาจได้รับความเสียหายจากการยื่นคำขอดังกล่าวและมีพยานหลักฐานเบื้องต้นแสดงว่าคำขอนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงการบังคับคดี ศาลมีอำนาจสั่งให้ลูกหนี้ตามคำพิพากษาวางเงินหรือหาประกันตามที่ศาลเห็นสมควรภายในระยะเวลาที่ศาลจะกำหนด เพื่อเป็นประกันการชำระค่าสินไหมทดแทนแก่เจ้าหนี้ตามคำพิพากษาสำหรับความเสียหายที่อาจได้รับเนื่องจากเหตุเนิ่นช้าในการบังคับคดีอันเกิดจากการยื่นคำขอนั้น หรือกำหนดวิธีการชั่วคราวเพื่อคุ้มครองอย่างใด ๆ ตามที่เห็นสมควรก็ได้ ถ้าลูกหนี้ตามคำพิพากษาไม่ปฏิบัติตามคำสั่งศาล ให้ศาลสั่งเพิกถอนคำสั่งที่ให้งดการบังคับคดี (๒) เมื่อศาลได้มีคำสั่งให้งดการบังคับคดี และได้ส่งคำสั่งนั้นไปให้เจ้าพนักงานบังคับคดีทราบ ในกรณีเช่นนี้ให้เจ้าพนักงานบังคับคดีงดการบังคับคดีไว้ภายในระยะเวลาหรือเงื่อนไขตามที่ศาลกำหนด (๓) เมื่อเจ้าหนี้ตามคำพิพากษาได้แจ้งเป็นหนังสือไปยังเจ้าพนักงานบังคับคดีว่าตนตกลงงดการบังคับคดีไว้ชั่วระยะเวลาที่กำหนดไว้หรือภายในเงื่อนไขอย่างใดอย่างหนึ่งโดยได้รับความยินยอมเป็นหนังสือจากลูกหนี้ตามคำพิพากษาและบุคคลภายนอกผู้มีส่วนได้เสียในการบังคับคดี (๔) เมื่อเจ้าหนี้ผู้ขอบังคับคดีไม่ปฏิบัติตามมาตรา ๑๕๔ ให้เจ้าพนักงานบังคับคดีส่งคำบอกกล่าวงดการบังคับคดีให้เจ้าหนี้ตามคำพิพากษาและบุคคลภายนอกผู้มีส่วนได้เสียทราบโดยไม่ชักช้า เว้นแต่จะได้งดการบังคับคดีตามคำขอของบุคคลนั้นเอง"},{"id":"๒๙๐","num":"มาตรา ๒๙๐","num_ara":"๒๙๐","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๘ การงดการบังคับคดี","paragraphs":["ลูกหนี้ตามคำพิพากษาอาจยื่นคำร้องต่อศาลให้งดการบังคับคดีไว้ โดยเหตุที่ตนได้ยื่นฟ้องเจ้าหนี้ตามคำพิพากษาเป็นคดีเรื่องอื่นในศาลเดียวกันนั้นไว้แล้ว ซึ่งศาลยังมิได้วินิจฉัยชี้ขาดและถ้าหากตนเป็นฝ่ายชนะจะไม่ต้องมีการยึด อายัด ขายทอดตลาด หรือจำหน่ายทรัพย์สินของลูกหนี้ตามคำพิพากษาโดยวิธีอื่น เพราะสามารถจะหักกลบลบหนี้กันได้ ถ้าศาลเห็นว่าข้ออ้างของลูกหนี้ตามคำพิพากษามีเหตุฟังได้ ศาลอาจมีคำสั่งให้งดการบังคับคดีไว้ คำสั่งนี้อาจอยู่ภายใต้บังคับเงื่อนไขหรือเงื่อนเวลาใด ๆ หรือไม่ก็ได้ และศาลจะมีคำสั่งให้ลูกหนี้ตามคำพิพากษาวางเงินหรือหาประกันต่อศาลตามจำนวนที่เห็นสมควรภายในระยะเวลาที่กำหนดเพื่อเป็นประกันการชำระหนี้ตามคำพิพากษาและค่าสินไหมทดแทนแก่เจ้าหนี้ตามคำพิพากษาสำหรับความเสียหายที่อาจได้รับเนื่องจากเหตุเนิ่นช้าในการบังคับคดีอันเกิดจากการยื่นคำร้องนั้นด้วยก็ได้ คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด"],"text":"ลูกหนี้ตามคำพิพากษาอาจยื่นคำร้องต่อศาลให้งดการบังคับคดีไว้ โดยเหตุที่ตนได้ยื่นฟ้องเจ้าหนี้ตามคำพิพากษาเป็นคดีเรื่องอื่นในศาลเดียวกันนั้นไว้แล้ว ซึ่งศาลยังมิได้วินิจฉัยชี้ขาดและถ้าหากตนเป็นฝ่ายชนะจะไม่ต้องมีการยึด อายัด ขายทอดตลาด หรือจำหน่ายทรัพย์สินของลูกหนี้ตามคำพิพากษาโดยวิธีอื่น เพราะสามารถจะหักกลบลบหนี้กันได้ ถ้าศาลเห็นว่าข้ออ้างของลูกหนี้ตามคำพิพากษามีเหตุฟังได้ ศาลอาจมีคำสั่งให้งดการบังคับคดีไว้ คำสั่งนี้อาจอยู่ภายใต้บังคับเงื่อนไขหรือเงื่อนเวลาใด ๆ หรือไม่ก็ได้ และศาลจะมีคำสั่งให้ลูกหนี้ตามคำพิพากษาวางเงินหรือหาประกันต่อศาลตามจำนวนที่เห็นสมควรภายในระยะเวลาที่กำหนดเพื่อเป็นประกันการชำระหนี้ตามคำพิพากษาและค่าสินไหมทดแทนแก่เจ้าหนี้ตามคำพิพากษาสำหรับความเสียหายที่อาจได้รับเนื่องจากเหตุเนิ่นช้าในการบังคับคดีอันเกิดจากการยื่นคำร้องนั้นด้วยก็ได้ คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด"},{"id":"๒๙๑","num":"มาตรา ๒๙๑","num_ara":"๒๙๑","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๘ การงดการบังคับคดี","paragraphs":["ในกรณีที่เจ้าพนักงานบังคับคดีได้งดการบังคับคดีไว้ตามคำสั่งของศาล ให้เจ้าพนักงานบังคับคดีดำเนินการบังคับคดีต่อไปเมื่อได้รับคำสั่งจากศาล โดยศาลเป็นผู้ออกคำสั่งนั้นเองหรือโดยเจ้าหนี้ตามคำพิพากษาเป็นผู้ยื่นคำขอให้ศาลออกคำสั่ง เนื่องจากระยะเวลาที่ให้งดการบังคับคดีนั้นได้ล่วงพ้นไปแล้ว หรือมิได้เป็นไปตามเงื่อนไขที่ศาลได้กำหนดไว้ หรือคดีนั้นศาลอุทธรณ์หรือศาลฎีกาได้พิพากษายืนหรือไม่มีความจำเป็นที่จะต้องงดการบังคับคดีอีกต่อไปแล้ว ในกรณีที่เจ้าพนักงานบังคับคดีได้งดการบังคับคดีไว้ตามมาตรา ๒๘๙ (๓) หรือ (๔) ให้เจ้าพนักงานบังคับคดีดำเนินการบังคับคดีต่อไปเมื่อระยะเวลาที่ให้งดการบังคับคดีได้ล่วงพ้นไปแล้ว หรือมิได้เป็นไปตามเงื่อนไขที่เจ้าหนี้ตามคำพิพากษาได้กำหนดไว้ หรือเจ้าหนี้ผู้ขอบังคับคดีได้ปฏิบัติตามมาตรา ๑๕๔ แล้ว"],"text":"ในกรณีที่เจ้าพนักงานบังคับคดีได้งดการบังคับคดีไว้ตามคำสั่งของศาล ให้เจ้าพนักงานบังคับคดีดำเนินการบังคับคดีต่อไปเมื่อได้รับคำสั่งจากศาล โดยศาลเป็นผู้ออกคำสั่งนั้นเองหรือโดยเจ้าหนี้ตามคำพิพากษาเป็นผู้ยื่นคำขอให้ศาลออกคำสั่ง เนื่องจากระยะเวลาที่ให้งดการบังคับคดีนั้นได้ล่วงพ้นไปแล้ว หรือมิได้เป็นไปตามเงื่อนไขที่ศาลได้กำหนดไว้ หรือคดีนั้นศาลอุทธรณ์หรือศาลฎีกาได้พิพากษายืนหรือไม่มีความจำเป็นที่จะต้องงดการบังคับคดีอีกต่อไปแล้ว ในกรณีที่เจ้าพนักงานบังคับคดีได้งดการบังคับคดีไว้ตามมาตรา ๒๘๙ (๓) หรือ (๔) ให้เจ้าพนักงานบังคับคดีดำเนินการบังคับคดีต่อไปเมื่อระยะเวลาที่ให้งดการบังคับคดีได้ล่วงพ้นไปแล้ว หรือมิได้เป็นไปตามเงื่อนไขที่เจ้าหนี้ตามคำพิพากษาได้กำหนดไว้ หรือเจ้าหนี้ผู้ขอบังคับคดีได้ปฏิบัติตามมาตรา ๑๕๔ แล้ว"},{"id":"๒๙๒","num":"มาตรา ๒๙๒","num_ara":"๒๙๒","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๙ การถอนการบังคับคดี","paragraphs":["ให้เจ้าพนักงานบังคับคดีถอนการบังคับคดีในกรณีดังต่อไปนี้","(๑) เมื่อศาลได้มีคำสั่งให้ถอนการบังคับคดีเนื่องจากลูกหนี้ตามคำพิพากษายื่นอุทธรณ์หรือฎีกา และได้วางเงินต่อศาลเป็นจำนวนพอชำระหนี้ตามคำพิพากษาพร้อมทั้งค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี หรือได้หาประกันมาให้จนเป็นที่พอใจของศาลสำหรับจำนวนเงินเช่นว่านี้ (๒) เมื่อศาลได้มีคำสั่งให้ถอนการบังคับคดีเนื่องจากคำพิพากษาในระหว่างบังคับคดีได้ถูกกลับหรือถูกยก หรือหมายบังคับคดีได้ถูกเพิกถอน แต่ถ้าคำพิพากษาในระหว่างบังคับคดีนั้นได้ถูกกลับแต่เพียงบางส่วน การบังคับคดีอาจดำเนินการต่อไปจนกว่าเงินที่รวบรวมได้นั้นจะพอชำระแก่เจ้าหนี้ตามคำพิพากษา (๓) เมื่อศาลได้แจ้งให้เจ้าพนักงานบังคับคดีทราบว่าศาลมีคำสั่งอนุญาตให้พิจารณาคดีใหม่ตามมาตรา ๑๙๙ เบญจ วรรคสาม หรือมาตรา ๒๐๗ (๔) เมื่อศาลได้มีคำสั่งให้ถอนการบังคับคดีตามมาตรา ๒๙๓ (๕) เมื่อลูกหนี้ตามคำพิพากษาได้วางเงินต่อเจ้าพนักงานบังคับคดี เพื่อเป็นการชำระหนี้ตามคำพิพากษาพร้อมทั้งค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี (๖) เมื่อเจ้าหนี้ตามคำพิพากษาได้แจ้งเป็นหนังสือไปยังเจ้าพนักงานบังคับคดีว่าตนสละสิทธิในการบังคับคดี ในกรณีเช่นว่านี้ เจ้าหนี้ตามคำพิพากษานั้นจะบังคับคดีแก่ลูกหนี้ตามคำพิพากษาสำหรับหนี้นั้นอีกมิได้ (๗) เมื่อเจ้าหนี้ตามคำพิพากษาได้แจ้งเป็นหนังสือไปยังเจ้าพนักงานบังคับคดีว่าตนขอถอนการบังคับคดี"],"text":"ให้เจ้าพนักงานบังคับคดีถอนการบังคับคดีในกรณีดังต่อไปนี้\n\n(๑) เมื่อศาลได้มีคำสั่งให้ถอนการบังคับคดีเนื่องจากลูกหนี้ตามคำพิพากษายื่นอุทธรณ์หรือฎีกา และได้วางเงินต่อศาลเป็นจำนวนพอชำระหนี้ตามคำพิพากษาพร้อมทั้งค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี หรือได้หาประกันมาให้จนเป็นที่พอใจของศาลสำหรับจำนวนเงินเช่นว่านี้ (๒) เมื่อศาลได้มีคำสั่งให้ถอนการบังคับคดีเนื่องจากคำพิพากษาในระหว่างบังคับคดีได้ถูกกลับหรือถูกยก หรือหมายบังคับคดีได้ถูกเพิกถอน แต่ถ้าคำพิพากษาในระหว่างบังคับคดีนั้นได้ถูกกลับแต่เพียงบางส่วน การบังคับคดีอาจดำเนินการต่อไปจนกว่าเงินที่รวบรวมได้นั้นจะพอชำระแก่เจ้าหนี้ตามคำพิพากษา (๓) เมื่อศาลได้แจ้งให้เจ้าพนักงานบังคับคดีทราบว่าศาลมีคำสั่งอนุญาตให้พิจารณาคดีใหม่ตามมาตรา ๑๙๙ เบญจ วรรคสาม หรือมาตรา ๒๐๗ (๔) เมื่อศาลได้มีคำสั่งให้ถอนการบังคับคดีตามมาตรา ๒๙๓ (๕) เมื่อลูกหนี้ตามคำพิพากษาได้วางเงินต่อเจ้าพนักงานบังคับคดี เพื่อเป็นการชำระหนี้ตามคำพิพากษาพร้อมทั้งค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี (๖) เมื่อเจ้าหนี้ตามคำพิพากษาได้แจ้งเป็นหนังสือไปยังเจ้าพนักงานบังคับคดีว่าตนสละสิทธิในการบังคับคดี ในกรณีเช่นว่านี้ เจ้าหนี้ตามคำพิพากษานั้นจะบังคับคดีแก่ลูกหนี้ตามคำพิพากษาสำหรับหนี้นั้นอีกมิได้ (๗) เมื่อเจ้าหนี้ตามคำพิพากษาได้แจ้งเป็นหนังสือไปยังเจ้าพนักงานบังคับคดีว่าตนขอถอนการบังคับคดี"},{"id":"๒๙๓","num":"มาตรา ๒๙๓","num_ara":"๒๙๓","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๙ การถอนการบังคับคดี","paragraphs":["ถ้าเจ้าหนี้ตามคำพิพากษาเพิกเฉยไม่ดำเนินการบังคับคดีภายในระยะเวลาที่เจ้าพนักงานบังคับคดีกำหนด ให้เจ้าพนักงานบังคับคดีรายงานต่อศาลขอให้ศาลสั่งถอนการบังคับคดีนั้นเสีย"],"text":"ถ้าเจ้าหนี้ตามคำพิพากษาเพิกเฉยไม่ดำเนินการบังคับคดีภายในระยะเวลาที่เจ้าพนักงานบังคับคดีกำหนด ให้เจ้าพนักงานบังคับคดีรายงานต่อศาลขอให้ศาลสั่งถอนการบังคับคดีนั้นเสีย"},{"id":"๒๙๔","num":"มาตรา ๒๙๔","num_ara":"๒๙๔","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๙ การถอนการบังคับคดี","paragraphs":["ในกรณีที่มีการยึดทรัพย์สินซึ่งมิใช่ตัวเงิน หรือในกรณียึดหรืออายัดเงิน หรืออายัดทรัพย์สินแล้วไม่มีการขายหรือจำหน่ายเนื่องจากเจ้าพนักงานบังคับคดีถอนการบังคับคดีนั้นเองหรือถอนโดยคำสั่งศาล และผู้ขอให้ยึดหรืออายัดไม่ชำระค่าฤชาธรรมเนียมในการบังคับคดี ให้เจ้าพนักงานบังคับคดีรายงานต่อศาลขอให้บังคับคดีแก่ทรัพย์สินของผู้นั้นเพื่อชำระค่าฤชาธรรมเนียมในการบังคับคดี ในกรณีเช่นว่านี้ ให้ถือว่าเจ้าพนักงานบังคับคดีเป็นเจ้าหนี้ตามคำพิพากษา และผู้ขอให้ยึดหรืออายัดเป็นลูกหนี้ตามคำพิพากษาในส่วนที่เกี่ยวกับค่าฤชาธรรมเนียมในการบังคับคดีนั้น และให้เจ้าพนักงานบังคับคดีบังคับคดีได้เอง โดยได้รับยกเว้นค่าธรรมเนียมทั้งปวง"],"text":"ในกรณีที่มีการยึดทรัพย์สินซึ่งมิใช่ตัวเงิน หรือในกรณียึดหรืออายัดเงิน หรืออายัดทรัพย์สินแล้วไม่มีการขายหรือจำหน่ายเนื่องจากเจ้าพนักงานบังคับคดีถอนการบังคับคดีนั้นเองหรือถอนโดยคำสั่งศาล และผู้ขอให้ยึดหรืออายัดไม่ชำระค่าฤชาธรรมเนียมในการบังคับคดี ให้เจ้าพนักงานบังคับคดีรายงานต่อศาลขอให้บังคับคดีแก่ทรัพย์สินของผู้นั้นเพื่อชำระค่าฤชาธรรมเนียมในการบังคับคดี ในกรณีเช่นว่านี้ ให้ถือว่าเจ้าพนักงานบังคับคดีเป็นเจ้าหนี้ตามคำพิพากษา และผู้ขอให้ยึดหรืออายัดเป็นลูกหนี้ตามคำพิพากษาในส่วนที่เกี่ยวกับค่าฤชาธรรมเนียมในการบังคับคดีนั้น และให้เจ้าพนักงานบังคับคดีบังคับคดีได้เอง โดยได้รับยกเว้นค่าธรรมเนียมทั้งปวง"},{"id":"๒๙๕","num":"มาตรา ๒๙๕","num_ara":"๒๙๕","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๑ หลักทั่วไป","subsection":"ส่วนที่ ๑๐ การเพิกถอนหรือแก้ไขการบังคับคดีที่ผิดระเบียบ","paragraphs":["ในกรณีที่คำบังคับ หมายบังคับคดี หรือคำสั่งศาลในชั้นบังคับคดีบกพร่อง ผิดพลาด หรือฝ่าฝืนกฎหมาย เพื่อประโยชน์แห่งความยุติธรรมจำเป็นจะต้องเพิกถอนหรือแก้ไขคำบังคับ หมายบังคับคดี หรือคำสั่งดังกล่าวนั้น เมื่อศาลเห็นสมควรไม่ว่าในเวลาใดก่อนการบังคับคดีได้เสร็จลง หรือเมื่อเจ้าพนักงานบังคับคดีรายงานต่อศาล หรือเมื่อเจ้าหนี้ตามคำพิพากษา ลูกหนี้ตามคำพิพากษา หรือบุคคลภายนอกผู้มีส่วนได้เสียในการบังคับคดีซึ่งต้องเสียหายเพราะเหตุดังกล่าว ยื่นคำร้องต่อศาล ให้ศาลมีอำนาจสั่งเพิกถอนหรือแก้ไขคำบังคับ หมายบังคับคดี หรือคำสั่งดังกล่าวทั้งหมดหรือบางส่วน หรือมีคำสั่งอย่างใดตามที่ศาลเห็นสมควร ภายใต้บังคับมาตรา ๓๓๑ วรรคสาม ถ้าเจ้าพนักงานบังคับคดีได้ดำเนินการบังคับคดีบกพร่อง ผิดพลาด หรือฝ่าฝืนกฎหมาย เมื่อศาลเห็นสมควรไม่ว่าในเวลาใดก่อนการบังคับคดีได้เสร็จลง หรือเมื่อเจ้าหนี้ตามคำพิพากษา ลูกหนี้ตามคำพิพากษา หรือบุคคลภายนอกผู้มีส่วนได้เสียในการบังคับคดีซึ่งต้องเสียหายเพราะเหตุดังกล่าว ยื่นคำร้องต่อศาล ให้ศาลมีอำนาจสั่งเพิกถอนหรือแก้ไขกระบวนวิธีการบังคับคดีทั้งปวงหรือวิธีการบังคับใด ๆ โดยเฉพาะหรือมีคำสั่งกำหนดวิธีการอย่างใดแก่เจ้าพนักงานบังคับคดีตามที่ศาลเห็นสมควร การยื่นคำร้องตามวรรคหนึ่งหรือวรรคสองอาจกระทำได้ไม่ว่าในเวลาใดก่อนการบังคับคดีได้เสร็จลง แต่ต้องไม่ช้ากว่าสิบห้าวันนับแต่วันที่ได้ทราบข้อความหรือพฤติการณ์อันเป็นมูลแห่งข้ออ้างนั้น ทั้งนี้ ผู้ยื่นคำร้องต้องมิได้ดำเนินการอันใดขึ้นใหม่หลังจากได้ทราบเรื่องบกพร่อง ผิดพลาด หรือฝ่าฝืนกฎหมายนั้นแล้ว หรือต้องมิได้ให้สัตยาบันแก่การกระทำนั้น และในกรณีเช่นว่านี้ผู้ยื่นคำร้องจะขอต่อศาลในขณะเดียวกันนั้นให้มีคำสั่งงดการบังคับคดีไว้ในระหว่างวินิจฉัยชี้ขาดก็ได้ เพื่อประโยชน์แห่งมาตรานี้ให้ถือว่าการบังคับคดีได้เสร็จลงเมื่อได้มีการดำเนินการดังต่อไปนี้","(๑) ในกรณีที่คำบังคับกำหนดให้ส่งทรัพย์สิน กระทำการ หรืองดเว้นกระทำการอย่างใด เมื่อได้มีการปฏิบัติตามคำบังคับที่ให้ส่งทรัพย์สิน กระทำการ หรืองดเว้นกระทำการอย่างนั้นแล้ว แต่ถ้าการปฏิบัติตามคำบังคับดังกล่าวอาจแยกเป็นส่วน ๆ ได้ เมื่อได้มีการปฏิบัติตามคำบังคับในส่วนใดแล้ว ให้ถือว่าการบังคับคดีได้เสร็จลงเฉพาะในส่วนนั้น (๒) ในกรณีที่คำบังคับกำหนดให้ใช้เงิน เมื่อเจ้าพนักงานบังคับคดีได้จ่ายเงินตามมาตรา ๓๓๙ มาตรา ๓๔๐ มาตรา ๓๔๒ มาตรา ๓๔๓ หรือมาตรา ๓๔๔ แล้วแต่กรณี แล้ว แต่ถ้าทรัพย์สินที่ถูกบังคับคดีมีหลายรายการ เมื่อเจ้าพนักงานบังคับคดีได้จ่ายเงินที่ได้จากการขายทอดตลาดทรัพย์สินรายการใดแล้ว ให้ถือว่าการบังคับคดีได้เสร็จลงเฉพาะทรัพย์สินรายการนั้น ในการยื่นคำร้องต่อศาลตามวรรคหนึ่งหรือวรรคสอง หากมีพยานหลักฐานเบื้องต้นแสดงว่าคำร้องนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงให้ชักช้า ศาลมีอำนาจสั่งให้ผู้ยื่นคำร้องวางเงินหรือหาประกันต่อศาลตามจำนวนและภายในระยะเวลาที่ศาลเห็นสมควรเพื่อเป็นประกันการชำระค่าสินไหมทดแทนแก่เจ้าหนี้ตามคำพิพากษาหรือบุคคลนั้นสำหรับความเสียหายที่อาจได้รับจากการยื่นคำร้องนั้น ถ้าผู้ยื่นคำร้องไม่ปฏิบัติตามคำสั่งศาล ให้ศาลมีคำสั่งยกคำร้องนั้นเสีย ส่วนเงินหรือประกันที่วางไว้ต่อศาลดังกล่าว เมื่อศาลเห็นว่าไม่มีความจำเป็นต่อไป จะสั่งคืนหรือยกเลิกประกันนั้นก็ได้ คำสั่งของศาลที่ออกตามความในวรรคนี้ให้เป็นที่สุด ในกรณีที่ศาลได้มีคำสั่งยกคำร้องที่ยื่นไว้ตามวรรคหนึ่งหรือวรรคสอง ถ้าบุคคลที่ได้รับความเสียหายเนื่องจากการยื่นคำร้องดังกล่าวเห็นว่าคำร้องนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงให้ชักช้า บุคคลดังกล่าวอาจยื่นคำร้องต่อศาลภายในสามสิบวันนับแต่วันที่มีคำสั่งยกคำร้อง เพื่อขอให้ศาลสั่งให้ผู้ยื่นคำร้องนั้นชดใช้ค่าสินไหมทดแทน ในกรณีเช่นว่านี้ ให้ศาลมีอำนาจสั่งให้แยกการพิจารณาเป็นสำนวนต่างหากจากคดีเดิม และเมื่อศาลไต่สวนแล้วเห็นว่าคำร้องนั้นฟังได้ ให้ศาลมีคำสั่งให้ผู้ยื่นคำร้องนั้นชดใช้ค่าสินไหมทดแทนให้แก่บุคคลที่ได้รับความเสียหายดังกล่าวตามจำนวนที่ศาลเห็นสมควร ถ้าผู้ยื่นคำร้องนั้นไม่ปฏิบัติตามคำสั่งศาล บุคคลที่ได้รับความเสียหายอาจร้องขอให้ศาลบังคับคดีแก่ผู้ยื่นคำร้องนั้นเสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษา"],"text":"ในกรณีที่คำบังคับ หมายบังคับคดี หรือคำสั่งศาลในชั้นบังคับคดีบกพร่อง ผิดพลาด หรือฝ่าฝืนกฎหมาย เพื่อประโยชน์แห่งความยุติธรรมจำเป็นจะต้องเพิกถอนหรือแก้ไขคำบังคับ หมายบังคับคดี หรือคำสั่งดังกล่าวนั้น เมื่อศาลเห็นสมควรไม่ว่าในเวลาใดก่อนการบังคับคดีได้เสร็จลง หรือเมื่อเจ้าพนักงานบังคับคดีรายงานต่อศาล หรือเมื่อเจ้าหนี้ตามคำพิพากษา ลูกหนี้ตามคำพิพากษา หรือบุคคลภายนอกผู้มีส่วนได้เสียในการบังคับคดีซึ่งต้องเสียหายเพราะเหตุดังกล่าว ยื่นคำร้องต่อศาล ให้ศาลมีอำนาจสั่งเพิกถอนหรือแก้ไขคำบังคับ หมายบังคับคดี หรือคำสั่งดังกล่าวทั้งหมดหรือบางส่วน หรือมีคำสั่งอย่างใดตามที่ศาลเห็นสมควร ภายใต้บังคับมาตรา ๓๓๑ วรรคสาม ถ้าเจ้าพนักงานบังคับคดีได้ดำเนินการบังคับคดีบกพร่อง ผิดพลาด หรือฝ่าฝืนกฎหมาย เมื่อศาลเห็นสมควรไม่ว่าในเวลาใดก่อนการบังคับคดีได้เสร็จลง หรือเมื่อเจ้าหนี้ตามคำพิพากษา ลูกหนี้ตามคำพิพากษา หรือบุคคลภายนอกผู้มีส่วนได้เสียในการบังคับคดีซึ่งต้องเสียหายเพราะเหตุดังกล่าว ยื่นคำร้องต่อศาล ให้ศาลมีอำนาจสั่งเพิกถอนหรือแก้ไขกระบวนวิธีการบังคับคดีทั้งปวงหรือวิธีการบังคับใด ๆ โดยเฉพาะหรือมีคำสั่งกำหนดวิธีการอย่างใดแก่เจ้าพนักงานบังคับคดีตามที่ศาลเห็นสมควร การยื่นคำร้องตามวรรคหนึ่งหรือวรรคสองอาจกระทำได้ไม่ว่าในเวลาใดก่อนการบังคับคดีได้เสร็จลง แต่ต้องไม่ช้ากว่าสิบห้าวันนับแต่วันที่ได้ทราบข้อความหรือพฤติการณ์อันเป็นมูลแห่งข้ออ้างนั้น ทั้งนี้ ผู้ยื่นคำร้องต้องมิได้ดำเนินการอันใดขึ้นใหม่หลังจากได้ทราบเรื่องบกพร่อง ผิดพลาด หรือฝ่าฝืนกฎหมายนั้นแล้ว หรือต้องมิได้ให้สัตยาบันแก่การกระทำนั้น และในกรณีเช่นว่านี้ผู้ยื่นคำร้องจะขอต่อศาลในขณะเดียวกันนั้นให้มีคำสั่งงดการบังคับคดีไว้ในระหว่างวินิจฉัยชี้ขาดก็ได้ เพื่อประโยชน์แห่งมาตรานี้ให้ถือว่าการบังคับคดีได้เสร็จลงเมื่อได้มีการดำเนินการดังต่อไปนี้\n\n(๑) ในกรณีที่คำบังคับกำหนดให้ส่งทรัพย์สิน กระทำการ หรืองดเว้นกระทำการอย่างใด เมื่อได้มีการปฏิบัติตามคำบังคับที่ให้ส่งทรัพย์สิน กระทำการ หรืองดเว้นกระทำการอย่างนั้นแล้ว แต่ถ้าการปฏิบัติตามคำบังคับดังกล่าวอาจแยกเป็นส่วน ๆ ได้ เมื่อได้มีการปฏิบัติตามคำบังคับในส่วนใดแล้ว ให้ถือว่าการบังคับคดีได้เสร็จลงเฉพาะในส่วนนั้น (๒) ในกรณีที่คำบังคับกำหนดให้ใช้เงิน เมื่อเจ้าพนักงานบังคับคดีได้จ่ายเงินตามมาตรา ๓๓๙ มาตรา ๓๔๐ มาตรา ๓๔๒ มาตรา ๓๔๓ หรือมาตรา ๓๔๔ แล้วแต่กรณี แล้ว แต่ถ้าทรัพย์สินที่ถูกบังคับคดีมีหลายรายการ เมื่อเจ้าพนักงานบังคับคดีได้จ่ายเงินที่ได้จากการขายทอดตลาดทรัพย์สินรายการใดแล้ว ให้ถือว่าการบังคับคดีได้เสร็จลงเฉพาะทรัพย์สินรายการนั้น ในการยื่นคำร้องต่อศาลตามวรรคหนึ่งหรือวรรคสอง หากมีพยานหลักฐานเบื้องต้นแสดงว่าคำร้องนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงให้ชักช้า ศาลมีอำนาจสั่งให้ผู้ยื่นคำร้องวางเงินหรือหาประกันต่อศาลตามจำนวนและภายในระยะเวลาที่ศาลเห็นสมควรเพื่อเป็นประกันการชำระค่าสินไหมทดแทนแก่เจ้าหนี้ตามคำพิพากษาหรือบุคคลนั้นสำหรับความเสียหายที่อาจได้รับจากการยื่นคำร้องนั้น ถ้าผู้ยื่นคำร้องไม่ปฏิบัติตามคำสั่งศาล ให้ศาลมีคำสั่งยกคำร้องนั้นเสีย ส่วนเงินหรือประกันที่วางไว้ต่อศาลดังกล่าว เมื่อศาลเห็นว่าไม่มีความจำเป็นต่อไป จะสั่งคืนหรือยกเลิกประกันนั้นก็ได้ คำสั่งของศาลที่ออกตามความในวรรคนี้ให้เป็นที่สุด ในกรณีที่ศาลได้มีคำสั่งยกคำร้องที่ยื่นไว้ตามวรรคหนึ่งหรือวรรคสอง ถ้าบุคคลที่ได้รับความเสียหายเนื่องจากการยื่นคำร้องดังกล่าวเห็นว่าคำร้องนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงให้ชักช้า บุคคลดังกล่าวอาจยื่นคำร้องต่อศาลภายในสามสิบวันนับแต่วันที่มีคำสั่งยกคำร้อง เพื่อขอให้ศาลสั่งให้ผู้ยื่นคำร้องนั้นชดใช้ค่าสินไหมทดแทน ในกรณีเช่นว่านี้ ให้ศาลมีอำนาจสั่งให้แยกการพิจารณาเป็นสำนวนต่างหากจากคดีเดิม และเมื่อศาลไต่สวนแล้วเห็นว่าคำร้องนั้นฟังได้ ให้ศาลมีคำสั่งให้ผู้ยื่นคำร้องนั้นชดใช้ค่าสินไหมทดแทนให้แก่บุคคลที่ได้รับความเสียหายดังกล่าวตามจำนวนที่ศาลเห็นสมควร ถ้าผู้ยื่นคำร้องนั้นไม่ปฏิบัติตามคำสั่งศาล บุคคลที่ได้รับความเสียหายอาจร้องขอให้ศาลบังคับคดีแก่ผู้ยื่นคำร้องนั้นเสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษา"},{"id":"๒๙๖","num":"มาตรา ๒๙๖","num_ara":"๒๙๖","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑ อำนาจของเจ้าพนักงานบังคับคดี","paragraphs":["ในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ชำระเงิน ให้เจ้าพนักงานบังคับคดีมีอำนาจบังคับคดีโดยวิธีดังต่อไปนี้","(๑) ยึดทรัพย์สินของลูกหนี้ตามคำพิพากษา (๒) อายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่จะเรียกให้บุคคลภายนอกชำระเงินหรือส่งมอบหรือโอนทรัพย์สิน (๓) อายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่จะเรียกให้บุคคลภายนอกชำระหนี้อย่างอื่น นอกจากที่กล่าวมาแล้วใน (๒) (๔) ขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินที่ได้มาจากการยึดหรือการอายัดหรือซึ่งสิทธิเรียกร้องที่ได้อายัดไว้ ในกรณีที่ยังไม่อาจยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาเนื่องจากมีเหตุขัดข้องอย่างหนึ่งอย่างใดที่ทำให้ไม่อาจยึดหรืออายัดได้ทันที เมื่อเจ้าพนักงานบังคับคดีเห็นเองหรือเจ้าหนี้ตามคำพิพากษาร้องขอ ให้เจ้าพนักงานบังคับคดีมีอำนาจสั่งห้ามมิให้ลูกหนี้ตามคำพิพากษา โอน ขาย ยักย้าย หรือจำหน่ายซึ่งทรัพย์สินหรือสิทธิเรียกร้องนั้นไว้เป็นการชั่วคราวไว้ก่อนได้เท่าที่จำเป็น และถ้าทรัพย์สินหรือสิทธิเรียกร้องนั้นเป็นทรัพย์สินหรือสิทธิเรียกร้องที่บุคคลภายนอกมีส่วนเกี่ยวข้องด้วย ให้เจ้าพนักงานบังคับคดีแจ้งคำสั่งห้ามดังกล่าวให้บุคคลที่มีส่วนเกี่ยวข้องนั้นทราบ หรือหากทรัพย์สินหรือสิทธิเรียกร้องนั้นเป็นทรัพย์สินหรือสิทธิเรียกร้องที่จะต้องจดทะเบียนหรือได้จดทะเบียนไว้ตามกฎหมาย ให้เจ้าพนักงานบังคับคดีแจ้งคำสั่งห้ามดังกล่าวให้นายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนตามกฎหมายว่าด้วยการนั้นทราบ ถ้าได้มีการจดทะเบียนไว้แล้ว ให้นายทะเบียนหรือพนักงานเจ้าหน้าที่บันทึกคำสั่งของเจ้าพนักงานบังคับคดีไว้ในทะเบียน และให้นำบทบัญญัติมาตรา ๓๑๕ (๑) และมาตรา ๓๒๐ (๑) และ (๒) มาใช้บังคับโดยอนุโลม ในกรณีมีเหตุอันสมควร เจ้าพนักงานบังคับคดีอาจมีคำสั่งยกเลิก หรือแก้ไขเปลี่ยนแปลงคำสั่งดังกล่าวได้ โดยให้นำบทบัญญัติมาตรา ๒๖๑ และมาตรา ๒๖๒ มาใช้บังคับโดยอนุโลม ในกรณีเหตุขัดข้องสิ้นสุดลงหรือไม่มีความจำเป็นต้องบังคับคดีต่อไป หรือเจ้าหนี้ตามคำพิพากษาเพิกเฉยไม่ดำเนินการอย่างหนึ่งอย่างใดตามที่เจ้าพนักงานบังคับคดีกำหนด ให้เจ้าพนักงานบังคับคดีแจ้งยกเลิกคำสั่งห้ามดังกล่าวให้บุคคลที่มีส่วนเกี่ยวข้องทราบ"],"text":"ในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ชำระเงิน ให้เจ้าพนักงานบังคับคดีมีอำนาจบังคับคดีโดยวิธีดังต่อไปนี้\n\n(๑) ยึดทรัพย์สินของลูกหนี้ตามคำพิพากษา (๒) อายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่จะเรียกให้บุคคลภายนอกชำระเงินหรือส่งมอบหรือโอนทรัพย์สิน (๓) อายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่จะเรียกให้บุคคลภายนอกชำระหนี้อย่างอื่น นอกจากที่กล่าวมาแล้วใน (๒) (๔) ขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินที่ได้มาจากการยึดหรือการอายัดหรือซึ่งสิทธิเรียกร้องที่ได้อายัดไว้ ในกรณีที่ยังไม่อาจยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาเนื่องจากมีเหตุขัดข้องอย่างหนึ่งอย่างใดที่ทำให้ไม่อาจยึดหรืออายัดได้ทันที เมื่อเจ้าพนักงานบังคับคดีเห็นเองหรือเจ้าหนี้ตามคำพิพากษาร้องขอ ให้เจ้าพนักงานบังคับคดีมีอำนาจสั่งห้ามมิให้ลูกหนี้ตามคำพิพากษา โอน ขาย ยักย้าย หรือจำหน่ายซึ่งทรัพย์สินหรือสิทธิเรียกร้องนั้นไว้เป็นการชั่วคราวไว้ก่อนได้เท่าที่จำเป็น และถ้าทรัพย์สินหรือสิทธิเรียกร้องนั้นเป็นทรัพย์สินหรือสิทธิเรียกร้องที่บุคคลภายนอกมีส่วนเกี่ยวข้องด้วย ให้เจ้าพนักงานบังคับคดีแจ้งคำสั่งห้ามดังกล่าวให้บุคคลที่มีส่วนเกี่ยวข้องนั้นทราบ หรือหากทรัพย์สินหรือสิทธิเรียกร้องนั้นเป็นทรัพย์สินหรือสิทธิเรียกร้องที่จะต้องจดทะเบียนหรือได้จดทะเบียนไว้ตามกฎหมาย ให้เจ้าพนักงานบังคับคดีแจ้งคำสั่งห้ามดังกล่าวให้นายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนตามกฎหมายว่าด้วยการนั้นทราบ ถ้าได้มีการจดทะเบียนไว้แล้ว ให้นายทะเบียนหรือพนักงานเจ้าหน้าที่บันทึกคำสั่งของเจ้าพนักงานบังคับคดีไว้ในทะเบียน และให้นำบทบัญญัติมาตรา ๓๑๕ (๑) และมาตรา ๓๒๐ (๑) และ (๒) มาใช้บังคับโดยอนุโลม ในกรณีมีเหตุอันสมควร เจ้าพนักงานบังคับคดีอาจมีคำสั่งยกเลิก หรือแก้ไขเปลี่ยนแปลงคำสั่งดังกล่าวได้ โดยให้นำบทบัญญัติมาตรา ๒๖๑ และมาตรา ๒๖๒ มาใช้บังคับโดยอนุโลม ในกรณีเหตุขัดข้องสิ้นสุดลงหรือไม่มีความจำเป็นต้องบังคับคดีต่อไป หรือเจ้าหนี้ตามคำพิพากษาเพิกเฉยไม่ดำเนินการอย่างหนึ่งอย่างใดตามที่เจ้าพนักงานบังคับคดีกำหนด ให้เจ้าพนักงานบังคับคดีแจ้งยกเลิกคำสั่งห้ามดังกล่าวให้บุคคลที่มีส่วนเกี่ยวข้องทราบ"},{"id":"๒๙๗","num":"มาตรา ๒๙๗","num_ara":"๒๙๗","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑ อำนาจของเจ้าพนักงานบังคับคดี","paragraphs":["ให้เจ้าพนักงานบังคับคดีมีอำนาจบังคับคดีเอากับทรัพย์สินดังต่อไปนี้ได้เช่นเดียวกับที่บัญญัติไว้ในมาตรา ๒๙๖","(๑) สินสมรสของคู่สมรสของลูกหนี้ตามคำพิพากษา เฉพาะในกรณีที่ลูกหนี้ตามคำพิพากษาและคู่สมรสเป็นลูกหนี้ร่วมกันตามมาตรา ๑๔๙๐ แห่งประมวลกฎหมายแพ่งและพาณิชย์ หรือทรัพย์สินของคู่สมรสของลูกหนี้ตามคำพิพากษาซึ่งตามกฎหมายอาจบังคับเอาชำระหนี้ตามคำพิพากษาได้ (๒) ทรัพย์สินของบุคคลอื่นซึ่งตามกฎหมายอาจบังคับเอาชำระหนี้ตามคำพิพากษาได้ ให้นำบทบัญญัติในลักษณะ ๒ แห่งภาคนี้ที่เกี่ยวกับการบังคับคดีแก่ทรัพย์สินของลูกหนี้ตามคำพิพากษามาใช้บังคับในการบังคับคดีแก่ทรัพย์สินของบุคคลตามมาตรานี้โดยอนุโลม"],"text":"ให้เจ้าพนักงานบังคับคดีมีอำนาจบังคับคดีเอากับทรัพย์สินดังต่อไปนี้ได้เช่นเดียวกับที่บัญญัติไว้ในมาตรา ๒๙๖\n\n(๑) สินสมรสของคู่สมรสของลูกหนี้ตามคำพิพากษา เฉพาะในกรณีที่ลูกหนี้ตามคำพิพากษาและคู่สมรสเป็นลูกหนี้ร่วมกันตามมาตรา ๑๔๙๐ แห่งประมวลกฎหมายแพ่งและพาณิชย์ หรือทรัพย์สินของคู่สมรสของลูกหนี้ตามคำพิพากษาซึ่งตามกฎหมายอาจบังคับเอาชำระหนี้ตามคำพิพากษาได้ (๒) ทรัพย์สินของบุคคลอื่นซึ่งตามกฎหมายอาจบังคับเอาชำระหนี้ตามคำพิพากษาได้ ให้นำบทบัญญัติในลักษณะ ๒ แห่งภาคนี้ที่เกี่ยวกับการบังคับคดีแก่ทรัพย์สินของลูกหนี้ตามคำพิพากษามาใช้บังคับในการบังคับคดีแก่ทรัพย์สินของบุคคลตามมาตรานี้โดยอนุโลม"},{"id":"๒๙๘","num":"มาตรา ๒๙๘","num_ara":"๒๙๘","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑ อำนาจของเจ้าพนักงานบังคับคดี","paragraphs":["ในกรณีที่ทรัพย์สินหรือสิทธิเรียกร้องที่เจ้าหนี้ตามคำพิพากษาอ้างว่าเป็นของลูกหนี้ตามคำพิพากษามีชื่อบุคคลอื่นเป็นเจ้าของในทะเบียนหรือปรากฏตามหลักฐานอย่างอื่นว่าเ
