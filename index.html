ายทอดตลาดให้บรรดาผู้มีส่วนได้เสียในการบังคับคดีซึ่งปรากฏตามทะเบียนหรือประการอื่นได้ทราบด้วย โดยจะทำการขายทอดตลาดในวันหยุดงานหรือในเวลาใด ๆ นอกเวลาทำการปกติก็ได้ ทั้งนี้ กำหนดวันและเวลาขายดังกล่าวจะต้องไม่น้อยกว่าหกสิบวันนับแต่วันยึด อายัด หรือส่งมอบทรัพย์สินนั้น เพื่อให้การขายทอดตลาดเป็นไปด้วยความเที่ยงธรรม บุคคลผู้มีส่วนได้เสียในการบังคับคดีมีสิทธิเต็มที่ในการเข้าสู้ราคาเองหรือหาบุคคลอื่นเข้าสู้ราคาเพื่อให้ได้ราคาตามที่ตนต้องการ และเมื่อเจ้าพนักงานบังคับคดีเคาะไม้ขายให้แก่ผู้เสนอราคาสูงสุดแล้ว ห้ามมิให้บุคคลผู้มีส่วนได้เสียในการบังคับคดีทั้งหลายหยิบยกเรื่องราคาที่ได้จากการขายทอดตลาดมีจำนวนต่ำเกินสมควรมาเป็นเหตุขอให้มีการเพิกถอนการขายทอดตลาดนั้นอีก"],"text":"ภายใต้บังคับมาตรา ๓๓๒ และมาตรา ๓๓๖ เมื่อได้ยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องทั้งหมดหรือบางส่วนของลูกหนี้ตามคำพิพากษา หรือได้มีการส่งมอบทรัพย์สินตามสิทธิเรียกร้องที่ถูกอายัดแก่เจ้าพนักงานบังคับคดีแล้ว ถ้าไม่มีเหตุสมควรงดการบังคับคดีไว้ก่อน ให้เจ้าพนักงานบังคับคดีดำเนินการขายทอดตลาดทรัพย์สินหรือสิทธิเรียกร้องนั้นตามประมวลกฎหมายแพ่งและพาณิชย์ และกฎกระทรวงว่าด้วยการนั้นหรือตามที่ศาลมีคำสั่งกำหนด หรือขายโดยวิธีการทางอิเล็กทรอนิกส์ตามที่กำหนดในกฎกระทรวง ก่อนการขายทอดตลาดทรัพย์สินหรือสิทธิเรียกร้องตามวรรคหนึ่ง เจ้าพนักงานบังคับคดีต้องแจ้งกำหนดวัน เวลา และสถานที่ซึ่งจะทำการขายทอดตลาดให้บรรดาผู้มีส่วนได้เสียในการบังคับคดีซึ่งปรากฏตามทะเบียนหรือประการอื่นได้ทราบด้วย โดยจะทำการขายทอดตลาดในวันหยุดงานหรือในเวลาใด ๆ นอกเวลาทำการปกติก็ได้ ทั้งนี้ กำหนดวันและเวลาขายดังกล่าวจะต้องไม่น้อยกว่าหกสิบวันนับแต่วันยึด อายัด หรือส่งมอบทรัพย์สินนั้น เพื่อให้การขายทอดตลาดเป็นไปด้วยความเที่ยงธรรม บุคคลผู้มีส่วนได้เสียในการบังคับคดีมีสิทธิเต็มที่ในการเข้าสู้ราคาเองหรือหาบุคคลอื่นเข้าสู้ราคาเพื่อให้ได้ราคาตามที่ตนต้องการ และเมื่อเจ้าพนักงานบังคับคดีเคาะไม้ขายให้แก่ผู้เสนอราคาสูงสุดแล้ว ห้ามมิให้บุคคลผู้มีส่วนได้เสียในการบังคับคดีทั้งหลายหยิบยกเรื่องราคาที่ได้จากการขายทอดตลาดมีจำนวนต่ำเกินสมควรมาเป็นเหตุขอให้มีการเพิกถอนการขายทอดตลาดนั้นอีก"},{"id":"๓๓๒","num":"มาตรา ๓๓๒","num_ara":"๓๓๒","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๘ การขายหรือจำหน่าย","paragraphs":["ในกรณีที่ทรัพย์สินหรือสิทธิเรียกร้องที่จะขายหรือจำหน่ายมีสภาพเป็นของสดของเสียได้ หรือถ้าหน่วงช้าไว้จะเป็นการเสี่ยงความเสียหาย หรือค่าใช้จ่ายจะเกินส่วนแห่งค่าของทรัพย์สินหรือสิทธิเรียกร้องนั้น ให้เจ้าพนักงานบังคับคดีขายหรือจำหน่ายได้ทันทีโดยวิธีขายทอดตลาดหรือวิธีอื่นที่สมควร ในกรณีที่การขายหรือจำหน่ายทรัพย์สินที่ถูกยึดหรือที่ได้มีการส่งมอบตามคำสั่งอายัดกระทำได้โดยยาก หรือการขายหรือจำหน่ายสิทธิเรียกร้องนั้นกระทำได้โดยยากเนื่องจากการชำระหนี้นั้นต้องอาศัยการชำระหนี้ตอบแทนหรือด้วยเหตุอื่นใด และการบังคับคดีอาจล่าช้าเป็นการเสียหายแก่คู่ความทุกฝ่ายหรือฝ่ายใดฝ่ายหนึ่ง หรือแก่บุคคลผู้มีส่วนได้เสีย เมื่อเจ้าพนักงานบังคับคดีเห็นสมควรหรือคู่ความหรือบุคคลเช่นว่านั้นร้องขอ เจ้าพนักงานบังคับคดีจะมีคำสั่งกำหนดให้จำหน่ายโดยวิธีการอื่นใดที่สมควรก็ได้ ทั้งนี้ บุคคลผู้มีส่วนได้เสียในการบังคับคดีอาจคัดค้านคำสั่งหรือการดำเนินการของเจ้าพนักงานบังคับคดี โดยยื่นคำร้องต่อศาลภายในสองวันนับแต่วันที่ได้ทราบคำสั่งหรือการดำเนินการนั้น คำสั่งของศาลให้เป็นที่สุด"],"text":"ในกรณีที่ทรัพย์สินหรือสิทธิเรียกร้องที่จะขายหรือจำหน่ายมีสภาพเป็นของสดของเสียได้ หรือถ้าหน่วงช้าไว้จะเป็นการเสี่ยงความเสียหาย หรือค่าใช้จ่ายจะเกินส่วนแห่งค่าของทรัพย์สินหรือสิทธิเรียกร้องนั้น ให้เจ้าพนักงานบังคับคดีขายหรือจำหน่ายได้ทันทีโดยวิธีขายทอดตลาดหรือวิธีอื่นที่สมควร ในกรณีที่การขายหรือจำหน่ายทรัพย์สินที่ถูกยึดหรือที่ได้มีการส่งมอบตามคำสั่งอายัดกระทำได้โดยยาก หรือการขายหรือจำหน่ายสิทธิเรียกร้องนั้นกระทำได้โดยยากเนื่องจากการชำระหนี้นั้นต้องอาศัยการชำระหนี้ตอบแทนหรือด้วยเหตุอื่นใด และการบังคับคดีอาจล่าช้าเป็นการเสียหายแก่คู่ความทุกฝ่ายหรือฝ่ายใดฝ่ายหนึ่ง หรือแก่บุคคลผู้มีส่วนได้เสีย เมื่อเจ้าพนักงานบังคับคดีเห็นสมควรหรือคู่ความหรือบุคคลเช่นว่านั้นร้องขอ เจ้าพนักงานบังคับคดีจะมีคำสั่งกำหนดให้จำหน่ายโดยวิธีการอื่นใดที่สมควรก็ได้ ทั้งนี้ บุคคลผู้มีส่วนได้เสียในการบังคับคดีอาจคัดค้านคำสั่งหรือการดำเนินการของเจ้าพนักงานบังคับคดี โดยยื่นคำร้องต่อศาลภายในสองวันนับแต่วันที่ได้ทราบคำสั่งหรือการดำเนินการนั้น คำสั่งของศาลให้เป็นที่สุด"},{"id":"๓๓๓","num":"มาตรา ๓๓๓","num_ara":"๓๓๓","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๘ การขายหรือจำหน่าย","paragraphs":["ในการขายทอดตลาดทรัพย์สินของลูกหนี้ตามคำพิพากษานั้น ให้เจ้าพนักงานบังคับคดีปฏิบัติดังต่อไปนี้","(๑) ในการขายทรัพย์สินที่มีหลายสิ่งด้วยกัน ให้แยกขายทีละสิ่งต่อเนื่องกันไป แต่ (ก) เจ้าพนักงานบังคับคดีมีอำนาจจัดสังหาริมทรัพย์ซึ่งมีราคาเล็กน้อยรวมขายเป็นกอง ๆ ได้เสมอ (ข) เจ้าพนักงานบังคับคดีมีอำนาจจัดสังหาริมทรัพย์หรืออสังหาริมทรัพย์สองสิ่งหรือกว่านั้นขึ้นไปรวมขายไปด้วยกันได้ ในเมื่อเป็นที่คาดหมายได้ว่าเงินรายได้ในการขายจะเพิ่มขึ้นเพราะเหตุนั้น (๒) ในการขายอสังหาริมทรัพย์ซึ่งอาจแบ่งแยกออกได้เป็นส่วน ๆ เจ้าพนักงานบังคับคดีมีอำนาจขายทรัพย์สินนั้นเป็นส่วน ๆ ได้ ในเมื่อเป็นที่คาดหมายได้ว่าเงินรายได้ในการขายทรัพย์สินบางส่วนจะเพียงพอแก่การบังคับคดี หรือว่าเงินรายได้ทั้งหมดจะเพิ่มขึ้นเพราะเหตุนั้น (๓) ในการขายทรัพย์สินหลายสิ่งด้วยกัน เจ้าพนักงานบังคับคดีมีอำนาจกำหนดลำดับที่จะขายทรัพย์สินนั้น บุคคลผู้มีส่วนได้เสียในการบังคับคดีแก่ทรัพย์สินซึ่งจะต้องขาย อาจร้องขอให้เจ้าพนักงานบังคับคดีรวม หรือแยกทรัพย์สิน หรือขอให้ขายทรัพย์สินนั้นตามลำดับที่กำหนดไว้ หรือจะร้องคัดค้านคำสั่งของเจ้าพนักงานบังคับคดีที่สั่งตามวรรคหนึ่งก็ได้ การยื่นคำร้องตามมาตรานี้ต้องกระทำก่อนวันทำการขายทอดตลาด แต่ต้องไม่ช้ากว่าสามวันนับแต่ทราบวิธีการขาย ในกรณีที่เจ้าพนักงานบังคับคดีไม่ยอมปฏิบัติตามคำร้องขอหรือคำคัดค้านเช่นว่านั้น ผู้ร้องจะยื่นคำร้องต่อศาลภายในสองวันนับแต่วันปฏิเสธ เพื่อขอให้มีคำสั่งชี้ขาดในเรื่องนั้นก็ได้ คำสั่งของศาลให้เป็นที่สุด และให้เจ้าพนักงานบังคับคดีเลื่อนการขายไปจนกว่าศาลจะได้มีคำสั่ง หรือจนกว่าจะได้พ้นระยะเวลาซึ่งให้นำเรื่องขึ้นสู่ศาลได้"],"text":"ในการขายทอดตลาดทรัพย์สินของลูกหนี้ตามคำพิพากษานั้น ให้เจ้าพนักงานบังคับคดีปฏิบัติดังต่อไปนี้\n\n(๑) ในการขายทรัพย์สินที่มีหลายสิ่งด้วยกัน ให้แยกขายทีละสิ่งต่อเนื่องกันไป แต่ (ก) เจ้าพนักงานบังคับคดีมีอำนาจจัดสังหาริมทรัพย์ซึ่งมีราคาเล็กน้อยรวมขายเป็นกอง ๆ ได้เสมอ (ข) เจ้าพนักงานบังคับคดีมีอำนาจจัดสังหาริมทรัพย์หรืออสังหาริมทรัพย์สองสิ่งหรือกว่านั้นขึ้นไปรวมขายไปด้วยกันได้ ในเมื่อเป็นที่คาดหมายได้ว่าเงินรายได้ในการขายจะเพิ่มขึ้นเพราะเหตุนั้น (๒) ในการขายอสังหาริมทรัพย์ซึ่งอาจแบ่งแยกออกได้เป็นส่วน ๆ เจ้าพนักงานบังคับคดีมีอำนาจขายทรัพย์สินนั้นเป็นส่วน ๆ ได้ ในเมื่อเป็นที่คาดหมายได้ว่าเงินรายได้ในการขายทรัพย์สินบางส่วนจะเพียงพอแก่การบังคับคดี หรือว่าเงินรายได้ทั้งหมดจะเพิ่มขึ้นเพราะเหตุนั้น (๓) ในการขายทรัพย์สินหลายสิ่งด้วยกัน เจ้าพนักงานบังคับคดีมีอำนาจกำหนดลำดับที่จะขายทรัพย์สินนั้น บุคคลผู้มีส่วนได้เสียในการบังคับคดีแก่ทรัพย์สินซึ่งจะต้องขาย อาจร้องขอให้เจ้าพนักงานบังคับคดีรวม หรือแยกทรัพย์สิน หรือขอให้ขายทรัพย์สินนั้นตามลำดับที่กำหนดไว้ หรือจะร้องคัดค้านคำสั่งของเจ้าพนักงานบังคับคดีที่สั่งตามวรรคหนึ่งก็ได้ การยื่นคำร้องตามมาตรานี้ต้องกระทำก่อนวันทำการขายทอดตลาด แต่ต้องไม่ช้ากว่าสามวันนับแต่ทราบวิธีการขาย ในกรณีที่เจ้าพนักงานบังคับคดีไม่ยอมปฏิบัติตามคำร้องขอหรือคำคัดค้านเช่นว่านั้น ผู้ร้องจะยื่นคำร้องต่อศาลภายในสองวันนับแต่วันปฏิเสธ เพื่อขอให้มีคำสั่งชี้ขาดในเรื่องนั้นก็ได้ คำสั่งของศาลให้เป็นที่สุด และให้เจ้าพนักงานบังคับคดีเลื่อนการขายไปจนกว่าศาลจะได้มีคำสั่ง หรือจนกว่าจะได้พ้นระยะเวลาซึ่งให้นำเรื่องขึ้นสู่ศาลได้"},{"id":"๓๓๔","num":"มาตรา ๓๓๔","num_ara":"๓๓๔","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๘ การขายหรือจำหน่าย","paragraphs":["เมื่อเจ้าพนักงานบังคับคดีโอนอสังหาริมทรัพย์ที่ขายให้แก่ผู้ซื้อ หากทรัพย์สินที่โอนนั้นมีลูกหนี้ตามคำพิพากษาหรือบริวารอยู่อาศัย และลูกหนี้ตามคำพิพากษาหรือบริวารไม่ยอมออกไปจากอสังหาริมทรัพย์นั้น ผู้ซื้อชอบที่จะยื่นคำขอฝ่ายเดียวต่อศาลที่อสังหาริมทรัพย์นั้นตั้งอยู่ในเขตศาลให้ออกหมายบังคับคดีเพื่อบังคับให้ลูกหนี้ตามคำพิพากษาหรือบริวารออกไปจากอสังหาริมทรัพย์นั้น โดยให้นำบทบัญญัติมาตรา ๒๗๑ มาตรา ๒๗๘ วรรคหนึ่ง มาตรา ๓๕๑ มาตรา ๓๕๒ มาตรา ๓๕๓ วรรคหนึ่ง (๑ งการปลอดหนี้ หากนิติบุคคลอาคารชุดไม่แจ้งรายการหนี้ที่ค้างชำระดังกล่าวต่อเจ้าพนักงานบังคับคดีภายในกำหนดเวลาตามวรรคสองหรือแจ้งว่าไม่มีหนี้ที่ค้างชำระ ให้พนักงานเจ้าหน้าที่จดทะเบียนโอนกรรมสิทธิ์ให้แก่ผู้ซื้อโดยไม่ต้องใช้หนังสือรับรองการปลอดหนี้ ถ้าทรัพย์สินที่จะขายทอดตลาดเป็นที่ดินจัดสรรตามกฎหมายว่าด้วยการจัดสรรที่ดิน ก่อนทำการขายทอดตลาด ให้เจ้าพนักงานบังคับคดีบอกกล่าวให้นิติบุคคลหมู่บ้านจัดสรรแจ้งรายการหนี้ค่าบำรุงรักษาและการจัดการสาธารณูปโภคพร้อมค่าปรับตามกฎหมายว่าด้วยการจัดสรรที่ดินต่อเจ้าพนักงานบังคับคดีภายในสามสิบวันนับแต่วันที่ได้รับคำบอกกล่าว เมื่อขายทอดตลาดแล้วให้เจ้าพนักงานบังคับคดีกันเงินที่ได้จากการขายทอดตลาดไว้เพื่อชำระหนี้ที่ค้างชำระดังกล่าวจนถึงวันขายทอดตลาดแก่นิติบุคคลหมู่บ้านจัดสรรก่อนเจ้าหนี้จำนอง และให้พนักงานเจ้าหน้าที่จดทะเบียนโอนสิทธิในที่ดินให้แก่ผู้ซื้อ ทั้งนี้ หากมีการระงับการจดทะเบียนสิทธิและนิติกรรมไว้ ให้การระงับการจดทะเบียนสิทธิและนิติกรรมนั้นเป็นอันยกเลิกไป หากนิติบุคคลหมู่บ้านจัดสรรไม่แจ้งรายการหนี้ที่ค้างชำระดังกล่าวต่อเจ้าพนักงานบังคับคดีภายในกำหนดเวลาตามวรรคสี่หรือแจ้งว่าไม่มีหนี้ที่ค้างชำระ หรือในกรณีที่ยังมิได้จัดตั้งนิติบุคคลหมู่บ้านจัดสรร ให้พนักงานเจ้าหน้าที่จดทะเบียนโอนสิทธิในที่ดินให้แก่ผู้ซื้อ ทั้งนี้ หากมีการระงับการจดทะเบียนสิทธิและนิติกรรมไว้ ให้การระงับการจดทะเบียนสิทธิและนิติกรรมนั้นเป็นอันยกเลิกไป การจ่ายเงินที่กันไว้ตามวรรคสองและวรรคสี่ ให้เป็นไปตามบทบัญญัติในส่วนที่ ๑๐ การทำบัญชีส่วนเฉลี่ย และส่วนที่ ๑๑ เงินค้างจ่าย ของหมวดนี้"],"text":"เมื่อทำการขายทอดตลาดทรัพย์สินที่มีกฎหมายกำหนดไว้ให้จดทะเบียนให้เจ้าพนักงานบังคับคดีแจ้งนายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมายให้ดำเนินการแก้ไขเปลี่ยนแปลงทางทะเบียนทรัพย์สินนั้นให้แก่ผู้ซื้อ ถ้าทรัพย์สินที่จะขายทอดตลาดเป็นห้องชุดตามกฎหมายว่าด้วยอาคารชุด ก่อนทำการขายทอดตลาด ให้เจ้าพนักงานบังคับคดีบอกกล่าวให้นิติบุคคลอาคารชุดแจ้งรายการหนี้ค่าใช้จ่ายที่ต้องชำระ เพื่อการออกหนังสือรับรองการปลอดหนี้ตามกฎหมายว่าด้วยอาคารชุดต่อเจ้าพนักงานบังคับคดีภายในสามสิบวันนับแต่วันที่ได้รับคำบอกกล่าว เมื่อขายทอดตลาดแล้วให้เจ้าพนักงานบังคับคดีกันเงินที่ได้จากการขายทอดตลาดไว้เพื่อชำระหนี้ที่ค้างชำระดังกล่าวจนถึงวันขายทอดตลาดแก่นิติบุคคลอาคารชุดก่อนเจ้าหนี้จำนอง และให้พนักงานเจ้าหน้าที่จดทะเบียนโอนกรรมสิทธิ์ให้แก่ผู้ซื้อโดยไม่ต้องใช้หนังสือรับรองการปลอดหนี้ หากนิติบุคคลอาคารชุดไม่แจ้งรายการหนี้ที่ค้างชำระดังกล่าวต่อเจ้าพนักงานบังคับคดีภายในกำหนดเวลาตามวรรคสองหรือแจ้งว่าไม่มีหนี้ที่ค้างชำระ ให้พนักงานเจ้าหน้าที่จดทะเบียนโอนกรรมสิทธิ์ให้แก่ผู้ซื้อโดยไม่ต้องใช้หนังสือรับรองการปลอดหนี้ ถ้าทรัพย์สินที่จะขายทอดตลาดเป็นที่ดินจัดสรรตามกฎหมายว่าด้วยการจัดสรรที่ดิน ก่อนทำการขายทอดตลาด ให้เจ้าพนักงานบังคับคดีบอกกล่าวให้นิติบุคคลหมู่บ้านจัดสรรแจ้งรายการหนี้ค่าบำรุงรักษาและการจัดการสาธารณูปโภคพร้อมค่าปรับตามกฎหมายว่าด้วยการจัดสรรที่ดินต่อเจ้าพนักงานบังคับคดีภายในสามสิบวันนับแต่วันที่ได้รับคำบอกกล่าว เมื่อขายทอดตลาดแล้วให้เจ้าพนักงานบังคับคดีกันเงินที่ได้จากการขายทอดตลาดไว้เพื่อชำระหนี้ที่ค้างชำระดังกล่าวจนถึงวันขายทอดตลาดแก่นิติบุคคลหมู่บ้านจัดสรรก่อนเจ้าหนี้จำนอง และให้พนักงานเจ้าหน้าที่จดทะเบียนโอนสิทธิในที่ดินให้แก่ผู้ซื้อ ทั้งนี้ หากมีการระงับการจดทะเบียนสิทธิและนิติกรรมไว้ ให้การระงับการจดทะเบียนสิทธิและนิติกรรมนั้นเป็นอันยกเลิกไป หากนิติบุคคลหมู่บ้านจัดสรรไม่แจ้งรายการหนี้ที่ค้างชำระดังกล่าวต่อเจ้าพนักงานบังคับคดีภายในกำหนดเวลาตามวรรคสี่หรือแจ้งว่าไม่มีหนี้ที่ค้างชำระ หรือในกรณีที่ยังมิได้จัดตั้งนิติบุคคลหมู่บ้านจัดสรร ให้พนักงานเจ้าหน้าที่จดทะเบียนโอนสิทธิในที่ดินให้แก่ผู้ซื้อ ทั้งนี้ หากมีการระงับการจดทะเบียนสิทธิและนิติกรรมไว้ ให้การระงับการจดทะเบียนสิทธิและนิติกรรมนั้นเป็นอันยกเลิกไป การจ่ายเงินที่กันไว้ตามวรรคสองและวรรคสี่ ให้เป็นไปตามบทบัญญัติในส่วนที่ ๑๐ การทำบัญชีส่วนเฉลี่ย และส่วนที่ ๑๑ เงินค้างจ่าย ของหมวดนี้"},{"id":"๓๓๖","num":"มาตรา ๓๓๖","num_ara":"๓๓๖","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๙ การตั้งผู้จัดการอสังหาริมทรัพย์หรือการประกอบกิจการแทนการขายหรือจำหน่าย","paragraphs":["ถ้ารายได้จากอสังหาริมทรัพย์หรือการประกอบอุตสาหกรรม พาณิชยกรรม เกษตรกรรม หรือการประกอบกิจการอื่นใดของลูกหนี้ตามคำพิพากษาอาจเพียงพอที่จะชำระหนี้ตามคำพิพากษาพร้อมด้วยค่าฤชาธรรมเนียม และค่าฤชาธรรมเนียมในการบังคับคดี ภายในเวลาอันสมควร เมื่อศาลเห็นสมควรหรือเมื่อลูกหนี้ตามคำพิพากษาร้องขอ และไม่มีข้อเท็จจริงว่าจะเป็นการประวิงการชำระหนี้ ศาลอาจมีคำสั่งตั้งผู้จัดการอสังหาริมทรัพย์หรือผู้จัดการกิจการเหล่านั้น โดยมอบเงินรายได้ทั้งหมดหรือแต่บางส่วนแก่เจ้าพนักงานบังคับคดีภายในเวลาและเงื่อนไขที่ศาลเห็นสมควรกำหนดแทนการขายหรือจำหน่ายทรัพย์สินของลูกหนี้ตามคำพิพากษาได้"],"text":"ถ้ารายได้จากอสังหาริมทรัพย์หรือการประกอบอุตสาหกรรม พาณิชยกรรม เกษตรกรรม หรือการประกอบกิจการอื่นใดของลูกหนี้ตามคำพิพากษาอาจเพียงพอที่จะชำระหนี้ตามคำพิพากษาพร้อมด้วยค่าฤชาธรรมเนียม และค่าฤชาธรรมเนียมในการบังคับคดี ภายในเวลาอันสมควร เมื่อศาลเห็นสมควรหรือเมื่อลูกหนี้ตามคำพิพากษาร้องขอ และไม่มีข้อเท็จจริงว่าจะเป็นการประวิงการชำระหนี้ ศาลอาจมีคำสั่งตั้งผู้จัดการอสังหาริมทรัพย์หรือผู้จัดการกิจการเหล่านั้น โดยมอบเงินรายได้ทั้งหมดหรือแต่บางส่วนแก่เจ้าพนักงานบังคับคดีภายในเวลาและเงื่อนไขที่ศาลเห็นสมควรกำหนดแทนการขายหรือจำหน่ายทรัพย์สินของลูกหนี้ตามคำพิพากษาได้"},{"id":"๓๓๗","num":"มาตรา ๓๓๗","num_ara":"๓๓๗","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑๐ การทำบัญชีส่วนเฉลี่ย","paragraphs":["ให้เจ้าพนักงานบังคับคดีทำบัญชีรายละเอียดแสดงจำนวนเงินทั้งหมดที่ได้มาจากการยึด อายัด ขาย หรือจำหน่ายทรัพย์สินของลูกหนี้ตามคำพิพากษาหรือที่ได้วางไว้แก่ตน นอกจากนี้ ให้เจ้าพนักงานบังคับคดีทำบัญชีพิเศษสำหรับจำนวนเงินที่ได้มาจากการขายหรือจำหน่ายทรัพย์สินแต่ละรายซึ่งอยู่ในบังคับแห่งทรัพยสิทธิ บุริมสิทธิ สิทธิยึดหน่วง หรือสิทธิอื่นซึ่งได้มีการแจ้งให้ทราบหรือปรากฏแก่เจ้าพนักงานบังคับคดีแล้วตามมาตรา ๓๒๔ ถ้าประมวลกฎหมายนี้หรือกฎหมายอื่นมิได้บัญญัติไว้เป็นอย่างอื่น ให้เจ้าพนักงานบังคับคดีจัดสรรหรือแบ่งเฉลี่ยเงินตามวรรคหนึ่งดังบัญญัติไว้ในมาตราต่อไปนี้"],"text":"ให้เจ้าพนักงานบังคับคดีทำบัญชีรายละเอียดแสดงจำนวนเงินทั้งหมดที่ได้มาจากการยึด อายัด ขาย หรือจำหน่ายทรัพย์สินของลูกหนี้ตามคำพิพากษาหรือที่ได้วางไว้แก่ตน นอกจากนี้ ให้เจ้าพนักงานบังคับคดีทำบัญชีพิเศษสำหรับจำนวนเงินที่ได้มาจากการขายหรือจำหน่ายทรัพย์สินแต่ละรายซึ่งอยู่ในบังคับแห่งทรัพยสิทธิ บุริมสิทธิ สิทธิยึดหน่วง หรือสิทธิอื่นซึ่งได้มีการแจ้งให้ทราบหรือปรากฏแก่เจ้าพนักงานบังคับคดีแล้วตามมาตรา ๓๒๔ ถ้าประมวลกฎหมายนี้หรือกฎหมายอื่นมิได้บัญญัติไว้เป็นอย่างอื่น ให้เจ้าพนักงานบังคับคดีจัดสรรหรือแบ่งเฉลี่ยเงินตามวรรคหนึ่งดังบัญญัติไว้ในมาตราต่อไปนี้"},{"id":"๓๓๘","num":"มาตรา ๓๓๘","num_ara":"๓๓๘","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑๐ การทำบัญชีส่วนเฉลี่ย","paragraphs":["ในกรณีที่จะต้องบังคับคดีตามคำพิพากษาหรือคำสั่งซึ่งได้พิพากษาหรือสั่งโดยจำเลยขาดนัดนั้น ห้ามมิให้จัดสรรหรือแบ่งเฉลี่ยเงินที่ได้มาจนกว่าระยะเวลาหกเดือนนับแต่วันยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาจะได้ล่วงพ้นไปแล้ว เว้นแต่เจ้าหนี้ตามคำพิพากษาจะแสดงให้เป็นที่พอใจแก่ศาลได้ว่า ลูกหนี้ตามคำพิพากษาได้ทราบถึงการที่ถูกฟ้องนั้นแล้ว"],"text":"ในกรณีที่จะต้องบังคับคดีตามคำพิพากษาหรือคำสั่งซึ่งได้พิพากษาหรือสั่งโดยจำเลยขาดนัดนั้น ห้ามมิให้จัดสรรหรือแบ่งเฉลี่ยเงินที่ได้มาจนกว่าระยะเวลาหกเดือนนับแต่วันยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาจะได้ล่วงพ้นไปแล้ว เว้นแต่เจ้าหนี้ตามคำพิพากษาจะแสดงให้เป็นที่พอใจแก่ศาลได้ว่า ลูกหนี้ตามคำพิพากษาได้ทราบถึงการที่ถูกฟ้องนั้นแล้ว"},{"id":"๓๓๙","num":"มาตรา ๓๓๙","num_ara":"๓๓๙","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑๐ การทำบัญชีส่วนเฉลี่ย","paragraphs":["ในกรณีที่มีเจ้าหนี้ตามคำพิพากษาคนเดียวร้องขอให้บังคับคดีแก่ทรัพย์สินของลูกหนี้ตามคำพิพากษาและไม่มีกรณีตามมาตรา ๓๒๔ เมื่อได้ขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินนั้นเสร็จและได้หักค่าฤชาธรรมเนียมในการบังคับคดีไว้แล้ว ให้เจ้าพนักงานบังคับคดีจ่ายเงินตามจำนวนหนี้และค่าฤชาธรรมเนียมตามคำพิพากษาให้แก่เจ้าหนี้ตามคำพิพากษาเท่าที่เงินรายได้จำนวนสุทธิจะพอแก่การที่จะจ่ายให้ได้"],"text":"ในกรณีที่มีเจ้าหนี้ตามคำพิพากษาคนเดียวร้องขอให้บังคับคดีแก่ทรัพย์สินของลูกหนี้ตามคำพิพากษาและไม่มีกรณีตามมาตรา ๓๒๔ เมื่อได้ขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินนั้นเสร็จและได้หักค่าฤชาธรรมเนียมในการบังคับคดีไว้แล้ว ให้เจ้าพนักงานบังคับคดีจ่ายเงินตามจำนวนหนี้และค่าฤชาธรรมเนียมตามคำพิพากษาให้แก่เจ้าหนี้ตามคำพิพากษาเท่าที่เงินรายได้จำนวนสุทธิจะพอแก่การที่จะจ่ายให้ได้"},{"id":"๓๔๐","num":"มาตรา ๓๔๐","num_ara":"๓๔๐","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑๐ การทำบัญชีส่วนเฉลี่ย","paragraphs":["ในกรณีที่มีเจ้าหนี้ตามคำพิพากษาหลายคนร้องขอให้บังคับคดีแก่ทรัพย์สินของลูกหนี้ตามคำพิพากษาหรือในกรณีตามมาตรา ๓๒๔ เมื่อเจ้าพนักงานบังคับคดีได้ขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินนั้นเสร็จแล้ว ให้ดำเนินการดังนี้","(๑) หักค่าฤชาธรรมเนียมในการบังคับคดีไว้ แต่ถ้าทรัพย์สินนั้นเป็นของเจ้าของรวม ให้เจ้าพนักงานบังคับคดีกันเงินส่วนของเจ้าของรวมอื่นนอกจากส่วนของลูกหนี้ตามคำพิพากษาออกจากเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินนั้นเสียก่อน แล้วจึงหักค่าฤชาธรรมเนียมในการบังคับคดีจากเงินเฉพาะส่วนของลูกหนี้ตามคำพิพากษา (๒) จัดทำบัญชีส่วนเฉลี่ยแสดงจำนวนเงินที่จ่ายให้แก่เจ้าหนี้ตามคำพิพากษาหรือผู้ทรงสิทธิเหนือทรัพย์สินนั้นแต่ละคนจากเงินจำนวนสุทธิที่พอแก่การที่จะจ่ายให้ตามสิทธิของบุคคลเช่นว่านั้นตามบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์ ประมวลกฎหมายนี้ หรือกฎหมายอื่นโดยให้แสดงจำนวนเงินที่กันส่วนให้แก่เจ้าของรวมไว้ในบัญชีดังกล่าวด้วย (๓) ส่งคำบอกกล่าวไปยังลูกหนี้ตามคำพิพากษา เจ้าของรวม และบุคคลตาม (๒) ขอให้ตรวจสอบบัญชีส่วนเฉลี่ยนั้นและให้ยื่นคำแถลงคัดค้านได้ภายในสิบห้าวันนับแต่วันส่งคำบอกกล่าว ถ้าไม่มีคำแถลงคัดค้านภายในกำหนดเวลาตาม (๓) ให้ถือว่าบัญชีส่วนเฉลี่ยดังกล่าวเป็นที่สุด และให้เจ้าพนักงานบังคับคดีจ่ายเงินให้แก่บุคคลตามบัญชีส่วนเฉลี่ยนั้น"],"text":"ในกรณีที่มีเจ้าหนี้ตามคำพิพากษาหลายคนร้องขอให้บังคับคดีแก่ทรัพย์สินของลูกหนี้ตามคำพิพากษาหรือในกรณีตามมาตรา ๓๒๔ เมื่อเจ้าพนักงานบังคับคดีได้ขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินนั้นเสร็จแล้ว ให้ดำเนินการดังนี้\n\n(๑) หักค่าฤชาธรรมเนียมในการบังคับคดีไว้ แต่ถ้าทรัพย์สินนั้นเป็นของเจ้าของรวม ให้เจ้าพนักงานบังคับคดีกันเงินส่วนของเจ้าของรวมอื่นนอกจากส่วนของลูกหนี้ตามคำพิพากษาออกจากเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินนั้นเสียก่อน แล้วจึงหักค่าฤชาธรรมเนียมในการบังคับคดีจากเงินเฉพาะส่วนของลูกหนี้ตามคำพิพากษา (๒) จัดทำบัญชีส่วนเฉลี่ยแสดงจำนวนเงินที่จ่ายให้แก่เจ้าหนี้ตามคำพิพากษาหรือผู้ทรงสิทธิเหนือทรัพย์สินนั้นแต่ละคนจากเงินจำนวนสุทธิที่พอแก่การที่จะจ่ายให้ตามสิทธิของบุคคลเช่นว่านั้นตามบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์ ประมวลกฎหมายนี้ หรือกฎหมายอื่นโดยให้แสดงจำนวนเงินที่กันส่วนให้แก่เจ้าของรวมไว้ในบัญชีดังกล่าวด้วย (๓) ส่งคำบอกกล่าวไปยังลูกหนี้ตามคำพิพากษา เจ้าของรวม และบุคคลตาม (๒) ขอให้ตรวจสอบบัญชีส่วนเฉลี่ยนั้นและให้ยื่นคำแถลงคัดค้านได้ภายในสิบห้าวันนับแต่วันส่งคำบอกกล่าว ถ้าไม่มีคำแถลงคัดค้านภายในกำหนดเวลาตาม (๓) ให้ถือว่าบัญชีส่วนเฉลี่ยดังกล่าวเป็นที่สุด และให้เจ้าพนักงานบังคับคดีจ่ายเงินให้แก่บุคคลตามบัญชีส่วนเฉลี่ยนั้น"},{"id":"๓๔๑","num":"มาตรา ๓๔๑","num_ara":"๓๔๑","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑๐ การทำบัญชีส่วนเฉลี่ย","paragraphs":["ในกรณีที่มีผู้ยื่นคำแถลงคัดค้านตามมาตรา ๓๔๐ ให้เจ้าพนักงานบังคับคดีออกหมายเรียกเจ้าหนี้ตามคำพิพากษาทุกคน ผู้ทรงสิทธิเหนือทรัพย์สินนั้น เจ้าของรวม และลูกหนี้ตามคำพิพากษา มาชี้แจงในเวลาและ ณ สถานที่ที่กำหนด โดยต้องแจ้งให้ทราบล่วงหน้าไม่น้อยกว่าสามวัน บุคคลดังกล่าวจะไปตามหมายเรียกด้วยตนเองหรือจะมอบให้ผู้รับมอบอำนาจไปกระทำการแทนก็ได้ เมื่อได้ตรวจพิจารณาคำแถลงคัดค้านและได้ฟังคำชี้แจงของผู้ซึ่งมาตามหมายเรียกแล้ว ให้เจ้าพนักงานบังคับคดีทำคำสั่งยืนตามหรือแก้ไขบัญชีส่วนเฉลี่ยนั้นแล้วอ่านคำสั่งดังกล่าวให้ผู้ซึ่งมาตามหมายเรียกฟังและให้ลงลายมือชื่อรับทราบไว้ ในกรณีที่ไม่อาจทำคำสั่งได้ภายในวันที่กำหนด ให้เจ้าพนักงานบังคับคดีแจ้งให้ผู้ซึ่งมาตามหมายเรียกหรือตามนัดทราบวันนัดฟังคำสั่งที่เลื่อนไปและให้ลงลายมือชื่อรับทราบไว้ ถ้าบุคคลตามวรรคหนึ่งมิได้ไปตามหมายเรียกหรือตามนัดของเจ้าพนักงานบังคับคดี ให้ถือว่าได้ทราบวันนัดและคำสั่งของเจ้าพนักงานบังคับคดีแล้ว"],"text":"ในกรณีที่มีผู้ยื่นคำแถลงคัดค้านตามมาตรา ๓๔๐ ให้เจ้าพนักงานบังคับคดีออกหมายเรียกเจ้าหนี้ตามคำพิพากษาทุกคน ผู้ทรงสิทธิเหนือทรัพย์สินนั้น เจ้าของรวม และลูกหนี้ตามคำพิพากษา มาชี้แจงในเวลาและ ณ สถานที่ที่กำหนด โดยต้องแจ้งให้ทราบล่วงหน้าไม่น้อยกว่าสามวัน บุคคลดังกล่าวจะไปตามหมายเรียกด้วยตนเองหรือจะมอบให้ผู้รับมอบอำนาจไปกระทำการแทนก็ได้ เมื่อได้ตรวจพิจารณาคำแถลงคัดค้านและได้ฟังคำชี้แจงของผู้ซึ่งมาตามหมายเรียกแล้ว ให้เจ้าพนักงานบังคับคดีทำคำสั่งยืนตามหรือแก้ไขบัญชีส่วนเฉลี่ยนั้นแล้วอ่านคำสั่งดังกล่าวให้ผู้ซึ่งมาตามหมายเรียกฟังและให้ลงลายมือชื่อรับทราบไว้ ในกรณีที่ไม่อาจทำคำสั่งได้ภายในวันที่กำหนด ให้เจ้าพนักงานบังคับคดีแจ้งให้ผู้ซึ่งมาตามหมายเรียกหรือตามนัดทราบวันนัดฟังคำสั่งที่เลื่อนไปและให้ลงลายมือชื่อรับทราบไว้ ถ้าบุคคลตามวรรคหนึ่งมิได้ไปตามหมายเรียกหรือตามนัดของเจ้าพนักงานบังคับคดี ให้ถือว่าได้ทราบวันนัดและคำสั่งของเจ้าพนักงานบังคับคดีแล้ว"},{"id":"๓๔๒","num":"มาตรา ๓๔๒","num_ara":"๓๔๒","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑๐ การทำบัญชีส่วนเฉลี่ย","paragraphs":["ในกรณีที่เจ้าพนักงานบังคับคดีมีคำสั่งยืนตามบัญชีส่วนเฉลี่ย ผู้ซึ่งได้ยื่นคำแถลงคัดค้านตามมาตรา ๓๔๐ อาจยื่นคำร้องคัดค้านคำสั่งดังกล่าวต่อศาลได้ภายในเจ็ดวันนับแต่วันที่ได้อ่านคำสั่ง ในกรณีที่เจ้าพนักงานบังคับคดีมีคำสั่งแก้ไขบัญชีส่วนเฉลี่ย บุคคลตามมาตรา ๓๔๑ อาจยื่นคำร้องคัดค้านคำสั่งดังกล่าวต่อศาลได้ภายในสิบห้าวันนับแต่วันที่ได้อ่านคำสั่ง ในกรณีที่มีผู้ยื่นคำร้องคัดค้านตามวรรคหนึ่งหรือวรรคสอง ให้เจ้าพนักงานบังคับคดีเลื่อนการจ่ายส่วนเฉลี่ยไปก่อนจนกว่าศาลจะได้มีคำสั่งหรือทำการจ่ายส่วนเฉลี่ยชั่วคราวตามมาตรา ๓๔๓ ถ้าไม่มีผู้ยื่นคำร้องคัดค้านตามวรรคหนึ่งหรือวรรคสองให้ถือว่าบัญชีส่วนเฉลี่ยนั้นเป็นที่สุด และให้เจ้าพนักงานบังคับคดีจ่ายเงินให้แก่บุคคลตามบัญชีส่วนเฉลี่ยนั้น คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด"],"text":"ในกรณีที่เจ้าพนักงานบังคับคดีมีคำสั่งยืนตามบัญชีส่วนเฉลี่ย ผู้ซึ่งได้ยื่นคำแถลงคัดค้านตามมาตรา ๓๔๐ อาจยื่นคำร้องคัดค้านคำสั่งดังกล่าวต่อศาลได้ภายในเจ็ดวันนับแต่วันที่ได้อ่านคำสั่ง ในกรณีที่เจ้าพนักงานบังคับคดีมีคำสั่งแก้ไขบัญชีส่วนเฉลี่ย บุคคลตามมาตรา ๓๔๑ อาจยื่นคำร้องคัดค้านคำสั่งดังกล่าวต่อศาลได้ภายในสิบห้าวันนับแต่วันที่ได้อ่านคำสั่ง ในกรณีที่มีผู้ยื่นคำร้องคัดค้านตามวรรคหนึ่งหรือวรรคสอง ให้เจ้าพนักงานบังคับคดีเลื่อนการจ่ายส่วนเฉลี่ยไปก่อนจนกว่าศาลจะได้มีคำสั่งหรือทำการจ่ายส่วนเฉลี่ยชั่วคราวตามมาตรา ๓๔๓ ถ้าไม่มีผู้ยื่นคำร้องคัดค้านตามวรรคหนึ่งหรือวรรคสองให้ถือว่าบัญชีส่วนเฉลี่ยนั้นเป็นที่สุด และให้เจ้าพนักงานบังคับคดีจ่ายเงินให้แก่บุคคลตามบัญชีส่วนเฉลี่ยนั้น คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด"},{"id":"๓๔๓","num":"มาตรา ๓๔๓","num_ara":"๓๔๓","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑๐ การทำบัญชีส่วนเฉลี่ย","paragraphs":["เมื่อเจ้าพนักงานบังคับคดีเห็นว่า ถ้าจะเลื่อนการจ่ายส่วนเฉลี่ยไปจนกว่าได้จำหน่ายทรัพย์สินที่ประสงค์จะบังคับทั้งหมดหรือจนกว่าการเรียกร้องทั้งหมดที่มาสู่ศาลได้เสร็จเด็ดขาดแล้วจะทำให้บุคคลผู้มีส่วนเฉลี่ยในเงินรายได้แห่งทรัพย์สินที่บังคับนั้นทุกคนหรือคนใดคนหนึ่งได้รับความเสียหาย เจ้าพนักงานบังคับคดีมีสิทธิที่จะแบ่งเงินรายได้เท่าที่พอแก่การที่จะจ่ายให้ดังที่บัญญัติไว้ในมาตรา ๓๔๐ มาตรา ๓๔๑ และมาตรา ๓๔๒ ได้ ในเมื่อเจ้าพนักงานบังคับคดีได้กันเงินไว้สำหรับชำระค่าฤชาธรรมเนียมในการบังคับคดีทั้งหมดที่เกิดขึ้นหรือจะเกิดขึ้นต่อไป และสำหรับชำระการเรียกร้องใด ๆ ที่ยังมีข้อโต้แย้งไว้แล้ว"],"text":"เมื่อเจ้าพนักงานบังคับคดีเห็นว่า ถ้าจะเลื่อนการจ่ายส่วนเฉลี่ยไปจนกว่าได้จำหน่ายทรัพย์สินที่ประสงค์จะบังคับทั้งหมดหรือจนกว่าการเรียกร้องทั้งหมดที่มาสู่ศาลได้เสร็จเด็ดขาดแล้วจะทำให้บุคคลผู้มีส่วนเฉลี่ยในเงินรายได้แห่งทรัพย์สินที่บังคับนั้นทุกคนหรือคนใดคนหนึ่งได้รับความเสียหาย เจ้าพนักงานบังคับคดีมีสิทธิที่จะแบ่งเ โลม"},{"id":"๓๔๗","num":"มาตรา ๓๔๗","num_ara":"๓๔๗","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๓ การบังคับคดีในกรณีที่ให้ส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่ง","subsection":"","paragraphs":["ในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษาส่งคืนทรัพย์เฉพาะสิ่งแก่เจ้าหนี้ตามคำพิพากษาหรือส่งมอบทรัพย์เฉพาะสิ่งเพื่อชำระหนี้ตามสิทธิเรียกร้องแก่เจ้าหนี้ตามคำพิพากษา ให้เจ้าพนักงานบังคับคดีมีอำนาจยึดทรัพย์นั้นเพื่อดำเนินการให้เป็นไปตามคำพิพากษาหรือคำสั่ง ถ้าทรัพย์เฉพาะสิ่งของลูกหนี้ตามคำพิพากษาที่ต้องส่งมอบแก่เจ้าหนี้ตามคำพิพากษาเพื่อชำระหนี้ตามสิทธิเรียกร้องได้ถูกยึดหรืออายัดไว้เพื่อเอาชำระหนี้เงินในคดีอื่นแล้ว เจ้าหนี้ตามคำพิพากษาชอบที่จะยื่นคำร้องต่อศาลที่ออกหมายบังคับคดีก่อนมีการขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นขอให้มีคำสั่งให้เจ้าพนักงานบังคับคดีส่งมอบทรัพย์นั้นให้แก่ตน โดยต้องแสดงให้เป็นที่พอใจแก่ศาลได้ว่า เจ้าหนี้ตามคำพิพากษาผู้ขอยึดหรืออายัดทรัพย์ในคดีอื่นนั้นสามารถบังคับคดีเอาจากทรัพย์สินอื่นของลูกหนี้ตามคำพิพากษาได้เพียงพอ ทั้งนี้ ให้ศาลแจ้งให้เจ้าพนักงานบังคับคดีทราบและอาจมีคำสั่งงดการบังคับคดีไว้ในระหว่างพิจารณาก็ได้ ในกรณีเช่นว่านี้ ให้เจ้าหนี้ตามคำพิพากษาชดใช้ค่าใช้จ่ายที่เกิดขึ้นจากการยึดหรืออายัดทรัพย์แก่เจ้าหนี้ตามคำพิพากษาผู้ขอยึดหรืออายัดทรัพย์ในคดีอื่นนั้น และให้เจ้าหนี้ตามคำพิพากษาในคดีอื่นนั้นได้รับยกเว้นไม่ต้องเสียค่าธรรมเนียมเจ้าพนักงานบังคับคดี ถ้าเจ้าหนี้ตามคำพิพากษาไม่สามารถแสดงให้เป็นที่พอใจแก่ศาลได้ตามวรรคสอง ให้ศาลมีคำสั่งให้เจ้าหนี้ตามคำพิพากษามีสิทธิเข้าเฉลี่ยในเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินของลูกหนี้ตามคำพิพากษาในคดีอื่นนั้น ในกรณีเช่นว่านี้ ให้นำมาตรา ๓๒๖ และมาตรา ๓๒๙ มาใช้บังคับ"],"text":"ในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษาส่งคืนทรัพย์เฉพาะสิ่งแก่เจ้าหนี้ตามคำพิพากษาหรือส่งมอบทรัพย์เฉพาะสิ่งเพื่อชำระหนี้ตามสิทธิเรียกร้องแก่เจ้าหนี้ตามคำพิพากษา ให้เจ้าพนักงานบังคับคดีมีอำนาจยึดทรัพย์นั้นเพื่อดำเนินการให้เป็นไปตามคำพิพากษาหรือคำสั่ง ถ้าทรัพย์เฉพาะสิ่งของลูกหนี้ตามคำพิพากษาที่ต้องส่งมอบแก่เจ้าหนี้ตามคำพิพากษาเพื่อชำระหนี้ตามสิทธิเรียกร้องได้ถูกยึดหรืออายัดไว้เพื่อเอาชำระหนี้เงินในคดีอื่นแล้ว เจ้าหนี้ตามคำพิพากษาชอบที่จะยื่นคำร้องต่อศาลที่ออกหมายบังคับคดีก่อนมีการขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นขอให้มีคำสั่งให้เจ้าพนักงานบังคับคดีส่งมอบทรัพย์นั้นให้แก่ตน โดยต้องแสดงให้เป็นที่พอใจแก่ศาลได้ว่า เจ้าหนี้ตามคำพิพากษาผู้ขอยึดหรืออายัดทรัพย์ในคดีอื่นนั้นสามารถบังคับคดีเอาจากทรัพย์สินอื่นของลูกหนี้ตามคำพิพากษาได้เพียงพอ ทั้งนี้ ให้ศาลแจ้งให้เจ้าพนักงานบังคับคดีทราบและอาจมีคำสั่งงดการบังคับคดีไว้ในระหว่างพิจารณาก็ได้ ในกรณีเช่นว่านี้ ให้เจ้าหนี้ตามคำพิพากษาชดใช้ค่าใช้จ่ายที่เกิดขึ้นจากการยึดหรืออายัดทรัพย์แก่เจ้าหนี้ตามคำพิพากษาผู้ขอยึดหรืออายัดทรัพย์ในคดีอื่นนั้น และให้เจ้าหนี้ตามคำพิพากษาในคดีอื่นนั้นได้รับยกเว้นไม่ต้องเสียค่าธรรมเนียมเจ้าพนักงานบังคับคดี ถ้าเจ้าหนี้ตามคำพิพากษาไม่สามารถแสดงให้เป็นที่พอใจแก่ศาลได้ตามวรรคสอง ให้ศาลมีคำสั่งให้เจ้าหนี้ตามคำพิพากษามีสิทธิเข้าเฉลี่ยในเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินของลูกหนี้ตามคำพิพากษาในคดีอื่นนั้น ในกรณีเช่นว่านี้ ให้นำมาตรา ๓๒๖ และมาตรา ๓๒๙ มาใช้บังคับ"},{"id":"๓๔๘","num":"มาตรา ๓๔๘","num_ara":"๓๔๘","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๓ การบังคับคดีในกรณีที่ให้ส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่ง","subsection":"","paragraphs":["การบังคับคดีในกรณีที่ศาลพิพากษาให้ลูกหนี้ตามคำพิพากษาส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่งที่มีทะเบียนกรรมสิทธิ์หรือมีหนังสือรับรองการทำประโยชน์แก่เจ้าหนี้ตามคำพิพากษานั้น ให้เจ้าพนักงานบังคับคดีแจ้งให้พนักงานเจ้าหน้าที่หรือนายทะเบียนดำเนินการจดทะเบียนต่อไป การบังคับคดีในกรณีที่ศาลพิพากษาให้ลูกหนี้ตามคำพิพากษาส่งคืนหรือส่งมอบอสังหาริมทรัพย์เฉพาะสิ่ง ถ้ามีเหตุขัดขวางหรือเหตุขัดข้องในการส่งคืนหรือส่งมอบอสังหาริมทรัพย์นั้นแก่เจ้าหนี้ตามคำพิพากษา ให้นำบทบัญญัติในหมวด ๔ การบังคับคดีในกรณีที่ให้ขับไล่ มาใช้บังคับโดยอนุโลม"],"text":"การบังคับคดีในกรณีที่ศาลพิพากษาให้ลูกหนี้ตามคำพิพากษาส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่งที่มีทะเบียนกรรมสิทธิ์หรือมีหนังสือรับรองการทำประโยชน์แก่เจ้าหนี้ตามคำพิพากษานั้น าวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๔ การบังคับคดีในกรณีที่ให้ขับไล่","subsection":"ส่วนที่ ๑ การบังคับคดีในกรณีที่ลูกหนี้ตามคำพิพากษาต้องออกไปจากอสังหาริมทรัพย์ ที่อยู่อาศัย","paragraphs":["ในกรณีตามมาตรา ๓๕๑ (๑) ให้เจ้าพนักงานบังคับคดีมีอำนาจส่งมอบทรัพย์นั้นทั้งหมดหรือบางส่วนให้เจ้าหนี้ตามคำพิพากษาเข้าครอบครองได้ทันที ถ้ามีสิ่งกีดขวางอันเป็นอุปสรรคต่อการส่งมอบ ให้เจ้าพนักงานบังคับคดีมีอำนาจทำลายสิ่งกีดขวางดังกล่าวได้ตามความจำเป็น ถ้ายังมีสิ่งของของลูกหนี้ตามคำพิพากษาหรือของบุคคลใดอยู่ในทรัพย์นั้น ให้เจ้าพนักงานบังคับคดีทำบัญชีสิ่งของนั้นไว้ และมีอำนาจดำเนินการดังต่อไปนี้","(๑) ถ้าสิ่งของนั้นมีสภาพเป็นของสดของเสียได้ หรือมีสภาพอันจะก่อให้เกิดอันตรายได้ หรือถ้าหน่วงช้าไว้จะเป็นการเสี่ยงความเสียหายหรือค่าใช้จ่ายจะเกินส่วนแห่งค่าของสิ่งของนั้น ให้เจ้าพนักงานบังคับคดีมีอำนาจจำหน่ายสิ่งของนั้นได้ทันทีโดยวิธีขายทอดตลาดหรือวิธีอื่นที่เห็นสมควร และเก็บรักษาเงินสุทธิหลังจากหักค่าใช้จ่ายไว้แทนสิ่งของนั้น หรือทำลายสิ่งของนั้น หรือดำเนินการอื่นใดตามที่เห็นสมควรก็ได้ ทั้งนี้ ให้คำนึงถึงสภาพแห่งสิ่งของ ประโยชน์ของผู้มีส่วนได้เสีย และประโยชน์สาธารณะ (๒) ถ้าสิ่งของนั้นมิใช่สิ่งของตามที่ระบุไว้ใน (๑) ให้เจ้าพนักงานบังคับคดีมีอำนาจนำสิ่งของนั้นมาเก็บรักษาไว้ หรือมอบให้เจ้าหนี้ตามคำพิพากษาเป็นผู้รักษา หรือฝากไว้ ณ สถานที่ใด หรือแก่บุคคลใดตามที่เห็นสมควร แล้วแจ้งหรือประกาศให้ลูกหนี้ตามคำพิพากษาหรือเจ้าของสิ่งของมารับคืนไปภายในเวลาที่เจ้าพนักงานบังคับคดีกำหนด ถ้าลูกหนี้ตามคำพิพากษาหรือเจ้าของสิ่งของไม่มารับหรือไม่ยอมรับสิ่งของนั้นคืนไปภายในเวลาที่กำหนด ให้เจ้าพนักงานบังคับคดีดำเนินการตาม (๑) โดยอนุโลม เงินที่เจ้าพนักงานบังคับคดีได้มาจากการจำหน่ายสิ่งของตามวรรคสอง (๑) หรือ (๒) ถ้าลูกหนี้ตามคำพิพากษาหรือเจ้าของสิ่งของไม่มาขอรับคืนภายในกำหนดห้าปีนับแต่ได้รับแจ้งจากเจ้าพนักงานบังคับคดี ให้ตกเป็นของแผ่นดิน ในกรณีที่สิ่งของตามวรรคสองถูกยึด อายัด หรือห้ามโอน ยักย้าย หรือจำหน่ายตามวิธีการชั่วคราวก่อนพิพากษาหรือเพื่อการบังคับคดีในคดีอื่น ให้เจ้าพนักงานบังคับคดีมีอำนาจย้ายสิ่งของดังกล่าวไปเก็บไว้ ณ สถานที่อื่นได้ตามที่เห็นสมควร ทั้งนี้ ให้เจ้าพนักงานบังคับคดีแจ้งศาลหรือเจ้าพนักงานบังคับคดีในคดีอื่นทราบด้วย ให้ลูกหนี้ตามคำพิพากษาเป็นผู้เสียค่าใช้จ่ายที่เกิดจากการดำเนินการตามมาตรานี้ และให้ถือว่าเป็นหนี้ตามคำพิพากษาที่จะบังคับคดีกันต่อไป"],"text":"ในกรณีตามมาตรา ๓๕๑ (๑) ให้เจ้าพนักงานบังคับคดีมีอำนาจส่งมอบทรัพย์นั้นทั้งหมดหรือบางส่วนให้เจ้าหนี้ตามคำพิพากษาเข้าครอบครองได้ทันที ถ้ามีสิ่งกีดขวางอันเป็นอุปสรรคต่อการส่งมอบ ให้เจ้าพนักงานบังคับคดีมีอำนาจทำลายสิ่งกีดขวางดังกล่าวได้ตามความจำเป็น ถ้ายังมีสิ่งของของลูกหนี้ตามคำพิพากษาหรือของบุคคลใดอยู่ในทรัพย์นั้น ให้เจ้าพนักงานบังคับคดีทำบัญชีสิ่งของนั้นไว้ และมีอำนาจดำเนินการดังต่อไปนี้\n\n(๑) ถ้าสิ่งของนั้นมีสภาพเป็นของสดของเสียได้ หรือมีสภาพอันจะก่อให้เกิดอันตรายได้ หรือถ้าหน่วงช้าไว้จะเป็นการเสี่ยงความเสียหายหรือค่าใช้จ่ายจะเกินส่วนแห่งค่าของสิ่งของนั้น ให้เจ้าพนักงานบังคับคดีมีอำนาจจำหน่ายสิ่งของนั้นได้ทันทีโดยวิธีขายทอดตลาดหรือวิธีอื่นที่เห็นสมควร และเก็บรักษาเงินสุทธิหลังจากหักค่าใช้จ่ายไว้แทนสิ่งของนั้น หรือทำลายสิ่งของนั้น หรือดำเนินการอื่นใดตามที่เห็นสมควรก็ได้ ทั้งนี้ ให้คำนึงถึงสภาพแห่งสิ่งของ ประโยชน์ของผู้มีส่วนได้เสีย และประโยชน์สาธารณะ (๒) ถ้าสิ่งของนั้นมิใช่สิ่งของตามที่ระบุไว้ใน (๑) ให้เจ้าพนักงานบังคับคดีมีอำนาจนำสิ่งของนั้นมาเก็บรักษาไว้ หรือมอบให้เจ้าหนี้ตามคำพิพากษาเป็นผู้รักษา หรือฝากไว้ ณ สถานที่ใด หรือแก่บุคคลใดตามที่เห็นสมควร แล้วแจ้งหรือประกาศให้ลูกหนี้ตามคำพิพากษาหรือเจ้าของสิ่งของมารับคืนไปภายในเวลาที่เจ้าพนักงานบังคับคดีกำหนด ถ้าลูกหนี้ตามคำพิพากษาหรือเจ้าของสิ่งของไม่มารับหรือไม่ยอมรับสิ่งของนั้นคืนไปภายในเวลาที่กำหนด ให้เจ้าพนักงานบังคับคดีดำเนินการตาม (๑) โดยอนุโลม เงินที่เจ้าพนักงานบังคับคดีได้มาจากการจำหน่ายสิ่งของตามวรรคสอง (๑) หรือ (๒) ถ้าลูกหนี้ตามคำพิพากษาหรือเจ้าของสิ่งของไม่มาขอรับคืนภายในกำหนดห้าปีนับแต่ได้รับแจ้งจากเจ้าพนักงานบังคับคดี ให้ตกเป็นของแผ่นดิน ในกรณีที่สิ่งของตามวรรคสองถูกยึด อายัด หรือห้ามโอน ยักย้าย หรือจำหน่ายตามวิธีการชั่วคราวก่อนพิพากษาหรือเพื่อการบังคับคดีในคดีอื่น ให้เจ้าพนักงานบังคับคดีมีอำนาจย้ายสิ่งของดังกล่าวไปเก็บไว้ ณ สถานที่อื่นได้ตามที่เห็นสมควร ทั้งนี้ ให้เจ้าพนักงานบังคับคดีแจ้งศาลหรือเจ้าพนักงานบังคับคดีในคดีอื่นทราบด้วย ให้ลูกหนี้ตามคำพิพากษาเป็นผู้เสียค่าใช้จ่ายที่เกิดจากการดำเนินการตามมาตรานี้ และให้ถือว่าเป็นหนี้ตามคำพิพากษาที่จะบังคับคดีกันต่อไป"},{"id":"๓๕๓","num":"มาตรา ๓๕๓","num_ara":"๓๕๓","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๔ การบังคับคดีในกรณีที่ให้ขับไล่","subsection":"ส่วนที่ ๑ การบังคับคดีในกรณีที่ลูกหนี้ตามคำพิพากษาต้องออกไปจากอสังหาริมทรัพย์ ที่อยู่อาศัย","paragraphs":["ในกรณีตามมาตรา ๓๕๑ (๒) ให้เจ้าพนักงานบังคับคดีปฏิบัติดังต่อไปนี้","(๑) รายงานต่อศาลเพื่อมีคำสั่งจับกุมและกักขังลูกหนี้ตามคำพิพากษาหรือบริวาร และให้ศาลมีอำนาจสั่งจับกุมและกักขังได้ทันที ในกรณีเช่นว่านี้ ให้นำบทบัญญัติมาตรา ๓๖๓ มาใช้บังคับโดยอนุโลม (๒) ปิดประกาศให้บุคคลที่อยู่อาศัยหรือครอบครองทรัพย์นั้นซึ่งอ้างว่ามิได้เป็นบริวารของลูกหนี้ตามคำพิพากษา ยื่นคำร้องต่อศาลภายในกำหนดเวลาสิบห้าวันนับแต่วันปิดประกาศแสดงว่าตนมีอำนาจพิเศษในการอยู่อาศัยหรือครอบครองทรัพย์นั้น เมื่อมีการจับกุมลูกหนี้ตามคำพิพากษาหรือบริวารตาม (๑) แล้ว หรือในกรณีที่บุคคลดังกล่าวหลบหนีไปจากทรัพย์นั้นแล้ว ให้เจ้าพนักงานบังคับคดีดำเนินการตามมาตรา ๓๕๒"],"text":"ในกรณีตามมาตรา ๓๕๑ (๒) ให้เจ้าพนักงานบังคับคดีปฏิบัติดังต่อไปนี้\n\n(๑) รายงานต่อศาลเพื่อมีคำสั่งจับกุมและกักขังลูกหนี้ตามคำพิพากษาหรือบริวาร และให้ศาลมีอำนาจสั่งจับกุมและกักขังได้ทันที ในกรณีเช่นว่านี้ ให้นำบทบัญญัติมาตรา ๓๖๓ มาใช้บังคับโดยอนุโลม (๒) ปิดประกาศให้บุคคลที่อยู่อาศัยหรือครอบครองทรัพย์นั้นซึ่งอ้างว่ามิได้เป็นบริวารของลูกหนี้ตามคำพิพากษา ยื่นคำร้องต่อศาลภายในกำหนดเวลาสิบห้าวันนับแต่วันปิดประกาศแสดงว่าตนมีอำนาจพิเศษในการอยู่อาศัยหรือครอบครองทรัพย์นั้น เมื่อมีการจับกุมลูกหนี้ตามคำพิพากษาหรือบริวารตาม (๑) แล้ว หรือในกรณีที่บุคคลดังกล่าวหลบหนีไปจากทรัพย์นั้นแล้ว ให้เจ้าพนักงานบังคับคดีดำเนินการตามมาตรา ๓๕๒"},{"id":"๓๕๔","num":"มาตรา ๓๕๔","num_ara":"๓๕๔","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๔ การบังคับคดีในกรณีที่ให้ขับไล่","subsection":"ส่วนที่ ๑ การบังคับคดีในกรณีที่ลูกหนี้ตามคำพิพากษาต้องออกไปจากอสังหาริมทรัพย์ ที่อยู่อาศัย","paragraphs":["เพื่อประโยชน์ในการบังคับคดีตามที่บัญญัติไว้ในมาตรา ๓๕๑ ให้ถือว่าบุคคลดังต่อไปนี้เป็นบริวารของลูกหนี้ตามคำพิพากษา","(๑) บุคคลที่อยู่อาศัยหรือครอบครองทรัพย์นั้นและมิได้ยื่นคำร้องต่อศาลภายในกำหนดเวลาตามมาตรา ๓๕๓ (๒) หรือยื่นคำร้องต่อศาลแล้วแต่แสดงต่อศาลไม่ได้ว่าตนมีอำนาจพิเศษในการอยู่อาศัยหรือครอบครองทรัพย์นั้น (๒) บุคคลที่เข้ามาอยู่ในทรัพย์นั้นในระหว่างเวลาที่เจ้าพนักงานบังคับคดีดำเนินการให้เจ้าหนี้ตามคำพิพากษาเข้าครอบครองทรัพย์นั้น"],"text":"เพื่อประโยชน์ในการบังคับคดีตามที่บัญญัติไว้ในมาตรา ๓๕๑ ให้ถือว่าบุคคลดังต่อไปนี้เป็นบริวารของลูกหนี้ตามคำพิพากษา\n\n(๑) บุคคลที่อยู่อาศัยหรือครอบครองทรัพย์นั้นและมิได้ยื่นคำร้องต่อศาลภายในกำหนดเวลาตามมาตรา ๓๕๓ (๒) หรือยื่นคำร้องต่อศาลแล้วแต่แสดงต่อศาลไม่ได้ว่าตนมีอำนาจพิเศษในการอยู่อาศัยหรือครอบครองทรัพย์นั้น (๒) บุคคลที่เข้ามาอยู่ในทรัพย์นั้นในระหว่างเวลาที่เจ้าพนักงานบังคับคดีดำเนินการให้เจ้าหนี้ตามคำพิพากษาเข้าครอบครองทรัพย์นั้น"},{"id":"๓๕๕","num":"มาตรา ๓๕๕","num_ara":"๓๕๕","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๔ การบังคับคดีในกรณีที่ให้ขับไล่","subsection":"ส่วนที่ ๒ การบังคับคดีในกรณีที่ลูกหนี้ตามคำพิพากษาต้องรื้อถอนสิ่งปลูกสร้าง","paragraphs":["ในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษาต้องรื้อถอนสิ่งปลูกสร้าง ไม้ยืนต้น ไม้ล้มลุกหรือธัญชาติ หรือขนย้ายทรัพย์สิน ออกไปจากอสังหาริมทรัพย์ ที่อยู่อาศัย หรือทรัพย์ที่ครอบครอง ให้เจ้าพนักงานบังคับคดีมีอำนาจดำเนินการรื้อถอน และขนย้ายทรัพย์สินออกจากทรัพย์นั้นได้โดยให้ลูกหนี้ตามคำพิพากษาเป็นผู้เสียค่าใช้จ่ายในการรื้อถอนหรือขนย้ายทรัพย์สินนั้น และให้ถือว่าเป็นหนี้ตามคำพิพากษาที่จะบังคับคดีกันต่อไป กรณีตามวรรคหนึ่ง ให้เจ้าพนักงานบังคับคดีปิดประกาศกำหนดการรื้อถอนหรือขนย้ายทรัพย์สินไว้ ณ บริเวณนั้นไม่น้อยกว่าสิบห้าวัน และให้เจ้าพนักงานบังคับคดีใช้ความระมัดระวังตามสมควรแก่พฤติการณ์ในการรื้อถอนหรือขนย้ายทรัพย์สินนั้น ในการจัดการกับวัสดุที่ถูกรื้อถอนและทรัพย์สินที่ถูกขนย้ายออกจากอสังหาริมทรัพย์ ที่อยู่อาศัย หรือทรัพย์ที่ครอบครองนั้น ให้นำบทบัญญัติมาตรา ๓๕๒ วรรคสอง วรรคสาม และวรรคสี่ มาใช้บังคับโดยอนุโลม"],"text":"ในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษาต้องรื้อถอนสิ่งปลูกสร้าง ไม้ยืนต้น ไม้ล้มลุกหรือธัญชาติ หรือขนย้ายทรัพย์สิน ออกไปจากอสังหาริมทรัพย์ ที่อยู่อาศัย หรือทรัพย์ที่ครอบครอง ให้เจ้าพนักงานบังคับคดีมีอำนาจดำเนินการรื้อถอน และขนย้ายทรัพย์สินออกจากทรัพย์นั้นได้โดยให้ลูกหนี้ตามคำพิพากษาเป็นผู้เสียค่าใช้จ่ายในการรื้อถอนหรือขนย้ายทรัพย์สินนั้น และให้ถือว่าเป็นหนี้ตามคำพิพากษาที่จะบังคับคดีกันต่อไป กรณีตามวรรคหนึ่ง ให้เจ้าพนักงานบังคับคดีปิดประกาศกำหนดการรื้อถอนหรือขนย้ายทรัพย์สินไว้ ณ บริเวณนั้นไม่น้อยกว่าสิบห้าวัน และให้เจ้าพนักงานบังคับคดีใช้ความระมัดระวังตามสมควรแก่พฤติการณ์ในการรื้อถอนหรือขนย้ายทรัพย์สินนั้น ในการจัดการกับวัสดุที่ถูกรื้อถอนและทรัพย์สินที่ถูกขนย้ายออกจากอสังหาริมทรัพย์ ที่อยู่อาศัย หรือทรัพย์ที่ครอบครองนั้น ให้นำบทบัญญัติมาตรา ๓๕๒ วรรคสอง วรรคสาม และวรรคสี่ มาใช้บังคับโดยอนุโลม"},{"id":"๓๕๖","num":"มาตรา ๓๕๖","num_ara":"๓๕๖","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๕ การบังคับคดีในกรณีที่ให้กระทำการหรืองดเว้นกระทำการ","subsection":"","paragraphs":["การบังคับคดีในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษากระทำการหรืองดเว้นกระทำการอย่างหนึ่งอย่างใดนอกจากกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษาส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่งหรือให้ขับไล่ลูกหนี้ตามคำพิพากษาตามที่บัญญัติไว้ในหมวด ๓ การบังคับคดีในกรณีที่ให้ส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่ง และหมวด ๔ การบังคับคดีในกรณีที่ให้ขับไล่ ให้ศาลมีอำนาจกำหนดวิธีการบังคับคดีตามที่บัญญัติไว้ในส่วนที่ ๑ หรือส่วนที่ ๒ แห่งหมวดนี้ เว้นแต่ในกรณีที่ศาลเห็นว่าวิธีการบังคับคดีดังกล่าวไม่อาจบรรลุผลตามคำพิพากษาหรือคำสั่งของศาลได้ ก็ให้ศาลมีอำนาจกำหนดวิธีการบังคับคดีตามที่ศาลเห็นสมควรเท่าที่สภาพแห่งการบังคับคดีจะเปิดช่องให้กระทำได้"],"text":"การบังคับคดีในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษากระทำการหรืองดเว้นกระทำการอย่างหนึ่งอย่างใดนอกจากกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษาส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่งหรือให้ขับไล่ลูกหนี้ตามคำพิพากษาตามที่บัญญัติไว้ในหมวด ๓ การบังคับคดีในกรณีที่ให้ส่งคืนหรือส่งมอบทรัพย์เฉพาะสิ่ง และหมวด ๔ การบังคับคดีในกรณีที่ให้ขับไล่ ให้ศาลมีอำนาจกำหนดวิธีการบังคับคดีตามที่บัญญัติไว้ในส่วนที่ ๑ หรือส่วนที่ ๒ แห่งหมวดนี้ เว้นแต่ในกรณีที่ศาลเห็นว่าวิธีการบังคับคดีดังกล่าวไม่อาจบรรลุผลตามคำพิพากษาหรือคำสั่งของศาลได้ ก็ให้ศาลมีอำนาจกำหนดวิธีการบังคับคดีตามที่ศาลเห็นสมควรเท่าที่สภาพแห่งการบังคับคดีจะเปิดช่องให้กระทำได้"},{"id":"๓๕๗","num":"มาตรา ๓๕๗","num_ara":"๓๕๗","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๕ การบังคับคดีในกรณีที่ให้กระทำการหรืองดเว้นกระทำการ","subsection":"ส่วนที่ ๑ การบังคับคดีในกรณีที่ให้กระทำการ","paragraphs":["การบังคับคดีในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษากระทำนิติกรรมอย่างหนึ่งอย่างใดซึ่งอาจถือเอาคำพิพากษาของศาลแทนการแสดงเจตนาของลูกหนี้ตามคำพิพากษาได้ และคำพิพากษาหรือคำสั่งของศาลไม่ได้กำหนดให้ถือเอาคำพิพากษาแทนการแสดงเจตนาของลูกหนี้ตามคำพิพากษาไว้ เจ้าหนี้ตามคำพิพากษาอาจมีคำขอให้ศาลมีคำสั่งให้ถือเอาคำพิพากษาหรือคำสั่งของศาลแทนการแสดงเจตนาของลูกหนี้ตามคำพิพากษานั้นได้ ถ้าการแสดงเจตนาของลูกหนี้ตามคำพิพากษาจะบริบูรณ์ต่อเมื่อได้จดทะเบียนต่อนายทะเบียนพนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมาย เจ้าหนี้ตามคำพิพากษาอาจมีคำขอให้ศาลสั่งให้ดำเนินการจดทะเบียนให้ก็ได้ ในกรณีเช่นนี้ ให้บุคคลดังกล่าวนั้นจดทะเบียนไปตามคำสั่งศาล ถ้าหนังสือสำคัญ เช่น โฉนดที่ดิน ใบจอง หนังสือรับรองการทำประโยชน์ ใบทะเบียน หรือเอกสารสิทธิที่จะต้องใช้เพื่อการจดทะเบียนสูญหาย บุบสลาย หรือนำมาไม่ได้เพราะเหตุอื่นใด ศาลจะสั่งให้นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลผู้มีอำนาจหน้าที่ตามกฎหมายออกใบแทนหนังสือสำคัญดังกล่าวก็ได้ เมื่อได้ออกใบแทนแล้ว หนังสือสำคัญเดิมเป็นอันยกเลิก"],"text":"การบังคับคดีในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษากระทำนิติกรรมอย่างหนึ่งอย่างใดซึ่งอาจถือเอาคำพิพากษาของศาลแทนการแสดงเจตนาของลูกหนี้ตามคำพิพากษาได้ และคำพิพากษาหรือคำสั่งของศาลไม่ได้กำหนดให้ถือเอาคำพิพากษาแทนการแสดงเจตนาของลูกหนี้ตามคำพิพากษาไว้ เจ้าหนี้ตามคำพิพากษาอาจมีคำขอให้ศาลมีคำสั่งให้ถือเอาคำพิพากษาหรือคำสั่งของศาลแทนการแสดงเจตนาของลูกหนี้ตามคำพิพากษานั้นได้ ถ้าการแสดงเจตนาของลูกหนี้ตามคำพิพากษาจะบริบูรณ์ต่อเมื่อได้จดทะเบียนต่อนายทะเบียนพนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมาย เจ้าหนี้ตามคำพิพากษาอาจมีคำขอให้ศาลสั่งให้ดำเนินการจดทะเบียนให้ก็ได้ ในกรณีเช่นนี้ ให้บุคคลดังกล่าวนั้นจดทะเบียนไปตามคำสั่งศาล ถ้าหนังสือสำคัญ เช่น โฉนดที่ดิน ใบจอง หนังสือรับรองการทำประโยชน์ ใบทะเบียน หรือเอกสารสิทธิที่จะต้องใช้เพื่อการจดทะเบียนสูญหาย บุบสลาย หรือนำมาไม่ได้เพราะเหตุอื่นใด ศาลจะสั่งให้นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลผู้มีอำนาจหน้าที่ตามกฎหมายออกใบแทนหนังสือสำคัญดังกล่าวก็ได้ เมื่อได้ออกใบแทนแล้ว หนังสือสำคัญเดิมเป็นอันยกเลิก"},{"id":"๓๕๘","num":"มาตรา ๓๕๘","num_ara":"๓๕๘","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๕ การบังคับคดีในกรณีที่ให้กระทำการหรืองดเว้นกระทำการ","subsection":"ส่วนที่ ๑ การบังคับคดีในกรณีที่ให้กระทำการ","paragraphs":["การบังคับคดีในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษากระทำการอย่างหนึ่งอย่างใดซึ่งไม่ใช่กรณีตามมาตรา ๓๕๗ นอกจากเจ้าหนี้ตามคำพิพากษาอาจมีคำขอตามมาตรา ๓๖๑ แล้ว ถ้าการกระทำนั้นเป็นกรณีที่อาจให้บุคคลภายนอกกระทำการแทนได้ เจ้าหนี้ตามคำพิพากษาอาจมีคำขอฝ่ายเดียวให้ศาลมีคำสั่งอนุญาตให้บุคคลภายนอกกระทำการนั้นแทนลูกหนี้ตามคำพิพากษา โดยลูกหนี้ตามคำพิพากษาเป็นผู้เสียค่าใช้จ่าย ค่าใช้จ่ายที่เสียไปในกรณีขอให้บุคคลภายนอกกระทำการแทนตามวรรคหนึ่ง ให้ถือว่าเป็นหนี้ตามคำพิพากษาที่จะบังคับคดีกันต่อไป"],"text":"การบังคับคดีในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษากระทำการอย่างหนึ่งอย่างใดซึ่งไม่ใช่กรณีตามมาตรา ๓๕๗ นอกจากเจ้าหนี้ตามคำพิพากษาอาจมีคำขอตามมาตรา ๓๖๑ แล้ว ถ้าการกระทำนั้นเป็นกรณีที่อาจให้บุคคลภายนอกกระทำการแทนได้ เจ้าหนี้ตามคำพิพากษาอาจมีคำขอฝ่ายเดียวให้ศาลมีคำสั่งอนุญาตให้บุคคลภายนอกกระทำการนั้นแทนลูกหนี้ตามคำพิพากษา โดยลูกหนี้ตามคำพิพากษาเป็นผู้เสียค่าใช้จ่าย ค่าใช้จ่ายที่เสียไปในกรณีขอให้บุคคลภายนอกกระทำการแทนตามวรรคหนึ่ง ให้ถือว่าเป็นหนี้ตามคำพิพากษาที่จะบังคับคดีกันต่อไป"},{"id":"๓๕๙","num":"มาตรา ๓๕๙","num_ara":"๓๕๙","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๕ การบังคับคดีในกรณีที่ให้กระทำการหรืองดเว้นกระทำการ","subsection":"ส่วนที่ ๒ การบังคับคดีในกรณีที่ให้งดเว้นกระทำการ","paragraphs":["การบังคับคดีในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษางดเว้นกระทำการ เจ้าหนี้ตามคำพิพากษาอาจขอให้ศาลมีคำสั่งจับกุมและกักขังลูกหนี้ตามคำพิพากษาตามมาตรา ๓๖๑ และขอให้ศาลมีคำสั่งอย่างหนึ่งอย่างใด ดังต่อไปนี้ได้ด้วย","(๑) ให้ลูกหนี้ตามคำพิพากษาชำระค่าสินไหมทดแทนสำหรับความเสียหายอันเกิดจากการไม่งดเว้นกระทำการนั้น (๒) รื้อถอนหรือทำลายทรัพย์สินอันเกิดจากการไม่งดเว้นกระทำการนั้น เว้นแต่ในกรณีที่กฎหมายว่าด้วยการนั้นได้กำหนดวิธีการจัดการกับทรัพย์สินดังกล่าวไว้เป็นอย่างอื่นแล้ว ในกรณีตาม (๑) เมื่อศาลไต่สวนแล้วเห็นว่าคำขอนั้นฟังได้ ให้ศาลมีคำสั่งให้ลูกหนี้ตามคำพิพากษาชดใช้ค่าสินไหมทดแทนตามจำนวนที่ศาลเห็นสมควร ในกรณีที่ศาลมีคำสั่งตาม (๒) ให้ศาลแจ้งคำสั่งให้เจ้าพนักงานบังคับคดีทราบ แล้วให้เจ้าพนักงานบังคับคดีดำเนินการให้เป็นไปตามคำสั่งศาล โดยลูกหนี้ตามคำพิพากษาเป็นผู้รับผิดในค่าใช้จ่าย การขอและการดำเนินการตามมาตรานี้ ไม่ต้องเสียค่าธรรมเนียมศาล ส่วนค่าสินไหมทดแทนที่ศาลกำหนดตามวรรคสองและค่าใช้จ่ายตามวรรคสาม ให้ถือว่าเป็นหนี้ตามคำพิพากษาที่จะบังคับคดีกันต่อไป"],"text":"การบังคับคดีในกรณีที่คำพิพากษาหรือคำสั่งของศาลกำหนดให้ลูกหนี้ตามคำพิพากษางดเว้นกระทำการ เจ้าหนี้ตามคำพิพากษาอาจขอให้ศาลมีคำสั่งจับกุมและกักขังลูกหนี้ตามคำพิพากษาตามมาตรา ๓๖๑ และขอให้ศาลมีคำสั่งอย่างหนึ่งอย่างใด ดังต่อไปนี้ได้ด้วย\n\n(๑) ให้ลูกหนี้ตามคำพิพากษาชำระค่าสินไหมทดแทนสำหรับความเสียหายอันเกิดจากการไม่งดเว้นกระทำการนั้น (๒) รื้อถอนหรือทำลายทรัพย์สินอันเกิดจากการไม่งดเว้นกระทำการนั้น เว้นแต่ในกรณีที่กฎหมายว่าด้วยการนั้นได้กำหนดวิธีการจัดการกับทรัพย์สินดังกล่าวไว้เป็นอย่างอื่นแล้ว ในกรณีตาม (๑) เมื่อศาลไต่สวนแล้วเห็นว่าคำขอนั้นฟังได้ ให้ศาลมีคำสั่งให้ลูกหนี้ตามคำพิพากษาชดใช้ค่าสินไหมทดแทนตามจำนวนที่ศาลเห็นสมควร ในกรณีที่ศาลมีคำสั่งตาม (๒) ให้ศาลแจ้งคำสั่งให้เจ้าพนักงานบังคับคดีทราบ แล้วให้เจ้าพนักงานบังคับคดีดำเนินการให้เป็นไปตามคำสั่งศาล โดยลูกหนี้ตามคำพิพากษาเป็นผู้รับผิดในค่าใช้จ่าย การขอและการดำเนินการตามมาตรานี้ ไม่ต้องเสียค่าธรรมเนียมศาล ส่วนค่าสินไหมทดแทนที่ศาลกำหนดตามวรรคสองและค่าใช้จ่ายตามวรรคสาม ให้ถือว่าเป็นหนี้ตามคำพิพากษาที่จะบังคับคดีกันต่อไป"},{"id":"๓๖๐","num":"มาตรา ๓๖๐","num_ara":"๓๖๐","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๖ การบังคับคดีในกรณีได้มาซึ่งทรัพย์สินที่มีทะเบียน","subsection":"","paragraphs":["การบังคับคดีในกรณีที่ศาลมีคำพิพากษาหรือคำสั่งให้หรือแสดงว่าเจ้าหนี้ตามคำพิพากษาหรือบุคคลใดได้มาซึ่งกรรมสิทธิ์ ทรัพยสิทธิหรือสิทธิอื่น ๆ เกี่ยวกับทรัพย์สิน หากทรัพย์สินนั้นเป็นทรัพย์ที่มีทะเบียนและมีเหตุขัดข้องไม่อาจแก้ไขเปลี่ยนแปลงทางทะเบียนได้ เจ้าหนี้ตามคำพิพากษาหรือบุคคลดังกล่าวอาจมีคำขอให้ศาลสั่งให้นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลผู้มีอำนาจหน้าที่ตามกฎหมายดำเนินการจดทะเบียนให้ผู้มีสิทธิมีชื่อในทะเบียนให้เป็นไปตามคำสั่งศาล ให้นำบทบัญญัติมาตรา ๓๕๗ วรรคสาม มาใช้บังคับโดยอนุโลม"],"text":"การบังคับคดีในกรณีที่ศาลมีคำพิพากษาหรือคำสั่งให้หรือแสดงว่าเจ้าหนี้ตามคำพิพากษาหรือบุคคลใดได้มาซึ่งกรรมสิทธิ์ ทรัพยสิทธิหรือสิทธิอื่น ๆ เกี่ยวกับทรัพย์สิน หากทรัพย์สินนั้นเป็นทรัพย์ที่มีทะเบียนและมีเหตุขัดข้องไม่อาจแก้ไขเปลี่ยนแปลงทางทะเบียนได้ เจ้าหนี้ตามคำพิพากษาหรือบุคคลดังกล่าวอาจมีคำขอให้ศาลสั่งให้นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลผู้มีอำนาจหน้าที่ตามกฎหมายดำเนินการจดทะเบียนให้ผู้มีสิทธิมีชื่อในทะเบียนให้เป็นไปตามคำสั่งศาล ให้นำบทบัญญัติมาตรา ๓๕๗ วรรคสาม มาใช้บังคับโดยอนุโลม"},{"id":"๓๖๑","num":"มาตรา ๓๖๑","num_ara":"๓๖๑","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๗ การบังคับคดีในกรณีที่ขอให้ศาลสั่งจับกุมและกักขังลูกหนี้ตามคำพิพากษา","subsection":"","paragraphs":["ภายใต้บังคับบทบัญญัติหมวด ๔ การบังคับคดีในกรณีที่ให้ขับไล่ ในกรณีที่ลูกหนี้ตามคำพิพากษาจงใจขัดขืนไม่ปฏิบัติตามคำบังคับ และไม่มีวิธีการบังคับอื่นใดที่เจ้าหนี้ตามคำพิพากษาจะใช้บังคับได้ เจ้าหนี้ตามคำพิพากษาอาจมีคำขอฝ่ายเดียว ให้ศาลมีคำสั่งจับกุมและกักขังลูกหนี้ตามคำพิพากษาก็ได้ เมื่อได้รับคำขอตามวรรคหนึ่ง ให้ศาลพิจารณาคำขอโดยเร็ว หากเป็นที่พอใจจากพยานหลักฐานซึ่งเจ้าหนี้ตามคำพิพากษานำมาสืบหรือที่ศาลเรียกมาสืบว่า ลูกหนี้ตามคำพิพากษาสามารถที่จะปฏิบัติตามคำบังคับได้ถ้าได้กระทำการโดยสุจริต และเจ้าหนี้ตามคำพิพากษาไม่มีวิธีการบังคับอื่นใดที่จะใช้บังคับได้ ให้ศาลออกหมายจับลูกหนี้ตามคำพิพากษา ถ้าลูกหนี้ตามคำพิพากษามาศาลหรือถูกจับตัวมา แต่ลูกหนี้ตามคำพิพากษาไม่อาจแสดงเหตุอันสมควรในการที่ไม่ปฏิบัติตามคำบังคับได้ ศาลมีอำนาจสั่งกักขังลูกหนี้ตามคำพิพากษาทันทีหรือในวันหนึ่งวันใดที่ลูกหนี้ตามคำพิพากษายังคงขัดขืนอยู่ก็ได้ หากลูกหนี้ตามคำพิพากษาแสดงเหตุอันสมควรในการที่ไม่ปฏิบัติตามคำบังคับได้ หรือตกลงที่จะปฏิบัติตามคำบังคับทุกประการ ศาลจะมีคำสั่งให้ยกคำขอ หรือมีคำสั่งเป็นอย่างอื่นตามที่เห็นสมควรก็ได้"],"text":"ภายใต้บังคับบทบัญญัติหมวด ๔ การบังคับคดีในกรณีที่ให้ขับไล่ ในกรณีที่ลูกหนี้ตามคำพิพากษาจงใจขัดขืนไม่ปฏิบัติตามคำบังคับ และไม่มีวิธีการบังคับอื่นใดที่เจ้าหนี้ตามคำพิพากษาจะใช้บังคับได้ เจ้าหนี้ตามคำพิพากษาอาจมีคำขอฝ่ายเดียว ให้ศาลมีคำสั่งจับกุมและกักขังลูกหนี้ตามคำพิพากษาก็ได้ เมื่อได้รับคำขอตามวรรคหนึ่ง ให้ศาลพิจารณาคำขอโดยเร็ว หากเป็นที่พอใจจากพยานหลักฐานซึ่งเจ้าหนี้ตามคำพิพากษานำมาสืบหรือที่ศาลเรียกมาสืบว่า ลูกหนี้ตามคำพิพากษาสามารถที่จะปฏิบัติตามคำบังคับได้ถ้าได้กระทำการโดยสุจริต และเจ้าหนี้ตามคำพิพากษาไม่มีวิธีการบังคับอื่นใดที่จะใช้บังคับได้ ให้ศาลออกหมายจับลูกหนี้ตามคำพิพากษา ถ้าลูกหนี้ตามคำพิพากษามาศาลหรือถูกจับตัวมา แต่ลูกหนี้ตามคำพิพากษาไม่อาจแสดงเหตุอันสมควรในการที่ไม่ปฏิบัติตามคำบังคับได้ ศาลมีอำนาจสั่งกักขังลูกหนี้ตามคำพิพากษาทันทีหรือในวันหนึ่งวันใดที่ลูกหนี้ตามคำพิพากษายังคงขัดขืนอยู่ก็ได้ หากลูกหนี้ตามคำพิพากษาแสดงเหตุอันสมควรในการที่ไม่ปฏิบัติตามคำ /* ════ STATE ════ */
let curQ='';
let userNotes=JSON.parse(localStorage.getItem('cpc-notes')||'{}');
let userEdits=JSON.parse(localStorage.getItem('cpc-edits')||'{}');
let sidebarOpen=false,sidebarCollapsed=false;
function saveNotes(){localStorage.setItem('cpc-notes',JSON.stringify(userNotes))}
function saveEdits(){localStorage.setItem('cpc-edits',JSON.stringify(userEdits))}

/* ════ INIT ════ */
function init(){
  loadTheme();buildSidebar();renderArticles(D);refreshSidebarDots();setupScrollFab();
}

/* ════ THEME ════ */
function loadTheme(){
  const t=localStorage.getItem('cpc-theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('theme-btn').textContent=t==='dark'?'☀️ Light':'🌙 Dark';
}
function toggleTheme(){
  const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('cpc-theme',t);
  document.getElementById('theme-btn').textContent=t==='dark'?'☀️ Light':'🌙 Dark';
}

/* ════ SIDEBAR TOGGLE ════ */
function toggleSidebar(){
  const app=document.getElementById('app');
  if(window.innerWidth<=700){sidebarOpen=!sidebarOpen;app.classList.toggle('sidebar-open',sidebarOpen);}
  else{sidebarCollapsed=!sidebarCollapsed;app.classList.toggle('sidebar-collapsed',sidebarCollapsed);}
}
function closeSidebar(){sidebarOpen=false;document.getElementById('app').classList.remove('sidebar-open')}
function closeSidebarMobile(){if(window.innerWidth<=700)closeSidebar()}

/* ════ BUILD SIDEBAR (4-level: ภาค > ลักษณะ > หมวด > ส่วนที่) ════ */
function buildSidebar(){
  /* Build hierarchy map */
  const partMap=new Map();
  D.forEach(a=>{
    if(!partMap.has(a.part))partMap.set(a.part,{part:a.part,chapMap:new Map()});
    const pn=partMap.get(a.part);
    const chKey=a.chapter||'__';
    if(!pn.chapMap.has(chKey))pn.chapMap.set(chKey,{chapter:a.chapter,sectMap:new Map()});
    const cn=pn.chapMap.get(chKey);
    const secKey=a.section||'__';
    if(!cn.sectMap.has(secKey))cn.sectMap.set(secKey,{section:a.section,subMap:new Map()});
    const sn=cn.sectMap.get(secKey);
    const subKey=a.subsection||'__';
    if(!sn.subMap.has(subKey))sn.subMap.set(subKey,{subsection:a.subsection,articles:[]});
    sn.subMap.get(subKey).articles.push(a);
  });

  const container=document.getElementById('sb-tree');
  container.innerHTML='';
  let pi=0;
  for(const[,pn]of partMap){
    const partEl=document.createElement('div');
    partEl.className='sb-part'+(pi===0?' open':'');
    let h=`<div class="sb-part-hd" onclick="toggleNode(this.parentElement)"><span>${esc(pn.part)}</span><span class="arr">▶</span></div><div class="sb-part-children">`;
    for(const[,cn]of pn.chapMap){
      const chapLabel=cn.chapter||pn.part;
      h+=`<div class="sb-chapter open"><div class="sb-chapter-hd" onclick="toggleNode(this.parentElement)"><span>${esc(chapLabel)}</span><span class="arr">▶</span></div><div class="sb-chapter-children">`;
      for(const[,sn]of cn.sectMap){
        if(sn.section){
          h+=`<div class="sb-section"><div class="sb-section-hd" onclick="toggleNode(this.parentElement)"><span>${esc(sn.section)}</span><span class="arr">▶</span></div><div class="sb-section-children">`;
          for(const[,sub]of sn.subMap){
            if(sub.subsection){
              h+=`<div class="sb-subsect"><div class="sb-subsect-hd" onclick="toggleNode(this.parentElement)"><span>${esc(sub.subsection)}</span><span class="arr">▶</span></div><div class="sb-subsect-children">`;
              sub.articles.forEach(a=>{h+=linkHTML(a)});
              h+='</div></div>';
            } else {
              sub.articles.forEach(a=>{h+=linkHTML(a)});
            }
          }
          h+='</div></div>';
        } else {
          for(const[,sub]of sn.subMap){
            sub.articles.forEach(a=>{h+=linkHTML(a)});
          }
        }
      }
      h+='</div></div>';
    }
    h+='</div>';
    partEl.innerHTML=h;container.appendChild(partEl);pi++;
  }
}
function linkHTML(a){
  const hn=userNotes[a.id]?'has-note':'';
  return `<div class="sb-link ${hn}" id="nav-${a.id}" onclick="scrollToArticle('${a.id}');closeSidebarMobile()"><span class="dot-note"></span>${esc(a.num)}</div>`;
}
function toggleNode(el){el.classList.toggle('open')}

function refreshSidebarDots(){
  D.forEach(a=>{
    const link=document.getElementById('nav-'+a.id);
    if(!link)return;
    link.classList.toggle('has-note',!!(userNotes[a.id]&&userNotes[a.id].trim()));
  });
  const nc=Object.keys(userNotes).filter(k=>userNotes[k]).length;
  document.getElementById('sb-stats').textContent=`${D.length} มาตรา · บันทึก ${nc}`;
  document.getElementById('hdr-sub').textContent=`${D.length} มาตรา · บันทึก ${nc}`;
}

/* Sidebar search */
function onSbSearch(val){
  val=val.trim();
  document.getElementById('sb-xcl').style.display=val?'block':'none';
  const links=document.querySelectorAll('.sb-link');
  if(!val){links.forEach(l=>{l.style.display=''});document.querySelectorAll('.sb-subsect,.sb-section,.sb-chapter,.sb-part').forEach(el=>{el.style.display=''});return;}
  const q=val.toLowerCase();
  document.querySelectorAll('.sb-subsect,.sb-section,.sb-chapter,.sb-part').forEach(el=>el.style.display='none');
  links.forEach(l=>{
    const txt=l.textContent.toLowerCase();
    if(txt.includes(q)||l.id.replace('nav-','').includes(val)){
      l.style.display='';
      let p=l.parentElement;
      while(p){
        if(p.classList.contains('sb-subsect')||p.classList.contains('sb-section')||p.classList.contains('sb-chapter')||p.classList.contains('sb-part')){
          p.style.display='';p.classList.add('open');
          const ch=p.querySelector('.sb-subsect-children,.sb-section-children,.sb-chapter-children,.sb-part-children');
          if(ch)ch.style.display='block';
        }
        p=p.parentElement;
      }
    } else {l.style.display='none'}
  });
}
function clearSbSearch(){document.getElementById('sb-sinput').value='';document.getElementById('sb-xcl').style.display='none';onSbSearch('');}

/* ════ RENDER ════ */
const re_sub=/^\([๐-๙]+\)|^\([ก-ฮ]\)/;
function renderParas(paragraphs,q){
  return paragraphs.map(p=>{
    const lines=p.split('\n');
    const lh=lines.map(ln=>{
      ln=ln.trim();if(!ln)return'';
      const isSub=re_sub.test(ln);
      return`<span class="sub-line${isSub?'':' intro'}">${hlText(ln,q)}</span>`;
    }).join('');
    return`<div class="para-block">${lh}</div>`;
  }).join('');
}
function hlText(t,q){
  if(!q)return esc(t);
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  return esc(t).replace(re,m=>`<mark>${m}</mark>`);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function getFiltered(){
  if(!curQ)return D;
  const q=curQ.toLowerCase();
  return D.filter(a=>
    a.num.includes(curQ)||a.num_ara.includes(curQ)||
    a.text.toLowerCase().includes(q)||
    a.part.toLowerCase().includes(q)||
    a.chapter.toLowerCase().includes(q)||
    a.section.toLowerCase().includes(q)||
    a.subsection.toLowerCase().includes(q)
  );
}

function renderArticles(articles){
  const container=document.getElementById('articles');
  const empty=document.getElementById('empty-state');
  if(!articles.length){container.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';
  document.getElementById('rcount').textContent=curQ?`พบ ${articles.length} มาตรา · "${curQ}"`:  `${articles.length} มาตรา`;
  let lastPart='',html='';
  articles.forEach(a=>{
    if(a.part!==lastPart){html+=`<div class="part-divider">${esc(a.part)}</div>`;lastPart=a.part;}
    const hasNote=!!(userNotes[a.id]&&userNotes[a.id].trim());
    const crumbParts=[a.chapter,a.section,a.subsection].filter(Boolean);
    const crumb=crumbParts.join(' › ');
    html+=`
    <div class="article-card fu ${hasNote?'has-note':''} ${userEdits[a.id]?'has-edit':''}" id="card-${a.id}">
      <div class="article-header">
        <div>
          <div class="article-num">${esc(a.num)}${userEdits[a.id]?'<span class="edited-badge">แก้ไข</span>':''}</div>
          ${crumb?`<div class="article-breadcrumb">${esc(crumb)}</div>`:''}
        </div>
        <div class="article-tools">
          <button class="tool-btn" id="edit-btn-${a.id}" onclick="toggleEdit('${a.id}')" title="แก้ไขเนื้อหา">✏️</button>
          <button class="tool-btn ${hasNote?'note-active':''}" id="note-btn-${a.id}" onclick="toggleNote('${a.id}')" title="บันทึกข้อสังเกต">📝</button>
        </div>
      </div>
      <div class="article-body">
        <div class="article-content" id="content-${a.id}">${userEdits[a.id]?hlText(userEdits[a.id],curQ):renderParas(a.paragraphs,curQ)}</div>
        <div class="edit-wrap" id="edit-wrap-${a.id}">
          <textarea class="edit-textarea" id="edit-ta-${a.id}">${esc(userEdits[a.id]??a.text)}</textarea>
          <div class="edit-actions">
            <button class="btn-restore" id="restore-btn-${a.id}" style="${userEdits[a.id]?'':'display:none'}" onclick="restoreOriginal('${a.id}')">↩ คืนต้นฉบับ</button>
            <button class="btn-cancel" onclick="cancelEdit('${a.id}')">ยกเลิก</button>
            <button class="btn-save" onclick="saveEdit('${a.id}')">💾 บันทึก</button>
          </div>
        </div>
        <div class="note-wrap" id="note-wrap-${a.id}">
          <div class="note-box">
            <div class="note-label">📌 ข้อสังเกต / บันทึก</div>
            <textarea class="note-textarea" id="note-ta-${a.id}" placeholder="พิมพ์ข้อสังเกต คำอธิบาย หรือฎีกาที่เกี่ยวข้อง..." oninput="onNoteInput('${a.id}')">${esc(userNotes[a.id]||'')}</textarea>
            <div class="note-saved" id="note-saved-${a.id}">✓ บันทึกแล้ว</div>
          </div>
        </div>
      </div>
    </div>`;
  });
  container.innerHTML=html;
}

/* ════ SEARCH ════ */
function onSearch(val){curQ=val.trim();document.getElementById('xcl').style.display=curQ?'block':'none';renderArticles(getFiltered())}
function clearSearch(){document.getElementById('sinput').value='';curQ='';document.getElementById('xcl').style.display='none';renderArticles(D)}

/* ════ SCROLL ════ */
function scrollToArticle(id){
  const el=document.getElementById('card-'+id);if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'start'});
  el.classList.add('highlight');setTimeout(()=>el.classList.remove('highlight'),1800);
  document.querySelectorAll('.sb-link').forEach(l=>l.classList.remove('active'));
  const nav=document.getElementById('nav-'+id);
  if(nav){
    nav.classList.add('active');
    let p=nav.parentElement;
    while(p){if(p.classList.contains('sb-subsect')||p.classList.contains('sb-section')||p.classList.contains('sb-chapter')||p.classList.contains('sb-part'))p.classList.add('open');p=p.parentElement;}
  }
}
function scrollToTop(){document.getElementById('main').scrollTo({top:0,behavior:'smooth'})}
function setupScrollFab(){document.getElementById('main').addEventListener('scroll',function(){document.getElementById('fab').classList.toggle('visible',this.scrollTop>300)})}

/* ════ NOTE ════ */
function toggleNote(id){
  const wrap=document.getElementById('note-wrap-'+id);const vis=wrap.classList.contains('visible');
  if(vis){wrap.classList.remove('visible');document.getElementById('note-btn-'+id).classList.remove('note-active')}
  else{wrap.classList.add('visible');document.getElementById('note-ta-'+id).focus();document.getElementById('note-btn-'+id).classList.add('note-active')}
}
let noteTimers={};
function onNoteInput(id){
  clearTimeout(noteTimers[id]);
  noteTimers[id]=setTimeout(()=>{
    const val=document.getElementById('note-ta-'+id).value.trim();
    if(val)userNotes[id]=val;else delete userNotes[id];
    saveNotes();
    const card=document.getElementById('card-'+id);if(card)card.classList.toggle('has-note',!!val);
    refreshSidebarDots();
    const msg=document.getElementById('note-saved-'+id);msg.style.display='block';setTimeout(()=>msg.style.display='none',1600);
  },600);
}

/* ════ EDIT ════ */
function toggleEdit(id){
  const wrap=document.getElementById('edit-wrap-'+id);
  if(wrap.classList.contains('visible')){cancelEdit(id)}
  else{wrap.classList.add('visible');document.getElementById('edit-btn-'+id).classList.add('edit-active');document.getElementById('edit-ta-'+id).focus();}
}
function cancelEdit(id){
  const a=D.find(x=>x.id===id);
  document.getElementById('edit-ta-'+id).value=userEdits[id]||(a?a.text:'');
  document.getElementById('edit-wrap-'+id).classList.remove('visible');
  document.getElementById('edit-btn-'+id).classList.remove('edit-active');
}
function saveEdit(id){
  const val=document.getElementById('edit-ta-'+id).value.trim();
  const a=D.find(x=>x.id===id);const orig=a?a.text:'';
  if(!val||val===orig)delete userEdits[id];else userEdits[id]=val;
  saveEdits();const isEdited=!!userEdits[id];
  const content=document.getElementById('content-'+id);
  if(content)content.innerHTML=isEdited?hlText(userEdits[id],curQ):renderParas(a.paragraphs,curQ);
  const numEl=document.querySelector('#card-'+id+' .article-num');
  if(numEl)numEl.innerHTML=esc(a.num)+(isEdited?'<span class="edited-badge">แก้ไข</span>':'');
  const card=document.getElementById('card-'+id);if(card)card.classList.toggle('has-edit',isEdited);
  const rb=document.getElementById('restore-btn-'+id);if(rb)rb.style.display=isEdited?'':'none';
  cancelEdit(id);showToast('บันทึกแล้ว ✓');
}
function restoreOriginal(id){
  if(!confirm('คืนเนื้อหาต้นฉบับของมาตรานี้?'))return;
  delete userEdits[id];const a=D.find(x=>x.id===id);
  document.getElementById('edit-ta-'+id).value=a?a.text:'';saveEdit(id);
}

/* ════ EXPORT/IMPORT ════ */
function exportData(){
  const data={notes:userNotes,edits:userEdits,exportedAt:new Date().toISOString(),v:1};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`cpc-notes-${new Date().toISOString().slice(0,10)}.json`;a.click();showToast('สำรองข้อมูลแล้ว ✓');
}
function importData(ev){
  const file=ev.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{const data=JSON.parse(e.target.result);
      if(data.notes)Object.assign(userNotes,data.notes);
      if(data.edits)Object.assign(userEdits,data.edits);
      saveNotes();saveEdits();renderArticles(getFiltered());buildSidebar();showToast('นำเข้าข้อมูลแล้ว ✓');
    }catch(err){showToast('ไฟล์ไม่ถูกต้อง')}
    ev.target.value='';
  };reader.readAsText(file);
}
function confirmReset(){
  if(!confirm('ล้างบันทึกทั้งหมด?\nไม่สามารถกู้คืนได้'))return;
  userNotes={};userEdits={};saveNotes();saveEdits();renderArticles(D);buildSidebar();showToast('ล้างข้อมูลแล้ว');
}

/* ════ TOAST ════ */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

/* ════ SW ════ */
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

init();
</script>
