พฤติของคู่ความหรือพยาน รวมทั้งการแถลงข้อความอันเป็นการเสื่อมเสียต่อชื่อเสียงของคู่ความหรือพยาน แม้ถึงว่าข้อความเหล่านั้นจะเป็นความจริง หรือ ง. เป็นการชักจูงให้เกิดมีคำพยานเท็จ เพื่อประโยชน์แห่งมาตรานี้ ให้นำวิเคราะห์ศัพท์ทั้งปวงในมาตรา ๔ แห่งพระราชบัญญัติการพิมพ์ พุทธศักราช ๒๔๗๖ มาใช้บังคับ"},{"id":"๓๓","num":"มาตรา ๓๓","num_ara":"๓๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ถ้าคู่ความฝ่ายใดหรือบุคคลใดกระทำความผิดฐานละเมิดอำนาจศาลใด ให้ศาลนั้นมีอำนาจสั่งลงโทษโดยวิธีใดวิธีหนึ่ง หรือทั้งสองวิธีดังจะกล่าวต่อไปนี้ คือ (ก) ไล่ออกจากบริเวณศาล หรือ (ข) ให้ลงโทษจำคุก หรือปรับ หรือทั้งจำทั้งปรับ การไล่ออกจากบริเวณศาลนั้นให้กระทำได้ชั่วระยะเวลาที่ศาลนั่งพิจารณาหรือภายในระยะเวลาใด ๆ ก็ได้ตามที่ศาลเห็นสมควร เมื่อจำเป็นจะเรียกให้ตำรวจช่วยจัดการก็ได้ ในกรณีกำหนดโทษจำคุกและปรับนั้นให้จำคุกได้ไม่เกินหกเดือนหรือปรับไม่เกินห้าร้อยบาท"],"text":"ถ้าคู่ความฝ่ายใดหรือบุคคลใดกระทำความผิดฐานละเมิดอำนาจศาลใด ให้ศาลนั้นมีอำนาจสั่งลงโทษโดยวิธีใดวิธีหนึ่ง หรือทั้งสองวิธีดังจะกล่าวต่อไปนี้ คือ (ก) ไล่ออกจากบริเวณศาล หรือ (ข) ให้ลงโทษจำคุก หรือปรับ หรือทั้งจำทั้งปรับ การไล่ออกจากบริเวณศาลนั้นให้กระทำได้ชั่วระยะเวลาที่ศาลนั่งพิจารณาหรือภายในระยะเวลาใด ๆ ก็ได้ตามที่ศาลเห็นสมควร เมื่อจำเป็นจะเรียกให้ตำรวจช่วยจัดการก็ได้ ในกรณีกำหนดโทษจำคุกและปรับนั้นให้จำคุกได้ไม่เกินหกเดือนหรือปรับไม่เกินห้าร้อยบาท"},{"id":"๓๔","num":"มาตรา ๓๔","num_ara":"๓๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ถ้าจะต้องดำเนินกระบวนพิจารณาทั้งเรื่องหรือแต่บางส่วน โดยทางอาศัยหรือโดยร้องขอต่อเจ้าหน้าที่ในเมืองต่างประเทศ เมื่อไม่มีข้อตกลงระหว่างประเทศอย่างใดอย่างหนึ่ง หรือไม่มีกฎหมายบัญญัติไว้สำหรับเรื่องนั้นแล้ว ให้ศาลปฏิบัติตามหลักทั่วไปแห่งกฎหมายระหว่างประเทศ"],"text":"ถ้าจะต้องดำเนินกระบวนพิจารณาทั้งเรื่องหรือแต่บางส่วน โดยทางอาศัยหรือโดยร้องขอต่อเจ้าหน้าที่ในเมืองต่างประเทศ เมื่อไม่มีข้อตกลงระหว่างประเทศอย่างใดอย่างหนึ่ง หรือไม่มีกฎหมายบัญญัติไว้สำหรับเรื่องนั้นแล้ว ให้ศาลปฏิบัติตามหลักทั่วไปแห่งกฎหมายระหว่างประเทศ"},{"id":"๓๔_๑","num":"มาตรา ๓๔/๑","num_ara":"๓๔/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["เพื่อให้การพิจารณาพิพากษาคดีเป็นไปโดยสะดวก รวดเร็ว และเที่ยงธรรม หรือเพื่อความเหมาะสมสำหรับคดีบางประเภท ให้ประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ศาลฎีกามีอำนาจออกข้อกำหนดเกี่ยวกับการฟ้องคดี การสืบพยานและการรับฟังพยานหลักฐาน การวินิจฉัยคดี ตลอดจนการดำเนินกระบวนพิจารณาใด ๆ ได้ตามความจำเป็น ข้อกำหนดตามวรรคหนึ่งเมื่อประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"],"text":"เพื่อให้การพิจารณาพิพากษาคดีเป็นไปโดยสะดวก รวดเร็ว และเที่ยงธรรม หรือเพื่อความเหมาะสมสำหรับคดีบางประเภท ให้ประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ศาลฎีกามีอำนาจออกข้อกำหนดเกี่ยวกับการฟ้องคดี การสืบพยานและการรับฟังพยานหลักฐาน การวินิจฉัยคดี ตลอดจนการดำเนินกระบวนพิจารณาใด ๆ ได้ตามความจำเป็น ข้อกำหนดตามวรรคหนึ่งเมื่อประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"},{"id":"๓๕","num":"มาตรา ๓๕","num_ara":"๓๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ การนั่งพิจารณา","subsection":"","paragraphs":["ถ้าประมวลกฎหมายนี้มิได้บัญญัติไว้เป็นอย่างอื่น การนั่งพิจารณาคดีที่ยื่นไว้ต่อศาลใดจะต้องกระทำในศาลนั้นในวันที่ศาลเปิดทำการและตามเวลาทำงานที่ศาลได้กำหนดไว้ แต่ในกรณีมีเหตุฉุกเฉินหรือเป็นการจำเป็น ศาลจะมีคำสั่งกำหนดการนั่งพิจารณา ณ สถานที่อื่น หรือในวันหยุดงาน หรือในเวลาใด ๆ ก็ได้ ให้ผู้พิพากษาและเจ้าพนักงานศาลซึ่งปฏิบัติงานในวันหยุดงาน หรือในเวลาใด ๆ นอกเวลาทำการปกติได้รับค่าตอบแทนเป็นพิเศษ ตามระเบียบที่กระทรวงยุติธรรมกำหนด โดยได้รับความเห็นชอบจากกระทรวงการคลัง"],"text":"ถ้าประมวลกฎหมายนี้มิได้บัญญัติไว้เป็นอย่างอื่น การนั่งพิจารณาคดีที่ยื่นไว้ต่อศาลใดจะต้องกระทำในศาลนั้นในวันที่ศาลเปิดทำการและตามเวลาทำงานที่ศาลได้กำหนดไว้ แต่ในกรณีมีเหตุฉุกเฉินหรือเป็นการจำเป็น ศาลจะมีคำสั่งกำหนดการนั่งพิจารณา ณ สถานที่อื่น หรือในวันหยุดงาน หรือในเวลาใด ๆ ก็ได้ ให้ผู้พิพากษาและเจ้าพนักงานศาลซึ่งปฏิบัติงานในวันหยุดงาน หรือในเวลาใด ๆ นอกเวลาทำการปกติได้รับค่าตอบแทนเป็นพิเศษ ตามระเบียบที่กระทรวงยุติธรรมกำหนด โดยได้รับความเห็นชอบจากกระทรวงการคลัง"},{"id":"๓๖","num":"มาตรา ๓๖","num_ara":"๓๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ การนั่งพิจารณา","subsection":"","paragraphs":["การนั่งพิจารณาคดีจะต้องกระทำในศาลต่อหน้าคู่ความที่มาศาลและโดยเปิดเผย เว้นแต่","(๑) ในคดีเรื่องใดที่มีความจำเป็นเพื่อรักษาความเรียบร้อยในศาล เมื่อศาลได้ขับไล่คู่ความฝ่ายใดออกไปเสียจากบริเวณศาลโดยที่ประพฤติไม่สมควร ศาลจะดำเนินการนั่งพิจารณาคดีต่อไปลับหลังคู่ความฝ่ายนั้นก็ได้ (๒) ในคดีเรื่องใด เพื่อความเหมาะสม หรือเพื่อคุ้มครองสาธารณประโยชน์ ถ้าศาลเห็นสมควรจะห้ามมิให้มีการเปิดเผยซึ่งข้อเท็จจริง หรือพฤติการณ์ต่าง ๆ ทั้งหมดหรือแต่บางส่วนแห่งคดีซึ่งปรากฏจากคำคู่ความหรือคำแถลงการณ์ของคู่ความหรือจากคำพยานหลักฐานที่ได้สืบมาแล้วศาลจะมีคำสั่งดังต่อไปนี้ก็ได้ (ก) ห้ามประชาชนมิให้เข้าฟังการพิจารณาทั้งหมดหรือแต่บางส่วน แล้วดำเนินการพิจารณาไปโดยไม่เปิดเผย หรือ (ข) ห้ามมิให้ออกโฆษณาข้อเท็จจริงหรือพฤติการณ์ต่าง ๆ เช่นว่านั้น ในบรรดาคดีทั้งปวงที่ฟ้องขอหย่าหรือฟ้องชายชู้หรือฟ้องให้รับรองบุตร ให้ศาลห้ามมิให้มีการเปิดเผยซึ่งข้อเท็จจริงหรือพฤติการณ์ใด ๆ ที่ศาลเห็นเป็นการไม่สมควร หรือพอจะเห็นได้ว่าจะทำให้เกิดการเสียหายอันไม่เป็นธรรมแก่คู่ความหรือบุคคลที่เกี่ยวข้อง ไม่ว่าศาลจะได้มีคำสั่งตามอนุมาตรา (๒) นี้หรือไม่ คำสั่งหรือคำพิพากษาชี้ขาดคดีของศาลนั้น ต้องอ่านในศาลโดยเปิดเผย และมิให้ถือว่าการออกโฆษณาทั้งหมดหรือแต่บางส่วนแห่งคำพิพากษานั้นหรือย่อเรื่องแห่งคำพิพากษาโดยเป็นกลางและถูกต้องนั้น เป็นผิดกฎหมาย"],"text":"การนั่งพิจารณาคดีจะต้องกระทำในศาลต่อหน้าคู่ความที่มาศาลและโดยเปิดเผย เว้นแต่\n\n(๑) ในคดีเรื่องใดที่มีความจำเป็นเพื่อรักษาความเรียบร้อยในศาล เมื่อศาลได้ขับไล่คู่ความฝ่ายใดออกไปเสียจากบริเวณศาลโดยที่ประพฤติไม่สมควร ศาลจะดำเนินการนั่งพิจารณาคดีต่อไปลับหลังคู่ความฝ่ายนั้นก็ได้ (๒) ในคดีเรื่องใด เพื่อความเหมาะสม หรือเพื่อคุ้มครองสาธารณประโยชน์ ถ้าศาลเห็นสมควรจะห้ามมิให้มีการเปิดเผยซึ่งข้อเท็จจริง หรือพฤติการณ์ต่าง ๆ ทั้งหมดหรือแต่บางส่วนแห่งคดีซึ่งปรากฏจากคำคู่ความหรือคำแถลงการณ์ของคู่ความหรือจากคำพยานหลักฐานที่ได้สืบมาแล้วศาลจะมีคำสั่งดังต่อไปนี้ก็ได้ (ก) ห้ามประชาชนมิให้เข้าฟังการพิจารณาทั้งหมดหรือแต่บางส่วน แล้วดำเนินการพิจารณาไปโดยไม่เปิดเผย หรือ (ข) ห้ามมิให้ออกโฆษณาข้อเท็จจริงหรือพฤติการณ์ต่าง ๆ เช่นว่านั้น ในบรรดาคดีทั้งปวงที่ฟ้องขอหย่าหรือฟ้องชายชู้หรือฟ้องให้รับรองบุตร ให้ศาลห้ามมิให้มีการเปิดเผยซึ่งข้อเท็จจริงหรือพฤติการณ์ใด ๆ ที่ศาลเห็นเป็นการไม่สมควร หรือพอจะเห็นได้ว่าจะทำให้เกิดการเสียหายอันไม่เป็นธรรมแก่คู่ความหรือบุคคลที่เกี่ยวข้อง ไม่ว่าศาลจะได้มีคำสั่งตามอนุมาตรา (๒) นี้หรือไม่ คำสั่งหรือคำพิพากษาชี้ขาดคดีของศาลนั้น ต้องอ่านในศาลโดยเปิดเผย และมิให้ถือว่าการออกโฆษณาทั้งหมดหรือแต่บางส่วนแห่งคำพิพากษานั้นหรือย่อเรื่องแห่งคำพิพากษาโดยเป็นกลางและถูกต้องนั้น เป็นผิดกฎหมาย"},{"id":"๓๗","num":"มาตรา ๓๗","num_ara":"๓๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ การนั่งพิจารณา","subsection":"","paragraphs":["ให้ศาลดำเนินการนั่งพิจารณาคดีติดต่อกันไปเท่าที่สามารถจะทำได้โดยไม่ต้องเลื่อนจนกว่าจะเสร็จการพิจารณาและพิพากษาคดี"],"text":"ให้ศาลดำเนินการนั่งพิจารณาคดีติดต่อกันไปเท่าที่สามารถจะทำได้โดยไม่ต้องเลื่อนจนกว่าจะเสร็จการพิจารณาและพิพากษาคดี"},{"id":"๓๘","num":"มาตรา ๓๘","num_ara":"๓๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ การนั่งพิจารณา","subsection":"","paragraphs":["ถ้าในวันที่กำหนดนัดนั่งพิจารณาศาลไม่มีเวลาพอที่จะดำเนินการนั่งพิจารณา เนื่องจากกิจธุระของศาล ศาลจะมีคำสั่งให้เลื่อนการนั่งพิจารณาไปในวันอื่นตามที่เห็นสมควรก็ได้"],"text":"ถ้าในวันที่กำหนดนัดนั่งพิจารณาศาลไม่มีเวลาพอที่จะดำเนินการนั่งพิจารณา เนื่องจากกิจธุระของศาล ศาลจะมีคำสั่งให้เลื่อนการนั่งพิจารณาไปในวันอื่นตามที่เห็นสมควรก็ได้"},{"id":"๓๙","num":"มาตรา ๓๙","num_ara":"๓๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ การนั่งพิจารณา","subsection":"","paragraphs":["ถ้าการที่จะชี้ขาดตัดสินคดีเรื่องใดที่ค้างพิจารณาอยู่ในศาลใดจำต้องอาศัยทั้งหมดหรือแต่บางส่วนซึ่งคำชี้ขาดตัดสินบางข้อที่ศาลนั้นเองหรือศาลอื่นจะต้องกระทำเสียก่อน หรือจำต้องรอให้เจ้าพนักงานฝ่ายธุรการวินิจฉัยชี้ขาดในข้อเช่นนั้นเสียก่อน หรือถ้าปรากฏว่าได้มีการกระทำผิดอาญาเกิดขึ้นซึ่งอาจมีการฟ้องร้องอันอาจกระทำให้การชี้ขาดตัดสินคดีที่พิจารณาอยู่นั้นเปลี่ยนแปลงไป หรือในกรณีอื่นใดซึ่งศาลเห็นว่าถ้าได้เลื่อนการพิจารณาไปจักทำให้ความยุติธรรมดำเนินไปด้วยดี เมื่อศาลเห็นสมควรหรือเมื่อคู่ความที่เกี่ยวข้องร้องขอ ศาลจะมีคำสั่งเลื่อนการนั่งพิจารณาต่อไปจนกว่าจะได้มีการพิพากษาหรือชี้ขาดในข้อนั้น ๆ แล้วหรือภายในระยะเวลาใด ๆ ตามที่ศาลเห็นสมควรก็ได้ ถ้าศาลมีคำสั่งให้เลื่อนการนั่งพิจารณาดังกล่าวแล้วโดยไม่มีกำหนด เมื่อศาลเห็นสมควรหรือคู่ความที่เกี่ยวข้องร้องขอ ศาลจะมีคำสั่งให้เริ่มการนั่งพิจารณาต่อไปในวันใด ๆ ตามที่เห็นสมควรก็ได้"],"text":"ถ้าการที่จะชี้ขาดตัดสินคดีเรื่องใดที่ค้างพิจารณาอยู่ในศาลใดจำต้องอาศัยทั้งหมดหรือแต่บางส่วนซึ่งคำชี้ขาดตัดสินบางข้อที่ศาลนั้นเองหรือศาลอื่นจะต้องกระทำเสียก่อน หรือจำต้องรอให้เจ้าพนักงานฝ่ายธุรการวินิจฉัยชี้ขาดในข้อเช่นนั้นเสียก่อน หรือถ้าปรากฏว่าได้มีการกระทำผิดอาญาเกิดขึ้นซึ่งอาจมีการฟ้องร้องอันอาจกระทำให้การชี้ขาดตัดสินคดีที่พิจารณาอยู่นั้นเปลี่ยนแปลงไป หรือในกรณีอื่นใดซึ่งศาลเห็นว่าถ้าได้เลื่อนการพิจารณาไปจักทำให้ความยุติธรรมดำเนินไปด้วยดี เมื่อศาลเห็นสมควรหรือเมื่อคู่ความที่เกี่ยวข้องร้องขอ ศาลจะมีคำสั่งเลื่อนการนั่งพิจารณาต่อไปจนกว่าจะได้มีการพิพากษาหรือชี้ขาดในข้อนั้น ๆ แล้วหรือภายในระยะเวลาใด ๆ ตามที่ศาลเห็นสมควรก็ได้ ถ้าศาลมีคำสั่งให้เลื่อนการนั่งพิจารณาดังกล่าวแล้วโดยไม่มีกำหนด เมื่อศาลเห็นสมควรหรือคู่ความที่เกี่ยวข้องร้องขอ ศาลจะมีคำสั่งให้เริ่มการนั่งพิจารณาต่อไปในวันใด ๆ ตามที่เห็นสมควรก็ได้"},{"id":"๔๐","num":"มาตรา ๔๐","num_ara":"๔๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ การนั่งพิจารณา","subsection":"","paragraphs":["เมื่อศาลได้กำหนดวันนั่งพิจารณาและแจ้งให้คู่ความทราบแล้ว ถ้าคู่ความฝ่ายใดฝ่ายหนึ่งจะขอเลื่อนการนั่งพิจารณา คู่ความฝ่ายนั้นต้องเสนอคำขอเข้ามาก่อนหรือในวันนัดและแสดงเหตุผลแห่งการขอเลื่อนนั้น ในกรณีเช่นว่านี้ ห้ามมิให้ศาลมีคำสั่งอนุญาตตามคำขอ เว้นแต่การขอเลื่อนการนั่งพิจารณานั้นมีเหตุจำเป็นอันไม่อาจก้าวล่วงเสียได้ และหากศาลไม่อนุญาตจะทำให้เสียความยุติธรรม เมื่อศาลจะสั่งให้เลื่อนการนั่งพิจารณา ศาลอาจสั่งให้คู่ความฝ่ายนั้นเสียค่าป่วยการพยาน ซึ่งมาศาลตามหมายเรียกและเสียค่าใช้จ่ายในการที่คู่ความฝ่ายอื่นมาศาล เช่น ค่าพาหนะเดินทางและค่าเช่าที่พักของตัวความ ทนายความ หรือพยาน เป็นต้น ตามจำนวนที่ศาลเห็นสมควร ถ้าคู่ความฝ่ายที่ขอเลื่อนคดีไม่ชำระค่าป่วยการหรือค่าใช้จ่ายตามที่ศาลกำหนด ให้ศาลยกคำขอเลื่อนคดีนั้นเสีย ค่าป่วยการหรือค่าใช้จ่ายที่จ่ายตามวรรคสองให้ตกเป็นพับ คำขอเลื่อนคดีตามวรรคหนึ่ง ถ้าไม่ได้เสนอต่อหน้าศาลด้วยวาจา ก็ให้ทำเป็นคำร้องและจะทำฝ่ายเดียวโดยได้รับอนุญาตจากศาลก็ได้"],"text":"เมื่อศาลได้กำหนดวันนั่งพิจารณาและแจ้งให้คู่ความทราบแล้ว ถ้าคู่ความฝ่ายใดฝ่ายหนึ่งจะขอเลื่อนการนั่งพิจารณา คู่ความฝ่ายนั้นต้องเสนอคำขอเข้ามาก่อนหรือในวันนัดและแสดงเหตุผลแห่งการขอเลื่อนนั้น ในกรณีเช่นว่านี้ ห้ามมิให้ศาลมีคำสั่งอนุญาตตามคำขอ เว้นแต่การขอเลื่อนการนั่งพิจารณานั้นมีเหตุจำเป็นอันไม่อาจก้าวล่วงเสียได้ และหากศาลไม่อนุญาตจะทำให้เสียความยุติธรรม เมื่อศาลจะสั่งให้เลื่อนการนั่งพิจารณา ศาลอาจสั่งให้คู่ความฝ่ายนั้นเสียค่าป่วยการพยาน ซึ่งมาศาลตามหมายเรียกและเสียค่าใช้จ่ายในการที่คู่ความฝ่ายอื่นมาศาล เช่น ค่าพาหนะเดินทางและค่าเช่าที่พักของตัวความ ทนายความ หรือพยาน เป็นต้น ตามจำนวนที่ศาลเห็นสมควร ถ้าคู่ความฝ่ายที่ขอเลื่อนคดีไม่ชำระค่าป่วยการหรือค่าใช้จ่ายตามที่ศาลกำหนด ให้ศาลยกคำขอเลื่อนคดีนั้นเสีย ค่าป่วยการหรือค่าใช้จ่ายที่จ่ายตามวรรคสองให้ตกเป็นพับ คำขอเลื่อนคดีตามวรรคหนึ่ง ถ้าไม่ได้เสนอต่อหน้าศาลด้วยวาจา ก็ให้ทำเป็นคำร้องและจะทำฝ่ายเดียวโดยได้รับอนุญาตจากศาลก็ได้"},{"id":"๔๑","num":"มาตรา ๔๑","num_ara":"๔๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ การนั่งพิจารณา","subsection":"","paragraphs":["ถ้ามีการขอเลื่อนการนั่งพิจารณาโดยอ้างว่าตัวความ ผู้แทน ทนายความ พยาน หรือบุคคลอื่นที่ถูกเรียกให้มาศาลไม่สามารถมาศาลได้เพราะป่วยเจ็บ เมื่อศาลเห็นสมควร หรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอฝ่ายเดียว ศาลจะมีคำสั่งตั้งเจ้าพนักงานไปทำการตรวจก็ได้ และถ้าสามารถหาแพทย์ได้ก็ให้ตั้งแพทย์ไปตรวจด้วย ถ้าผู้ที่ศาลตั้งให้ไปตรวจได้รายงานโดยสาบานตนหรือกล่าวคำปฏิญาณแล้ว และศาลเชื่อว่าอาการของผู้ที่อ้างว่าป่วยนั้นไม่ร้ายแรงถึงกับจะมาศาลไม่ได้ ให้ศาลดำเนินกระบวนพิจารณาตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการขาดนัดหรือการไม่มาศาลของบุคคลที่อ้างว่าป่วยนั้น แล้วแต่กรณี ศาลอาจสั่งให้คู่ความฝ่ายที่ขอให้ไปตรวจตามวรรคหนึ่ง หรือคู่ความใดไปกับผู้ที่ศาลตั้งให้ไปตรวจ คู่ความนั้นจะมอบให้ผู้ใดไปแทนตนก็ได้ ค่าพาหนะและค่าป่วยการของเจ้าพนักงานและแพทย์ ให้ถือว่าเป็นค่าฤชาธรรมเนียม และให้นำมาตรา ๑๖๖ มาใช้บังคับ"],"text":"ถ้ามีการขอเลื่อนการนั่งพิจารณาโดยอ้างว่าตัวความ ผู้แทน ทนายความ พยาน หรือบุคคลอื่นที่ถูกเรียกให้มาศาลไม่สามารถมาศาลได้เพราะป่วยเจ็บ เมื่อศาลเห็นสมควร หรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอฝ่ายเดียว ศาลจะมีคำสั่งตั้งเจ้าพนักงานไปทำการตรวจก็ได้ และถ้าสามารถหาแพทย์ได้ก็ให้ตั้งแพทย์ไปตรวจด้วย ถ้าผู้ที่ศาลตั้งให้ไปตรวจได้รายงานโดยสาบานตนหรือกล่าวคำปฏิญาณแล้ว และศาลเชื่อว่าอาการของผู้ที่อ้างว่าป่วยนั้นไม่ร้ายแรงถึงกับจะมาศาลไม่ได้ ให้ศาลดำเนินกระบวนพิจารณาตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการขาดนัดหรือการไม่มาศาลของบุคคลที่อ้างว่าป่วยนั้น แล้วแต่กรณี ศาลอาจสั่งให้คู่ความฝ่ายที่ขอให้ไปตรวจตามวรรคหนึ่ง หรือคู่ความใดไปกับผู้ที่ศาลตั้งให้ไปตรวจ คู่ความนั้นจะมอบให้ผู้ใดไปแทนตนก็ได้ ค่าพาหนะและค่าป่วยการของเจ้าพนักงานและแพทย์ ให้ถือว่าเป็นค่าฤชาธรรมเนียม และให้นำมาตรา ๑๖๖ มาใช้บังคับ"},{"id":"๔๒","num":"มาตรา ๔๒","num_ara":"๔๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ การนั่งพิจารณา","subsection":"","paragraphs":["ถ้าคู่ความฝ่ายใดฝ่ายหนึ่งในคดีที่ค้างพิจารณาอยู่ในศาลได้มรณะเสียก่อนศาลพิพากษาคดี ให้ศาลเลื่อนการนั่งพิจารณาไปจนกว่าทายาทของผู้มรณะหรือผู้จัดการทรัพย์มรดกของผู้มรณะ หรือบุคคลอื่นให้ที่ปกครองทรัพย์มรดกไว้ จะได้เข้ามาเป็นคู่ความแทนที่ผู้มรณะ โดยมีคำขอเข้ามาเอง หรือโดยที่ศาลหมายเรียกให้เข้ามา เนื่องจากคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอฝ่ายเดียว คำขอเช่นว่านี้จะต้องยื่นภายในกำหนดหนึ่งปีนับแต่วันที่คู่ความฝ่ายนั้นมรณะ ถ้าไม่มีคำขอของบุคคลดังกล่าวมาแล้ว หรือไม่มีคำขอของคู่ความฝ่ายใดฝ่ายหนึ่งภายในเวลาที่กำหนดไว้ ให้ศาลมีคำสั่งจำหน่ายคดีเรื่องนั้นเสียจากสารบบความ"],"text":"ถ้าคู่ความฝ่ายใดฝ่ายหนึ่งในคดีที่ค้างพิจารณาอยู่ในศาลได้มรณะเสียก่อนศาลพิพากษาคดี ให้ศาลเลื่อนการนั่งพิจารณาไปจนกว่าทายาทของผู้มรณะหรือผู้จัดการทรัพย์มรดกของผู้มรณะ หรือบุคคลอื่นให้ที่ปกครองทรัพย์มรดกไว้ จะได้เข้ามาเป็นคู่ความแทนที่ผู้มรณะ โดยมีคำขอเข้ามาเอง หรือโดยที่ศาลหมายเรียกให้เข้ามา เนื่องจากคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอฝ่ายเดียว คำขอเช่นว่านี้จะต้องยื่นภายในกำหนดหนึ่งปีนับแต่วันที่คู่ความฝ่ายนั้นมรณะ ถ้าไม่มีคำขอของบุคคลดังกล่าวมาแล้ว หรือไม่มีคำขอของคู่ความฝ่ายใดฝ่ายหนึ่งภายในเวลาที่กำหนดไว้ ให้ศาลมีคำสั่งจำหน่ายคดีเรื่องนั้นเสียจากสารบบความ"},{"id":"๔๓","num":"มาตรา ๔๓","num_ara":"๔๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ การนั่งพิจารณา","subsection":"","paragraphs":["ถ้าทายาทของผู้มรณะ หรือผู้จัดการทรัพย์มรดกของผู้มรณะ หรือบุคคลอื่นใดที่ปกครองทรัพย์มรดกประสงค์จะขอเข้ามาเป็นคู่ความแทน ก็ให้ยื่นคำขอโดยทำเป็นคำร้องต่อศาลเพื่อการนั้น ในกรณีเช่นนี้ เมื่อศาลเห็นสมควร หรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอ ศาลอาจสั่งให้ผู้ที่จะเข้ามาเป็นคู่ความแทนนั้นแสดงพยานหลักฐานสนับสนุนคำขอเช่นว่านั้นได้ เมื่อได้แสดงพยานหลักฐานดังกล่าวนั้นแล้ว ให้ศาลมีคำสั่งอนุญาตหรือไม่อนุญาตในการที่จะเข้าเป็นคู่ความแทน"],"text":"ถ้าทายาทของผู้มรณะ หรือผู้จัดการทรัพย์มรดกของผู้มรณะ หรือบุคคลอื่นใดที่ปกครองทรัพย์มรดกประสงค์จะขอเข้ามาเป็นคู่ความแทน ก็ให้ยื่นคำขอโดยทำเป็นคำร้องต่อศาลเพื่อการนั้น ในกรณีเช่นนี้ เมื่อศาลเห็นสมควร หรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอ ศาลอาจสั่งให้ผู้ที่จะเข้ามาเป็นคู่ความแทนนั้นแสดงพยานหลักฐานสนับสนุนคำขอเช่นว่านั้นได้ เมื่อได้แสดงพยานหลักฐานดังกล่าวนั้นแล้ว ให้ศาลมีคำสั่งอนุญาตหรือไม่อนุญาตในการที่จะเข้าเป็นคู่ความแทน"},{"id":"๔๔","num":"มาตรา ๔๔","num_ara":"๔๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ การนั่งพิจารณา","subsection":"","paragraphs":["คำสั่งให้หมายเรียกบุคคลใดเข้ามาแทนผู้มรณะนั้น จะต้องกำหนดระยะเวลาพอสมควรเพื่อให้บุคคลนั้นมีโอกาสคัดค้านในศาลว่าตนมิได้เป็นทายาทของผู้มรณะ หรือมิได้เป็นผู้จัดการทรัพย์มรดกหรือผู้ปกครองทรัพย์มรดกนั้น ทายาท ผู้จัดการทรัพย์มรดก หรือบุคคลผู้ถูกเรียกไม่จำต้องปฏิบัติตามหมายเช่นว่านั้นก่อนระยะเวลาที่กฎหมายกำหนดไว้เพื่อการยอมรับฐานะนั้นได้ล่วงพ้นไปแล้ว ถ้าบุคคลที่ถูกศาลหมายเรียกนั้น ยินยอมรับเข้ามาเป็นคู่ความแทนผู้มรณะ ให้ศาลจดรายงานพิสดารไว้และดำเนินคดีต่อไป ถ้าบุคคลนั้นไม่ยินยอมหรือไม่มาศาล ให้ศาลทำการไต่สวนตามที่เห็นสมควร ถ้าศาลเห็นว่าหมายเรียกนั้นมีเหตุผลฟังได้ ก็ให้ออกคำสั่งตั้งบุคคลผู้ถูกเรียกเป็นคู่ความแทนผู้มรณะแล้วดำเนินคดีต่อไป ถ้าศาลเห็นว่าข้อคัดค้านของบุคคลผู้ถูกเรียกมีเหตุผลฟังได้ ก็ให้ศาลสั่งเพิกถอนหมายเรียกนั้นเสีย และถ้าคู่ความฝ่ายใดฝ่ายหนึ่งไม่สามารถเรียกทายาทอันแท้จริง หรือผู้จัดการทรัพย์มรดกหรือบุคคลที่ปกครองทรัพย์มรดกของผู้มรณะเข้ามาเป็นคู่ความแทนผู้มรณะได้ภายในกำหนดเวลาหนึ่งปี ก็ให้ศาลมีคำสั่งตามที่เห็นสมควรเพื่อประโยชน์แห่งความยุติธรรม"],"text":"คำสั่งให้หมายเรียกบุคคลใดเข้ามาแทนผู้มรณะนั้น จะต้องกำหนดระยะเวลาพอสมควรเพื่อให้บุคคลนั้นมีโอกาสคัดค้านในศาลว่าตนมิได้เป็นทายาทของผู้มรณะ หรือมิได้เป็นผู้จัดการทรัพย์มรดกหรือผู้ปกครองทรัพย์มรดกนั้น ทายาท ผู้จัดการทรัพย์มรดก หรือบุคคลผู้ถูกเรียกไม่จำต้องปฏิบัติตามหมายเช่นว่านั้นก่อนระยะเวลาที่กฎหมายกำหนดไว้เพื่อการยอมรับฐานะนั้นได้ล่วงพ้นไปแล้ว ถ้าบุคคลที่ถูกศาลหมายเรียกนั้น ยินยอมรับเข้ามาเป็นคู่ความแทนผู้มรณะ ให้ศาลจดรายงานพิสดารไว้และดำเนินคดีต่อไป ถ้าบุคคลนั้นไม่ยินยอมหรือไม่มาศาล ให้ศาลทำการไต่สวนตามที่เห็นสมควร ถ้าศาลเห็นว่าหมายเรียกนั้นมีเหตุผลฟังได้ ก็ให้ออกคำสั่งตั้งบุคคลผู้ถูกเรียกเป็นคู่ความแทนผู้มรณะแล้วดำเนินคดีต่อไป ถ้าศาลเห็นว่าข้อคัดค้านของบุคคลผู้ถูกเรียกมีเหตุผลฟังได้ ก็ให้ศาลสั่งเพิกถอนหมายเรียกนั้นเสีย และถ้าคู่ความฝ่ายใดฝ่ายหนึ่งไม่สามารถเรียกทายาทอันแท้จริง หรือผู้จัดการทรัพย์มรดกหรือบุคคลที่ปกครองทรัพย์มรดกของผู้มรณะเข้ามาเป็นคู่ความแทนผู้มรณะได้ภายในกำหนดเวลาหนึ่งปี ก็ให้ศาลมีคำสั่งตามที่เห็นสมควรเพื่อประโยชน์แห่งความยุติธรรม"},{"id":"๔๕","num":"มาตรา ๔๕","num_ara":"๔๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ การนั่งพิจารณา","subsection":"","paragraphs":["ถ้าปรากฏต่อศาลว่าคู่ความฝ่ายหนึ่งตกเป็นผู้ไร้ความสามารถก็ดี หรือผู้แทนโดยชอบธรรมของคู่ความฝ่ายที่เป็นผู้ไร้ความสามารถได้มรณะหรือหมดอำนาจเป็นผู้แทนก็ดี ให้ศาลเลื่อนการนั่งพิจารณาไปภายในระยะเวลาอันสมควรเพื่อผู้แทนโดยชอบธรรมหรือผู้แทนโดยชอบธรรมคนใหม่จะได้แจ้งให้ทราบถึงการได้รับแต่งตั้งของตนโดยยื่นคำขอเป็นคำร้องต่อศาลเพื่อการนั้น ถ้ามิได้ยื่นคำขอดังกล่าวมาแล้วให้นำมาตรา ๕๖ มาใช้บังคับ ถ้าผู้แทนหรือทนายความของคู่ความได้มรณะ หรือหมดอำนาจเป็นผู้แทน ให้ศาลเลื่อนการนั่งพิจารณาไปจนกว่าตัวความจะได้ยื่นคำร้องต่อศาลแจ้งให้ทราบถึงการที่ได้แต่งตั้งผู้แทนหรือทนายความขึ้นใหม่ หรือคู่ความฝ่ายนั้นมีความประสงค์จะมาว่าคดีด้วยตนเอง แต่ถ้าศาลเห็นสมควรหรือเมื่อคู่ความอีกฝ่ายหนึ่งมีคำขอฝ่ายเดียว ให้ศาลมีอำนาจสั่งกำหนดระยะเวลาไว้พอสมควร เพื่อให้ตัวความมีโอกาสแจ้งให้ทราบถึงการแต่งตั้งหรือความประสงค์ของตนนั้นก็ได้ในกรณีเช่นว่านี้ ถ้าตัวความมิได้แจ้งให้ทราบภายในระยะเวลาที่กำหนดไว้ ศาลจะมีคำสั่งให้เริ่มการนั่งพิจารณาต่อไปในวันใด ๆ ตามที่เห็นสมควรก็ได้ บทบัญญัติแห่งวรรคก่อนนั้น ให้นำมาใช้บังคับแก่กรณีที่ผู้แทนโดยชอบธรรมของผู้ไร้ความสามารถหมดอำนาจลงเพราะเหตุที่บุคคลนั้นได้มีความสามารถขึ้นแล้วด้วยโดยอนุโลม"],"text":"ถ้าปรากฏต่อศาลว่าคู่ความฝ่ายหนึ่งตกเป็นผู้ไร้ความสามารถก็ดี หรือผู้แทนโดยชอบธรรมของคู่ความฝ่ายที่เป็นผู้ไร้ความสามารถได้มรณะหรือหมดอำนาจเป็นผู้แทนก็ดี ให้ศาลเลื่อนการนั่งพิจารณาไปภายในระยะเวลาอันสมควรเพื่อผู้แทนโดยชอบธรรมหรือผู้แทนโดยชอบธรรมคนใหม่จะได้แจ้งให้ทราบถึงการได้รับแต่งตั้งของตนโดยยื่นคำขอเป็นคำร้องต่อศาลเพื่อการนั้น ถ้ามิได้ยื่นคำขอดังกล่าวมาแล้วให้นำมาตรา ๕๖ มาใช้บังคับ ถ้าผู้แทนหรือทนายความของคู่ความได้มรณะ หรือหมดอำนาจเป็นผู้แทน ให้ศาลเลื่อนการนั่งพิจารณาไปจนกว่าตัวความจะได้ยื่นคำร้องต่อศาลแจ้งให้ทราบถึงการที่ได้แต่งตั้งผู้แทนหรือทนายความขึ้นใหม่ หรือคู่ความฝ่ายนั้นมีความประสงค์จะมาว่าคดีด้วยตนเอง แต่ถ้าศาลเห็นสมควรหรือเมื่อคู่ความอีกฝ่ายหนึ่งมีคำขอฝ่ายเดียว ให้ศาลมีอำนาจสั่งกำหนดระยะเวลาไว้พอสมควร เพื่อให้ตัวความมีโอกาสแจ้งให้ทราบถึงการแต่งตั้งหรือความประสงค์ของตนนั้นก็ได้ในกรณีเช่นว่านี้ ถ้าตัวความมิได้แจ้งให้ทราบภายในระยะเวลาที่กำหนดไว้ ศาลจะมีคำสั่งให้เริ่มการนั่งพิจารณาต่อไปในวันใด ๆ ตามที่เห็นสมควรก็ได้ บทบัญญัติแห่งวรรคก่อนนั้น ให้นำมาใช้บังคับแก่กรณีที่ผู้แทนโดยชอบธรรมของผู้ไร้ความสามารถหมดอำนาจลงเพราะเหตุที่บุคคลนั้นได้มีความสามารถขึ้นแล้วด้วยโดยอนุโลม"},{"id":"๔๖","num":"มาตรา ๔๖","num_ara":"๔๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ รายงานและสำนวนความ","subsection":"","paragraphs":["บรรดากระบวนพิจารณาเกี่ยวด้วยการพิจารณาและการชี้ขาดตัดสินคดีแพ่งทั้งหลายซึ่งศาลเป็นผู้ทำนั้น ให้ทำเป็นภาษาไทย บรรดาคำคู่ความและเอกสารหรือแผ่นกระดาษไม่ว่าอย่างใด ๆ ที่คู่ความหรือศาลหรือเจ้าพนักงานศาลได้ทำขึ้นซึ่งประกอบเป็นสำนวนของคดีนั้น ให้เขียนเป็นหนังสือไทยและเขียนด้วยหมึกหรือดีดพิมพ์หรือตีพิมพ์ ถ้ามีผิดตกที่ใดห้ามมิให้ขูดลบออก แต่ให้ขีดฆ่าเสียแล้วเขียนลงใหม่และผู้เขียนต้องลงชื่อไว้ที่ริมกระดาษ ถ้ามีข้อความตกเติมให้ผู้ตกเติมลงลายมือชื่อ หรือลงชื่อย่อไว้เป็นสำคัญ ถ้าต้นฉบับเอกสารหรือแผ่นกระดาษไม่ว่าอย่างใด ๆ ที่ส่งต่อศาลได้ทำขึ้นเป็นภาษาต่างประเทศ ให้ศาลสั่งคู่ความฝ่ายที่ส่งให้ทำคำแปลทั้งฉบับหรือเฉพาะแต่ส่วนสำคัญ โดยมีคำรับรองมายื่นเพื่อแนบไว้กับต้นฉบับ ถ้าคู่ความฝ่ายใดหรือบุคคลใดที่มาศาลไม่เข้าใจภาษาไทย หรือเป็นใบ้หรือหูหนวกและอ่านเขียนหนังสือไม่ได้ ให้ให้คู่ความฝ่ายที่เกี่ยวข้องจัดหาล่าม"],"text":"บรรดากระบวนพิจารณาเกี่ยวด้วยการพิจารณาและการชี้ขาดตัดสินคดีแพ่งทั้งหลายซึ่งศาลเป็นผู้ทำนั้น ให้ทำเป็นภาษาไทย บรรดาคำคู่ความและเอกสารหรือแผ่นกระดาษไม่ว่าอย่างใด ๆ ที่คู่ความหรือศาลหรือเจ้าพนักงานศาลได้ทำขึ้นซึ่งประกอบเป็นสำนวนของคดีนั้น ให้เขียนเป็นหนังสือไทยและเขียนด้วยหมึกหรือดีดพิมพ์หรือตีพิมพ์ ถ้ามีผิดตกที่ใดห้ามมิให้ขูดลบออก แต่ให้ขีดฆ่าเสียแล้วเขียนลงใหม่และผู้เขียนต้องลงชื่อไว้ที่ริมกระดาษ ถ้ามีข้อความตกเติมให้ผู้ตกเติมลงลายมือชื่อ หรือลงชื่อย่อไว้เป็นสำคัญ ถ้าต้นฉบับเอกสารหรือแผ่นกระดาษไม่ว่าอย่างใด ๆ ที่ส่งต่อศาลได้ทำขึ้นเป็นภาษาต่างประเทศ ให้ศาลสั่งคู่ความฝ่ายที่ส่งให้ทำคำแปลทั้งฉบับหรือเฉพาะแต่ส่วนสำคัญ โดยมีคำรับรองมายื่นเพื่อแนบไว้กับต้นฉบับ ถ้าคู่ความฝ่ายใดหรือบุคคลใดที่มาศาลไม่เข้าใจภาษาไทย หรือเป็นใบ้หรือหูหนวกและอ่านเขียนหนังสือไม่ได้ ให้ให้คู่ความฝ่ายที่เกี่ยวข้องจัดหาล่าม"},{"id":"๔๗","num":"มาตรา ๔๗","num_ara":"๔๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ รายงานและสำนวนความ","subsection":"","paragraphs":["ถ้าคู่ความหรือบุคคลใดยื่นใบมอบอำนาจต่อศาล ให้ศาลมีอำนาจที่จะสั่งให้คู่ความหรือบุคคลนั้นให้ถ้อยคำสาบานตัวว่าเป็นใบมอบอำนาจอันแท้จริง ถ้าศาลมีเหตุอันควรสงสัยว่า ใบมอบอำนาจที่ยื่นนั้นจะไม่ใช่ใบมอบอำนาจอันแท้จริงก็ดี หรือเมื่อคู่ความอีกฝ่ายหนึ่งยื่นคำร้องแสดงเหตุอันควรสงสัยว่าใบมอบอำนาจนั้นจะมิใช่ใบมอบอำนาจอันแท้จริงก็ดี ให้ศาลมีอำนาจที่จะสั่งให้คู่ความหรือบุคคลที่เกี่ยวข้องนั้นยื่นใบมอบอำนาจตามที่บัญญัติไว้ต่อไปนี้ ถ้าใบมอบอำนาจนั้นได้ทำในราชอาณาจักรไทยต้องให้นายอำเภอเป็นพยาน ถ้าได้ทำในเมืองต่างประเทศที่มีกงสุลไทย ต้องให้กงสุลนั้นเป็นพยาน ถ้าได้ทำในเมืองต่างประเทศที่ไม่มีกงสุลไทย ต้องให้บุคคลเหล่านี้เป็นพยานคือเจ้าพนักงานโนตารีปับลิกหรือแมยิสเตร็ด หรือบุคคลอื่นซึ่งกฎหมายแห่งท้องถิ่นตั้งให้เป็นผู้มีอำนาจเป็นพยานในเอกสารเช่นว่านี้ และต้องมีใบสำคัญของรัฐบาลต่างประเทศที่เกี่ยวข้องแสดงว่าบุคคลที่เป็นพยานนั้นเป็นผู้มีอำนาจกระทำการได้ บทบัญญัติแห่งมาตรานี้ให้ใช้บังคับแก่ใบสำคัญและเอกสารอื่น ๆ ทำนองเช่นว่ามานี้ ซึ่งคู่ความจะต้องยื่นต่อศาล"],"text":"ถ้าคู่ความหรือบุคคลใดยื่นใบมอบอำนาจต่อศาล ให้ศาลมีอำนาจที่จะสั่งให้คู่ความหรือบุคคลนั้นให้ถ้อยคำสาบานตัวว่าเป็นใบมอบอำนาจอันแท้จริง ถ้าศาลมีเหตุอันควรสงสัยว่า ใบมอบอำนาจที่ยื่นนั้นจะไม่ใช่ใบมอบอำนาจอันแท้จริงก็ดี หรือเมื่อคู่ความอีกฝ่ายหนึ่งยื่นคำร้องแสดงเหตุอันควรสงสัยว่าใบมอบอำนาจนั้นจะมิใช่ใบมอบอำนาจอันแท้จริงก็ดี ให้ศาลมีอำนาจที่จะสั่งให้คู่ความหรือบุคคลที่เกี่ยวข้องนั้นยื่นใบมอบอำนาจตามที่บัญญัติไว้ต่อไปนี้ ถ้าใบมอบอำนาจนั้นได้ทำในราชอาณาจักรไทยต้องให้นายอำเภอเป็นพยาน ถ้าได้ทำในเมืองต่างประเทศที่มีกงสุลไทย ต้องให้กงสุลนั้นเป็นพยาน ถ้าได้ทำในเมืองต่างประเทศที่ไม่มีกงสุลไทย ต้องให้บุคคลเหล่านี้เป็นพยานคือเจ้าพนักงานโนตารีปับลิกหรือแมยิสเตร็ด หรือบุคคลอื่นซึ่งกฎหมายแห่งท้องถิ่นตั้งให้เป็นผู้มีอำนาจเป็นพยานในเอกสารเช่นว่านี้ และต้องมีใบสำคัญของรัฐบาลต่างประเทศที่เกี่ยวข้องแสดงว่าบุคคลที่เป็นพยานนั้นเป็นผู้มีอำนาจกระทำการได้ บทบัญญัติแห่งมาตรานี้ให้ใช้บังคับแก่ใบสำคัญและเอกสารอื่น ๆ ทำนองเช่นว่ามานี้ ซึ่งคู่ความจะต้องยื่นต่อศาล"},{"id":"๔๘","num":"มาตรา ๔๘","num_ara":"๔๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ รายงานและสำนวนความ","subsection":"","paragraphs":["ในคดีทุกเรื่อง ให้เป็นหน้าที่ของศาลต้องจดแจ้งรายงานการนั่งพิจารณาหรือกระบวนพิจารณาอื่น ๆ ของศาลไว้ทุกครั้ง รายงานนั้นต้องมีรายการต่อไปนี้","(๑) เลขคดี (๒) ชื่อคู่ความ (๓) สถานที่ วัน และเวลาที่ศาลนั่งพิจารณาหรือดำเนินกระบวนพิจารณา (๔) ข้อความโดยย่อเกี่ยวด้วยเรื่องที่กระทำและรายการข้อสำคัญอื่น ๆ (๕) ลายมือชื่อผู้พิพากษา เมื่อมีกฎหมายบัญญัติไว้หรือเมื่อศาลเห็นเป็นการจำเป็นก็ให้ศาลจดบันทึก (โดยจดรวมไว้ในรายงานพิสดารหรืออีกส่วนหนึ่งต่างหาก) ซึ่งคำแถลงหรือคำคัดค้านในข้อสำคัญ ข้อตกลง คำชี้ขาด คำสั่ง หรือการอื่น ๆ หรือกระบวนพิจารณาที่ทำด้วยวาจาตามบทบัญญัติแห่งประมวลกฎหมายนี้"],"text":"ในคดีทุกเรื่อง ให้เป็นหน้าที่ของศาลต้องจดแจ้งรายงานการนั่งพิจารณาหรือกระบวนพิจารณาอื่น ๆ ของศาลไว้ทุกครั้ง รายงานนั้นต้องมีรายการต่อไปนี้\n\n(๑) เลขคดี (๒) ชื่อคู่ความ (๓) สถานที่ วัน และเวลาที่ศาลนั่งพิจารณาหรือดำเนินกระบวนพิจารณา (๔) ข้อความโดยย่อเกี่ยวด้วยเรื่องที่กระทำและรายการข้อสำคัญอื่น ๆ (๕) ลายมือชื่อผู้พิพากษา เมื่อมีกฎหมายบัญญัติไว้หรือเมื่อศาลเห็นเป็นการจำเป็นก็ให้ศาลจดบันทึก (โดยจดรวมไว้ในรายงานพิสดารหรืออีกส่วนหนึ่งต่างหาก) ซึ่งคำแถลงหรือคำคัดค้านในข้อสำคัญ ข้อตกลง คำชี้ขาด คำสั่ง หรือการอื่น ๆ หรือกระบวนพิจารณาที่ทำด้วยวาจาตามบทบัญญัติแห่งประมวลกฎหมายนี้"},{"id":"๔๙","num":"มาตรา ๔๙","num_ara":"๔๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ รายงานและสำนวนความ","subsection":"","paragraphs":["ในส่วนที่เกี่ยวด้วยคำแถลงหรือคำคัดค้านของคู่ความ หรือคำให้การของพยานหรือผู้เชี่ยวชาญหรือข้อตกลงในการสละสิทธิของคู่ความนั้น ให้ถือว่ารายงานของศาลเป็นพยานหลักฐานเบื้องต้นได้ต่อเมื่อศาลได้อ่านให้คู่ความหรือบุคคลที่เกี่ยวข้องฟังและได้จดลงไว้ซึ่งข้อแก้ไขเพิ่มเติมตามที่ขอร้องหรือที่ชี้แจงใหม่ ทั้งคู่ความหรือบุคคลนั้น ๆ ได้ลงลายมือชื่อไว้เป็นสำคัญ"],"text":"ในส่วนที่เกี่ยวด้วยคำแถลงหรือคำคัดค้านของคู่ความ หรือคำให้การของพยานหรือผู้เชี่ยวชาญหรือข้อตกลงในการสละสิทธิของคู่ความนั้น ให้ถือว่ารายงานของศาลเป็นพยานหลักฐานเบื้องต้นได้ต่อเมื่อศาลได้อ่านให้คู่ความหรือบุคคลที่เกี่ยวข้องฟังและได้จดลงไว้ซึ่งข้อแก้ไขเพิ่มเติมตามที่ขอร้องหรือที่ชี้แจงใหม่ ทั้งคู่ความหรือบุคคลนั้น ๆ ได้ลงลายมือชื่อไว้เป็นสำคัญ"},{"id":"๕๐","num":"มาตรา ๕๐","num_ara":"๕๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ รายงานและสำนวนความ","subsection":"","paragraphs":["ถ้าคู่ความฝ่ายใด หรือบุคคลใดจะต้องลงลายมือชื่อในรายงานใดเพื่อแสดงรับรู้รายงานนั้น หรือจะต้องลงลายมือชื่อในเอกสารใดเพื่อรับรองการอ่านหรือการส่งเอกสารเช่นว่านั้น","(๑) การลงลายมือ พิมพ์นิ้วมือ แกงได หรือเครื่องหมายอย่างอื่นที่ได้ทำต่อหน้าศาลนั้น ไม่จำต้องมีลายมือชื่อของพยานสองคนรับรอง (๒) ถ้าคู่ความหรือบุคคลที่จะต้องลงลายมือชื่อในรายงานดังกล่าวแล้ว ลงลายมือชื่อไม่ได้ หรือไม่ยอมลงลายมือชื่อ ให้ศาลทำรายงานจดแจ้งเหตุที่ไม่มีลายมือชื่อเช่นนั้นไว้แทนการลงลายมือชื่อ"],"text":"ถ้าคู่ความฝ่ายใด หรือบุคคลใดจะต้องลงลายมือชื่อในรายงานใดเพื่อแสดงรับรู้รายงานนั้น หรือจะต้องลงลายมือชื่อในเอกสารใดเพื่อรับรองการอ่านหรือการส่งเอกสารเช่นว่านั้น\n\n(๑) การลงลายมือ พิมพ์นิ้วมือ แกงได หรือเครื่องหมายอย่างอื่นที่ได้ทำต่อหน้าศาลนั้น ไม่จำต้องมีลายมือชื่อของพยานสองคนรับรอง (๒) ถ้าคู่ความหรือบุคคลที่จะต้องลงลายมือชื่อในรายงานดังกล่าวแล้ว ลงลายมือชื่อไม่ได้ หรือไม่ยอมลงลายมือชื่อ ให้ศาลทำรายงานจดแจ้งเหตุที่ไม่มีลายมือชื่อเช่นนั้นไว้แทนการลงลายมือชื่อ"},{"id":"๕๑","num":"มาตรา ๕๑","num_ara":"๕๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ รายงานและสำนวนความ","subsection":"","paragraphs":["ให้เป็นหน้าที่ของศาลที่จะปฏิบัติดังนี้","(๑) ลงทะเบียนคดีในสารบบความของศาลตามลำดับที่รับไว้ กล่าวคือ ตามวันและเวลาที่ยื่นหรือเสนอคำฟ้องเพื่อเริ่มคดีต่อศาล ตามที่บัญญัติไว้ในประมวลกฎหมายนี้ (๒) ลงทะเบียนคำพิพากษา หรือคำสั่งชี้ขาดคดีทั้งหมดของศาลในสารบบคำพิพากษา (๓) รวบรวมรายงานและเอกสารที่ส่งต่อศาลหรือศาลทำขึ้น กับคำสั่งและคำพิพากษาของศาล ไว้ในสำนวนความเรื่องนั้น แล้วเก็บรักษาไว้ในที่ปลอดภัย (๔) คัดสำเนาคำพิพากษา คำสั่ง ชี้ขาดคดี แล้วเก็บรักษาไว้เรียงตามลำดับและในที่ปลอดภัย (๕) เก็บรักษาสารบบและสมุดของศาล เช่นสารบบความและสารบบคำพิพากษาไว้ในที่ปลอดภัย การจัดทำสารบบความหรือสารบบคำพิพากษา การรวบรวมเอกสารในสำนวนความ และการเก็บรักษาสำเนาคำพิพากษาหรือคำสั่งชี้ขาดคดีตามวรรคหนึ่ง (๑) (๒) (๓) (๔) และ (๕) อาจกระทำในรูปแบบข้อมูลอิเล็กทรอนิกส์ก็ได้ และให้ถือว่าสิ่งพิมพ์ออกของข้อมูลอิเล็กทรอนิกส์ดังกล่าวที่รับรองโดยวิธีการที่ศาลกำหนดเป็นสำเนาสารบบความหรือสารบบคำพิพากษา หรือเป็นสำเนาเอกสารในสำนวนความ แล้วแต่กรณี และให้ใช้แทนต้นฉบับได้ ทั้งนี้ ตามหลักเกณฑ์และวิธีการที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ศาลฎีกา และเมื่อข้อกำหนดนั้นประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"],"text":"ให้เป็นหน้าที่ของศาลที่จะปฏิบัติดังนี้\n\n(๑) ลงทะเบียนคดีในสารบบความของศาลตามลำดับที่รับไว้ กล่าวคือ ตามวันและเวลาที่ยื่นหรือเสนอคำฟ้องเพื่อเริ่มคดีต่อศาล ตามที่บัญญัติไว้ในประมวลกฎหมายนี้ (๒) ลงทะเบียนคำพิพากษา หรือคำสั่งชี้ขาดคดีทั้งหมดของศาลในสารบบคำพิพากษา (๓) รวบรวมรายงานและเอกสารที่ส่งต่อศาลหรือศาลทำขึ้น กับคำสั่งและคำพิพากษาของศาล ไว้ในสำนวนความเรื่องนั้น แล้วเก็บรักษาไว้ในที่ปลอดภัย (๔) คัดสำเนาคำพิพากษา คำสั่ง ชี้ขาดคดี แล้วเก็บรักษาไว้เรียงตามลำดับและในที่ปลอดภัย (๕) เก็บรักษาสารบบและสมุดของศาล เช่นสารบบความและสารบบคำพิพากษาไว้ในที่ปลอดภัย การจัดทำสารบบความหรือสารบบคำพิพากษา การรวบรวมเอกสารในสำนวนความ และการเก็บรักษาสำเนาคำพิพากษาหรือคำสั่งชี้ขาดคดีตามวรรคหนึ่ง (๑) (๒) (๓) (๔) และ (๕) อาจกระทำในรูปแบบข้อมูลอิเล็กทรอนิกส์ก็ได้ และให้ถือว่าสิ่งพิมพ์ออกของข้อมูลอิเล็กทรอนิกส์ดังกล่าวที่รับรองโดยวิธีการที่ศาลกำหนดเป็นสำเนาสารบบความหรือสารบบคำพิพากษา หรือเป็นสำเนาเอกสารในสำนวนความ แล้วแต่กรณี และให้ใช้แทนต้นฉบับได้ ทั้งนี้ ตามหลักเกณฑ์และวิธีการที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ศาลฎีกา และเมื่อข้อกำหนดนั้นประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"},{"id":"๕๒","num":"มาตรา ๕๒","num_ara":"๕๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ รายงานและสำนวนความ","subsection":"","paragraphs":["เมื่อคำพิพากษาหรือคำสั่งอันเป็นเด็ดขาดถึงที่สุดแล้วเรื่องใดได้มีการปฏิบัติตาม หรือบังคับไปแล้ว หรือระยะเวลาที่กำหนดไว้เพื่อการบังคับนั้นได้ล่วงพ้นไปแล้ว ให้ศาลที่เก็บสำนวนนั้นไว้ จัดส่งสำนวนนั้นไปยังกระทรวงยุติธรรม เพื่อเก็บรักษาไว้หรือจัดการตามกฎกระทรวงว่าด้วยการนั้น"],"text":"เมื่อคำพิพากษาหรือคำสั่งอันเป็นเด็ดขาดถึงที่สุดแล้วเรื่องใดได้มีการปฏิบัติตาม หรือบังคับไปแล้ว หรือระยะเวลาที่กำหนดไว้เพื่อการบังคับนั้นได้ล่วงพ้นไปแล้ว ให้ศาลที่เก็บสำนวนนั้นไว้ จัดส่งสำนวนนั้นไปยังกระทรวงยุติธรรม เพื่อเก็บรักษาไว้หรือจัดการตามกฎกระทรวงว่าด้วยการนั้น"},{"id":"๕๓","num":"มาตรา ๕๓","num_ara":"๕๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ รายงานและสำนวนความ","subsection":"","paragraphs":["ถ้ารายงาน คำพิพากษา คำสั่งหรือเอกสารอื่นใดที่รวมไว้ในสำนวนความซึ่งยังอยู่ในระหว่างพิจารณาหรือรอการบังคับของศาลสูญหายไป หรือบุบสลายทั้งหมดหรือแต่บางส่วน เป็นการขัดข้องต่อการชี้ขาดตัดสินหรือบังคับคดีเมื่อศาลเห็นสมควร หรือเมื่อคู่ความฝ่ายที่เกี่ยวข้องยื่นคำขอโดยทำเป็นคำร้อง ให้ศาลสั่งคู่ความหรือบุคคลผู้ถือเอกสารนั้น นำสำเนาที่รับรองถูกต้องมาส่งต่อศาล ถ้าหากสำเนาเช่นว่านั้นทั้งหมดหรือบางส่วนหาไม่ได้ ให้ศาลมีคำสั่งให้พิจารณาคดีนั้นใหม่ หรือมีคำสั่งอย่างอื่นตามที่เห็นสมควร เพื่อประโยชน์แห่งความยุติธรรม"],"text":"ถ้ารายงาน คำพิพากษา คำสั่งหรือเอกสารอื่นใดที่รวมไว้ในสำนวนความซึ่งยังอยู่ในระหว่างพิจารณาหรือรอการบังคับของศาลสูญหายไป หรือบุบสลายทั้งหมดหรือแต่บางส่วน เป็นการขัดข้องต่อการชี้ขาดตัดสินหรือบังคับคดีเมื่อศาลเห็นสมควร หรือเมื่อคู่ความฝ่ายที่เกี่ยวข้องยื่นคำขอโดยทำเป็นคำร้อง ให้ศาลสั่งคู่ความหรือบุคคลผู้ถือเอกสารนั้น นำสำเนาที่รับรองถูกต้องมาส่งต่อศาล ถ้าหากสำเนาเช่นว่านั้นทั้งหมดหรือบางส่วนหาไม่ได้ ให้ศาลมีคำสั่งให้พิจารณาคดีนั้นใหม่ หรือมีคำสั่งอย่างอื่นตามที่เห็นสมควร เพื่อประโยชน์แห่งความยุติธรรม"},{"id":"๕๔","num":"มาตรา ๕๔","num_ara":"๕๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๔ รายงานและสำนวนความ","subsection":"","paragraphs":["คู่ความก็ดี หรือพยานในส่วนที่เกี่ยวกับคำให้การของตนในคดีนั้นก็ดี หรือบุคคลภายนอกผู้มีส่วนได้เสียโดยชอบหรือมีเหตุผลอันสมควรก็ดี อาจร้องขออนุญาตต่อศาลไม่ว่าเวลาใดในระหว่าง หรือภายหลังการพิจารณาเพื่อตรวจเอกสารทั้งหมดหรือแต่บางฉบับในสำนวนเรื่องนั้น หรือขอคัดสำเนา หรือขอให้จ่าศาลคัดสำเนาและรับรอง แต่ทั้งนี้","(๑) ห้ามมิให้อนุญาตเช่นว่านั้นแก่บุคคลอื่นนอกจากคู่ความหรือพยานในคดีที่พิจารณาโดยไม่เปิดเผย หรือในคดีที่ศาลได้มีคำสั่งห้ามการตรวจหรือคัดสำเนาเอกสารในสำนวนทั้งหมดหรือบางฉบับเพื่อรักษาความสงบเรียบร้อยหรือผลประโยชน์ทั่วไปของประชาชน ถึงแม้ผู้ขอจะเป็นคู่ความหรือพยานก็ห้ามมิให้อนุญาตดุจกัน แต่ทั้งนี้ ไม่ตัดสิทธิของคู่ความในการที่จะตรวจหรือคัดสำเนาคำพิพากษาหรือคำสั่งในคดีนั้น หรือในการที่จะขอสำเนาอันรับรองถูกต้อง (๒) ห้ามมิให้อนุญาตให้คู่ความคัดถ้อยคำพยานฝ่ายตนจนกว่าจะได้สืบพยานฝ่ายตนเสร็จสิ้นแล้ว เว้นแต่จะมีพฤติการณ์พิเศษที่จะให้อนุญาต เมื่อได้ให้อนุญาตแล้ว การตรวจ หรือการคัดสำเนานั้น ให้ผู้ขอหรือบุคคลซึ่งได้รับการตั้งแต่งจากผู้ขอโดยชอบเป็นผู้คัดตามเวลาและเงื่อนไขซึ่งจ่าศาลจะได้กำหนดให้เพื่อความสะดวกของศาลหรือเพื่อความปลอดภัยของเอกสารนั้น ห้ามมิให้คัดสำเนาคำพิพากษาหรือคำสั่ง ก่อนที่ได้อ่านคำพิพากษาหรือคำสั่งนั้นและก่อนที่ได้ลงทะเบียนในสารบบคำพิพากษา ในกรณีที่ศาลได้ทำคำอธิบายเพิ่มเติมกลัดไว้กับรายงานแห่งคำสั่งหรือคำพิพากษาซึ่งกระทำด้วยวาจาตามบทบัญญัติมาตรา ๑๔๑ คำอธิบายเพิ่มเติมเช่นว่านั้นคู่ความจะขอตรวจหรือขอคัดสำเนา หรือขอสำเนาเสมือนเป็นส่วนหนึ่งแห่งคำสั่งหรือคำพิพากษาก็ได้ สำเนาที่รับรองนั้น ให้จ่าศาลเป็นผู้รับรองโดยเรียกค่าธรรมเนียมตามที่กำหนดไว้ในอัตราท้ายประมวลกฎหมายนี้ ในกรณีที่ผู้ขอตรวจเอกสารหรือขอคัดสำเนาด้วยตนเองไม่ต้องเรียกค่าธรรมเนียม"],"text":"คู่ความก็ดี หรือพยานในส่วนที่เกี่ยวกับคำให้การของตนในคดีนั้นก็ดี หรือบุคคลภายนอกผู้มีส่วนได้เสียโดยชอบหรือมีเหตุผลอันสมควรก็ดี อาจร้องขออนุญาตต่อศาลไม่ว่าเวลาใดในระหว่าง หรือภายหลังการพิจารณาเพื่อตรวจเอกสารทั้งหมดหรือแต่บางฉบับในสำนวนเรื่องนั้น หรือขอคัดสำเนา หรือขอให้จ่าศาลคัดสำเนาและรับรอง แต่ทั้งนี้\n\n(๑) ห้ามมิให้อนุญาตเช่นว่านั้นแก่บุคคลอื่นนอกจากคู่ความหรือพยานในคดีที่พิจารณาโดยไม่เปิดเผย หรือในคดีที่ศาลได้มีคำสั่งห้ามการตรวจหรือคัดสำเนาเอกสารในสำนวนทั้งหมดหรือบางฉบับเพื่อรักษาความสงบเรียบร้อยหรือผลประโยชน์ทั่วไปของประชาชน ถึงแม้ผู้ขอจะเป็นคู่ความหรือพยานก็ห้ามมิให้อนุญาตดุจกัน แต่ทั้งนี้ ไม่ตัดสิทธิของคู่ความในการที่จะตรวจหรือคัดสำเนาคำพิพากษาหรือคำสั่งในคดีนั้น หรือในการที่จะขอสำเนาอันรับรองถูกต้อง (๒) ห้ามมิให้อนุญาตให้คู่ความคัดถ้อยคำพยานฝ่ายตนจนกว่าจะได้สืบพยานฝ่ายตนเสร็จสิ้นแล้ว เว้นแต่จะมีพฤติการณ์พิเศษที่จะให้อนุญาต เมื่อได้ให้อนุญาตแล้ว การตรวจ หรือการคัดสำเนานั้น ให้ผู้ขอหรือบุคคลซึ่งได้รับการตั้งแต่งจากผู้ขอโดยชอบเป็นผู้คัดตามเวลาและเงื่อนไขซึ่งจ่าศาลจะได้กำหนดให้เพื่อความสะดวกของศาลหรือเพื่อความปลอดภัยของเอกสารนั้น ห้ามมิให้คัดสำเนาคำพิพากษาหรือคำสั่ง ก่อนที่ได้อ่านคำพิพากษาหรือคำสั่งนั้นและก่อนที่ได้ลงทะเบียนในสารบบคำพิพากษา ในกรณีที่ศาลได้ทำคำอธิบายเพิ่มเติมกลัดไว้กับรายงานแห่งคำสั่งหรือคำพิพากษาซึ่งกระทำด้วยวาจาตามบทบัญญัติมาตรา ๑๔๑ คำอธิบายเพิ่มเติมเช่นว่านั้นคู่ความจะขอตรวจหรือขอคัดสำเนา หรือขอสำเนาเสมือนเป็นส่วนหนึ่งแห่งคำสั่งหรือคำพิพากษาก็ได้ สำเนาที่รับรองนั้น ให้จ่าศาลเป็นผู้รับรองโดยเรียกค่าธรรมเนียมตามที่กำหนดไว้ในอัตราท้ายประมวลกฎหมายนี้ ในกรณีที่ผู้ขอตรวจเอกสารหรือขอคัดสำเนาด้วยตนเองไม่ต้องเรียกค่าธรรมเนียม"},{"id":"๕๕","num":"มาตรา ๕๕","num_ara":"๕๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["เมื่อมีข้อโต้แย้งเกิดขึ้น เกี่ยวกับสิทธิหรือหน้าที่ของบุคคลใดตามกฎหมายแพ่ง หรือบุคคลใดจะต้องใช้สิทธิทางศาล บุคคลนั้นชอบที่จะเสนอคดีของตนต่อศาลส่วนแพ่งที่มีเขตอำนาจได้ ตามบทบัญญัติแห่งกฎหมายแพ่งและประมวลกฎหมายนี้"],"text":"เมื่อมีข้อโต้แย้งเกิดขึ้น เกี่ยวกับสิทธิหรือหน้าที่ของบุคคลใดตามกฎหมายแพ่ง หรือบุคคลใดจะต้องใช้สิทธิทางศาล บุคคลนั้นชอบที่จะเสนอคดีของตนต่อศาลส่วนแพ่งที่มีเขตอำนาจได้ ตามบทบัญญัติแห่งกฎหมายแพ่งและประมวลกฎหมายนี้"},{"id":"๕๖","num":"มาตรา ๕๖","num_ara":"๕๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["ผู้ไร้ความสามารถหรือผู้ทำการแทนจะเสนอข้อหาต่อศาลหรือดำเนินกระบวนพิจารณาใด ๆ ได้ต่อเมื่อได้ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์ว่าด้วยความสามารถและตามบทบัญญัติแห่งประมวลกฎหมายนี้ การให้อนุญาตหรือยินยอมตามบทบัญญัติเช่นว่านั้น ให้ทำเป็นหนังสือยื่นต่อศาลเพื่อรวมไว้ในสำนวนความ ไม่ว่าเวลาใด ๆ ก่อนมีคำพิพากษาเมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายหนึ่งฝ่ายใดยื่นคำขอโดยทำเป็นคำร้อง ให้ศาลมีอำนาจทำการสอบสวนในเรื่องความสามารถของผู้ขอหรือของคู่ความอีกฝ่ายหนึ่ง และถ้าเป็นที่พอใจว่ามีการบกพร่องในเรื่องความสามารถ ศาลอาจมีคำสั่งกำหนดให้แก้ไขข้อบกพร่องนั้นเสียให้บริบูรณ์ภายในกำหนดเวลาอันสมควรที่ศาลจะสั่ง ถ้าศาลเห็นว่าเพื่อความยุติธรรมไม่ควรให้กระบวนพิจารณาดำเนินเนิ่นช้าไป ศาลจะสั่งให้คู่ความฝ่ายที่บกพร่องในเรื่องความสามารถนั้นดำเนินคดีไปก่อนชั่วคราวก็ได้ แต่ห้ามมิให้ศาลพิพากษาในประเด็นแห่งคดีจนกว่าข้อบกพร่องนั้นได้แก้ไขโดยบริบูรณ์แล้ว ถ้าผู้ไร้ความสามารถไม่มีผู้แทนโดยชอบธรรมหรือผู้แทนโดยชอบธรรมทำหน้าที่ไม่ได้ ศาลมีอำนาจออกคำสั่งให้อนุญาตหรือให้ความยินยอมตามที่ต้องการ หรือตั้งผู้แทนเฉพาะคดีนั้นให้แก่ผู้ไร้ความสามารถ ถ้าไม่มีบุคคลอื่นใดให้ศาลมีอำนาจตั้งพนักงานอัยการหรือเจ้าพนักงานฝ่ายปกครองอื่นให้เป็นผู้แทนได้"],"text":"ผู้ไร้ความสามารถหรือผู้ทำการแทนจะเสนอข้อหาต่อศาลหรือดำเนินกระบวนพิจารณาใด ๆ ได้ต่อเมื่อได้ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์ว่าด้วยความสามารถและตามบทบัญญัติแห่งประมวลกฎหมายนี้ การให้อนุญาตหรือยินยอมตามบทบัญญัติเช่นว่านั้น ให้ทำเป็นหนังสือยื่นต่อศาลเพื่อรวมไว้ในสำนวนความ ไม่ว่าเวลาใด ๆ ก่อนมีคำพิพากษาเมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายหนึ่งฝ่ายใดยื่นคำขอโดยทำเป็นคำร้อง ให้ศาลมีอำนาจทำการสอบสวนในเรื่องความสามารถของผู้ขอหรือของคู่ความอีกฝ่ายหนึ่ง และถ้าเป็นที่พอใจว่ามีการบกพร่องในเรื่องความสามารถ ศาลอาจมีคำสั่งกำหนดให้แก้ไขข้อบกพร่องนั้นเสียให้บริบูรณ์ภายในกำหนดเวลาอันสมควรที่ศาลจะสั่ง ถ้าศาลเห็นว่าเพื่อความยุติธรรมไม่ควรให้กระบวนพิจารณาดำเนินเนิ่นช้าไป ศาลจะสั่งให้คู่ความฝ่ายที่บกพร่องในเรื่องความสามารถนั้นดำเนินคดีไปก่อนชั่วคราวก็ได้ แต่ห้ามมิให้ศาลพิพากษาในประเด็นแห่งคดีจนกว่าข้อบกพร่องนั้นได้แก้ไขโดยบริบูรณ์แล้ว ถ้าผู้ไร้ความสามารถไม่มีผู้แทนโดยชอบธรรมหรือผู้แทนโดยชอบธรรมทำหน้าที่ไม่ได้ ศาลมีอำนาจออกคำสั่งให้อนุญาตหรือให้ความยินยอมตามที่ต้องการ หรือตั้งผู้แทนเฉพาะคดีนั้นให้แก่ผู้ไร้ความสามารถ ถ้าไม่มีบุคคลอื่นใดให้ศาลมีอำนาจตั้งพนักงานอัยการหรือเจ้าพนักงานฝ่ายปกครองอื่นให้เป็นผู้แทนได้"},{"id":"๕๗","num":"มาตรา ๕๗","num_ara":"๕๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["บุคคลภายนอกซึ่งมิใช่คู่ความอาจเข้ามาเป็นคู่ความได้ด้วยการร้องสอด","(๑) ด้วยความสมัครใจเองเพราะเห็นว่าเป็นการจำเป็นเพื่อยังให้ได้รับความรับรอง คุ้มครอง หรือบังคับตามสิทธิของตนที่มีอยู่ โดยยื่นคำร้องขอต่อศาลที่คดีนั้นอยู่ในระหว่างพิจารณา หรือเมื่อตนมีสิทธิเรียกร้องเกี่ยวเนื่องด้วยการบังคับตามคำพิพากษาหรือคำสั่ง โดยยื่นคำร้องขอต่อศาลที่ออกหมายบังคับคดีนั้น (๒) ด้วยความสมัครใจเองเพราะตนมีส่วนได้เสียตามกฎหมายในผลแห่งคดีนั้น โดยยื่นคำร้องขอต่อศาลไม่ว่าเวลาใด ๆ ก่อนมีคำพิพากษา ขออนุญาตเข้าเป็นโจทก์ร่วมหรือจำเลยร่วม หรือเข้าแทนที่คู่ความฝ่ายใดฝ่ายหนึ่งเสียทีเดียวโดยได้รับความยินยอมของคู่ความฝ่ายนั้น แต่ว่าแม้ศาลจะได้อนุญาตให้เข้าแทนที่กันได้ก็ตาม คู่ความฝ่ายนั้นจำต้องผูกพันตนโดยคำพิพากษาของศาลทุกประการเสมือนหนึ่งว่ามิได้มีการเข้าแทนที่กันเลย (๓) ด้วยถูกหมายเรียกให้เข้ามาในคดี (ก) ตามคำขอของคู่ความฝ่ายใดฝ่ายหนึ่งทำเป็นคำร้องแสดงเหตุว่าตนอาจฟ้องหรือถูกคู่ความเช่นว่านั้นฟ้องตนได้ เพื่อการใช้สิทธิไล่เบี้ย หรือเพื่อใช้ค่าทดแทน ถ้าหากศาลพิจารณาให้คู่ความเช่นว่านั้นแพ้คดี หรือ (ข) โดยคำสั่งของศาลเมื่อศาลนั้นเห็นสมควร หรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอ ในกรณีที่กฎหมายบังคับให้บุคคลภายนอกเข้ามาในคดี หรือศาลเห็นจำเป็นที่จะเรียกบุคคลภายนอกเข้ามาในคดีเพื่อประโยชน์แห่งความยุติธรรม แต่ถ้าคู่ความฝ่ายใดฝ่ายหนึ่ง จะเรียกบุคคลภายนอกเข้ามาในคดีดังกล่าวแล้ว ให้เรียกด้วยวิธียื่นคำร้องเพื่อให้หมายเรียกพร้อมกับคำฟ้องหรือคำให้การ หรือในเวลาใด ๆ ต่อมาก่อนมีคำพิพากษาโดยได้รับอนุญาตจากศาล เมื่อศาลเป็นที่พอใจว่าคำร้องนั้นไม่อาจยื่นก่อนนั้นได้ การส่งหมายเรียกบุคคลภายนอกตามอนุมาตรานี้ต้องมีสำเนาคำขอ หรือคำสั่งของศาล แล้วแต่กรณี และคำฟ้องตั้งต้นคดีนั้นแนบไปด้วย บทบัญญัติในประมวลกฎหมายนี้ไม่ตัดสิทธิของเจ้าหนี้ในอันที่จะใช้สิทธิเรียกร้องของลูกหนี้และที่จะเรียกลูกหนี้ให้เข้ามาในคดีดังที่บัญญัติไว้ในประมวลกฎหมายแพ่งและพาณิชย์"],"text":"บุคคลภายนอกซึ่งมิใช่คู่ความอาจเข้ามาเป็นคู่ความได้ด้วยการร้องสอด\n\n(๑) ด้วยความสมัครใจเองเพราะเห็นว่าเป็นการจำเป็นเพื่อยังให้ได้รับความรับรอง คุ้มครอง หรือบังคับตามสิทธิของตนที่มีอยู่ โดยยื่นคำร้องขอต่อศาลที่คดีนั้นอยู่ในระหว่างพิจารณา หรือเมื่อตนมีสิทธิเรียกร้องเกี่ยวเนื่องด้วยการบังคับตามคำพิพากษาหรือคำสั่ง โดยยื่นคำร้องขอต่อศาลที่ออกหมายบังคับคดีนั้น (๒) ด้วยความสมัครใจเองเพราะตนมีส่วนได้เสียตามกฎหมายในผลแห่งคดีนั้น โดยยื่นคำร้องขอต่อศาลไม่ว่าเวลาใด ๆ ก่อนมีคำพิพากษา ขออนุญาตเข้าเป็นโจทก์ร่วมหรือจำเลยร่วม หรือเข้าแทนที่คู่ความฝ่ายใดฝ่ายหนึ่งเสียทีเดียวโดยได้รับความยินยอมของคู่ความฝ่ายนั้น แต่ว่าแม้ศาลจะได้อนุญาตให้เข้าแทนที่กันได้ก็ตาม คู่ความฝ่ายนั้นจำต้องผูกพันตนโดยคำพิพากษาของศาลทุกประการเสมือนหนึ่งว่ามิได้มีการเข้าแทนที่กันเลย (๓) ด้วยถูกหมายเรียกให้เข้ามาในคดี (ก) ตามคำขอของคู่ความฝ่ายใดฝ่ายหนึ่งทำเป็นคำร้องแสดงเหตุว่าตนอาจฟ้องหรือถูกคู่ความเช่นว่านั้นฟ้องตนได้ เพื่อการใช้สิทธิไล่เบี้ย หรือเพื่อใช้ค่าทดแทน ถ้าหากศาลพิจารณาให้คู่ความเช่นว่านั้นแพ้คดี หรือ (ข) โดยคำสั่งของศาลเมื่อศาลนั้นเห็นสมควร หรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอ ในกรณีที่กฎหมายบังคับให้บุคคลภายนอกเข้ามาในคดี หรือศาลเห็นจำเป็นที่จะเรียกบุคคลภายนอกเข้ามาในคดีเพื่อประโยชน์แห่งความยุติธรรม แต่ถ้าคู่ความฝ่ายใดฝ่ายหนึ่ง จะเรียกบุคคลภายนอกเข้ามาในคดีดังกล่าวแล้ว ให้เรียกด้วยวิธียื่นคำร้องเพื่อให้หมายเรียกพร้อมกับคำฟ้องหรือคำให้การ หรือในเวลาใด ๆ ต่อมาก่อนมีคำพิพากษาโดยได้รับอนุญาตจากศาล เมื่อศาลเป็นที่พอใจว่าคำร้องนั้นไม่อาจยื่นก่อนนั้นได้ การส่งหมายเรียกบุคคลภายนอกตามอนุมาตรานี้ต้องมีสำเนาคำขอ หรือคำสั่งของศาล แล้วแต่กรณี และคำฟ้องตั้งต้นคดีนั้นแนบไปด้วย บทบัญญัติในประมวลกฎหมายนี้ไม่ตัดสิทธิของเจ้าหนี้ในอันที่จะใช้สิทธิเรียกร้องของลูกหนี้และที่จะเรียกลูกหนี้ให้เข้ามาในคดีดังที่บัญญัติไว้ในประมวลกฎหมายแพ่งและพาณิชย์"},{"id":"๕๘","num":"มาตรา ๕๘","num_ara":"๕๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["ผู้ร้องสอดที่ได้เข้าเป็นคู่ความตามอนุมาตรา (๑) และ (๓) แห่งมาตราก่อนนี้ มีสิทธิเสมือนหนึ่งว่าตนได้ฟ้องหรือถูกฟ้องเป็นคดีเรื่องใหม่ ซึ่งโดยเฉพาะผู้ร้องสอดอาจนำพยานหลักฐานใหม่มาแสดง คัดค้านเอกสารที่ได้ยื่นไว้ ถามค้านพยานที่ได้สืบมาแล้ว และคัดค้านพยานหลักฐานที่ได้สืบไปแล้วก่อนที่ตนได้ร้องสอดอาจอุทธรณ์ฎีกาคำพิพากษาหรือคำสั่งของศาลตามที่กฎหมายบัญญัติไว้ และอาจได้รับหรือถูกบังคับให้ใช้ค่าฤชาธรรมเนียม ห้ามมิให้ผู้ร้องสอดที่ได้เป็นคู่ความตามอนุมาตรา (๒) แห่งมาตราก่อน ใช้สิทธิอย่างอื่นนอกจากสิทธิที่มีอยู่แก่คู่ความฝ่ายซึ่งตนเข้าเป็นโจทก์ร่วมหรือจำเลยร่วมในชั้นพิจารณาเมื่อตนร้องสอด และห้ามมิให้ใช้สิทธิเช่นว่านั้นในทางที่ขัดกับสิทธิของโจทก์หรือจำเลยเดิม และให้ผู้ร้องสอดเสียค่าฤชาธรรมเนียมอันเกิดแต่การที่ร้องสอด แต่ถ้าศาลได้อนุญาตให้เข้าแทนที่โจทก์ หรือจำเลยเดิม ผู้ร้องสอดจึงมีฐานะเสมอด้วยคู่ความที่ตนเข้าแทน เมื่อได้มีคำพิพากษาหรือคำสั่งแล้ว ถ้ามีข้อเกี่ยวข้องกับคดี เป็นปัญหาจะต้องวินิจฉัยในระหว่างผู้ร้องสอดกับคู่ความฝ่ายที่ตนเข้ามาร่วม หรือที่ตนถูกหมายเรียกให้เข้ามาร่วม ผู้ร้องสอดย่อมต้องผูกพันตามคำพิพากษาหรือคำสั่งนั้น เว้นแต่ในกรณีต่อไปนี้","(๑) เนื่องจากความประมาทเลินเล่อของคู่ความนั้นทำให้ผู้ร้องสอดเข้ามาเป็นคู่ความในคดีช้าเกินสมควรที่จะแสดงข้อเถียงอันเป็นสาระสำคัญได้ หรือ (๒) เมื่อคู่ความนั้นจงใจหรือประมาทเลินเล่ออย่างร้ายแรงมิได้ยกขึ้นใช้ซึ่งข้อเถียงในปัญหาข้อกฎหมายหรือข้อเท็จจริงอันเป็นสาระสำคัญซึ่งผู้ร้องสอดมิได้รู้ว่ามีอยู่เช่นนั้น"],"text":"ผู้ร้องสอดที่ได้เข้าเป็นคู่ความตามอนุมาตรา (๑) และ (๓) แห่งมาตราก่อนนี้ มีสิทธิเสมือนหนึ่งว่าตนได้ฟ้องหรือถูกฟ้องเป็นคดีเรื่องใหม่ ซึ่งโดยเฉพาะผู้ร้องสอดอาจนำพยานหลักฐานใหม่มาแสดง คัดค้านเอกสารที่ได้ยื่นไว้ ถามค้านพยานที่ได้สืบมาแล้ว และคัดค้านพยานหลักฐานที่ได้สืบไปแล้วก่อนที่ตนได้ร้องสอดอาจอุทธรณ์ฎีกาคำพิพากษาหรือคำสั่งของศาลตามที่กฎหมายบัญญัติไว้ และอาจได้รับหรือถูกบังคับให้ใช้ค่าฤชาธรรมเนียม ห้ามมิให้ผู้ร้องสอดที่ได้เป็นคู่ความตามอนุมาตรา (๒) แห่งมาตราก่อน ใช้สิทธิอย่างอื่นนอกจากสิทธิที่มีอยู่แก่คู่ความฝ่ายซึ่งตนเข้าเป็นโจทก์ร่วมหรือจำเลยร่วมในชั้นพิจารณาเมื่อตนร้องสอด และห้ามมิให้ใช้สิทธิเช่นว่านั้นในทางที่ขัดกับสิทธิของโจทก์หรือจำเลยเดิม และให้ผู้ร้องสอดเสียค่าฤชาธรรมเนียมอันเกิดแต่การที่ร้องสอด แต่ถ้าศาลได้อนุญาตให้เข้าแทนที่โจทก์ หรือจำเลยเดิม ผู้ร้องสอดจึงมีฐานะเสมอด้วยคู่ความที่ตนเข้าแทน เมื่อได้มีคำพิพากษาหรือคำสั่งแล้ว ถ้ามีข้อเกี่ยวข้องกับคดี เป็นปัญหาจะต้องวินิจฉัยในระหว่างผู้ร้องสอดกับคู่ความฝ่ายที่ตนเข้ามาร่วม หรือที่ตนถูกหมายเรียกให้เข้ามาร่วม ผู้ร้องสอดย่อมต้องผูกพันตามคำพิพากษาหรือคำสั่งนั้น เว้นแต่ในกรณีต่อไปนี้\n\n(๑) เนื่องจากความประมาทเลินเล่อของคู่ความนั้นทำให้ผู้ร้องสอดเข้ามาเป็นคู่ความในคดีช้าเกินสมควรที่จะแสดงข้อเถียงอันเป็นสาระสำคัญได้ หรือ (๒) เมื่อคู่ความนั้นจงใจหรือประมาทเลินเล่ออย่างร้ายแรงมิได้ยกขึ้นใช้ซึ่งข้อเถียงในปัญหาข้อกฎหมายหรือข้อเท็จจริงอันเป็นสาระสำคัญซึ่งผู้ร้องสอดมิได้รู้ว่ามีอยู่เช่นนั้น"},{"id":"๕๙","num":"มาตรา ๕๙","num_ara":"๕๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["บุคคลตั้งแต่สองคนขึ้นไป อาจเป็นคู่ความในคดีเดียวกันได้ โดยเป็นโจทก์ร่วมหรือจำเลยร่วม ถ้าหากปรากฏว่าบุคคลเหล่านั้นมีผลประโยชน์ร่วมกันในมูลความแห่งคดี แต่ห้ามมิให้ถือว่าบุคคลเหล่านั้นแทนซึ่งกันและกัน เว้นแต่มูลความแห่งคดีเป็นการชำระหนี้ ซึ่งแบ่งแยกจากกันมิได้ หรือได้มีกฎหมายบัญญัติไว้ดังนั้นโดยชัดแจ้ง ในกรณีเช่นนี้ ให้ถือว่าบุคคลเหล่านั้นแทนซึ่งกันและกันเพียงเท่าที่จะกล่าวต่อไปนี้","(๑) บรรดากระบวนพิจารณาซึ่งได้ทำโดย หรือทำต่อคู่ความร่วมคนหนึ่งนั้นให้ถือว่าได้ทำโดย หรือทำต่อ คู่ความร่วมคนอื่น ๆ ด้วย เว้นแต่กระบวนพิจารณาที่คู่ความร่วมคนหนึ่งกระทำไปเป็นที่เสื่อมเสียแก่คู่ความร่วมคนอื่น ๆ (๒) การเลื่อนคดีหรือการงดพิจารณาคดีซึ่งเกี่ยวกับคู่ความร่วมคนหนึ่งนั้น ให้ใช้ถึงคู่ความร่วมคนอื่น ๆ ด้วย"],"text":"บุคคลตั้งแต่สองคนขึ้นไป อาจเป็นคู่ความในคดีเดียวกันได้ โดยเป็นโจทก์ร่วมหรือจำเลยร่วม ถ้าหากปรากฏว่าบุคคลเหล่านั้นมีผลประโยชน์ร่วมกันในมูลความแห่งคดี แต่ห้ามมิให้ถือว่าบุคคลเหล่านั้นแทนซึ่งกันและกัน เว้นแต่มูลความแห่งคดีเป็นการชำระหนี้ ซึ่งแบ่งแยกจากกันมิได้ หรือได้มีกฎหมายบัญญัติไว้ดังนั้นโดยชัดแจ้ง ในกรณีเช่นนี้ ให้ถือว่าบุคคลเหล่านั้นแทนซึ่งกันและกันเพียงเท่าที่จะกล่าวต่อไปนี้\n\n(๑) บรรดากระบวนพิจารณาซึ่งได้ทำโดย หรือทำต่อคู่ความร่วมคนหนึ่งนั้นให้ถือว่าได้ทำโดย หรือทำต่อ คู่ความร่วมคนอื่น ๆ ด้วย เว้นแต่กระบวนพิจารณาที่คู่ความร่วมคนหนึ่งกระทำไปเป็นที่เสื่อมเสียแก่คู่ความร่วมคนอื่น ๆ (๒) การเลื่อนคดีหรือการงดพิจารณาคดีซึ่งเกี่ยวกับคู่ความร่วมคนหนึ่งนั้น ให้ใช้ถึงคู่ความร่วมคนอื่น ๆ ด้วย"},{"id":"๖๐","num":"มาตรา ๖๐","num_ara":"๖๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["คู่ความฝ่ายใดฝ่ายหนึ่ง หรือผู้แทนโดยชอบธรรมในกรณีที่คู่ความเป็นผู้ไร้ความสามารถ หรือผู้แทนในกรณีที่คู่ความเป็นนิติบุคคล จะว่าความด้วยตนเองและดำเนินกระบวนพิจารณาทั้งปวงตามที่เห็นสมควร เพื่อประโยชน์ของตน หรือจะตั้งแต่งทนายความคนเดียวหรือหลายคนให้ว่าความและดำเนินกระบวนพิจารณาแทนตนก็ได้ ถ้าคู่ความหรือผู้แทนโดยชอบธรรมหรือผู้แทน ดังที่ได้กล่าวมาแล้ว ทำหนังสือมอบอำนาจให้บุคคลใดเป็นผู้แทนตนในคดี ผู้รับมอบอำนาจเช่นว่านั้นจะว่าความอย่างทนายความไม่ได้ แต่ย่อมตั้งทนายความเพื่อดำเนินกระบวนพิจารณาได้"],"text":"คู่ความฝ่ายใดฝ่ายหนึ่ง หรือผู้แทนโดยชอบธรรมในกรณีที่คู่ความเป็นผู้ไร้ความสามารถ หรือผู้แทนในกรณีที่คู่ความเป็นนิติบุคคล จะว่าความด้วยตนเองและดำเนินกระบวนพิจารณาทั้งปวงตามที่เห็นสมควร เพื่อประโยชน์ของตน หรือจะตั้งแต่งทนายความคนเดียวหรือหลายคนให้ว่าความและดำเนินกระบวนพิจารณาแทนตนก็ได้ ถ้าคู่ความหรือผู้แทนโดยชอบธรรมหรือผู้แทน ดังที่ได้กล่าวมาแล้ว ทำหนังสือมอบอำนาจให้บุคคลใดเป็นผู้แทนตนในคดี ผู้รับมอบอำนาจเช่นว่านั้นจะว่าความอย่างทนายความไม่ได้ แต่ย่อมตั้งทนายความเพื่อดำเนินกระบวนพิจารณาได้"},{"id":"๖๑","num":"มาตรา ๖๑","num_ara":"๖๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["การตั้งทนายความนั้น ต้องทำเป็นหนังสือลงลายมือชื่อตัวความและทนายความ แล้วยื่นต่อศาลเพื่อรวมไว้ในสำนวน ใบแต่งทนายนี้ให้ใช้ได้เฉพาะคดีเรื่องหนึ่ง ๆ ตามที่ได้ยื่นไว้เท่านั้น เมื่อทนายความผู้ใดได้รับมอบอำนาจทั่วไปที่จะแทนบุคคลอื่นไม่ว่าในคดีใด ๆ ให้ทนายความผู้นั้นแสดงใบมอบอำนาจทั่วไป แล้วคัดสำเนายื่นต่อศาลแทนใบแต่งทนาย เพื่อดำเนินคดีเป็นเรื่อง ๆ ไป ตามความในมาตรานี้"],"text":"การตั้งทนายความนั้น ต้องทำเป็นหนังสือลงลายมือชื่อตัวความและทนายความ แล้วยื่นต่อศาลเพื่อรวมไว้ในสำนวน ใบแต่งทนายนี้ให้ใช้ได้เฉพาะคดีเรื่องหนึ่ง ๆ ตามที่ได้ยื่นไว้เท่านั้น เมื่อทนายความผู้ใดได้รับมอบอำนาจทั่วไปที่จะแทนบุคคลอื่นไม่ว่าในคดีใด ๆ ให้ทนายความผู้นั้นแสดงใบมอบอำนาจทั่วไป แล้วคัดสำเนายื่นต่อศาลแทนใบแต่งทนาย เพื่อดำเนินคดีเป็นเรื่อง ๆ ไป ตามความในมาตรานี้"},{"id":"๖๒","num":"มาตรา ๖๒","num_ara":"๖๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["ทนายความซึ่งคู่ความได้ตั้งแต่งนั้นมีอำนาจว่าความและดำเนินกระบวนพิจารณาใด ๆ แทนคู่ความได้ตามที่เห็นสมควรเพื่อรักษาผลประโยชน์ของคู่ความนั้น แต่ถ้ากระบวนพิจารณาใดเป็นไปในทางจำหน่ายสิทธิของคู่ความ เช่น การยอมรับตามที่คู่ความอีกฝ่ายหนึ่งเรียกร้อง การถอนฟ้อง การประนีประนอมยอมความ การสละสิทธิ หรือใช้สิทธิในการอุทธรณ์หรือฎีกา หรือในการขอให้พิจารณาคดีใหม่ ทนายความไม่มีอำนาจที่จะดำเนินกระบวนพิจารณาเช่นว่านี้ได้ โดยมิได้รับอำนาจจากตัวความโดยชัดแจ้ง อำนาจโดยชัดแจ้งเช่นว่านี้จะระบุให้ไว้ในใบแต่งทนายสำหรับคดีเรื่องนั้น หรือทำเป็นใบมอบอำนาจต่างหากในภายหลังใบเดียวหรือหลายใบก็ได้ และในกรณีหลังนี้ให้ใช้บทบัญญัติมาตรา ๖๑ บังคับ กรณีจะเป็นอย่างไรก็ตาม ตัวความหรือผู้แทนจะปฏิเสธหรือแก้ไขข้อเท็จจริงที่ทนายความของตนได้กล่าวด้วยวาจาต่อหน้าตนในศาลในขณะนั้นก็ได้ แม้ถึงว่าตัวความหรือผู้แทนนั้นจะมิได้สงวนสิทธิเช่นนั้นไว้ในใบแต่งทนายก็ดี"],"text":"ทนายความซึ่งคู่ความได้ตั้งแต่งนั้นมีอำนาจว่าความและดำเนินกระบวนพิจารณาใด ๆ แทนคู่ความได้ตามที่เห็นสมควรเพื่อรักษาผลประโยชน์ของคู่ความนั้น แต่ถ้ากระบวนพิจารณาใดเป็นไปในทางจำหน่ายสิทธิของคู่ความ เช่น การยอมรับตามที่คู่ความอีกฝ่ายหนึ่งเรียกร้อง การถอนฟ้อง การประนีประนอมยอมความ การสละสิทธิ หรือใช้สิทธิในการอุทธรณ์หรือฎีกา หรือในการขอให้พิจารณาคดีใหม่ ทนายความไม่มีอำนาจที่จะดำเนินกระบวนพิจารณาเช่นว่านี้ได้ โดยมิได้รับอำนาจจากตัวความโดยชัดแจ้ง อำนาจโดยชัดแจ้งเช่นว่านี้จะระบุให้ไว้ในใบแต่งทนายสำหรับคดีเรื่องนั้น หรือทำเป็นใบมอบอำนาจต่างหากในภายหลังใบเดียวหรือหลายใบก็ได้ และในกรณีหลังนี้ให้ใช้บทบัญญัติมาตรา ๖๑ บังคับ กรณีจะเป็นอย่างไรก็ตาม ตัวความหรือผู้แทนจะปฏิเสธหรือแก้ไขข้อเท็จจริงที่ทนายความของตนได้กล่าวด้วยวาจาต่อหน้าตนในศาลในขณะนั้นก็ได้ แม้ถึงว่าตัวความหรือผู้แทนนั้นจะมิได้สงวนสิทธิเช่นนั้นไว้ในใบแต่งทนายก็ดี"},{"id":"๖๓","num":"มาตรา ๖๓","num_ara":"๖๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["บทบัญญัติแห่งมาตราก่อนนี้ไม่ตัดสิทธิตัวความในอันที่จะตั้งแต่งผู้แทนหรือทนายความโดยทำเป็นหนังสือยื่นต่อศาลเพื่อให้รับเงินหรือทรัพย์สินซึ่งได้ชำระไว้ในศาลหรือวางไว้ยังศาลเป็นเงินค่าธรรมเนียมหรืออย่างอื่นและศาลได้สั่งให้จ่ายคืน หรือส่งมอบให้แก่ตัวความฝ่ายนั้น แต่ถ้าศาลนั้นมีความสงสัยในความสามารถหรือตัวบุคคลผู้แทน หรือทนายความซึ่งได้รับตั้งแต่งดังกล่าวข้างต้น ศาลมีอำนาจที่จะสั่งให้ตัวความหรือทนายความหรือทั้งสองคนให้มาศาลโดยตนเองได้"],"text":"บทบัญญัติแห่งมาตราก่อนนี้ไม่ตัดสิทธิตัวความในอันที่จะตั้งแต่งผู้แทนหรือทนายความโดยทำเป็นหนังสือยื่นต่อศาลเพื่อให้รับเงินหรือทรัพย์สินซึ่งได้ชำระไว้ในศาลหรือวางไว้ยังศาลเป็นเงินค่าธรรมเนียมหรืออย่างอื่นและศาลได้สั่งให้จ่ายคืน หรือส่งมอบให้แก่ตัวความฝ่ายนั้น แต่ถ้าศาลนั้นมีความสงสัยในความสามารถหรือตัวบุคคลผู้แทน หรือทนายความซึ่งได้รับตั้งแต่งดังกล่าวข้างต้น ศาลมีอำนาจที่จะสั่งให้ตัวความหรือทนายความหรือทั้งสองคนให้มาศาลโดยตนเองได้"},{"id":"๖๔","num":"มาตรา ๖๔","num_ara":"๖๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["เว้นแต่ศาลจะได้สั่งเป็นอย่างอื่น เมื่อคดีมีเหตุผลพิเศษอันเกี่ยวกับคู่ความฝ่ายใดฝ่ายหนึ่ง หรือทนายความฝ่ายใดฝ่ายหนึ่งโดยเฉพาะ คู่ความหรือทนายความอาจตั้งแต่งให้บุคคลใดทำการแทนได้ โดยยื่นใบมอบฉันทะต่อศาลทุกครั้ง เพื่อกระทำกิจการอย่างใดอย่างหนึ่งดังต่อไปนี้ คือ กำหนดวันนั่งพิจารณาหรือวันสืบพยาน หรือวันฟังคำสั่ง คำบังคับ หรือคำชี้ขาดใด ๆ ของศาล มาฟังคำสั่ง คำบังคับ หรือคำชี้ขาดใด ๆ ของศาลหรือสลักหลังรับรู้ซึ่งข้อความนั้น ๆ รับสำเนาแห่งคำให้การ คำร้องหรือเอกสารอื่น ๆ ตามที่บัญญัติไว้ในมาตรา ๗๑ และ ๗๒ และแสดงการรับรู้สิ่งเหล่านั้น"],"text":"เว้นแต่ศาลจะได้สั่งเป็นอย่างอื่น เมื่อคดีมีเหตุผลพิเศษอันเกี่ยวกับคู่ความฝ่ายใดฝ่ายหนึ่ง หรือทนายความฝ่ายใดฝ่ายหนึ่งโดยเฉพาะ คู่ความหรือทนายความอาจตั้งแต่งให้บุคคลใดทำการแทนได้ โดยยื่นใบมอบฉันทะต่อศาลทุกครั้ง เพื่อกระทำกิจการอย่างใดอย่างหนึ่งดังต่อไปนี้ คือ กำหนดวันนั่งพิจารณาหรือวันสืบพยาน หรือวันฟังคำสั่ง คำบังคับ หรือคำชี้ขาดใด ๆ ของศาล มาฟังคำสั่ง คำบังคับ หรือคำชี้ขาดใด ๆ ของศาลหรือสลักหลังรับรู้ซึ่งข้อความนั้น ๆ รับสำเนาแห่งคำให้การ คำร้องหรือเอกสารอื่น ๆ ตามที่บัญญัติไว้ในมาตรา ๗๑ และ ๗๒ และแสดงการรับรู้สิ่งเหล่านั้น"},{"id":"๖๕","num":"มาตรา ๖๕","num_ara":"๖๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["ทนายความที่ตัวความได้ตั้งแต่งให้เป็นทนายในคดีจะมีคำขอต่อศาลให้สั่งถอนตนจากการตั้งแต่งนั้นก็ได้ แต่ต้องแสดงให้เป็นที่พอใจแก่ศาลว่าทนายความผู้นั้นได้แจ้งให้ตัวความทราบแล้ว เว้นแต่จะหาตัวความไม่พบ เมื่อศาลมีคำสั่งอนุญาตตามคำขอนั้นแล้ว ให้ศาลส่งคำสั่งนั้นให้ตัวความทราบโดยเร็วโดยวิธีส่งหมายธรรมดาหรือโดยวิธีอื่นแทนแล้วแต่จะเห็นสมควร"],"text":"ทนายความที่ตัวความได้ตั้งแต่งให้เป็นทนายในคดีจะมีคำขอต่อศาลให้สั่งถอนตนจากการตั้งแต่งนั้นก็ได้ แต่ต้องแสดงให้เป็นที่พอใจแก่ศาลว่าทนายความผู้นั้นได้แจ้งให้ตัวความทราบแล้ว เว้นแต่จะหาตัวความไม่พบ เมื่อศาลมีคำสั่งอนุญาตตามคำขอนั้นแล้ว ให้ศาลส่งคำสั่งนั้นให้ตัวความทราบโดยเร็วโดยวิธีส่งหมายธรรมดาหรือโดยวิธีอื่นแทนแล้วแต่จะเห็นสมควร"},{"id":"๖๖","num":"มาตรา ๖๖","num_ara":"๖๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๓ คู่ความ","section":"","subsection":"","paragraphs":["ผู้ใดอ้างว่าเป็นผู้แทนโดยชอบธรรมของตัวความหรือเป็นผู้แทนของนิติบุคคล เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายที่เกี่ยวข้องยื่นคำขอ โดยทำเป็นคำร้องในขณะที่ยื่นคำฟ้องหรือคำให้การ ศาลจะทำการสอบสวนถึงอำนาจของผู้นั้นก็ได้ และถ้าเป็นที่พอใจว่าผู้นั้นไม่มีอำนาจ หรืออำนาจของผู้นั้นบกพร่อง ศาลมีอำนาจยกฟ้องคดีนั้นเสีย หรือมีคำพิพากษาหรือคำสั่งอย่างอื่นได้ตามที่เห็นสมควร เพื่อประโยชน์แห่งความยุติธรรม"],"text":"ผู้ใดอ้างว่าเป็นผู้แทนโดยชอบธรรมของตัวความหรือเป็นผู้แทนของนิติบุคคล เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายที่เกี่ยวข้องยื่นคำขอ โดยทำเป็นคำร้องในขณะที่ยื่นคำฟ้องหรือคำให้การ ศาลจะทำการสอบสวนถึงอำนาจของผู้นั้นก็ได้ และถ้าเป็นที่พอใจว่าผู้นั้นไม่มีอำนาจ หรืออำนาจของผู้นั้นบกพร่อง ศาลมีอำนาจยกฟ้องคดีนั้นเสีย หรือมีคำพิพากษาหรือคำสั่งอย่างอื่นได้ตามที่เห็นสมควร เพื่อประโยชน์แห่งความยุติธรรม"},{"id":"๖๗","num":"มาตรา ๖๗","num_ara":"๖๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["เมื่อประมวลกฎหมายนี้หรือกฎหมายอื่นบัญญัติว่า เอกสารใดจะต้องส่งให้แก่คู่ความฝ่ายใดฝ่ายหนึ่งหรือบุคคลที่เกี่ยวข้อง (เช่น คำคู่ความที่ทำโดยคำฟ้อง คำให้การ หรือคำร้อง หรือคำขอโดยทำเป็นคำร้อง หมายเรียกหรือหมายอื่น ๆ สำเนาคำแถลงการณ์ หรือสำเนาพยานเอกสาร ฯลฯ) เอกสารนั้นต้องทำขึ้นให้ปรากฏข้อความแน่ชัดถึงตัวบุคคลและมีรายการต่อไปนี้","(๑) ชื่อศาลที่จะรับคำฟ้อง หรือถ้าคดีอยู่ในระหว่างพิจารณา ชื่อของศาลนั้นและเลขหมายคดี (๒) ชื่อคู่ความในคดี (๓) ชื่อคู่ความหรือบุคคล ซึ่งจะเป็นผู้รับคำคู่ความหรือเอกสารนั้น (๔) ใจความ และเหตุผลถ้าจำเป็นแห่งคำคู่ความหรือเอกสาร (๕) วัน เดือน ปี ของคำคู่ความ หรือเอกสารและลายมือชื่อของเจ้าพนักงาน คู่ความ หรือบุคคลซึ่งเป็นผู้ยื่นหรือเป็นผู้ส่ง ในการยื่นหรือส่งคำคู่ความ หรือเอกสารอื่นใดอันจะต้องทำตามแบบพิมพ์ที่จัดไว้ เจ้าพนักงาน คู่ความ หรือบุคคลผู้เกี่ยวข้องจะต้องใช้กระดาษแบบพิมพ์นั้น ส่วนราคากระดาษแบบพิมพ์นั้นให้เรียกตามที่รัฐมนตรีว่าการกระทรวงยุติธรรมจะได้กำหนดไว้ เพื่อประโยชน์แห่งประมวลกฎหมายนี้ ให้เรียกนิติบุคคลตามชื่อหรือตามชื่อที่จดทะเบียนและภูมิลำเนาหรือสำนักทำการงานของนิติบุคคลนั้น ให้ถือเอาสำนักงานหรือสำนักงานแห่งใหญ่ซึ่งอยู่ภายในเขตศาลที่จะยื่นฟ้องคดีหรือที่คดีนั้นอยู่ในระหว่างพิจารณา"],"text":"เมื่อประมวลกฎหมายนี้หรือกฎหมายอื่นบัญญัติว่า เอกสารใดจะต้องส่งให้แก่คู่ความฝ่ายใดฝ่ายหนึ่งหรือบุคคลที่เกี่ยวข้อง (เช่น คำคู่ความที่ทำโดยคำฟ้อง คำให้การ หรือคำร้อง หรือคำขอโดยทำเป็นคำร้อง หมายเรียกหรือหมายอื่น ๆ สำเนาคำแถลงการณ์ หรือสำเนาพยานเอกสาร ฯลฯ) เอกสารนั้นต้องทำขึ้นให้ปรากฏข้อความแน่ชัดถึงตัวบุคคลและมีรายการต่อไปนี้\n\n(๑) ชื่อศาลที่จะรับคำฟ้อง หรือถ้าคดีอยู่ในระหว่างพิจารณา ชื่อของศาลนั้นและเลขหมายคดี (๒) ชื่อคู่ความในคดี (๓) ชื่อคู่ความหรือบุคคล ซึ่งจะเป็นผู้รับคำคู่ความหรือเอกสารนั้น (๔) ใจความ และเหตุผลถ้าจำเป็นแห่งคำคู่ความหรือเอกสาร (๕) วัน เดือน ปี ของคำคู่ความ หรือเอกสารและลายมือชื่อของเจ้าพนักงาน คู่ความ หรือบุคคลซึ่งเป็นผู้ยื่นหรือเป็นผู้ส่ง ในการยื่นหรือส่งคำคู่ความ หรือเอกสารอื่นใดอันจะต้องทำตามแบบพิมพ์ที่จัดไว้ เจ้าพนักงาน คู่ความ หรือบุคคลผู้เกี่ยวข้องจะต้องใช้กระดาษแบบพิมพ์นั้น ส่วนราคากระดาษแบบพิมพ์นั้นให้เรียกตามที่รัฐมนตรีว่าการกระทรวงยุติธรรมจะได้กำหนดไว้ เพื่อประโยชน์แห่งประมวลกฎหมายนี้ ให้เรียกนิติบุคคลตามชื่อหรือตามชื่อที่จดทะเบียนและภูมิลำเนาหรือสำนักทำการงานของนิติบุคคลนั้น ให้ถือเอาสำนักงานหรือสำนักงานแห่งใหญ่ซึ่งอยู่ภายในเขตศาลที่จะยื่นฟ้องคดีหรือที่คดีนั้นอยู่ในระหว่างพิจารณา"},{"id":"๖๘","num":"มาตรา ๖๘","num_ara":"๖๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["การยื่นและส่งคำคู่ความและเอกสารในลักษณะนี้ไม่ว่าการนั้นจะเป็นโดยคู่ความฝ่ายใดทำต่อศาลหรือต่อคู่ความอีกฝ่ายหนึ่ง หรือศาลทำต่อคู่ความฝ่ายใดฝ่ายหนึ่ง หรือทุกฝ่าย รวมทั้งการแจ้งคำสั่งของศาลหรือข้อความอย่างอื่นไปยังคู่ความหรือบุคคลอื่นใด อาจดำเนินการโดยทางไปรษณีย์อิเล็กทรอนิกส์หรือสื่อเทคโนโลยีสารสนเทศอื่นใดก็ได้ ทั้งนี้ ตามหลักเกณฑ์และวิธีการที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ศาลฎีกา และเมื่อข้อกำหนดนั้นประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"],"text":"การยื่นและส่งคำคู่ความและเอกสารในลักษณะนี้ไม่ว่าการนั้นจะเป็นโดยคู่ความฝ่ายใดทำต่อศาลหรือต่อคู่ความอีกฝ่ายหนึ่ง หรือศาลทำต่อคู่ความฝ่ายใดฝ่ายหนึ่ง หรือทุกฝ่าย รวมทั้งการแจ้งคำสั่งของศาลหรือข้อความอย่างอื่นไปยังคู่ความหรือบุคคลอื่นใด อาจดำเนินการโดยทางไปรษณีย์อิเล็กทรอนิกส์หรือสื่อเทคโนโลยีสารสนเทศอื่นใดก็ได้ ทั้งนี้ ตามหลักเกณฑ์และวิธีการที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ศาลฎีกา และเมื่อข้อกำหนดนั้นประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"},{"id":"๖๙","num":"มาตรา ๖๙","num_ara":"๖๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["การยื่นคำคู่ความ หรือเอกสารอื่นใดต่อศาลนั้น ให้กระทำได้โดยส่งต่อพนักงานเจ้าหน้าที่ของศาลหรือยื่นต่อศาลในระหว่างนั่งพิจารณา"],"text":"การยื่นคำคู่ความ หรือเอกสารอื่นใดต่อศาลนั้น ให้กระทำได้โดยส่งต่อพนักงานเจ้าหน้าที่ของศาลหรือยื่นต่อศาลในระหว่างนั่งพิจารณา"},{"id":"๗๐","num":"มาตรา ๗๐","num_ara":"๗๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["บรรดาคำฟ้อง หมายเรียกและหมายอื่น ๆ คำสั่ง คำบังคับของศาลในกรณีต้องส่งคำบังคับ ให้เจ้าพนักงานศาลเป็นผู้ส่งให้แก่คู่ความหรือบุคคลภายนอกที่เกี่ยวข้อง แต่ว่า","(๑) หมายเรียกพยาน ให้คู่ความฝ่ายที่อ้างพยานนั้นเป็นผู้ส่งโดยตรง เว้นแต่ศาลจะสั่งเป็นอย่างอื่นหรือพยานปฏิเสธไม่ยอมรับหมาย ในกรณีเช่นว่านี้ให้เจ้าพนักงานศาลเป็นผู้ส่ง (๒) คำสั่งของศาล รวมทั้งคำสั่งกำหนดวันนั่งพิจารณาหรือสืบพยาน แล้วแต่กรณี หรือคำสั่งให้เลื่อนคดี ถ้าคู่ความหรือบุคคลที่เกี่ยวข้องนั้นอยู่ในศาลในเวลาที่มีคำสั่งและได้ลงลายมือชื่อรับรู้ไว้ ให้ถือว่าได้ส่งโดยชอบด้วยกฎหมายแล้ว คำฟ้องนั้น ให้โจทก์เสียค่าธรรมเนียมในการส่ง ส่วนการนำส่งนั้นโจทก์จะนำส่งหรือไม่ก็ได้ เว้นแต่ศาลจะสั่งให้โจทก์มีหน้าที่จัดการนำส่ง ส่วนหมายเรียก หมายอื่น ๆ คำสั่งของศาลที่ได้ออกตามคำขอของคู่ความฝ่ายใด ถ้าศาลมิได้สั่งให้จัดการนำส่งด้วย ก็ให้คู่ความฝ่ายนั้นเพียงแต่เสียค่าธรรมเนียมในการส่ง ในกรณีอื่น ๆ ให้เป็นหน้าที่ของศาลที่จะจัดการส่งให้แก่คู่ความหรือบุคคลที่เกี่ยวข้อง"],"text":"บรรดาคำฟ้อง หมายเรียกและหมายอื่น ๆ คำสั่ง คำบังคับของศาลในกรณีต้องส่งคำบังคับ ให้เจ้าพนักงานศาลเป็นผู้ส่งให้แก่คู่ความหรือบุคคลภายนอกที่เกี่ยวข้อง แต่ว่า\n\n(๑) หมายเรียกพยาน ให้คู่ความฝ่ายที่อ้างพยานนั้นเป็นผู้ส่งโดยตรง เว้นแต่ศาลจะสั่งเป็นอย่างอื่นหรือพยานปฏิเสธไม่ยอมรับหมาย ในกรณีเช่นว่านี้ให้เจ้าพนักงานศาลเป็นผู้ส่ง (๒) คำสั่งของศาล รวมทั้งคำสั่งกำหนดวันนั่งพิจารณาหรือสืบพยาน แล้วแต่กรณี หรือคำสั่งให้เลื่อนคดี ถ้าคู่ความหรือบุคคลที่เกี่ยวข้องนั้นอยู่ในศาลในเวลาที่มีคำสั่งและได้ลงลายมือชื่อรับรู้ไว้ ให้ถือว่าได้ส่งโดยชอบด้วยกฎหมายแล้ว คำฟ้องนั้น ให้โจทก์เสียค่าธรรมเนียมในการส่ง ส่วนการนำส่งนั้นโจทก์จะนำส่งหรือไม่ก็ได้ เว้นแต่ศาลจะสั่งให้โจทก์มีหน้าที่จัดการนำส่ง ส่วนหมายเรียก หมายอื่น ๆ คำสั่งของศาลที่ได้ออกตามคำขอของคู่ความฝ่ายใด ถ้าศาลมิได้สั่งให้จัดการนำส่งด้วย ก็ให้คู่ความฝ่ายนั้นเพียงแต่เสียค่าธรรมเนียมในการส่ง ในกรณีอื่น ๆ ให้เป็นหน้าที่ของศาลที่จะจัดการส่งให้แก่คู่ความหรือบุคคลที่เกี่ยวข้อง"},{"id":"๗๑","num":"มาตรา ๗๑","num_ara":"๗๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["คำให้การนั้น ให้ฝ่ายที่ให้การนำต้นฉบับยื่นไว้ต่อศาลพร้อมด้วยสำเนาสำหรับให้คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ รับไปโดยทางเจ้าพนักงานศาล คำร้องเพื่อแก้ไขเพิ่มเติมคำให้การนั้น ให้เจ้าพนักงานศาลเป็นผู้ส่งให้คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ โดยฝ่ายที่ยื่นคำร้องเป็นผู้มีหน้าที่จัดการนำส่ง"],"text":"คำให้การนั้น ให้ฝ่ายที่ให้การนำต้นฉบับยื่นไว้ต่อศาลพร้อมด้วยสำเนาสำหรับให้คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ รับไปโดยทางเจ้าพนักงานศาล คำร้องเพื่อแก้ไขเพิ่มเติมคำให้การนั้น ให้เจ้าพนักงานศาลเป็นผู้ส่งให้คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ โดยฝ่ายที่ยื่นคำร้องเป็นผู้มีหน้าที่จัดการนำส่ง"},{"id":"๗๒","num":"มาตรา ๗๒","num_ara":"๗๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["คำร้องและคำแถลงการณ์ซึ่งได้ยื่นต่อศาลภายในเวลาที่กฎหมายหรือศาลกำหนดไว้ หรือโดยข้อตกลงของคู่ความตามที่ศาลจดลงไว้ในรายงานนั้น ให้ผู้ยื่นคำร้องหรือคำแถลงการณ์นำต้นฉบับยื่นไว้ต่อศาลพร้อมด้วยสำเนาเพื่อให้คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ หรือบุคคลที่เกี่ยวข้องมารับไปโดยทางเจ้าพนักงานศาล บรรดาคำร้องอื่น ๆ ให้ยื่นต่อศาลพร้อมด้วยสำเนา เพื่อส่งให้แก่คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ หรือบุคคลที่เกี่ยวข้อง และถ้าศาลกำหนดให้เจ้าพนักงานศาลเป็นผู้ส่งสำเนาเช่นว่านั้น ก็ให้เจ้าพนักงานศาลเป็นผู้ส่งโดยให้คู่ความฝ่ายที่ยื่นคำร้องเป็นผู้ออกค่าใช้จ่าย บรรดาเอกสารอื่นๆ เช่น สำเนาคำแถลงการณ์หรือสำเนาพยานเอกสารนั้น ให้ส่งแก่คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ หรือบุคคลที่เกี่ยวข้อง โดยวิธีใดวิธีหนึ่งในสองวิธีดังต่อไปนี้","(๑) โดยคู่ความฝ่ายที่ต้องส่งนั้น ส่งสำเนาให้แก่คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ หรือบุคคลที่เกี่ยวข้องเอง แล้วส่งใบรับต่อศาลพร้อมกับต้นฉบับนั้น ๆ ใบรับนั้นจะทำโดยวิธีลงไว้ในต้นฉบับว่าได้รับสำเนาแล้ว และลงลายมือชื่อผู้รับกับวัน เดือน ปีที่ได้รับก็ได้ หรือ (๒) โดยคู่ความฝ่ายที่ต้องส่งนั้นนำสำเนายื่นไว้ต่อศาลพร้อมกับต้นฉบับ แล้วขอให้เจ้าพนักงานศาลเป็นผู้นำส่งให้แก่คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ หรือบุคคลที่เกี่ยวข้อง ในกรณีเช่นนี้ ผู้ขอต้องไปกับเจ้าพนักงานศาลและเสียค่าธรรมเนียมในการส่งนั้นด้วย"],"text":"คำร้องและคำแถลงการณ์ซึ่งได้ยื่นต่อศาลภายในเวลาที่กฎหมายหรือศาลกำหนดไว้ หรือโดยข้อตกลงของคู่ความตามที่ศาลจดลงไว้ในรายงานนั้น ให้ผู้ยื่นคำร้องหรือคำแถลงการณ์นำต้นฉบับยื่นไว้ต่อศาลพร้อมด้วยสำเนาเพื่อให้คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ หรือบุคคลที่เกี่ยวข้องมารับไปโดยทางเจ้าพนักงานศาล บรรดาคำร้องอื่น ๆ ให้ยื่นต่อศาลพร้อมด้วยสำเนา เพื่อส่งให้แก่คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ หรือบุคคลที่เกี่ยวข้อง และถ้าศาลกำหนดให้เจ้าพนักงานศาลเป็นผู้ส่งสำเนาเช่นว่านั้น ก็ให้เจ้าพนักงานศาลเป็นผู้ส่งโดยให้คู่ความฝ่ายที่ยื่นคำร้องเป็นผู้ออกค่าใช้จ่าย บรรดาเอกสารอื่นๆ เช่น สำเนาคำแถลงการณ์หรือสำเนาพยานเอกสารนั้น ให้ส่งแก่คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ หรือบุคคลที่เกี่ยวข้อง โดยวิธีใดวิธีหนึ่งในสองวิธีดังต่อไปนี้\n\n(๑) โดยคู่ความฝ่ายที่ต้องส่งนั้น ส่งสำเนาให้แก่คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ หรือบุคคลที่เกี่ยวข้องเอง แล้วส่งใบรับต่อศาลพร้อมกับต้นฉบับนั้น ๆ ใบรับนั้นจะทำโดยวิธีลงไว้ในต้นฉบับว่าได้รับสำเนาแล้ว และลงลายมือชื่อผู้รับกับวัน เดือน ปีที่ได้รับก็ได้ หรือ (๒) โดยคู่ความฝ่ายที่ต้องส่งนั้นนำสำเนายื่นไว้ต่อศาลพร้อมกับต้นฉบับ แล้วขอให้เจ้าพนักงานศาลเป็นผู้นำส่งให้แก่คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ หรือบุคคลที่เกี่ยวข้อง ในกรณีเช่นนี้ ผู้ขอต้องไปกับเจ้าพนักงานศาลและเสียค่าธรรมเนียมในการส่งนั้นด้วย"},{"id":"๗๓","num":"มาตรา ๗๓","num_ara":"๗๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["ถ้าคำคู่ความหรือเอกสารอื่นใดจะต้องให้เจ้าพนักงานศาลเป็นผู้ส่ง เมื่อคู่ความผู้มีหน้าที่ต้องส่งได้ร้องขอ ให้พนักงานเจ้าหน้าที่ดำเนินการส่งโดยเร็วเท่าที่จะทำได้ เพื่อการนี้ พนักงานผู้ส่งหมายจะให้ผู้ขอหรือบุคคลที่ผู้ขอเห็นสมควรไปด้วยเพื่อชี้ตัวคู่ความหรือบุคคลผู้รับหรือเพื่อค้นหาภูมิลำเนาหรือสำนักทำการงานของผู้รับก็ได้ ในกรณีที่ต้องส่งคำคู่ความหรือเอกสารอื่นใดไปตามคำสั่งของศาล ซึ่งบุคคลอื่นหรือคู่ความไม่มีหน้าที่ต้องรับผิดชอบในการส่งนั้น ให้เป็นหน้าที่ของพนักงานเจ้าหน้าที่ของศาลจะดำเนินการส่ง"],"text":"ถ้าคำคู่ความหรือเอกสารอื่นใดจะต้องให้เจ้าพนักงานศาลเป็นผู้ส่ง เมื่อคู่ความผู้มีหน้าที่ต้องส่งได้ร้องขอ ให้พนักงานเจ้าหน้าที่ดำเนินการส่งโดยเร็วเท่าที่จะทำได้ เพื่อการนี้ พนักงานผู้ส่งหมายจะให้ผู้ขอหรือบุคคลที่ผู้ขอเห็นสมควรไปด้วยเพื่อชี้ตัวคู่ความหรือบุคคลผู้รับหรือเพื่อค้นหาภูมิลำเนาหรือสำนักทำการงานของผู้รับก็ได้ ในกรณีที่ต้องส่งคำคู่ความหรือเอกสารอื่นใดไปตามคำสั่งของศาล ซึ่งบุคคลอื่นหรือคู่ความไม่มีหน้าที่ต้องรับผิดชอบในการส่งนั้น ให้เป็นหน้าที่ของพนักงานเจ้าหน้าที่ของศาลจะดำเนินการส่ง"},{"id":"๗๓_ทวิ","num":"มาตรา ๗๓ ทวิ","num_ara":"๗๓ ทวิ","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["คำคู่ความหรือเอกสารที่เจ้าพนักงานศาลเป็นผู้ส่งไม่ว่าการส่งนั้นจะเป็นหน้าที่ของศาลจัดการส่งเองหรือคู่ความมีหน้าที่จัดการนำส่งก็ตาม ศาลอาจสั่งให้ส่งโดยทางไปรษณีย์ลงทะเบียนตอบรับ หรือโดยทางไปรษณีย์ด่วนพิเศษในประเทศก็ได้ โดยให้คู่ความฝ่ายที่มีหน้าที่นำส่งเป็นผู้เสียค่าใช้จ่าย กรณีเช่นนี้ ให้ถือว่าคำคู่ความหรือเอกสารที่ส่งโดยเจ้าพนักงานไปรษณีย์ มีผลเสมือนเจ้าพนักงานศาลเป็นผู้ส่ง และให้นำบทบัญญัติมาตรา ๗๔ มาตรา ๗๖ และมาตรา ๗๗ มาใช้บังคับโดยอนุโลม"],"text":"คำคู่ความหรือเอกสารที่เจ้าพนักงานศาลเป็นผู้ส่งไม่ว่าการส่งนั้นจะเป็นหน้าที่ของศาลจัดการส่งเองหรือคู่ความมีหน้าที่จัดการนำส่งก็ตาม ศาลอาจสั่งให้ส่งโดยทางไปรษณีย์ลงทะเบียนตอบรับ หรือโดยทางไปรษณีย์ด่วนพิเศษในประเทศก็ได้ โดยให้คู่ความฝ่ายที่มีหน้าที่นำส่งเป็นผู้เสียค่าใช้จ่าย กรณีเช่นนี้ ให้ถือว่าคำคู่ความหรือเอกสารที่ส่งโดยเจ้าพนักงานไปรษณีย์ มีผลเสมือนเจ้าพนักงานศาลเป็นผู้ส่ง และให้นำบทบัญญัติมาตรา ๗๔ มาตรา ๗๖ และมาตรา ๗๗ มาใช้บังคับโดยอนุโลม"},{"id":"๗๔","num":"มาตรา ๗๔","num_ara":"๗๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["การส่งคำคู่ความหรือเอกสารอื่นใดโดยเจ้าพนักงานศาลนั้นให้ปฏิบัติดังนี้","(๑) ให้ส่งในเวลากลางวันระหว่างพระอาทิตย์ขึ้นและพระอาทิตย์ตก และ (๒) ให้ส่งแก่คู่ความหรือบุคคลซึ่งระบุไว้ในคำคู่ความหรือเอกสาร ณ ภูมิลำเนาหรือสำนักทำการงานของคู่ความหรือบุคคลนั้น แต่ให้อยู่ในบังคับแห่งบทบัญญัติหกมาตราต่อไปนี้"],"text":"การส่งคำคู่ความหรือเอกสารอื่นใดโดยเจ้าพนักงานศาลนั้นให้ปฏิบัติดังนี้\n\n(๑) ให้ส่งในเวลากลางวันระหว่างพระอาทิตย์ขึ้นและพระอาทิตย์ตก และ (๒) ให้ส่งแก่คู่ความหรือบุคคลซึ่งระบุไว้ในคำคู่ความหรือเอกสาร ณ ภูมิลำเนาหรือสำนักทำการงานของคู่ความหรือบุคคลนั้น แต่ให้อยู่ในบังคับแห่งบทบัญญัติหกมาตราต่อไปนี้"},{"id":"๗๕","num":"มาตรา ๗๕","num_ara":"๗๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["การส่งคำคู่ความหรือเอกสารอื่นใดให้แก่ทนายความที่คู่ความตั้งแต่งให้ว่าคดี หรือให้แก่บุคคลที่ทนายความเช่นว่านั้นได้ตั้งแต่ง เพื่อกระทำกิจการอย่างใด ๆ ที่ระบุไว้ในมาตรา ๖๔ นั้น ให้ถือว่าเป็นการส่งโดยชอบด้วยกฎหมาย"],"text":"การส่งคำคู่ความหรือเอกสารอื่นใดให้แก่ทนายความที่คู่ความตั้งแต่งให้ว่าคดี หรือให้แก่บุคคลที่ทนายความเช่นว่านั้นได้ตั้งแต่ง เพื่อกระทำกิจการอย่างใด ๆ ที่ระบุไว้ในมาตรา ๖๔ นั้น ให้ถือว่าเป็นการส่งโดยชอบด้วยกฎหมาย"},{"id":"๗๖","num":"มาตรา ๗๖","num_ara":"๗๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["เมื่อเจ้าพนักงานศาลไม่พบคู่ความหรือบุคคลที่จะส่งคำคู่ความหรือเอกสาร ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลนั้น ๆ ถ้าได้ส่งคำคู่ความหรือเอกสารให้แก่บุคคลใด ๆ ที่มีอายุเกินยี่สิบปี ซึ่งอยู่หรือทำงานในบ้านเรือนหรือที่สำนักทำการงานที่ปรากฏว่าเป็นของคู่ความหรือบุคคลนั้น หรือได้ส่งคำคู่ความหรือเอกสารนั้นตามข้อความในคำสั่งของศาล ให้ถือว่าเป็นการเพียงพอที่จะฟังว่าได้มีการส่งคำคู่ความหรือเอกสารถูกต้องตามกฎหมายแล้ว ในกรณีเช่นว่ามานี้ การส่งคำคู่ความหรือเอกสารแก่คู่ความฝ่ายใด ห้ามมิให้ส่งแก่คู่ความฝ่ายปรปักษ์เป็นผู้รับไว้แทน"],"text":"เมื่อเจ้าพนักงานศาลไม่พบคู่ความหรือบุคคลที่จะส่งคำคู่ความหรือเอกสาร ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลนั้น ๆ ถ้าได้ส่งคำคู่ความหรือเอกสารให้แก่บุคคลใด ๆ ที่มีอายุเกินยี่สิบปี ซึ่งอยู่หรือทำงานในบ้านเรือนหรือที่สำนักทำการงานที่ปรากฏว่าเป็นของคู่ความหรือบุคคลนั้น หรือได้ส่งคำคู่ความหรือเอกสารนั้นตามข้อความในคำสั่งของศาล ให้ถือว่าเป็นการเพียงพอที่จะฟังว่าได้มีการส่งคำคู่ความหรือเอกสารถูกต้องตามกฎหมายแล้ว ในกรณีเช่นว่ามานี้ การส่งคำคู่ความหรือเอกสารแก่คู่ความฝ่ายใด ห้ามมิให้ส่งแก่คู่ความฝ่ายปรปักษ์เป็นผู้รับไว้แทน"},{"id":"๗๗","num":"มาตรา ๗๗","num_ara":"๗๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["การส่งคำคู่ความหรือเอกสารอื่นใดโดยเจ้าพนักงานศาลไปยังที่อื่นนอกจากภูมิลำเนา หรือสำนักทำการงานของคู่ความหรือของบุคคลซึ่งระบุไว้ในคำคู่ความ หรือเอกสารนั้น ให้ถือว่าเป็นการถูกต้องตามกฎหมาย เมื่อ","(๑) คู่ความหรือบุคคลนั้นยอมรับคำคู่ความหรือเอกสารนั้นไว้ หรือ (๒) การส่งคำคู่ความหรือเอกสารนั้นได้กระทำในศาล"],"text":"การส่งคำคู่ความหรือเอกสารอื่นใดโดยเจ้าพนักงานศาลไปยังที่อื่นนอกจากภูมิลำเนา หรือสำนักทำการงานของคู่ความหรือของบุคคลซึ่งระบุไว้ในคำคู่ความ หรือเอกสารนั้น ให้ถือว่าเป็นการถูกต้องตามกฎหมาย เมื่อ\n\n(๑) คู่ความหรือบุคคลนั้นยอมรับคำคู่ความหรือเอกสารนั้นไว้ หรือ (๒) การส่งคำคู่ความหรือเอกสารนั้นได้กระทำในศาล"},{"id":"๗๘","num":"มาตรา ๗๘","num_ara":"๗๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["ถ้าคู่ความหรือบุคคลที่ระบุไว้ในคำคู่ความหรือเอกสารปฏิเสธไม่ยอมรับคำคู่ความหรือเอกสารนั้นจากเจ้าพนักงานศาลโดยปราศจากเหตุอันชอบด้วยกฎหมาย เจ้าพนักงานนั้นชอบที่จะขอให้พนักงานเจ้าหน้าที่ฝ่ายปกครองที่มีอำนาจหรือเจ้าพนักงานตำรวจไปด้วยเพื่อเป็นพยาน และถ้าคู่ความหรือบุคคลนั้นยังคงปฏิเสธไม่ยอมรับอยู่อีก ก็ให้วางคำคู่ความหรือเอกสารไว้ ณ ที่นั้น เมื่อได้ทำดังนี้แล้วให้ถือว่าการส่งคำคู่ความหรือเอกสารนั้นเป็นการถูกต้องตามกฎหมาย"],"text":"ถ้าคู่ความหรือบุคคลที่ระบุไว้ในคำคู่ความหรือเอกสารปฏิเสธไม่ยอมรับคำคู่ความหรือเอกสารนั้นจากเจ้าพนักงานศาลโดยปราศจากเหตุอันชอบด้วยกฎหมาย เจ้าพนักงานนั้นชอบที่จะขอให้พนักงานเจ้าหน้าที่ฝ่ายปกครองที่มีอำนาจหรือเจ้าพนักงานตำรวจไปด้วยเพื่อเป็นพยาน และถ้าคู่ความหรือบุคคลนั้นยังคงปฏิเสธไม่ยอมรับอยู่อีก ก็ให้วางคำคู่ความหรือเอกสารไว้ ณ ที่นั้น เมื่อได้ทำดังนี้แล้วให้ถือว่าการส่งคำคู่ความหรือเอกสารนั้นเป็นการถูกต้องตามกฎหมาย"},{"id":"๗๙","num":"มาตรา ๗๙","num_ara":"๗๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["ถ้าการส่งคำคู่ความหรือเอกสารนั้นไม่สามารถจะทำได้ดังที่บัญญัติไว้ในมาตราก่อน ศาลอาจสั่งให้ส่งโดยวิธีอื่นแทนได้ กล่าวคือปิดคำคู่ความหรือเอกสารไว้ในที่แลเห็นได้ง่าย ณ ภูมิลำเนาหรือสำนักทำการงานของคู่ความหรือบุคคลผู้มีชื่อระบุไว้ในคำคู่ความหรือเอกสารหรือมอบหมายคำคู่ความหรือเอกสารไว้แก่เจ้าพนักงานฝ่ายปกครองในท้องถิ่นหรือเจ้าพนักงานตำรวจ แล้วปิดประกาศแสดงการที่ได้มอบหมายดังกล่าวแล้วนั้นไว้ดังกล่าวมาข้างต้น หรือลงโฆษณาหรือทำวิธีอื่นใดตามที่ศาลเห็นสมควร การส่งคำคู่ความหรือเอกสารโดยวิธีอื่นแทนนั้น ให้มีผลใช้ได้ต่อเมื่อกำหนดเวลาสิบห้าวันหรือระยะเวลานานกว่านั้นตามที่ศาลเห็นสมควรกำหนด ได้ล่วงพ้นไปแล้วนับตั้งแต่เวลาที่คำคู่ความหรือเอกสารหรือประกาศแสดงการมอบหมายนั้นได้ปิดไว้ หรือการโฆษณาหรือวิธีอื่นใดตามที่ศาลสั่งนั้นได้ทำหรือได้ตั้งต้นแล้ว"],"text":"ถ้าการส่งคำคู่ความหรือเอกสารนั้นไม่สามารถจะทำได้ดังที่บัญญัติไว้ในมาตราก่อน ศาลอาจสั่งให้ส่งโดยวิธีอื่นแทนได้ กล่าวคือปิดคำคู่ความหรือเอกสารไว้ในที่แลเห็นได้ง่าย ณ ภูมิลำเนาหรือสำนักทำการงานของคู่ความหรือบุคคลผู้มีชื่อระบุไว้ในคำคู่ความหรือเอกสารหรือมอบหมายคำคู่ความหรือเอกสารไว้แก่เจ้าพนักงานฝ่ายปกครองในท้องถิ่นหรือเจ้าพนักงานตำรวจ แล้วปิดประกาศแสดงการที่ได้มอบหมายดังกล่าวแล้วนั้นไว้ดังกล่าวมาข้างต้น หรือลงโฆษณาหรือทำวิธีอื่นใดตามที่ศาลเห็นสมควร การส่งคำคู่ความหรือเอกสารโดยวิธีอื่นแทนนั้น ให้มีผลใช้ได้ต่อเมื่อกำหนดเวลาสิบห้าวันหรือระยะเวลานานกว่านั้นตามที่ศาลเห็นสมควรกำหนด ได้ล่วงพ้นไปแล้วนับตั้งแต่เวลาที่คำคู่ความหรือเอกสารหรือประกาศแสดงการมอบหมายนั้นได้ปิดไว้ หรือการโฆษณาหรือวิธีอื่นใดตามที่ศาลสั่งนั้นได้ทำหรือได้ตั้งต้นแล้ว"},{"id":"๘๐","num":"มาตรา ๘๐","num_ara":"๘๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["การส่งคำคู่ความหรือเอกสารโดยเจ้าพนักงานศาลหรือทางเจ้าพนักงานศาลนั้น ให้เจ้าพนักงานศาลส่งใบรับลงลายมือชื่อคู่ความ หรือผู้รับคำคู่ความหรือเอกสาร หรือส่งรายงานการส่งคำคู่ความหรือเอกสารลงลายมือชื่อเจ้าพนักงานศาลต่อศาล แล้วแต่กรณี เพื่อรวมไว้ในสำนวนความ ใบรับหรือรายงานนั้นต้องลงข้อความให้ปรากฏแน่ชัดถึงตัวบุคคลและรายการต่อไปนี้","(๑) ชื่อเจ้าพนักงานผู้ส่งหมาย และชื่อผู้รับหมาย ถ้าหากมี (๒) วิธีส่ง วัน เดือน ปี และเวลาที่ส่ง รายงานนั้นต้องลงวันเดือนปี และลงลายมือชื่อของเจ้าพนักงานผู้ทำรายงาน ใบรับนั้นจะทำโดยวิธีจดลงไว้ที่ต้นฉบับซึ่งยื่นต่อศาลก็ได้"],"text":"การส่งคำคู่ความหรือเอกสารโดยเจ้าพนักงานศาลหรือทางเจ้าพนักงานศาลนั้น ให้เจ้าพนักงานศาลส่งใบรับลงลายมือชื่อคู่ความ หรือผู้รับคำคู่ความหรือเอกสาร หรือส่งรายงานการส่งคำคู่ความหรือเอกสารลงลายมือชื่อเจ้าพนักงานศาลต่อศาล แล้วแต่กรณี เพื่อรวมไว้ในสำนวนความ ใบรับหรือรายงานนั้นต้องลงข้อความให้ปรากฏแน่ชัดถึงตัวบุคคลและรายการต่อไปนี้\n\n(๑) ชื่อเจ้าพนักงานผู้ส่งหมาย และชื่อผู้รับหมาย ถ้าหากมี (๒) วิธีส่ง วัน เดือน ปี และเวลาที่ส่ง รายงานนั้นต้องลงวันเดือนปี และลงลายมือชื่อของเจ้าพนักงานผู้ทำรายงาน ใบรับนั้นจะทำโดยวิธีจดลงไว้ที่ต้นฉบับซึ่งยื่นต่อศาลก็ได้"},{"id":"๘๑","num":"มาตรา ๘๑","num_ara":"๘๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["การส่งหมายเรียกพยานโดยคู่ความที่เกี่ยวข้องนั้นให้ปฏิบัติดังนี้","(๑) ให้ส่งในเวลากลางวันระหว่างพระอาทิตย์ขึ้นและพระอาทิตย์ตก และ (๒) ให้ส่งแก่บุคคลซึ่งระบุไว้ในหมายเรียก ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลเช่นว่านั้น แต่ว่าให้อยู่ภายในบังคับบทบัญญัติแห่งมาตรา ๗๖ และ ๗๗"],"text":"การส่งหมายเรียกพยานโดยคู่ความที่เกี่ยวข้องนั้นให้ปฏิบัติดังนี้\n\n(๑) ให้ส่งในเวลากลางวันระหว่างพระอาทิตย์ขึ้นและพระอาทิตย์ตก และ (๒) ให้ส่งแก่บุคคลซึ่งระบุไว้ในหมายเรียก ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลเช่นว่านั้น แต่ว่าให้อยู่ภายในบังคับบทบัญญัติแห่งมาตรา ๗๖ และ ๗๗"},{"id":"๘๒","num":"มาตรา ๘๒","num_ara":"๘๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["ถ้าจะต้องส่งคำคู่ความหรือเอกสารอื่นใดไปยังคู่ความหรือบุคคลหลายคน ให้ส่งสำเนาคำคู่ความหรือเอกสารที่จะต้องส่งไปให้ทุก ๆ คน ในกรณีที่ต้องส่งคำคู่ความหรือเอกสารโดยเจ้าพนักงานศาลหรือทางเจ้าพนักงานศาลนั้นให้คู่ความฝ่ายซึ่งมีหน้าที่จัดการนำส่ง มอบสำเนาคำคู่ความหรือเอกสารต่อพนักงานเจ้าหน้าที่ให้พอกับจำนวนคู่ความหรือบุคคลที่จะต้องส่งให้นั้น"],"text":"ถ้าจะต้องส่งคำคู่ความหรือเอกสารอื่นใดไปยังคู่ความหรือบุคคลหลายคน ให้ส่งสำเนาคำคู่ความหรือเอกสารที่จะต้องส่งไปให้ทุก ๆ คน ในกรณีที่ต้องส่งคำคู่ความหรือเอกสารโดยเจ้าพนักงานศาลหรือทางเจ้าพนักงานศาลนั้นให้คู่ความฝ่ายซึ่งมีหน้าที่จัดการนำส่ง มอบสำเนาคำคู่ความหรือเอกสารต่อพนักงานเจ้าหน้าที่ให้พอกับจำนวนคู่ความหรือบุคคลที่จะต้องส่งให้นั้น"},{"id":"๘๓","num":"มาตรา ๘๓","num_ara":"๘๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["ถ้าคู่ความฝ่ายใดจะต้องยื่นต่อศาลหรือจะต้องส่งให้แก่คู่ความฝ่ายใดฝ่ายหนึ่ง หรือบุคคลภายนอกซึ่งคำคู่ความหรือเอกสารอื่นใด ภายในเวลาหรือก่อนเวลาที่กฎหมายหรือศาลได้กำหนดไว้ และการส่งเช่นว่านี้จะต้องกระทำโดยทางเจ้าพนักงานศาล ให้ถือว่าคู่ความฝ่ายนั้นได้ปฏิบัติตามความมุ่งหมายของกฎหมายหรือของศาลแล้ว เมื่อคู่ความฝ่ายนั้นได้ส่งคำคู่ความหรือเอกสารเช่นว่านั้นแก่พนักงานเจ้าหน้าที่ของศาลเพื่อให้ยื่นหรือให้ส่งในเวลาหรือก่อนเวลาที่กำหนดนั้นแล้ว แม้ถึงว่าการรับคำคู่ความหรือเอกสารหรือการขอให้ส่งคำคู่ความหรือเอกสาร หรือการส่งคำคู่ความ หรือเอกสารให้แก่คู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกนั้น จะได้เป็นไปภายหลังเวลาที่กำหนดนั้นก็ดี ถ้าประมวลกฎหมายนี้บัญญัติไว้ว่าการส่งคำคู่ความหรือเอกสารอื่นใด จะต้องให้คู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกทราบล่วงหน้าตามระยะเวลาที่กำหนดไว้ก่อนวันเริ่มต้นนั่งพิจารณาหรือสืบพยาน ให้ถือว่าคู่ความฝ่ายที่ต้องรับผิดในการส่งนั้นได้ปฏิบัติตามความมุ่งหมายของกฎหมายหรือของศาลตามที่บัญญัติไว้ในวรรคก่อนนั้นได้ต่อเมื่อคู่ความฝ่ายนั้นได้ยื่นคำคู่ความหรือเอกสารที่จะต้องส่งให้แก่พนักงานเจ้าหน้าที่ของศาลไม่ต่ำกว่าสามวันก่อนวันเริ่มต้นแห่งระยะเวลาที่กำหนดล่วงหน้าไว้นั้น ในกรณีที่คู่ความอาจส่งคำคู่ความหรือเอกสารโดยวิธีส่งสำเนาตรงไปยังคู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกได้นั้น บทบัญญัติแห่งมาตรานี้มิได้ห้ามคู่ความที่มีหน้าที่ต้องส่งคำคู่ความหรือเอกสารดังกล่าวแล้วในอันที่จะใช้วิธีเช่นว่านี้ แต่คู่ความฝ่ายนั้นจะต้องส่งใบรับของคู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกต่อศาลในเวลาหรือก่อนเวลาที่กฎหมายหรือศาลได้กำหนดไว้"],"text":"ถ้าคู่ความฝ่ายใดจะต้องยื่นต่อศาลหรือจะต้องส่งให้แก่คู่ความฝ่ายใดฝ่ายหนึ่ง หรือบุคคลภายนอกซึ่งคำคู่ความหรือเอกสารอื่นใด ภายในเวลาหรือก่อนเวลาที่กฎหมายหรือศาลได้กำหนดไว้ และการส่งเช่นว่านี้จะต้องกระทำโดยทางเจ้าพนักงานศาล ให้ถือว่าคู่ความฝ่ายนั้นได้ปฏิบัติตามความมุ่งหมายของกฎหมายหรือของศาลแล้ว เมื่อคู่ความฝ่ายนั้นได้ส่งคำคู่ความหรือเอกสารเช่นว่านั้นแก่พนักงานเจ้าหน้าที่ของศาลเพื่อให้ยื่นหรือให้ส่งในเวลาหรือก่อนเวลาที่กำหนดนั้นแล้ว แม้ถึงว่าการรับคำคู่ความหรือเอกสารหรือการขอให้ส่งคำคู่ความหรือเอกสาร หรือการส่งคำคู่ความ หรือเอกสารให้แก่คู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกนั้น จะได้เป็นไปภายหลังเวลาที่กำหนดนั้นก็ดี ถ้าประมวลกฎหมายนี้บัญญัติไว้ว่าการส่งคำคู่ความหรือเอกสารอื่นใด จะต้องให้คู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกทราบล่วงหน้าตามระยะเวลาที่กำหนดไว้ก่อนวันเริ่มต้นนั่งพิจารณาหรือสืบพยาน ให้ถือว่าคู่ความฝ่ายที่ต้องรับผิดในการส่งนั้นได้ปฏิบัติตามความมุ่งหมายของกฎหมายหรือของศาลตามที่บัญญัติไว้ในวรรคก่อนนั้นได้ต่อเมื่อคู่ความฝ่ายนั้นได้ยื่นคำคู่ความหรือเอกสารที่จะต้องส่งให้แก่พนักงานเจ้าหน้าที่ของศาลไม่ต่ำกว่าสามวันก่อนวันเริ่มต้นแห่งระยะเวลาที่กำหนดล่วงหน้าไว้นั้น ในกรณีที่คู่ความอาจส่งคำคู่ความหรือเอกสารโดยวิธีส่งสำเนาตรงไปยังคู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกได้นั้น บทบัญญัติแห่งมาตรานี้มิได้ห้ามคู่ความที่มีหน้าที่ต้องส่งคำคู่ความหรือเอกสารดังกล่าวแล้วในอันที่จะใช้วิธีเช่นว่านี้ แต่คู่ความฝ่ายนั้นจะต้องส่งใบรับของคู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกต่อศาลในเวลาหรือก่อนเวลาที่กฎหมายหรือศาลได้กำหนดไว้"},{"id":"๘๓_ทวิ","num":"มาตรา ๘๓ ทวิ","num_ara":"๘๓ ทวิ","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["ในกรณีที่จำเลยไม่มีภูมิลำเนาอยู่ในราชอาณาจักรให้ส่งหมายเรียกและคำฟ้องตั้งต้นคดีแก่จำเลย ณ ภูมิลำเนาหรือสำนักทำการงานของจำเลยนอกราชอาณาจักร เว้นแต่ในกรณีที่จำเลยประกอบกิจการในราชอาณาจักรด้วยตนเองหรือโดยตัวแทน หรือในกรณีที่มีการตกลงเป็นหนังสือว่าคำคู่ความและเอกสารที่จะต้องส่งให้แก่จำเลยนั้น ให้ส่งแก่ตัวแทนซึ่งมีถิ่นที่อยู่ในราชอาณาจักรที่จำเลยได้แต่งตั้งไว้ เพื่อการนี้ ให้ส่งหมายเรียกและคำฟ้องตั้งต้นคดีแก่จำเลยหรือตัวแทนในการประกอบกิจการหรือตัวแทนในการรับคำคู่ความและเอกสาร ณ สถานที่ที่จำเลยหรือตัวแทนใช้ประกอบกิจการหรือสถานที่อันเป็นถิ่นที่อยู่ของตัวแทนในการประกอบกิจการหรือของตัวแทนในการรับคำคู่ความและเอกสาร ซึ่งตั้งอยู่ในราชอาณาจักร แล้วแต่กรณี ในกรณีที่มีการเรียกบุคคลภายนอกซึ่งไม่มีภูมิลำเนาอยู่ในราชอาณาจักรเข้ามาเป็นคู่ความตามมาตรา ๕๗ (๓) ให้นำความในวรรคหนึ่งมาใช้บังคับโดยอนุโลม"],"text":"ในกรณีที่จำเลยไม่มีภูมิลำเนาอยู่ในราชอาณาจักรให้ส่งหมายเรียกและคำฟ้องตั้งต้นคดีแก่จำเลย ณ ภูมิลำเนาหรือสำนักทำการงานของจำเลยนอกราชอาณาจักร เว้นแต่ในกรณีที่จำเลยประกอบกิจการในราชอาณาจักรด้วยตนเองหรือโดยตัวแทน หรือในกรณีที่มีการตกลงเป็นหนังสือว่าคำคู่ความและเอกสารที่จะต้องส่งให้แก่จำเลยนั้น ให้ส่งแก่ตัวแทนซึ่งมีถิ่นที่อยู่ในราชอาณาจักรที่จำเลยได้แต่งตั้งไว้ เพื่อการนี้ ให้ส่งหมายเรียกและคำฟ้องตั้งต้นคดีแก่จำเลยหรือตัวแทนในการประกอบกิจการหรือตัวแทนในการรับคำคู่ความและเอกสาร ณ สถานที่ที่จำเลยหรือตัวแทนใช้ประกอบกิจการหรือสถานที่อันเป็นถิ่นที่อยู่ของตัวแทนในการประกอบกิจการหรือของตัวแทนในการรับคำคู่ความและเอกสาร ซึ่งตั้งอยู่ในราชอาณาจักร แล้วแต่กรณี ในกรณีที่มีการเรียกบุคคลภายนอกซึ่งไม่มีภูมิลำเนาอยู่ในราชอาณาจักรเข้ามาเป็นคู่ความตามมาตรา ๕๗ (๓) ให้นำความในวรรคหนึ่งมาใช้บังคับโดยอนุโลม"},{"id":"๘๓_ตรี","num":"มาตรา ๘๓ ตรี","num_ara":"๘๓ ตรี","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["การส่งคำคู่ความ คำร้อง คำแถลง หรือเอกสารอื่นใดนอกจากที่บัญญัติไว้ในมาตรา ๘๓ ทวิ ถ้าผู้รับไม่มีภูมิลำเนาอยู่ในราชอาณาจักรแต่ประกอบกิจการในราชอาณาจักรด้วยตนเองหรือโดยตัวแทน หรือมีตัวแทนในการรับคำคู่ความและเอกสารหรือทนายความในการดำเนินคดีอยู่ในราชอาณาจักร ให้ส่งแก่ผู้รับหรือตัวแทนเช่นว่านั้นหรือทนายความ ณ สถานที่ที่ผู้รับหรือตัวแทนใช้ประกอบกิจการ หรือสถานที่อันเป็นถิ่นที่อยู่ของตัวแทน หรือภูมิลำเนา หรือสำนักทำการงานของทนายความซึ่งตั้งอยู่ในราชอาณาจักร แล้วแต่กรณี แต่ถ้าผู้รับมิได้ประกอบกิจการในราชอาณาจักรด้วยตนเอง หรือไม่มีตัวแทนดังกล่าวหรือทนายความอยู่ในราชอาณาจักร ให้ส่งโดยวิธีปิดประกาศไว้ที่ศาล"],"text":"การส่งคำคู่ความ คำร้อง คำแถลง หรือเอกสารอื่นใดนอกจากที่บัญญัติไว้ในมาตรา ๘๓ ทวิ ถ้าผู้รับไม่มีภูมิลำเนาอยู่ในราชอาณาจักรแต่ประกอบกิจการในราชอาณาจักรด้วยตนเองหรือโดยตัวแทน หรือมีตัวแทนในการรับคำคู่ความและเอกสารหรือทนายความในการดำเนินคดีอยู่ในราชอาณาจักร ให้ส่งแก่ผู้รับหรือตัวแทนเช่นว่านั้นหรือทนายความ ณ สถานที่ที่ผู้รับหรือตัวแทนใช้ประกอบกิจการ หรือสถานที่อันเป็นถิ่นที่อยู่ของตัวแทน หรือภูมิลำเนา หรือสำนักทำการงานของทนายความซึ่งตั้งอยู่ในราชอาณาจักร แล้วแต่กรณี แต่ถ้าผู้รับมิได้ประกอบกิจการในราชอาณาจักรด้วยตนเอง หรือไม่มีตัวแทนดังกล่าวหรือทนายความอยู่ในราชอาณาจักร ให้ส่งโดยวิธีปิดประกาศไว้ที่ศาล"},{"id":"๘๓_จัตวา","num":"มาตรา ๘๓ จัตวา","num_ara":"๘๓ จัตวา","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["ในกรณีที่จะต้องส่งหมายเรียกและคำฟ้องตั้งต้นคดีตาม
