<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#060a12" id="meta-theme">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ป.วิ.แพ่ง">
<title>ป.วิ.แพ่ง — ประมวลกฎหมายวิธีพิจารณาความแพ่ง</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap">
<style>
:root,[data-theme="dark"]{
  --bg:#060a12;--bg1:#0b1120;--bg2:#111827;--bg3:#1a2640;
  --bd:#1e2d42;--bd2:#253650;
  --tx:#dde4f0;--tx2:#8fa8c8;--tx3:#4a6080;
  --gold:#2196a0;--gold2:#1a7a84;--goldbg:rgba(33,150,160,.13);
  --blue:#3b82f6;--bluebg:rgba(59,130,246,.13);
  --green:#2ecc71;
  --sb-bg:#08101e;--sb-hd:#0d1830;--sb-tx:rgba(255,255,255,.72);
  --sb-tx2:rgba(255,255,255,.38);--sb-act:rgba(33,150,160,.16);
  --card-bg:#0b1120;--card-brd:#1e2d42;
  --shadow:0 1px 4px rgba(0,0,0,.35);
  --hdr-bg:#0b1120;--hdr-brd:#1e2d42;
}
[data-theme="light"]{
  --bg:#f4f6fa;--bg1:#fff;--bg2:#f0f3f8;--bg3:#e6eaf2;
  --bd:#d0d8e8;--bd2:#b8c4d8;
  --tx:#1a2336;--tx2:#4a5c7a;--tx3:#8a9ab8;
  --gold:#0d6e77;--gold2:#0a5560;--goldbg:rgba(13,110,119,.1);
  --blue:#1d5dbf;--bluebg:rgba(29,93,191,.1);
  --green:#1a7a44;
  --sb-bg:#0d2a40;--sb-hd:#0a2030;--sb-tx:rgba(255,255,255,.85);
  --sb-tx2:rgba(255,255,255,.45);--sb-act:rgba(33,200,220,.18);
  --card-bg:#fff;--card-brd:#d8e0f0;
  --shadow:0 1px 4px rgba(0,0,0,.08);
  --hdr-bg:#fff;--hdr-brd:#d0d8e8;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Sarabun','Noto Sans Thai',sans-serif;font-size:14px;transition:background .2s,color .2s}
#app{height:100dvh;display:grid;grid-template-columns:var(--sidebar-w,280px) 1fr;grid-template-rows:auto 1fr;overflow:hidden;transition:grid-template-columns .25s cubic-bezier(.4,0,.2,1)}
#app.sidebar-collapsed{--sidebar-w:0px}
@media(max-width:700px){#app{grid-template-columns:1fr}#app.sidebar-open #sidebar{transform:translateX(0)}#app.sidebar-open #overlay{opacity:1;pointer-events:all}}
#hdr{grid-column:1/-1;background:var(--hdr-bg);border-bottom:1px solid var(--hdr-brd);padding:0 14px;padding-top:env(safe-area-inset-top,0px);height:calc(54px + env(safe-area-inset-top,0px));display:flex;align-items:center;gap:10px;z-index:50;position:relative}
.h-logo{width:34px;height:34px;flex-shrink:0;border-radius:9px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.h-logo img{width:100%;height:100%;object-fit:cover}
.h-text{flex:1;min-width:0}
.h-title{font-size:15px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-sub{font-size:9.5px;color:var(--tx3);letter-spacing:.7px;text-transform:uppercase;margin-top:1px}
.h-btn{background:var(--bg2);border:1px solid var(--bd);color:var(--tx2);border-radius:8px;width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.h-btn:active{opacity:.7}
#toggle-sidebar-btn{display:none}
@media(max-width:700px){#toggle-sidebar-btn{display:flex}}
.theme-toggle{background:var(--bg2);border:1px solid var(--bd);color:var(--tx2);border-radius:8px;padding:5px 9px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;-webkit-user-select:none;user-select:none;white-space:nowrap}
.theme-toggle:active{opacity:.7}
#sidebar{grid-column:1;grid-row:2;background:var(--sb-bg);display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(255,255,255,.07);transition:width .25s cubic-bezier(.4,0,.2,1)}
@media(max-width:700px){#sidebar{position:fixed;top:0;left:0;bottom:0;width:285px;z-index:300;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);padding-top:env(safe-area-inset-top,0px)}}
.sb-head{background:var(--sb-hd);padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.sb-head h2{color:var(--gold);font-size:10.5px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase}
#sb-stats{color:var(--sb-tx2);font-size:10.5px;margin-top:3px}
.sb-search{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0}
.sb-search-wrap{position:relative}
.sb-search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--sb-tx2);font-size:12px;pointer-events:none}
#sb-sinput{width:100%;padding:7px 28px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:var(--sb-tx);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
#sb-sinput:focus{border-color:rgba(33,150,160,.5)}
#sb-sinput::placeholder{color:var(--sb-tx2)}
#sb-xcl{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--sb-tx2);font-size:16px;cursor:pointer;display:none;line-height:1;padding:2px}
#sb-tree{flex:1;overflow-y:auto;padding:6px 0 16px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.12) transparent}
#sb-tree::-webkit-scrollbar{width:4px}
#sb-tree::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.sb-part{margin-bottom:2px}
.sb-part-hd{display:flex;align-items:center;gap:7px;padding:8px 12px 8px 14px;color:var(--gold);font-size:11.5px;font-weight:700;letter-spacing:.4px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .12s}
.sb-part-hd:hover{background:rgba(255,255,255,.04)}
.sb-part-hd .arr{font-size:9px;margin-left:auto;transition:transform .2s;color:var(--sb-tx2)}
.sb-part.open>.sb-part-hd .arr{transform:rotate(90deg)}
.sb-part-children{display:none}
.sb-part.open>.sb-part-children{display:block}
.sb-chapter{margin:0}
.sb-chapter-hd{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 20px;color:var(--sb-tx);font-size:11.5px;font-weight:600;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .12s;border-left:2px solid transparent}
.sb-chapter-hd:hover{background:rgba(255,255,255,.04)}
.sb-chapter-hd .arr{font-size:8px;margin-left:auto;transition:transform .2s;color:var(--sb-tx2);flex-shrink:0}
.sb-chapter.open>.sb-chapter-hd .arr{transform:rotate(90deg)}
.sb-chapter-children{display:none}
.sb-chapter.open>.sb-chapter-children{display:block}
.sb-section{margin:0}
.sb-section-hd{display:flex;align-items:center;gap:6px;padding:5px 10px 5px 28px;color:var(--sb-tx2);font-size:11px;font-weight:500;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .12s;border-left:2px solid transparent}
.sb-section-hd:hover{background:rgba(255,255,255,.04)}
.sb-section-hd .arr{font-size:8px;margin-left:auto;transition:transform .2s;color:var(--sb-tx2);opacity:.6;flex-shrink:0}
.sb-section.open>.sb-section-hd .arr{transform:rotate(90deg)}
.sb-section-children{display:none}
.sb-section.open>.sb-section-children{display:block}
.sb-subsect{margin:0}
.sb-subsect-hd{display:flex;align-items:center;gap:6px;padding:4px 10px 4px 36px;color:var(--sb-tx2);font-size:10.5px;font-weight:400;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .12s;opacity:.8}
.sb-subsect-hd:hover{background:rgba(255,255,255,.04)}
.sb-subsect-hd .arr{font-size:8px;margin-left:auto;transition:transform .2s;color:var(--sb-tx2);opacity:.5;flex-shrink:0}
.sb-subsect.open>.sb-subsect-hd .arr{transform:rotate(90deg)}
.sb-subsect-children{display:none}
.sb-subsect.open>.sb-subsect-children{display:block}
.sb-link{display:flex;align-items:center;gap:7px;padding:5px 10px 5px 44px;color:var(--sb-tx);font-size:12.5px;cursor:pointer;-webkit-user-select:none;user-select:none;transition:background .1s,color .1s;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-link:hover{background:rgba(255,255,255,.05);color:#fff}
.sb-link.active{background:var(--sb-act);color:var(--gold);border-left-color:var(--gold);font-weight:600}
.sb-link.has-note .dot-note{display:inline-block}
.dot-note{display:none;width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.9;flex-shrink:0}
/* Direct links under chapter (no section) */
.sb-chapter>.sb-chapter-children>.sb-link{padding-left:32px}
/* Direct links under section (no subsect) */
.sb-section>.sb-section-children>.sb-link{padding-left:36px}
.sb-actions{border-top:1px solid rgba(255,255,255,.07);padding:10px;flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.sb-action-btn{width:100%;padding:8px 10px;border:none;border-radius:8px;font-family:inherit;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:opacity .15s}
.sb-action-btn:active{opacity:.7}
.btn-exp{background:rgba(33,150,160,.18);color:#5dd4e0;border:1px solid rgba(33,150,160,.25)}
.btn-imp{background:rgba(59,130,246,.15);color:#7ab3f8;border:1px solid rgba(59,130,246,.2)}
.btn-rst{background:rgba(192,57,43,.15);color:#ef9090;border:1px solid rgba(192,57,43,.2)}
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:250;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
@media(max-width:700px){#overlay{display:block}}
#main{grid-column:2;grid-row:2;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:0 0 80px;background:var(--bg);transition:background .2s}
@media(max-width:700px){#main{grid-column:1}}
#search-bar{position:sticky;top:0;z-index:40;background:var(--bg);border-bottom:1px solid var(--bd);padding:8px 14px}
.sw{position:relative}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:13px;pointer-events:none}
#sinput{width:100%;padding:8px 32px;background:var(--bg2);border:1.5px solid var(--bd);border-radius:9px;color:var(--tx);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none;transition:border .15s}
#sinput:focus{border-color:var(--gold)}
#sinput::placeholder{color:var(--tx3)}
#xcl{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--tx3);font-size:20px;cursor:pointer;display:none;padding:2px;line-height:1}
#rcount{padding:10px 16px 4px;font-size:10.5px;color:var(--tx3)}
#articles{padding:0 12px}
.part-divider{padding:14px 4px 6px;font-size:9.5px;color:var(--tx3);letter-spacing:1.2px;text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--bd);margin-bottom:8px;margin-top:4px}
.article-card{background:var(--card-bg);border:1px solid var(--card-brd);border-radius:11px;overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow);transition:box-shadow .15s,background .2s,border-color .2s}
.article-card.has-note{border-left:3px solid var(--gold)}
.article-card.highlight{box-shadow:0 0 0 2px var(--gold)}
.article-header{padding:11px 14px 9px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.article-num{font-size:14.5px;font-weight:700;color:var(--tx)}
.article-breadcrumb{font-size:10.5px;color:var(--tx3);margin-top:2px}
.article-tools{display:flex;gap:6px;flex-shrink:0;margin-top:2px}
.tool-btn{background:none;border:1px solid var(--bd);border-radius:6px;cursor:pointer;font-size:13px;padding:4px 8px;color:var(--tx3);transition:all .15s;font-family:inherit}
.tool-btn:hover{border-color:var(--gold);color:var(--tx)}
.tool-btn.note-active{background:var(--goldbg);border-color:var(--gold);color:var(--gold)}
.tool-btn.edit-active{background:var(--bluebg);border-color:var(--blue);color:var(--blue)}
.article-card.has-edit{border-left:3px solid var(--blue)}
.edited-badge{font-size:9px;background:var(--bluebg);color:#7ab3f0;border:1px solid rgba(59,130,246,.35);border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle}
.edit-wrap{display:none;margin-top:10px}
.edit-wrap.visible{display:block}
.edit-textarea{width:100%;padding:10px;background:var(--bg2);border:1.5px solid var(--bd);border-radius:8px;color:var(--tx);font-size:14px;line-height:1.9;font-family:inherit;resize:vertical;min-height:120px;outline:none;transition:border .15s}
.edit-textarea:focus{border-color:var(--blue)}
.edit-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.btn-save{padding:7px 16px;border-radius:7px;border:none;background:var(--gold2);color:#fff;font-weight:700;font-size:12.5px;cursor:pointer;font-family:inherit}
.btn-cancel{padding:7px 14px;border-radius:7px;font-size:12.5px;cursor:pointer;font-family:inherit;background:var(--bg3);border:1px solid var(--bd);color:var(--tx2)}
.btn-restore{padding:7px 14px;border-radius:7px;font-size:12.5px;cursor:pointer;font-family:inherit;color:var(--blue);border:1px solid var(--blue);background:transparent}
.article-body{padding:13px 14px}
.article-content{font-size:14px;line-height:1.95;color:var(--tx2);transition:color .2s}
.para-block{margin-bottom:0}
.para-block+.para-block{margin-top:1.5em}
.sub-line{display:block;padding-left:1.8em;text-indent:-1.8em}
.sub-line.intro{padding-left:0;text-indent:0}
mark{background:rgba(33,150,160,.22);color:#5dd4e0;border-radius:2px;padding:0 1px}
.note-wrap{display:none;margin-top:10px}
.note-wrap.visible{display:block}
.note-box{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.note-label{padding:8px 12px;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--bd)}
.note-textarea{width:100%;padding:10px 12px;background:transparent;border:none;outline:none;resize:vertical;font-size:13px;color:var(--tx);line-height:1.85;font-family:inherit;min-height:80px}
.note-textarea::placeholder{color:var(--tx3)}
.note-saved{display:none;padding:4px 12px 8px;font-size:11px;color:var(--green);font-style:italic}
#empty-state{text-align:center;padding:56px 20px;color:var(--tx3)}
.empty-ico{font-size:38px;margin-bottom:12px;opacity:.4}
#toast{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);border:1px solid var(--bd2);color:var(--tx);padding:8px 16px;border-radius:20px;font-size:12.5px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));right:16px;width:44px;height:44px;border-radius:50%;background:var(--gold2);color:#fff;border:none;font-size:18px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .25s;z-index:200;display:flex;align-items:center;justify-content:center}
#fab.visible{opacity:1;pointer-events:all}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:up .18s ease}
</style>
</head>
<body>
<div id="app">
<header id="hdr">
  <button class="h-btn" id="toggle-sidebar-btn" onclick="toggleSidebar()" title="สารบัญ">☰</button>
  <div class="h-logo"><img src="./icon-192.png" alt="ป.วิ.แพ่ง"></div>
  <div class="h-text">
    <div class="h-title">ป.วิ.แพ่ง</div>
    <div class="h-sub" id="hdr-sub">ประมวลกฎหมายวิธีพิจารณาความแพ่ง</div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 Dark</button>
</header>
<nav id="sidebar">
  <div class="sb-head"><h2>สารบัญ</h2><div id="sb-stats">กำลังโหลด...</div></div>
  <div class="sb-search">
    <div class="sb-search-wrap">
      <span class="sb-search-ico">🔍</span>
      <input type="search" id="sb-sinput" placeholder="ค้นหามาตรา..." autocomplete="off" spellcheck="false" oninput="onSbSearch(this.value)">
      <button id="sb-xcl" onclick="clearSbSearch()">×</button>
    </div>
  </div>
  <div id="sb-tree"></div>
  <div class="sb-actions">
    <button class="sb-action-btn btn-exp" onclick="exportData()">📤 สำรองข้อมูล (Export)</button>
    <button class="sb-action-btn btn-imp" onclick="document.getElementById('imp-file').click()">📥 นำเข้าข้อมูล (Import)</button>
    <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="sb-action-btn btn-rst" onclick="confirmReset()">🗑 ล้างข้อมูลทั้งหมด</button>
  </div>
</nav>
<div id="overlay" onclick="closeSidebar()"></div>
<main id="main">
  <div id="search-bar">
    <div class="sw">
      <span class="sico">🔍</span>
      <input type="search" id="sinput" placeholder="ค้นหาเลขมาตรา หรือเนื้อความ เช่น ๑, ฟ้อง, ประนีประนอม..." autocomplete="off" spellcheck="false" oninput="onSearch(this.value)">
      <button id="xcl" onclick="clearSearch()">×</button>
    </div>
  </div>
  <div id="rcount"></div>
  <div id="articles"></div>
  <div id="empty-state" style="display:none"><div class="empty-ico">🔍</div><div>ไม่พบมาตราที่ค้นหา</div></div>
</main>
</div>
<button id="fab" onclick="scrollToTop()" title="กลับด้านบน">↑</button>

<script>
const D=[{"id":"๑","num":"มาตรา ๑","num_ara":"๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๑ บทวิเคราะห์ศัพท์","section":"","subsection":"","paragraphs":["ในประมวลกฎหมายนี้ ถ้าข้อความมิได้แสดงให้เห็นเป็นอย่างอื่น","(๑) “ศาล” หมายความว่า ศาลยุติธรรมหรือผู้พิพากษาที่มีอำนาจพิจารณาพิพากษาคดีแพ่ง (๒) “คดี” หมายความว่า กระบวนพิจารณานับตั้งแต่เสนอคำฟ้องต่อศาลเพื่อขอให้รับรอง คุ้มครองบังคับตามหรือเพื่อการใช้ซึ่งสิทธิหรือหน้าที่ (๓) “คำฟ้อง” หมายความว่า กระบวนพิจารณาใด ๆ ที่โจทก์ได้เสนอข้อหาต่อศาล ไม่ว่าจะได้เสนอด้วยวาจาหรือทำเป็นหนังสือ ไม่ว่าจะได้เสนอต่อศาลชั้นต้นหรือชั้นอุทธรณ์หรือฎีกา ไม่ว่าจะได้เสนอในขณะที่เริ่มคดีโดยคำฟ้องหรือคำร้องขอ หรือเสนอโดยภายหลังโดยคำฟ้องเพิ่มเติมหรือแก้ไข หรือฟ้องแย้งหรือโดยสอดเข้ามาในคดีไม่ว่าด้วยสมัครใจ หรือถูกบังคับ หรือโดยมีคำขอให้พิจารณาใหม่ (๔) “คำให้การ” หมายความว่า กระบวนพิจารณาใด ๆ ซึ่งคู่ความฝ่ายหนึ่งยกข้อต่อสู้เป็นข้อแก้คำฟ้องตามที่บัญญัติไว้ในประมวลกฎหมายนี้ นอกจากคำแถลงการณ์ (๕) “คำคู่ความ” หมายความว่า บรรดาคำฟ้อง คำให้การหรือคำร้องทั้งหลายที่ยื่นต่อศาลเพื่อตั้งประเด็นระหว่างคู่ความ (๖) “คำแถลงการณ์” หมายความว่า คำแถลงด้วยวาจาหรือเป็นหนังสือ ซึ่งคู่ความฝ่ายหนึ่งกระทำหรือยื่นต่อศาล ด้วยมุ่งหมายที่จะเสนอความเห็นต่อศาลในข้อความในประเด็นที่ได้ยกขึ้นอ้างในคำคู่ความหรือในปัญหาข้อใดที่ศาลจะพึงมีคำสั่งหรือคำพิพากษา ซึ่งในข้อเหล่านี้คู่ความฝ่ายนั้นเพียงแต่แสดง หรือกล่าวทบทวนหรือยืนยันหรืออธิบายข้อความแห่งคำพยานหลักฐาน และปัญหาข้อกฎหมายและข้อเท็จจริงทั้งปวง คำแถลงการณ์อาจรวมอยู่ในคำ คู่ความ (๗) “กระบวนพิจารณา” หมายความว่า การกระทำใด ๆ ตามที่บัญญัติไว้ในประมวลกฎหมายนี้อันเกี่ยวด้วยคดีซึ่งได้กระทำไปโดยคู่ความในคดีนั้นหรือโดยศาล หรือตามคำสั่งของศาลไม่ว่าการนั้นจะเป็นโดยคู่ความฝ่ายใดทำต่อศาลหรือต่อคู่ความอีกฝ่ายหนึ่ง หรือศาลทำต่อคู่ความฝ่ายใดฝ่ายหนึ่งหรือทุกฝ่าย และรวมถึงการส่งคำคู่ความและเอกสารอื่น ๆ ตามที่บัญญัติไว้ในประมวลกฎหมายนี้ (๘) “การพิจารณา” หมายความว่า กระบวนพิจารณาทั้งหมดในศาลใดศาลหนึ่ง ก่อนศาลนั้นชี้ขาดตัดสินหรือจำหน่ายคดีโดยคำพิพากษาหรือคำสั่ง (๙) “การนั่งพิจารณา” หมายความว่า การที่ศาลออกนั่งเกี่ยวกับการพิจารณาคดี เช่น ชี้สองสถาน สืบพยาน ทำการไต่สวน ฟังคำขอต่าง ๆ และฟังคำแถลงการณ์ด้วยวาจา (๑๐) “วันสืบพยาน” หมายความว่า วันที่ศาลเริ่มต้นทำการสืบพยาน (๑๑) “คู่ความ” หมายความว่า บุคคลผู้ยื่นคำฟ้องหรือถูกฟ้องต่อศาล และเพื่อประโยชน์แห่งการดำเนินกระบวนพิจารณาให้รวมถึงบุคคลผู้มีสิทธิกระทำการแทนบุคคลนั้น ๆ ตามกฎหมาย หรือในฐานะทนายความ (๑๒) “บุคคลผู้ไร้ความสามารถ” หมายความว่า บุคคลใด ๆ ซึ่งไม่มีความสามารถตามกฎหมายหรือความสามารถถูกจำกัดโดยบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์ว่าด้วยความสามารถ (๑๓) “ผู้แทนโดยชอบธรรม” หมายความว่า บุคคลซึ่งตามกฎหมายมีสิทธิที่จะทำการแทนบุคคลผู้ไร้ความสามารถหรือเป็นบุคคลที่จะต้องให้คำอนุญาต หรือให้ความยินยอมแก่ผู้ไร้ความสามารถในอันที่จะกระทำการอย่างใดอย่างหนึ่ง (๑๔) เจ้าพนักงานบังคับคดี หมายความว่า เจ้าพนักงานในสังกัดกรมบังคับคดีหรือพนักงานอื่นผู้มีอำนาจตามบทบัญญัติแห่งกฎหมายที่ใช้อยู่ ในอันที่จะปฏิบัติตามวิธีการที่บัญญัติไว้ในภาค ๔ แห่งประมวลกฎหมายนี้ เพื่อคุ้มครองสิทธิของคู่ความในระหว่างการพิจารณา หรือเพื่อบังคับตามคำพิพากษาหรือคำสั่ง และให้หมายความรวมถึงบุคคลที่ได้รับมอบหมายจากเจ้าพนักงานบังคับคดีให้ปฏิบัติการแทน"],"text":"ในประมวลกฎหมายนี้ ถ้าข้อความมิได้แสดงให้เห็นเป็นอย่างอื่น\n\n(๑) “ศาล” หมายความว่า ศาลยุติธรรมหรือผู้พิพากษาที่มีอำนาจพิจารณาพิพากษาคดีแพ่ง (๒) “คดี” หมายความว่า กระบวนพิจารณานับตั้งแต่เสนอคำฟ้องต่อศาลเพื่อขอให้รับรอง คุ้มครองบังคับตามหรือเพื่อการใช้ซึ่งสิทธิหรือหน้าที่ (๓) “คำฟ้อง” หมายความว่า กระบวนพิจารณาใด ๆ ที่โจทก์ได้เสนอข้อหาต่อศาล ไม่ว่าจะได้เสนอด้วยวาจาหรือทำเป็นหนังสือ ไม่ว่าจะได้เสนอต่อศาลชั้นต้นหรือชั้นอุทธรณ์หรือฎีกา ไม่ว่าจะได้เสนอในขณะที่เริ่มคดีโดยคำฟ้องหรือคำร้องขอ หรือเสนอโดยภายหลังโดยคำฟ้องเพิ่มเติมหรือแก้ไข หรือฟ้องแย้งหรือโดยสอดเข้ามาในคดีไม่ว่าด้วยสมัครใจ หรือถูกบังคับ หรือโดยมีคำขอให้พิจารณาใหม่ (๔) “คำให้การ” หมายความว่า กระบวนพิจารณาใด ๆ ซึ่งคู่ความฝ่ายหนึ่งยกข้อต่อสู้เป็นข้อแก้คำฟ้องตามที่บัญญัติไว้ในประมวลกฎหมายนี้ นอกจากคำแถลงการณ์ (๕) “คำคู่ความ” หมายความว่า บรรดาคำฟ้อง คำให้การหรือคำร้องทั้งหลายที่ยื่นต่อศาลเพื่อตั้งประเด็นระหว่างคู่ความ (๖) “คำแถลงการณ์” หมายความว่า คำแถลงด้วยวาจาหรือเป็นหนังสือ ซึ่งคู่ความฝ่ายหนึ่งกระทำหรือยื่นต่อศาล ด้วยมุ่งหมายที่จะเสนอความเห็นต่อศาลในข้อความในประเด็นที่ได้ยกขึ้นอ้างในคำคู่ความหรือในปัญหาข้อใดที่ศาลจะพึงมีคำสั่งหรือคำพิพากษา ซึ่งในข้อเหล่านี้คู่ความฝ่ายนั้นเพียงแต่แสดง หรือกล่าวทบทวนหรือยืนยันหรืออธิบายข้อความแห่งคำพยานหลักฐาน และปัญหาข้อกฎหมายและข้อเท็จจริงทั้งปวง คำแถลงการณ์อาจรวมอยู่ในคำ คู่ความ (๗) “กระบวนพิจารณา” หมายความว่า การกระทำใด ๆ ตามที่บัญญัติไว้ในประมวลกฎหมายนี้อันเกี่ยวด้วยคดีซึ่งได้กระทำไปโดยคู่ความในคดีนั้นหรือโดยศาล หรือตามคำสั่งของศาลไม่ว่าการนั้นจะเป็นโดยคู่ความฝ่ายใดทำต่อศาลหรือต่อคู่ความอีกฝ่ายหนึ่ง หรือศาลทำต่อคู่ความฝ่ายใดฝ่ายหนึ่งหรือทุกฝ่าย และรวมถึงการส่งคำคู่ความและเอกสารอื่น ๆ ตามที่บัญญัติไว้ในประมวลกฎหมายนี้ (๘) “การพิจารณา” หมายความว่า กระบวนพิจารณาทั้งหมดในศาลใดศาลหนึ่ง ก่อนศาลนั้นชี้ขาดตัดสินหรือจำหน่ายคดีโดยคำพิพากษาหรือคำสั่ง (๙) “การนั่งพิจารณา” หมายความว่า การที่ศาลออกนั่งเกี่ยวกับการพิจารณาคดี เช่น ชี้สองสถาน สืบพยาน ทำการไต่สวน ฟังคำขอต่าง ๆ และฟังคำแถลงการณ์ด้วยวาจา (๑๐) “วันสืบพยาน” หมายความว่า วันที่ศาลเริ่มต้นทำการสืบพยาน (๑๑) “คู่ความ” หมายความว่า บุคคลผู้ยื่นคำฟ้องหรือถูกฟ้องต่อศาล และเพื่อประโยชน์แห่งการดำเนินกระบวนพิจารณาให้รวมถึงบุคคลผู้มีสิทธิกระทำการแทนบุคคลนั้น ๆ ตามกฎหมาย หรือในฐานะทนายความ (๑๒) “บุคคลผู้ไร้ความสามารถ” หมายความว่า บุคคลใด ๆ ซึ่งไม่มีความสามารถตามกฎหมายหรือความสามารถถูกจำกัดโดยบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์ว่าด้วยความสามารถ (๑๓) “ผู้แทนโดยชอบธรรม” หมายความว่า บุคคลซึ่งตามกฎหมายมีสิทธิที่จะทำการแทนบุคคลผู้ไร้ความสามารถหรือเป็นบุคคลที่จะต้องให้คำอนุญาต หรือให้ความยินยอมแก่ผู้ไร้ความสามารถในอันที่จะกระทำการอย่างใดอย่างหนึ่ง (๑๔) เจ้าพนักงานบังคับคดี หมายความว่า เจ้าพนักงานในสังกัดกรมบังคับคดีหรือพนักงานอื่นผู้มีอำนาจตามบทบัญญัติแห่งกฎหมายที่ใช้อยู่ ในอันที่จะปฏิบัติตามวิธีการที่บัญญัติไว้ในภาค ๔ แห่งประมวลกฎหมายนี้ เพื่อคุ้มครองสิทธิของคู่ความในระหว่างการพิจารณา หรือเพื่อบังคับตามคำพิพากษาหรือคำสั่ง และให้หมายความรวมถึงบุคคลที่ได้รับมอบหมายจากเจ้าพนักงานบังคับคดีให้ปฏิบัติการแทน"},{"id":"๒","num":"มาตรา ๒","num_ara":"๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["ห้ามมิให้เสนอคำฟ้องต่อศาลใด เว้นแต่","(๑) เมื่อได้พิจารณาถึงสภาพแห่งคำฟ้องและชั้นของศาลแล้ว ปรากฏว่า ศาลนั้นมีอำนาจที่จะพิจารณาพิพากษาคดีนั้นได้ตามบทบัญญัติแห่งกฎหมายว่าด้วยพระธรรมนูญศาลยุติธรรม และ (๒) เมื่อได้พิจารณาถึงคำฟ้องแล้ว ปรากฏว่าคดีนั้นอยู่ในเขตศาลนั้นตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยศาลที่จะรับคำฟ้อง และตามบทบัญญัติแห่งกฎหมายที่กำหนดเขตศาลด้วย"],"text":"ห้ามมิให้เสนอคำฟ้องต่อศาลใด เว้นแต่\n\n(๑) เมื่อได้พิจารณาถึงสภาพแห่งคำฟ้องและชั้นของศาลแล้ว ปรากฏว่า ศาลนั้นมีอำนาจที่จะพิจารณาพิพากษาคดีนั้นได้ตามบทบัญญัติแห่งกฎหมายว่าด้วยพระธรรมนูญศาลยุติธรรม และ (๒) เมื่อได้พิจารณาถึงคำฟ้องแล้ว ปรากฏว่าคดีนั้นอยู่ในเขตศาลนั้นตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยศาลที่จะรับคำฟ้อง และตามบทบัญญัติแห่งกฎหมายที่กำหนดเขตศาลด้วย"},{"id":"๓","num":"มาตรา ๓","num_ara":"๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["เพื่อประโยชน์ในการเสนอคำฟ้อง","(๑) ในกรณีที่มูลคดีเกิดขึ้นในเรือไทยหรืออากาศยานไทยที่อยู่นอกราชอาณาจักร ให้ศาลแพ่งเป็นศาลที่มีเขตอำนาจ (๒) ในกรณีที่จำเลยไม่มีภูมิลำเนาอยู่ในราชอาณาจักร (ก) ถ้าจำเลยเคยมีภูมิลำเนาอยู่ ณ ที่ใดในราชอาณาจักรภายในกำหนดสองปีก่อนวันที่มีการเสนอคำฟ้อง ให้ถือว่าที่นั้นเป็นภูมิลำเนาของจำเลย (ข) ถ้าจำเลยประกอบหรือเคยประกอบกิจการทั้งหมดหรือแต่บางส่วนในราชอาณาจักรไม่ว่าโดยตนเองหรือตัวแทน หรือโดยมีบุคคลหนึ่งบุคคลใดเป็นผู้ติดต่อในการประกอบกิจการนั้นในราชอาณาจักร ให้ถือว่าสถานที่ที่ใช้หรือเคยใช้ประกอบกิจการหรือติดต่อดังกล่าว หรือสถานที่อันเป็นถิ่นที่อยู่ของตัวแทนหรือของผู้ติดต่อในวันที่มีการเสนอคำฟ้องหรือภายในกำหนดสองปีก่อนนั้น เป็นภูมิลำเนาของจำเลย"],"text":"เพื่อประโยชน์ในการเสนอคำฟ้อง\n\n(๑) ในกรณีที่มูลคดีเกิดขึ้นในเรือไทยหรืออากาศยานไทยที่อยู่นอกราชอาณาจักร ให้ศาลแพ่งเป็นศาลที่มีเขตอำนาจ (๒) ในกรณีที่จำเลยไม่มีภูมิลำเนาอยู่ในราชอาณาจักร (ก) ถ้าจำเลยเคยมีภูมิลำเนาอยู่ ณ ที่ใดในราชอาณาจักรภายในกำหนดสองปีก่อนวันที่มีการเสนอคำฟ้อง ให้ถือว่าที่นั้นเป็นภูมิลำเนาของจำเลย (ข) ถ้าจำเลยประกอบหรือเคยประกอบกิจการทั้งหมดหรือแต่บางส่วนในราชอาณาจักรไม่ว่าโดยตนเองหรือตัวแทน หรือโดยมีบุคคลหนึ่งบุคคลใดเป็นผู้ติดต่อในการประกอบกิจการนั้นในราชอาณาจักร ให้ถือว่าสถานที่ที่ใช้หรือเคยใช้ประกอบกิจการหรือติดต่อดังกล่าว หรือสถานที่อันเป็นถิ่นที่อยู่ของตัวแทนหรือของผู้ติดต่อในวันที่มีการเสนอคำฟ้องหรือภายในกำหนดสองปีก่อนนั้น เป็นภูมิลำเนาของจำเลย"},{"id":"๔","num":"มาตรา ๔","num_ara":"๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["เว้นแต่จะมีบทบัญญัติเป็นอย่างอื่น","(๑) คำฟ้องให้เสนอต่อศาลที่จำเลยมีภูมิลำเนาอยู่ในเขตศาล หรือต่อศาลที่มูลคดีเกิดขึ้นในเขตศาลไม่ว่าจำเลยจะมีภูมิลำเนาอยู่ในราชอาณาจักรหรือไม่ (๒) คำร้องขอ ให้เสนอต่อศาลที่มูลคดีเกิดขึ้นในเขตศาล หรือต่อศาลที่ผู้ร้องมีภูมิลำเนาอยู่ในเขตศาล"],"text":"เว้นแต่จะมีบทบัญญัติเป็นอย่างอื่น\n\n(๑) คำฟ้องให้เสนอต่อศาลที่จำเลยมีภูมิลำเนาอยู่ในเขตศาล หรือต่อศาลที่มูลคดีเกิดขึ้นในเขตศาลไม่ว่าจำเลยจะมีภูมิลำเนาอยู่ในราชอาณาจักรหรือไม่ (๒) คำร้องขอ ให้เสนอต่อศาลที่มูลคดีเกิดขึ้นในเขตศาล หรือต่อศาลที่ผู้ร้องมีภูมิลำเนาอยู่ในเขตศาล"},{"id":"๔_ทวิ","num":"มาตรา ๔ ทวิ","num_ara":"๔ ทวิ","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["คำฟ้องเกี่ยวด้วยอสังหาริมทรัพย์ หรือสิทธิหรือประโยชน์อันเกี่ยวด้วยอสังหาริมทรัพย์ ให้เสนอต่อศาลที่อสังหาริมทรัพย์นั้นตั้งอยู่ในเขตศาล ไม่ว่าจำเลยจะมีภูมิลำเนาอยู่ในราชอาณาจักรหรือไม่ หรือต่อศาลที่จำเลยมีภูมิลำเนาอยู่ในเขตศาล"],"text":"คำฟ้องเกี่ยวด้วยอสังหาริมทรัพย์ หรือสิทธิหรือประโยชน์อันเกี่ยวด้วยอสังหาริมทรัพย์ ให้เสนอต่อศาลที่อสังหาริมทรัพย์นั้นตั้งอยู่ในเขตศาล ไม่ว่าจำเลยจะมีภูมิลำเนาอยู่ในราชอาณาจักรหรือไม่ หรือต่อศาลที่จำเลยมีภูมิลำเนาอยู่ในเขตศาล"},{"id":"๔_ตรี","num":"มาตรา ๔ ตรี","num_ara":"๔ ตรี","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["คำฟ้องอื่นนอกจากที่บัญญัติไว้ในมาตรา ๔ ทวิ ซึ่งจำเลยมิได้มีภูมิลำเนาอยู่ในราชอาณาจักรและมูลคดีมิได้เกิดขึ้นในราชอาณาจักร ถ้าโจทก์เป็นผู้มีสัญชาติไทยหรือมีภูมิลำเนาอยู่ในราชอาณาจักร ให้เสนอต่อศาลแพ่งหรือต่อศาลที่โจทก์มีภูมิลำเนาอยู่ในเขตศาล คำฟ้องตามวรรคหนึ่ง ถ้าจำเลยมีทรัพย์สินที่อาจถูกบังคับคดีได้อยู่ในราชอาณาจักร ไม่ว่าจะเป็นการชั่วคราวหรือถาวร โจทก์จะเสนอคำฟ้องต่อศาลที่ทรัพย์สินนั้นอยู่ในเขตศาลก็ได้"],"text":"คำฟ้องอื่นนอกจากที่บัญญัติไว้ในมาตรา ๔ ทวิ ซึ่งจำเลยมิได้มีภูมิลำเนาอยู่ในราชอาณาจักรและมูลคดีมิได้เกิดขึ้นในราชอาณาจักร ถ้าโจทก์เป็นผู้มีสัญชาติไทยหรือมีภูมิลำเนาอยู่ในราชอาณาจักร ให้เสนอต่อศาลแพ่งหรือต่อศาลที่โจทก์มีภูมิลำเนาอยู่ในเขตศาล คำฟ้องตามวรรคหนึ่ง ถ้าจำเลยมีทรัพย์สินที่อาจถูกบังคับคดีได้อยู่ในราชอาณาจักร ไม่ว่าจะเป็นการชั่วคราวหรือถาวร โจทก์จะเสนอคำฟ้องต่อศาลที่ทรัพย์สินนั้นอยู่ในเขตศาลก็ได้"},{"id":"๔_จัตวา","num":"มาตรา ๔ จัตวา","num_ara":"๔ จัตวา","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["คำร้องขอแต่งตั้งผู้จัดการมรดก ให้เสนอต่อศาลที่เจ้ามรดกมีภูมิลำเนาอยู่ในเขตศาลในขณะถึงแก่ความตาย ในกรณีที่เจ้ามรดกไม่มีภูมิลำเนาอยู่ในราชอาณาจักร ให้เสนอต่อศาลที่ทรัพย์มรดกอยู่ในเขตศาล"],"text":"คำร้องขอแต่งตั้งผู้จัดการมรดก ให้เสนอต่อศาลที่เจ้ามรดกมีภูมิลำเนาอยู่ในเขตศาลในขณะถึงแก่ความตาย ในกรณีที่เจ้ามรดกไม่มีภูมิลำเนาอยู่ในราชอาณาจักร ให้เสนอต่อศาลที่ทรัพย์มรดกอยู่ในเขตศาล"},{"id":"๔_เบญจ","num":"มาตรา ๔ เบญจ","num_ara":"๔ เบญจ","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["คำร้องขอเพิกถอนมติของที่ประชุมหรือที่ประชุมใหญ่ของนิติบุคคล คำร้องขอเลิกนิติบุคคล คำร้องขอตั้งหรือถอนผู้ชำระบัญชีของนิติบุคคล หรือคำร้องขออื่นใดเกี่ยวกับนิติบุคคล ให้เสนอต่อศาลที่นิติบุคคลนั้นมีสำนักงานแห่งใหญ่อยู่ในเขตศาล"],"text":"คำร้องขอเพิกถอนมติของที่ประชุมหรือที่ประชุมใหญ่ของนิติบุคคล คำร้องขอเลิกนิติบุคคล คำร้องขอตั้งหรือถอนผู้ชำระบัญชีของนิติบุคคล หรือคำร้องขออื่นใดเกี่ยวกับนิติบุคคล ให้เสนอต่อศาลที่นิติบุคคลนั้นมีสำนักงานแห่งใหญ่อยู่ในเขตศาล"},{"id":"๔_ฉ","num":"มาตรา ๔ ฉ","num_ara":"๔ ฉ","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["คำร้องขอเกี่ยวกับทรัพย์สินที่อยู่ในราชอาณาจักรก็ดี คำร้องขอที่หากศาลมีคำสั่งตามคำร้องขอนั้นจะเป็นผลให้ต้องจัดการหรือเลิกจัดการทรัพย์สินที่อยู่ในราชอาณาจักรก็ดี ซึ่งมูลคดีมิได้เกิดขึ้นในราชอาณาจักรและผู้ร้องไม่มีภูมิลำเนาอยู่ในราชอาณาจักร ให้เสนอต่อศาลที่ทรัพย์สินดังกล่าวอยู่ในเขตศาล"],"text":"คำร้องขอเกี่ยวกับทรัพย์สินที่อยู่ในราชอาณาจักรก็ดี คำร้องขอที่หากศาลมีคำสั่งตามคำร้องขอนั้นจะเป็นผลให้ต้องจัดการหรือเลิกจัดการทรัพย์สินที่อยู่ในราชอาณาจักรก็ดี ซึ่งมูลคดีมิได้เกิดขึ้นในราชอาณาจักรและผู้ร้องไม่มีภูมิลำเนาอยู่ในราชอาณาจักร ให้เสนอต่อศาลที่ทรัพย์สินดังกล่าวอยู่ในเขตศาล"},{"id":"๕","num":"มาตรา ๕","num_ara":"๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["คำฟ้องหรือคำร้องขอซึ่งอาจเสนอต่อศาลได้สองศาลหรือกว่านั้น ไม่ว่าจะเป็นเพราะภูมิลำเนาของบุคคลก็ดี เพราะที่ตั้งของทรัพย์สินก็ดี เพราะสถานที่ที่เกิดมูลคดีก็ดี หรือเพราะมีข้อหาหลายข้อก็ดี ถ้ามูลความแห่งคดีเกี่ยวข้องกัน โจทก์หรือผู้ร้องจะเสนอคำฟ้องหรือคำร้องขอต่อศาลใดศาลหนึ่งเช่นว่านั้นก็ได้"],"text":"คำฟ้องหรือคำร้องขอซึ่งอาจเสนอต่อศาลได้สองศาลหรือกว่านั้น ไม่ว่าจะเป็นเพราะภูมิลำเนาของบุคคลก็ดี เพราะที่ตั้งของทรัพย์สินก็ดี เพราะสถานที่ที่เกิดมูลคดีก็ดี หรือเพราะมีข้อหาหลายข้อก็ดี ถ้ามูลความแห่งคดีเกี่ยวข้องกัน โจทก์หรือผู้ร้องจะเสนอคำฟ้องหรือคำร้องขอต่อศาลใดศาลหนึ่งเช่นว่านั้นก็ได้"},{"id":"๖","num":"มาตรา ๖","num_ara":"๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["ก่อนยื่นคำให้การ จำเลยชอบที่จะยื่นคำร้องต่อศาลที่โจทก์ได้ยื่นคำฟ้องไว้ขอให้โอนคดีไปยังศาลอื่นที่มีเขตอำนาจได้ คำร้องนั้นจำเลยต้องแสดงเหตุที่ยกขึ้นอ้างอิงว่าการพิจารณาคดีต่อไปในศาลนั้นจะไม่สะดวก หรือจำเลยอาจไม่ได้รับความยุติธรรม เมื่อศาลเห็นสมควร ศาลจะมีคำสั่งอนุญาตตามคำร้องนั้นก็ได้ ห้ามมิให้ศาลออกคำสั่งอนุญาตตามวรรคหนึ่ง เว้นแต่ศาลที่จะรับโอนคดีไปนั้นได้ยินยอมเสียก่อน ถ้าศาลที่จะรับโอนคดีไม่ยินยอม ก็ให้ศาลที่จะโอนคดีนั้นส่งเรื่องให้อธิบดีผู้พิพากษาศาลอุทธรณ์ชี้ขาด คำสั่งของอธิบดีผู้พิพากษาศาลอุทธรณ์ให้เป็นที่สุด"],"text":"ก่อนยื่นคำให้การ จำเลยชอบที่จะยื่นคำร้องต่อศาลที่โจทก์ได้ยื่นคำฟ้องไว้ขอให้โอนคดีไปยังศาลอื่นที่มีเขตอำนาจได้ คำร้องนั้นจำเลยต้องแสดงเหตุที่ยกขึ้นอ้างอิงว่าการพิจารณาคดีต่อไปในศาลนั้นจะไม่สะดวก หรือจำเลยอาจไม่ได้รับความยุติธรรม เมื่อศาลเห็นสมควร ศาลจะมีคำสั่งอนุญาตตามคำร้องนั้นก็ได้ ห้ามมิให้ศาลออกคำสั่งอนุญาตตามวรรคหนึ่ง เว้นแต่ศาลที่จะรับโอนคดีไปนั้นได้ยินยอมเสียก่อน ถ้าศาลที่จะรับโอนคดีไม่ยินยอม ก็ให้ศาลที่จะโอนคดีนั้นส่งเรื่องให้อธิบดีผู้พิพากษาศาลอุทธรณ์ชี้ขาด คำสั่งของอธิบดีผู้พิพากษาศาลอุทธรณ์ให้เป็นที่สุด"},{"id":"๖_๑","num":"มาตรา ๖/๑","num_ara":"๖/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["คดีที่ยื่นฟ้องไว้ต่อศาลชั้นต้นซึ่งไม่ใช่ศาลแพ่ง ก่อนวันชี้สองสถาน หรือก่อนวันสืบพยานไม่น้อยกว่าเจ็ดวันในกรณีที่ไม่มีการชี้สองสถาน หากศาลที่คดีนั้นอยู่ระหว่างพิจารณาเห็นว่าผลของคดีดังกล่าวอาจกระทบต่อการอนุรักษ์หรือการบำรุงรักษาทรัพยากรธรรมชาติหรือสิ่งแวดล้อม การคุ้มครองผู้บริโภคเป็นส่วนรวม หรือประโยชน์สาธารณะอย่างอื่นที่สำคัญ และการโอนคดีไปยังศาลแพ่งจะทำให้การพิจารณาพิพากษาคดีเป็นไปอย่างมีประสิทธิภาพยิ่งขึ้น ก็ให้ศาลแจ้งคู่ความทราบและทำความเห็นเสนอประธานศาลอุทธรณ์เพื่อมีคำสั่งให้โอนคดีนั้นไปยังศาลแพ่งได้ คำสั่งของประธานศาลอุทธรณ์ให้เป็นที่สุด การโอนคดีตามวรรคหนึ่ง ไม่กระทบกระเทือนถึงกระบวนพิจารณาที่ได้ดำเนินการไปก่อนที่จะมีคำสั่งให้โอนคดี และให้ถือว่าบรรดากระบวนพิจารณาที่ได้ดำเนินการไปแล้วนั้นเป็นกระบวนพิจารณาของศาลแพ่งด้วย เว้นแต่ศาลแพ่งจะมีคำสั่งเป็นอย่างอื่นเพื่อประโยชน์แห่งความยุติธรรม"],"text":"คดีที่ยื่นฟ้องไว้ต่อศาลชั้นต้นซึ่งไม่ใช่ศาลแพ่ง ก่อนวันชี้สองสถาน หรือก่อนวันสืบพยานไม่น้อยกว่าเจ็ดวันในกรณีที่ไม่มีการชี้สองสถาน หากศาลที่คดีนั้นอยู่ระหว่างพิจารณาเห็นว่าผลของคดีดังกล่าวอาจกระทบต่อการอนุรักษ์หรือการบำรุงรักษาทรัพยากรธรรมชาติหรือสิ่งแวดล้อม การคุ้มครองผู้บริโภคเป็นส่วนรวม หรือประโยชน์สาธารณะอย่างอื่นที่สำคัญ และการโอนคดีไปยังศาลแพ่งจะทำให้การพิจารณาพิพากษาคดีเป็นไปอย่างมีประสิทธิภาพยิ่งขึ้น ก็ให้ศาลแจ้งคู่ความทราบและทำความเห็นเสนอประธานศาลอุทธรณ์เพื่อมีคำสั่งให้โอนคดีนั้นไปยังศาลแพ่งได้ คำสั่งของประธานศาลอุทธรณ์ให้เป็นที่สุด การโอนคดีตามวรรคหนึ่ง ไม่กระทบกระเทือนถึงกระบวนพิจารณาที่ได้ดำเนินการไปก่อนที่จะมีคำสั่งให้โอนคดี และให้ถือว่าบรรดากระบวนพิจารณาที่ได้ดำเนินการไปแล้วนั้นเป็นกระบวนพิจารณาของศาลแพ่งด้วย เว้นแต่ศาลแพ่งจะมีคำสั่งเป็นอย่างอื่นเพื่อประโยชน์แห่งความยุติธรรม"},{"id":"๗","num":"มาตรา ๗","num_ara":"๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["บทบัญญัติในมาตรา ๔ มาตรา ๔ ทวิ มาตรา ๔ ตรี มาตรา ๔ จัตวา มาตรา ๔ เบญจ มาตรา ๔ ฉ มาตรา ๕ มาตรา ๖ และมาตรา ๖/๑ ต้องอยู่ภายใต้บังคับแห่งบทบัญญัติดังต่อไปนี้","(๑) คำฟ้องหรือคำร้องขอที่เสนอภายหลังเกี่ยวเนื่องกับคดีที่ค้างพิจารณาอยู่ในศาลใด ให้เสนอต่อศาลนั้น (๒) คำฟ้องหรือคำร้องขอที่เสนอเกี่ยวเนื่องกับการบังคับคดีตามคำพิพากษาหรือคำสั่งของศาล ซึ่งคำฟ้องหรือคำร้องขอนั้นจำต้องมีคำวินิจฉัยของศาลก่อนที่การบังคับคดีจะได้ดำเนินไปได้โดยครบถ้วนและถูกต้องนั้น ให้เสนอต่อศาลที่กำหนดไว้ในมาตรา ๒๗๑ (๓) คำร้องตามมาตรา ๑๐๑ ถ้าได้เสนอคำฟ้องหรือคำร้องขอต่อศาลใดแล้ว ให้เสนอต่อศาลนั้น ในกรณีที่ยังไม่ได้เสนอคำฟ้องหรือคำร้องขอต่อศาลใด ถ้าพยานหลักฐานซึ่งจะเรียกมาสืบหรือบุคคลหรือทรัพย์หรือสถานที่ที่จะต้องตรวจอยู่ในเขตศาลใด ให้เสนอต่อศาลนั้น (๔) คำร้องที่เสนอให้ศาลถอนคืนหรือเปลี่ยนแปลงคำสั่งหรือการอนุญาตที่ศาลได้ให้ไว้ก็ดี คำร้องที่เสนอให้ศาลถอดถอนบุคคลใดจากฐานะที่ศาลได้แต่งตั้งไว้ก็ดี คำร้องที่เสนอให้ศาลมีคำสั่งใดที่เกี่ยวกับการถอนคืนหรือเปลี่ยนแปลงคำสั่งหรือการอนุญาตหรือที่เกี่ยวกับการแต่งตั้งเช่นว่านั้นก็ดี คำร้องขอหรือคำร้องอื่นใดที่เสนอเกี่ยวเนื่องกับคดีที่ศาลได้มีคำพิพากษาหรือคำสั่งไปแล้วก็ดี ให้เสนอต่อศาลในคดีที่ได้มีคำสั่ง การอนุญาต การแต่งตั้ง หรือคำพิพากษานั้น"],"text":"บทบัญญัติในมาตรา ๔ มาตรา ๔ ทวิ มาตรา ๔ ตรี มาตรา ๔ จัตวา มาตรา ๔ เบญจ มาตรา ๔ ฉ มาตรา ๕ มาตรา ๖ และมาตรา ๖/๑ ต้องอยู่ภายใต้บังคับแห่งบทบัญญัติดังต่อไปนี้\n\n(๑) คำฟ้องหรือคำร้องขอที่เสนอภายหลังเกี่ยวเนื่องกับคดีที่ค้างพิจารณาอยู่ในศาลใด ให้เสนอต่อศาลนั้น (๒) คำฟ้องหรือคำร้องขอที่เสนอเกี่ยวเนื่องกับการบังคับคดีตามคำพิพากษาหรือคำสั่งของศาล ซึ่งคำฟ้องหรือคำร้องขอนั้นจำต้องมีคำวินิจฉัยของศาลก่อนที่การบังคับคดีจะได้ดำเนินไปได้โดยครบถ้วนและถูกต้องนั้น ให้เสนอต่อศาลที่กำหนดไว้ในมาตรา ๒๗๑ (๓) คำร้องตามมาตรา ๑๐๑ ถ้าได้เสนอคำฟ้องหรือคำร้องขอต่อศาลใดแล้ว ให้เสนอต่อศาลนั้น ในกรณีที่ยังไม่ได้เสนอคำฟ้องหรือคำร้องขอต่อศาลใด ถ้าพยานหลักฐานซึ่งจะเรียกมาสืบหรือบุคคลหรือทรัพย์หรือสถานที่ที่จะต้องตรวจอยู่ในเขตศาลใด ให้เสนอต่อศาลนั้น (๔) คำร้องที่เสนอให้ศาลถอนคืนหรือเปลี่ยนแปลงคำสั่งหรือการอนุญาตที่ศาลได้ให้ไว้ก็ดี คำร้องที่เสนอให้ศาลถอดถอนบุคคลใดจากฐานะที่ศาลได้แต่งตั้งไว้ก็ดี คำร้องที่เสนอให้ศาลมีคำสั่งใดที่เกี่ยวกับการถอนคืนหรือเปลี่ยนแปลงคำสั่งหรือการอนุญาตหรือที่เกี่ยวกับการแต่งตั้งเช่นว่านั้นก็ดี คำร้องขอหรือคำร้องอื่นใดที่เสนอเกี่ยวเนื่องกับคดีที่ศาลได้มีคำพิพากษาหรือคำสั่งไปแล้วก็ดี ให้เสนอต่อศาลในคดีที่ได้มีคำสั่ง การอนุญาต การแต่งตั้ง หรือคำพิพากษานั้น"},{"id":"๘","num":"มาตรา ๘","num_ara":"๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["ถ้าคดีสองเรื่องซึ่งมีประเด็นอย่างเดียวกันหรือเกี่ยวเนื่องใกล้ชิดกัน อยู่ในระหว่างพิจารณาของศาลชั้นต้นที่มีเขตอำนาจสองศาลต่างกัน และศาลทั้งสองนั้นได้ยกคำร้องทั้งหลายที่ได้ยื่นต่อศาลขอให้คดีทั้งสองได้พิจารณาพิพากษารวมในศาลเดียวกันนั้นเสีย ตราบใดที่ศาลใดศาลหนึ่งยังมิได้พิพากษาคดีนั้น ๆ คู่ความฝ่ายใดฝ่ายหนึ่งจะยื่นคำขอโดยทำเป็นคำร้องต่ออธิบดีผู้พิพากษาศาลอุทธรณ์ เพื่อขอให้มีคำสั่งให้ศาลใดศาลหนึ่งจำหน่ายคดีซึ่งอยู่ในระหว่างพิจารณานั้นออกเสียจากสารบบความ หรือให้โอนคดีไปยังอีกศาลหนึ่งก็ได้ แล้วแต่กรณี คำสั่งใด ๆ ของอธิบดีผู้พิพากษาศาลอุทธรณ์เช่นว่านี้ให้เป็นที่สุด"],"text":"ถ้าคดีสองเรื่องซึ่งมีประเด็นอย่างเดียวกันหรือเกี่ยวเนื่องใกล้ชิดกัน อยู่ในระหว่างพิจารณาของศาลชั้นต้นที่มีเขตอำนาจสองศาลต่างกัน และศาลทั้งสองนั้นได้ยกคำร้องทั้งหลายที่ได้ยื่นต่อศาลขอให้คดีทั้งสองได้พิจารณาพิพากษารวมในศาลเดียวกันนั้นเสีย ตราบใดที่ศาลใดศาลหนึ่งยังมิได้พิพากษาคดีนั้น ๆ คู่ความฝ่ายใดฝ่ายหนึ่งจะยื่นคำขอโดยทำเป็นคำร้องต่ออธิบดีผู้พิพากษาศาลอุทธรณ์ เพื่อขอให้มีคำสั่งให้ศาลใดศาลหนึ่งจำหน่ายคดีซึ่งอยู่ในระหว่างพิจารณานั้นออกเสียจากสารบบความ หรือให้โอนคดีไปยังอีกศาลหนึ่งก็ได้ แล้วแต่กรณี คำสั่งใด ๆ ของอธิบดีผู้พิพากษาศาลอุทธรณ์เช่นว่านี้ให้เป็นที่สุด"},{"id":"๙","num":"มาตรา ๙","num_ara":"๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["ในกรณีดังที่กล่าวในมาตราก่อนนั้น ถ้าศาลใดศาลหนึ่งได้พิพากษาคดีแล้ว และได้มีการยื่นอุทธรณ์คัดค้านคำพิพากษานั้น คู่ความฝ่ายใดฝ่ายหนึ่งอาจยื่นคำขอโดยทำเป็นคำร้องต่อศาลอุทธรณ์ ขอให้มีคำสั่งให้งดการพิจารณาคดีชั้นอุทธรณ์นั้นไว้ก่อน จนกว่าอีกศาลหนึ่งจะได้พิพากษาคดีอีกเรื่องหนึ่งเสร็จแล้วก็ได้ และถ้าได้มีการอุทธรณ์คดีเรื่องหลังนี้ ก็ให้ศาลอุทธรณ์รวมวินิจฉัยคดีทั้งสองนั้นโดยคำพิพากษาเดียวกัน ถ้าคดีเรื่องหลังนั้นไม่มีอุทธรณ์ ให้บังคับตามบทบัญญัติแห่งมาตรา ๑๔๖"],"text":"ในกรณีดังที่กล่าวในมาตราก่อนนั้น ถ้าศาลใดศาลหนึ่งได้พิพากษาคดีแล้ว และได้มีการยื่นอุทธรณ์คัดค้านคำพิพากษานั้น คู่ความฝ่ายใดฝ่ายหนึ่งอาจยื่นคำขอโดยทำเป็นคำร้องต่อศาลอุทธรณ์ ขอให้มีคำสั่งให้งดการพิจารณาคดีชั้นอุทธรณ์นั้นไว้ก่อน จนกว่าอีกศาลหนึ่งจะได้พิพากษาคดีอีกเรื่องหนึ่งเสร็จแล้วก็ได้ และถ้าได้มีการอุทธรณ์คดีเรื่องหลังนี้ ก็ให้ศาลอุทธรณ์รวมวินิจฉัยคดีทั้งสองนั้นโดยคำพิพากษาเดียวกัน ถ้าคดีเรื่องหลังนั้นไม่มีอุทธรณ์ ให้บังคับตามบทบัญญัติแห่งมาตรา ๑๔๖"},{"id":"๑๐","num":"มาตรา ๑๐","num_ara":"๑๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๑ เขตอำนาจศาล","subsection":"","paragraphs":["ถ้าไม่อาจดำเนินกระบวนพิจารณาในศาลชั้นต้นที่มีเขตศาลเหนือคดีนั้นได้โดยเหตุสุดวิสัย คู่ความฝ่ายที่เสียหายหรืออาจเสียหายเพราะการนั้นจะยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องต่อศาลชั้นต้น ซึ่งตนมีภูมิลำเนาหรืออยู่ในเขตศาลในขณะนั้นก็ได้ และให้ศาลนั้นมีอำนาจทำคำสั่งอย่างใดอย่างหนึ่งตามที่เห็นสมควร เพื่อประโยชน์แห่งความยุติธรรม"],"text":"ถ้าไม่อาจดำเนินกระบวนพิจารณาในศาลชั้นต้นที่มีเขตศาลเหนือคดีนั้นได้โดยเหตุสุดวิสัย คู่ความฝ่ายที่เสียหายหรืออาจเสียหายเพราะการนั้นจะยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องต่อศาลชั้นต้น ซึ่งตนมีภูมิลำเนาหรืออยู่ในเขตศาลในขณะนั้นก็ได้ และให้ศาลนั้นมีอำนาจทำคำสั่งอย่างใดอย่างหนึ่งตามที่เห็นสมควร เพื่อประโยชน์แห่งความยุติธรรม"},{"id":"๑๑","num":"มาตรา ๑๑","num_ara":"๑๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๒ การคัดค้านผู้พิพากษา","subsection":"","paragraphs":["เมื่อคดีถึงศาล ผู้พิพากษาคนหนึ่งคนใดในศาลนั้นอาจถูกคัดค้านได้ ในเหตุใดเหตุหนึ่งดังต่อไปนี้","(๑) ถ้าผู้พิพากษานั้นมีผลประโยชน์ได้เสียเกี่ยวข้องอยู่ในคดีนั้น (๒) ถ้าเป็นญาติเกี่ยวข้องกับคู่ความฝ่ายใดฝ่ายหนึ่ง คือว่าเป็นบุพการี หรือผู้สืบสันดานไม่ว่าชั้นใด ๆ หรือเป็นพี่น้องหรือลูกพี่ลูกน้องนับได้เพียงภายในสามชั้น หรือเป็นญาติเกี่ยวพันทางแต่งงานนับได้เพียงสองชั้น (๓) ถ้าเป็นผู้ที่ได้ถูกอ้างเป็นพยานโดยที่ได้รู้ได้เห็นเหตุการณ์ หรือโดยเป็นผู้เชี่ยวชาญมีความรู้เป็นพิเศษเกี่ยวข้องกับคดีนั้น (๔) ถ้าได้เป็นหรือเป็นผู้แทนโดยชอบธรรมหรือผู้แทนหรือได้เป็นทนายความของคู่ความฝ่ายใดฝ่ายหนึ่งมาแล้ว (๕) ถ้าได้เป็นผู้พิพากษานั่งพิจารณาคดีเดียวกันนั้นในศาลอื่นมาแล้ว หรือเป็นอนุญาโตตุลาการมาแล้ว (๖) ถ้ามีคดีอีกเรื่องหนึ่งอยู่ในระหว่างพิจารณาซึ่งผู้พิพากษานั้นเอง หรือภริยา หรือญาติทางสืบสายโลหิตตรงขึ้นไป หรือตรงลงมาของผู้พิพากษานั้นฝ่ายหนึ่ง พิพาทกับคู่ความฝ่ายใดฝ่ายหนึ่ง หรือภริยา หรือญาติทางสืบสายโลหิตตรงขึ้นไปหรือตรงลงมาของคู่ความฝ่ายนั้นอีกฝ่ายหนึ่ง (๗) ถ้าผู้พิพากษานั้นเป็นเจ้าหนี้หรือลูกหนี้ หรือเป็นนายจ้างของคู่ความฝ่ายใดฝ่ายหนึ่ง"],"text":"เมื่อคดีถึงศาล ผู้พิพากษาคนหนึ่งคนใดในศาลนั้นอาจถูกคัดค้านได้ ในเหตุใดเหตุหนึ่งดังต่อไปนี้\n\n(๑) ถ้าผู้พิพากษานั้นมีผลประโยชน์ได้เสียเกี่ยวข้องอยู่ในคดีนั้น (๒) ถ้าเป็นญาติเกี่ยวข้องกับคู่ความฝ่ายใดฝ่ายหนึ่ง คือว่าเป็นบุพการี หรือผู้สืบสันดานไม่ว่าชั้นใด ๆ หรือเป็นพี่น้องหรือลูกพี่ลูกน้องนับได้เพียงภายในสามชั้น หรือเป็นญาติเกี่ยวพันทางแต่งงานนับได้เพียงสองชั้น (๓) ถ้าเป็นผู้ที่ได้ถูกอ้างเป็นพยานโดยที่ได้รู้ได้เห็นเหตุการณ์ หรือโดยเป็นผู้เชี่ยวชาญมีความรู้เป็นพิเศษเกี่ยวข้องกับคดีนั้น (๔) ถ้าได้เป็นหรือเป็นผู้แทนโดยชอบธรรมหรือผู้แทนหรือได้เป็นทนายความของคู่ความฝ่ายใดฝ่ายหนึ่งมาแล้ว (๕) ถ้าได้เป็นผู้พิพากษานั่งพิจารณาคดีเดียวกันนั้นในศาลอื่นมาแล้ว หรือเป็นอนุญาโตตุลาการมาแล้ว (๖) ถ้ามีคดีอีกเรื่องหนึ่งอยู่ในระหว่างพิจารณาซึ่งผู้พิพากษานั้นเอง หรือภริยา หรือญาติทางสืบสายโลหิตตรงขึ้นไป หรือตรงลงมาของผู้พิพากษานั้นฝ่ายหนึ่ง พิพาทกับคู่ความฝ่ายใดฝ่ายหนึ่ง หรือภริยา หรือญาติทางสืบสายโลหิตตรงขึ้นไปหรือตรงลงมาของคู่ความฝ่ายนั้นอีกฝ่ายหนึ่ง (๗) ถ้าผู้พิพากษานั้นเป็นเจ้าหนี้หรือลูกหนี้ หรือเป็นนายจ้างของคู่ความฝ่ายใดฝ่ายหนึ่ง"},{"id":"๑๒","num":"มาตรา ๑๒","num_ara":"๑๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๒ การคัดค้านผู้พิพากษา","subsection":"","paragraphs":["เมื่อศาลใดมีผู้พิพากษาแต่เพียงคนเดียว ผู้พิพากษานั้นอาจถูกคัดค้านด้วยเหตุใดเหตุหนึ่งตามที่กำหนดไว้ในมาตราก่อนนั้นได้ หรือด้วยเหตุประการอื่นอันมีสภาพร้ายแรงซึ่งอาจทำให้การพิจารณาหรือพิพากษาคดีเสียความยุติธรรมไป"],"text":"เมื่อศาลใดมีผู้พิพากษาแต่เพียงคนเดียว ผู้พิพากษานั้นอาจถูกคัดค้านด้วยเหตุใดเหตุหนึ่งตามที่กำหนดไว้ในมาตราก่อนนั้นได้ หรือด้วยเหตุประการอื่นอันมีสภาพร้ายแรงซึ่งอาจทำให้การพิจารณาหรือพิพากษาคดีเสียความยุติธรรมไป"},{"id":"๑๓","num":"มาตรา ๑๓","num_ara":"๑๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๒ การคัดค้านผู้พิพากษา","subsection":"","paragraphs":["ถ้ามีเหตุที่จะคัดค้านได้อย่างใดอย่างหนึ่งดังที่กล่าวไว้ในสองมาตราก่อนเกิดขึ้นแก่ผู้พิพากษาคนใดที่นั่งในศาล","(๑) ผู้พิพากษานั้นเองจะยื่นคำบอกกล่าวต่อศาลแสดงเหตุที่ตนอาจถูกคัดค้าน แล้วขอถอนตัวออกจากการนั่งพิจารณาคดีนั้นก็ได้ (๒) คู่ความที่เกี่ยวข้องอาจยกข้อคัดค้านขึ้นอ้างโดยทำเป็นคำร้องยื่นต่อศาล แต่ถ้าตนได้ทราบเหตุที่พึงคัดค้านได้ก่อนวันสืบพยาน ก็ให้ยื่นคำร้องคัดค้านเสียก่อนวันสืบพยานนั้น หรือถ้าทราบเหตุที่พึงคัดค้านได้ในระหว่างพิจารณา ก็ให้ยื่นคำร้องคัดค้านไม่ช้ากว่าวันนัดสืบพยานครั้งต่อไป แต่ต้องก่อนเริ่มสืบพยานเช่นว่านั้น เมื่อได้ยื่นคำร้องดังกล่าวแล้ว ให้ศาลงดกระบวนพิจารณาทั้งปวงไว้ก่อนจนกว่าจะได้มีคำชี้ขาดในเรื่องที่คัดค้านนั้นแล้ว แต่ความข้อนี้มิให้ใช้แก่กระบวนพิจารณาซึ่งจะต้องดำเนินโดยมิชักช้า อนึ่ง กระบวนพิจารณาทั้งหลายที่ได้ดำเนินไปก่อนได้ยื่นคำร้องคัดค้านก็ดี และกระบวนพิจารณาทั้งหลายในคดีที่จะต้องดำเนินโดยมิชักช้า แม้ถึงว่าจะได้ดำเนินไปภายหลังที่ได้ยื่นคำร้องคัดค้านก็ดี เหล่านี้ย่อมสมบูรณ์ไม่เสียไป เพราะเหตุที่ศาลมีคำสั่งยอมฟังคำคัดค้าน เว้นแต่ศาลจะได้กำหนดไว้ในคำสั่งเป็นอย่างอื่น ถ้าศาลใดมีผู้พิพากษาคนเดียว และผู้พิพากษาคนนั้นถูกคัดค้าน หรือถ้าศาลใดมีผู้พิพากษาหลายคน และผู้พิพากษาทั้งหมดถูกคัดค้าน ให้ศาลซึ่งมีอำนาจสูงกว่าศาลนั้นตามลำดับเป็นผู้ชี้ขาดคำคัดค้าน ถ้าศาลใดมีผู้พิพากษาหลายคน และผู้พิพากษาที่มิได้ถูกคัดค้านรวมทั้งข้าหลวงยุติธรรม ถ้าได้นั่งพิจารณาด้วยมีจำนวนครบที่จะเป็นองค์คณะและมีเสียงข้างมากตามที่กฎหมายต้องการ ให้ศาลเช่นว่านั้นเป็นผู้ชี้ขาดคำคัดค้าน แต่ในกรณีที่อยู่ในอำนาจของผู้พิพากษาคนเดียวจะชี้ขาดคำคัดค้าน ห้ามมิให้ผู้พิพากษาคนนั้นมีคำสั่งให้ยกคำคัดค้านโดยผู้พิพากษาอีกคนหนึ่งหรือข้าหลวงยุติธรรมมิได้เห็นพ้องด้วย ถ้าศาลใดมีผู้พิพากษาหลายคน และผู้พิพากษาที่มิได้ถูกคัดค้าน แม้จะนับรวมข้าหลวงยุติธรรมเข้าด้วย ยังมีจำนวนไม่ครบที่จะเป็นองค์คณะและมีเสียงข้างมากตามที่กฎหมายต้องการ หรือถ้าผู้พิพากษาคนเดียวไม่สามารถมีคำสั่งให้ยกคำคัดค้านเสียด้วยความเห็นพ้องของผู้พิพากษาอีกคนหนึ่ง หรือข้าหลวงยุติธรรมตามที่บัญญัติไว้ในวรรคก่อน ให้ศาลซึ่งมีอำนาจสูงกว่าศาลนั้นตามลำดับเป็นผู้ชี้ขาดคำคัดค้าน"],"text":"ถ้ามีเหตุที่จะคัดค้านได้อย่างใดอย่างหนึ่งดังที่กล่าวไว้ในสองมาตราก่อนเกิดขึ้นแก่ผู้พิพากษาคนใดที่นั่งในศาล\n\n(๑) ผู้พิพากษานั้นเองจะยื่นคำบอกกล่าวต่อศาลแสดงเหตุที่ตนอาจถูกคัดค้าน แล้วขอถอนตัวออกจากการนั่งพิจารณาคดีนั้นก็ได้ (๒) คู่ความที่เกี่ยวข้องอาจยกข้อคัดค้านขึ้นอ้างโดยทำเป็นคำร้องยื่นต่อศาล แต่ถ้าตนได้ทราบเหตุที่พึงคัดค้านได้ก่อนวันสืบพยาน ก็ให้ยื่นคำร้องคัดค้านเสียก่อนวันสืบพยานนั้น หรือถ้าทราบเหตุที่พึงคัดค้านได้ในระหว่างพิจารณา ก็ให้ยื่นคำร้องคัดค้านไม่ช้ากว่าวันนัดสืบพยานครั้งต่อไป แต่ต้องก่อนเริ่มสืบพยานเช่นว่านั้น เมื่อได้ยื่นคำร้องดังกล่าวแล้ว ให้ศาลงดกระบวนพิจารณาทั้งปวงไว้ก่อนจนกว่าจะได้มีคำชี้ขาดในเรื่องที่คัดค้านนั้นแล้ว แต่ความข้อนี้มิให้ใช้แก่กระบวนพิจารณาซึ่งจะต้องดำเนินโดยมิชักช้า อนึ่ง กระบวนพิจารณาทั้งหลายที่ได้ดำเนินไปก่อนได้ยื่นคำร้องคัดค้านก็ดี และกระบวนพิจารณาทั้งหลายในคดีที่จะต้องดำเนินโดยมิชักช้า แม้ถึงว่าจะได้ดำเนินไปภายหลังที่ได้ยื่นคำร้องคัดค้านก็ดี เหล่านี้ย่อมสมบูรณ์ไม่เสียไป เพราะเหตุที่ศาลมีคำสั่งยอมฟังคำคัดค้าน เว้นแต่ศาลจะได้กำหนดไว้ในคำสั่งเป็นอย่างอื่น ถ้าศาลใดมีผู้พิพากษาคนเดียว และผู้พิพากษาคนนั้นถูกคัดค้าน หรือถ้าศาลใดมีผู้พิพากษาหลายคน และผู้พิพากษาทั้งหมดถูกคัดค้าน ให้ศาลซึ่งมีอำนาจสูงกว่าศาลนั้นตามลำดับเป็นผู้ชี้ขาดคำคัดค้าน ถ้าศาลใดมีผู้พิพากษาหลายคน และผู้พิพากษาที่มิได้ถูกคัดค้านรวมทั้งข้าหลวงยุติธรรม ถ้าได้นั่งพิจารณาด้วยมีจำนวนครบที่จะเป็นองค์คณะและมีเสียงข้างมากตามที่กฎหมายต้องการ ให้ศาลเช่นว่านั้นเป็นผู้ชี้ขาดคำคัดค้าน แต่ในกรณีที่อยู่ในอำนาจของผู้พิพากษาคนเดียวจะชี้ขาดคำคัดค้าน ห้ามมิให้ผู้พิพากษาคนนั้นมีคำสั่งให้ยกคำคัดค้านโดยผู้พิพากษาอีกคนหนึ่งหรือข้าหลวงยุติธรรมมิได้เห็นพ้องด้วย ถ้าศาลใดมีผู้พิพากษาหลายคน และผู้พิพากษาที่มิได้ถูกคัดค้าน แม้จะนับรวมข้าหลวงยุติธรรมเข้าด้วย ยังมีจำนวนไม่ครบที่จะเป็นองค์คณะและมีเสียงข้างมากตามที่กฎหมายต้องการ หรือถ้าผู้พิพากษาคนเดียวไม่สามารถมีคำสั่งให้ยกคำคัดค้านเสียด้วยความเห็นพ้องของผู้พิพากษาอีกคนหนึ่ง หรือข้าหลวงยุติธรรมตามที่บัญญัติไว้ในวรรคก่อน ให้ศาลซึ่งมีอำนาจสูงกว่าศาลนั้นตามลำดับเป็นผู้ชี้ขาดคำคัดค้าน"},{"id":"๑๔","num":"มาตรา ๑๔","num_ara":"๑๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๒ การคัดค้านผู้พิพากษา","subsection":"","paragraphs":["เมื่อได้มีการร้องคัดค้านขึ้น และผู้พิพากษาที่ถูกคัดค้านไม่ยอมถอนตัวออกจากการนั่งพิจารณาคดี ให้ศาลฟังคำแถลงของคู่ความฝ่ายที่เกี่ยวข้องและของผู้พิพากษาที่ถูกคัดค้าน กับทำการสืบพยานหลักฐานที่บุคคลเหล่านั้นได้นำมาและพยานหลักฐานอื่นตามที่เห็นสมควร แล้วออกคำสั่งยอมรับหรือยกเสียซึ่งคำคัดค้านนั้น คำสั่งเช่นว่านี้ให้เป็นที่สุด เมื่อศาลที่ผู้พิพากษาแห่งศาลนั้นเองถูกคัดค้าน จะต้องวินิจฉัยชี้ขาดคำคัดค้าน ห้ามมิให้ผู้พิพากษาที่ถูกคัดค้านนั้นนั่งหรือออกเสียงกับผู้พิพากษาอื่น ๆ ในการพิจารณาและชี้ขาดคำคัดค้านนั้น ถ้าผู้พิพากษาคนใดได้ถอนตัวออกจากการนั่งพิจารณาคดีก็ดี หรือศาลได้ยอมรับคำคัดค้านผู้พิพากษาคนใดก็ดี ให้ผู้พิพากษาคนอื่นทำการแทนตามบทบัญญัติในพระธรรมนูญศาลยุติธรรม"],"text":"เมื่อได้มีการร้องคัดค้านขึ้น และผู้พิพากษาที่ถูกคัดค้านไม่ยอมถอนตัวออกจากการนั่งพิจารณาคดี ให้ศาลฟังคำแถลงของคู่ความฝ่ายที่เกี่ยวข้องและของผู้พิพากษาที่ถูกคัดค้าน กับทำการสืบพยานหลักฐานที่บุคคลเหล่านั้นได้นำมาและพยานหลักฐานอื่นตามที่เห็นสมควร แล้วออกคำสั่งยอมรับหรือยกเสียซึ่งคำคัดค้านนั้น คำสั่งเช่นว่านี้ให้เป็นที่สุด เมื่อศาลที่ผู้พิพากษาแห่งศาลนั้นเองถูกคัดค้าน จะต้องวินิจฉัยชี้ขาดคำคัดค้าน ห้ามมิให้ผู้พิพากษาที่ถูกคัดค้านนั้นนั่งหรือออกเสียงกับผู้พิพากษาอื่น ๆ ในการพิจารณาและชี้ขาดคำคัดค้านนั้น ถ้าผู้พิพากษาคนใดได้ถอนตัวออกจากการนั่งพิจารณาคดีก็ดี หรือศาลได้ยอมรับคำคัดค้านผู้พิพากษาคนใดก็ดี ให้ผู้พิพากษาคนอื่นทำการแทนตามบทบัญญัติในพระธรรมนูญศาลยุติธรรม"},{"id":"๑๕","num":"มาตรา ๑๕","num_ara":"๑๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ห้ามมิให้ศาลใช้อำนาจนอกเขตศาล เว้นแต่","(๑) ถ้าบุคคลผู้ที่จะถูกซักถามหรือถูกตรวจ หรือบุคคลผู้เป็นเจ้าของทรัพย์หรือสถานที่ซึ่งจะถูกตรวจมิได้ยกเรื่องเขตศาลขึ้นคัดค้าน ศาลจะทำการซักถามหรือตรวจดังว่านั้นนอกเขตศาลก็ได้ (๒) ศาลจะออกหมายเรียกคู่ความหรือบุคคลนอกเขตศาลก็ได้ ส่วนการที่จะนำบทบัญญัติมาตรา ๓๑, ๓๓, ๑๐๘, ๑๐๙ และ ๑๑๑ แห่งประมวลกฎหมายนี้ และมาตรา ๑๔๗ แห่งกฎหมายลักษณะอาญามาใช้บังคับได้นั้น ต้องให้ศาลซึ่งมีอำนาจในเขตศาลนั้นสลักหลังหมายเสียก่อน (๓) หมายบังคับคดีและหมายของศาลที่ออกให้จับและกักขังบุคคลใดตามบทบัญญัติแห่งประมวลกฎหมายนี้ อาจบังคับได้ไม่ว่าในที่ใด ๆ ในกรณีที่มีการบังคับคดีนอกเขตศาลที่มีอำนาจในการบังคับคดี ให้บังคับตามมาตรา ๒๗๑ วรรคสาม วรรคสี่ และวรรคห้า คดีที่ศาลแพ่งได้รับไว้พิจารณาพิพากษาตามพระธรรมนูญศาลยุติธรรมหรือที่ได้โอนไปยังศาลแพ่งตามมาตรา ๖/๑ ให้ศาลแพ่งมีอำนาจดำเนินกระบวนพิจารณาใด ๆ นอกเขตศาลได้ตามที่เห็นสมควร"],"text":"ห้ามมิให้ศาลใช้อำนาจนอกเขตศาล เว้นแต่\n\n(๑) ถ้าบุคคลผู้ที่จะถูกซักถามหรือถูกตรวจ หรือบุคคลผู้เป็นเจ้าของทรัพย์หรือสถานที่ซึ่งจะถูกตรวจมิได้ยกเรื่องเขตศาลขึ้นคัดค้าน ศาลจะทำการซักถามหรือตรวจดังว่านั้นนอกเขตศาลก็ได้ (๒) ศาลจะออกหมายเรียกคู่ความหรือบุคคลนอกเขตศาลก็ได้ ส่วนการที่จะนำบทบัญญัติมาตรา ๓๑, ๓๓, ๑๐๘, ๑๐๙ และ ๑๑๑ แห่งประมวลกฎหมายนี้ และมาตรา ๑๔๗ แห่งกฎหมายลักษณะอาญามาใช้บังคับได้นั้น ต้องให้ศาลซึ่งมีอำนาจในเขตศาลนั้นสลักหลังหมายเสียก่อน (๓) หมายบังคับคดีและหมายของศาลที่ออกให้จับและกักขังบุคคลใดตามบทบัญญัติแห่งประมวลกฎหมายนี้ อาจบังคับได้ไม่ว่าในที่ใด ๆ ในกรณีที่มีการบังคับคดีนอกเขตศาลที่มีอำนาจในการบังคับคดี ให้บังคับตามมาตรา ๒๗๑ วรรคสาม วรรคสี่ และวรรคห้า คดีที่ศาลแพ่งได้รับไว้พิจารณาพิพากษาตามพระธรรมนูญศาลยุติธรรมหรือที่ได้โอนไปยังศาลแพ่งตามมาตรา ๖/๑ ให้ศาลแพ่งมีอำนาจดำเนินกระบวนพิจารณาใด ๆ นอกเขตศาลได้ตามที่เห็นสมควร"},{"id":"๑๖","num":"มาตรา ๑๖","num_ara":"๑๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ถ้าจะต้องทำการซักถาม หรือตรวจ หรือดำเนินกระบวนพิจารณาใด ๆ","(๑) โดยศาลชั้นต้นศาลใด นอกเขตศาลนั้น หรือ (๒) โดยศาลแพ่งหรือศาลอาญา นอกเขตจังหวัดพระนครและธนบุรีหรือโดยศาลอุทธรณ์หรือฎีกา ให้ศาลที่กล่าวแล้วมีอำนาจที่จะแต่งตั้งศาลอื่นที่เป็นศาลชั้นต้นให้ทำการซักถาม หรือตรวจภายในบังคับบทบัญญัติมาตรา ๑๐๒ หรือดำเนินกระบวนพิจารณาแทนได้"],"text":"ถ้าจะต้องทำการซักถาม หรือตรวจ หรือดำเนินกระบวนพิจารณาใด ๆ\n\n(๑) โดยศาลชั้นต้นศาลใด นอกเขตศาลนั้น หรือ (๒) โดยศาลแพ่งหรือศาลอาญา นอกเขตจังหวัดพระนครและธนบุรีหรือโดยศาลอุทธรณ์หรือฎีกา ให้ศาลที่กล่าวแล้วมีอำนาจที่จะแต่งตั้งศาลอื่นที่เป็นศาลชั้นต้นให้ทำการซักถาม หรือตรวจภายในบังคับบทบัญญัติมาตรา ๑๐๒ หรือดำเนินกระบวนพิจารณาแทนได้"},{"id":"๑๗","num":"มาตรา ๑๗","num_ara":"๑๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["คดีที่ได้ยื่นฟ้องไว้ต่อศาลนั้น ให้ศาลดำเนินการไปตามลำดับเลขหมายสำนวนในสารบบความ เว้นแต่ศาลจะกำหนดเป็นอย่างอื่นเมื่อมีเหตุผลพิเศษ"],"text":"คดีที่ได้ยื่นฟ้องไว้ต่อศาลนั้น ให้ศาลดำเนินการไปตามลำดับเลขหมายสำนวนในสารบบความ เว้นแต่ศาลจะกำหนดเป็นอย่างอื่นเมื่อมีเหตุผลพิเศษ"},{"id":"๑๘","num":"มาตรา ๑๘","num_ara":"๑๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ให้ศาลมีอำนาจที่จะตรวจคำคู่ความที่พนักงานเจ้าหน้าที่ของศาลได้รับไว้เพื่อยื่นต่อศาล หรือส่งให้แก่คู่ความ หรือบุคคลใด ๆ ถ้าศาลเห็นว่าคำคู่ความที่ได้ยื่นไว้ดังกล่าวแล้วนั้น อ่านไม่ออก หรืออ่านไม่เข้าใจ หรือเขียนฟุ่มเฟือยเกินไป หรือไม่มีรายการ ไม่มีลายมือชื่อ ไม่แนบเอกสารต่าง ๆ ตามที่กฎหมายต้องการ หรือมิได้ชำระหรือวางค่าธรรมเนียมศาลโดยถูกต้องครบถ้วน ศาลจะมีคำสั่งให้คืนคำคู่ความนั้นไปให้ทำมาใหม่ หรือแก้ไขเพิ่มเติม หรือชำระหรือวางค่าธรรมเนียมศาลให้ถูกต้องครบถ้วน ภายในระยะเวลาและกำหนดเงื่อนไขใด ๆ ตลอดจนเรื่องค่าฤชาธรรมเนียมตามที่ศาลเห็นสมควรก็ได้ ถ้ามิได้ปฏิบัติตามข้อกำหนดของศาลในระยะเวลาหรือเงื่อนไขที่กำหนดไว้ก็ให้มีคำสั่งไม่รับคำคู่ความนั้น ถ้าศาลเห็นว่าคำคู่ความที่ได้นำมายื่นดังกล่าวข้างต้น มิได้เป็นไปตามเงื่อนไขแห่งกฎหมายที่บังคับไว้ นอกจากที่กล่าวมาในวรรคก่อน และโดยเฉพาะอย่างยิ่ง เมื่อเห็นว่าสิทธิของคู่ความหรือบุคคลซึ่งยื่นคำคู่ความนั้นได้ถูกจำกัดห้ามโดยบทบัญญัติแห่งกฎหมายเรื่องเขตอำนาจศาล ก็ให้ศาลมีคำสั่งไม่รับหรือคืนคำคู่ความนั้นไปเพื่อยื่นต่อศาลที่มีเขตอำนาจ ถ้าไม่มีข้อขัดข้องดังกล่าวแล้ว ก็ให้ศาลจดแจ้งแสดงการรับคำคู่ความนั้นไว้บนคำคู่ความนั้นเองหรือในที่อื่น คำสั่งของศาลที่ไม่รับหรือให้คืนคำคู่ความตามมาตรานี้ ให้อุทธรณ์และฎีกาได้ตามที่บัญญัติไว้ในมาตรา ๒๒๗, ๒๒๘ และ ๒๔๗"],"text":"ให้ศาลมีอำนาจที่จะตรวจคำคู่ความที่พนักงานเจ้าหน้าที่ของศาลได้รับไว้เพื่อยื่นต่อศาล หรือส่งให้แก่คู่ความ หรือบุคคลใด ๆ ถ้าศาลเห็นว่าคำคู่ความที่ได้ยื่นไว้ดังกล่าวแล้วนั้น อ่านไม่ออก หรืออ่านไม่เข้าใจ หรือเขียนฟุ่มเฟือยเกินไป หรือไม่มีรายการ ไม่มีลายมือชื่อ ไม่แนบเอกสารต่าง ๆ ตามที่กฎหมายต้องการ หรือมิได้ชำระหรือวางค่าธรรมเนียมศาลโดยถูกต้องครบถ้วน ศาลจะมีคำสั่งให้คืนคำคู่ความนั้นไปให้ทำมาใหม่ หรือแก้ไขเพิ่มเติม หรือชำระหรือวางค่าธรรมเนียมศาลให้ถูกต้องครบถ้วน ภายในระยะเวลาและกำหนดเงื่อนไขใด ๆ ตลอดจนเรื่องค่าฤชาธรรมเนียมตามที่ศาลเห็นสมควรก็ได้ ถ้ามิได้ปฏิบัติตามข้อกำหนดของศาลในระยะเวลาหรือเงื่อนไขที่กำหนดไว้ก็ให้มีคำสั่งไม่รับคำคู่ความนั้น ถ้าศาลเห็นว่าคำคู่ความที่ได้นำมายื่นดังกล่าวข้างต้น มิได้เป็นไปตามเงื่อนไขแห่งกฎหมายที่บังคับไว้ นอกจากที่กล่าวมาในวรรคก่อน และโดยเฉพาะอย่างยิ่ง เมื่อเห็นว่าสิทธิของคู่ความหรือบุคคลซึ่งยื่นคำคู่ความนั้นได้ถูกจำกัดห้ามโดยบทบัญญัติแห่งกฎหมายเรื่องเขตอำนาจศาล ก็ให้ศาลมีคำสั่งไม่รับหรือคืนคำคู่ความนั้นไปเพื่อยื่นต่อศาลที่มีเขตอำนาจ ถ้าไม่มีข้อขัดข้องดังกล่าวแล้ว ก็ให้ศาลจดแจ้งแสดงการรับคำคู่ความนั้นไว้บนคำคู่ความนั้นเองหรือในที่อื่น คำสั่งของศาลที่ไม่รับหรือให้คืนคำคู่ความตามมาตรานี้ ให้อุทธรณ์และฎีกาได้ตามที่บัญญัติไว้ในมาตรา ๒๒๗, ๒๒๘ และ ๒๔๗"},{"id":"๑๙","num":"มาตรา ๑๙","num_ara":"๑๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ศาลมีอำนาจสั่งได้ตามที่เห็นสมควรให้คู่ความทุกฝ่าย หรือฝ่ายใดฝ่ายหนึ่งมาศาลด้วยตนเอง ถึงแม้ว่าคู่ความนั้น ๆ จะได้มีทนายความว่าต่างแก้ต่างอยู่แล้วก็ดี อนึ่ง ถ้าศาลเห็นว่าการที่คู่ความมาศาลด้วยตนเองอาจยังให้เกิดความตกลงหรือการประนีประนอมยอมความดังที่บัญญัติไว้ในมาตราต่อไปนี้ ก็ให้ศาลสั่งให้คู่ความมาศาลด้วยตนเอง"],"text":"ศาลมีอำนาจสั่งได้ตามที่เห็นสมควรให้คู่ความทุกฝ่าย หรือฝ่ายใดฝ่ายหนึ่งมาศาลด้วยตนเอง ถึงแม้ว่าคู่ความนั้น ๆ จะได้มีทนายความว่าต่างแก้ต่างอยู่แล้วก็ดี อนึ่ง ถ้าศาลเห็นว่าการที่คู่ความมาศาลด้วยตนเองอาจยังให้เกิดความตกลงหรือการประนีประนอมยอมความดังที่บัญญัติไว้ในมาตราต่อไปนี้ ก็ให้ศาลสั่งให้คู่ความมาศาลด้วยตนเอง"},{"id":"๒๐","num":"มาตรา ๒๐","num_ara":"๒๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ไม่ว่าการพิจารณาคดีจะได้ดำเนินไปแล้วเพียงใด ให้ศาลมีอำนาจที่จะไกล่เกลี่ยให้คู่ความได้ตกลงกัน หรือประนีประนอมยอมความกันในข้อที่พิพาทนั้น"],"text":"ไม่ว่าการพิจารณาคดีจะได้ดำเนินไปแล้วเพียงใด ให้ศาลมีอำนาจที่จะไกล่เกลี่ยให้คู่ความได้ตกลงกัน หรือประนีประนอมยอมความกันในข้อที่พิพาทนั้น"},{"id":"๒๐_ทวิ","num":"มาตรา ๒๐ ทวิ","num_ara":"๒๐ ทวิ","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["เพื่อประโยชน์ในการไกล่เกลี่ย เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งร้องขอ ศาลจะสั่งให้ดำเนินการเป็นการลับเฉพาะต่อหน้าตัวความทุกฝ่ายหรือฝ่ายใดฝ่ายหนึ่ง โดยจะให้มีทนายความอยู่ด้วยหรือไม่ก็ได้ เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งร้องขอ ศาลอาจแต่งตั้งบุคคลหรือคณะบุคคลเป็นผู้ประนีประนอม เพื่อช่วยเหลือศาลในการไกล่เกลี่ยให้คู่ความได้ประนีประนอมกัน หลักเกณฑ์และวิธีการในการไกล่เกลี่ยของศาล การแต่งตั้งผู้ประนีประนอม รวมทั้งอำนาจหน้าที่ของผู้ประนีประนอม ให้เป็นไปตามที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ของศาลฎีกา ข้อกำหนดของประธานศาลฎีกาตามวรรคสาม เมื่อได้ประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"],"text":"เพื่อประโยชน์ในการไกล่เกลี่ย เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งร้องขอ ศาลจะสั่งให้ดำเนินการเป็นการลับเฉพาะต่อหน้าตัวความทุกฝ่ายหรือฝ่ายใดฝ่ายหนึ่ง โดยจะให้มีทนายความอยู่ด้วยหรือไม่ก็ได้ เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งร้องขอ ศาลอาจแต่งตั้งบุคคลหรือคณะบุคคลเป็นผู้ประนีประนอม เพื่อช่วยเหลือศาลในการไกล่เกลี่ยให้คู่ความได้ประนีประนอมกัน หลักเกณฑ์และวิธีการในการไกล่เกลี่ยของศาล การแต่งตั้งผู้ประนีประนอม รวมทั้งอำนาจหน้าที่ของผู้ประนีประนอม ให้เป็นไปตามที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ของศาลฎีกา ข้อกำหนดของประธานศาลฎีกาตามวรรคสาม เมื่อได้ประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"},{"id":"๒๐_ตรี","num":"มาตรา ๒๐ ตรี","num_ara":"๒๐ ตรี","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ก่อนยื่นฟ้องคดี บุคคลที่จะเป็นคู่ความอาจยื่นคำร้องต่อศาลที่มีเขตอำนาจหากมีการฟ้องคดีนั้น เพื่อขอให้ศาลแต่งตั้งผู้ประนีประนอมทำหน้าที่ไกล่เกลี่ยให้คู่กรณีที่เกี่ยวข้องได้ตกลงหรือประนีประนอมยอมความกันในข้อที่พิพาท โดยคำร้องนั้นให้ระบุชื่อและภูมิลำเนาของคู่กรณีที่เกี่ยวข้อง รวมทั้งรายละเอียดของข้อพิพาท เมื่อศาลเห็นสมควร ให้ศาลรับคำร้องนั้นไว้แล้วดำเนินการสอบถามความสมัครใจของคู่กรณีอีกฝ่ายหนึ่งในการเข้าร่วมการไกล่เกลี่ย หากคู่กรณีอีกฝ่ายหนึ่งยินยอมเข้าร่วมการไกล่เกลี่ย ให้ศาลมีอำนาจเรียกคู่กรณีที่เกี่ยวข้องมาศาลด้วยตนเองโดยคู่กรณีจะมีทนายความมาด้วยหรือไม่ก็ได้ และแต่งตั้งผู้ประนีประนอมดำเนินการไกล่เกลี่ยต่อไปโดยให้นำความในมาตรา ๒๐ ทวิ มาใช้บังคับโดยอนุโลม ถ้าคู่กรณีที่เกี่ยวข้องสามารถตกลงหรือประนีประนอมยอมความกันได้ ให้ผู้ประนีประนอมเสนอข้อตกลงหรือสัญญาประนีประนอมยอมความต่อศาล หากศาลพิจารณาแล้วเห็นว่าข้อตกลงหรือสัญญาประนีประนอมยอมความเป็นไปตามเจตนาของคู่กรณี หลักแห่งความสุจริต เป็นธรรม และไม่ฝ่าฝืนต่อกฎหมาย ก็ให้คู่กรณีลงลายมือชื่อในข้อตกลงหรือสัญญาประนีประนอมยอมความนั้น ในวันทำข้อตกลงหรือสัญญาประนีประนอมยอมความตามวรรคหนึ่งคู่สัญญาอาจร้องขอให้ศาลมีคำพิพากษาตามยอม พร้อมแสดงเหตุผลความจำเป็นต่อศาล หากศาลเห็นว่ากรณีมีความจำเป็นที่สมควรจะมีคำพิพากษาไปในเวลานั้น ก็ให้ศาลมีคำพิพากษาไปตามข้อตกลงหรือสัญญาประนีประนอมยอมความดังกล่าวได้โดยให้นำความในมาตรา ๑๓๘ มาใช้บังคับโดยอนุโลม การขอและการดำเนินการตามมาตรานี้ ไม่ต้องเสียค่าขึ้นศาล คำสั่งของศาลที่ออกตามความในมาตรานี้ให้เป็นที่สุด เมื่อศาลมีคำสั่งแต่งตั้งผู้ประนีประนอมแล้วแต่การไกล่เกลี่ยสิ้นสุดลงโดยไม่เป็นผล หากปรากฏว่าอายุความครบกำหนดไปแล้วหลังจากยื่นคำร้องหรือจะครบกำหนดภายในหกสิบวันนับแต่วันที่การไกล่เกลี่ยสิ้นสุดลง ให้อายุความขยายออกไปอีกหกสิบวันนับแต่วันที่การไกล่เกลี่ยสิ้นสุดลง"],"text":"ก่อนยื่นฟ้องคดี บุคคลที่จะเป็นคู่ความอาจยื่นคำร้องต่อศาลที่มีเขตอำนาจหากมีการฟ้องคดีนั้น เพื่อขอให้ศาลแต่งตั้งผู้ประนีประนอมทำหน้าที่ไกล่เกลี่ยให้คู่กรณีที่เกี่ยวข้องได้ตกลงหรือประนีประนอมยอมความกันในข้อที่พิพาท โดยคำร้องนั้นให้ระบุชื่อและภูมิลำเนาของคู่กรณีที่เกี่ยวข้อง รวมทั้งรายละเอียดของข้อพิพาท เมื่อศาลเห็นสมควร ให้ศาลรับคำร้องนั้นไว้แล้วดำเนินการสอบถามความสมัครใจของคู่กรณีอีกฝ่ายหนึ่งในการเข้าร่วมการไกล่เกลี่ย หากคู่กรณีอีกฝ่ายหนึ่งยินยอมเข้าร่วมการไกล่เกลี่ย ให้ศาลมีอำนาจเรียกคู่กรณีที่เกี่ยวข้องมาศาลด้วยตนเองโดยคู่กรณีจะมีทนายความมาด้วยหรือไม่ก็ได้ และแต่งตั้งผู้ประนีประนอมดำเนินการไกล่เกลี่ยต่อไปโดยให้นำความในมาตรา ๒๐ ทวิ มาใช้บังคับโดยอนุโลม ถ้าคู่กรณีที่เกี่ยวข้องสามารถตกลงหรือประนีประนอมยอมความกันได้ ให้ผู้ประนีประนอมเสนอข้อตกลงหรือสัญญาประนีประนอมยอมความต่อศาล หากศาลพิจารณาแล้วเห็นว่าข้อตกลงหรือสัญญาประนีประนอมยอมความเป็นไปตามเจตนาของคู่กรณี หลักแห่งความสุจริต เป็นธรรม และไม่ฝ่าฝืนต่อกฎหมาย ก็ให้คู่กรณีลงลายมือชื่อในข้อตกลงหรือสัญญาประนีประนอมยอมความนั้น ในวันทำข้อตกลงหรือสัญญาประนีประนอมยอมความตามวรรคหนึ่งคู่สัญญาอาจร้องขอให้ศาลมีคำพิพากษาตามยอม พร้อมแสดงเหตุผลความจำเป็นต่อศาล หากศาลเห็นว่ากรณีมีความจำเป็นที่สมควรจะมีคำพิพากษาไปในเวลานั้น ก็ให้ศาลมีคำพิพากษาไปตามข้อตกลงหรือสัญญาประนีประนอมยอมความดังกล่าวได้โดยให้นำความในมาตรา ๑๓๘ มาใช้บังคับโดยอนุโลม การขอและการดำเนินการตามมาตรานี้ ไม่ต้องเสียค่าขึ้นศาล คำสั่งของศาลที่ออกตามความในมาตรานี้ให้เป็นที่สุด เมื่อศาลมีคำสั่งแต่งตั้งผู้ประนีประนอมแล้วแต่การไกล่เกลี่ยสิ้นสุดลงโดยไม่เป็นผล หากปรากฏว่าอายุความครบกำหนดไปแล้วหลังจากยื่นคำร้องหรือจะครบกำหนดภายในหกสิบวันนับแต่วันที่การไกล่เกลี่ยสิ้นสุดลง ให้อายุความขยายออกไปอีกหกสิบวันนับแต่วันที่การไกล่เกลี่ยสิ้นสุดลง"},{"id":"๒๑","num":"มาตรา ๒๑","num_ara":"๒๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["เมื่อคู่ความฝ่ายใดเสนอคำขอหรือคำแถลงต่อศาล","(๑) ถ้าประมวลกฎหมายนี้มิได้บัญญัติว่า คำขอหรือคำแถลงจะต้องทำเป็นคำร้องหรือเป็นหนังสือ ก็ให้ศาลมีอำนาจที่จะยอมรับคำขอหรือคำแถลงที่คู่ความได้ทำในศาลด้วยวาจาได้ แต่ศาลต้องจดข้อความนั้นลงไว้ในรายงาน หรือจะกำหนดให้คู่ความฝ่ายนั้นยื่นคำขอโดยทำเป็นคำร้องหรือยื่นคำแถลงเป็นหนังสือก็ได้ แล้วแต่ศาลจะเห็นสมควร (๒) ถ้าประมวลกฎหมายนี้มิได้บัญญัติไว้ว่า คำขออันใดจะทำได้แต่ฝ่ายเดียว ห้ามมิให้ศาลทำคำสั่งในเรื่องนั้น ๆ โดยมิให้คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ มีโอกาสคัดค้านก่อน แต่ทั้งนี้ ต้องอยู่ในบังคับแห่งบทบัญญัติของประมวลกฎหมายนี้ว่าด้วยการขาดนัด (๓) ถ้าประมวลกฎหมายนี้บัญญัติไว้ว่า คำขออันใดอาจทำได้แต่ฝ่ายเดียวแล้ว ให้ศาลมีอำนาจที่จะฟังคู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ ก่อนออกคำสั่งในเรื่องนั้น ๆ ได้ เว้นแต่ในกรณีที่คำขอนั้นเป็นเรื่องขอหมายเรียกให้ให้การ หรือเพื่อยึดหรืออายัดทรัพย์สินก่อนคำพิพากษา หรือเพื่อให้ออกหมายบังคับ หรือเพื่อจับหรือกักขังจำเลยหรือลูกหนี้ตามคำพิพากษา (๔) ถ้าประมวลกฎหมายนี้มิได้บัญญัติไว้ว่าศาลต้องออกคำสั่งอนุญาตตามคำขอที่ได้เสนอต่อศาลนั้นโดยไม่ต้องทำการไต่สวนแล้ว ก็ให้ศาลมีอำนาจทำการไต่สวนได้ตามที่เห็นสมควรก่อนมีคำสั่งตามคำขอนั้น ในกรณีเรื่องใดที่ศาลอาจออกคำสั่งได้เองหรือต่อเมื่อคู่ความมีคำขอ ให้ใช้บทบัญญัติอนุมาตรา (๒), (๓) และ (๔) แห่งมาตรานี้บังคับ ในกรณีเรื่องใดที่คู่ความไม่มีอำนาจขอให้ศาลมีคำสั่ง แต่หากศาลอาจมีคำสั่งในกรณีเรื่องนั้นได้เอง ให้ศาลมีอำนาจภายในบังคับบทบัญญัติแห่งมาตรา ๑๐๓ และ ๑๘๑ (๒) ที่จะงดฟังคู่ความหรืองดทำการไต่สวนก่อนออกคำสั่งได้"],"text":"เมื่อคู่ความฝ่ายใดเสนอคำขอหรือคำแถลงต่อศาล\n\n(๑) ถ้าประมวลกฎหมายนี้มิได้บัญญัติว่า คำขอหรือคำแถลงจะต้องทำเป็นคำร้องหรือเป็นหนังสือ ก็ให้ศาลมีอำนาจที่จะยอมรับคำขอหรือคำแถลงที่คู่ความได้ทำในศาลด้วยวาจาได้ แต่ศาลต้องจดข้อความนั้นลงไว้ในรายงาน หรือจะกำหนดให้คู่ความฝ่ายนั้นยื่นคำขอโดยทำเป็นคำร้องหรือยื่นคำแถลงเป็นหนังสือก็ได้ แล้วแต่ศาลจะเห็นสมควร (๒) ถ้าประมวลกฎหมายนี้มิได้บัญญัติไว้ว่า คำขออันใดจะทำได้แต่ฝ่ายเดียว ห้ามมิให้ศาลทำคำสั่งในเรื่องนั้น ๆ โดยมิให้คู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ มีโอกาสคัดค้านก่อน แต่ทั้งนี้ ต้องอยู่ในบังคับแห่งบทบัญญัติของประมวลกฎหมายนี้ว่าด้วยการขาดนัด (๓) ถ้าประมวลกฎหมายนี้บัญญัติไว้ว่า คำขออันใดอาจทำได้แต่ฝ่ายเดียวแล้ว ให้ศาลมีอำนาจที่จะฟังคู่ความอีกฝ่ายหนึ่งหรือคู่ความอื่น ๆ ก่อนออกคำสั่งในเรื่องนั้น ๆ ได้ เว้นแต่ในกรณีที่คำขอนั้นเป็นเรื่องขอหมายเรียกให้ให้การ หรือเพื่อยึดหรืออายัดทรัพย์สินก่อนคำพิพากษา หรือเพื่อให้ออกหมายบังคับ หรือเพื่อจับหรือกักขังจำเลยหรือลูกหนี้ตามคำพิพากษา (๔) ถ้าประมวลกฎหมายนี้มิได้บัญญัติไว้ว่าศาลต้องออกคำสั่งอนุญาตตามคำขอที่ได้เสนอต่อศาลนั้นโดยไม่ต้องทำการไต่สวนแล้ว ก็ให้ศาลมีอำนาจทำการไต่สวนได้ตามที่เห็นสมควรก่อนมีคำสั่งตามคำขอนั้น ในกรณีเรื่องใดที่ศาลอาจออกคำสั่งได้เองหรือต่อเมื่อคู่ความมีคำขอ ให้ใช้บทบัญญัติอนุมาตรา (๒), (๓) และ (๔) แห่งมาตรานี้บังคับ ในกรณีเรื่องใดที่คู่ความไม่มีอำนาจขอให้ศาลมีคำสั่ง แต่หากศาลอาจมีคำสั่งในกรณีเรื่องนั้นได้เอง ให้ศาลมีอำนาจภายในบังคับบทบัญญัติแห่งมาตรา ๑๐๓ และ ๑๘๑ (๒) ที่จะงดฟังคู่ความหรืองดทำการไต่สวนก่อนออกคำสั่งได้"},{"id":"๒๒","num":"มาตรา ๒๒","num_ara":"๒๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["กำหนดระยะเวลาทั้งปวงไม่ว่าที่กฎหมายกำหนดไว้หรือที่ศาลเป็นผู้กำหนดก็ดี เพื่อให้ดำเนินการหรือมิให้ดำเนินกระบวนพิจารณาใด ๆ ก่อนสิ้นระยะเวลานั้น ให้ศาลคำนวณตามบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์ว่าด้วยระยะเวลา"],"text":"กำหนดระยะเวลาทั้งปวงไม่ว่าที่กฎหมายกำหนดไว้หรือที่ศาลเป็นผู้กำหนดก็ดี เพื่อให้ดำเนินการหรือมิให้ดำเนินกระบวนพิจารณาใด ๆ ก่อนสิ้นระยะเวลานั้น ให้ศาลคำนวณตามบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์ว่าด้วยระยะเวลา"},{"id":"๒๓","num":"มาตรา ๒๓","num_ara":"๒๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายที่เกี่ยวข้องได้ยื่นคำขอโดยทำเป็นคำร้อง ให้ศาลมีอำนาจที่จะออกคำสั่งขยายหรือย่นระยะเวลาที่กำหนดไว้ในประมวลกฎหมายนี้หรือตามที่ศาลได้กำหนดไว้ หรือระยะเวลาที่เกี่ยวด้วยวิธีพิจารณาความแพ่งอันกำหนดไว้ในกฎหมายอื่น เพื่อให้ดำเนินหรือมิให้ดำเนินกระบวนพิจารณาใด ๆ ก่อนสิ้นระยะเวลานั้น แต่การขยายหรือย่นเวลาเช่นว่านี้ให้พึงทำได้ต่อเมื่อมีพฤติการณ์พิเศษ และศาลได้มีคำสั่งหรือคู่ความมีคำขอขึ้นมาก่อนสิ้นระยะเวลานั้น เว้นแต่ในกรณีที่มีเหตุสุดวิสัย"],"text":"เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายที่เกี่ยวข้องได้ยื่นคำขอโดยทำเป็นคำร้อง ให้ศาลมีอำนาจที่จะออกคำสั่งขยายหรือย่นระยะเวลาที่กำหนดไว้ในประมวลกฎหมายนี้หรือตามที่ศาลได้กำหนดไว้ หรือระยะเวลาที่เกี่ยวด้วยวิธีพิจารณาความแพ่งอันกำหนดไว้ในกฎหมายอื่น เพื่อให้ดำเนินหรือมิให้ดำเนินกระบวนพิจารณาใด ๆ ก่อนสิ้นระยะเวลานั้น แต่การขยายหรือย่นเวลาเช่นว่านี้ให้พึงทำได้ต่อเมื่อมีพฤติการณ์พิเศษ และศาลได้มีคำสั่งหรือคู่ความมีคำขอขึ้นมาก่อนสิ้นระยะเวลานั้น เว้นแต่ในกรณีที่มีเหตุสุดวิสัย"},{"id":"๒๔","num":"มาตรา ๒๔","num_ara":"๒๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["เมื่อคู่ความฝ่ายใดยกปัญหาข้อกฎหมายขึ้นอ้าง ซึ่งถ้าหากได้วินิจฉัยให้เป็นคุณแก่ฝ่ายนั้นแล้ว จะไม่ต้องมีการพิจารณาคดีต่อไปอีก หรือไม่ต้องพิจารณาประเด็นสำคัญแห่งคดีบางข้อ หรือถึงแม้จะดำเนินการพิจารณาประเด็นข้อสำคัญแห่งคดีไป ก็ไม่ทำให้ได้ความชัดขึ้นอีกแล้ว เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอ ให้ศาลมีอำนาจที่จะมีคำสั่งให้มีผลว่าก่อนดำเนินการพิจารณาต่อไป ศาลจะได้พิจารณาปัญหาข้อกฎหมายเช่นว่านี้แล้ววินิจฉัยชี้ขาดเบื้องต้นในปัญหานั้น ถ้าศาลเห็นว่าคำวินิจฉัยชี้ขาดเช่นว่านี้จะทำให้คดีเสร็จไปได้ทั้งเรื่องหรือเฉพาะแต่ประเด็นแห่งคดีบางข้อ ศาลจะวินิจฉัยชี้ขาดปัญหาที่กล่าวมาแล้วและพิพากษาคดีเรื่องนั้นหรือเฉพาะแต่ประเด็นที่เกี่ยวข้องไปโดยคำพิพากษาหรือคำสั่งฉบับเดียวกันก็ได้ คำสั่งใด ๆ ของศาลที่ได้ออกตามมาตรานี้ ให้อุทธรณ์และฎีกาได้ตามที่บัญญัติไว้ในมาตรา ๒๒๗, ๒๒๘ และ ๒๔๗"],"text":"เมื่อคู่ความฝ่ายใดยกปัญหาข้อกฎหมายขึ้นอ้าง ซึ่งถ้าหากได้วินิจฉัยให้เป็นคุณแก่ฝ่ายนั้นแล้ว จะไม่ต้องมีการพิจารณาคดีต่อไปอีก หรือไม่ต้องพิจารณาประเด็นสำคัญแห่งคดีบางข้อ หรือถึงแม้จะดำเนินการพิจารณาประเด็นข้อสำคัญแห่งคดีไป ก็ไม่ทำให้ได้ความชัดขึ้นอีกแล้ว เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอ ให้ศาลมีอำนาจที่จะมีคำสั่งให้มีผลว่าก่อนดำเนินการพิจารณาต่อไป ศาลจะได้พิจารณาปัญหาข้อกฎหมายเช่นว่านี้แล้ววินิจฉัยชี้ขาดเบื้องต้นในปัญหานั้น ถ้าศาลเห็นว่าคำวินิจฉัยชี้ขาดเช่นว่านี้จะทำให้คดีเสร็จไปได้ทั้งเรื่องหรือเฉพาะแต่ประเด็นแห่งคดีบางข้อ ศาลจะวินิจฉัยชี้ขาดปัญหาที่กล่าวมาแล้วและพิพากษาคดีเรื่องนั้นหรือเฉพาะแต่ประเด็นที่เกี่ยวข้องไปโดยคำพิพากษาหรือคำสั่งฉบับเดียวกันก็ได้ คำสั่งใด ๆ ของศาลที่ได้ออกตามมาตรานี้ ให้อุทธรณ์และฎีกาได้ตามที่บัญญัติไว้ในมาตรา ๒๒๗, ๒๒๘ และ ๒๔๗"},{"id":"๒๕","num":"มาตรา ๒๕","num_ara":"๒๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ถ้าคู่ความฝ่ายใดยื่นคำขอโดยทำเป็นคำร้องให้ศาลสั่งกำหนดวิธีการอย่างใด ๆ ที่บัญญัติไว้ในภาค ๔ เพื่อคุ้มครองสิทธิของคู่ความในระหว่างการพิจารณา หรือเพื่อบังคับตามพิพากษาหรือคำสั่ง ให้ศาลมีคำสั่งอนุญาตหรือยกคำขอนั้นเสียโดยไม่ชักช้า ถ้าในเวลาที่ยื่นคำขอนั้นศาลจะชี้ขาดคดีได้อยู่แล้ว ศาลจะวินิจฉัยคำขอนั้นในคำพิพากษา หรือในคำสั่งชี้ขาดคดีก็ได้"],"text":"ถ้าคู่ความฝ่ายใดยื่นคำขอโดยทำเป็นคำร้องให้ศาลสั่งกำหนดวิธีการอย่างใด ๆ ที่บัญญัติไว้ในภาค ๔ เพื่อคุ้มครองสิทธิของคู่ความในระหว่างการพิจารณา หรือเพื่อบังคับตามพิพากษาหรือคำสั่ง ให้ศาลมีคำสั่งอนุญาตหรือยกคำขอนั้นเสียโดยไม่ชักช้า ถ้าในเวลาที่ยื่นคำขอนั้นศาลจะชี้ขาดคดีได้อยู่แล้ว ศาลจะวินิจฉัยคำขอนั้นในคำพิพากษา หรือในคำสั่งชี้ขาดคดีก็ได้"},{"id":"๒๖","num":"มาตรา ๒๖","num_ara":"๒๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ถ้าศาลได้ตั้งข้อถาม หรือออกคำสั่งหรือชี้ขาดเกี่ยวด้วยการดำเนินคดีเรื่องใดเรื่องหนึ่ง และคู่ความฝ่ายใดฝ่ายหนึ่งในคดีเรื่องนั้นคัดค้านข้อถามหรือคำสั่ง หรือคำชี้ขาดนั้นว่าไม่ชอบด้วยกฎหมาย ก่อนที่ศาลจะดำเนินคดีต่อไปให้ศาลจดข้อถามหรือคำสั่งหรือคำชี้ขาดที่ถูกคัดค้านและสภาพแห่งการคัดค้านลงไว้ในรายงาน แต่ส่วนเหตุผลที่ผู้คัดค้านยกขึ้นอ้างอิงนั้น ให้ศาลใช้ดุลพินิจจดลงไว้ในรายงาน หรือกำหนดให้คู่ความฝ่ายที่คัดค้านยื่นคำแถลงเป็นหนังสือเพื่อรวมไว้ในสำนวน"],"text":"ถ้าศาลได้ตั้งข้อถาม หรือออกคำสั่งหรือชี้ขาดเกี่ยวด้วยการดำเนินคดีเรื่องใดเรื่องหนึ่ง และคู่ความฝ่ายใดฝ่ายหนึ่งในคดีเรื่องนั้นคัดค้านข้อถามหรือคำสั่ง หรือคำชี้ขาดนั้นว่าไม่ชอบด้วยกฎหมาย ก่อนที่ศาลจะดำเนินคดีต่อไปให้ศาลจดข้อถามหรือคำสั่งหรือคำชี้ขาดที่ถูกคัดค้านและสภาพแห่งการคัดค้านลงไว้ในรายงาน แต่ส่วนเหตุผลที่ผู้คัดค้านยกขึ้นอ้างอิงนั้น ให้ศาลใช้ดุลพินิจจดลงไว้ในรายงาน หรือกำหนดให้คู่ความฝ่ายที่คัดค้านยื่นคำแถลงเป็นหนังสือเพื่อรวมไว้ในสำนวน"},{"id":"๒๗","num":"มาตรา ๒๗","num_ara":"๒๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ในกรณีที่มิได้ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายนี้ในข้อที่มุ่งหมายจะยังให้การเป็นไปด้วยความยุติธรรม หรือที่เกี่ยวด้วยความสงบเรียบร้อยของประชาชนในเรื่องการเขียน และการยื่นหรือการส่งคำคู่ความหรือเอกสารอื่น ๆ หรือในการพิจารณาคดี การพิจารณาพยานหลักฐาน หรือการบังคับคดี เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายที่เสียหายเนื่องจากการที่มิได้ปฏิบัติเช่นว่านั้นยื่นคำขอโดยทำเป็นคำร้อง ให้ศาลมีอำนาจที่จะสั่งให้เพิกถอนการพิจารณาที่ผิดระเบียบนั้นเสียทั้งหมดหรือบางส่วน หรือสั่งแก้ไขหรือมีคำสั่งในเรื่องนั้นอย่างใดอย่างหนึ่ง ตามที่ศาลเห็นสมควร ข้อค้านเรื่องผิดระเบียบนั้น คู่ความฝ่ายที่เสียหายอาจยกขึ้นกล่าวได้ไม่ว่าในเวลาใด ๆ ก่อนมีคำพิพากษา แต่ต้องไม่ช้ากว่าแปดวันนับแต่วันที่คู่ความฝ่ายนั้นได้ทราบข้อความหรือพฤติการณ์อันเป็นมูลแห่งข้ออ้างนั้น แต่ทั้งนี้ คู่ความฝ่ายนั้นต้องมิได้ดำเนินการอันใดขึ้นใหม่หลังจากที่ได้ทราบเรื่องผิดระเบียบแล้ว หรือต้องมิได้ให้สัตยาบันแก่การผิดระเบียบนั้น ๆ ถ้าศาลสั่งให้เพิกถอนกระบวนพิจารณาที่ผิดระเบียบใด ๆ อันมิใช่เรื่องที่คู่ความละเลยไม่ดำเนินกระบวนพิจารณาเรื่องนั้นภายในระยะเวลาซึ่งกฎหมายหรือศาลกำหนดไว้ เพียงเท่านี้ไม่เป็นการตัดสิทธิคู่ความฝ่ายนั้น ในอันที่จะดำเนินกระบวนพิจารณานั้น ๆ ใหม่ให้ถูกต้องตามที่กฎหมายบังคับ"],"text":"ในกรณีที่มิได้ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายนี้ในข้อที่มุ่งหมายจะยังให้การเป็นไปด้วยความยุติธรรม หรือที่เกี่ยวด้วยความสงบเรียบร้อยของประชาชนในเรื่องการเขียน และการยื่นหรือการส่งคำคู่ความหรือเอกสารอื่น ๆ หรือในการพิจารณาคดี การพิจารณาพยานหลักฐาน หรือการบังคับคดี เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายที่เสียหายเนื่องจากการที่มิได้ปฏิบัติเช่นว่านั้นยื่นคำขอโดยทำเป็นคำร้อง ให้ศาลมีอำนาจที่จะสั่งให้เพิกถอนการพิจารณาที่ผิดระเบียบนั้นเสียทั้งหมดหรือบางส่วน หรือสั่งแก้ไขหรือมีคำสั่งในเรื่องนั้นอย่างใดอย่างหนึ่ง ตามที่ศาลเห็นสมควร ข้อค้านเรื่องผิดระเบียบนั้น คู่ความฝ่ายที่เสียหายอาจยกขึ้นกล่าวได้ไม่ว่าในเวลาใด ๆ ก่อนมีคำพิพากษา แต่ต้องไม่ช้ากว่าแปดวันนับแต่วันที่คู่ความฝ่ายนั้นได้ทราบข้อความหรือพฤติการณ์อันเป็นมูลแห่งข้ออ้างนั้น แต่ทั้งนี้ คู่ความฝ่ายนั้นต้องมิได้ดำเนินการอันใดขึ้นใหม่หลังจากที่ได้ทราบเรื่องผิดระเบียบแล้ว หรือต้องมิได้ให้สัตยาบันแก่การผิดระเบียบนั้น ๆ ถ้าศาลสั่งให้เพิกถอนกระบวนพิจารณาที่ผิดระเบียบใด ๆ อันมิใช่เรื่องที่คู่ความละเลยไม่ดำเนินกระบวนพิจารณาเรื่องนั้นภายในระยะเวลาซึ่งกฎหมายหรือศาลกำหนดไว้ เพียงเท่านี้ไม่เป็นการตัดสิทธิคู่ความฝ่ายนั้น ในอันที่จะดำเนินกระบวนพิจารณานั้น ๆ ใหม่ให้ถูกต้องตามที่กฎหมายบังคับ"},{"id":"๒๘","num":"มาตรา ๒๘","num_ara":"๒๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ถ้ามีคดีหลายเรื่องค้างพิจารณาอยู่ในศาลเดียวกันหรือในศาลชั้นต้นสองศาลต่างกัน และคู่ความทั้งหมด หรือแต่บางฝ่ายเป็นคู่ความรายเดียวกัน กับทั้งการพิจารณาคดีเหล่านั้น ถ้าได้รวมกันแล้ว จะเป็นการสะดวก หากศาลนั้นหรือศาลหนึ่งศาลใดเหล่านั้นเห็นสมควรให้พิจารณาคดีรวมกัน หรือหากคู่ความทั้งหมดหรือแต่บางฝ่ายมีคำขอให้พิจารณาคดีรวมกันโดยแถลงไว้ในคำให้การหรือทำเป็นคำร้องไม่ว่าในกรณีใด ๆ ก่อนมีคำพิพากษา เมื่อศาลได้ฟังคู่ความทุกฝ่ายแห่งคดีนั้น ๆ แล้ว ถ้าศาลเป็นที่พอใจว่า คดีเหล่านั้นเกี่ยวเนื่องกันก็ให้ศาลมีอำนาจออกคำสั่งให้พิจารณาคดีเหล่านั้นรวมกัน ถ้าจะโอนคดีมาจากอีกศาลหนึ่งหรือโอนคดีไปยังอีกศาลหนึ่งที่มีเขตอำนาจเหนือคดีนั้น ศาลจะมีคำสั่งก่อนที่ได้รับความยินยอมของอีกศาลหนึ่งนั้นไม่ได้ แต่ถ้าศาลที่จะรับโอนคดีไม่ยินยอม ก็ให้ศาลที่จะโอนคดีนั้นส่งเรื่องให้อธิบดีผู้พิพากษาศาลอุทธรณ์ชี้ขาด คำสั่งของอธิบดีผู้พิพากษาศาลอุทธรณ์ให้เป็นดีที่สุด"],"text":"ถ้ามีคดีหลายเรื่องค้างพิจารณาอยู่ในศาลเดียวกันหรือในศาลชั้นต้นสองศาลต่างกัน และคู่ความทั้งหมด หรือแต่บางฝ่ายเป็นคู่ความรายเดียวกัน กับทั้งการพิจารณาคดีเหล่านั้น ถ้าได้รวมกันแล้ว จะเป็นการสะดวก หากศาลนั้นหรือศาลหนึ่งศาลใดเหล่านั้นเห็นสมควรให้พิจารณาคดีรวมกัน หรือหากคู่ความทั้งหมดหรือแต่บางฝ่ายมีคำขอให้พิจารณาคดีรวมกันโดยแถลงไว้ในคำให้การหรือทำเป็นคำร้องไม่ว่าในกรณีใด ๆ ก่อนมีคำพิพากษา เมื่อศาลได้ฟังคู่ความทุกฝ่ายแห่งคดีนั้น ๆ แล้ว ถ้าศาลเป็นที่พอใจว่า คดีเหล่านั้นเกี่ยวเนื่องกันก็ให้ศาลมีอำนาจออกคำสั่งให้พิจารณาคดีเหล่านั้นรวมกัน ถ้าจะโอนคดีมาจากอีกศาลหนึ่งหรือโอนคดีไปยังอีกศาลหนึ่งที่มีเขตอำนาจเหนือคดีนั้น ศาลจะมีคำสั่งก่อนที่ได้รับความยินยอมของอีกศาลหนึ่งนั้นไม่ได้ แต่ถ้าศาลที่จะรับโอนคดีไม่ยินยอม ก็ให้ศาลที่จะโอนคดีนั้นส่งเรื่องให้อธิบดีผู้พิพากษาศาลอุทธรณ์ชี้ขาด คำสั่งของอธิบดีผู้พิพากษาศาลอุทธรณ์ให้เป็นดีที่สุด"},{"id":"๒๙","num":"มาตรา ๒๙","num_ara":"๒๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ถ้าคดีที่ฟ้องกันนั้นมีข้อหาหลายข้อด้วยกันและศาลเห็นว่าข้อหาข้อหนึ่งข้อใดเหล่านั้นมิได้เกี่ยวข้องกันกับข้ออื่น ๆ เมื่อศาลเห็นสมควร หรือเมื่อคู่ความผู้มีส่วนได้เสียได้ยื่นคำขอโดยทำเป็นคำร้องให้ศาลมีคำสั่งให้แยกคดีเสียโดยเร็ว ถ้าโจทก์ประสงค์จะให้พิจารณาข้อหาเช่นว่านั้นต่อไป ก็ให้ศาลดำเนินการพิจารณาคดีไปเสมือนหนึ่งว่าเป็นคดีอีกเรื่องหนึ่งต่างหาก โดยมีเงื่อนไขที่ศาลจะกำหนดไว้ตามที่เห็นสมควร ถ้าคดีที่ฟ้องกันนั้นมีข้อหาหลายข้อ และศาลเห็นว่าหากแยกพิจารณาข้อหาทั้งหมดหรือข้อใดข้อหนึ่งออกจากกันแล้ว จะทำให้การพิจารณาข้อหาเหล่านั้นสะดวก ไม่ว่าเวลาใด ๆ ก่อนมีคำพิพากษา เมื่อศาลเห็นสมควร หรือเมื่อคู่ความผู้มีส่วนได้เสียยื่นคำขอโดยทำเป็นคำร้อง และเมื่อศาลได้ฟังคู่ความทุกฝ่ายแล้ว ให้ศาลมีอำนาจสั่งแยกข้อหาเหล่านั้นทั้งหมดหรือแต่ข้อใดข้อหนึ่งออกพิจารณาต่างหากเป็นเรื่องๆ ไป"],"text":"ถ้าคดีที่ฟ้องกันนั้นมีข้อหาหลายข้อด้วยกันและศาลเห็นว่าข้อหาข้อหนึ่งข้อใดเหล่านั้นมิได้เกี่ยวข้องกันกับข้ออื่น ๆ เมื่อศาลเห็นสมควร หรือเมื่อคู่ความผู้มีส่วนได้เสียได้ยื่นคำขอโดยทำเป็นคำร้องให้ศาลมีคำสั่งให้แยกคดีเสียโดยเร็ว ถ้าโจทก์ประสงค์จะให้พิจารณาข้อหาเช่นว่านั้นต่อไป ก็ให้ศาลดำเนินการพิจารณาคดีไปเสมือนหนึ่งว่าเป็นคดีอีกเรื่องหนึ่งต่างหาก โดยมีเงื่อนไขที่ศาลจะกำหนดไว้ตามที่เห็นสมควร ถ้าคดีที่ฟ้องกันนั้นมีข้อหาหลายข้อ และศาลเห็นว่าหากแยกพิจารณาข้อหาทั้งหมดหรือข้อใดข้อหนึ่งออกจากกันแล้ว จะทำให้การพิจารณาข้อหาเหล่านั้นสะดวก ไม่ว่าเวลาใด ๆ ก่อนมีคำพิพากษา เมื่อศาลเห็นสมควร หรือเมื่อคู่ความผู้มีส่วนได้เสียยื่นคำขอโดยทำเป็นคำร้อง และเมื่อศาลได้ฟังคู่ความทุกฝ่ายแล้ว ให้ศาลมีอำนาจสั่งแยกข้อหาเหล่านั้นทั้งหมดหรือแต่ข้อใดข้อหนึ่งออกพิจารณาต่างหากเป็นเรื่องๆ ไป"},{"id":"๓๐","num":"มาตรา ๓๐","num_ara":"๓๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ให้ศาลมีอำนาจออกข้อกำหนดใด ๆ แก่คู่ความฝ่ายใดฝ่ายหนึ่งหรือแก่บุคคลภายนอกที่อยู่ต่อหน้าศาลตามที่เห็นจำเป็น เพื่อรักษาความเรียบร้อยในบริเวณศาล และเพื่อให้กระบวนพิจารณาดำเนินไปตามเที่ยงธรรมและรวดเร็ว อำนาจเช่นว่านี้ ให้รวมถึงการสั่งห้ามคู่ความมิให้ดำเนินกระบวนพิจารณาในทางก่อความรำคาญ หรือในทางประวิงให้ชักช้าหรือในทางฟุ่มเฟือยเกินสมควร"],"text":"ให้ศาลมีอำนาจออกข้อกำหนดใด ๆ แก่คู่ความฝ่ายใดฝ่ายหนึ่งหรือแก่บุคคลภายนอกที่อยู่ต่อหน้าศาลตามที่เห็นจำเป็น เพื่อรักษาความเรียบร้อยในบริเวณศาล และเพื่อให้กระบวนพิจารณาดำเนินไปตามเที่ยงธรรมและรวดเร็ว อำนาจเช่นว่านี้ ให้รวมถึงการสั่งห้ามคู่ความมิให้ดำเนินกระบวนพิจารณาในทางก่อความรำคาญ หรือในทางประวิงให้ชักช้าหรือในทางฟุ่มเฟือยเกินสมควร"},{"id":"๓๑","num":"มาตรา ๓๑","num_ara":"๓๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ผู้ใดกระทำการอย่างใด ๆ ดังกล่าวต่อไปนี้ ให้ถือว่ากระทำผิดฐานละเมิดอำนาจศาล","(๑) ขัดขืนไม่ปฏิบัติตามข้อกำหนดของศาลตามมาตราก่อนอันว่าด้วยการรักษาความเรียบร้อย หรือประพฤติตนไม่เรียบร้อยในบริเวณศาล (๒) เมื่อได้มีคำร้องและได้รับอนุญาตจากศาลให้ยกเว้นค่าธรรมเนียมศาลตามมาตรา ๑๕๖/๑ แล้ว ปรากฏว่าได้แสดงข้อเท็จจริงหรือเสนอพยานหลักฐานอันเป็นเท็จต่อศาลในการไต่สวนคำร้องขอยกเว้นค่าธรรมเนียมศาล (๓) เมื่อรู้ว่าจะมีการส่งคำคู่ความหรือส่งเอกสารอื่น ๆ ถึงตน แล้วจงใจไปเสียให้พ้น หรือหาทางหลีกเลี่ยงที่จะไม่รับคำคู่ความหรือเอกสารนั้นโดยสถานอื่น (๔) ตรวจเอกสารทั้งหมด หรือฉบับใดฉบับหนึ่ง ซึ่งอยู่ในสำนวนความ หรือคัดเอาสำเนาเอกสารเหล่านั้นไป โดยฝ่าฝืนต่อบทบัญญัติ มาตรา ๕๔ (๕) ขัดขืนไม่มาศาล เมื่อศาลได้มีคำสั่งตามมาตรา ๑๙ หรือเมื่อมีหมายเรียกลูกหนี้ตามคำพิพากษา หรือบุคคลอื่นตามมาตรา ๒๗๗"],"text":"ผู้ใดกระทำการอย่างใด ๆ ดังกล่าวต่อไปนี้ ให้ถือว่ากระทำผิดฐานละเมิดอำนาจศาล\n\n(๑) ขัดขืนไม่ปฏิบัติตามข้อกำหนดของศาลตามมาตราก่อนอันว่าด้วยการรักษาความเรียบร้อย หรือประพฤติตนไม่เรียบร้อยในบริเวณศาล (๒) เมื่อได้มีคำร้องและได้รับอนุญาตจากศาลให้ยกเว้นค่าธรรมเนียมศาลตามมาตรา ๑๕๖/๑ แล้ว ปรากฏว่าได้แสดงข้อเท็จจริงหรือเสนอพยานหลักฐานอันเป็นเท็จต่อศาลในการไต่สวนคำร้องขอยกเว้นค่าธรรมเนียมศาล (๓) เมื่อรู้ว่าจะมีการส่งคำคู่ความหรือส่งเอกสารอื่น ๆ ถึงตน แล้วจงใจไปเสียให้พ้น หรือหาทางหลีกเลี่ยงที่จะไม่รับคำคู่ความหรือเอกสารนั้นโดยสถานอื่น (๔) ตรวจเอกสารทั้งหมด หรือฉบับใดฉบับหนึ่ง ซึ่งอยู่ในสำนวนความ หรือคัดเอาสำเนาเอกสารเหล่านั้นไป โดยฝ่าฝืนต่อบทบัญญัติ มาตรา ๕๔ (๕) ขัดขืนไม่มาศาล เมื่อศาลได้มีคำสั่งตามมาตรา ๑๙ หรือเมื่อมีหมายเรียกลูกหนี้ตามคำพิพากษา หรือบุคคลอื่นตามมาตรา ๒๗๗"},{"id":"๓๒","num":"มาตรา ๓๒","num_ara":"๓๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๒ ศาล","section":"หมวด ๓ อำนาจและหน้าที่ของศาล","subsection":"","paragraphs":["ผู้ใดเป็นผู้ประพันธ์ บรรณาธิการ หรือผู้พิมพ์โฆษณาซึ่งหนังสือพิมพ์ หรือสิ่งพิมพ์อันออกโฆษณาต่อประชาชน ไม่ว่าบุคคลเหล่านั้นจะได้รู้ถึงซึ่งข้อความหรือการออกโฆษณาแห่งหนังสือพิมพ์ หรือสิ่งพิมพ์เช่นว่านั้นหรือไม่ ให้ถือว่าได้กระทำผิดฐานละเมิดอำนาจศาลในกรณีอย่างใดอย่างหนึ่งในสองอย่างดังจะกล่าวต่อไปนี้","(๑) ไม่ว่าเวลาใด ๆ ถ้าหนังสือพิมพ์หรือสิ่งพิมพ์เช่นว่ามานั้นได้กล่าวหรือแสดงไม่ว่าโดยวิธีใด ๆ ซึ่งข้อความหรือความเห็นอันเป็นการเปิดเผยข้อเท็จจริงหรือพฤติการณ์อื่น ๆ แห่งคดี หรือกระบวนพิจารณาใด ๆ แห่งคดี ซึ่งเพื่อความเหมาะสมหรือเพื่อคุ้มครองสาธารณประโยชน์ ศาลได้มีคำสั่งห้ามการออกโฆษณาสิ่งเหล่านั้น ไม่ว่าโดยวิธีเพียงแต่สั่งให้พิจารณาโดยไม่เปิดเผยหรือโดยวิธีห้ามการออกโฆษณาโดยชัดแจ้ง (๒) ถ้าหนังสือพิมพ์หรือสิ่งพิมพ์ ได้กล่าวหรือแสดงไม่ว่าโดยวิธีใด ๆ ในระหว่างการพิจารณาแห่งคดีไปจนมีคำพิพากษาเป็นที่สุด ซึ่งข้อความหรือความเห็นโดยประสงค์ให้มีอิทธิพลเหนือความรู้สึกของประชาชน หรือเหนือศาลหรือเหนือคู่ความหรือเหนือพยานแห่งคดีซึ่งพอเห็นได้ว่าจะทำให้การพิจารณาคดีเสียความยุติธรรมไป เช่น ก. เป็นการแสดงผิดจากข้อเท็จจริงแห่งคดี หรือ ข. เป็นรายงานหรือย่อเรื่องหรือวิภาค ซึ่งกระบวนพิจารณาแห่งคดีอย่างไม่เป็นกลางและไม่ถูกต้อง หรือ ค. เป็นการวิภาคโดยไม่เป็นธรรม ซึ่งการดำเนินคดีของคู่ความ หรือคำพยานหลักฐาน หรือนิสัยความประพฤติของคู่ความหรือพยาน รวมทั้งการแถลงข้อความอันเป็นการเสื่อมเสียต่อชื่อเสียงของคู่ความหรือพยาน แม้ถึงว่าข้อความเหล่านั้นจะเป็นความจริง หรือ ง. เป็นการชักจูงให้เกิดมีคำพยานเท็จ เพื่อประโยชน์แห่งมาตรานี้ ให้นำวิเคราะห์ศัพท์ทั้งปวงในมาตรา ๔ แห่งพระราชบัญญัติการพิมพ์ พุทธศักราช ๒๔๗๖ มาใช้บังคับ"],"text":"ผู้ใดเป็นผู้ประพันธ์ บรรณาธิการ หรือผู้พิมพ์โฆษณาซึ่งหนังสือพิมพ์ หรือสิ่งพิมพ์อันออกโฆษณาต่อประชาชน ไม่ว่าบุคคลเหล่านั้นจะได้รู้ถึงซึ่งข้อความหรือการออกโฆษณาแห่งหนังสือพิมพ์ หรือสิ่งพิมพ์เช่นว่านั้นหรือไม่ ให้ถือว่าได้กระทำผิดฐานละเมิดอำนาจศาลในกรณีอย่างใดอย่างหนึ่งในสองอย่างดังจะกล่าวต่อไปนี้\n\n(๑) ไม่ว่าเวลาใด ๆ ถ้าหนังสือพิมพ์หรือสิ่งพิมพ์เช่นว่ามานั้นได้กล่าวหรือแสดงไม่ว่าโดยวิธีใด ๆ ซึ่งข้อความหรือความเห็นอันเป็นการเปิดเผยข้อเท็จจริงหรือพฤติการณ์อื่น ๆ แห่งคดี หรือกระบวนพิจารณาใด ๆ แห่งคดี ซึ่งเพื่อความเหมาะสมหรือเพื่อคุ้มครองสาธารณประโยชน์ ศาลได้มีคำสั่งห้ามการออกโฆษณาสิ่งเหล่านั้น ไม่ว่าโดยวิธีเพียงแต่สั่งให้พิจารณาโดยไม่เปิดเผยหรือโดยวิธีห้ามการออกโฆษณาโดยชัดแจ้ง (๒) ถ้าหนังสือพิมพ์หรือสิ่งพิมพ์ ได้กล่าวหรือแสดงไม่ว่าโดยวิธีใด ๆ ในระหว่างการพิจารณาแห่งคดีไปจนมีคำพิพากษาเป็นที่สุด ซึ่งข้อความหรือความเห็นโดยประสงค์ให้มีอิทธิพลเหนือความรู้สึกของประชาชน หรือเหนือศาลหรือเหนือคู่ความหรือเหนือพยานแห่งคดีซึ่งพอเห็นได้ว่าจะทำให้การพิจารณาคดีเสียความยุติธรรมไป เช่น ก. เป็นการแสดงผิดจากข้อเท็จจริงแห่งคดี หรือ ข. เป็นรายงานหรือย่อเรื่องหรือวิภาค ซึ่งกระบวนพิจารณาแห่งคดีอย่างไม่เป็นกลางและไม่ถูกต้อง หรือ ค. เป็นการวิภาคโดยไม่เป็นธรรม ซึ่งการดำเนินคดีของคู่ความ หรือคำพยานหลักฐาน หรือนิสัยความประ
