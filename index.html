ป็นของบุคคลอื่น หากเจ้าพนักงานบังคับคดีสงสัยว่าทรัพย์สินหรือสิทธิเรียกร้องนั้นไม่ใช่เป็นของลูกหนี้ตามคำพิพากษาและไม่ยอมทำการยึดหรืออายัด ถ้าเจ้าหนี้ตามคำพิพากษายืนยันให้ยึดหรืออายัด เจ้าพนักงานบังคับคดีจะทำการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้น หรือจะสั่งงดการยึดหรือการอายัดก็ได้ ในกรณีที่สั่งงด ให้เจ้าพนักงานบังคับคดีมีคำสั่งห้ามการโอน ขาย ยักย้าย จำหน่าย ทำลาย ทำให้เสื่อมค่า หรือเปลี่ยนแปลงซึ่งสิทธิในทรัพย์สินหรือสิทธิเรียกร้องนั้นไว้ก่อน คำสั่งห้ามของเจ้าพนักงานบังคับคดีตามวรรคหนึ่งให้มีผลใช้บังคับได้ทันที และให้เจ้าพนักงานบังคับคดีแจ้งคำสั่งห้ามให้ลูกหนี้ตามคำพิพากษา และบุคคลผู้มีชื่อเป็นเจ้าของทรัพย์สินหรือสิทธิเรียกร้องตามที่ปรากฏในทะเบียนหรือหลักฐานอย่างอื่นทราบโดยเร็ว ในกรณีที่ทรัพย์สินดังกล่าวเป็นทรัพย์สินที่จะต้องจดทะเบียนหรือได้จดทะเบียนไว้ตามกฎหมาย ให้เจ้าพนักงานบังคับคดีแจ้งคำสั่งห้ามดังกล่าวให้นายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนตามกฎหมายว่าด้วยการนั้นทราบด้วย ถ้าได้มีการจดทะเบียนไว้แล้ว ให้นายทะเบียนหรือพนักงานเจ้าหน้าที่บันทึกคำสั่งของเจ้าพนักงานบังคับคดีไว้ในทะเบียน ทั้งนี้ ให้นำบทบัญญัติมาตรา ๓๑๕ (๑) และมาตรา ๓๒๐ (๑) มาใช้บังคับโดยอนุโลม เจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องต่อศาลภายในสิบห้าวันนับแต่วันที่เจ้าพนักงานบังคับคดีมีคำสั่งงดการยึดหรือการอายัดตามวรรคหนึ่ง เพื่อขอให้ศาลสั่งให้เจ้าพนักงานบังคับคดีทำการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้น ในกรณีเช่นนี้ ให้ศาลส่งสำเนาคำร้องแก่เจ้าพนักงานบังคับคดีและบุคคลผู้มีชื่อเป็นเจ้าของทรัพย์สินหรือสิทธิเรียกร้องตามที่ปรากฏในทะเบียนหรือหลักฐานอย่างอื่นทราบ และบุคคลดังกล่าวอาจคัดค้านว่าทรัพย์สินหรือสิทธิเรียกร้องนั้นไม่ใช่ของลูกหนี้ตามคำพิพากษาได้ โดยยื่นคำคัดค้านต่อศาลภายในสิบห้าวันนับแต่วันที่รับสำเนาคำร้อง และให้นำบทบัญญัติมาตรา ๓๒๓ หรือมาตรา ๓๒๕ แล้วแต่กรณี มาใช้บังคับโดยอนุโลม โดยหากศาลมีคำสั่งให้ยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องแล้ว บุคคลดังกล่าวที่ได้ยื่นคำคัดค้านตามวรรคนี้จะใช้สิทธิตามมาตรา ๓๒๓ หรือมาตรา ๓๒๕ แล้วแต่กรณี อีกหาได้ไม่ ในกรณีที่เจ้าหนี้ตามคำพิพากษามิได้ยื่นคำร้องภายในกำหนดเวลาตามวรรคสามหรือศาลมีคำสั่งยกคำร้องดังกล่าว หรือในกรณีที่ศาลมีคำสั่งอนุญาตตามคำร้องในวรรคสาม แต่เจ้าหนี้ตามคำพิพากษาไม่ดำเนินการบังคับคดีแก่ทรัพย์สินหรือสิทธิเรียกร้องดังกล่าวภายในสิบห้าวันนับแต่วันที่ศาลมีคำสั่ง ให้คำสั่งห้ามตามวรรคหนึ่งเป็นอันยกเลิกไป และให้เจ้าพนักงานบังคับคดีแจ้งการยกเลิกคำสั่งห้ามดังกล่าวให้บุคคลตามวรรคสองทราบด้วย"],"text":"ในกรณีที่ทรัพย์สินหรือสิทธิเรียกร้องที่เจ้าหนี้ตามคำพิพากษาอ้างว่าเป็นของลูกหนี้ตามคำพิพากษามีชื่อบุคคลอื่นเป็นเจ้าของในทะเบียนหรือปรากฏตามหลักฐานอย่างอื่นว่าเป็นของบุคคลอื่น หากเจ้าพนักงานบังคับคดีสงสัยว่าทรัพย์สินหรือสิทธิเรียกร้องนั้นไม่ใช่เป็นของลูกหนี้ตามคำพิพากษาและไม่ยอมทำการยึดหรืออายัด ถ้าเจ้าหนี้ตามคำพิพากษายืนยันให้ยึดหรืออายัด เจ้าพนักงานบังคับคดีจะทำการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้น หรือจะสั่งงดการยึดหรือการอายัดก็ได้ ในกรณีที่สั่งงด ให้เจ้าพนักงานบังคับคดีมีคำสั่งห้ามการโอน ขาย ยักย้าย จำหน่าย ทำลาย ทำให้เสื่อมค่า หรือเปลี่ยนแปลงซึ่งสิทธิในทรัพย์สินหรือสิทธิเรียกร้องนั้นไว้ก่อน คำสั่งห้ามของเจ้าพนักงานบังคับคดีตามวรรคหนึ่งให้มีผลใช้บังคับได้ทันที และให้เจ้าพนักงานบังคับคดีแจ้งคำสั่งห้ามให้ลูกหนี้ตามคำพิพากษา และบุคคลผู้มีชื่อเป็นเจ้าของทรัพย์สินหรือสิทธิเรียกร้องตามที่ปรากฏในทะเบียนหรือหลักฐานอย่างอื่นทราบโดยเร็ว ในกรณีที่ทรัพย์สินดังกล่าวเป็นทรัพย์สินที่จะต้องจดทะเบียนหรือได้จดทะเบียนไว้ตามกฎหมาย ให้เจ้าพนักงานบังคับคดีแจ้งคำสั่งห้ามดังกล่าวให้นายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนตามกฎหมายว่าด้วยการนั้นทราบด้วย ถ้าได้มีการจดทะเบียนไว้แล้ว ให้นายทะเบียนหรือพนักงานเจ้าหน้าที่บันทึกคำสั่งของเจ้าพนักงานบังคับคดีไว้ในทะเบียน ทั้งนี้ ให้นำบทบัญญัติมาตรา ๓๑๕ (๑) และมาตรา ๓๒๐ (๑) มาใช้บังคับโดยอนุโลม เจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องต่อศาลภายในสิบห้าวันนับแต่วันที่เจ้าพนักงานบังคับคดีมีคำสั่งงดการยึดหรือการอายัดตามวรรคหนึ่ง เพื่อขอให้ศาลสั่งให้เจ้าพนักงานบังคับคดีทำการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้น ในกรณีเช่นนี้ ให้ศาลส่งสำเนาคำร้องแก่เจ้าพนักงานบังคับคดีและบุคคลผู้มีชื่อเป็นเจ้าของทรัพย์สินหรือสิทธิเรียกร้องตามที่ปรากฏในทะเบียนหรือหลักฐานอย่างอื่นทราบ และบุคคลดังกล่าวอาจคัดค้านว่าทรัพย์สินหรือสิทธิเรียกร้องนั้นไม่ใช่ของลูกหนี้ตามคำพิพากษาได้ โดยยื่นคำคัดค้านต่อศาลภายในสิบห้าวันนับแต่วันที่รับสำเนาคำร้อง และให้นำบทบัญญัติมาตรา ๓๒๓ หรือมาตรา ๓๒๕ แล้วแต่กรณี มาใช้บังคับโดยอนุโลม โดยหากศาลมีคำสั่งให้ยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องแล้ว บุคคลดังกล่าวที่ได้ยื่นคำคัดค้านตามวรรคนี้จะใช้สิทธิตามมาตรา ๓๒๓ หรือมาตรา ๓๒๕ แล้วแต่กรณี อีกหาได้ไม่ ในกรณีที่เจ้าหนี้ตามคำพิพากษามิได้ยื่นคำร้องภายในกำหนดเวลาตามวรรคสามหรือศาลมีคำสั่งยกคำร้องดังกล่าว หรือในกรณีที่ศาลมีคำสั่งอนุญาตตามคำร้องในวรรคสาม แต่เจ้าหนี้ตามคำพิพากษาไม่ดำเนินการบังคับคดีแก่ทรัพย์สินหรือสิทธิเรียกร้องดังกล่าวภายในสิบห้าวันนับแต่วันที่ศาลมีคำสั่ง ให้คำสั่งห้ามตามวรรคหนึ่งเป็นอันยกเลิกไป และให้เจ้าพนักงานบังคับคดีแจ้งการยกเลิกคำสั่งห้ามดังกล่าวให้บุคคลตามวรรคสองทราบด้วย"},{"id":"๒๙๙","num":"มาตรา ๒๙๙","num_ara":"๒๙๙","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑ อำนาจของเจ้าพนักงานบังคับคดี","paragraphs":["ในกรณีที่เจ้าพนักงานบังคับคดีมีคำสั่งห้ามตามมาตรา ๒๙๘ วรรคหนึ่ง บุคคลผู้มีชื่อเป็นเจ้าของทรัพย์สินหรือสิทธิเรียกร้องตามที่ปรากฏในทะเบียนหรือหลักฐานอย่างอื่น หรือผู้มีส่วนได้เสียในทรัพย์สินหรือสิทธิเรียกร้องนั้น จะร้องขอต่อเจ้าพนักงานบังคับคดีให้เพิกถอนคำสั่งห้ามดังกล่าว โดยวางเงินหรือหาประกันมาให้แทนทรัพย์สินหรือสิทธิเรียกร้องนั้นก็ได้ ถ้าเจ้าพนักงานบังคับคดีพอใจในเงินหรือประกันก็ให้เพิกถอนคำสั่งห้ามดังกล่าวและรับเงินหรือประกันนั้นไว้ ในกรณีที่เจ้าพนักงานบังคับคดีไม่เพิกถอนคำสั่งห้ามตามวรรคหนึ่ง ผู้ร้องนั้นจะยื่นคำร้องต่อศาลภายในสิบห้าวันนับแต่วันที่ทราบคำสั่งของเจ้าพนักงานบังคับคดีเพื่อขอให้เพิกถอนคำสั่งห้ามโดยวางเงินหรือหาประกันมาให้ก็ได้ ให้ศาลส่งสำเนาคำร้องแก่เจ้าพนักงานบังคับคดีและเจ้าหนี้ตามคำพิพากษาเพื่อทำการไต่สวนเป็นการด่วน คำสั่งของศาลให้เป็นที่สุด ในกรณีที่ศาลมีคำสั่งให้ยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องตามมาตรา ๒๙๘ วรรคสาม ถ้าไม่อาจยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้นได้ แต่ได้มีการวางเงินหรือประกันไว้แทนทรัพย์สินหรือสิทธิเรียกร้องนั้น เจ้าหนี้ตามคำพิพากษาอาจขอให้ศาลดำเนินการบังคับคดีแก่เงินหรือประกันที่รับไว้หรือแก่ผู้ประกันได้โดยไม่ต้องฟ้องเป็นคดีใหม่ ในกรณีที่เจ้าหนี้ตามคำพิพากษามิได้ยื่นคำร้องหรือศาลมีคำสั่งยกคำร้องตามมาตรา ๒๙๘ วรรคสาม ให้เจ้าพนักงานบังคับคดีคืนเงินหรือประกันที่รับไว้แก่ผู้วางเงินหรือประกันนั้นหรือยกเลิกการประกัน"],"text":"ในกรณีที่เจ้าพนักงานบังคับคดีมีคำสั่งห้ามตามมาตรา ๒๙๘ วรรคหนึ่ง บุคคลผู้มีชื่อเป็นเจ้าของทรัพย์สินหรือสิทธิเรียกร้องตามที่ปรากฏในทะเบียนหรือหลักฐานอย่างอื่น หรือผู้มีส่วนได้เสียในทรัพย์สินหรือสิทธิเรียกร้องนั้น จะร้องขอต่อเจ้าพนักงานบังคับคดีให้เพิกถอนคำสั่งห้ามดังกล่าว โดยวางเงินหรือหาประกันมาให้แทนทรัพย์สินหรือสิทธิเรียกร้องนั้นก็ได้ ถ้าเจ้าพนักงานบังคับคดีพอใจในเงินหรือประกันก็ให้เพิกถอนคำสั่งห้ามดังกล่าวและรับเงินหรือประกันนั้นไว้ ในกรณีที่เจ้าพนักงานบังคับคดีไม่เพิกถอนคำสั่งห้ามตามวรรคหนึ่ง ผู้ร้องนั้นจะยื่นคำร้องต่อศาลภายในสิบห้าวันนับแต่วันที่ทราบคำสั่งของเจ้าพนักงานบังคับคดีเพื่อขอให้เพิกถอนคำสั่งห้ามโดยวางเงินหรือหาประกันมาให้ก็ได้ ให้ศาลส่งสำเนาคำร้องแก่เจ้าพนักงานบังคับคดีและเจ้าหนี้ตามคำพิพากษาเพื่อทำการไต่สวนเป็นการด่วน คำสั่งของศาลให้เป็นที่สุด ในกรณีที่ศาลมีคำสั่งให้ยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องตามมาตรา ๒๙๘ วรรคสาม ถ้าไม่อาจยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้นได้ แต่ได้มีการวางเงินหรือประกันไว้แทนทรัพย์สินหรือสิทธิเรียกร้องนั้น เจ้าหนี้ตามคำพิพากษาอาจขอให้ศาลดำเนินการบังคับคดีแก่เงินหรือประกันที่รับไว้หรือแก่ผู้ประกันได้โดยไม่ต้องฟ้องเป็นคดีใหม่ ในกรณีที่เจ้าหนี้ตามคำพิพากษามิได้ยื่นคำร้องหรือศาลมีคำสั่งยกคำร้องตามมาตรา ๒๙๘ วรรคสาม ให้เจ้าพนักงานบังคับคดีคืนเงินหรือประกันที่รับไว้แก่ผู้วางเงินหรือประกันนั้นหรือยกเลิกการประกัน"},{"id":"๓๐๐","num":"มาตรา ๓๐๐","num_ara":"๓๐๐","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๑ อำนาจของเจ้าพนักงานบังคับคดี","paragraphs":["เว้นแต่จะมีกฎหมายบัญญัติไว้หรือศาลมีคำสั่งเป็นอย่างอื่น ห้ามไม่ให้เจ้าพนักงานบังคับคดียึดทรัพย์สินหรืออายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาหรือขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินหรือสิทธิเรียกร้องที่ได้มาจากการยึดหรืออายัดหลายรายเกินกว่าที่พอจะชำระหนี้ให้แก่เจ้าหนี้ตามคำพิพากษา พร้อมทั้งค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี ในกรณีที่มีความจำเป็นต้องยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องรายใดที่มีราคาสูงเกินกว่าที่พอจะชำระหนี้ให้แก่เจ้าหนี้ตามคำพิพากษา ถ้าทรัพย์สินหรือสิทธิเรียกร้องนั้นอยู่ในสภาพที่จะแบ่งยึดหรืออายัดได้โดยไม่ก่อให้เกิดความเสียหาย ให้เจ้าพนักงานบังคับคดีมีอำนาจแบ่งยึดหรือแบ่งอายัดทรัพย์สินหรือสิทธิเรียกร้องรายใดแต่เพียงบางส่วนหรือเฉพาะส่วนแห่งกรรมสิทธิ์เท่าที่พอจะชำระหนี้ให้แก่เจ้าหนี้ตามคำพิพากษา พร้อมทั้งค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี บุคคลผู้มีส่วนได้เสียในการบังคับคดีอาจคัดค้านคำสั่งหรือการดำเนินการตามวรรคหนึ่งหรือวรรคสองของเจ้าพนักงานบังคับคดี โดยยื่นคำร้องต่อศาลก่อนวันขายทอดตลาดหรือจำหน่ายโดยวิธีอื่น แต่ต้องไม่ช้ากว่าสิบห้าวันนับแต่วันที่ได้ทราบคำสั่งหรือการดำเนินการนั้น คำสั่งของศาลให้เป็นที่สุด"],"text":"เว้นแต่จะมีกฎหมายบัญญัติไว้หรือศาลมีคำสั่งเป็นอย่างอื่น ห้ามไม่ให้เจ้าพนักงานบังคับคดียึดทรัพย์สินหรืออายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาหรือขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินหรือสิทธิเรียกร้องที่ได้มาจากการยึดหรืออายัดหลายรายเกินกว่าที่พอจะชำระหนี้ให้แก่เจ้าหนี้ตามคำพิพากษา พร้อมทั้งค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี ในกรณีที่มีความจำเป็นต้องยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องรายใดที่มีราคาสูงเกินกว่าที่พอจะชำระหนี้ให้แก่เจ้าหนี้ตามคำพิพากษา ถ้าทรัพย์สินหรือสิทธิเรียกร้องนั้นอยู่ในสภาพที่จะแบ่งยึดหรืออายัดได้โดยไม่ก่อให้เกิดความเสียหาย ให้เจ้าพนักงานบังคับคดีมีอำนาจแบ่งยึดหรือแบ่งอายัดทรัพย์สินหรือสิทธิเรียกร้องรายใดแต่เพียงบางส่วนหรือเฉพาะส่วนแห่งกรรมสิทธิ์เท่าที่พอจะชำระหนี้ให้แก่เจ้าหนี้ตามคำพิพากษา พร้อมทั้งค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี บุคคลผู้มีส่วนได้เสียในการบังคับคดีอาจคัดค้านคำสั่งหรือการดำเนินการตามวรรคหนึ่งหรือวรรคสองของเจ้าพนักงานบังคับคดี โดยยื่นคำร้องต่อศาลก่อนวันขายทอดตลาดหรือจำหน่ายโดยวิธีอื่น แต่ต้องไม่ช้ากว่าสิบห้าวันนับแต่วันที่ได้ทราบคำสั่งหรือการดำเนินการนั้น คำสั่งของศาลให้เป็นที่สุด"},{"id":"๓๐๑","num":"มาตรา ๓๐๑","num_ara":"๓๐๑","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๒ ทรัพย์สินที่ไม่อยู่ในความรับผิดแห่งการบังคับคดี","paragraphs":["ทรัพย์สินของลูกหนี้ตามคำพิพากษาต่อไปนี้ ย่อมไม่อยู่ในความรับผิดแห่งการบังคับคดี","(๑) เครื่องนุ่งห่มหลับนอน เครื่องใช้ในครัวเรือน หรือเครื่องใช้สอยส่วนตัว โดยประมาณรวมกันราคาไม่เกินประเภทละสองหมื่นบาท แต่ในกรณีที่เจ้าพนักงานบังคับคดีเห็นสมควร เจ้าพนักงานบังคับคดีจะกำหนดให้ทรัพย์สินแต่ละประเภทดังกล่าวที่มีราคารวมกันเกินสองหมื่นบาทเป็นทรัพย์สินที่ไม่ต้องอยู่ในความรับผิดแห่งการบังคับคดีก็ได้ ทั้งนี้ โดยคำนึงถึงความจำเป็นตามฐานะของลูกหนี้ตามคำพิพากษา (๒) สัตว์ สิ่งของ เครื่องมือ เครื่องใช้ ในการประกอบอาชีพหรือประกอบวิชาชีพเท่าที่จำเป็นในการเลี้ยงชีพของลูกหนี้ตามคำพิพากษา ราคารวมกันโดยประมาณไม่เกินหนึ่งแสนบาท แต่ถ้าลูกหนี้ตามคำพิพากษามีความจำเป็นในการเลี้ยงชีพก็อาจร้องขอต่อเจ้าพนักงานบังคับคดีขออนุญาตใช้สัตว์ สิ่งของ เครื่องมือ เครื่องใช้เท่าที่จำเป็นในการประกอบอาชีพหรือประกอบวิชาชีพในกิจการดังกล่าวของลูกหนี้ตามคำพิพากษาอันมีราคารวมกันเกินกว่าจำนวนราคาที่กำหนดนั้น ในกรณีเช่นนี้ ให้เจ้าพนักงานบังคับคดีมีอำนาจใช้ดุลพินิจไม่อนุญาตหรืออนุญาตได้เท่าที่จำเป็นภายในบังคับแห่งเงื่อนไขตามที่เจ้าพนักงานบังคับคดีเห็นสมควร (๓) สัตว์ สิ่งของ เครื่องใช้ และอุปกรณ์ที่จำเป็นต้องใช้ทำหน้าที่ช่วยหรือแทนอวัยวะของลูกหนี้ตามคำพิพากษา (๔) ทรัพย์สินของลูกหนี้ตามคำพิพากษาอันมีลักษณะเป็นของส่วนตัวโดยแท้ เช่น หนังสือสำหรับวงศ์ตระกูลโดยเฉพาะ จดหมาย หรือสมุดบัญชีต่าง ๆ (๕) ทรัพย์สินอย่างใดที่โอนกันไม่ได้ตามกฎหมาย หรือตามกฎหมายย่อมไม่อยู่ในความรับผิดแห่งการบังคับคดี ทรัพย์สินหรือจำนวนราคาทรัพย์สินที่เจ้าพนักงานบังคับคดีกำหนดตามวรรคหนึ่ง ลูกหนี้ตามคำพิพากษาหรือเจ้าหนี้ตามคำพิพากษาอาจร้องขอให้เจ้าพนักงานบังคับคดีมีคำสั่งกำหนดใหม่ได้ คำสั่งของเจ้าพนักงานบังคับคดีดังกล่าวนั้น ลูกหนี้ตามคำพิพากษาหรือเจ้าหนี้ตามคำพิพากษาอาจร้องคัดค้านต่อศาลได้ภายในสิบห้าวันนับแต่วันที่ได้ทราบคำสั่งของเจ้าพนักงานบังคับคดี ในกรณีเช่นนี้ ให้ศาลมีคำสั่งตามที่เห็นสมควร ในกรณีที่พฤติการณ์ได้เปลี่ยนแปลงไป ลูกหนี้ตามคำพิพากษาหรือเจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องให้ศาลมีคำสั่งเปลี่ยนแปลงทรัพย์สินหรือจำนวนราคาทรัพย์สินที่ศาลกำหนดไว้เดิมได้ ประโยชน์แห่งข้อยกเว้นที่บัญญัติไว้ในมาตรานี้ ให้ขยายไปถึงทรัพย์สินตามวรรคหนึ่งอันเป็นของคู่สมรสของลูกหนี้ตามคำพิพากษาหรือของบุคคลอื่น ซึ่งทรัพย์สินเช่นว่านี้ตามกฎหมายอาจบังคับเอาชำระหนี้ตามคำพิพากษาได้"],"text":"ทรัพย์สินของลูกหนี้ตามคำพิพากษาต่อไปนี้ ย่อมไม่อยู่ในความรับผิดแห่งการบังคับคดี\n\n(๑) เครื่องนุ่งห่มหลับนอน เครื่องใช้ในครัวเรือน หรือเครื่องใช้สอยส่วนตัว โดยประมาณรวมกันราคาไม่เกินประเภทละสองหมื่นบาท แต่ในกรณีที่เจ้าพนักงานบังคับคดีเห็นสมควร เจ้าพนักงานบังคับคดีจะกำหนดให้ทรัพย์สินแต่ละประเภทดังกล่าวที่มีราคารวมกันเกินสองหมื่นบาทเป็นทรัพย์สินที่ไม่ต้องอยู่ในความรับผิดแห่งการบังคับคดีก็ได้ ทั้งนี้ โดยคำนึงถึงความจำเป็นตามฐานะของลูกหนี้ตามคำพิพากษา (๒) สัตว์ สิ่งของ เครื่องมือ เครื่องใช้ ในการประกอบอาชีพหรือประกอบวิชาชีพเท่าที่จำเป็นในการเลี้ยงชีพของลูกหนี้ตามคำพิพากษา ราคารวมกันโดยประมาณไม่เกินหนึ่งแสนบาท แต่ถ้าลูกหนี้ตามคำพิพากษามีความจำเป็นในการเลี้ยงชีพก็อาจร้องขอต่อเจ้าพนักงานบังคับคดีขออนุญาตใช้สัตว์ สิ่งของ เครื่องมือ เครื่องใช้เท่าที่จำเป็นในการประกอบอาชีพหรือประกอบวิชาชีพในกิจการดังกล่าวของลูกหนี้ตามคำพิพากษาอันมีราคารวมกันเกินกว่าจำนวนราคาที่กำหนดนั้น ในกรณีเช่นนี้ ให้เจ้าพนักงานบังคับคดีมีอำนาจใช้ดุลพินิจไม่อนุญาตหรืออนุญาตได้เท่าที่จำเป็นภายในบังคับแห่งเงื่อนไขตามที่เจ้าพนักงานบังคับคดีเห็นสมควร (๓) สัตว์ สิ่งของ เครื่องใช้ และอุปกรณ์ที่จำเป็นต้องใช้ทำหน้าที่ช่วยหรือแทนอวัยวะของลูกหนี้ตามคำพิพากษา (๔) ทรัพย์สินของลูกหนี้ตามคำพิพากษาอันมีลักษณะเป็นของส่วนตัวโดยแท้ เช่น หนังสือสำหรับวงศ์ตระกูลโดยเฉพาะ จดหมาย หรือสมุดบัญชีต่าง ๆ (๕) ทรัพย์สินอย่างใดที่โอนกันไม่ได้ตามกฎหมาย หรือตามกฎหมายย่อมไม่อยู่ในความรับผิดแห่งการบังคับคดี ทรัพย์สินหรือจำนวนราคาทรัพย์สินที่เจ้าพนักงานบังคับคดีกำหนดตามวรรคหนึ่ง ลูกหนี้ตามคำพิพากษาหรือเจ้าหนี้ตามคำพิพากษาอาจร้องขอให้เจ้าพนักงานบังคับคดีมีคำสั่งกำหนดใหม่ได้ คำสั่งของเจ้าพนักงานบังคับคดีดังกล่าวนั้น ลูกหนี้ตามคำพิพากษาหรือเจ้าหนี้ตามคำพิพากษาอาจร้องคัดค้านต่อศาลได้ภายในสิบห้าวันนับแต่วันที่ได้ทราบคำสั่งของเจ้าพนักงานบังคับคดี ในกรณีเช่นนี้ ให้ศาลมีคำสั่งตามที่เห็นสมควร ในกรณีที่พฤติการณ์ได้เปลี่ยนแปลงไป ลูกหนี้ตามคำพิพากษาหรือเจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องให้ศาลมีคำสั่งเปลี่ยนแปลงทรัพย์สินหรือจำนวนราคาทรัพย์สินที่ศาลกำหนดไว้เดิมได้ ประโยชน์แห่งข้อยกเว้นที่บัญญัติไว้ในมาตรานี้ ให้ขยายไปถึงทรัพย์สินตามวรรคหนึ่งอันเป็นของคู่สมรสของลูกหนี้ตามคำพิพากษาหรือของบุคคลอื่น ซึ่งทรัพย์สินเช่นว่านี้ตามกฎหมายอาจบังคับเอาชำระหนี้ตามคำพิพากษาได้"},{"id":"๓๐๒","num":"มาตรา ๓๐๒","num_ara":"๓๐๒","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๒ ทรัพย์สินที่ไม่อยู่ในความรับผิดแห่งการบังคับคดี","paragraphs":["ภายใต้บังคับบทบัญญัติแห่งกฎหมายอื่น เงินหรือสิทธิเรียกร้องเป็นเงินของลูกหนี้ตามคำพิพากษาต่อไปนี้ ไม่อยู่ในความรับผิดแห่งการบังคับคดี","(๑) เบี้ยเลี้ยงชีพซึ่งกฎหมายกำหนดไว้ ส่วนเงินรายได้เป็นคราว ๆ ซึ่งบุคคลภายนอกได้ยกให้เพื่อเลี้ยงชีพนั้น ให้มีจำนวนไม่เกินเดือนละสองหมื่นบาทหรือตามจำนวนที่เจ้าพนักงานบังคับคดีเห็นสมควร (๒) เงินเดือน ค่าจ้าง บำนาญ บำเหน็จ เบี้ยหวัด หรือรายได้อื่นในลักษณะเดียวกันของข้าราชการ เจ้าหน้าที่ หรือลูกจ้างในหน่วยราชการ และเงินสงเคราะห์ บำนาญ หรือบำเหน็จที่หน่วยราชการได้จ่ายให้แก่คู่สมรสหรือญาติที่ยังมีชีวิตของบุคคลเหล่านั้น (๓) เงินเดือน ค่าจ้าง บำนาญ ค่าชดใช้ เงินสงเคราะห์ หรือรายได้อื่นในลักษณะเดียวกันของพนักงาน ลูกจ้าง หรือคนงาน นอกจากที่กล่าวไว้ใน (๒) ที่นายจ้างหรือบุคคลอื่นใดได้จ่ายให้แก่บุคคลเหล่านั้น หรือคู่สมรส หรือญาติที่ยังมีชีวิตของบุคคลเหล่านั้น เป็นจำนวนรวมกันไม่เกินเดือนละสองหมื่นบาทหรือตามจำนวนที่เจ้าพนักงานบังคับคดีเห็นสมควร (๔) บำเหน็จหรือค่าชดเชยหรือรายได้อื่นในลักษณะเดียวกันของบุคคลตาม (๓) เป็นจำนวนไม่เกินสามแสนบาทหรือตามจำนวนที่เจ้าพนักงานบังคับคดีเห็นสมควร (๕) เงินฌาปนกิจสงเคราะห์ที่ลูกหนี้ตามคำพิพากษาได้รับอันเนื่องมาแต่ความตายของบุคคลอื่นเป็นจำนวนตามที่จำเป็นในการดำเนินการฌาปนกิจศพตามฐานะของผู้ตายที่เจ้าพนักงานบังคับคดีเห็นสมควร ในกรณีที่เจ้าพนักงานบังคับคดีเป็นผู้กำหนดจำนวนเงินตาม (๑) (๓) และ (๔) ให้เจ้าพนักงานบังคับคดีคำนึงถึงฐานะในทางครอบครัวของลูกหนี้ตามคำพิพากษาและจำนวนบุพการีและผู้สืบสันดานซึ่งอยู่ในความอุปการะของลูกหนี้ตามคำพิพากษาด้วย และสำหรับในกรณีตาม (๑) และ (๓) ให้เจ้าพนักงานบังคับคดีกำหนดให้ไม่น้อยกว่าอัตราเงินเดือนขั้นต่ำสุดของข้าราชการพลเรือนในขณะนั้นและไม่เกินอัตราเงินเดือนขั้นสูงสุดของข้าราชการพลเรือนในขณะนั้น ถ้าเจ้าหนี้ตามคำพิพากษา ลูกหนี้ตามคำพิพากษา หรือบุคคลภายนอกผู้มีส่วนได้เสียในการบังคับคดีไม่เห็นด้วยกับจำนวนเงินที่เจ้าพนักงานบังคับคดีกำหนด บุคคลดังกล่าวอาจยื่นคำร้องต่อศาลภายในสิบห้าวันนับแต่วันที่ได้ทราบถึงการกำหนดจำนวนเงินเช่นว่านั้น เพื่อขอให้ศาลกำหนดจำนวนเงินใหม่ได้ ในกรณีที่พฤติการณ์แห่งการดำรงชีพของลูกหนี้ตามคำพิพากษาได้เปลี่ยนแปลงไป บุคคลตามวรรคสามจะยื่นคำร้องให้ศาลหรือเจ้าพนักงานบังคับคดี แล้วแต่กรณี กำหนดจำนวนเงินตาม (๑) และ (๓) ใหม่ก็ได้"],"text":"ภายใต้บังคับบทบัญญัติแห่งกฎหมายอื่น เงินหรือสิทธิเรียกร้องเป็นเงินของลูกหนี้ตามคำพิพากษาต่อไปนี้ ไม่อยู่ในความรับผิดแห่งการบังคับคดี\n\n(๑) เบี้ยเลี้ยงชีพซึ่งกฎหมายกำหนดไว้ ส่วนเงินรายได้เป็นคราว ๆ ซึ่งบุคคลภายนอกได้ยกให้เพื่อเลี้ยงชีพนั้น ให้มีจำนวนไม่เกินเดือนละสองหมื่นบาทหรือตามจำนวนที่เจ้าพนักงานบังคับคดีเห็นสมควร (๒) เงินเดือน ค่าจ้าง บำนาญ บำเหน็จ เบี้ยหวัด หรือรายได้อื่นในลักษณะเดียวกันของข้าราชการ เจ้าหน้าที่ หรือลูกจ้างในหน่วยราชการ และเงินสงเคราะห์ บำนาญ หรือบำเหน็จที่หน่วยราชการได้จ่ายให้แก่คู่สมรสหรือญาติที่ยังมีชีวิตของบุคคลเหล่านั้น (๓) เงินเดือน ค่าจ้าง บำนาญ ค่าชดใช้ เงินสงเคราะห์ หรือรายได้อื่นในลักษณะเดียวกันของพนักงาน ลูกจ้าง หรือคนงาน นอกจากที่กล่าวไว้ใน (๒) ที่นายจ้างหรือบุคคลอื่นใดได้จ่ายให้แก่บุคคลเหล่านั้น หรือคู่สมรส หรือญาติที่ยังมีชีวิตของบุคคลเหล่านั้น เป็นจำนวนรวมกันไม่เกินเดือนละสองหมื่นบาทหรือตามจำนวนที่เจ้าพนักงานบังคับคดีเห็นสมควร (๔) บำเหน็จหรือค่าชดเชยหรือรายได้อื่นในลักษณะเดียวกันของบุคคลตาม (๓) เป็นจำนวนไม่เกินสามแสนบาทหรือตามจำนวนที่เจ้าพนักงานบังคับคดีเห็นสมควร (๕) เงินฌาปนกิจสงเคราะห์ที่ลูกหนี้ตามคำพิพากษาได้รับอันเนื่องมาแต่ความตายของบุคคลอื่นเป็นจำนวนตามที่จำเป็นในการดำเนินการฌาปนกิจศพตามฐานะของผู้ตายที่เจ้าพนักงานบังคับคดีเห็นสมควร ในกรณีที่เจ้าพนักงานบังคับคดีเป็นผู้กำหนดจำนวนเงินตาม (๑) (๓) และ (๔) ให้เจ้าพนักงานบังคับคดีคำนึงถึงฐานะในทางครอบครัวของลูกหนี้ตามคำพิพากษาและจำนวนบุพการีและผู้สืบสันดานซึ่งอยู่ในความอุปการะของลูกหนี้ตามคำพิพากษาด้วย และสำหรับในกรณีตาม (๑) และ (๓) ให้เจ้าพนักงานบังคับคดีกำหนดให้ไม่น้อยกว่าอัตราเงินเดือนขั้นต่ำสุดของข้าราชการพลเรือนในขณะนั้นและไม่เกินอัตราเงินเดือนขั้นสูงสุดของข้าราชการพลเรือนในขณะนั้น ถ้าเจ้าหนี้ตามคำพิพากษา ลูกหนี้ตามคำพิพากษา หรือบุคคลภายนอกผู้มีส่วนได้เสียในการบังคับคดีไม่เห็นด้วยกับจำนวนเงินที่เจ้าพนักงานบังคับคดีกำหนด บุคคลดังกล่าวอาจยื่นคำร้องต่อศาลภายในสิบห้าวันนับแต่วันที่ได้ทราบถึงการกำหนดจำนวนเงินเช่นว่านั้น เพื่อขอให้ศาลกำหนดจำนวนเงินใหม่ได้ ในกรณีที่พฤติการณ์แห่งการดำรงชีพของลูกหนี้ตามคำพิพากษาได้เปลี่ยนแปลงไป บุคคลตามวรรคสามจะยื่นคำร้องให้ศาลหรือเจ้าพนักงานบังคับคดี แล้วแต่กรณี กำหนดจำนวนเงินตาม (๑) และ (๓) ใหม่ก็ได้"},{"id":"๓๐๓","num":"มาตรา ๓๐๓","num_ara":"๓๐๓","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดสังหาริมทรัพย์มีรูปร่างของลูกหนี้ตามคำพิพากษานั้น ให้เจ้าพนักงานบังคับคดีกระทำโดย","(๑) นำทรัพย์นั้นมาเก็บรักษาไว้ หรือฝากทรัพย์นั้นไว้ ณ สถานที่ใดหรือแก่บุคคลใดตามที่เห็นสมควรหรือมอบให้ลูกหนี้ตามคำพิพากษาเป็นผู้รักษาทรัพย์นั้นโดยได้รับความยินยอมจากเจ้าหนี้ตามคำพิพากษา (๒) แจ้งรายการทรัพย์ที่ยึดให้ลูกหนี้ตามคำพิพากษาและผู้ครอบครองหรือผู้ดูแลทรัพย์นั้นทราบ ถ้าไม่สามารถกระทำได้ ให้ปิดประกาศแจ้งรายการทรัพย์ที่ยึดไว้ ณ สถานที่ที่กระทำการยึด หรือแจ้งโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควร (๓) แสดงให้เห็นประจักษ์แจ้งโดยการประทับตราหรือโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควรว่าได้มีการยึดทรัพย์นั้นแล้ว"],"text":"การยึดสังหาริมทรัพย์มีรูปร่างของลูกหนี้ตามคำพิพากษานั้น ให้เจ้าพนักงานบังคับคดีกระทำโดย\n\n(๑) นำทรัพย์นั้นมาเก็บรักษาไว้ หรือฝากทรัพย์นั้นไว้ ณ สถานที่ใดหรือแก่บุคคลใดตามที่เห็นสมควรหรือมอบให้ลูกหนี้ตามคำพิพากษาเป็นผู้รักษาทรัพย์นั้นโดยได้รับความยินยอมจากเจ้าหนี้ตามคำพิพากษา (๒) แจ้งรายการทรัพย์ที่ยึดให้ลูกหนี้ตามคำพิพากษาและผู้ครอบครองหรือผู้ดูแลทรัพย์นั้นทราบ ถ้าไม่สามารถกระทำได้ ให้ปิดประกาศแจ้งรายการทรัพย์ที่ยึดไว้ ณ สถานที่ที่กระทำการยึด หรือแจ้งโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควร (๓) แสดงให้เห็นประจักษ์แจ้งโดยการประทับตราหรือโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควรว่าได้มีการยึดทรัพย์นั้นแล้ว"},{"id":"๓๐๔","num":"มาตรา ๓๐๔","num_ara":"๓๐๔","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึด เรือ แพ สัตว์พาหนะ หรือสังหาริมทรัพย์มีรูปร่างอย่างอื่นของลูกหนี้ตามคำพิพากษาซึ่งจะต้องจดทะเบียนกรรมสิทธิ์หรือได้จดทะเบียนกรรมสิทธิ์ไว้แล้วตามกฎหมาย ให้เจ้าพนักงานบังคับคดีกระทำโดย","(๑) ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๓ (๒) แจ้งให้นายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนตามกฎหมายว่าด้วยการนั้นทราบ ถ้าได้มีการจดทะเบียนกรรมสิทธิ์ไว้แล้ว ให้นายทะเบียนหรือพนักงานเจ้าหน้าที่บันทึกการยึดไว้ในทะเบียน"],"text":"การยึด เรือ แพ สัตว์พาหนะ หรือสังหาริมทรัพย์มีรูปร่างอย่างอื่นของลูกหนี้ตามคำพิพากษาซึ่งจะต้องจดทะเบียนกรรมสิทธิ์หรือได้จดทะเบียนกรรมสิทธิ์ไว้แล้วตามกฎหมาย ให้เจ้าพนักงานบังคับคดีกระทำโดย\n\n(๑) ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๓ (๒) แจ้งให้นายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนตามกฎหมายว่าด้วยการนั้นทราบ ถ้าได้มีการจดทะเบียนกรรมสิทธิ์ไว้แล้ว ให้นายทะเบียนหรือพนักงานเจ้าหน้าที่บันทึกการยึดไว้ในทะเบียน"},{"id":"๓๐๕","num":"มาตรา ๓๐๕","num_ara":"๓๐๕","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดหลักทรัพย์ที่เป็นหลักทรัพย์ตามกฎหมายว่าด้วยหลักทรัพย์และตลาดหลักทรัพย์ของลูกหนี้ตามคำพิพากษา ให้เจ้าพนักงานบังคับคดีกระทำโดย","(๑) ในกรณีที่ยังไม่มีการออกใบตราสาร ให้เจ้าพนักงานบังคับคดีแจ้งรายการและจำนวนหลักทรัพย์ที่ยึดให้ลูกหนี้ตามคำพิพากษาและผู้ออกหลักทรัพย์นั้นทราบ และเมื่อได้ดำเนินการยึดหลักทรัพย์ดังกล่าวเสร็จแล้ว ให้เจ้าพนักงานบังคับคดีสั่งให้ผู้ออกหลักทรัพย์ออกใบตราสารส่งให้แก่เจ้าพนักงานบังคับคดี (๒) ในกรณีที่มีการออกใบตราสารแล้ว ให้เจ้าพนักงานบังคับคดีแจ้งรายการและจำนวนหลักทรัพย์ที่ยึดให้ลูกหนี้ตามคำพิพากษา ผู้ออกหลักทรัพย์ และผู้ครอบครองตราสารเท่าที่ทราบ รวมทั้งบุคคลซึ่งต้องชำระหนี้ตามตราสารนั้น ทราบ และเมื่อได้ดำเนินการยึดหลักทรัพย์ดังกล่าวเสร็จแล้ว ให้เจ้าพนักงานบังคับคดีนำตราสารนั้นมาเก็บรักษาไว้หากสามารถนำมาได้ (๓) ในกรณีที่เป็นหลักทรัพย์ซึ่งฝากไว้กับศูนย์รับฝากหลักทรัพย์ตามกฎหมายว่าด้วยหลักทรัพย์และตลาดหลักทรัพย์ ให้เจ้าพนักงานบังคับคดีแจ้งรายการและจำนวนหลักทรัพย์ที่ยึดให้ลูกหนี้ตามคำพิพากษา ผู้ออกหลักทรัพย์ ผู้ฝากหลักทรัพย์และศูนย์รับฝากหลักทรัพย์ตามกฎหมายว่าด้วยหลักทรัพย์และตลาดหลักทรัพย์ ทราบ เพื่อปฏิบัติตามที่ได้รับแจ้งจากเจ้าพนักงานบังคับคดี (๔) ในกรณีที่เป็นหลักทรัพย์ที่ไม่มีการออกใบตราสาร ให้เจ้าพนักงานบังคับคดีแจ้งรายการและจำนวนหลักทรัพย์ที่ยึดให้ลูกหนี้ตามคำพิพากษาและผู้ออกหลักทรัพย์ทราบ เพื่อปฏิบัติตามที่ได้รับแจ้งจากเจ้าพนักงานบังคับคดี ในกรณีที่ไม่สามารถแจ้งบุคคลตามวรรคหนึ่งได้ ให้ปิดประกาศแจ้งรายการและจำนวนหลักทรัพย์ที่ยึดไว้ในที่แลเห็นได้ง่าย ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลเช่นว่านั้น หรือแจ้งโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควร และให้มีผลใช้ได้นับแต่เวลาที่ประกาศนั้นได้ปิดไว้หรือการแจ้งโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควรนั้นได้ทำหรือได้ตั้งต้นแล้ว"],"text":"การยึดหลักทรัพย์ที่เป็นหลักทรัพย์ตามกฎหมายว่าด้วยหลักทรัพย์และตลาดหลักทรัพย์ของลูกหนี้ตามคำพิพากษา ให้เจ้าพนักงานบังคับคดีกระทำโดย\n\n(๑) ในกรณีที่ยังไม่มีการออกใบตราสาร ให้เจ้าพนักงานบังคับคดีแจ้งรายการและจำนวนหลักทรัพย์ที่ยึดให้ลูกหนี้ตามคำพิพากษาและผู้ออกหลักทรัพย์นั้นทราบ และเมื่อได้ดำเนินการยึดหลักทรัพย์ดังกล่าวเสร็จแล้ว ให้เจ้าพนักงานบังคับคดีสั่งให้ผู้ออกหลักทรัพย์ออกใบตราสารส่งให้แก่เจ้าพนักงานบังคับคดี (๒) ในกรณีที่มีการออกใบตราสารแล้ว ให้เจ้าพนักงานบังคับคดีแจ้งรายการและจำนวนหลักทรัพย์ที่ยึดให้ลูกหนี้ตามคำพิพากษา ผู้ออกหลักทรัพย์ และผู้ครอบครองตราสารเท่าที่ทราบ รวมทั้งบุคคลซึ่งต้องชำระหนี้ตามตราสารนั้น ทราบ และเมื่อได้ดำเนินการยึดหลักทรัพย์ดังกล่าวเสร็จแล้ว ให้เจ้าพนักงานบังคับคดีนำตราสารนั้นมาเก็บรักษาไว้หากสามารถนำมาได้ (๓) ในกรณีที่เป็นหลักทรัพย์ซึ่งฝากไว้กับศูนย์รับฝากหลักทรัพย์ตามกฎหมายว่าด้วยหลักทรัพย์และตลาดหลักทรัพย์ ให้เจ้าพนักงานบังคับคดีแจ้งรายการและจำนวนหลักทรัพย์ที่ยึดให้ลูกหนี้ตามคำพิพากษา ผู้ออกหลักทรัพย์ ผู้ฝากหลักทรัพย์และศูนย์รับฝากหลักทรัพย์ตามกฎหมายว่าด้วยหลักทรัพย์และตลาดหลักทรัพย์ ทราบ เพื่อปฏิบัติตามที่ได้รับแจ้งจากเจ้าพนักงานบังคับคดี (๔) ในกรณีที่เป็นหลักทรัพย์ที่ไม่มีการออกใบตราสาร ให้เจ้าพนักงานบังคับคดีแจ้งรายการและจำนวนหลักทรัพย์ที่ยึดให้ลูกหนี้ตามคำพิพากษาและผู้ออกหลักทรัพย์ทราบ เพื่อปฏิบัติตามที่ได้รับแจ้งจากเจ้าพนักงานบังคับคดี ในกรณีที่ไม่สามารถแจ้งบุคคลตามวรรคหนึ่งได้ ให้ปิดประกาศแจ้งรายการและจำนวนหลักทรัพย์ที่ยึดไว้ในที่แลเห็นได้ง่าย ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลเช่นว่านั้น หรือแจ้งโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควร และให้มีผลใช้ได้นับแต่เวลาที่ประกาศนั้นได้ปิดไว้หรือการแจ้งโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควรนั้นได้ทำหรือได้ตั้งต้นแล้ว"},{"id":"๓๐๖","num":"มาตรา ๓๐๖","num_ara":"๓๐๖","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดตั๋วเงินหรือตราสารเปลี่ยนมืออื่นใดของลูกหนี้ตามคำพิพากษา ให้นำบทบัญญัติมาตรา ๓๐๕ วรรคหนึ่ง (๒) และวรรคสอง มาใช้บังคับโดยอนุโลม และให้มีผลเป็นการอายัดสิทธิเรียกร้องตามตั๋วเงินหรือตราสารนั้นด้วย ในกรณีที่เห็นสมควรเจ้าพนักงานบังคับคดีอาจร้องขอให้ศาลมีคำสั่งอนุญาตให้จำหน่ายตามราคาที่ปรากฏในตั๋วเงินหรือตราสารหรือราคาต่ำกว่านั้นตามที่ศาลเห็นสมควร ถ้าศาลสั่งยกคำร้อง ให้นำตั๋วเงินหรือตราสารนั้นออกขายทอดตลาด"],"text":"การยึดตั๋วเงินหรือตราสารเปลี่ยนมืออื่นใดของลูกหนี้ตามคำพิพากษา ให้นำบทบัญญัติมาตรา ๓๐๕ วรรคหนึ่ง (๒) และวรรคสอง มาใช้บังคับโดยอนุโลม และให้มีผลเป็นการอายัดสิทธิเรียกร้องตามตั๋วเงินหรือตราสารนั้นด้วย ในกรณีที่เห็นสมควรเจ้าพนักงานบังคับคดีอาจร้องขอให้ศาลมีคำสั่งอนุญาตให้จำหน่ายตามราคาที่ปรากฏในตั๋วเงินหรือตราสารหรือราคาต่ำกว่านั้นตามที่ศาลเห็นสมควร ถ้าศาลสั่งยกคำร้อง ให้นำตั๋วเงินหรือตราสารนั้นออกขายทอดตลาด"},{"id":"๓๐๗","num":"มาตรา ๓๐๗","num_ara":"๓๐๗","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดหุ้นของลูกหนี้ตามคำพิพากษาซึ่งเป็นหุ้นส่วนจำพวกจำกัดความรับผิดในห้างหุ้นส่วนจำกัด หรือผู้ถือหุ้นในบริษัทจำกัด ให้เจ้าพนักงานบังคับคดีกระทำโดย","(๑) แจ้งการยึดให้ลูกหนี้ตามคำพิพากษาและห้างหุ้นส่วนจำกัดหรือบริษัทจำกัดที่ลูกหนี้ตามคำพิพากษาเป็นหุ้นส่วนหรือผู้ถือหุ้นอยู่ทราบ ถ้าไม่สามารถกระทำได้ ให้ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๕ วรรคสอง (๒) แจ้งให้นายทะเบียนหุ้นส่วนบริษัทนั้นบันทึกการยึดไว้ในทะเบียน"],"text":"การยึดหุ้นของลูกหนี้ตามคำพิพากษาซึ่งเป็นหุ้นส่วนจำพวกจำกัดความรับผิดในห้างหุ้นส่วนจำกัด หรือผู้ถือหุ้นในบริษัทจำกัด ให้เจ้าพนักงานบังคับคดีกระทำโดย\n\n(๑) แจ้งการยึดให้ลูกหนี้ตามคำพิพากษาและห้างหุ้นส่วนจำกัดหรือบริษัทจำกัดที่ลูกหนี้ตามคำพิพากษาเป็นหุ้นส่วนหรือผู้ถือหุ้นอยู่ทราบ ถ้าไม่สามารถกระทำได้ ให้ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๕ วรรคสอง (๒) แจ้งให้นายทะเบียนหุ้นส่วนบริษัทนั้นบันทึกการยึดไว้ในทะเบียน"},{"id":"๓๐๘","num":"มาตรา ๓๐๘","num_ara":"๓๐๘","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดสิทธิในสิทธิบัตร สิทธิในเครื่องหมายการค้า หรือสิทธิอย่างอื่นของลูกหนี้ตามคำพิพากษาที่มีลักษณะคล้ายคลึงกันหรือที่เกี่ยวเนื่องกันกับสิทธิดังกล่าว ซึ่งได้จดทะเบียนหรือขึ้นทะเบียนไว้แล้ว ให้เจ้าพนักงานบังคับคดีกระทำโดย","(๑) แจ้งรายการสิทธิที่ยึดให้ลูกหนี้ตามคำพิพากษาทราบ ถ้าไม่สามารถกระทำได้ ให้ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๕ วรรคสอง (๒) แจ้งให้นายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนตามกฎหมายว่าด้วยการนั้นบันทึกการยึดไว้ในทะเบียน"],"text":"การยึดสิทธิในสิทธิบัตร สิทธิในเครื่องหมายการค้า หรือสิทธิอย่างอื่นของลูกหนี้ตามคำพิพากษาที่มีลักษณะคล้ายคลึงกันหรือที่เกี่ยวเนื่องกันกับสิทธิดังกล่าว ซึ่งได้จดทะเบียนหรือขึ้นทะเบียนไว้แล้ว ให้เจ้าพนักงานบังคับคดีกระทำโดย\n\n(๑) แจ้งรายการสิทธิที่ยึดให้ลูกหนี้ตามคำพิพากษาทราบ ถ้าไม่สามารถกระทำได้ ให้ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๕ วรรคสอง (๒) แจ้งให้นายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนตามกฎหมายว่าด้วยการนั้นบันทึกการยึดไว้ในทะเบียน"},{"id":"๓๐๙","num":"มาตรา ๓๐๙","num_ara":"๓๐๙","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดสิทธิในเครื่องหมายการค้าซึ่งยังมิได้จดทะเบียน ลิขสิทธิ์ สิทธิขอรับสิทธิบัตร สิทธิในชื่อทางการค้าหรือยี่ห้อ หรือสิทธิอย่างอื่นของลูกหนี้ตามคำพิพากษาที่มีลักษณะคล้ายคลึงกันหรือที่เกี่ยวเนื่องกันกับสิทธิดังกล่าว ให้เจ้าพนักงานบังคับคดีกระทำโดยแจ้งรายการสิทธิที่ยึดให้ลูกหนี้ตามคำพิพากษาทราบ ถ้าไม่สามารถกระทำได้ ให้ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๕ วรรคสอง"],"text":"การยึดสิทธิในเครื่องหมายการค้าซึ่งยังมิได้จดทะเบียน ลิขสิทธิ์ สิทธิขอรับสิทธิบัตร สิทธิในชื่อทางการค้าหรือยี่ห้อ หรือสิทธิอย่างอื่นของลูกหนี้ตามคำพิพากษาที่มีลักษณะคล้ายคลึงกันหรือที่เกี่ยวเนื่องกันกับสิทธิดังกล่าว ให้เจ้าพนักงานบังคับคดีกระทำโดยแจ้งรายการสิทธิที่ยึดให้ลูกหนี้ตามคำพิพากษาทราบ ถ้าไม่สามารถกระทำได้ ให้ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๕ วรรคสอง"},{"id":"๓๑๐","num":"มาตรา ๓๑๐","num_ara":"๓๑๐","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดสิทธิการเช่าทรัพย์สินหรือสิทธิที่จะได้ใช้บริการต่าง ๆ ซึ่งอาจมีราคาและถือเอาได้ของลูกหนี้ตามคำพิพากษา เช่น บริการโทรศัพท์หรือโทรคมนาคม หรือบริการอื่นใดที่อาจได้รับจากทรัพย์สินหรือบริการของผู้อื่น ให้เจ้าพนักงานบังคับคดีกระทำโดย","(๑) แจ้งรายการสิทธิที่ยึดให้ลูกหนี้ตามคำพิพากษาและผู้ให้เช่าหรือผู้ให้บริการ แล้วแต่กรณี ทราบ ถ้าไม่สามารถกระทำได้ ให้ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๕ วรรคสอง (๒) ในกรณีที่ได้มีการจดทะเบียนการเช่าทรัพย์สินหรือการให้บริการดังกล่าว ให้แจ้งนายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่ตามกฎหมายว่าด้วยการนั้นบันทึกการยึดไว้ในทะเบียนด้วย"],"text":"การยึดสิทธิการเช่าทรัพย์สินหรือสิทธิที่จะได้ใช้บริการต่าง ๆ ซึ่งอาจมีราคาและถือเอาได้ของลูกหนี้ตามคำพิพากษา เช่น บริการโทรศัพท์หรือโทรคมนาคม หรือบริการอื่นใดที่อาจได้รับจากทรัพย์สินหรือบริการของผู้อื่น ให้เจ้าพนักงานบังคับคดีกระทำโดย\n\n(๑) แจ้งรายการสิทธิที่ยึดให้ลูกหนี้ตามคำพิพากษาและผู้ให้เช่าหรือผู้ให้บริการ แล้วแต่กรณี ทราบ ถ้าไม่สามารถกระทำได้ ให้ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๕ วรรคสอง (๒) ในกรณีที่ได้มีการจดทะเบียนการเช่าทรัพย์สินหรือการให้บริการดังกล่าว ให้แจ้งนายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่ตามกฎหมายว่าด้วยการนั้นบันทึกการยึดไว้ในทะเบียนด้วย"},{"id":"๓๑๑","num":"มาตรา ๓๑๑","num_ara":"๓๑๑","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดสิทธิของลูกหนี้ตามคำพิพากษาตามใบอนุญาต ประทานบัตร อาชญาบัตร สัมปทาน หรือสิทธิอย่างอื่นของลูกหนี้ตามคำพิพากษาที่มีลักษณะคล้ายคลึงกันหรือที่เกี่ยวเนื่องกันกับสิทธิดังกล่าว ให้เจ้าพนักงานบังคับคดีกระทำโดย","(๑) แจ้งรายการสิทธิที่ยึดให้ลูกหนี้ตามคำพิพากษาทราบ ถ้าไม่สามารถกระทำได้ ให้ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๕ วรรคสอง (๒) แจ้งให้นายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่ตามกฎหมายว่าด้วยการนั้นบันทึกการยึดไว้ในทะเบียน"],"text":"การยึดสิทธิของลูกหนี้ตามคำพิพากษาตามใบอนุญาต ประทานบัตร อาชญาบัตร สัมปทาน หรือสิทธิอย่างอื่นของลูกหนี้ตามคำพิพากษาที่มีลักษณะคล้ายคลึงกันหรือที่เกี่ยวเนื่องกันกับสิทธิดังกล่าว ให้เจ้าพนักงานบังคับคดีกระทำโดย\n\n(๑) แจ้งรายการสิทธิที่ยึดให้ลูกหนี้ตามคำพิพากษาทราบ ถ้าไม่สามารถกระทำได้ ให้ดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๐๕ วรรคสอง (๒) แจ้งให้นายทะเบียนหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่ตามกฎหมายว่าด้วยการนั้นบันทึกการยึดไว้ในทะเบียน"},{"id":"๓๑๒","num":"มาตรา ๓๑๒","num_ara":"๓๑๒","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดอสังหาริมทรัพย์ของลูกหนี้ตามคำพิพากษานั้น ให้เจ้าพนักงานบังคับคดีกระทำโดย","(๑) นำหนังสือสำคัญสำหรับทรัพย์นั้นมาเก็บรักษาไว้ หรือฝากไว้แก่บุคคลใดตามที่เห็นสมควร เว้นแต่ทรัพย์นั้นยังไม่มีหนังสือสำคัญหรือนำหนังสือสำคัญมาไม่ได้ (๒) แสดงให้เห็นประจักษ์แจ้งโดยการปิดประกาศไว้ที่ทรัพย์นั้นว่า ได้มีการยึดทรัพย์นั้นแล้ว (๓) แจ้งรายการทรัพย์ที่ยึดให้บุคคลดังต่อไปนี้ทราบ (ก) ลูกหนี้ตามคำพิพากษา (ข) บุคคลอื่นซึ่งมีชื่อในทะเบียนว่าเป็นเจ้าของทรัพย์นั้น (ค) เจ้าพนักงานที่ดินหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนสิทธิและนิติกรรมเกี่ยวกับทรัพย์นั้น ถ้าทรัพย์นั้นมีทะเบียน ให้เจ้าพนักงานที่ดินหรือพนักงานเจ้าหน้าที่บันทึกการยึดไว้ในทะเบียน ในกรณีที่ไม่สามารถแจ้งตามวรรคหนึ่ง (๓) (ก) หรือ (ข) ได้ ให้ปิดประกาศแจ้งรายการทรัพย์ที่ยึดไว้ในที่แลเห็นได้ง่าย ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลเช่นว่านั้น หรือแจ้งโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควร และให้มีผลใช้ได้นับแต่เวลาที่ประกาศนั้นได้ปิดไว้หรือการแจ้งโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควรนั้นได้ทำหรือได้ตั้งต้นแล้ว เมื่อได้แจ้งการยึดให้ลูกหนี้ตามคำพิพากษาและเจ้าพนักงานที่ดินหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนสิทธิและนิติกรรมเกี่ยวกับทรัพย์นั้นแล้ว ให้ถือว่าเป็นการยึดตามกฎหมาย"],"text":"การยึดอสังหาริมทรัพย์ของลูกหนี้ตามคำพิพากษานั้น ให้เจ้าพนักงานบังคับคดีกระทำโดย\n\n(๑) นำหนังสือสำคัญสำหรับทรัพย์นั้นมาเก็บรักษาไว้ หรือฝากไว้แก่บุคคลใดตามที่เห็นสมควร เว้นแต่ทรัพย์นั้นยังไม่มีหนังสือสำคัญหรือนำหนังสือสำคัญมาไม่ได้ (๒) แสดงให้เห็นประจักษ์แจ้งโดยการปิดประกาศไว้ที่ทรัพย์นั้นว่า ได้มีการยึดทรัพย์นั้นแล้ว (๓) แจ้งรายการทรัพย์ที่ยึดให้บุคคลดังต่อไปนี้ทราบ (ก) ลูกหนี้ตามคำพิพากษา (ข) บุคคลอื่นซึ่งมีชื่อในทะเบียนว่าเป็นเจ้าของทรัพย์นั้น (ค) เจ้าพนักงานที่ดินหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนสิทธิและนิติกรรมเกี่ยวกับทรัพย์นั้น ถ้าทรัพย์นั้นมีทะเบียน ให้เจ้าพนักงานที่ดินหรือพนักงานเจ้าหน้าที่บันทึกการยึดไว้ในทะเบียน ในกรณีที่ไม่สามารถแจ้งตามวรรคหนึ่ง (๓) (ก) หรือ (ข) ได้ ให้ปิดประกาศแจ้งรายการทรัพย์ที่ยึดไว้ในที่แลเห็นได้ง่าย ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลเช่นว่านั้น หรือแจ้งโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควร และให้มีผลใช้ได้นับแต่เวลาที่ประกาศนั้นได้ปิดไว้หรือการแจ้งโดยวิธีอื่นใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควรนั้นได้ทำหรือได้ตั้งต้นแล้ว เมื่อได้แจ้งการยึดให้ลูกหนี้ตามคำพิพากษาและเจ้าพนักงานที่ดินหรือพนักงานเจ้าหน้าที่ผู้มีอำนาจหน้าที่จดทะเบียนสิทธิและนิติกรรมเกี่ยวกับทรัพย์นั้นแล้ว ให้ถือว่าเป็นการยึดตามกฎหมาย"},{"id":"๓๑๓","num":"มาตรา ๓๑๓","num_ara":"๓๑๓","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดทรัพยสิทธิอันเกี่ยวกับอสังหาริมทรัพย์นั้น ให้เจ้าพนักงานบังคับคดีกระทำโดยดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๑๒ โดยอนุโลม"],"text":"การยึดทรัพยสิทธิอันเกี่ยวกับอสังหาริมทรัพย์นั้น ให้เจ้าพนักงานบังคับคดีกระทำโดยดำเนินการตามวิธีการที่บัญญัติไว้ในมาตรา ๓๑๒ โดยอนุโลม"},{"id":"๓๑๔","num":"มาตรา ๓๑๔","num_ara":"๓๑๔","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดสังหาริมทรัพย์มีรูปร่างของลูกหนี้ตามคำพิพากษานั้นให้มีผลเป็นการยึดครอบไปถึงดอกผลธรรมดาและดอกผลนิตินัยของทรัพย์นั้นด้วย การยึดอสังหาริมทรัพย์ของลูกหนี้ตามคำพิพากษานั้นให้มีผลเป็นการยึดครอบไปถึง","(๑) เครื่องอุปกรณ์และดอกผลนิตินัยของทรัพย์นั้น (๒) ดอกผลธรรมดาของทรัพย์นั้นที่ลูกหนี้ตามคำพิพากษามีสิทธิเก็บเกี่ยว เมื่อเจ้าพนักงานบังคับคดีได้แจ้งหรือปิดประกาศให้ลูกหนี้ตามคำพิพากษาและผู้ครอบครองหรือผู้ดูแลทรัพย์นั้นทราบในขณะทำการยึดว่าได้ยึดดอกผลด้วยแล้ว"],"text":"การยึดสังหาริมทรัพย์มีรูปร่างของลูกหนี้ตามคำพิพากษานั้นให้มีผลเป็นการยึดครอบไปถึงดอกผลธรรมดาและดอกผลนิตินัยของทรัพย์นั้นด้วย การยึดอสังหาริมทรัพย์ของลูกหนี้ตามคำพิพากษานั้นให้มีผลเป็นการยึดครอบไปถึง\n\n(๑) เครื่องอุปกรณ์และดอกผลนิตินัยของทรัพย์นั้น (๒) ดอกผลธรรมดาของทรัพย์นั้นที่ลูกหนี้ตามคำพิพากษามีสิทธิเก็บเกี่ยว เมื่อเจ้าพนักงานบังคับคดีได้แจ้งหรือปิดประกาศให้ลูกหนี้ตามคำพิพากษาและผู้ครอบครองหรือผู้ดูแลทรัพย์นั้นทราบในขณะทำการยึดว่าได้ยึดดอกผลด้วยแล้ว"},{"id":"๓๑๕","num":"มาตรา ๓๑๕","num_ara":"๓๑๕","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๓ การยึดทรัพย์สิน","paragraphs":["การยึดทรัพย์สินของลูกหนี้ตามคำพิพากษานั้นให้มีผลดังต่อไปนี้","(๑) การที่ลูกหนี้ตามคำพิพากษาได้ก่อให้เกิด โอน หรือเปลี่ยนแปลงซึ่งสิทธิในทรัพย์สินที่ถูกยึดภายหลังที่ได้ทำการยึดไว้แล้วนั้น หาอาจใช้ยันแก่เจ้าหนี้ตามคำพิพากษาหรือเจ้าพนักงานบังคับคดีได้ไม่ ถึงแม้ว่าราคาแห่งทรัพย์สินนั้นจะเกินกว่าจำนวนหนี้ตามคำพิพากษากับค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี และลูกหนี้ตามคำพิพากษาได้กระทำการดังกล่าวแก่ทรัพย์สินที่ถูกยึดเพียงส่วนที่มีราคาเกินจำนวนนั้นก็ตาม (๒) ถ้าลูกหนี้ตามคำพิพากษาได้รับมอบให้เป็นผู้รักษาทรัพย์สินที่ถูกยึด ลูกหนี้ตามคำพิพากษาชอบที่จะใช้ทรัพย์สินเช่นว่านั้นได้ตามสมควร แต่ถ้าเจ้าพนักงานบังคับคดีเห็นว่าลูกหนี้ตามคำพิพากษาจะทำให้ทรัพย์สินนั้นเสียหายหรือเกรงว่าจะเสียหาย โดยเจ้าพนักงานบังคับคดีเห็นเองหรือเมื่อเจ้าหนี้ตามคำพิพากษาหรือบุคคลผู้มีส่วนได้เสียในการบังคับคดีแก่ทรัพย์สินนั้นร้องขอ เจ้าพนักงานบังคับคดีจะรักษาทรัพย์สินนั้นเสียเองหรือตั้งให้ผู้ใดเป็นผู้รักษาทรัพย์สินนั้นก็ได้"],"text":"การยึดทรัพย์สินของลูกหนี้ตามคำพิพากษานั้นให้มีผลดังต่อไปนี้\n\n(๑) การที่ลูกหนี้ตามคำพิพากษาได้ก่อให้เกิด โอน หรือเปลี่ยนแปลงซึ่งสิทธิในทรัพย์สินที่ถูกยึดภายหลังที่ได้ทำการยึดไว้แล้วนั้น หาอาจใช้ยันแก่เจ้าหนี้ตามคำพิพากษาหรือเจ้าพนักงานบังคับคดีได้ไม่ ถึงแม้ว่าราคาแห่งทรัพย์สินนั้นจะเกินกว่าจำนวนหนี้ตามคำพิพากษากับค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี และลูกหนี้ตามคำพิพากษาได้กระทำการดังกล่าวแก่ทรัพย์สินที่ถูกยึดเพียงส่วนที่มีราคาเกินจำนวนนั้นก็ตาม (๒) ถ้าลูกหนี้ตามคำพิพากษาได้รับมอบให้เป็นผู้รักษาทรัพย์สินที่ถูกยึด ลูกหนี้ตามคำพิพากษาชอบที่จะใช้ทรัพย์สินเช่นว่านั้นได้ตามสมควร แต่ถ้าเจ้าพนักงานบังคับคดีเห็นว่าลูกหนี้ตามคำพิพากษาจะทำให้ทรัพย์สินนั้นเสียหายหรือเกรงว่าจะเสียหาย โดยเจ้าพนักงานบังคับคดีเห็นเองหรือเมื่อเจ้าหนี้ตามคำพิพากษาหรือบุคคลผู้มีส่วนได้เสียในการบังคับคดีแก่ทรัพย์สินนั้นร้องขอ เจ้าพนักงานบังคับคดีจะรักษาทรัพย์สินนั้นเสียเองหรือตั้งให้ผู้ใดเป็นผู้รักษาทรัพย์สินนั้นก็ได้"},{"id":"๓๑๖","num":"มาตรา ๓๑๖","num_ara":"๓๑๖","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๔ การอายัดสิทธิเรียกร้อง","paragraphs":["การอายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่จะเรียกให้บุคคลภายนอกชำระเงินหรือส่งมอบหรือโอนทรัพย์สินก็ดี หรือที่จะเรียกให้บุคคลภายนอกชำระหนี้อย่างอื่นนอกจากการชำระเงินหรือการส่งมอบหรือการโอนทรัพย์สินก็ดี ให้ศาลหรือเจ้าพนักงานบังคับคดีกระทำโดยมีคำสั่งอายัด และแจ้งคำสั่งนั้นให้ลูกหนี้ตามคำพิพากษาและบุคคลภายนอกทราบ คำสั่งอายัดตามวรรคหนึ่ง ต้องมีข้อห้ามลูกหนี้ตามคำพิพากษาไม่ให้จำหน่ายสิทธิเรียกร้องและมีข้อห้ามบุคคลภายนอกไม่ให้ปฏิบัติการชำระหนี้นั้นแก่ลูกหนี้ตามคำพิพากษา แต่ให้ชำระเงินหรือส่งมอบหรือโอนทรัพย์สินหรือชำระหนี้อย่างอื่นให้แก่ศาล เจ้าพนักงานบังคับคดีหรือบุคคลอื่น หรือให้ดำเนินการโดยวิธีอื่นใดตามที่ศาลหรือเจ้าพนักงานบังคับคดีเห็นสมควร ณ เวลาหรือภายในเวลา หรือเงื่อนไขตามที่กำหนดให้ แล้วแต่กรณี คำสั่งอายัดนั้นให้บังคับได้ไม่ว่าที่ใด ๆ"],"text":"การอายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่จะเรียกให้บุคคลภายนอกชำระเงินหรือส่งมอบหรือโอนทรัพย์สินก็ดี หรือที่จะเรียกให้บุคคลภายนอกชำระหนี้อย่างอื่นนอกจากการชำระเงินหรือการส่งมอบหรือการโอนทรัพย์สินก็ดี ให้ศาลหรือเจ้าพนักงานบังคับคดีกระทำโดยมีคำสั่งอายัด และแจ้งคำสั่งนั้นให้ลูกหนี้ตามคำพิพากษาและบุคคลภายนอกทราบ คำสั่งอายัดตามวรรคหนึ่ง ต้องมีข้อห้ามลูกหนี้ตามคำพิพากษาไม่ให้จำหน่ายสิทธิเรียกร้องและมีข้อห้ามบุคคลภายนอกไม่ให้ปฏิบัติการชำระหนี้นั้นแก่ลูกหนี้ตามคำพิพากษา แต่ให้ชำระเงินหรือส่งมอบหรือโอนทรัพย์สินหรือชำระหนี้อย่างอื่นให้แก่ศาล เจ้าพนักงานบังคับคดีหรือบุคคลอื่น หรือให้ดำเนินการโดยวิธีอื่นใดตามที่ศาลหรือเจ้าพนักงานบังคับคดีเห็นสมควร ณ เวลาหรือภายในเวลา หรือเงื่อนไขตามที่กำหนดให้ แล้วแต่กรณี คำสั่งอายัดนั้นให้บังคับได้ไม่ว่าที่ใด ๆ"},{"id":"๓๑๗","num":"มาตรา ๓๑๗","num_ara":"๓๑๗","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๔ การอายัดสิทธิเรียกร้อง","paragraphs":["การอายัดตามมาตรา ๓๑๖ อาจกระทำได้ไม่ว่าหนี้ที่เรียกร้องนั้นจะมีข้อโต้แย้ง ข้อจำกัด เงื่อนไข หรือว่าได้กำหนดจำนวนไว้แน่นอนหรือไม่ก็ตาม"],"text":"การอายัดตามมาตรา ๓๑๖ อาจกระทำได้ไม่ว่าหนี้ที่เรียกร้องนั้นจะมีข้อโต้แย้ง ข้อจำกัด เงื่อนไข หรือว่าได้กำหนดจำนวนไว้แน่นอนหรือไม่ก็ตาม"},{"id":"๓๑๘","num":"มาตรา ๓๑๘","num_ara":"๓๑๘","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๔ การอายัดสิทธิเรียกร้อง","paragraphs":["การอายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่มีสิทธิได้รับชำระหนี้เป็นคราว ๆ ให้มีผลเป็นการอายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่มีสิทธิได้รับชำระหนี้ภายหลังการอายัดนั้นด้วย"],"text":"การอายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่มีสิทธิได้รับชำระหนี้เป็นคราว ๆ ให้มีผลเป็นการอายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่มีสิทธิได้รับชำระหนี้ภายหลังการอายัดนั้นด้วย"},{"id":"๓๑๙","num":"มาตรา ๓๑๙","num_ara":"๓๑๙","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๔ การอายัดสิทธิเรียกร้อง","paragraphs":["การอายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่มีจำนองหรือจำนำเป็นประกัน ให้มีผลรวมตลอดถึงการจำนองหรือการจำนำนั้นด้วย ถ้าทรัพย์สินที่จำนองนั้นมีทะเบียน ให้เจ้าพนักงานบังคับคดีแจ้งคำสั่งอายัดไปยังผู้มีอำนาจหน้าที่เพื่อให้จดแจ้งไว้ในทะเบียน ในกรณีผู้จำนองหรือผู้จำนำมิใช่ลูกหนี้ตามสิทธิเรียกร้อง เมื่อได้ดำเนินการอายัดแล้ว ให้แจ้งผู้จำนองหรือผู้จำนำเพื่อทราบด้วย"],"text":"การอายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษาที่มีจำนองหรือจำนำเป็นประกัน ให้มีผลรวมตลอดถึงการจำนองหรือการจำนำนั้นด้วย ถ้าทรัพย์สินที่จำนองนั้นมีทะเบียน ให้เจ้าพนักงานบังคับคดีแจ้งคำสั่งอายัดไปยังผู้มีอำนาจหน้าที่เพื่อให้จดแจ้งไว้ในทะเบียน ในกรณีผู้จำนองหรือผู้จำนำมิใช่ลูกหนี้ตามสิทธิเรียกร้อง เมื่อได้ดำเนินการอายัดแล้ว ให้แจ้งผู้จำนองหรือผู้จำนำเพื่อทราบด้วย"},{"id":"๓๒๐","num":"มาตรา ๓๒๐","num_ara":"๓๒๐","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๔ การอายัดสิทธิเรียกร้อง","paragraphs":["การอายัดสิทธิเรียกร้องนั้นให้มีผลดังต่อไปนี้","(๑) การที่ลูกหนี้ตามคำพิพากษาได้ก่อให้เกิดสิทธิแก่บุคคลภายนอกเหนือสิทธิเรียกร้องที่ได้ถูกอายัด โอน เปลี่ยนแปลง หรือระงับซึ่งสิทธิเรียกร้องดังกล่าวภายหลังที่ได้ทำการอายัดไว้แล้วนั้น หาอาจใช้ยันแก่เจ้าหนี้ตามคำพิพากษาหรือเจ้าพนักงานบังคับคดีได้ไม่ถึงแม้ว่าราคาแห่งสิทธิเรียกร้องนั้นจะเกินกว่าจำนวนหนี้ตามคำพิพากษากับค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี และลูกหนี้ตามคำพิพากษาได้กระทำการดังกล่าวแก่สิทธิเรียกร้องที่ถูกอายัดเพียงส่วนที่มีราคาเกินจำนวนนั้นก็ตาม ความในวรรคหนึ่งมิให้ใช้บังคับแก่ผู้จำนองหรือผู้จำนำซึ่งมิใช่ลูกหนี้ตามสิทธิเรียกร้องตามมาตรา ๓๑๙ วรรคสอง หากผู้จำนองหรือผู้จำนำพิสูจน์ได้ว่าความระงับสิ้นไปแห่งการจำนองหรือการจำนำเกิดขึ้นโดยผู้จำนองหรือผู้จำนำกระทำการโดยสุจริตและเสียค่าตอบแทนก่อนมีการแจ้งการอายัดไปยังผู้จำนองหรือผู้จำนำเพื่อทราบ (๒) ถ้าค่าแห่งสิทธิเรียกร้องซึ่งอายัดไว้นั้นต้องเสื่อมเสียไปเพราะความผิดของเจ้าหนี้ตามคำพิพากษา เจ้าหนี้ตามคำพิพากษาต้องรับผิดชดใช้ค่าสินไหมทดแทนให้แก่ลูกหนี้ตามคำพิพากษาเพื่อความเสียหายใด ๆ ซึ่งเกิดขึ้นแก่ลูกหนี้ตามคำพิพากษานั้น (๓) การชำระหนี้โดยบุคคลภายนอกตามที่ระบุไว้ในคำสั่งอายัดนั้นให้ถือว่าเป็นการชำระหนี้ตามกฎหมาย"],"text":"การอายัดสิทธิเรียกร้องนั้นให้มีผลดังต่อไปนี้\n\n(๑) การที่ลูกหนี้ตามคำพิพากษาได้ก่อให้เกิดสิทธิแก่บุคคลภายนอกเหนือสิทธิเรียกร้องที่ได้ถูกอายัด โอน เปลี่ยนแปลง หรือระงับซึ่งสิทธิเรียกร้องดังกล่าวภายหลังที่ได้ทำการอายัดไว้แล้วนั้น หาอาจใช้ยันแก่เจ้าหนี้ตามคำพิพากษาหรือเจ้าพนักงานบังคับคดีได้ไม่ถึงแม้ว่าราคาแห่งสิทธิเรียกร้องนั้นจะเกินกว่าจำนวนหนี้ตามคำพิพากษากับค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี และลูกหนี้ตามคำพิพากษาได้กระทำการดังกล่าวแก่สิทธิเรียกร้องที่ถูกอายัดเพียงส่วนที่มีราคาเกินจำนวนนั้นก็ตาม ความในวรรคหนึ่งมิให้ใช้บังคับแก่ผู้จำนองหรือผู้จำนำซึ่งมิใช่ลูกหนี้ตามสิทธิเรียกร้องตามมาตรา ๓๑๙ วรรคสอง หากผู้จำนองหรือผู้จำนำพิสูจน์ได้ว่าความระงับสิ้นไปแห่งการจำนองหรือการจำนำเกิดขึ้นโดยผู้จำนองหรือผู้จำนำกระทำการโดยสุจริตและเสียค่าตอบแทนก่อนมีการแจ้งการอายัดไปยังผู้จำนองหรือผู้จำนำเพื่อทราบ (๒) ถ้าค่าแห่งสิทธิเรียกร้องซึ่งอายัดไว้นั้นต้องเสื่อมเสียไปเพราะความผิดของเจ้าหนี้ตามคำพิพากษา เจ้าหนี้ตามคำพิพากษาต้องรับผิดชดใช้ค่าสินไหมทดแทนให้แก่ลูกหนี้ตามคำพิพากษาเพื่อความเสียหายใด ๆ ซึ่งเกิดขึ้นแก่ลูกหนี้ตามคำพิพากษานั้น (๓) การชำระหนี้โดยบุคคลภายนอกตามที่ระบุไว้ในคำสั่งอายัดนั้นให้ถือว่าเป็นการชำระหนี้ตามกฎหมาย"},{"id":"๓๒๑","num":"มาตรา ๓๒๑","num_ara":"๓๒๑","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๕ การขอให้ศาลบังคับบุคคลภายนอกชำระหนี้ตามสิทธิเรียกร้อง","paragraphs":["ถ้าบุคคลภายนอกไม่ชำระหนี้ตามคำสั่งอายัดของศาลหรือเจ้าพนักงานบังคับคดีตามมาตรา ๓๑๖ ให้เจ้าพนักงานบังคับคดีแจ้งให้เจ้าหนี้ตามคำพิพากษาทราบ ในกรณีเช่นว่านี้ เจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องต่อศาลให้บังคับบุคคลภายนอกนั้นปฏิบัติการชำระหนี้ตามที่เจ้าพนักงานบังคับคดีมีคำสั่งหรือชำระค่าสินไหมทดแทนเพื่อการไม่ชำระหนี้แก่เจ้าพนักงานบังคับคดีก็ได้ เมื่อศาลทำการไต่สวนแล้วถ้าเป็นที่พอใจว่าสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษานั้นมีอยู่จริงและอาจบังคับได้ จะมีคำสั่งให้บุคคลภายนอกปฏิบัติการชำระหนี้ตามที่เจ้าพนักงานบังคับคดีมีคำสั่งหรือให้ชำระค่าสินไหมทดแทนตามจำนวนที่เห็นสมควรก็ได้ ถ้าบุคคลภายนอกนั้นมิได้ปฏิบัติตามคำสั่งของศาล เจ้าหนี้ตามคำพิพากษาอาจร้องขอให้ศาลบังคับคดีแก่บุคคลภายนอกนั้นเสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษาก็ได้"],"text":"ถ้าบุคคลภายนอกไม่ชำระหนี้ตามคำสั่งอายัดของศาลหรือเจ้าพนักงานบังคับคดีตามมาตรา ๓๑๖ ให้เจ้าพนักงานบังคับคดีแจ้งให้เจ้าหนี้ตามคำพิพากษาทราบ ในกรณีเช่นว่านี้ เจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องต่อศาลให้บังคับบุคคลภายนอกนั้นปฏิบัติการชำระหนี้ตามที่เจ้าพนักงานบังคับคดีมีคำสั่งหรือชำระค่าสินไหมทดแทนเพื่อการไม่ชำระหนี้แก่เจ้าพนักงานบังคับคดีก็ได้ เมื่อศาลทำการไต่สวนแล้วถ้าเป็นที่พอใจว่าสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษานั้นมีอยู่จริงและอาจบังคับได้ จะมีคำสั่งให้บุคคลภายนอกปฏิบัติการชำระหนี้ตามที่เจ้าพนักงานบังคับคดีมีคำสั่งหรือให้ชำระค่าสินไหมทดแทนตามจำนวนที่เห็นสมควรก็ได้ ถ้าบุคคลภายนอกนั้นมิได้ปฏิบัติตามคำสั่งของศาล เจ้าหนี้ตามคำพิพากษาอาจร้องขอให้ศาลบังคับคดีแก่บุคคลภายนอกนั้นเสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษาก็ได้"},{"id":"๓๒๒","num":"มาตรา ๓๒๒","num_ara":"๓๒๒","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๖ สิทธิของบุคคลภายนอกและผู้มีส่วนได้เสียเกี่ยวกับทรัพย์สินที่ถูกบังคับคดี","paragraphs":["ภายใต้บังคับมาตรา ๓๒๓ และมาตรา ๓๒๔ บทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการบังคับคดีแก่ทรัพย์สินของลูกหนี้ตามคำพิพากษาย่อมไม่กระทบกระทั่งถึงทรัพยสิทธิ บุริมสิทธิ สิทธิยึดหน่วง หรือสิทธิอื่นซึ่งบุคคลภายนอกมีอยู่เหนือทรัพย์สินหรืออาจร้องขอให้บังคับเหนือทรัพย์สินนั้นตามกฎหมาย"],"text":"ภายใต้บังคับมาตรา ๓๒๓ และมาตรา ๓๒๔ บทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการบังคับคดีแก่ทรัพย์สินของลูกหนี้ตามคำพิพากษาย่อมไม่กระทบกระทั่งถึงทรัพยสิทธิ บุริมสิทธิ สิทธิยึดหน่วง หรือสิทธิอื่นซึ่งบุคคลภายนอกมีอยู่เหนือทรัพย์สินหรืออาจร้องขอให้บังคับเหนือทรัพย์สินนั้นตามกฎหมาย"},{"id":"๓๒๓","num":"มาตรา ๓๒๓","num_ara":"๓๒๓","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๖ สิทธิของบุคคลภายนอกและผู้มีส่วนได้เสียเกี่ยวกับทรัพย์สินที่ถูกบังคับคดี","paragraphs":["ภายใต้บังคับมาตรา ๕๕ บุคคลใดกล่าวอ้างว่าจำเลยหรือลูกหนี้ตามคำพิพากษาไม่ใช่เจ้าของทรัพย์สินที่เจ้าพนักงานบังคับคดีได้ยึดไว้ หรือตนเป็นเจ้าของรวมซึ่งมีกรรมสิทธิ์ หรือสิทธิครอบครองในทรัพย์สินนั้นซึ่งเป็นอสังหาริมทรัพย์ที่ได้แบ่งการครอบครองเป็นส่วนสัด หรือตนเป็นเจ้าของรวมในทรัพย์สินนั้นซึ่งเป็นสังหาริมทรัพย์ที่เป็นทรัพย์แบ่งได้ หรือตนเป็นผู้อยู่ในฐานะอันจะให้จดทะเบียนสิทธิของตนในทรัพย์สินนั้นได้อยู่ก่อน บุคคลนั้นอาจร้องขอให้ปล่อยทรัพย์สินนั้นทั้งหมดหรือบางส่วนหรือเฉพาะส่วนของตน แล้วแต่กรณี โดยยื่นคำร้องขอต่อศาลที่ออกหมายบังคับคดีภายในหกสิบวันนับแต่วันที่มีการยึดทรัพย์สินนั้น แต่ถ้าไม่สามารถยื่นคำร้องขอภายในระยะเวลาดังกล่าว บุคคลนั้นจะยื่นคำร้องขอเมื่อพ้นระยะเวลาเช่นว่านั้นได้ก็ต่อเมื่อมีพฤติการณ์พิเศษและได้ยื่นคำร้องขอไม่ช้ากว่าเจ็ดวันก่อนวันที่เจ้าพนักงานบังคับคดีกำหนดไว้เพื่อการขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินนั้นเป็นครั้งแรก เว้นแต่ในกรณีที่มีเหตุสุดวิสัย บุคคลนั้นจะยื่นคำร้องขอในภายหลังก็ได้ แต่จะต้องยื่นเสียก่อนขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินนั้น ในกรณีที่เป็นทรัพย์สินตามมาตรา ๓๓๒ ผู้กล่าวอ้างอาจยื่นคำร้องขอต่อศาลภายในหกสิบวันนับแต่วันที่ได้มีการยึดทรัพย์สินนั้น แต่ถ้าไม่สามารถยื่นคำร้องขอภายในระยะเวลาดังกล่าว บุคคลนั้นจะยื่นคำร้องขอเมื่อพ้นระยะเวลาเช่นว่านั้นได้ก็ต่อเมื่อมีพฤติการณ์พิเศษ แต่จะต้องยื่นเสียก่อนที่เจ้าพนักงานบังคับคดีจะจ่ายเงินที่ได้จากการขายทรัพย์สินนั้นแก่เจ้าหนี้ตามคำพิพากษาตามมาตรา ๓๓๙ หรือก่อนที่บัญชีส่วนเฉลี่ยแสดงจำนวนเงินที่ขายทรัพย์สินนั้นเป็นที่สุดตามมาตรา ๓๔๐ แล้วแต่กรณี ทั้งนี้ ให้ถือว่าเงินจำนวนสุทธิที่ได้จากการขายนั้นเป็นเสมือนทรัพย์สินที่ขอให้ปล่อย เมื่อศาลสั่งรับคำร้องขอไว้แล้ว ให้ส่งสำเนาคำร้องขอแก่โจทก์หรือเจ้าหนี้ตามคำพิพากษา จำเลยหรือลูกหนี้ตามคำพิพากษา และเจ้าพนักงานบังคับคดี เมื่อเจ้าพนักงานบังคับคดีได้รับคำร้องขอเช่นว่านี้ ถ้าทรัพย์สินที่ยึดนั้นไม่ใช่ทรัพย์สินตามมาตรา ๓๓๒ ให้งดการขายทอดตลาดหรือจำหน่ายทรัพย์สินนั้นไว้ในระหว่างรอคำวินิจฉัยชี้ขาด และให้ศาลพิจารณาและชี้ขาดตัดสินคดีนั้นเหมือนอย่างคดีธรรมดา โจทก์หรือเจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องว่าคำร้องขอนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงการบังคับคดี เมื่อปรากฏพยานหลักฐานเบื้องต้นว่าคำร้องนั้นฟังได้ ศาลมีอำนาจสั่งให้ผู้กล่าวอ้างวางเงินหรือหาประกันต่อศาลตามจำนวนและภายในระยะเวลาที่ศาลเห็นสมควร เพื่อเป็นประกันการชำระค่าสินไหมทดแทนแก่โจทก์หรือเจ้าหนี้ตามคำพิพากษาสำหรับความเสียหายที่อาจได้รับจากการยื่นคำร้องขอนั้น ถ้าผู้กล่าวอ้างไม่ปฏิบัติตามคำสั่งศาล ให้ศาลมีคำสั่งจำหน่ายคดีออกจากสารบบความ ส่วนเงินหรือประกันที่วางไว้ต่อศาลดังกล่าว เมื่อศาลเห็นว่าไม่มีความจำเป็นต่อไป จะสั่งคืนหรือยกเลิกประกันนั้นก็ได้ คำสั่งของศาลตามวรรคนี้ให้เป็นที่สุด ในกรณีที่ศาลได้มีคำสั่งยกคำร้องขอที่ยื่นไว้ตามวรรคหนึ่งหรือวรรคสอง ถ้าโจทก์หรือเจ้าหนี้ตามคำพิพากษาที่ได้รับความเสียหายเนื่องจากการยื่นคำร้องขอดังกล่าวเห็นว่าคำร้องขอนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงการบังคับคดี บุคคลดังกล่าวอาจยื่นคำร้องต่อศาลภายในสามสิบวันนับแต่วันที่ศาลได้มีคำสั่งยกคำร้องขอเพื่อขอให้ศาลสั่งให้ผู้กล่าวอ้างชดใช้ค่าสินไหมทดแทนสำหรับความเสียหายที่เกิดขึ้นแก่ตนได้ ในกรณีเช่นว่านี้ ให้ศาลมีอำนาจสั่งให้แยกการพิจารณาเป็นสำนวนต่างหากจากคดีเดิม และเมื่อศาลไต่สวนแล้วเห็นว่าคำร้องนั้นฟังได้ ให้ศาลมีคำสั่งให้ผู้กล่าวอ้างชดใช้ค่าสินไหมทดแทนตามจำนวนที่ศาลเห็นสมควร ถ้าบุคคลดังกล่าวไม่ปฏิบัติตามคำสั่งศาล โจทก์หรือเจ้าหนี้ตามคำพิพากษาอาจร้องขอให้ศาลบังคับคดีแก่บุคคลนั้นเสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษา"],"text":"ภายใต้บังคับมาตรา ๕๕ บุคคลใดกล่าวอ้างว่าจำเลยหรือลูกหนี้ตามคำพิพากษาไม่ใช่เจ้าของทรัพย์สินที่เจ้าพนักงานบังคับคดีได้ยึดไว้ หรือตนเป็นเจ้าของรวมซึ่งมีกรรมสิทธิ์ หรือสิทธิครอบครองในทรัพย์สินนั้นซึ่งเป็นอสังหาริมทรัพย์ที่ได้แบ่งการครอบครองเป็นส่วนสัด หรือตนเป็นเจ้าของรวมในทรัพย์สินนั้นซึ่งเป็นสังหาริมทรัพย์ที่เป็นทรัพย์แบ่งได้ หรือตนเป็นผู้อยู่ในฐานะอันจะให้จดทะเบียนสิทธิของตนในทรัพย์สินนั้นได้อยู่ก่อน บุคคลนั้นอาจร้องขอให้ปล่อยทรัพย์สินนั้นทั้งหมดหรือบางส่วนหรือเฉพาะส่วนของตน แล้วแต่กรณี โดยยื่นคำร้องขอต่อศาลที่ออกหมายบังคับคดีภายในหกสิบวันนับแต่วันที่มีการยึดทรัพย์สินนั้น แต่ถ้าไม่สามารถยื่นคำร้องขอภายในระยะเวลาดังกล่าว บุคคลนั้นจะยื่นคำร้องขอเมื่อพ้นระยะเวลาเช่นว่านั้นได้ก็ต่อเมื่อมีพฤติการณ์พิเศษและได้ยื่นคำร้องขอไม่ช้ากว่าเจ็ดวันก่อนวันที่เจ้าพนักงานบังคับคดีกำหนดไว้เพื่อการขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินนั้นเป็นครั้งแรก เว้นแต่ในกรณีที่มีเหตุสุดวิสัย บุคคลนั้นจะยื่นคำร้องขอในภายหลังก็ได้ แต่จะต้องยื่นเสียก่อนขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินนั้น ในกรณีที่เป็นทรัพย์สินตามมาตรา ๓๓๒ ผู้กล่าวอ้างอาจยื่นคำร้องขอต่อศาลภายในหกสิบวันนับแต่วันที่ได้มีการยึดทรัพย์สินนั้น แต่ถ้าไม่สามารถยื่นคำร้องขอภายในระยะเวลาดังกล่าว บุคคลนั้นจะยื่นคำร้องขอเมื่อพ้นระยะเวลาเช่นว่านั้นได้ก็ต่อเมื่อมีพฤติการณ์พิเศษ แต่จะต้องยื่นเสียก่อนที่เจ้าพนักงานบังคับคดีจะจ่ายเงินที่ได้จากการขายทรัพย์สินนั้นแก่เจ้าหนี้ตามคำพิพากษาตามมาตรา ๓๓๙ หรือก่อนที่บัญชีส่วนเฉลี่ยแสดงจำนวนเงินที่ขายทรัพย์สินนั้นเป็นที่สุดตามมาตรา ๓๔๐ แล้วแต่กรณี ทั้งนี้ ให้ถือว่าเงินจำนวนสุทธิที่ได้จากการขายนั้นเป็นเสมือนทรัพย์สินที่ขอให้ปล่อย เมื่อศาลสั่งรับคำร้องขอไว้แล้ว ให้ส่งสำเนาคำร้องขอแก่โจทก์หรือเจ้าหนี้ตามคำพิพากษา จำเลยหรือลูกหนี้ตามคำพิพากษา และเจ้าพนักงานบังคับคดี เมื่อเจ้าพนักงานบังคับคดีได้รับคำร้องขอเช่นว่านี้ ถ้าทรัพย์สินที่ยึดนั้นไม่ใช่ทรัพย์สินตามมาตรา ๓๓๒ ให้งดการขายทอดตลาดหรือจำหน่ายทรัพย์สินนั้นไว้ในระหว่างรอคำวินิจฉัยชี้ขาด และให้ศาลพิจารณาและชี้ขาดตัดสินคดีนั้นเหมือนอย่างคดีธรรมดา โจทก์หรือเจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องว่าคำร้องขอนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงการบังคับคดี เมื่อปรากฏพยานหลักฐานเบื้องต้นว่าคำร้องนั้นฟังได้ ศาลมีอำนาจสั่งให้ผู้กล่าวอ้างวางเงินหรือหาประกันต่อศาลตามจำนวนและภายในระยะเวลาที่ศาลเห็นสมควร เพื่อเป็นประกันการชำระค่าสินไหมทดแทนแก่โจทก์หรือเจ้าหนี้ตามคำพิพากษาสำหรับความเสียหายที่อาจได้รับจากการยื่นคำร้องขอนั้น ถ้าผู้กล่าวอ้างไม่ปฏิบัติตามคำสั่งศาล ให้ศาลมีคำสั่งจำหน่ายคดีออกจากสารบบความ ส่วนเงินหรือประกันที่วางไว้ต่อศาลดังกล่าว เมื่อศาลเห็นว่าไม่มีความจำเป็นต่อไป จะสั่งคืนหรือยกเลิกประกันนั้นก็ได้ คำสั่งของศาลตามวรรคนี้ให้เป็นที่สุด ในกรณีที่ศาลได้มีคำสั่งยกคำร้องขอที่ยื่นไว้ตามวรรคหนึ่งหรือวรรคสอง ถ้าโจทก์หรือเจ้าหนี้ตามคำพิพากษาที่ได้รับความเสียหายเนื่องจากการยื่นคำร้องขอดังกล่าวเห็นว่าคำร้องขอนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงการบังคับคดี บุคคลดังกล่าวอาจยื่นคำร้องต่อศาลภายในสามสิบวันนับแต่วันที่ศาลได้มีคำสั่งยกคำร้องขอเพื่อขอให้ศาลสั่งให้ผู้กล่าวอ้างชดใช้ค่าสินไหมทดแทนสำหรับความเสียหายที่เกิดขึ้นแก่ตนได้ ในกรณีเช่นว่านี้ ให้ศาลมีอำนาจสั่งให้แยกการพิจารณาเป็นสำนวนต่างหากจากคดีเดิม และเมื่อศาลไต่สวนแล้วเห็นว่าคำร้องนั้นฟังได้ ให้ศาลมีคำสั่งให้ผู้กล่าวอ้างชดใช้ค่าสินไหมทดแทนตามจำนวนที่ศาลเห็นสมควร ถ้าบุคคลดังกล่าวไม่ปฏิบัติตามคำสั่งศาล โจทก์หรือเจ้าหนี้ตามคำพิพากษาอาจร้องขอให้ศาลบังคับคดีแก่บุคคลนั้นเสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษา"},{"id":"๓๒๔","num":"มาตรา ๓๒๔","num_ara":"๓๒๔","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๖ สิทธิของบุคคลภายนอกและผู้มีส่วนได้เสียเกี่ยวกับทรัพย์สินที่ถูกบังคับคดี","paragraphs":["บุคคลใดมีสิทธิที่จะได้รับชำระหนี้หรือได้รับส่วนแบ่งจากเงินที่ได้จากการขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินของลูกหนี้ตามคำพิพากษาที่เจ้าพนักงานบังคับคดีได้ยึดไว้โดยอาศัยอำนาจแห่งทรัพยสิทธิ บุริมสิทธิ สิทธิยึดหน่วง หรือสิทธิอื่นซึ่งบุคคลนั้นมีอยู่เหนือทรัพย์สิน หรืออาจร้องขอให้บังคับเหนือทรัพย์สินนั้นตามกฎหมาย ให้ดำเนินการดังต่อไปนี้","(๑) ในกรณีที่เป็นผู้รับจำนองทรัพย์สินหรือเป็นผู้ทรงบุริมสิทธิเหนืออสังหาริมทรัพย์อันได้จดทะเบียนไว้ บุคคลนั้นอาจยื่นคำร้องขอต่อศาลที่ออกหมายบังคับคดีก่อนเอาทรัพย์สินนั้นออกขายหรือจำหน่าย ขอให้มีคำสั่งอย่างหนึ่งอย่างใดดังต่อไปนี้ (ก) ในกรณีที่อาจบังคับเอาทรัพย์สินซึ่งจำนองหลุด ขอให้เอาทรัพย์สินซึ่งจำนองนั้นหลุด ถ้าศาลมีคำสั่งอนุญาต การยึดทรัพย์ที่จำนองนั้นเป็นอันเพิกถอนไปในตัว (ข) ในกรณีอื่น ขอให้เจ้าพนักงานบังคับคดีนำเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินนั้นมาชำระหนี้แก่ตนก่อนเจ้าหนี้อื่น  ทั้งนี้ ตามบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์หรือกฎหมายอื่น (๒) ในกรณีที่ปรากฏแก่เจ้าพนักงานบังคับคดีว่าทรัพย์สินซึ่งขายหรือจำหน่ายนั้นเป็นของเจ้าของรวมอันได้จดทะเบียนไว้ ให้เจ้าพนักงานบังคับคดีกันเงินส่วนของเจ้าของรวมอื่น นอกจากส่วนของลูกหนี้ตามคำพิพากษาออกจากเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินนั้นตามที่กำหนดไว้ในมาตรา ๓๔๐ (๓) ในกรณีที่เป็นผู้ทรงสิทธิยึดหน่วงซึ่งไม่มีบุริมสิทธิเหนือทรัพย์สินที่ขายหรือจำหน่าย บุคคลนั้นอาจยื่นคำร้องขอต่อศาลที่ออกหมายบังคับคดีภายในสิบห้าวันนับแต่วันขายหรือจำหน่ายทรัพย์สินนั้น ขอให้นำเงินที่ได้จากการขายหรือจำหน่ายมาชำระหนี้แก่ตนก่อนเจ้าหนี้อื่นซึ่งไม่มีบุริมสิทธิเหนือทรัพย์สินนั้น (๔) ในกรณีอื่นนอกจากที่ระบุไว้ใน (๑) (๒) และ (๓) ผู้ทรงสิทธินั้นอาจยื่นคำร้องขอต่อศาลที่ออกหมายบังคับคดีภายในสิบห้าวันนับแต่วันขายหรือจำหน่ายทรัพย์สินนั้น ขอให้ตนได้รับส่วนแบ่งในเงินที่ได้จากการขายหรือจำหน่ายหรือขอให้นำเงินดังกล่าวมาชำระหนี้แก่ตนก่อนเจ้าหนี้อื่น ทั้งนี้ ตามบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์หรือกฎหมายอื่น"],"text":"บุคคลใดมีสิทธิที่จะได้รับชำระหนี้หรือได้รับส่วนแบ่งจากเงินที่ได้จากการขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินของลูกหนี้ตามคำพิพากษาที่เจ้าพนักงานบังคับคดีได้ยึดไว้โดยอาศัยอำนาจแห่งทรัพยสิทธิ บุริมสิทธิ สิทธิยึดหน่วง หรือสิทธิอื่นซึ่งบุคคลนั้นมีอยู่เหนือทรัพย์สิน หรืออาจร้องขอให้บังคับเหนือทรัพย์สินนั้นตามกฎหมาย ให้ดำเนินการดังต่อไปนี้\n\n(๑) ในกรณีที่เป็นผู้รับจำนองทรัพย์สินหรือเป็นผู้ทรงบุริมสิทธิเหนืออสังหาริมทรัพย์อันได้จดทะเบียนไว้ บุคคลนั้นอาจยื่นคำร้องขอต่อศาลที่ออกหมายบังคับคดีก่อนเอาทรัพย์สินนั้นออกขายหรือจำหน่าย ขอให้มีคำสั่งอย่างหนึ่งอย่างใดดังต่อไปนี้ (ก) ในกรณีที่อาจบังคับเอาทรัพย์สินซึ่งจำนองหลุด ขอให้เอาทรัพย์สินซึ่งจำนองนั้นหลุด ถ้าศาลมีคำสั่งอนุญาต การยึดทรัพย์ที่จำนองนั้นเป็นอันเพิกถอนไปในตัว (ข) ในกรณีอื่น ขอให้เจ้าพนักงานบังคับคดีนำเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินนั้นมาชำระหนี้แก่ตนก่อนเจ้าหนี้อื่น  ทั้งนี้ ตามบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์หรือกฎหมายอื่น (๒) ในกรณีที่ปรากฏแก่เจ้าพนักงานบังคับคดีว่าทรัพย์สินซึ่งขายหรือจำหน่ายนั้นเป็นของเจ้าของรวมอันได้จดทะเบียนไว้ ให้เจ้าพนักงานบังคับคดีกันเงินส่วนของเจ้าของรวมอื่น นอกจากส่วนของลูกหนี้ตามคำพิพากษาออกจากเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินนั้นตามที่กำหนดไว้ในมาตรา ๓๔๐ (๓) ในกรณีที่เป็นผู้ทรงสิทธิยึดหน่วงซึ่งไม่มีบุริมสิทธิเหนือทรัพย์สินที่ขายหรือจำหน่าย บุคคลนั้นอาจยื่นคำร้องขอต่อศาลที่ออกหมายบังคับคดีภายในสิบห้าวันนับแต่วันขายหรือจำหน่ายทรัพย์สินนั้น ขอให้นำเงินที่ได้จากการขายหรือจำหน่ายมาชำระหนี้แก่ตนก่อนเจ้าหนี้อื่นซึ่งไม่มีบุริมสิทธิเหนือทรัพย์สินนั้น (๔) ในกรณีอื่นนอกจากที่ระบุไว้ใน (๑) (๒) และ (๓) ผู้ทรงสิทธินั้นอาจยื่นคำร้องขอต่อศาลที่ออกหมายบังคับคดีภายในสิบห้าวันนับแต่วันขายหรือจำหน่ายทรัพย์สินนั้น ขอให้ตนได้รับส่วนแบ่งในเงินที่ได้จากการขายหรือจำหน่ายหรือขอให้นำเงินดังกล่าวมาชำระหนี้แก่ตนก่อนเจ้าหนี้อื่น ทั้งนี้ ตามบทบัญญัติแห่งประมวลกฎหมายแพ่งและพาณิชย์หรือกฎหมายอื่น"},{"id":"๓๒๕","num":"มาตรา ๓๒๕","num_ara":"๓๒๕","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๖ สิทธิของบุคคลภายนอกและผู้มีส่วนได้เสียเกี่ยวกับทรัพย์สินที่ถูกบังคับคดี","paragraphs":["เมื่อได้แจ้งคำสั่งอายัดสิทธิเรียกร้องให้บุคคลภายนอกตามมาตรา ๓๑๖ แล้ว บุคคลภายนอกนั้นอาจยื่นคำร้องคัดค้านคำสั่งอายัดต่อศาลได้ภายในสิบห้าวัน บุคคลผู้จะต้องเสียหายเพราะคำสั่งอายัดอาจยื่นคำร้องคัดค้านคำสั่งดังกล่าวได้ภายในกำหนดเวลาดังต่อไปนี้ ทั้งนี้ ต้องไม่ช้ากว่าสิบห้าวันนับแต่วันทราบคำสั่งอายัด","(๑) ถ้าสิทธิเรียกร้องนั้นเป็นการให้ชำระเงิน ให้ยื่นคำร้องต่อศาลก่อนวันที่เจ้าพนักงานบังคับคดีจ่ายเงินดังกล่าวทั้งหมดหรือแต่บางส่วนแก่เจ้าหนี้ตามคำพิพากษา (๒) ถ้าสิทธิเรียกร้องนั้นเป็นการให้ส่งมอบหรือโอนทรัพย์สิน ให้ยื่นคำร้องต่อศาลก่อนขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินนั้น (๓) ถ้าสิทธิเรียกร้องนั้นเป็นการให้ชำระหนี้อย่างอื่นนอกจาก (๑) และ (๒) ให้ยื่นคำร้องต่อศาลก่อนที่บุคคลภายนอกจะปฏิบัติการชำระหนี้ เมื่อศาลสั่งรับคำร้องคัดค้านตามวรรคหนึ่งหรือวรรคสองแล้ว ให้ส่งสำเนาคำร้องแก่เจ้าหนี้ตามคำพิพากษา ลูกหนี้ตามคำพิพากษา และเจ้าพนักงานบังคับคดี และให้เจ้าพนักงานบังคับคดีงดการบังคับตามคำสั่งอายัดไว้ในระหว่างรอคำวินิจฉัยชี้ขาด เมื่อศาลทำการไต่สวนแล้ว ถ้าเป็นที่พอใจว่าสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษานั้นมีอยู่จริงและอาจบังคับได้ ก็ให้ยกคำร้องนั้นเสียและมีคำสั่งให้บุคคลภายนอกปฏิบัติตามคำสั่งอายัด แต่ถ้าเป็นที่พอใจว่าคำร้องคัดค้านรับฟังได้ ให้ศาลมีคำสั่งถอนการอายัดสิทธิเรียกร้อง ในระหว่างการพิจารณาคำร้องคัดค้านตามวรรคสาม เจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องว่าคำร้องคัดค้านนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงการบังคับคดี เมื่อปรากฏพยานหลักฐานเบื้องต้นว่าคำร้องนั้นฟังได้ ศาลมีอำนาจสั่งให้ผู้ร้องคัดค้านวางเงินหรือหาประกันต่อศาลตามจำนวนและภายในระยะเวลาที่ศาลเห็นสมควร เพื่อเป็นประกันการชำระเงินค่าสินไหมทดแทนแก่เจ้าหนี้ตามคำพิพากษา สำหรับความเสียหายที่อาจได้รับจากการยื่นคำร้องคัดค้านนั้น ถ้าผู้ร้องคัดค้านไม่ปฏิบัติตามคำสั่งศาล ให้ศาลมีคำสั่งจำหน่ายคำร้องคัดค้าน ส่วนเงินหรือประกันที่วางไว้ต่อศาลดังกล่าว เมื่อศาลเห็นว่าไม่มีความจำเป็นต่อไป จะสั่งคืนหรือยกเลิกประกันนั้นก็ได้ ถ้าศาลได้มีคำสั่งให้บุคคลภายนอกปฏิบัติตามคำสั่งอายัด และบุคคลนั้นมิได้ปฏิบัติตามคำสั่งศาล เจ้าหนี้ตามคำพิพากษาอาจร้องขอให้ศาลบังคับคดีแก่บุคคลภายนอกเสมือนหนึ่งว่าบุคคลนั้นเป็นลูกหนี้ตามคำพิพากษา ในกรณีที่คำร้องคัดค้านตามวรรคหนึ่งหรือวรรคสองไม่มีมูลและยื่นเข้ามาเพื่อประวิงการบังคับคดี เจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องต่อศาลภายในสามสิบวันนับแต่วันที่ศาลได้มีคำสั่งยกคำร้องคัดค้านเพื่อขอให้ศาลสั่งให้ผู้ร้องคัดค้านชดใช้ค่าสินไหมทดแทนสำหรับความเสียหายที่เกิดขึ้นแก่ตนได้ ในกรณีเช่นว่านี้ ให้ศาลมีอำนาจสั่งให้แยกการพิจารณาเป็นสำนวนต่างหากจากคดีเดิม และเมื่อศาลไต่สวนแล้วเห็นว่าคำร้องนั้นฟังได้ ให้ศาลมีคำสั่งให้ผู้ร้องคัดค้านชดใช้ค่าสินไหมทดแทนตามจำนวนที่ศาลเห็นสมควร ถ้าบุคคลดังกล่าวไม่ปฏิบัติตามคำสั่งศาล เจ้าหนี้ตามคำพิพากษาอาจร้องขอให้ศาลบังคับคดีแก่บุคคลนั้นเสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษา"],"text":"เมื่อได้แจ้งคำสั่งอายัดสิทธิเรียกร้องให้บุคคลภายนอกตามมาตรา ๓๑๖ แล้ว บุคคลภายนอกนั้นอาจยื่นคำร้องคัดค้านคำสั่งอายัดต่อศาลได้ภายในสิบห้าวัน บุคคลผู้จะต้องเสียหายเพราะคำสั่งอายัดอาจยื่นคำร้องคัดค้านคำสั่งดังกล่าวได้ภายในกำหนดเวลาดังต่อไปนี้ ทั้งนี้ ต้องไม่ช้ากว่าสิบห้าวันนับแต่วันทราบคำสั่งอายัด\n\n(๑) ถ้าสิทธิเรียกร้องนั้นเป็นการให้ชำระเงิน ให้ยื่นคำร้องต่อศาลก่อนวันที่เจ้าพนักงานบังคับคดีจ่ายเงินดังกล่าวทั้งหมดหรือแต่บางส่วนแก่เจ้าหนี้ตามคำพิพากษา (๒) ถ้าสิทธิเรียกร้องนั้นเป็นการให้ส่งมอบหรือโอนทรัพย์สิน ให้ยื่นคำร้องต่อศาลก่อนขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งทรัพย์สินนั้น (๓) ถ้าสิทธิเรียกร้องนั้นเป็นการให้ชำระหนี้อย่างอื่นนอกจาก (๑) และ (๒) ให้ยื่นคำร้องต่อศาลก่อนที่บุคคลภายนอกจะปฏิบัติการชำระหนี้ เมื่อศาลสั่งรับคำร้องคัดค้านตามวรรคหนึ่งหรือวรรคสองแล้ว ให้ส่งสำเนาคำร้องแก่เจ้าหนี้ตามคำพิพากษา ลูกหนี้ตามคำพิพากษา และเจ้าพนักงานบังคับคดี และให้เจ้าพนักงานบังคับคดีงดการบังคับตามคำสั่งอายัดไว้ในระหว่างรอคำวินิจฉัยชี้ขาด เมื่อศาลทำการไต่สวนแล้ว ถ้าเป็นที่พอใจว่าสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษานั้นมีอยู่จริงและอาจบังคับได้ ก็ให้ยกคำร้องนั้นเสียและมีคำสั่งให้บุคคลภายนอกปฏิบัติตามคำสั่งอายัด แต่ถ้าเป็นที่พอใจว่าคำร้องคัดค้านรับฟังได้ ให้ศาลมีคำสั่งถอนการอายัดสิทธิเรียกร้อง ในระหว่างการพิจารณาคำร้องคัดค้านตามวรรคสาม เจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องว่าคำร้องคัดค้านนั้นไม่มีมูลและยื่นเข้ามาเพื่อประวิงการบังคับคดี เมื่อปรากฏพยานหลักฐานเบื้องต้นว่าคำร้องนั้นฟังได้ ศาลมีอำนาจสั่งให้ผู้ร้องคัดค้านวางเงินหรือหาประกันต่อศาลตามจำนวนและภายในระยะเวลาที่ศาลเห็นสมควร เพื่อเป็นประกันการชำระเงินค่าสินไหมทดแทนแก่เจ้าหนี้ตามคำพิพากษา สำหรับความเสียหายที่อาจได้รับจากการยื่นคำร้องคัดค้านนั้น ถ้าผู้ร้องคัดค้านไม่ปฏิบัติตามคำสั่งศาล ให้ศาลมีคำสั่งจำหน่ายคำร้องคัดค้าน ส่วนเงินหรือประกันที่วางไว้ต่อศาลดังกล่าว เมื่อศาลเห็นว่าไม่มีความจำเป็นต่อไป จะสั่งคืนหรือยกเลิกประกันนั้นก็ได้ ถ้าศาลได้มีคำสั่งให้บุคคลภายนอกปฏิบัติตามคำสั่งอายัด และบุคคลนั้นมิได้ปฏิบัติตามคำสั่งศาล เจ้าหนี้ตามคำพิพากษาอาจร้องขอให้ศาลบังคับคดีแก่บุคคลภายนอกเสมือนหนึ่งว่าบุคคลนั้นเป็นลูกหนี้ตามคำพิพากษา ในกรณีที่คำร้องคัดค้านตามวรรคหนึ่งหรือวรรคสองไม่มีมูลและยื่นเข้ามาเพื่อประวิงการบังคับคดี เจ้าหนี้ตามคำพิพากษาอาจยื่นคำร้องต่อศาลภายในสามสิบวันนับแต่วันที่ศาลได้มีคำสั่งยกคำร้องคัดค้านเพื่อขอให้ศาลสั่งให้ผู้ร้องคัดค้านชดใช้ค่าสินไหมทดแทนสำหรับความเสียหายที่เกิดขึ้นแก่ตนได้ ในกรณีเช่นว่านี้ ให้ศาลมีอำนาจสั่งให้แยกการพิจารณาเป็นสำนวนต่างหากจากคดีเดิม และเมื่อศาลไต่สวนแล้วเห็นว่าคำร้องนั้นฟังได้ ให้ศาลมีคำสั่งให้ผู้ร้องคัดค้านชดใช้ค่าสินไหมทดแทนตามจำนวนที่ศาลเห็นสมควร ถ้าบุคคลดังกล่าวไม่ปฏิบัติตามคำสั่งศาล เจ้าหนี้ตามคำพิพากษาอาจร้องขอให้ศาลบังคับคดีแก่บุคคลนั้นเสมือนหนึ่งว่าเป็นลูกหนี้ตามคำพิพากษา"},{"id":"๓๒๖","num":"มาตรา ๓๒๖","num_ara":"๓๒๖","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๗ การขอเฉลี่ยและการเข้าดำเนินการบังคับคดีต่อไป","paragraphs":["เมื่อมีการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องอย่างใดของลูกหนี้ตามคำพิพากษาเพื่อเอาชำระหนี้แก่เจ้าหนี้ตามคำพิพากษารายหนึ่งแล้ว ห้ามไม่ให้เจ้าหนี้ตามคำพิพากษาอื่นดำเนินการให้มีการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้นซ้ำอีก แต่ให้มีสิทธิยื่นคำร้องต่อศาลที่ออกหมายบังคับคดี ขอให้มีคำสั่งให้ตนเข้าเฉลี่ยในทรัพย์สินหรือเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินจากการยึดหรืออายัดนั้นได้ตามส่วนแห่งจำนวนหนี้ตามคำพิพากษา ห้ามมิให้ศาลอนุญาตตามคำร้องเช่นว่านี้ เว้นแต่ศาลเห็นว่าผู้ยื่นคำร้องไม่สามารถเอาชำระได้จากทรัพย์สินอื่น ๆ ของลูกหนี้ตามคำพิพากษา ถ้าเจ้าพนักงานผู้มีอำนาจตามกฎหมายว่าด้วยภาษีอากรหรือกฎหมายอื่นที่จะสั่งยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษา เพื่อบังคับชำระหนี้ที่ค้างชำระตามกฎหมายนั้น ๆ ได้เอง ได้ยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องตามวรรคหนึ่งไว้ก่อนแล้ว ให้มีสิทธิขอเข้าเฉลี่ยได้โดยไม่อยู่ภายในบังคับของบทบัญญัติวรรคสอง แต่ถ้าเจ้าพนักงานดังกล่าวมิได้ยึดหรืออายัดไว้ก่อน ให้มีสิทธิขอเข้าเฉลี่ยได้เช่นเดียวกับเจ้าหนี้ตามคำพิพากษาอื่น ในกรณีที่ยึดทรัพย์สินเพื่อขายทอดตลาดหรือจำหน่ายโดยวิธีอื่น คำร้องเช่นว่านี้ให้ยื่นก่อนสิ้นระยะเวลาสิบห้าวันนับแต่วันที่มีการขายทอดตลาดหรือจำหน่ายทรัพย์สินที่ขายทอดตลาดหรือจำหน่ายได้ในครั้งนั้น ๆ ในกรณีที่อายัดสิทธิเรียกร้อง ให้ยื่นคำร้องเสียก่อนสิ้นระยะเวลาสิบห้าวันนับแต่วันชำระเงินหรือวันที่มีการขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งสิทธิเรียกร้องตามที่อายัดนั้นได้ ในกรณีที่ยึดเงิน ให้ยื่นคำร้องเช่นว่านี้ก่อนสิ้นระยะเวลาสิบห้าวันนับแต่วันยึด เมื่อได้ส่งสำเนาคำร้องดังกล่าวให้เจ้าพนักงานบังคับคดีแล้ว ให้เจ้าพนักงานบังคับคดีงดการจ่ายเงินหรือทรัพย์สินตามคำบังคับตั้งแต่การขาย การจำหน่าย หรือการชำระเงินตามที่ได้อายัดในครั้งที่ขอเฉลี่ยนั้น แล้วแต่กรณี ไว้จนกว่าศาลจะได้มีคำวินิจฉัยชี้ขาด เมื่อศาลได้มีคำสั่งประการใดและส่งให้เจ้าพนักงานบังคับคดีทราบแล้ว ก็ให้เจ้าพนักงานบังคับคดีปฏิบัติไปตามคำสั่งเช่นว่านั้น"],"text":"เมื่อมีการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องอย่างใดของลูกหนี้ตามคำพิพากษาเพื่อเอาชำระหนี้แก่เจ้าหนี้ตามคำพิพากษารายหนึ่งแล้ว ห้ามไม่ให้เจ้าหนี้ตามคำพิพากษาอื่นดำเนินการให้มีการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้นซ้ำอีก แต่ให้มีสิทธิยื่นคำร้องต่อศาลที่ออกหมายบังคับคดี ขอให้มีคำสั่งให้ตนเข้าเฉลี่ยในทรัพย์สินหรือเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินจากการยึดหรืออายัดนั้นได้ตามส่วนแห่งจำนวนหนี้ตามคำพิพากษา ห้ามมิให้ศาลอนุญาตตามคำร้องเช่นว่านี้ เว้นแต่ศาลเห็นว่าผู้ยื่นคำร้องไม่สามารถเอาชำระได้จากทรัพย์สินอื่น ๆ ของลูกหนี้ตามคำพิพากษา ถ้าเจ้าพนักงานผู้มีอำนาจตามกฎหมายว่าด้วยภาษีอากรหรือกฎหมายอื่นที่จะสั่งยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องของลูกหนี้ตามคำพิพากษา เพื่อบังคับชำระหนี้ที่ค้างชำระตามกฎหมายนั้น ๆ ได้เอง ได้ยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องตามวรรคหนึ่งไว้ก่อนแล้ว ให้มีสิทธิขอเข้าเฉลี่ยได้โดยไม่อยู่ภายในบังคับของบทบัญญัติวรรคสอง แต่ถ้าเจ้าพนักงานดังกล่าวมิได้ยึดหรืออายัดไว้ก่อน ให้มีสิทธิขอเข้าเฉลี่ยได้เช่นเดียวกับเจ้าหนี้ตามคำพิพากษาอื่น ในกรณีที่ยึดทรัพย์สินเพื่อขายทอดตลาดหรือจำหน่ายโดยวิธีอื่น คำร้องเช่นว่านี้ให้ยื่นก่อนสิ้นระยะเวลาสิบห้าวันนับแต่วันที่มีการขายทอดตลาดหรือจำหน่ายทรัพย์สินที่ขายทอดตลาดหรือจำหน่ายได้ในครั้งนั้น ๆ ในกรณีที่อายัดสิทธิเรียกร้อง ให้ยื่นคำร้องเสียก่อนสิ้นระยะเวลาสิบห้าวันนับแต่วันชำระเงินหรือวันที่มีการขายทอดตลาดหรือจำหน่ายโดยวิธีอื่นซึ่งสิทธิเรียกร้องตามที่อายัดนั้นได้ ในกรณีที่ยึดเงิน ให้ยื่นคำร้องเช่นว่านี้ก่อนสิ้นระยะเวลาสิบห้าวันนับแต่วันยึด เมื่อได้ส่งสำเนาคำร้องดังกล่าวให้เจ้าพนักงานบังคับคดีแล้ว ให้เจ้าพนักงานบังคับคดีงดการจ่ายเงินหรือทรัพย์สินตามคำบังคับตั้งแต่การขาย การจำหน่าย หรือการชำระเงินตามที่ได้อายัดในครั้งที่ขอเฉลี่ยนั้น แล้วแต่กรณี ไว้จนกว่าศาลจะได้มีคำวินิจฉัยชี้ขาด เมื่อศาลได้มีคำสั่งประการใดและส่งให้เจ้าพนักงานบังคับคดีทราบแล้ว ก็ให้เจ้าพนักงานบังคับคดีปฏิบัติไปตามคำสั่งเช่นว่านั้น"},{"id":"๓๒๗","num":"มาตรา ๓๒๗","num_ara":"๓๒๗","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๗ การขอเฉลี่ยและการเข้าดำเนินการบังคับคดีต่อไป","paragraphs":["ในกรณีที่มีการถอนการบังคับคดี ให้เจ้าพนักงานบังคับคดีส่งคำบอกกล่าวถอนการบังคับคดีให้ผู้ยื่นคำร้องขอซึ่งได้รับอนุญาตจากศาลตามมาตรา ๓๒๔ หรือเจ้าหนี้ผู้ขอเฉลี่ยซึ่งได้รับอนุญาตตามมาตรา ๓๒๖ ทราบโดยไม่ชักช้า โดยบุคคลดังกล่าวอาจขอเข้าดำเนินการบังคับคดีต่อไปจากเจ้าหนี้ผู้ขอยึดทรัพย์สินหรืออายัดสิทธิเรียกร้อง โดยยื่นคำร้องต่อเจ้าพนักงานบังคับคดีภายในสิบห้าวันนับแต่วันส่งคำบอกกล่าวถึงบุคคลเช่นว่านั้น ถ้ามีผู้ยื่นคำร้องภายในกำหนดเวลาดังกล่าว ให้ผู้นั้นเป็นผู้ขอดำเนินการบังคับคดีต่อไป ถ้าไม่มีผู้ยื่นคำร้องภายในกำหนดเวลาดังกล่าว ให้เจ้าพนักงานบังคับคดีถอนการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้น ในกรณีที่มีผู้ยื่นคำร้องหลายคน ให้เจ้าพนักงานบังคับคดีออกหมายเรียกให้ผู้ยื่นคำร้องทุกคนมาทำความตกลงกัน เลือกคนใดคนหนึ่งเป็นผู้ดำเนินการบังคับคดีต่อไป แต่ต้องแจ้งให้ทราบล่วงหน้าไม่น้อยกว่าสามวัน ถ้าไม่สามารถตกลงกันได้ให้ผู้ยื่นคำร้องซึ่งมาตามหมายเรียกและมีจำนวนหนี้มากที่สุดเป็นผู้ดำเนินการบังคับคดีต่อไป ถ้าผู้ยื่นคำร้องดังกล่าวมีจำนวนหนี้มากที่สุดเท่ากันหลายคน ให้ผู้ยื่นคำร้องซึ่งมีหนี้รายเก่าที่สุดเป็นผู้เข้าดำเนินการบังคับคดีต่อไป ในกรณีที่ผู้ยื่นคำร้องรายใดไม่มาตามหมายเรียกให้ถือว่าผู้ยื่นคำร้องรายนั้นสละสิทธิที่จะเป็นผู้เข้าดำเนินการบังคับคดีต่อไป ในกรณีที่มีการเข้าดำเนินการบังคับคดีต่อไป ให้ถือว่าผู้ขอเข้าดำเนินการบังคับคดีต่อไปเป็นเจ้าหนี้ผู้ขอยึดทรัพย์สินหรืออายัดสิทธิเรียกร้อง และให้ศาลที่ออกหมายบังคับคดีในคดีที่มีการถอนการบังคับคดีเป็นศาลที่มีอำนาจในการบังคับคดี ถ้าเจ้าหนี้ผู้เข้าดำเนินการบังคับคดีต่อไปจะขอให้บังคับคดีแก่ทรัพย์สินที่ถูกบังคับคดีไว้เดิมแต่เพียงบางส่วน ซึ่งเพียงพอแก่การชำระหนี้ของบรรดาเจ้าหนี้ตามวรรคหนึ่ง พร้อมทั้งค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี ให้ยื่นคำร้องขออนุญาตต่อเจ้าพนักงานบังคับคดีภายในเจ็ดวันนับแต่วันที่เข้าดำเนินการบังคับคดีต่อไป ในกรณีเช่นว่านี้ ให้เจ้าพนักงานบังคับคดีมีคำสั่งอนุญาตหรือไม่อนุญาตตามคำร้องหรือมีคำสั่งอย่างหนึ่งอย่างใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควรโดยคำนึงถึงส่วนได้เสียของบรรดาเจ้าหนี้ตามวรรคหนึ่ง เจ้าหนี้ผู้เข้าดำเนินการบังคับคดีต่อไปอาจร้องคัดค้านคำสั่งของเจ้าพนักงานบังคับคดีต่อศาลได้ภายในสิบห้าวันนับแต่วันที่ได้ทราบคำสั่งของเจ้าพนักงานบังคับคดี สำหรับเจ้าหนี้ผู้ขอยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องที่มีการถอนการบังคับคดีนั้น","(๑) ถ้าเป็นการถอนการบังคับคดีเพราะตนได้สละสิทธิในการบังคับคดีตามมาตรา ๒๙๒ (๖) ไม่มีสิทธิได้รับส่วนเฉลี่ยในทรัพย์สินหรือเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินในการบังคับคดี (๒) ถ้าเป็นการถอนการบังคับคดีตามมาตรา ๒๙๒ (๔) แต่ยังมีหนี้ตามคำพิพากษาอยู่ อาจยื่นคำร้องต่อศาลขอให้มีคำสั่งให้ตนได้รับชำระจากเงินที่เหลือภายหลังที่ได้ชำระให้แก่เจ้าหนี้ผู้ขอเฉลี่ยแล้วในฐานะเดียวกันกับผู้ยื่นคำร้องตามมาตรา ๓๒๙ (๑) (๓) ถ้าเป็นการถอนการบังคับคดีเพราะหมายบังคับคดีได้ถูกเพิกถอนหรือในกรณีอื่นนอกจาก (๑) และ (๒) แต่ยังมีหนี้ตามคำพิพากษาอยู่ อาจยื่นคำร้องต่อศาลขอให้มีคำสั่งให้ตนมีสิทธิได้รับส่วนเฉลี่ยในทรัพย์สินหรือเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินในการบังคับคดีครั้งนี้ ก่อนการจ่ายเงินตามมาตรา ๓๓๙ หรือก่อนส่งคำบอกกล่าวตามมาตรา ๓๔๐ (๓) แล้วแต่กรณี"],"text":"ในกรณีที่มีการถอนการบังคับคดี ให้เจ้าพนักงานบังคับคดีส่งคำบอกกล่าวถอนการบังคับคดีให้ผู้ยื่นคำร้องขอซึ่งได้รับอนุญาตจากศาลตามมาตรา ๓๒๔ หรือเจ้าหนี้ผู้ขอเฉลี่ยซึ่งได้รับอนุญาตตามมาตรา ๓๒๖ ทราบโดยไม่ชักช้า โดยบุคคลดังกล่าวอาจขอเข้าดำเนินการบังคับคดีต่อไปจากเจ้าหนี้ผู้ขอยึดทรัพย์สินหรืออายัดสิทธิเรียกร้อง โดยยื่นคำร้องต่อเจ้าพนักงานบังคับคดีภายในสิบห้าวันนับแต่วันส่งคำบอกกล่าวถึงบุคคลเช่นว่านั้น ถ้ามีผู้ยื่นคำร้องภายในกำหนดเวลาดังกล่าว ให้ผู้นั้นเป็นผู้ขอดำเนินการบังคับคดีต่อไป ถ้าไม่มีผู้ยื่นคำร้องภายในกำหนดเวลาดังกล่าว ให้เจ้าพนักงานบังคับคดีถอนการยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้น ในกรณีที่มีผู้ยื่นคำร้องหลายคน ให้เจ้าพนักงานบังคับคดีออกหมายเรียกให้ผู้ยื่นคำร้องทุกคนมาทำความตกลงกัน เลือกคนใดคนหนึ่งเป็นผู้ดำเนินการบังคับคดีต่อไป แต่ต้องแจ้งให้ทราบล่วงหน้าไม่น้อยกว่าสามวัน ถ้าไม่สามารถตกลงกันได้ให้ผู้ยื่นคำร้องซึ่งมาตามหมายเรียกและมีจำนวนหนี้มากที่สุดเป็นผู้ดำเนินการบังคับคดีต่อไป ถ้าผู้ยื่นคำร้องดังกล่าวมีจำนวนหนี้มากที่สุดเท่ากันหลายคน ให้ผู้ยื่นคำร้องซึ่งมีหนี้รายเก่าที่สุดเป็นผู้เข้าดำเนินการบังคับคดีต่อไป ในกรณีที่ผู้ยื่นคำร้องรายใดไม่มาตามหมายเรียกให้ถือว่าผู้ยื่นคำร้องรายนั้นสละสิทธิที่จะเป็นผู้เข้าดำเนินการบังคับคดีต่อไป ในกรณีที่มีการเข้าดำเนินการบังคับคดีต่อไป ให้ถือว่าผู้ขอเข้าดำเนินการบังคับคดีต่อไปเป็นเจ้าหนี้ผู้ขอยึดทรัพย์สินหรืออายัดสิทธิเรียกร้อง และให้ศาลที่ออกหมายบังคับคดีในคดีที่มีการถอนการบังคับคดีเป็นศาลที่มีอำนาจในการบังคับคดี ถ้าเจ้าหนี้ผู้เข้าดำเนินการบังคับคดีต่อไปจะขอให้บังคับคดีแก่ทรัพย์สินที่ถูกบังคับคดีไว้เดิมแต่เพียงบางส่วน ซึ่งเพียงพอแก่การชำระหนี้ของบรรดาเจ้าหนี้ตามวรรคหนึ่ง พร้อมทั้งค่าฤชาธรรมเนียมและค่าฤชาธรรมเนียมในการบังคับคดี ให้ยื่นคำร้องขออนุญาตต่อเจ้าพนักงานบังคับคดีภายในเจ็ดวันนับแต่วันที่เข้าดำเนินการบังคับคดีต่อไป ในกรณีเช่นว่านี้ ให้เจ้าพนักงานบังคับคดีมีคำสั่งอนุญาตหรือไม่อนุญาตตามคำร้องหรือมีคำสั่งอย่างหนึ่งอย่างใดตามที่เจ้าพนักงานบังคับคดีเห็นสมควรโดยคำนึงถึงส่วนได้เสียของบรรดาเจ้าหนี้ตามวรรคหนึ่ง เจ้าหนี้ผู้เข้าดำเนินการบังคับคดีต่อไปอาจร้องคัดค้านคำสั่งของเจ้าพนักงานบังคับคดีต่อศาลได้ภายในสิบห้าวันนับแต่วันที่ได้ทราบคำสั่งของเจ้าพนักงานบังคับคดี สำหรับเจ้าหนี้ผู้ขอยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องที่มีการถอนการบังคับคดีนั้น\n\n(๑) ถ้าเป็นการถอนการบังคับคดีเพราะตนได้สละสิทธิในการบังคับคดีตามมาตรา ๒๙๒ (๖) ไม่มีสิทธิได้รับส่วนเฉลี่ยในทรัพย์สินหรือเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินในการบังคับคดี (๒) ถ้าเป็นการถอนการบังคับคดีตามมาตรา ๒๙๒ (๔) แต่ยังมีหนี้ตามคำพิพากษาอยู่ อาจยื่นคำร้องต่อศาลขอให้มีคำสั่งให้ตนได้รับชำระจากเงินที่เหลือภายหลังที่ได้ชำระให้แก่เจ้าหนี้ผู้ขอเฉลี่ยแล้วในฐานะเดียวกันกับผู้ยื่นคำร้องตามมาตรา ๓๒๙ (๑) (๓) ถ้าเป็นการถอนการบังคับคดีเพราะหมายบังคับคดีได้ถูกเพิกถอนหรือในกรณีอื่นนอกจาก (๑) และ (๒) แต่ยังมีหนี้ตามคำพิพากษาอยู่ อาจยื่นคำร้องต่อศาลขอให้มีคำสั่งให้ตนมีสิทธิได้รับส่วนเฉลี่ยในทรัพย์สินหรือเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินในการบังคับคดีครั้งนี้ ก่อนการจ่ายเงินตามมาตรา ๓๓๙ หรือก่อนส่งคำบอกกล่าวตามมาตรา ๓๔๐ (๓) แล้วแต่กรณี"},{"id":"๓๒๘","num":"มาตรา ๓๒๘","num_ara":"๓๒๘","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๗ การขอเฉลี่ยและการเข้าดำเนินการบังคับคดีต่อไป","paragraphs":["เจ้าหนี้ผู้เข้าดำเนินการบังคับคดีต่อไปตามมาตรา ๓๒๗ อาจยื่นคำร้องต่อศาลที่มีอำนาจในการบังคับคดีให้โอนการบังคับคดีไปยังศาลที่พิพากษาคดีซึ่งตนเป็นเจ้าหนี้ตามคำพิพากษาได้ และเมื่อได้พิจารณาคำร้องดังกล่าวแล้ว ถ้าศาลที่มีอำนาจในการบังคับคดีเห็นว่าการบังคับคดีในศาลที่จะรับโอนการบังคับคดีจะเป็นการสะดวกแก่ทุกฝ่ายและได้รับความยินยอมของศาลที่จะรับโอนแล้ว ให้ศาลมีคำสั่งอนุญาตให้โอนการบังคับคดีไปได้ คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด ในกรณีที่มีการโอนการบังคับคดีตามวรรคหนึ่ง ให้ถือว่าศาลที่รับโอนเป็นศาลตามมาตรา ๒๗๑ วรรคหนึ่ง"],"text":"เจ้าหนี้ผู้เข้าดำเนินการบังคับคดีต่อไปตามมาตรา ๓๒๗ อาจยื่นคำร้องต่อศาลที่มีอำนาจในการบังคับคดีให้โอนการบังคับคดีไปยังศาลที่พิพากษาคดีซึ่งตนเป็นเจ้าหนี้ตามคำพิพากษาได้ และเมื่อได้พิจารณาคำร้องดังกล่าวแล้ว ถ้าศาลที่มีอำนาจในการบังคับคดีเห็นว่าการบังคับคดีในศาลที่จะรับโอนการบังคับคดีจะเป็นการสะดวกแก่ทุกฝ่ายและได้รับความยินยอมของศาลที่จะรับโอนแล้ว ให้ศาลมีคำสั่งอนุญาตให้โอนการบังคับคดีไปได้ คำสั่งของศาลตามมาตรานี้ให้เป็นที่สุด ในกรณีที่มีการโอนการบังคับคดีตามวรรคหนึ่ง ให้ถือว่าศาลที่รับโอนเป็นศาลตามมาตรา ๒๗๑ วรรคหนึ่ง"},{"id":"๓๒๙","num":"มาตรา ๓๒๙","num_ara":"๓๒๙","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๗ การขอเฉลี่ยและการเข้าดำเนินการบังคับคดีต่อไป","paragraphs":["ในกรณีที่เจ้าหนี้ตามคำพิพากษามิได้ยื่นคำร้องขอเฉลี่ยภายในกำหนดเวลาตามมาตรา ๓๒๖ หรือศาลได้ยกคำร้องขอเฉลี่ยเพราะเหตุที่ยื่นไม่ทันกำหนดเวลาดังกล่าว เจ้าหนี้ตามคำพิพากษานั้นอาจยื่นคำร้องต่อศาลเพื่อขอให้ศาลมีคำสั่งอย่างหนึ่งอย่างใดดังต่อไปนี้","(๑) ให้ตนมีสิทธิได้รับชำระจากเงินที่เหลือภายหลังที่ได้ชำระให้แก่เจ้าหนี้ผู้ขอยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้นและเจ้าหนี้ผู้ขอเฉลี่ยตามมาตรา ๓๒๖ หรือมาตรา ๓๒๗ แล้วแต่กรณี (๒) ในกรณีที่มีการถอนการบังคับคดี และไม่มีเจ้าหนี้เข้าดำเนินการบังคับคดีต่อไปตามมาตรา ๓๒๗ ให้ถือว่าตนเป็นเจ้าหนี้ผู้ดำเนินการบังคับคดีต่อไปจากเจ้าหนี้ผู้ขอยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องที่มีการถอนการบังคับคดีตั้งแต่วันที่มีการถอนการบังคับคดี คำร้องตาม (๑) ให้ยื่นก่อนการจ่ายเงินตามมาตรา ๓๓๙ หรือก่อนส่งคำบอกกล่าวตามมาตรา ๓๔๐ (๓) แล้วแต่กรณี คำร้องตาม (๒) ให้ยื่นก่อนมีการถอนการบังคับคดี ในกรณีที่มีผู้ยื่นคำร้องตาม (๒) ให้นำบทบัญญัติมาตรา ๓๒๗ วรรคสอง วรรคสาม และวรรคสี่ มาใช้บังคับโดยอนุโลม ถ้ามีผู้ยื่นคำร้องตาม (๒) หลายคน ให้ถือว่าผู้ยื่นคำร้องรายอื่นนอกจากผู้ยื่นคำร้องซึ่งได้รับเลือกหรือกฎหมายกำหนดให้เป็นผู้ดำเนินการบังคับคดีต่อไป และเจ้าหนี้ซึ่งมิได้ยื่นคำร้องขอเข้าดำเนินการบังคับคดีต่อไปตามมาตรา ๓๒๗ เป็นเจ้าหนี้ที่มีสิทธิได้รับชำระหนี้จากทรัพย์สินหรือเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินในคดีนั้นด้วย"],"text":"ในกรณีที่เจ้าหนี้ตามคำพิพากษามิได้ยื่นคำร้องขอเฉลี่ยภายในกำหนดเวลาตามมาตรา ๓๒๖ หรือศาลได้ยกคำร้องขอเฉลี่ยเพราะเหตุที่ยื่นไม่ทันกำหนดเวลาดังกล่าว เจ้าหนี้ตามคำพิพากษานั้นอาจยื่นคำร้องต่อศาลเพื่อขอให้ศาลมีคำสั่งอย่างหนึ่งอย่างใดดังต่อไปนี้\n\n(๑) ให้ตนมีสิทธิได้รับชำระจากเงินที่เหลือภายหลังที่ได้ชำระให้แก่เจ้าหนี้ผู้ขอยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องนั้นและเจ้าหนี้ผู้ขอเฉลี่ยตามมาตรา ๓๒๖ หรือมาตรา ๓๒๗ แล้วแต่กรณี (๒) ในกรณีที่มีการถอนการบังคับคดี และไม่มีเจ้าหนี้เข้าดำเนินการบังคับคดีต่อไปตามมาตรา ๓๒๗ ให้ถือว่าตนเป็นเจ้าหนี้ผู้ดำเนินการบังคับคดีต่อไปจากเจ้าหนี้ผู้ขอยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องที่มีการถอนการบังคับคดีตั้งแต่วันที่มีการถอนการบังคับคดี คำร้องตาม (๑) ให้ยื่นก่อนการจ่ายเงินตามมาตรา ๓๓๙ หรือก่อนส่งคำบอกกล่าวตามมาตรา ๓๔๐ (๓) แล้วแต่กรณี คำร้องตาม (๒) ให้ยื่นก่อนมีการถอนการบังคับคดี ในกรณีที่มีผู้ยื่นคำร้องตาม (๒) ให้นำบทบัญญัติมาตรา ๓๒๗ วรรคสอง วรรคสาม และวรรคสี่ มาใช้บังคับโดยอนุโลม ถ้ามีผู้ยื่นคำร้องตาม (๒) หลายคน ให้ถือว่าผู้ยื่นคำร้องรายอื่นนอกจากผู้ยื่นคำร้องซึ่งได้รับเลือกหรือกฎหมายกำหนดให้เป็นผู้ดำเนินการบังคับคดีต่อไป และเจ้าหนี้ซึ่งมิได้ยื่นคำร้องขอเข้าดำเนินการบังคับคดีต่อไปตามมาตรา ๓๒๗ เป็นเจ้าหนี้ที่มีสิทธิได้รับชำระหนี้จากทรัพย์สินหรือเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินในคดีนั้นด้วย"},{"id":"๓๓๐","num":"มาตรา ๓๓๐","num_ara":"๓๓๐","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๗ การขอเฉลี่ยและการเข้าดำเนินการบังคับคดีต่อไป","paragraphs":["คำสั่งของศาลตามมาตรา ๓๒๗ วรรคสามและวรรคสี่ และมาตรา ๓๒๙ ให้เป็นที่สุด"],"text":"คำสั่งของศาลตามมาตรา ๓๒๗ วรรคสามและวรรคสี่ และมาตรา ๓๒๙ ให้เป็นที่สุด"},{"id":"๓๓๑","num":"มาตรา ๓๓๑","num_ara":"๓๓๑","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๒ การบังคับคดีตามคำพิพากษาหรือคำสั่ง","section":"หมวด ๒ การบังคับคดีในกรณีที่เป็นหนี้เงิน","subsection":"ส่วนที่ ๘ การขายหรือจำหน่าย","paragraphs":["ภายใต้บังคับมาตรา ๓๓๒ และมาตรา ๓๓๖ เมื่อได้ยึดทรัพย์สินหรืออายัดสิทธิเรียกร้องทั้งหมดหรือบางส่วนของลูกหนี้ตามคำพิพากษา หรือได้มีการส่งมอบทรัพย์สินตามสิทธิเรียกร้องที่ถูกอายัดแก่เจ้าพนักงานบังคับคดีแล้ว ถ้าไม่มีเหตุสมควรงดการบังคับคดีไว้ก่อน ให้เจ้าพนักงานบังคับคดีดำเนินการขายทอดตลาดทรัพย์สินหรือสิทธิเรียกร้องนั้นตามประมวลกฎหมายแพ่งและพาณิชย์ และกฎกระทรวงว่าด้วยการนั้นหรือตามที่ศาลมีคำสั่งกำหนด หรือขายโดยวิธีการทางอิเล็กทรอนิกส์ตามที่กำหนดในกฎกระทรวง ก่อนการขายทอดตลาดทรัพย์สินหรือสิทธิเรียกร้องตามวรรคหนึ่ง เจ้าพนักงานบังคับคดีต้องแจ้งกำหนดวัน เวลา และสถานที่ซึ่งจะทำการข
