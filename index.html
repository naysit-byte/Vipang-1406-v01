 มาตรา ๘๓ ทวิ แก่จำเลย ณ ภูมิลำเนาหรือสำนักทำการงานของจำเลยนอกราชอาณาจักร ให้โจทก์ยื่นคำร้องต่อศาลภายในกำหนดเจ็ดวันนับแต่วันยื่นคำฟ้อง เพื่อให้ศาลจัดส่งหมายเรียกและคำฟ้องตั้งต้นคดีแก่จำเลย ในกรณีเช่นว่านี้ ถ้าไม่มีข้อตกลงระหว่างประเทศที่ประเทศไทยเป็นภาคีกำหนดไว้เป็นอย่างอื่น ให้โจทก์ทำคำแปลหมายเรียก คำฟ้องตั้งต้นคดีและเอกสารอื่นใดที่จะส่งไปยังประเทศที่จำเลยมีภูมิลำเนาหรือสำนักทำการงานอยู่ เป็นภาษาราชการของประเทศนั้นหรือเป็นภาษาอังกฤษ พร้อมทั้งคำรับรองคำแปลว่าถูกต้องยื่นต่อศาลพร้อมกับคำร้องดังกล่าว และวางเงินค่าใช้จ่ายไว้ต่อศาลตามจำนวนและภายในระยะเวลาที่ศาลกำหนด ในกรณีที่ศาลเห็นสมควร ศาลจะมีคำสั่งให้โจทก์จัดทำเอกสารอื่นเพิ่มเติมยื่นต่อศาลภายในระยะเวลาที่ศาลกำหนดก็ได้ ในกรณีที่โจทก์เพิกเฉยไม่ดำเนินการตามวรรคหนึ่งหรือวรรคสอง ให้ถือว่าโจทก์ทิ้งฟ้องตามมาตรา ๑๗๔ ในกรณีที่มีการเรียกบุคคลภายนอกซึ่งไม่มีภูมิลำเนาอยู่ในราชอาณาจักรเข้ามาเป็นคู่ความตามมาตรา ๕๗ (๓) ให้นำความในวรรคหนึ่ง วรรคสอง และวรรคสาม มาใช้บังคับโดยอนุโลม"],"text":"ในกรณีที่จะต้องส่งหมายเรียกและคำฟ้องตั้งต้นคดีตาม มาตรา ๘๓ ทวิ แก่จำเลย ณ ภูมิลำเนาหรือสำนักทำการงานของจำเลยนอกราชอาณาจักร ให้โจทก์ยื่นคำร้องต่อศาลภายในกำหนดเจ็ดวันนับแต่วันยื่นคำฟ้อง เพื่อให้ศาลจัดส่งหมายเรียกและคำฟ้องตั้งต้นคดีแก่จำเลย ในกรณีเช่นว่านี้ ถ้าไม่มีข้อตกลงระหว่างประเทศที่ประเทศไทยเป็นภาคีกำหนดไว้เป็นอย่างอื่น ให้โจทก์ทำคำแปลหมายเรียก คำฟ้องตั้งต้นคดีและเอกสารอื่นใดที่จะส่งไปยังประเทศที่จำเลยมีภูมิลำเนาหรือสำนักทำการงานอยู่ เป็นภาษาราชการของประเทศนั้นหรือเป็นภาษาอังกฤษ พร้อมทั้งคำรับรองคำแปลว่าถูกต้องยื่นต่อศาลพร้อมกับคำร้องดังกล่าว และวางเงินค่าใช้จ่ายไว้ต่อศาลตามจำนวนและภายในระยะเวลาที่ศาลกำหนด ในกรณีที่ศาลเห็นสมควร ศาลจะมีคำสั่งให้โจทก์จัดทำเอกสารอื่นเพิ่มเติมยื่นต่อศาลภายในระยะเวลาที่ศาลกำหนดก็ได้ ในกรณีที่โจทก์เพิกเฉยไม่ดำเนินการตามวรรคหนึ่งหรือวรรคสอง ให้ถือว่าโจทก์ทิ้งฟ้องตามมาตรา ๑๗๔ ในกรณีที่มีการเรียกบุคคลภายนอกซึ่งไม่มีภูมิลำเนาอยู่ในราชอาณาจักรเข้ามาเป็นคู่ความตามมาตรา ๕๗ (๓) ให้นำความในวรรคหนึ่ง วรรคสอง และวรรคสาม มาใช้บังคับโดยอนุโลม"},{"id":"๘๓_เบญจ","num":"มาตรา ๘๓ เบญจ","num_ara":"๘๓ เบญจ","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["การส่งหมายเรียกและคำฟ้องตั้งต้นคดีตามมาตรา ๘๓ ทวิ แก่จำเลยหรือบุคคลภายนอก ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลดังกล่าวนอกราชอาณาจักร ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาหกสิบวันนับแต่วันที่ได้มีการส่ง และในกรณีส่งโดยวิธีอื่นแทนการส่งให้แก่จำเลยหรือบุคคลภายนอก ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาเจ็ดสิบห้าวันนับแต่วันที่ได้มีการส่งโดยวิธีอื่น"],"text":"การส่งหมายเรียกและคำฟ้องตั้งต้นคดีตามมาตรา ๘๓ ทวิ แก่จำเลยหรือบุคคลภายนอก ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลดังกล่าวนอกราชอาณาจักร ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาหกสิบวันนับแต่วันที่ได้มีการส่ง และในกรณีส่งโดยวิธีอื่นแทนการส่งให้แก่จำเลยหรือบุคคลภายนอก ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาเจ็ดสิบห้าวันนับแต่วันที่ได้มีการส่งโดยวิธีอื่น"},{"id":"๘๓_ฉ","num":"มาตรา ๘๓ ฉ","num_ara":"๘๓ ฉ","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["การส่งหมายเรียกและคำฟ้องตั้งต้นคดีตามมาตรา ๘๓ ทวิ แก่จำเลยหรือตัวแทนซึ่งประกอบกิจการในราชอาณาจักรหรือตัวแทนในการรับคำคู่ความและเอกสาร ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาสามสิบวันนับแต่วันที่ได้มีการส่งโดยชอบด้วยกฎหมาย การส่งคำคู่ความหรือเอกสารอื่นตามมาตรา ๘๓ ตรี แก่ผู้รับหรือตัวแทนหรือทนายความ ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาสิบห้าวันนับแต่วันที่ได้มีการส่งโดยชอบด้วยกฎหมาย การปิดประกาศตามมาตรา ๘๓ ตรี ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาสามสิบวันนับแต่วันปิดประกาศ และมิให้นำบทบัญญัติมาตรา ๗๙ มาใช้บังคับ"],"text":"การส่งหมายเรียกและคำฟ้องตั้งต้นคดีตามมาตรา ๘๓ ทวิ แก่จำเลยหรือตัวแทนซึ่งประกอบกิจการในราชอาณาจักรหรือตัวแทนในการรับคำคู่ความและเอกสาร ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาสามสิบวันนับแต่วันที่ได้มีการส่งโดยชอบด้วยกฎหมาย การส่งคำคู่ความหรือเอกสารอื่นตามมาตรา ๘๓ ตรี แก่ผู้รับหรือตัวแทนหรือทนายความ ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาสิบห้าวันนับแต่วันที่ได้มีการส่งโดยชอบด้วยกฎหมาย การปิดประกาศตามมาตรา ๘๓ ตรี ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาสามสิบวันนับแต่วันปิดประกาศ และมิให้นำบทบัญญัติมาตรา ๗๙ มาใช้บังคับ"},{"id":"๘๓_สัตต","num":"มาตรา ๘๓ สัตต","num_ara":"๘๓ สัตต","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["เมื่อโจทก์ได้ปฏิบัติตามมาตรา ๘๓ จัตวา แล้ว ถ้าไม่มีข้อตกลงระหว่างประเทศที่ประเทศไทยเป็นภาคีกำหนดไว้เป็นอย่างอื่น ให้ศาลดำเนินการส่งให้แก่จำเลยหรือบุคคลภายนอกโดยทางไปรษณีย์ด่วนพิเศษระหว่างประเทศหรือผู้ประกอบกิจการรับส่งพัสดุภัณฑ์ระหว่างประเทศหรือโดยผ่านสำนักงานศาลยุติธรรมและกระทรวงการต่างประเทศ ทั้งนี้ ตามหลักเกณฑ์และวิธีการที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ศาลฎีกา และเมื่อข้อกำหนดนั้นประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"],"text":"เมื่อโจทก์ได้ปฏิบัติตามมาตรา ๘๓ จัตวา แล้ว ถ้าไม่มีข้อตกลงระหว่างประเทศที่ประเทศไทยเป็นภาคีกำหนดไว้เป็นอย่างอื่น ให้ศาลดำเนินการส่งให้แก่จำเลยหรือบุคคลภายนอกโดยทางไปรษณีย์ด่วนพิเศษระหว่างประเทศหรือผู้ประกอบกิจการรับส่งพัสดุภัณฑ์ระหว่างประเทศหรือโดยผ่านสำนักงานศาลยุติธรรมและกระทรวงการต่างประเทศ ทั้งนี้ ตามหลักเกณฑ์และวิธีการที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ศาลฎีกา และเมื่อข้อกำหนดนั้นประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"},{"id":"๘๓_อัฎฐ","num":"มาตรา ๘๓ อัฎฐ","num_ara":"๘๓ อัฎฐ","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๔ การยื่นและส่งคำคู่ความและเอกสาร","section":"","subsection":"","paragraphs":["[48] ในกรณีที่จะต้องส่งหมายเรียกและคำฟ้องตั้งต้นคดีตามมาตรา ๘๓ ทวิ แก่จำเลยหรือบุคคลภายนอก ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลดังกล่าวนอกราชอาณาจักร ถ้าโจทก์ยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องและสามารถแสดงให้เป็นที่พอใจแก่ศาลได้ว่าการส่งตามมาตรา ๘๓ สัตต ไม่อาจกระทำได้เพราะเหตุที่ภูมิลำเนาและสำนักทำการงานของบุคคลดังกล่าวไม่ปรากฏหรือเพราะเหตุอื่นใด หรือเมื่อศาลได้ดำเนินการตามมาตรา ๘๓ สัตต แล้ว แต่ไม่อาจทราบผลการส่งได้ ถ้าศาลเห็นสมควร ก็ให้ศาลอนุญาตให้ส่งโดยวิธีปิดประกาศไว้ที่ศาลแทน ในกรณีเช่นว่านี้ ศาลจะสั่งให้ส่งโดยวิธีประกาศโฆษณาในหนังสือพิมพ์หรือโดยวิธีอื่นใดด้วยก็ได้ การส่งโดยวิธีการตามวรรคหนึ่ง ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาหกสิบวันนับแต่วันที่ปิดประกาศไว้ที่ศาล และมิให้นำบทบัญญัติมาตรา ๗๙ มาใช้บังคับ"],"text":"[48] ในกรณีที่จะต้องส่งหมายเรียกและคำฟ้องตั้งต้นคดีตามมาตรา ๘๓ ทวิ แก่จำเลยหรือบุคคลภายนอก ณ ภูมิลำเนาหรือสำนักทำการงานของบุคคลดังกล่าวนอกราชอาณาจักร ถ้าโจทก์ยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องและสามารถแสดงให้เป็นที่พอใจแก่ศาลได้ว่าการส่งตามมาตรา ๘๓ สัตต ไม่อาจกระทำได้เพราะเหตุที่ภูมิลำเนาและสำนักทำการงานของบุคคลดังกล่าวไม่ปรากฏหรือเพราะเหตุอื่นใด หรือเมื่อศาลได้ดำเนินการตามมาตรา ๘๓ สัตต แล้ว แต่ไม่อาจทราบผลการส่งได้ ถ้าศาลเห็นสมควร ก็ให้ศาลอนุญาตให้ส่งโดยวิธีปิดประกาศไว้ที่ศาลแทน ในกรณีเช่นว่านี้ ศาลจะสั่งให้ส่งโดยวิธีประกาศโฆษณาในหนังสือพิมพ์หรือโดยวิธีอื่นใดด้วยก็ได้ การส่งโดยวิธีการตามวรรคหนึ่ง ให้มีผลใช้ได้ต่อเมื่อพ้นกำหนดเวลาหกสิบวันนับแต่วันที่ปิดประกาศไว้ที่ศาล และมิให้นำบทบัญญัติมาตรา ๗๙ มาใช้บังคับ"},{"id":"๘๔","num":"มาตรา ๘๔","num_ara":"๘๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["การวินิจฉัยปัญหาข้อเท็จจริงในคดีใดจะต้องกระทำโดยอาศัยพยานหลักฐานในสำนวนคดีนั้น เว้นแต่","(๑) ข้อเท็จจริงซึ่งรู้กันอยู่ทั่วไป (๒) ข้อเท็จจริงซึ่งไม่อาจโต้แย้งได้ หรือ (๓) ข้อเท็จจริงที่คู่ความรับหรือถือว่ารับกันแล้วในศาล"],"text":"การวินิจฉัยปัญหาข้อเท็จจริงในคดีใดจะต้องกระทำโดยอาศัยพยานหลักฐานในสำนวนคดีนั้น เว้นแต่\n\n(๑) ข้อเท็จจริงซึ่งรู้กันอยู่ทั่วไป (๒) ข้อเท็จจริงซึ่งไม่อาจโต้แย้งได้ หรือ (๓) ข้อเท็จจริงที่คู่ความรับหรือถือว่ารับกันแล้วในศาล"},{"id":"๘๔_๑","num":"มาตรา ๘๔/๑","num_ara":"๘๔/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["คู่ความฝ่ายใดกล่าวอ้างข้อเท็จจริงเพื่อสนับสนุนคำคู่ความของตน ให้คู่ความฝ่ายนั้นมีภาระการพิสูจน์ข้อเท็จจริงนั้น แต่ถ้ามีข้อสันนิษฐานไว้ในกฎหมายหรือมีข้อสันนิษฐานที่ควรจะเป็นซึ่งปรากฏจากสภาพปกติธรรมดาของเหตุการณ์เป็นคุณแก่คู่ความฝ่ายใด คู่ความฝ่ายนั้นต้องพิสูจน์เพียงว่าตนได้ปฏิบัติตามเงื่อนไขแห่งการที่ตนจะได้รับประโยชน์จากข้อสันนิษฐานนั้นครบถ้วนแล้ว"],"text":"คู่ความฝ่ายใดกล่าวอ้างข้อเท็จจริงเพื่อสนับสนุนคำคู่ความของตน ให้คู่ความฝ่ายนั้นมีภาระการพิสูจน์ข้อเท็จจริงนั้น แต่ถ้ามีข้อสันนิษฐานไว้ในกฎหมายหรือมีข้อสันนิษฐานที่ควรจะเป็นซึ่งปรากฏจากสภาพปกติธรรมดาของเหตุการณ์เป็นคุณแก่คู่ความฝ่ายใด คู่ความฝ่ายนั้นต้องพิสูจน์เพียงว่าตนได้ปฏิบัติตามเงื่อนไขแห่งการที่ตนจะได้รับประโยชน์จากข้อสันนิษฐานนั้นครบถ้วนแล้ว"},{"id":"๘๕","num":"มาตรา ๘๕","num_ara":"๘๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["คู่ความฝ่ายที่มีหน้าที่ต้องนำสืบข้อเท็จจริงย่อมมีสิทธิที่จะนำพยานหลักฐานใด ๆ มาสืบได้ภายใต้บังคับแห่งประมวลกฎหมายนี้ หรือกฎหมายอื่นอันว่าด้วยการรับฟังพยานหลักฐานและการยื่นพยานหลักฐาน"],"text":"คู่ความฝ่ายที่มีหน้าที่ต้องนำสืบข้อเท็จจริงย่อมมีสิทธิที่จะนำพยานหลักฐานใด ๆ มาสืบได้ภายใต้บังคับแห่งประมวลกฎหมายนี้ หรือกฎหมายอื่นอันว่าด้วยการรับฟังพยานหลักฐานและการยื่นพยานหลักฐาน"},{"id":"๘๖","num":"มาตรา ๘๖","num_ara":"๘๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["เมื่อศาลเห็นว่าพยานหลักฐานใดเป็นพยานหลักฐานที่รับฟังไม่ได้ก็ดี หรือเป็นพยานหลักฐานที่รับฟังได้ แต่ได้ยื่นฝ่าฝืนต่อบทบัญญัติแห่งประมวลกฎหมายนี้ ให้ศาลปฏิเสธไม่รับพยานหลักฐานนั้นไว้ เมื่อศาลเห็นว่าพยานหลักฐานใดฟุ่มเฟือยเกินสมควรหรือประวิงให้ชักช้าหรือไม่เกี่ยวแก่ประเด็น ให้ศาลมีอำนาจงดการสืบพยานหลักฐานเช่นว่านั้น หรือพยานหลักฐานอื่นต่อไป เมื่อศาลเห็นว่าเพื่อประโยชน์แห่งความยุติธรรมเป็นการจำเป็นที่จะต้องนำพยานหลักฐานอื่นอันเกี่ยวกับประเด็นในคดีมาสืบเพิ่มเติม ให้ศาลทำการสืบพยานหลักฐานต่อไป ซึ่งอาจรวมทั้งการที่จะเรียกพยานที่สืบแล้วมาสืบใหม่ด้วย โดยไม่ต้องมีฝ่ายใดร้องขอ"],"text":"เมื่อศาลเห็นว่าพยานหลักฐานใดเป็นพยานหลักฐานที่รับฟังไม่ได้ก็ดี หรือเป็นพยานหลักฐานที่รับฟังได้ แต่ได้ยื่นฝ่าฝืนต่อบทบัญญัติแห่งประมวลกฎหมายนี้ ให้ศาลปฏิเสธไม่รับพยานหลักฐานนั้นไว้ เมื่อศาลเห็นว่าพยานหลักฐานใดฟุ่มเฟือยเกินสมควรหรือประวิงให้ชักช้าหรือไม่เกี่ยวแก่ประเด็น ให้ศาลมีอำนาจงดการสืบพยานหลักฐานเช่นว่านั้น หรือพยานหลักฐานอื่นต่อไป เมื่อศาลเห็นว่าเพื่อประโยชน์แห่งความยุติธรรมเป็นการจำเป็นที่จะต้องนำพยานหลักฐานอื่นอันเกี่ยวกับประเด็นในคดีมาสืบเพิ่มเติม ให้ศาลทำการสืบพยานหลักฐานต่อไป ซึ่งอาจรวมทั้งการที่จะเรียกพยานที่สืบแล้วมาสืบใหม่ด้วย โดยไม่ต้องมีฝ่ายใดร้องขอ"},{"id":"๘๗","num":"มาตรา ๘๗","num_ara":"๘๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ห้ามมิให้ศาลรับฟังพยานหลักฐานใดเว้นแต่","(๑) พยานหลักฐานนั้นเกี่ยวถึงข้อเท็จจริงที่คู่ความฝ่ายหนึ่งฝ่ายใดในคดีจะต้องนำสืบ และ (๒) คู่ความฝ่ายที่อ้างพยานหลักฐานได้แสดงความจำนงที่จะอ้างอิงพยานหลักฐานนั้นดังที่บัญญัติไว้ในมาตรา ๘๘ และ ๙๐ แต่ถ้าศาลเห็นว่า เพื่อประโยชน์แห่งความยุติธรรม จำเป็นจะต้องสืบพยานหลักฐานอันสำคัญซึ่งเกี่ยวกับประเด็นข้อสำคัญในคดี โดยฝ่าฝืนต่อบทบัญญัติของอนุมาตรานี้ ให้ศาลมีอำนาจรับฟังพยานหลักฐานเช่นว่านั้นได้"],"text":"ห้ามมิให้ศาลรับฟังพยานหลักฐานใดเว้นแต่\n\n(๑) พยานหลักฐานนั้นเกี่ยวถึงข้อเท็จจริงที่คู่ความฝ่ายหนึ่งฝ่ายใดในคดีจะต้องนำสืบ และ (๒) คู่ความฝ่ายที่อ้างพยานหลักฐานได้แสดงความจำนงที่จะอ้างอิงพยานหลักฐานนั้นดังที่บัญญัติไว้ในมาตรา ๘๘ และ ๙๐ แต่ถ้าศาลเห็นว่า เพื่อประโยชน์แห่งความยุติธรรม จำเป็นจะต้องสืบพยานหลักฐานอันสำคัญซึ่งเกี่ยวกับประเด็นข้อสำคัญในคดี โดยฝ่าฝืนต่อบทบัญญัติของอนุมาตรานี้ ให้ศาลมีอำนาจรับฟังพยานหลักฐานเช่นว่านั้นได้"},{"id":"๘๘","num":"มาตรา ๘๘","num_ara":"๘๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["เมื่อคู่ความฝ่ายใดมีความจำนงที่จะอ้างอิงเอกสารฉบับใดหรือคำเบิกความของพยานคนใด หรือมีความจำนงที่จะให้ศาลตรวจบุคคล วัตถุ สถานที่ หรืออ้างอิงความเห็นของผู้เชี่ยวชาญที่ศาลตั้งหรือความเห็นของผู้มีความรู้เชี่ยวชาญ เพื่อเป็นพยานหลักฐานสนับสนุนข้ออ้างหรือข้อเถียงของตน ให้คู่ความฝ่ายนั้นยื่นบัญชีระบุพยานต่อศาลก่อนวันสืบพยานไม่น้อยกว่าเจ็ดวัน โดยแสดงเอกสารหรือสภาพของเอกสารที่จะอ้าง และรายชื่อ ที่อยู่ของบุคคล ผู้มีความรู้เชี่ยวชาญ วัตถุ หรือสถานที่ซึ่งคู่ความฝ่ายนั้นระบุอ้างเป็นพยานหลักฐาน หรือขอให้ศาลไปตรวจ หรือขอให้ตั้งผู้เชี่ยวชาญ แล้วแต่กรณี พร้อมทั้งสำเนาบัญชีระบุพยานดังกล่าวในจำนวนที่เพียงพอ เพื่อให้คู่ความฝ่ายอื่นมารับไปจากเจ้าพนักงานศาล ถ้าคู่ความฝ่ายใดมีความจำนงจะยื่นบัญชีระบุพยานเพิ่มเติม ให้ยื่นคำแถลงขอระบุพยานเพิ่มเติมต่อศาลพร้อมกับบัญชีระบุพยานเพิ่มเติมและสำเนาบัญชีระบุพยานเพิ่มเติมดังกล่าวได้ภายในสิบห้าวันนับแต่วันสืบพยาน เมื่อระยะเวลาที่กำหนดให้ยื่นบัญชีพยานตามวรรคหนึ่งหรือวรรคสอง แล้วแต่กรณี ได้สิ้นสุดลงแล้ว ถ้าคู่ความฝ่ายใดซึ่งได้ยื่นบัญชีระบุพยานไว้แล้ว มีเหตุอันสมควรแสดงได้ว่า ตนไม่สามารถทราบได้ว่าต้องนำพยานหลักฐานบางอย่างมาสืบเพื่อประโยชน์ของตน หรือไม่ทราบว่าพยานหลักฐานบางอย่างได้มีอยู่ หรือมีเหตุอันสมควรอื่นใด หรือถ้าคู่ความฝ่ายใดซึ่งมิได้ยื่นบัญชีระบุพยานแสดงให้เป็นที่พอใจแก่ศาลได้ว่า มีเหตุอันสมควรที่ไม่สามารถยื่นบัญชีระบุพยานตามกำหนดเวลาดังกล่าวได้ คู่ความฝ่ายนั้นอาจยื่นคำร้องขออนุญาตอ้างพยานหลักฐานเช่นว่านั้นต่อศาลพร้อมกับบัญชีระบุพยานและสำเนาบัญชีระบุพยานดังกล่าวไม่ว่าเวลาใด ๆ ก่อนพิพากษาคดี และถ้าศาลเห็นว่า เพื่อให้การวินิจฉัยชี้ขาดข้อสำคัญแห่งประเด็นเป็นไปโดยเที่ยงธรรม จำเป็นจะต้องสืบพยานหลักฐานเช่นว่านั้น ก็ให้ศาลอนุญาตตามคำร้อง"],"text":"เมื่อคู่ความฝ่ายใดมีความจำนงที่จะอ้างอิงเอกสารฉบับใดหรือคำเบิกความของพยานคนใด หรือมีความจำนงที่จะให้ศาลตรวจบุคคล วัตถุ สถานที่ หรืออ้างอิงความเห็นของผู้เชี่ยวชาญที่ศาลตั้งหรือความเห็นของผู้มีความรู้เชี่ยวชาญ เพื่อเป็นพยานหลักฐานสนับสนุนข้ออ้างหรือข้อเถียงของตน ให้คู่ความฝ่ายนั้นยื่นบัญชีระบุพยานต่อศาลก่อนวันสืบพยานไม่น้อยกว่าเจ็ดวัน โดยแสดงเอกสารหรือสภาพของเอกสารที่จะอ้าง และรายชื่อ ที่อยู่ของบุคคล ผู้มีความรู้เชี่ยวชาญ วัตถุ หรือสถานที่ซึ่งคู่ความฝ่ายนั้นระบุอ้างเป็นพยานหลักฐาน หรือขอให้ศาลไปตรวจ หรือขอให้ตั้งผู้เชี่ยวชาญ แล้วแต่กรณี พร้อมทั้งสำเนาบัญชีระบุพยานดังกล่าวในจำนวนที่เพียงพอ เพื่อให้คู่ความฝ่ายอื่นมารับไปจากเจ้าพนักงานศาล ถ้าคู่ความฝ่ายใดมีความจำนงจะยื่นบัญชีระบุพยานเพิ่มเติม ให้ยื่นคำแถลงขอระบุพยานเพิ่มเติมต่อศาลพร้อมกับบัญชีระบุพยานเพิ่มเติมและสำเนาบัญชีระบุพยานเพิ่มเติมดังกล่าวได้ภายในสิบห้าวันนับแต่วันสืบพยาน เมื่อระยะเวลาที่กำหนดให้ยื่นบัญชีพยานตามวรรคหนึ่งหรือวรรคสอง แล้วแต่กรณี ได้สิ้นสุดลงแล้ว ถ้าคู่ความฝ่ายใดซึ่งได้ยื่นบัญชีระบุพยานไว้แล้ว มีเหตุอันสมควรแสดงได้ว่า ตนไม่สามารถทราบได้ว่าต้องนำพยานหลักฐานบางอย่างมาสืบเพื่อประโยชน์ของตน หรือไม่ทราบว่าพยานหลักฐานบางอย่างได้มีอยู่ หรือมีเหตุอันสมควรอื่นใด หรือถ้าคู่ความฝ่ายใดซึ่งมิได้ยื่นบัญชีระบุพยานแสดงให้เป็นที่พอใจแก่ศาลได้ว่า มีเหตุอันสมควรที่ไม่สามารถยื่นบัญชีระบุพยานตามกำหนดเวลาดังกล่าวได้ คู่ความฝ่ายนั้นอาจยื่นคำร้องขออนุญาตอ้างพยานหลักฐานเช่นว่านั้นต่อศาลพร้อมกับบัญชีระบุพยานและสำเนาบัญชีระบุพยานดังกล่าวไม่ว่าเวลาใด ๆ ก่อนพิพากษาคดี และถ้าศาลเห็นว่า เพื่อให้การวินิจฉัยชี้ขาดข้อสำคัญแห่งประเด็นเป็นไปโดยเที่ยงธรรม จำเป็นจะต้องสืบพยานหลักฐานเช่นว่านั้น ก็ให้ศาลอนุญาตตามคำร้อง"},{"id":"๘๙","num":"มาตรา ๘๙","num_ara":"๘๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["คู่ความฝ่ายใดประสงค์จะนำสืบพยานหลักฐานของตนเพื่อพิสูจน์ต่อพยานของคู่ความฝ่ายอื่นในกรณีต่อไปนี้","(๑) หักล้างหรือเปลี่ยนแปลงแก้ไขถ้อยคำพยานในข้อความทั้งหลายซึ่งพยานเช่นว่านั้นเป็นผู้รู้เห็น หรือ (๒) พิสูจน์ข้อความอย่างหนึ่งอย่างใดอันเกี่ยวด้วยการกระทำ ถ้อยคำ เอกสาร หรือพยานหลักฐานอื่นใดซึ่งพยานเช่นว่านั้นได้กระทำขึ้น ให้คู่ความฝ่ายนั้นถามค้านพยานดังกล่าวเสียในเวลาที่พยานเบิกความ เพื่อให้พยานมีโอกาสอธิบายถึงข้อความเหล่านั้น แม้ว่าพยานนั้นจะมิได้เบิกความถึงข้อความดังกล่าวก็ตาม ในกรณีที่คู่ความฝ่ายนั้นมิได้ถามค้านพยานของคู่ความฝ่ายอื่นไว้ดังกล่าวมาข้างต้นแล้ว ต่อมานำพยานหลักฐานมาสืบถึงข้อความนั้น คู่ความฝ่ายอื่นที่สืบพยานนั้นไว้ชอบที่จะคัดค้านได้ในขณะที่คู่ความฝ่ายนั้นนำพยานหลักฐานมาสืบ และในกรณีเช่นว่านี้ ให้ศาลปฏิเสธไม่ยอมรับฟังพยานหลักฐานเช่นว่ามานั้น ในกรณีที่คู่ความฝ่ายที่ประสงค์จะนำสืบพยานหลักฐานเพื่อพิสูจน์ต่อพยานตามวรรคหนึ่ง แสดงให้เป็นที่พอใจของศาลว่า เมื่อเวลาพยานเบิกความนั้นตนไม่รู้หรือไม่มีเหตุอันควรรู้ถึงข้อความดังกล่าวมาแล้ว หรือถ้าศาลเห็นว่าเพื่อประโยชน์แห่งความยุติธรรมจำเป็นต้องสืบพยานหลักฐานเช่นว่านี้ ศาลจะยอมรับฟังพยานหลักฐานเช่นว่านี้ก็ได้ แต่ในกรณีเช่นนี้ คู่ความอีกฝ่ายหนึ่งจะขอให้เรียกพยานหลักฐานที่เกี่ยวข้องมาสืบอีกก็ได้ หรือเมื่อศาลเห็นสมควรจะเรียกมาสืบเองก็ได้"],"text":"คู่ความฝ่ายใดประสงค์จะนำสืบพยานหลักฐานของตนเพื่อพิสูจน์ต่อพยานของคู่ความฝ่ายอื่นในกรณีต่อไปนี้\n\n(๑) หักล้างหรือเปลี่ยนแปลงแก้ไขถ้อยคำพยานในข้อความทั้งหลายซึ่งพยานเช่นว่านั้นเป็นผู้รู้เห็น หรือ (๒) พิสูจน์ข้อความอย่างหนึ่งอย่างใดอันเกี่ยวด้วยการกระทำ ถ้อยคำ เอกสาร หรือพยานหลักฐานอื่นใดซึ่งพยานเช่นว่านั้นได้กระทำขึ้น ให้คู่ความฝ่ายนั้นถามค้านพยานดังกล่าวเสียในเวลาที่พยานเบิกความ เพื่อให้พยานมีโอกาสอธิบายถึงข้อความเหล่านั้น แม้ว่าพยานนั้นจะมิได้เบิกความถึงข้อความดังกล่าวก็ตาม ในกรณีที่คู่ความฝ่ายนั้นมิได้ถามค้านพยานของคู่ความฝ่ายอื่นไว้ดังกล่าวมาข้างต้นแล้ว ต่อมานำพยานหลักฐานมาสืบถึงข้อความนั้น คู่ความฝ่ายอื่นที่สืบพยานนั้นไว้ชอบที่จะคัดค้านได้ในขณะที่คู่ความฝ่ายนั้นนำพยานหลักฐานมาสืบ และในกรณีเช่นว่านี้ ให้ศาลปฏิเสธไม่ยอมรับฟังพยานหลักฐานเช่นว่ามานั้น ในกรณีที่คู่ความฝ่ายที่ประสงค์จะนำสืบพยานหลักฐานเพื่อพิสูจน์ต่อพยานตามวรรคหนึ่ง แสดงให้เป็นที่พอใจของศาลว่า เมื่อเวลาพยานเบิกความนั้นตนไม่รู้หรือไม่มีเหตุอันควรรู้ถึงข้อความดังกล่าวมาแล้ว หรือถ้าศาลเห็นว่าเพื่อประโยชน์แห่งความยุติธรรมจำเป็นต้องสืบพยานหลักฐานเช่นว่านี้ ศาลจะยอมรับฟังพยานหลักฐานเช่นว่านี้ก็ได้ แต่ในกรณีเช่นนี้ คู่ความอีกฝ่ายหนึ่งจะขอให้เรียกพยานหลักฐานที่เกี่ยวข้องมาสืบอีกก็ได้ หรือเมื่อศาลเห็นสมควรจะเรียกมาสืบเองก็ได้"},{"id":"๙๐","num":"มาตรา ๙๐","num_ara":"๙๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ให้คู่ความฝ่ายที่อ้างอิงเอกสารเป็นพยานหลักฐานเพื่อสนับสนุนข้ออ้างหรือข้อเถียงของตนตามมาตรา ๘๘ วรรคหนึ่ง ยื่นต่อศาลและส่งให้คู่ความฝ่ายอื่นซึ่งสำเนาเอกสารนั้นก่อนวันสืบพยานไม่น้อยกว่าเจ็ดวัน ในกรณีที่คู่ความฝ่ายใดยื่นคำแถลงหรือคำร้องขออนุญาตอ้างอิงเอกสารเป็นพยานหลักฐานตามมาตรา ๘๘ วรรคสองหรือวรรคสาม ให้ยื่นต่อศาลและส่งให้คู่ความฝ่ายอื่นซึ่งสำเนาเอกสารนั้นพร้อมกับการยื่นคำแถลงหรือคำร้องดังกล่าว เว้นแต่ศาลจะอนุญาตให้ยื่นสำเนาเอกสารภายหลังเมื่อมีเหตุอันสมควร คู่ความฝ่ายที่อ้างอิงพยานหลักฐานไม่ต้องยื่นสำเนาเอกสารต่อศาล และไม่ต้องส่งสำเนาเอกสารให้คู่ความฝ่ายอื่นในกรณีดังต่อไปนี้","(๑) เมื่อคู่ความฝ่ายใดอ้างอิงเอกสารเป็นชุดซึ่งคู่ความฝ่ายอื่นทราบดีอยู่แล้วหรือสามารถตรวจตราให้ทราบได้โดยง่ายถึงความมีอยู่และความแท้จริงแห่งเอกสารนั้น เช่น จดหมายโต้ตอบระหว่างคู่ความในคดี หรือสมุดบัญชีการค้า และสมุดบัญชีของธนาคารหรือเอกสารในสำนวนคดีเรื่องอื่น (๒) เมื่อคู่ความฝ่ายใดอ้างอิงเอกสารฉบับเดียวหรือหลายฉบับที่อยู่ในความครอบครองของคู่ความฝ่ายอื่นหรือของบุคคลภายนอก (๓) ถ้าการคัดสำเนาเอกสารจะทำให้กระบวนพิจารณาล่าช้าเป็นที่เสื่อมเสียแก่คู่ความซึ่งอ้างอิงเอกสารนั้น หรือมีเหตุผลแสดงว่าไม่อาจคัดสำเนาเอกสารให้เสร็จภายในกำหนดเวลาที่ให้ยื่นสำเนาเอกสารนั้น กรณีตาม (๑) หรือ (๓) ให้คู่ความฝ่ายที่อ้างอิงเอกสารยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องต่อศาล ขออนุญาตงดการยื่นสำเนาเอกสารนั้นและขอยื่นต้นฉบับเอกสารแทน เพื่อให้ศาลหรือคู่ความฝ่ายอื่นตรวจดูตามเงื่อนไขที่ศาลเห็นสมควรกำหนด กรณีตาม (๒) ให้คู่ความฝ่ายที่อ้างอิงเอกสารขอให้ศาลมีคำสั่งเรียกเอกสารนั้นมาจากผู้ครอบครองตามมาตรา ๑๒๓ โดยต้องยื่นคำร้องต่อศาลภายในกำหนดเวลาตามวรรคหนึ่งหรือวรรคสอง แล้วแต่กรณี และให้คู่ความฝ่ายนั้นมีหน้าที่ติดตามเพื่อให้ได้เอกสารดังกล่าวมาภายในเวลาที่ศาลกำหนด"],"text":"ให้คู่ความฝ่ายที่อ้างอิงเอกสารเป็นพยานหลักฐานเพื่อสนับสนุนข้ออ้างหรือข้อเถียงของตนตามมาตรา ๘๘ วรรคหนึ่ง ยื่นต่อศาลและส่งให้คู่ความฝ่ายอื่นซึ่งสำเนาเอกสารนั้นก่อนวันสืบพยานไม่น้อยกว่าเจ็ดวัน ในกรณีที่คู่ความฝ่ายใดยื่นคำแถลงหรือคำร้องขออนุญาตอ้างอิงเอกสารเป็นพยานหลักฐานตามมาตรา ๘๘ วรรคสองหรือวรรคสาม ให้ยื่นต่อศาลและส่งให้คู่ความฝ่ายอื่นซึ่งสำเนาเอกสารนั้นพร้อมกับการยื่นคำแถลงหรือคำร้องดังกล่าว เว้นแต่ศาลจะอนุญาตให้ยื่นสำเนาเอกสารภายหลังเมื่อมีเหตุอันสมควร คู่ความฝ่ายที่อ้างอิงพยานหลักฐานไม่ต้องยื่นสำเนาเอกสารต่อศาล และไม่ต้องส่งสำเนาเอกสารให้คู่ความฝ่ายอื่นในกรณีดังต่อไปนี้\n\n(๑) เมื่อคู่ความฝ่ายใดอ้างอิงเอกสารเป็นชุดซึ่งคู่ความฝ่ายอื่นทราบดีอยู่แล้วหรือสามารถตรวจตราให้ทราบได้โดยง่ายถึงความมีอยู่และความแท้จริงแห่งเอกสารนั้น เช่น จดหมายโต้ตอบระหว่างคู่ความในคดี หรือสมุดบัญชีการค้า และสมุดบัญชีของธนาคารหรือเอกสารในสำนวนคดีเรื่องอื่น (๒) เมื่อคู่ความฝ่ายใดอ้างอิงเอกสารฉบับเดียวหรือหลายฉบับที่อยู่ในความครอบครองของคู่ความฝ่ายอื่นหรือของบุคคลภายนอก (๓) ถ้าการคัดสำเนาเอกสารจะทำให้กระบวนพิจารณาล่าช้าเป็นที่เสื่อมเสียแก่คู่ความซึ่งอ้างอิงเอกสารนั้น หรือมีเหตุผลแสดงว่าไม่อาจคัดสำเนาเอกสารให้เสร็จภายในกำหนดเวลาที่ให้ยื่นสำเนาเอกสารนั้น กรณีตาม (๑) หรือ (๓) ให้คู่ความฝ่ายที่อ้างอิงเอกสารยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องต่อศาล ขออนุญาตงดการยื่นสำเนาเอกสารนั้นและขอยื่นต้นฉบับเอกสารแทน เพื่อให้ศาลหรือคู่ความฝ่ายอื่นตรวจดูตามเงื่อนไขที่ศาลเห็นสมควรกำหนด กรณีตาม (๒) ให้คู่ความฝ่ายที่อ้างอิงเอกสารขอให้ศาลมีคำสั่งเรียกเอกสารนั้นมาจากผู้ครอบครองตามมาตรา ๑๒๓ โดยต้องยื่นคำร้องต่อศาลภายในกำหนดเวลาตามวรรคหนึ่งหรือวรรคสอง แล้วแต่กรณี และให้คู่ความฝ่ายนั้นมีหน้าที่ติดตามเพื่อให้ได้เอกสารดังกล่าวมาภายในเวลาที่ศาลกำหนด"},{"id":"๙๑","num":"มาตรา ๙๑","num_ara":"๙๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["คู่ความทั้งสองฝ่ายต่างมีสิทธิที่จะอ้างอิงพยานหลักฐานร่วมกันก็ได้"],"text":"คู่ความทั้งสองฝ่ายต่างมีสิทธิที่จะอ้างอิงพยานหลักฐานร่วมกันก็ได้"},{"id":"๙๒","num":"มาตรา ๙๒","num_ara":"๙๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ถ้าคู่ความหรือบุคคลใดจะต้องเบิกความหรือนำพยานหลักฐานชนิดใด ๆ มาแสดง และคำเบิกความหรือพยานหลักฐานนั้นอาจเปิดเผย","(๑) หนังสือราชการหรือข้อความอันเกี่ยวกับงานของแผ่นดินซึ่งโดยสภาพจะต้องรักษาเป็นความลับไว้ชั่วคราวหรือตลอดไป และคู่ความหรือบุคคลนั้นเป็นผู้รักษาไว้หรือได้ทราบมาโดยตำแหน่งราชการ หรือในหน้าที่ราชการหรือกึ่งราชการอื่นใด (๒) เอกสารหรือข้อความที่เป็นความลับใด ๆ ซึ่งตนได้รับมอบหมายหรือบอกเล่าจากลูกความในฐานะที่ตนเป็นทนายความ (๓) การประดิษฐ์ แบบ หรือการงานอื่น ๆ ซึ่งได้รับความคุ้มครองตามกฎหมายไม่ให้เปิดเผย คู่ความหรือบุคคลเช่นว่านั้นชอบที่จะปฏิเสธไม่ยอมเบิกความหรือนำพยานหลักฐานนั้น ๆ มาแสดงได้ เว้นแต่จะได้รับอนุญาตจากพนักงานเจ้าหน้าที่หรือผู้ที่เกี่ยวข้องให้เปิดเผยได้ เมื่อคู่ความหรือบุคคลใดปฏิเสธไม่ยอมเบิกความหรือนำพยานหลักฐานมาแสดงดังกล่าวมาแล้ว ให้ศาลมีอำนาจที่จะหมายเรียกพนักงานเจ้าหน้าที่หรือบุคคลที่เกี่ยวข้องให้มาศาล และให้ชี้แจงข้อความตามที่ศาลต้องการเพื่อวินิจฉัยว่า การปฏิเสธนั้นชอบด้วยเหตุผลหรือไม่ ถ้าศาลเห็นว่า การปฏิเสธนั้นไม่มีเหตุผลฟังได้ ศาลมีอำนาจออกคำสั่งมิให้คู่ความหรือบุคคลเช่นว่านั้นยกประโยชน์แห่งมาตรานี้ขึ้นใช้ และบังคับให้เบิกความหรือนำพยานหลักฐานนั้นมาแสดงได้"],"text":"ถ้าคู่ความหรือบุคคลใดจะต้องเบิกความหรือนำพยานหลักฐานชนิดใด ๆ มาแสดง และคำเบิกความหรือพยานหลักฐานนั้นอาจเปิดเผย\n\n(๑) หนังสือราชการหรือข้อความอันเกี่ยวกับงานของแผ่นดินซึ่งโดยสภาพจะต้องรักษาเป็นความลับไว้ชั่วคราวหรือตลอดไป และคู่ความหรือบุคคลนั้นเป็นผู้รักษาไว้หรือได้ทราบมาโดยตำแหน่งราชการ หรือในหน้าที่ราชการหรือกึ่งราชการอื่นใด (๒) เอกสารหรือข้อความที่เป็นความลับใด ๆ ซึ่งตนได้รับมอบหมายหรือบอกเล่าจากลูกความในฐานะที่ตนเป็นทนายความ (๓) การประดิษฐ์ แบบ หรือการงานอื่น ๆ ซึ่งได้รับความคุ้มครองตามกฎหมายไม่ให้เปิดเผย คู่ความหรือบุคคลเช่นว่านั้นชอบที่จะปฏิเสธไม่ยอมเบิกความหรือนำพยานหลักฐานนั้น ๆ มาแสดงได้ เว้นแต่จะได้รับอนุญาตจากพนักงานเจ้าหน้าที่หรือผู้ที่เกี่ยวข้องให้เปิดเผยได้ เมื่อคู่ความหรือบุคคลใดปฏิเสธไม่ยอมเบิกความหรือนำพยานหลักฐานมาแสดงดังกล่าวมาแล้ว ให้ศาลมีอำนาจที่จะหมายเรียกพนักงานเจ้าหน้าที่หรือบุคคลที่เกี่ยวข้องให้มาศาล และให้ชี้แจงข้อความตามที่ศาลต้องการเพื่อวินิจฉัยว่า การปฏิเสธนั้นชอบด้วยเหตุผลหรือไม่ ถ้าศาลเห็นว่า การปฏิเสธนั้นไม่มีเหตุผลฟังได้ ศาลมีอำนาจออกคำสั่งมิให้คู่ความหรือบุคคลเช่นว่านั้นยกประโยชน์แห่งมาตรานี้ขึ้นใช้ และบังคับให้เบิกความหรือนำพยานหลักฐานนั้นมาแสดงได้"},{"id":"๙๓","num":"มาตรา ๙๓","num_ara":"๙๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["การอ้างเอกสารเป็นพยานหลักฐานให้ยอมรับฟังได้เฉพาะต้นฉบับเอกสารเท่านั้น เว้นแต่","(๑) เมื่อคู่ความที่เกี่ยวข้องทุกฝ่ายตกลงกันว่าสำเนาเอกสารนั้นถูกต้องแล้วให้ศาลยอมรับฟังสำเนาเช่นว่านั้นเป็นพยานหลักฐาน (๒) ถ้าต้นฉบับเอกสารนำมาไม่ได้ เพราะถูกทำลายโดยเหตุสุดวิสัย หรือสูญหาย หรือไม่สามารถนำมาได้โดยประการอื่น อันมิใช่เกิดจากพฤติการณ์ที่ผู้อ้างต้องรับผิดชอบ หรือเมื่อศาลเห็นว่าเป็นกรณีจำเป็นและเพื่อประโยชน์แห่งความยุติธรรมที่จะต้องสืบสำเนาเอกสารหรือพยานบุคคลแทนต้นฉบับเอกสารที่นำมาไม่ได้นั้น ศาลจะอนุญาตให้นำสำเนาหรือพยานบุคคลมาสืบก็ได้ (๓) ต้นฉบับเอกสารที่อยู่ในความอารักขาหรือในความควบคุมของทางราชการนั้นจะนำมาแสดงได้ต่อเมื่อได้รับอนุญาตจากทางราชการที่เกี่ยวข้องเสียก่อน อนึ่ง สำเนาเอกสารซึ่งผู้มีอำนาจหน้าที่ได้รับรองว่าถูกต้องแล้ว ให้ถือว่าเป็นอันเพียงพอในการที่จะนำมาแสดง เว้นแต่ศาลจะได้กำหนดเป็นอย่างอื่น (๔) เมื่อคู่ความฝ่ายที่ถูกคู่ความอีกฝ่ายหนึ่งอ้างอิงเอกสารมาเป็นพยานหลักฐานยันตนมิได้คัดค้านการนำเอกสารนั้นมาสืบตามมาตรา ๑๒๕ ให้ศาลรับฟังสำเนาเอกสารเช่นว่านั้นเป็นพยานหลักฐานได้ แต่ทั้งนี้ ไม่ตัดอำนาจศาลตามมาตรา ๑๒๕ วรรคสาม"],"text":"การอ้างเอกสารเป็นพยานหลักฐานให้ยอมรับฟังได้เฉพาะต้นฉบับเอกสารเท่านั้น เว้นแต่\n\n(๑) เมื่อคู่ความที่เกี่ยวข้องทุกฝ่ายตกลงกันว่าสำเนาเอกสารนั้นถูกต้องแล้วให้ศาลยอมรับฟังสำเนาเช่นว่านั้นเป็นพยานหลักฐาน (๒) ถ้าต้นฉบับเอกสารนำมาไม่ได้ เพราะถูกทำลายโดยเหตุสุดวิสัย หรือสูญหาย หรือไม่สามารถนำมาได้โดยประการอื่น อันมิใช่เกิดจากพฤติการณ์ที่ผู้อ้างต้องรับผิดชอบ หรือเมื่อศาลเห็นว่าเป็นกรณีจำเป็นและเพื่อประโยชน์แห่งความยุติธรรมที่จะต้องสืบสำเนาเอกสารหรือพยานบุคคลแทนต้นฉบับเอกสารที่นำมาไม่ได้นั้น ศาลจะอนุญาตให้นำสำเนาหรือพยานบุคคลมาสืบก็ได้ (๓) ต้นฉบับเอกสารที่อยู่ในความอารักขาหรือในความควบคุมของทางราชการนั้นจะนำมาแสดงได้ต่อเมื่อได้รับอนุญาตจากทางราชการที่เกี่ยวข้องเสียก่อน อนึ่ง สำเนาเอกสารซึ่งผู้มีอำนาจหน้าที่ได้รับรองว่าถูกต้องแล้ว ให้ถือว่าเป็นอันเพียงพอในการที่จะนำมาแสดง เว้นแต่ศาลจะได้กำหนดเป็นอย่างอื่น (๔) เมื่อคู่ความฝ่ายที่ถูกคู่ความอีกฝ่ายหนึ่งอ้างอิงเอกสารมาเป็นพยานหลักฐานยันตนมิได้คัดค้านการนำเอกสารนั้นมาสืบตามมาตรา ๑๒๕ ให้ศาลรับฟังสำเนาเอกสารเช่นว่านั้นเป็นพยานหลักฐานได้ แต่ทั้งนี้ ไม่ตัดอำนาจศาลตามมาตรา ๑๒๕ วรรคสาม"},{"id":"๙๔","num":"มาตรา ๙๔","num_ara":"๙๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["เมื่อใดมีกฎหมายบังคับให้ต้องมีพยานเอกสารมาแสดง ห้ามมิให้ศาลยอมรับฟังพยานบุคคลในกรณีอย่างใดอย่างหนึ่งดังต่อไปนี้ แม้ถึงว่าคู่ความอีกฝ่ายหนึ่งจะได้ยินยอมก็ดี (ก) ขอสืบพยานบุคคลแทนพยานเอกสาร เมื่อไม่สามารถนำเอกสารมาแสดง (ข) ขอสืบพยานบุคคลประกอบข้ออ้างอย่างใดอย่างหนึ่ง เมื่อได้นำเอกสารมาแสดงแล้วว่า ยังมีข้อความเพิ่มเติม ตัดทอน หรือเปลี่ยนแปลงแก้ไขข้อความในเอกสารนั้นอยู่อีก แต่ว่าบทบัญญัติแห่งมาตรานี้ มิให้ใช้บังคับในกรณีที่บัญญัติไว้ในอนุมาตรา (๒) แห่งมาตรา ๙๓ และมิให้ถือว่าเป็นการตัดสิทธิคู่ความในอันที่จะกล่าวอ้างและนำพยานบุคคลมาสืบประกอบข้ออ้างว่า พยานเอกสารที่แสดงนั้นเป็นเอกสารปลอมหรือไม่ถูกต้องทั้งหมด หรือแต่บางส่วน หรือสัญญาหรือหนี้อย่างอื่นที่ระบุไว้ในเอกสารนั้นไม่สมบูรณ์หรือคู่ความอีกฝ่ายหนึ่งตีความหมายผิด"],"text":"เมื่อใดมีกฎหมายบังคับให้ต้องมีพยานเอกสารมาแสดง ห้ามมิให้ศาลยอมรับฟังพยานบุคคลในกรณีอย่างใดอย่างหนึ่งดังต่อไปนี้ แม้ถึงว่าคู่ความอีกฝ่ายหนึ่งจะได้ยินยอมก็ดี (ก) ขอสืบพยานบุคคลแทนพยานเอกสาร เมื่อไม่สามารถนำเอกสารมาแสดง (ข) ขอสืบพยานบุคคลประกอบข้ออ้างอย่างใดอย่างหนึ่ง เมื่อได้นำเอกสารมาแสดงแล้วว่า ยังมีข้อความเพิ่มเติม ตัดทอน หรือเปลี่ยนแปลงแก้ไขข้อความในเอกสารนั้นอยู่อีก แต่ว่าบทบัญญัติแห่งมาตรานี้ มิให้ใช้บังคับในกรณีที่บัญญัติไว้ในอนุมาตรา (๒) แห่งมาตรา ๙๓ และมิให้ถือว่าเป็นการตัดสิทธิคู่ความในอันที่จะกล่าวอ้างและนำพยานบุคคลมาสืบประกอบข้ออ้างว่า พยานเอกสารที่แสดงนั้นเป็นเอกสารปลอมหรือไม่ถูกต้องทั้งหมด หรือแต่บางส่วน หรือสัญญาหรือหนี้อย่างอื่นที่ระบุไว้ในเอกสารนั้นไม่สมบูรณ์หรือคู่ความอีกฝ่ายหนึ่งตีความหมายผิด"},{"id":"๙๕","num":"มาตรา ๙๕","num_ara":"๙๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ห้ามมิให้ยอมรับฟังพยานบุคคลใดเว้นแต่บุคคลนั้น","(๑) สามารถเข้าใจและตอบคำถามได้ และ (๒) เป็นผู้ที่ได้เห็น ได้ยิน หรือทราบข้อความเกี่ยวในเรื่องที่จะให้การเป็นพยานนั้นมาด้วยตนเองโดยตรง แต่ความในข้อนี้ให้ใช้ได้ต่อเมื่อไม่มีบทบัญญัติแห่งกฎหมายโดยชัดแจ้ง หรือคำสั่งของศาลว่าให้เป็นอย่างอื่น ถ้าศาลไม่ยอมรับไว้ซึ่งคำเบิกความของบุคคลใด เพราะเห็นว่าบุคคลนั้นจะเป็นพยานหรือให้การดังกล่าวข้างต้นไม่ได้ และคู่ความที่ฝ่ายเกี่ยวข้องร้องคัดค้านก่อนที่ศาลจะดำเนินคดีต่อไป ให้ศาลจดรายงานระบุนามพยาน เหตุผลที่ไม่ยอมรับและข้อคัดค้านของคู่ความฝ่ายที่เกี่ยวข้องไว้ ส่วนเหตุผลที่คู่ความฝ่ายคัดค้านยกขึ้นอ้างนั้น ให้ศาลใช้ดุลพินิจจดลงไว้ในรายงานหรือกำหนดให้คู่ความฝ่ายนั้นยื่นคำแถลงต่อศาลเพื่อรวมไว้ในสำนวน"],"text":"ห้ามมิให้ยอมรับฟังพยานบุคคลใดเว้นแต่บุคคลนั้น\n\n(๑) สามารถเข้าใจและตอบคำถามได้ และ (๒) เป็นผู้ที่ได้เห็น ได้ยิน หรือทราบข้อความเกี่ยวในเรื่องที่จะให้การเป็นพยานนั้นมาด้วยตนเองโดยตรง แต่ความในข้อนี้ให้ใช้ได้ต่อเมื่อไม่มีบทบัญญัติแห่งกฎหมายโดยชัดแจ้ง หรือคำสั่งของศาลว่าให้เป็นอย่างอื่น ถ้าศาลไม่ยอมรับไว้ซึ่งคำเบิกความของบุคคลใด เพราะเห็นว่าบุคคลนั้นจะเป็นพยานหรือให้การดังกล่าวข้างต้นไม่ได้ และคู่ความที่ฝ่ายเกี่ยวข้องร้องคัดค้านก่อนที่ศาลจะดำเนินคดีต่อไป ให้ศาลจดรายงานระบุนามพยาน เหตุผลที่ไม่ยอมรับและข้อคัดค้านของคู่ความฝ่ายที่เกี่ยวข้องไว้ ส่วนเหตุผลที่คู่ความฝ่ายคัดค้านยกขึ้นอ้างนั้น ให้ศาลใช้ดุลพินิจจดลงไว้ในรายงานหรือกำหนดให้คู่ความฝ่ายนั้นยื่นคำแถลงต่อศาลเพื่อรวมไว้ในสำนวน"},{"id":"๙๕_๑","num":"มาตรา ๙๕/๑","num_ara":"๙๕/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ข้อความซึ่งเป็นการบอกเล่าที่พยานบุคคลใดนำมาเบิกความต่อศาลก็ดี หรือที่บันทึกไว้ในเอกสารหรือวัตถุอื่นใดซึ่งได้อ้างเป็นพยานหลักฐานต่อศาลก็ดี หากนำเสนอเพื่อพิสูจน์ความจริงแห่งข้อความนั้น ให้ถือเป็นพยานบอกเล่า ห้ามมิให้ศาลรับฟังพยานบอกเล่า เว้นแต่","(๑) ตามสภาพ ลักษณะ แหล่งที่มา และข้อเท็จจริงแวดล้อมของพยานบอกเล่านั้น น่าเชื่อว่าจะพิสูจน์ความจริงได้ หรือ (๒) มีเหตุจำเป็นเนื่องจากไม่สามารถนำบุคคลซึ่งเป็นผู้ที่ได้เห็น ได้ยิน หรือทราบข้อความเกี่ยวในเรื่องที่จะให้การเป็นพยานนั้นด้วยตนเองโดยตรงมาเป็นพยานได้ และมีเหตุผลสมควรเพื่อประโยชน์แห่งความยุติธรรมที่จะรับฟังพยานบอกเล่านั้น ในกรณีที่ศาลเห็นว่าไม่ควรรับไว้ซึ่งพยานบอกเล่าใด ให้นำความในมาตรา ๙๕ วรรคสอง มาใช้บังคับโดยอนุโลม"],"text":"ข้อความซึ่งเป็นการบอกเล่าที่พยานบุคคลใดนำมาเบิกความต่อศาลก็ดี หรือที่บันทึกไว้ในเอกสารหรือวัตถุอื่นใดซึ่งได้อ้างเป็นพยานหลักฐานต่อศาลก็ดี หากนำเสนอเพื่อพิสูจน์ความจริงแห่งข้อความนั้น ให้ถือเป็นพยานบอกเล่า ห้ามมิให้ศาลรับฟังพยานบอกเล่า เว้นแต่\n\n(๑) ตามสภาพ ลักษณะ แหล่งที่มา และข้อเท็จจริงแวดล้อมของพยานบอกเล่านั้น น่าเชื่อว่าจะพิสูจน์ความจริงได้ หรือ (๒) มีเหตุจำเป็นเนื่องจากไม่สามารถนำบุคคลซึ่งเป็นผู้ที่ได้เห็น ได้ยิน หรือทราบข้อความเกี่ยวในเรื่องที่จะให้การเป็นพยานนั้นด้วยตนเองโดยตรงมาเป็นพยานได้ และมีเหตุผลสมควรเพื่อประโยชน์แห่งความยุติธรรมที่จะรับฟังพยานบอกเล่านั้น ในกรณีที่ศาลเห็นว่าไม่ควรรับไว้ซึ่งพยานบอกเล่าใด ให้นำความในมาตรา ๙๕ วรรคสอง มาใช้บังคับโดยอนุโลม"},{"id":"๙๖","num":"มาตรา ๙๖","num_ara":"๙๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["พยานที่เป็นคนหูหนวก หรือเป็นใบ้หรือทั้งหูหนวกและเป็นใบ้นั้น อาจถูกถามหรือให้คำตอบโดยวิธีเขียนหนังสือ หรือโดยวิธีอื่นใดที่สมควรได้ และคำเบิกความของบุคคลนั้น ๆ ให้ถือว่าเป็นคำพยานบุคคลตามประมวลกฎหมายนี้"],"text":"พยานที่เป็นคนหูหนวก หรือเป็นใบ้หรือทั้งหูหนวกและเป็นใบ้นั้น อาจถูกถามหรือให้คำตอบโดยวิธีเขียนหนังสือ หรือโดยวิธีอื่นใดที่สมควรได้ และคำเบิกความของบุคคลนั้น ๆ ให้ถือว่าเป็นคำพยานบุคคลตามประมวลกฎหมายนี้"},{"id":"๙๗","num":"มาตรา ๙๗","num_ara":"๙๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["คู่ความฝ่ายหนึ่ง จะอ้างคู่ความอีกฝ่ายหนึ่งเป็นพยานของตนหรือจะอ้างตนเองเป็นพยานก็ได้"],"text":"คู่ความฝ่ายหนึ่ง จะอ้างคู่ความอีกฝ่ายหนึ่งเป็นพยานของตนหรือจะอ้างตนเองเป็นพยานก็ได้"},{"id":"๙๘","num":"มาตรา ๙๘","num_ara":"๙๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["คู่ความฝ่ายใดฝ่ายหนึ่งจะอ้างบุคคลใดเป็นพยานของตนก็ได้เมื่อบุคคลนั้นเป็นผู้มีความรู้เชี่ยวชาญในศิลปะ วิทยาศาสตร์ การฝีมือ การค้า หรือการงานที่ทำหรือในกฎหมายต่างประเทศ และซึ่งความเห็นของพยานอาจเป็นประโยชน์ในการวินิจฉัยชี้ขาดข้อความในประเด็น ทั้งนี้ ไม่ว่าพยานจะเป็นผู้มีอาชีพในการนั้นหรือไม่"],"text":"คู่ความฝ่ายใดฝ่ายหนึ่งจะอ้างบุคคลใดเป็นพยานของตนก็ได้เมื่อบุคคลนั้นเป็นผู้มีความรู้เชี่ยวชาญในศิลปะ วิทยาศาสตร์ การฝีมือ การค้า หรือการงานที่ทำหรือในกฎหมายต่างประเทศ และซึ่งความเห็นของพยานอาจเป็นประโยชน์ในการวินิจฉัยชี้ขาดข้อความในประเด็น ทั้งนี้ ไม่ว่าพยานจะเป็นผู้มีอาชีพในการนั้นหรือไม่"},{"id":"๙๙","num":"มาตรา ๙๙","num_ara":"๙๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ถ้าศาลเห็นว่า จำเป็นที่จะต้องตรวจบุคคล วัตถุ สถานที่หรือตั้งผู้เชี่ยวชาญตามที่บัญญัติไว้ในมาตรา ๑๒๙ และ ๑๓๐ เมื่อศาลเห็นสมควร ไม่ว่าการพิจารณาคดีจะอยู่ในชั้นใด หรือเมื่อมีคำขอของคู่ความฝ่ายใดภายใต้บังคับแห่งบทบัญญัติมาตรา ๘๗ และ ๘๘ ให้ศาลมีอำนาจออกคำสั่งกำหนดการตรวจหรือการแต่งตั้งผู้เชี่ยวชาญเช่นว่านั้นได้ บทบัญญัติแห่งมาตรานี้ไม่ตัดสิทธิของคู่ความในอันที่จะเรียกบุคคลผู้มีความรู้เชี่ยวชาญมาเป็นพยานฝ่ายตนได้"],"text":"ถ้าศาลเห็นว่า จำเป็นที่จะต้องตรวจบุคคล วัตถุ สถานที่หรือตั้งผู้เชี่ยวชาญตามที่บัญญัติไว้ในมาตรา ๑๒๙ และ ๑๓๐ เมื่อศาลเห็นสมควร ไม่ว่าการพิจารณาคดีจะอยู่ในชั้นใด หรือเมื่อมีคำขอของคู่ความฝ่ายใดภายใต้บังคับแห่งบทบัญญัติมาตรา ๘๗ และ ๘๘ ให้ศาลมีอำนาจออกคำสั่งกำหนดการตรวจหรือการแต่งตั้งผู้เชี่ยวชาญเช่นว่านั้นได้ บทบัญญัติแห่งมาตรานี้ไม่ตัดสิทธิของคู่ความในอันที่จะเรียกบุคคลผู้มีความรู้เชี่ยวชาญมาเป็นพยานฝ่ายตนได้"},{"id":"๑๐๐","num":"มาตรา ๑๐๐","num_ara":"๑๐๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["คู่ความฝ่ายใดฝ่ายหนึ่งซึ่งประสงค์จะอ้างอิงข้อเท็จจริงใดและขอให้คู่ความฝ่ายอื่นตอบว่าจะรับรองข้อเท็จจริงนั้นว่าถูกต้องหรือไม่ อาจส่งคำบอกกล่าวเป็นหนังสือแจ้งรายการข้อเท็จจริงนั้นไปให้คู่ความฝ่ายอื่นก่อนวันสืบพยานไม่น้อยกว่าเจ็ดวัน ถ้าคู่ความฝ่ายอื่นได้รับคำบอกกล่าวโดยชอบแล้ว เมื่อคู่ความฝ่ายที่ส่งคำบอกกล่าวร้องขอต่อศาลในวันสืบพยาน ให้ศาลสอบถามคู่ความฝ่ายอื่นว่าจะยอมรับข้อเท็จจริงตามที่ได้รับคำบอกกล่าวนั้นว่าถูกต้องหรือไม่ แล้วให้ศาลจดคำตอบไว้ในรายงานกระบวนพิจารณา ถ้าคู่ความฝ่ายนั้นไม่ตอบคำถามเกี่ยวกับข้อเท็จจริงใด หรือปฏิเสธข้อเท็จจริงใดโดยไม่มีเหตุแห่งการปฏิเสธโดยชัดแจ้ง ให้ถือว่ายอมรับข้อเท็จจริงนั้นแล้ว เว้นแต่ศาลจะเห็นว่าคู่ความฝ่ายนั้นไม่อยู่ในวิสัยที่จะตอบหรือแสดงเหตุแห่งการปฏิเสธโดยชัดแจ้งในขณะนั้น ศาลจะมีคำสั่งให้คู่ความฝ่ายนั้นทำคำแถลงเกี่ยวกับข้อเท็จจริงนั้นมายื่นต่อศาลภายในระยะเวลาที่ศาลเห็นสมควรก็ได้ บทบัญญัติแห่งมาตรานี้ให้ใช้บังคับแก่เรื่องเอกสารทั้งหมดหรือฉบับใดฉบับหนึ่งที่คู่ความแสดงความจำนงจะอ้างอิงด้วยโดยอนุโลม แต่ต้องส่งสำเนาเอกสารนั้นไปพร้อมกับคำบอกกล่าวและต้องมีต้นฉบับเอกสารนั้นให้คู่ความฝ่ายอื่นตรวจดูได้เมื่อต้องการ เว้นแต่ต้นฉบับเอกสารนั้นอยู่ในความครอบครองของคู่ความฝ่ายอื่นหรือของบุคคลภายนอก"],"text":"คู่ความฝ่ายใดฝ่ายหนึ่งซึ่งประสงค์จะอ้างอิงข้อเท็จจริงใดและขอให้คู่ความฝ่ายอื่นตอบว่าจะรับรองข้อเท็จจริงนั้นว่าถูกต้องหรือไม่ อาจส่งคำบอกกล่าวเป็นหนังสือแจ้งรายการข้อเท็จจริงนั้นไปให้คู่ความฝ่ายอื่นก่อนวันสืบพยานไม่น้อยกว่าเจ็ดวัน ถ้าคู่ความฝ่ายอื่นได้รับคำบอกกล่าวโดยชอบแล้ว เมื่อคู่ความฝ่ายที่ส่งคำบอกกล่าวร้องขอต่อศาลในวันสืบพยาน ให้ศาลสอบถามคู่ความฝ่ายอื่นว่าจะยอมรับข้อเท็จจริงตามที่ได้รับคำบอกกล่าวนั้นว่าถูกต้องหรือไม่ แล้วให้ศาลจดคำตอบไว้ในรายงานกระบวนพิจารณา ถ้าคู่ความฝ่ายนั้นไม่ตอบคำถามเกี่ยวกับข้อเท็จจริงใด หรือปฏิเสธข้อเท็จจริงใดโดยไม่มีเหตุแห่งการปฏิเสธโดยชัดแจ้ง ให้ถือว่ายอมรับข้อเท็จจริงนั้นแล้ว เว้นแต่ศาลจะเห็นว่าคู่ความฝ่ายนั้นไม่อยู่ในวิสัยที่จะตอบหรือแสดงเหตุแห่งการปฏิเสธโดยชัดแจ้งในขณะนั้น ศาลจะมีคำสั่งให้คู่ความฝ่ายนั้นทำคำแถลงเกี่ยวกับข้อเท็จจริงนั้นมายื่นต่อศาลภายในระยะเวลาที่ศาลเห็นสมควรก็ได้ บทบัญญัติแห่งมาตรานี้ให้ใช้บังคับแก่เรื่องเอกสารทั้งหมดหรือฉบับใดฉบับหนึ่งที่คู่ความแสดงความจำนงจะอ้างอิงด้วยโดยอนุโลม แต่ต้องส่งสำเนาเอกสารนั้นไปพร้อมกับคำบอกกล่าวและต้องมีต้นฉบับเอกสารนั้นให้คู่ความฝ่ายอื่นตรวจดูได้เมื่อต้องการ เว้นแต่ต้นฉบับเอกสารนั้นอยู่ในความครอบครองของคู่ความฝ่ายอื่นหรือของบุคคลภายนอก"},{"id":"๑๐๑","num":"มาตรา ๑๐๑","num_ara":"๑๐๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ถ้าบุคคลใดเกรงว่า พยานหลักฐานซึ่งตนอาจต้องอ้างอิงในภายหน้าจะสูญหายหรือยากแก่การนำมา หรือถ้าคู่ความฝ่ายใดในคดีเกรงว่าพยานหลักฐานซึ่งตนจำนงจะอ้างอิงจะสูญหายเสียก่อนที่จะนำมาสืบ หรือเป็นการยากที่จะนำมาสืบในภายหลัง บุคคลนั้นหรือคู่ความฝ่ายนั้นอาจยื่นคำขอต่อศาลโดยทำเป็นคำร้องขอหรือคำร้องให้ศาลมีคำสั่งให้สืบพยานหลักฐานนั้นไว้ทันที เมื่อศาลได้รับคำขอเช่นว่านั้น ให้ศาลหมายเรียกผู้ขอและคู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกที่เกี่ยวข้องมายังศาล และเมื่อได้ฟังบุคคลเหล่านั้นแล้ว ให้ศาลสั่งคำขอตามที่เห็นสมควร ถ้าศาลสั่งอนุญาตตามคำขอแล้ว ให้สืบพยานไปตามที่บัญญัติไว้ในประมวลกฎหมายนี้ ส่วนรายงานและเอกสารอื่นๆ ที่เกี่ยวข้องกับการนั้นให้ศาลเก็บรักษาไว้ ในกรณีที่คู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกที่เกี่ยวข้องไม่มีภูมิลำเนาอยู่ในราชอาณาจักรและยังมิได้เข้ามาในคดีนั้น เมื่อศาลได้รับคำขอตามวรรคหนึ่ง ให้ศาลสั่งคำขอนั้นอย่างคำขออันอาจทำได้แต่ฝ่ายเดียว ถ้าศาลสั่งอนุญาตตามคำขอแล้วให้สืบพยานไปฝ่ายเดียว"],"text":"ถ้าบุคคลใดเกรงว่า พยานหลักฐานซึ่งตนอาจต้องอ้างอิงในภายหน้าจะสูญหายหรือยากแก่การนำมา หรือถ้าคู่ความฝ่ายใดในคดีเกรงว่าพยานหลักฐานซึ่งตนจำนงจะอ้างอิงจะสูญหายเสียก่อนที่จะนำมาสืบ หรือเป็นการยากที่จะนำมาสืบในภายหลัง บุคคลนั้นหรือคู่ความฝ่ายนั้นอาจยื่นคำขอต่อศาลโดยทำเป็นคำร้องขอหรือคำร้องให้ศาลมีคำสั่งให้สืบพยานหลักฐานนั้นไว้ทันที เมื่อศาลได้รับคำขอเช่นว่านั้น ให้ศาลหมายเรียกผู้ขอและคู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกที่เกี่ยวข้องมายังศาล และเมื่อได้ฟังบุคคลเหล่านั้นแล้ว ให้ศาลสั่งคำขอตามที่เห็นสมควร ถ้าศาลสั่งอนุญาตตามคำขอแล้ว ให้สืบพยานไปตามที่บัญญัติไว้ในประมวลกฎหมายนี้ ส่วนรายงานและเอกสารอื่นๆ ที่เกี่ยวข้องกับการนั้นให้ศาลเก็บรักษาไว้ ในกรณีที่คู่ความอีกฝ่ายหนึ่งหรือบุคคลภายนอกที่เกี่ยวข้องไม่มีภูมิลำเนาอยู่ในราชอาณาจักรและยังมิได้เข้ามาในคดีนั้น เมื่อศาลได้รับคำขอตามวรรคหนึ่ง ให้ศาลสั่งคำขอนั้นอย่างคำขออันอาจทำได้แต่ฝ่ายเดียว ถ้าศาลสั่งอนุญาตตามคำขอแล้วให้สืบพยานไปฝ่ายเดียว"},{"id":"๑๐๑_๑","num":"มาตรา ๑๐๑/๑","num_ara":"๑๐๑/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ในกรณีที่มีเหตุฉุกเฉินซึ่งจำเป็นต้องสืบพยานหลักฐานใดเป็นการเร่งด่วนและไม่สามารถแจ้งให้คู่ความฝ่ายอื่นทราบก่อนได้ เมื่อมีการยื่นคำขอตามมาตรา ๑๐๑ พร้อมกับคำฟ้องหรือคำให้การหรือภายหลังจากนั้น คู่ความฝ่ายที่ขอจะยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องรวมไปด้วย เพื่อให้ศาลมีคำสั่งโดยไม่ชักช้าก็ได้ และถ้าจำเป็นจะขอให้ศาลมีคำสั่งให้ยึดหรือให้ส่งต่อศาลซึ่งเอกสารหรือวัตถุที่จะใช้เป็นพยานหลักฐานที่ขอสืบไว้ก่อนด้วยก็ได้ คำร้องตามวรรคหนึ่งต้องบรรยายถึงข้อเท็จจริงที่แสดงว่ามีเหตุฉุกเฉินซึ่งจำเป็นต้องสืบพยานหลักฐานใดโดยเร่งด่วนและไม่สามารถแจ้งให้คู่ความฝ่ายอื่นทราบก่อนได้ รวมทั้งความเสียหายที่จะเกิดขึ้นจากการที่มิได้มีการสืบพยานหลักฐานดังกล่าว ส่วนในกรณีที่จะขอให้ศาลมีคำสั่งให้ยึดหรือให้ส่งต่อศาลซึ่งเอกสารหรือวัตถุที่จะใช้เป็นพยานหลักฐาน คำร้องนั้นต้องบรรยายถึงข้อเท็จจริงที่แสดงถึงความจำเป็นที่จะต้องยึดหรือให้ส่งเอกสารหรือวัตถุนั้นว่ามีอยู่อย่างไร ในการนี้ ห้ามมิให้ศาลอนุญาตตามคำร้องนั้น เว้นแต่จะเป็นที่พอใจของศาลจากการไต่สวนว่ามีเหตุฉุกเฉินและมีความจำเป็นตามคำร้องนั้นจริง แต่ทั้งนี้ ไม่ตัดสิทธิคู่ความฝ่ายอื่นที่จะขอให้ศาลออกหมายเรียกพยานดังกล่าวมาศาล เพื่อถามค้านและดำเนินการตามมาตรา ๑๑๗ ในภายหลัง หากไม่อาจดำเนินการดังกล่าวได้ ศาลต้องใช้ความระมัดระวังในการชั่งน้ำหนักพยานหลักฐาน"],"text":"ในกรณีที่มีเหตุฉุกเฉินซึ่งจำเป็นต้องสืบพยานหลักฐานใดเป็นการเร่งด่วนและไม่สามารถแจ้งให้คู่ความฝ่ายอื่นทราบก่อนได้ เมื่อมีการยื่นคำขอตามมาตรา ๑๐๑ พร้อมกับคำฟ้องหรือคำให้การหรือภายหลังจากนั้น คู่ความฝ่ายที่ขอจะยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องรวมไปด้วย เพื่อให้ศาลมีคำสั่งโดยไม่ชักช้าก็ได้ และถ้าจำเป็นจะขอให้ศาลมีคำสั่งให้ยึดหรือให้ส่งต่อศาลซึ่งเอกสารหรือวัตถุที่จะใช้เป็นพยานหลักฐานที่ขอสืบไว้ก่อนด้วยก็ได้ คำร้องตามวรรคหนึ่งต้องบรรยายถึงข้อเท็จจริงที่แสดงว่ามีเหตุฉุกเฉินซึ่งจำเป็นต้องสืบพยานหลักฐานใดโดยเร่งด่วนและไม่สามารถแจ้งให้คู่ความฝ่ายอื่นทราบก่อนได้ รวมทั้งความเสียหายที่จะเกิดขึ้นจากการที่มิได้มีการสืบพยานหลักฐานดังกล่าว ส่วนในกรณีที่จะขอให้ศาลมีคำสั่งให้ยึดหรือให้ส่งต่อศาลซึ่งเอกสารหรือวัตถุที่จะใช้เป็นพยานหลักฐาน คำร้องนั้นต้องบรรยายถึงข้อเท็จจริงที่แสดงถึงความจำเป็นที่จะต้องยึดหรือให้ส่งเอกสารหรือวัตถุนั้นว่ามีอยู่อย่างไร ในการนี้ ห้ามมิให้ศาลอนุญาตตามคำร้องนั้น เว้นแต่จะเป็นที่พอใจของศาลจากการไต่สวนว่ามีเหตุฉุกเฉินและมีความจำเป็นตามคำร้องนั้นจริง แต่ทั้งนี้ ไม่ตัดสิทธิคู่ความฝ่ายอื่นที่จะขอให้ศาลออกหมายเรียกพยานดังกล่าวมาศาล เพื่อถามค้านและดำเนินการตามมาตรา ๑๑๗ ในภายหลัง หากไม่อาจดำเนินการดังกล่าวได้ ศาลต้องใช้ความระมัดระวังในการชั่งน้ำหนักพยานหลักฐาน"},{"id":"๑๐๑_๒","num":"มาตรา ๑๐๑/๒","num_ara":"๑๐๑/๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ในกรณีที่ศาลมีคำสั่งอนุญาตตามคำขอให้ยึดหรือให้ส่งเอกสารหรือวัตถุที่จะใช้เป็นพยานหลักฐาน ศาลอาจกำหนดเงื่อนไขอย่างใดตามที่เห็นสมควร และจะสั่งด้วยว่าให้ผู้ขอนำเงินหรือหาประกันตามจำนวนที่เห็นสมควรมาวางศาลเพื่อการชำระค่าสินไหมทดแทนสำหรับความเสียหายที่อาจเกิดขึ้นแก่บุคคลใด เนื่องจากศาลได้มีคำสั่งโดยมีความเห็นหลงไปว่ามีเหตุจำเป็นโดยความผิดหรือเลินเล่อของผู้ขอก็ได้ ให้นำความในมาตรา ๒๖๑ มาตรา ๒๖๒ มาตรา ๒๖๓ มาตรา ๒๖๗ มาตรา ๒๖๘ และมาตรา ๒๖๙ มาใช้บังคับแก่กรณีตามวรรคหนึ่งโดยอนุโลม และในกรณีที่ทรัพย์ซึ่งศาลสั่งยึดนั้นเป็นของบุคคลที่สาม ให้บุคคลที่สามมีสิทธิเสมือนเป็นจำเลยในคดี และเมื่อหมดความจำเป็นที่จะใช้เอกสารหรือวัตถุนั้นเป็นพยานหลักฐานต่อไปแล้ว เมื่อศาลเห็นสมควรหรือเมื่อผู้มีสิทธิจะได้รับคืนร้องขอให้ศาลมีคำสั่งคืนเอกสารหรือวัตถุนั้นแก่ผู้ขอ"],"text":"ในกรณีที่ศาลมีคำสั่งอนุญาตตามคำขอให้ยึดหรือให้ส่งเอกสารหรือวัตถุที่จะใช้เป็นพยานหลักฐาน ศาลอาจกำหนดเงื่อนไขอย่างใดตามที่เห็นสมควร และจะสั่งด้วยว่าให้ผู้ขอนำเงินหรือหาประกันตามจำนวนที่เห็นสมควรมาวางศาลเพื่อการชำระค่าสินไหมทดแทนสำหรับความเสียหายที่อาจเกิดขึ้นแก่บุคคลใด เนื่องจากศาลได้มีคำสั่งโดยมีความเห็นหลงไปว่ามีเหตุจำเป็นโดยความผิดหรือเลินเล่อของผู้ขอก็ได้ ให้นำความในมาตรา ๒๖๑ มาตรา ๒๖๒ มาตรา ๒๖๓ มาตรา ๒๖๗ มาตรา ๒๖๘ และมาตรา ๒๖๙ มาใช้บังคับแก่กรณีตามวรรคหนึ่งโดยอนุโลม และในกรณีที่ทรัพย์ซึ่งศาลสั่งยึดนั้นเป็นของบุคคลที่สาม ให้บุคคลที่สามมีสิทธิเสมือนเป็นจำเลยในคดี และเมื่อหมดความจำเป็นที่จะใช้เอกสารหรือวัตถุนั้นเป็นพยานหลักฐานต่อไปแล้ว เมื่อศาลเห็นสมควรหรือเมื่อผู้มีสิทธิจะได้รับคืนร้องขอให้ศาลมีคำสั่งคืนเอกสารหรือวัตถุนั้นแก่ผู้ขอ"},{"id":"๑๐๒","num":"มาตรา ๑๐๒","num_ara":"๑๐๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ให้ศาลที่พิจารณาคดีเป็นผู้สืบพยานหลักฐาน โดยจะสืบในศาลหรือนอกศาล ณ ที่ใด ๆ ก็ได้ แล้วแต่ศาลจะสั่งตามที่เห็นสมควรตามความจำเป็นแห่งสภาพของพยานหลักฐานนั้น แต่ถ้าศาลที่พิจารณาคดีเห็นเป็นการจำเป็น ให้มีอำนาจมอบให้ผู้พิพากษาคนใดคนหนึ่งในศาลนั้น หรือตั้งให้ศาลอื่นสืบพยานหลักฐานแทนได้ ให้ผู้พิพากษาที่รับมอบหรือศาลที่ได้รับแต่งตั้งนั้นมีอำนาจและหน้าที่เช่นเดียวกับศาลที่พิจารณาคดีรวมทั้งอำนาจที่จะมอบให้ผู้พิพากษาคนใดคนหนึ่งในศาลนั้นหรือตั้งศาลอื่นให้ทำการสืบพยานหลักฐานแทนต่อไปด้วย ถ้าศาลที่พิจารณาคดีได้แต่งตั้งให้ศาลอื่นสืบพยานแทน คู่ความฝ่ายใดฝ่ายหนึ่ง จะแถลงต่อศาลที่พิจารณาคดีว่า ตนมีความจำนงจะไปฟังการพิจารณาก็ได้ ในกรณีเช่นนี้ให้ศาลที่ได้รับแต่งตั้งแจ้งวันกำหนดสืบพยานหลักฐานให้ผู้ขอทราบล่วงหน้าอย่างน้อยไม่ต่ำกว่าเจ็ดวัน คู่ความที่ไปฟังการพิจารณานั้นชอบที่จะใช้สิทธิได้เสมือนหนึ่งว่ากระบวนพิจารณานั้นได้ดำเนินในศาลที่พิจารณาคดี ให้ส่งสำเนาคำฟ้องและคำให้การพร้อมด้วยเอกสารและหลักฐานอื่น ๆ อันจำเป็นเพื่อสืบพยานหลักฐานไปยังศาลที่ได้รับแต่งตั้งดังกล่าวแล้ว ถ้าคู่ความฝ่ายที่อ้างอิงพยานหลักฐานนั้นมิได้แถลงความจำนงที่จะไปฟังการพิจารณา ก็ให้แจ้งไปให้ศาลที่ได้รับแต่งตั้งทราบข้อประเด็นที่จะสืบ เมื่อได้สืบพยานหลักฐานเสร็จแล้ว ให้เป็นหน้าที่ของศาลที่รับแต่งตั้งจะต้องส่งรายงานที่จำเป็นและเอกสารอื่น ๆ ทั้งหมดอันเกี่ยวข้องในการสืบพยานหลักฐานไปยังศาลที่พิจารณาคดี"],"text":"ให้ศาลที่พิจารณาคดีเป็นผู้สืบพยานหลักฐาน โดยจะสืบในศาลหรือนอกศาล ณ ที่ใด ๆ ก็ได้ แล้วแต่ศาลจะสั่งตามที่เห็นสมควรตามความจำเป็นแห่งสภาพของพยานหลักฐานนั้น แต่ถ้าศาลที่พิจารณาคดีเห็นเป็นการจำเป็น ให้มีอำนาจมอบให้ผู้พิพากษาคนใดคนหนึ่งในศาลนั้น หรือตั้งให้ศาลอื่นสืบพยานหลักฐานแทนได้ ให้ผู้พิพากษาที่รับมอบหรือศาลที่ได้รับแต่งตั้งนั้นมีอำนาจและหน้าที่เช่นเดียวกับศาลที่พิจารณาคดีรวมทั้งอำนาจที่จะมอบให้ผู้พิพากษาคนใดคนหนึ่งในศาลนั้นหรือตั้งศาลอื่นให้ทำการสืบพยานหลักฐานแทนต่อไปด้วย ถ้าศาลที่พิจารณาคดีได้แต่งตั้งให้ศาลอื่นสืบพยานแทน คู่ความฝ่ายใดฝ่ายหนึ่ง จะแถลงต่อศาลที่พิจารณาคดีว่า ตนมีความจำนงจะไปฟังการพิจารณาก็ได้ ในกรณีเช่นนี้ให้ศาลที่ได้รับแต่งตั้งแจ้งวันกำหนดสืบพยานหลักฐานให้ผู้ขอทราบล่วงหน้าอย่างน้อยไม่ต่ำกว่าเจ็ดวัน คู่ความที่ไปฟังการพิจารณานั้นชอบที่จะใช้สิทธิได้เสมือนหนึ่งว่ากระบวนพิจารณานั้นได้ดำเนินในศาลที่พิจารณาคดี ให้ส่งสำเนาคำฟ้องและคำให้การพร้อมด้วยเอกสารและหลักฐานอื่น ๆ อันจำเป็นเพื่อสืบพยานหลักฐานไปยังศาลที่ได้รับแต่งตั้งดังกล่าวแล้ว ถ้าคู่ความฝ่ายที่อ้างอิงพยานหลักฐานนั้นมิได้แถลงความจำนงที่จะไปฟังการพิจารณา ก็ให้แจ้งไปให้ศาลที่ได้รับแต่งตั้งทราบข้อประเด็นที่จะสืบ เมื่อได้สืบพยานหลักฐานเสร็จแล้ว ให้เป็นหน้าที่ของศาลที่รับแต่งตั้งจะต้องส่งรายงานที่จำเป็นและเอกสารอื่น ๆ ทั้งหมดอันเกี่ยวข้องในการสืบพยานหลักฐานไปยังศาลที่พิจารณาคดี"},{"id":"๑๐๓","num":"มาตรา ๑๐๓","num_ara":"๑๐๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ภายใต้บังคับบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการขาดนัด การร้องสอด และการขับไล่ออกนอกศาล ห้ามมิให้ศาลที่พิจารณาคดี หรือผู้พิพากษาที่รับมอบหมาย หรือศาลที่ได้รับแต่งตั้งดังกล่าวข้างต้นทำการสืบพยานหลักฐานใด โดยมิได้ให้โอกาสเต็มที่แก่คู่ความทุกฝ่ายในอันที่จะมาฟังการพิจารณา และใช้สิทธิเกี่ยวด้วยกระบวนการพิจารณาเช่นว่านั้น ตามที่บัญญัติไว้ในประมวลกฎหมายนี้ ไม่ว่าพยานหลักฐานนั้นคู่ความฝ่ายใดจะเป็นผู้อ้างอิง หรือศาลเป็นผู้สั่งให้สืบ"],"text":"ภายใต้บังคับบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการขาดนัด การร้องสอด และการขับไล่ออกนอกศาล ห้ามมิให้ศาลที่พิจารณาคดี หรือผู้พิพากษาที่รับมอบหมาย หรือศาลที่ได้รับแต่งตั้งดังกล่าวข้างต้นทำการสืบพยานหลักฐานใด โดยมิได้ให้โอกาสเต็มที่แก่คู่ความทุกฝ่ายในอันที่จะมาฟังการพิจารณา และใช้สิทธิเกี่ยวด้วยกระบวนการพิจารณาเช่นว่านั้น ตามที่บัญญัติไว้ในประมวลกฎหมายนี้ ไม่ว่าพยานหลักฐานนั้นคู่ความฝ่ายใดจะเป็นผู้อ้างอิง หรือศาลเป็นผู้สั่งให้สืบ"},{"id":"๑๐๓_๑","num":"มาตรา ๑๐๓/๑","num_ara":"๑๐๓/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ในกรณีที่คู่ความตกลงกัน และศาลเห็นเป็นการจำเป็นและสมควร ศาลอาจแต่งตั้งเจ้าพนักงานศาลหรือเจ้าพนักงานอื่นซึ่งคู่ความเห็นชอบให้ทำการสืบพยานหลักฐานส่วนใดส่วนหนึ่งที่จะต้องกระทำนอกศาลแทนได้ ให้เจ้าพนักงานผู้ปฏิบัติหน้าที่ตามวรรคหนึ่งเป็นเจ้าพนักงานตามประมวลกฎหมายอาญา และให้นำความในมาตรา ๑๐๓ มาใช้บังคับโดยอนุโลม"],"text":"ในกรณีที่คู่ความตกลงกัน และศาลเห็นเป็นการจำเป็นและสมควร ศาลอาจแต่งตั้งเจ้าพนักงานศาลหรือเจ้าพนักงานอื่นซึ่งคู่ความเห็นชอบให้ทำการสืบพยานหลักฐานส่วนใดส่วนหนึ่งที่จะต้องกระทำนอกศาลแทนได้ ให้เจ้าพนักงานผู้ปฏิบัติหน้าที่ตามวรรคหนึ่งเป็นเจ้าพนักงานตามประมวลกฎหมายอาญา และให้นำความในมาตรา ๑๐๓ มาใช้บังคับโดยอนุโลม"},{"id":"๑๐๓_๒","num":"มาตรา ๑๐๓/๒","num_ara":"๑๐๓/๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["คู่ความฝ่ายที่เกี่ยวข้องอาจร้องขอต่อศาลให้ดำเนินการสืบพยานหลักฐานไปตามวิธีการที่คู่ความตกลงกัน ถ้าศาลเห็นสมควรเพื่อให้การสืบพยานหลักฐานเป็นไปโดยสะดวกรวดเร็ว และเที่ยงธรรม ศาลจะอนุญาตตามคำร้องขอนั้นก็ได้ เว้นแต่การสืบพยานหลักฐานนั้นจะเป็นการไม่ชอบด้วยกฎหมายหรือขัดต่อความสงบเรียบร้อยหรือศีลธรรมอันดีของประชาชน"],"text":"คู่ความฝ่ายที่เกี่ยวข้องอาจร้องขอต่อศาลให้ดำเนินการสืบพยานหลักฐานไปตามวิธีการที่คู่ความตกลงกัน ถ้าศาลเห็นสมควรเพื่อให้การสืบพยานหลักฐานเป็นไปโดยสะดวกรวดเร็ว และเที่ยงธรรม ศาลจะอนุญาตตามคำร้องขอนั้นก็ได้ เว้นแต่การสืบพยานหลักฐานนั้นจะเป็นการไม่ชอบด้วยกฎหมายหรือขัดต่อความสงบเรียบร้อยหรือศีลธรรมอันดีของประชาชน"},{"id":"๑๐๓_๓","num":"มาตรา ๑๐๓/๓","num_ara":"๑๐๓/๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["เพื่อให้การสืบพยานหลักฐานเป็นไปโดยสะดวก รวดเร็ว และเที่ยงธรรม ประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ของศาลฎีกามีอำนาจออกข้อกำหนดใด ๆ เพิ่มเติมเกี่ยวกับแนวทางการนำสืบพยานหลักฐานได้ แต่ต้องไม่ขัดหรือแย้งกับบทบัญญัติในกฎหมาย ข้อกำหนดของประธานศาลฎีกาตามวรรคหนึ่ง เมื่อประกาศในราชกิจจานุเบกษาแล้ว ให้ใช้บังคับได้"],"text":"เพื่อให้การสืบพยานหลักฐานเป็นไปโดยสะดวก รวดเร็ว และเที่ยงธรรม ประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ของศาลฎีกามีอำนาจออกข้อกำหนดใด ๆ เพิ่มเติมเกี่ยวกับแนวทางการนำสืบพยานหลักฐานได้ แต่ต้องไม่ขัดหรือแย้งกับบทบัญญัติในกฎหมาย ข้อกำหนดของประธานศาลฎีกาตามวรรคหนึ่ง เมื่อประกาศในราชกิจจานุเบกษาแล้ว ให้ใช้บังคับได้"},{"id":"๑๐๔","num":"มาตรา ๑๐๔","num_ara":"๑๐๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ให้ศาลมีอำนาจเต็มที่ในอันที่จะวินิจฉัยว่าพยานหลักฐานที่คู่ความนำมาสืบนั้นจะเกี่ยวกับประเด็นและเป็นอันเพียงพอ ให้เชื่อฟังเป็นยุติได้หรือไม่ แล้วพิพากษาคดีไปตามนั้น ในการวินิจฉัยว่าพยานบอกเล่าตามมาตรา ๙๕/๑ หรือบันทึกถ้อยคำที่ผู้ให้ถ้อยคำมิได้มาศาลตามมาตรา ๑๒๐/๑ วรรคสามและวรรคสี่ หรือบันทึกถ้อยคำตามมาตรา ๑๒๐/๒ จะมีน้ำหนักให้เชื่อได้หรือไม่เพียงใดนั้น ศาลจะต้องกระทำด้วยความระมัดระวังโดยคำนึงถึงสภาพ ลักษณะ และแหล่งที่มาของพยานบอกเล่าหรือบันทึกถ้อยคำนั้นด้วย"],"text":"ให้ศาลมีอำนาจเต็มที่ในอันที่จะวินิจฉัยว่าพยานหลักฐานที่คู่ความนำมาสืบนั้นจะเกี่ยวกับประเด็นและเป็นอันเพียงพอ ให้เชื่อฟังเป็นยุติได้หรือไม่ แล้วพิพากษาคดีไปตามนั้น ในการวินิจฉัยว่าพยานบอกเล่าตามมาตรา ๙๕/๑ หรือบันทึกถ้อยคำที่ผู้ให้ถ้อยคำมิได้มาศาลตามมาตรา ๑๒๐/๑ วรรคสามและวรรคสี่ หรือบันทึกถ้อยคำตามมาตรา ๑๒๐/๒ จะมีน้ำหนักให้เชื่อได้หรือไม่เพียงใดนั้น ศาลจะต้องกระทำด้วยความระมัดระวังโดยคำนึงถึงสภาพ ลักษณะ และแหล่งที่มาของพยานบอกเล่าหรือบันทึกถ้อยคำนั้นด้วย"},{"id":"๑๐๕","num":"มาตรา ๑๐๕","num_ara":"๑๐๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["คู่ความฝ่ายใดไม่ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายนี้ ว่าด้วยพยานหลักฐาน กระทำให้คู่ความอีกฝ่ายหนึ่งต้องเสียค่าฤชาธรรมเนียม หรือค่าธรรมเนียมเกินกว่าที่ควรเสีย ค่าฤชาธรรมเนียมที่เพิ่มขึ้นนั้นให้ถือว่าเป็นค่าฤชาธรรมเนียมอันไม่จำเป็นตามความหมายแห่งมาตรา ๑๖๖ และให้คู่ความฝ่ายที่ก่อให้เกิดขึ้นนั้นเป็นผู้ออกใช้ให้"],"text":"คู่ความฝ่ายใดไม่ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายนี้ ว่าด้วยพยานหลักฐาน กระทำให้คู่ความอีกฝ่ายหนึ่งต้องเสียค่าฤชาธรรมเนียม หรือค่าธรรมเนียมเกินกว่าที่ควรเสีย ค่าฤชาธรรมเนียมที่เพิ่มขึ้นนั้นให้ถือว่าเป็นค่าฤชาธรรมเนียมอันไม่จำเป็นตามความหมายแห่งมาตรา ๑๖๖ และให้คู่ความฝ่ายที่ก่อให้เกิดขึ้นนั้นเป็นผู้ออกใช้ให้"},{"id":"๑๐๖","num":"มาตรา ๑๐๖","num_ara":"๑๐๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["ในกรณีที่คู่ความฝ่ายใดไม่สามารถนำพยานของตนมาศาลได้เอง คู่ความฝ่ายนั้นอาจขอต่อศาลก่อนวันสืบพยานให้ออกหมายเรียกพยานนั้นมาศาลได้ โดยศาลอาจให้คู่ความฝ่ายนั้นแถลงถึงความเกี่ยวพันของพยานกับข้อเท็จจริงในคดีอันจำเป็นที่จะต้องออกหมายเรียกพยานดังกล่าวด้วย และต้องส่งหมายเรียกพร้อมสำเนาคำแถลงของผู้ขอให้พยานรู้ล่วงหน้าอย่างน้อยสามวัน หมายเรียกพยานต้องมีข้อความดังนี้","(๑) ชื่อและตำบลที่อยู่ของพยาน ชื่อคู่ความ ศาล และทนายความฝ่ายผู้ขอ (๒) สถานที่และวันเวลาซึ่งพยานจะต้องไป (๓) กำหนดโทษที่จะต้องรับในกรณีที่ไม่ไปตามหมายเรียกหรือเบิกความเท็จ ถ้าศาลเห็นว่าพยานจะไม่สามารถเบิกความได้โดยมิได้ตระเตรียม ศาลจะจดแจ้งข้อเท็จจริงซึ่งพยานอาจถูกซักถามลงไว้ในหมายเรียกด้วยก็ได้"],"text":"ในกรณีที่คู่ความฝ่ายใดไม่สามารถนำพยานของตนมาศาลได้เอง คู่ความฝ่ายนั้นอาจขอต่อศาลก่อนวันสืบพยานให้ออกหมายเรียกพยานนั้นมาศาลได้ โดยศาลอาจให้คู่ความฝ่ายนั้นแถลงถึงความเกี่ยวพันของพยานกับข้อเท็จจริงในคดีอันจำเป็นที่จะต้องออกหมายเรียกพยานดังกล่าวด้วย และต้องส่งหมายเรียกพร้อมสำเนาคำแถลงของผู้ขอให้พยานรู้ล่วงหน้าอย่างน้อยสามวัน หมายเรียกพยานต้องมีข้อความดังนี้\n\n(๑) ชื่อและตำบลที่อยู่ของพยาน ชื่อคู่ความ ศาล และทนายความฝ่ายผู้ขอ (๒) สถานที่และวันเวลาซึ่งพยานจะต้องไป (๓) กำหนดโทษที่จะต้องรับในกรณีที่ไม่ไปตามหมายเรียกหรือเบิกความเท็จ ถ้าศาลเห็นว่าพยานจะไม่สามารถเบิกความได้โดยมิได้ตระเตรียม ศาลจะจดแจ้งข้อเท็จจริงซึ่งพยานอาจถูกซักถามลงไว้ในหมายเรียกด้วยก็ได้"},{"id":"๑๐๖_๑","num":"มาตรา ๑๐๖/๑","num_ara":"๑๐๖/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["ห้ามมิให้ออกหมายเรียกพยานดังต่อไปนี้","(๑) พระมหากษัตริย์ พระราชินี พระรัชทายาท หรือผู้สำเร็จราชการแทนพระองค์ไม่ว่าในกรณีใด ๆ (๒) พระภิกษุและสามเณรในพุทธศาสนา ไม่ว่าในกรณีใด ๆ (๓) ผู้ที่ได้รับเอกสิทธิ์หรือความคุ้มกันตามกฎหมาย ในกรณีตาม (๒) และ (๓) ให้ศาลหรือผู้พิพากษาที่รับมอบ หรือศาลที่ได้รับแต่งตั้งออกคำบอกกล่าวว่าจะสืบพยานนั้น ณ สถานที่และวันเวลาใดแทนการออกหมายเรียก โดยในกรณีตาม (๒) ให้ส่งไปยังพยาน ส่วนตาม (๓) ให้ส่งคำบอกกล่าวไปยังสำนักงานศาลยุติธรรมเพื่อดำเนินการตามบทบัญญัติว่าด้วยการนั้น หรือตามหลักกฎหมายระหว่างประเทศ"],"text":"ห้ามมิให้ออกหมายเรียกพยานดังต่อไปนี้\n\n(๑) พระมหากษัตริย์ พระราชินี พระรัชทายาท หรือผู้สำเร็จราชการแทนพระองค์ไม่ว่าในกรณีใด ๆ (๒) พระภิกษุและสามเณรในพุทธศาสนา ไม่ว่าในกรณีใด ๆ (๓) ผู้ที่ได้รับเอกสิทธิ์หรือความคุ้มกันตามกฎหมาย ในกรณีตาม (๒) และ (๓) ให้ศาลหรือผู้พิพากษาที่รับมอบ หรือศาลที่ได้รับแต่งตั้งออกคำบอกกล่าวว่าจะสืบพยานนั้น ณ สถานที่และวันเวลาใดแทนการออกหมายเรียก โดยในกรณีตาม (๒) ให้ส่งไปยังพยาน ส่วนตาม (๓) ให้ส่งคำบอกกล่าวไปยังสำนักงานศาลยุติธรรมเพื่อดำเนินการตามบทบัญญัติว่าด้วยการนั้น หรือตามหลักกฎหมายระหว่างประเทศ"},{"id":"๑๐๗","num":"มาตรา ๑๐๗","num_ara":"๑๐๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["ถ้าศาลเห็นว่าในการสืบสวนหาความจริงจำเป็นต้องไปสืบพยาน ณ สถานที่ซึ่งข้อเท็จจริงอันประสงค์จะให้พยานเบิกความนั้นได้เกิดขึ้น ให้ศาลหรือผู้พิพากษาที่รับมอบ หรือศาลที่ได้รับแต่งตั้งเพื่อการนั้นส่งหมายเรียกไปยังพยานระบุสถานที่และวันเวลาที่จะไปสืบพยาน แล้วสืบพยานไปตามนั้น"],"text":"ถ้าศาลเห็นว่าในการสืบสวนหาความจริงจำเป็นต้องไปสืบพยาน ณ สถานที่ซึ่งข้อเท็จจริงอันประสงค์จะให้พยานเบิกความนั้นได้เกิดขึ้น ให้ศาลหรือผู้พิพากษาที่รับมอบ หรือศาลที่ได้รับแต่งตั้งเพื่อการนั้นส่งหมายเรียกไปยังพยานระบุสถานที่และวันเวลาที่จะไปสืบพยาน แล้วสืบพยานไปตามนั้น"},{"id":"๑๐๘","num":"มาตรา ๑๐๘","num_ara":"๑๐๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["พยานที่ได้รับหมายเรียกโดยชอบดังที่บัญญัติไว้ในมาตรา ๑๐๖ และมาตรา ๑๐๗ นั้น จำต้องไป ณ สถานที่และตามวันเวลาที่กำหนดไว้ เว้นแต่มีเหตุเจ็บป่วยหรือมีข้อแก้ตัวอันจำเป็นอย่างอื่นโดยได้แจ้งเหตุนั้นให้ศาลทราบแล้ว และศาลเห็นว่าข้ออ้างหรือข้อแก้ตัวนั้นฟังได้"],"text":"พยานที่ได้รับหมายเรียกโดยชอบดังที่บัญญัติไว้ในมาตรา ๑๐๖ และมาตรา ๑๐๗ นั้น จำต้องไป ณ สถานที่และตามวันเวลาที่กำหนดไว้ เว้นแต่มีเหตุเจ็บป่วยหรือมีข้อแก้ตัวอันจำเป็นอย่างอื่นโดยได้แจ้งเหตุนั้นให้ศาลทราบแล้ว และศาลเห็นว่าข้ออ้างหรือข้อแก้ตัวนั้นฟังได้"},{"id":"๑๐๙","num":"มาตรา ๑๐๙","num_ara":"๑๐๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["เมื่อพยานคนใดได้เบิกความแล้ว ไม่ว่าพยานนั้นจะได้รับหมายเรียก หรือคู่ความนำมาเองก็ดี พยานนั้นย่อมหมดหน้าที่ ๆ จะอยู่ที่ศาลอีกต่อไป เว้นแต่ศาลจะได้สั่งให้พยานนั้นรอคอยอยู่ตามระยะเวลาที่ศาลจะกำหนดไว้"],"text":"เมื่อพยานคนใดได้เบิกความแล้ว ไม่ว่าพยานนั้นจะได้รับหมายเรียก หรือคู่ความนำมาเองก็ดี พยานนั้นย่อมหมดหน้าที่ ๆ จะอยู่ที่ศาลอีกต่อไป เว้นแต่ศาลจะได้สั่งให้พยานนั้นรอคอยอยู่ตามระยะเวลาที่ศาลจะกำหนดไว้"},{"id":"๑๑๐","num":"มาตรา ๑๑๐","num_ara":"๑๑๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["ถ้าพยานคนใดที่คู่ความได้บอกกล่าวความจำนงจะอ้างอิงคำเบิกความของพยานโดยชอบแล้ว ไม่ไปศาลในวันกำหนดนัดสืบพยานนั้น ศาลชอบที่จะดำเนินการพิจารณาต่อไป และชี้ขาดตัดสินคดีโดยไม่ต้องสืบพยานเช่นว่านั้นได้ แต่ต้องอยู่ภายใต้บังคับบทบัญญัติแห่งมาตราต่อไปนี้"],"text":"ถ้าพยานคนใดที่คู่ความได้บอกกล่าวความจำนงจะอ้างอิงคำเบิกความของพยานโดยชอบแล้ว ไม่ไปศาลในวันกำหนดนัดสืบพยานนั้น ศาลชอบที่จะดำเนินการพิจารณาต่อไป และชี้ขาดตัดสินคดีโดยไม่ต้องสืบพยานเช่นว่านั้นได้ แต่ต้องอยู่ภายใต้บังคับบทบัญญัติแห่งมาตราต่อไปนี้"},{"id":"๑๑๑","num":"มาตรา ๑๑๑","num_ara":"๑๑๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["เมื่อศาลเห็นว่าคำเบิกความของพยานที่ไม่มาศาลเป็นข้อสำคัญในการวินิจฉัยชี้ขาดคดี","(๑) แต่ศาลเห็นว่าข้ออ้างว่าพยานไม่สามารถมาศาลนั้นเป็นเพราะเหตุเจ็บป่วยของพยาน หรือพยานมีข้อแก้ตัวอันจำเป็นอย่างอื่นที่ฟังได้ ศาลจะเลื่อนการนั่งพิจารณาคดีไปเพื่อให้พยานมาศาลหรือเพื่อสืบพยานนั้น ณ สถานที่และเวลาอันควรแก่พฤติการณ์ก็ได้ หรือ (๒) ศาลเห็นว่าพยานได้รับหมายเรียกโดยชอบแล้ว จงใจไม่ไปยังศาลหรือไม่ไป ณ สถานที่และตามวันเวลาที่กำหนดไว้ หรือได้รับคำสั่งศาลให้รอคอยอยู่แล้วจงใจหลบเสีย ศาลจะเลื่อนการนั่งพิจารณาคดีไปและออกหมายจับและเอาตัวพยานกักขังไว้จนกว่าพยานจะได้เบิกความตามวันที่ศาลเห็นสมควรก็ได้ ทั้งนี้ ไม่เป็นการลบล้างโทษตามที่บัญญัติไว้ในประมวลกฎหมายอาญา"],"text":"เมื่อศาลเห็นว่าคำเบิกความของพยานที่ไม่มาศาลเป็นข้อสำคัญในการวินิจฉัยชี้ขาดคดี\n\n(๑) แต่ศาลเห็นว่าข้ออ้างว่าพยานไม่สามารถมาศาลนั้นเป็นเพราะเหตุเจ็บป่วยของพยาน หรือพยานมีข้อแก้ตัวอันจำเป็นอย่างอื่นที่ฟังได้ ศาลจะเลื่อนการนั่งพิจารณาคดีไปเพื่อให้พยานมาศาลหรือเพื่อสืบพยานนั้น ณ สถานที่และเวลาอันควรแก่พฤติการณ์ก็ได้ หรือ (๒) ศาลเห็นว่าพยานได้รับหมายเรียกโดยชอบแล้ว จงใจไม่ไปยังศาลหรือไม่ไป ณ สถานที่และตามวันเวลาที่กำหนดไว้ หรือได้รับคำสั่งศาลให้รอคอยอยู่แล้วจงใจหลบเสีย ศาลจะเลื่อนการนั่งพิจารณาคดีไปและออกหมายจับและเอาตัวพยานกักขังไว้จนกว่าพยานจะได้เบิกความตามวันที่ศาลเห็นสมควรก็ได้ ทั้งนี้ ไม่เป็นการลบล้างโทษตามที่บัญญัติไว้ในประมวลกฎหมายอาญา"},{"id":"๑๑๒","num":"มาตรา ๑๑๒","num_ara":"๑๑๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["ก่อนเบิกความพยานทุกคนต้องสาบานตนตามลัทธิศาสนาหรือจารีตประเพณีแห่งชาติของตน หรือกล่าวคำปฏิญาณว่าจะให้การตามความสัตย์จริงเสียก่อน เว้นแต่","(๑) พระมหากษัตริย์ พระราชินี พระรัชทายาท หรือผู้สำเร็จราชการแทนพระองค์ (๒) บุคคลที่มีอายุต่ำกว่าสิบห้าปี หรือบุคคลที่ศาลเห็นว่าหย่อนความรู้สึกผิดและชอบ (๓) พระภิกษุและสามเณรในพุทธศาสนา (๔) บุคคลซึ่งคู่ความทั้งสองฝ่ายตกลงกันว่าไม่ต้องให้สาบานหรือกล่าวคำปฏิญาณ"],"text":"ก่อนเบิกความพยานทุกคนต้องสาบานตนตามลัทธิศาสนาหรือจารีตประเพณีแห่งชาติของตน หรือกล่าวคำปฏิญาณว่าจะให้การตามความสัตย์จริงเสียก่อน เว้นแต่\n\n(๑) พระมหากษัตริย์ พระราชินี พระรัชทายาท หรือผู้สำเร็จราชการแทนพระองค์ (๒) บุคคลที่มีอายุต่ำกว่าสิบห้าปี หรือบุคคลที่ศาลเห็นว่าหย่อนความรู้สึกผิดและชอบ (๓) พระภิกษุและสามเณรในพุทธศาสนา (๔) บุคคลซึ่งคู่ความทั้งสองฝ่ายตกลงกันว่าไม่ต้องให้สาบานหรือกล่าวคำปฏิญาณ"},{"id":"๑๑๓","num":"มาตรา ๑๑๓","num_ara":"๑๑๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["พยานทุกคนต้องเบิกความด้วยวาจาและห้ามไม่ให้พยานอ่านข้อความที่เขียนมา เว้นแต่จะได้รับอนุญาตจากศาล หรือเป็นพยานผู้เชี่ยวชาญ"],"text":"พยานทุกคนต้องเบิกความด้วยวาจาและห้ามไม่ให้พยานอ่านข้อความที่เขียนมา เว้นแต่จะได้รับอนุญาตจากศาล หรือเป็นพยานผู้เชี่ยวชาญ"},{"id":"๑๑๔","num":"มาตรา ๑๑๔","num_ara":"๑๑๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["ห้ามไม่ให้พยานเบิกความต่อหน้าพยานอื่นที่จะเบิกความภายหลัง และศาลมีอำนาจที่จะสั่งพยานอื่นที่อยู่ในห้องพิจารณาให้ออกไปเสียได้ แต่ถ้าพยานคนใดเบิกความโดยได้ฟังคำพยานคนก่อนเบิกความต่อหน้าตนมาแล้ว และคู่ความอีกฝ่ายหนึ่งอ้างว่าศาลไม่ควรฟังคำเบิกความเช่นว่านี้ เพราะเป็นการผิดระเบียบ ถ้าศาลเห็นว่าคำเบิกความเช่นว่านี้เป็นที่เชื่อฟังได้ หรือมิได้เปลี่ยนแปลงไปโดยได้ฟังคำเบิกความของพยานคนก่อนหรือไม่สามารถทำให้คำวินิจฉัยชี้ขาดของศาลเปลี่ยนแปลงไปได้ ศาลจะไม่ฟังว่าคำเบิกความเช่นว่านี้เป็นผิดระเบียบก็ได้"],"text":"ห้ามไม่ให้พยานเบิกความต่อหน้าพยานอื่นที่จะเบิกความภายหลัง และศาลมีอำนาจที่จะสั่งพยานอื่นที่อยู่ในห้องพิจารณาให้ออกไปเสียได้ แต่ถ้าพยานคนใดเบิกความโดยได้ฟังคำพยานคนก่อนเบิกความต่อหน้าตนมาแล้ว และคู่ความอีกฝ่ายหนึ่งอ้างว่าศาลไม่ควรฟังคำเบิกความเช่นว่านี้ เพราะเป็นการผิดระเบียบ ถ้าศาลเห็นว่าคำเบิกความเช่นว่านี้เป็นที่เชื่อฟังได้ หรือมิได้เปลี่ยนแปลงไปโดยได้ฟังคำเบิกความของพยานคนก่อนหรือไม่สามารถทำให้คำวินิจฉัยชี้ขาดของศาลเปลี่ยนแปลงไปได้ ศาลจะไม่ฟังว่าคำเบิกความเช่นว่านี้เป็นผิดระเบียบก็ได้"},{"id":"๑๑๕","num":"มาตรา ๑๑๕","num_ara":"๑๑๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["พระมหากษัตริย์ พระราชินี พระรัชทายาท ผู้สำเร็จราชการแทนพระองค์ หรือพระภิกษุและสามเณรในพุทธศาสนา แม้มาเป็นพยานจะไม่ยอมเบิกความหรือตอบคำถามใด ๆ ก็ได้ สำหรับบุคคลที่ได้รับเอกสิทธิ์หรือความคุ้มกันตามกฎหมายจะไม่ยอมเบิกความหรือตอบคำถามใด ๆ ภายใต้เงื่อนไขที่กำหนดไว้ตามกฎหมายนั้น ๆ ก็ได้"],"text":"พระมหากษัตริย์ พระราชินี พระรัชทายาท ผู้สำเร็จราชการแทนพระองค์ หรือพระภิกษุและสามเณรในพุทธศาสนา แม้มาเป็นพยานจะไม่ยอมเบิกความหรือตอบคำถามใด ๆ ก็ได้ สำหรับบุคคลที่ได้รับเอกสิทธิ์หรือความคุ้มกันตามกฎหมายจะไม่ยอมเบิกความหรือตอบคำถามใด ๆ ภายใต้เงื่อนไขที่กำหนดไว้ตามกฎหมายนั้น ๆ ก็ได้"},{"id":"๑๑๖","num":"มาตรา ๑๑๖","num_ara":"๑๑๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["ในเบื้องต้นให้พยานตอบคำถามเรื่องนาม อายุ ตำแหน่ง หรืออาชีพ ภูมิลำเนาและความเกี่ยวพันกับคู่ความ แล้วศาลอาจปฏิบัติอย่างใดอย่างหนึ่งต่อไปนี้","(๑) ศาลเป็นผู้ถามพยานเอง กล่าวคือ แจ้งให้พยานทราบประเด็นและข้อเท็จจริง ซึ่งต้องการสืบแล้วให้พยานเบิกความในข้อนั้น ๆ โดยวิธีเล่าเรื่องตามลำพังหรือโดยวิธีตอบคำถามของศาล หรือ (๒) ให้คู่ความซักถาม และถามค้านพยานไปทีเดียว ดังที่บัญญัติไว้ในมาตราต่อไปนี้"],"text":"ในเบื้องต้นให้พยานตอบคำถามเรื่องนาม อายุ ตำแหน่ง หรืออาชีพ ภูมิลำเนาและความเกี่ยวพันกับคู่ความ แล้วศาลอาจปฏิบัติอย่างใดอย่างหนึ่งต่อไปนี้\n\n(๑) ศาลเป็นผู้ถามพยานเอง กล่าวคือ แจ้งให้พยานทราบประเด็นและข้อเท็จจริง ซึ่งต้องการสืบแล้วให้พยานเบิกความในข้อนั้น ๆ โดยวิธีเล่าเรื่องตามลำพังหรือโดยวิธีตอบคำถามของศาล หรือ (๒) ให้คู่ความซักถาม และถามค้านพยานไปทีเดียว ดังที่บัญญัติไว้ในมาตราต่อไปนี้"},{"id":"๑๑๗","num":"มาตรา ๑๑๗","num_ara":"๑๑๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["คู่ความฝ่ายที่อ้างพยานชอบที่จะตั้งข้อซักถามพยานได้ในทันใด ที่พยานได้สาบานตนและแสดงตนตามมาตรา ๑๑๒ และ ๑๑๖ แล้ว หรือถ้าศาลเป็นผู้ซักถามพยานก่อน ก็ให้คู่ความซักถามได้ต่อเมื่อศาลได้ซักถามเสร็จแล้ว เมื่อคู่ความฝ่ายที่อ้างพยานได้ซักถามพยานเสร็จแล้ว คู่ความอีกฝ่ายหนึ่งชอบที่จะถามค้านพยานนั้นได้ เมื่อได้ถามค้านพยานเสร็จแล้ว คู่ความฝ่ายที่อ้างพยานชอบที่จะถามติงได้ เมื่อได้ถามติงพยานเสร็จแล้ว ห้ามมิให้คู่ความฝ่ายใดซักถามพยานอีก เว้นแต่จะได้รับอนุญาตจากศาล ถ้าคู่ความฝ่ายใดได้รับอนุญาตให้ถามพยานได้ดังกล่าวนี้ คู่ความอีกฝ่ายหนึ่งย่อมถามค้านพยานได้อีกในข้อที่เกี่ยวกับคำถามนั้น คู่ความที่ระบุพยานคนใดไว้ จะไม่ติดสืบพยานคนนั้นก็ได้ ในเมื่อพยานคนนั้นยังมิได้เบิกความตามข้อถามของศาล หรือของคู่ความฝ่ายที่อ้าง แต่ถ้าพยานได้เริ่มเบิกความแล้ว พยานอาจถูกถามค้านหรือถามติงได้ ถ้าพยานเบิกความเป็นปรปักษ์แก่ความฝ่ายที่อ้างตนมา คู่ความฝ่ายนั้นอาจขออนุญาตต่อศาลเพื่อซักถามพยานนั้นเสมือนหนึ่งพยานนั้นเป็นพยานซึ่งคู่ความอีกฝ่ายหนึ่งอ้างมา การซักถามพยานก็ดี การซักค้านพยานก็ดี การถามติงพยานก็ดี ถ้าคู่ความคนใดได้ตั้งทนายความไว้หลายคน ให้ทนายความคนเดียวเป็นผู้ถาม เว้นแต่ศาลจะเห็นสมควรเป็นอย่างอื่น"],"text":"คู่ความฝ่ายที่อ้างพยานชอบที่จะตั้งข้อซักถามพยานได้ในทันใด ที่พยานได้สาบานตนและแสดงตนตามมาตรา ๑๑๒ และ ๑๑๖ แล้ว หรือถ้าศาลเป็นผู้ซักถามพยานก่อน ก็ให้คู่ความซักถามได้ต่อเมื่อศาลได้ซักถามเสร็จแล้ว เมื่อคู่ความฝ่ายที่อ้างพยานได้ซักถามพยานเสร็จแล้ว คู่ความอีกฝ่ายหนึ่งชอบที่จะถามค้านพยานนั้นได้ เมื่อได้ถามค้านพยานเสร็จแล้ว คู่ความฝ่ายที่อ้างพยานชอบที่จะถามติงได้ เมื่อได้ถามติงพยานเสร็จแล้ว ห้ามมิให้คู่ความฝ่ายใดซักถามพยานอีก เว้นแต่จะได้รับอนุญาตจากศาล ถ้าคู่ความฝ่ายใดได้รับอนุญาตให้ถามพยานได้ดังกล่าวนี้ คู่ความอีกฝ่ายหนึ่งย่อมถามค้านพยานได้อีกในข้อที่เกี่ยวกับคำถามนั้น คู่ความที่ระบุพยานคนใดไว้ จะไม่ติดสืบพยานคนนั้นก็ได้ ในเมื่อพยานคนนั้นยังมิได้เบิกความตามข้อถามของศาล หรือของคู่ความฝ่ายที่อ้าง แต่ถ้าพยานได้เริ่มเบิกความแล้ว พยานอาจถูกถามค้านหรือถามติงได้ ถ้าพยานเบิกความเป็นปรปักษ์แก่ความฝ่ายที่อ้างตนมา คู่ความฝ่ายนั้นอาจขออนุญาตต่อศาลเพื่อซักถามพยานนั้นเสมือนหนึ่งพยานนั้นเป็นพยานซึ่งคู่ความอีกฝ่ายหนึ่งอ้างมา การซักถามพยานก็ดี การซักค้านพยานก็ดี การถามติงพยานก็ดี ถ้าคู่ความคนใดได้ตั้งทนายความไว้หลายคน ให้ทนายความคนเดียวเป็นผู้ถาม เว้นแต่ศาลจะเห็นสมควรเป็นอย่างอื่น"},{"id":"๑๑๘","num":"มาตรา ๑๑๘","num_ara":"๑๑๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["ในการที่คู่ความฝ่ายที่อ้างพยานจะซักถามพยานก็ดี หรือถามติงพยานก็ดี ห้ามมิให้คู่ความฝ่ายนั้นใช้คำถามนำ เว้นแต่คู่ความอีกฝ่ายหนึ่งยินยอมหรือได้รับอนุญาตจากศาล ในการที่คู่ความฝ่ายที่อ้างพยานจะถามติงพยาน ห้ามมิให้คู่ความฝ่ายนั้นใช้คำถามอื่นใดนอกจากคำถามที่เกี่ยวกับคำพยานเบิกความตอบคำถามค้าน ไม่ว่าในกรณีใด ๆ ห้ามไม่ให้คู่ความฝ่ายใดฝ่ายหนึ่งถามพยานด้วย","(๑) คำถามอันไม่เกี่ยวกับประเด็นแห่งคดี (๒) คำถามที่อาจทำให้พยาน หรือคู่ความฝ่ายหนึ่งหรือบุคคลภายนอกต้องรับโทษทางอาญา หรือคำถามที่เป็นหมิ่นประมาทพยาน เว้นแต่คำถามเช่นว่านั้นเป็นข้อสาระสำคัญในอันที่จะชี้ขาดข้อพิพาท ถ้าคู่ความฝ่ายใดฝ่ายหนึ่งถามพยานฝ่าฝืนต่อบทบัญญัติแห่งมาตรานี้ เมื่อศาลเห็นสมควร หรือเมื่อคู่ความอีกฝ่ายหนึ่งร้องคัดค้าน ศาลมีอำนาจที่จะชี้ขาดว่าควรให้ใช้คำถามนั้นหรือไม่ ในกรณีเช่นนี้ ถ้าคู่ความฝ่ายที่เกี่ยวข้องคัดค้านคำชี้ขาดของศาล ก่อนที่ศาลจะดำเนินคดีต่อไป ให้ศาลจดไว้ในรายงานซึ่งคำถามและข้อคัดค้าน ส่วนเหตุที่คู่ความคัดค้านยกขึ้นอ้างนั้น ให้ศาลใช้ดุลพินิจจดลงไว้ในรายงาน หรือกำหนดให้คู่ความฝ่ายนั้นยื่นคำแถลงเป็นหนังสือเพื่อรวมไว้ในสำนวน"],"text":"ในการที่คู่ความฝ่ายที่อ้างพยานจะซักถามพยานก็ดี หรือถามติงพยานก็ดี ห้ามมิให้คู่ความฝ่ายนั้นใช้คำถามนำ เว้นแต่คู่ความอีกฝ่ายหนึ่งยินยอมหรือได้รับอนุญาตจากศาล ในการที่คู่ความฝ่ายที่อ้างพยานจะถามติงพยาน ห้ามมิให้คู่ความฝ่ายนั้นใช้คำถามอื่นใดนอกจากคำถามที่เกี่ยวกับคำพยานเบิกความตอบคำถามค้าน ไม่ว่าในกรณีใด ๆ ห้ามไม่ให้คู่ความฝ่ายใดฝ่ายหนึ่งถามพยานด้วย\n\n(๑) คำถามอันไม่เกี่ยวกับประเด็นแห่งคดี (๒) คำถามที่อาจทำให้พยาน หรือคู่ความฝ่ายหนึ่งหรือบุคคลภายนอกต้องรับโทษทางอาญา หรือคำถามที่เป็นหมิ่นประมาทพยาน เว้นแต่คำถามเช่นว่านั้นเป็นข้อสาระสำคัญในอันที่จะชี้ขาดข้อพิพาท ถ้าคู่ความฝ่ายใดฝ่ายหนึ่งถามพยานฝ่าฝืนต่อบทบัญญัติแห่งมาตรานี้ เมื่อศาลเห็นสมควร หรือเมื่อคู่ความอีกฝ่ายหนึ่งร้องคัดค้าน ศาลมีอำนาจที่จะชี้ขาดว่าควรให้ใช้คำถามนั้นหรือไม่ ในกรณีเช่นนี้ ถ้าคู่ความฝ่ายที่เกี่ยวข้องคัดค้านคำชี้ขาดของศาล ก่อนที่ศาลจะดำเนินคดีต่อไป ให้ศาลจดไว้ในรายงานซึ่งคำถามและข้อคัดค้าน ส่วนเหตุที่คู่ความคัดค้านยกขึ้นอ้างนั้น ให้ศาลใช้ดุลพินิจจดลงไว้ในรายงาน หรือกำหนดให้คู่ความฝ่ายนั้นยื่นคำแถลงเป็นหนังสือเพื่อรวมไว้ในสำนวน"},{"id":"๑๑๙","num":"มาตรา ๑๑๙","num_ara":"๑๑๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["ไม่ว่าเวลาใด ๆ ในระหว่างที่พยานเบิกความ หรือภายหลังที่พยานได้เบิกความแล้ว แต่ก่อนมีคำพิพากษา ให้ศาลมีอำนาจที่จะถามพยานด้วยคำถามใด ๆ ตามที่เห็นว่าจำเป็น เพื่อให้คำเบิกความของพยานบริบูรณ์ หรือชัดเจนยิ่งขึ้น หรือเพื่อสอบสวนถึงพฤติการณ์ที่ทำให้พยานเบิกความเช่นนั้น ถ้าพยานสองคนหรือกว่านั้นเบิกความขัดกัน ในข้อสำคัญแห่งประเด็น เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอ ให้ศาลมีอำนาจเรียกพยานเหล่านั้นมาสอบถามปากคำพร้อมกันได้"],"text":"ไม่ว่าเวลาใด ๆ ในระหว่างที่พยานเบิกความ หรือภายหลังที่พยานได้เบิกความแล้ว แต่ก่อนมีคำพิพากษา ให้ศาลมีอำนาจที่จะถามพยานด้วยคำถามใด ๆ ตามที่เห็นว่าจำเป็น เพื่อให้คำเบิกความของพยานบริบูรณ์ หรือชัดเจนยิ่งขึ้น หรือเพื่อสอบสวนถึงพฤติการณ์ที่ทำให้พยานเบิกความเช่นนั้น ถ้าพยานสองคนหรือกว่านั้นเบิกความขัดกัน ในข้อสำคัญแห่งประเด็น เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอ ให้ศาลมีอำนาจเรียกพยานเหล่านั้นมาสอบถามปากคำพร้อมกันได้"},{"id":"๑๒๐","num":"มาตรา ๑๒๐","num_ara":"๑๒๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["ถ้าคู่ความฝ่ายใดอ้างว่าคำเบิกความของพยานคนใดที่คู่ความอีกฝ่ายหนึ่งอ้าง หรือที่ศาลเรียกมาไม่ควรเชื่อฟัง โดยเหตุผลซึ่งศาลเห็นว่ามีมูล ศาลอาจยอมให้คู่ความฝ่ายนั้นนำพยานหลักฐานมาสืบสนับสนุนข้ออ้างของตนได้แล้วแต่จะเห็นควร"],"text":"ถ้าคู่ความฝ่ายใดอ้างว่าคำเบิกความของพยานคนใดที่คู่ความอีกฝ่ายหนึ่งอ้าง หรือที่ศาลเรียกมาไม่ควรเชื่อฟัง โดยเหตุผลซึ่งศาลเห็นว่ามีมูล ศาลอาจยอมให้คู่ความฝ่ายนั้นนำพยานหลักฐานมาสืบสนับสนุนข้ออ้างของตนได้แล้วแต่จะเห็นควร"},{"id":"๑๒๐_๑","num":"มาตรา ๑๒๐/๑","num_ara":"๑๒๐/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["เมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำร้องและคู่ความอีกฝ่ายไม่คัดค้าน และศาลเห็นสมควรศาลอาจอนุญาตให้คู่ความฝ่ายที่มีคำร้องเสนอบันทึกถ้อยคำทั้งหมดหรือแต่บางส่วนของผู้ที่ตนประสงค์จะอ้างเป็นพยานยืนยันข้อเท็จจริงหรือความเห็นของผู้ให้ถ้อยคำต่อศาลแทนการซักถามผู้ให้ถ้อยคำเป็นพยานต่อหน้าศาลได้ คู่ความที่ประสงค์จะเสนอบันทึกถ้อยคำแทนการซักถามพยานดังกล่าวตามวรรคหนึ่ง จะต้องยื่นคำร้องแสดงความจำนงพร้อมเหตุผลต่อศาลก่อนวันชี้สองสถาน หรือก่อนวันสืบพยาน ในกรณีที่ไม่มีการชี้สองสถาน และให้ศาลพิจารณากำหนดระยะเวลาที่คู่ความจะต้องยื่นบันทึกถ้อยคำดังกล่าวต่อศาล และส่งสำเนาบันทึกถ้อยคำนั้นให้คู่ความอีกฝ่ายหนึ่งทราบล่วงหน้าไม่น้อยกว่าเจ็ดวันก่อนวันสืบพยานคนนั้น เมื่อมีการยื่นบันทึกถ้อยคำต่อศาลแล้วคู่ความที่ยื่นไม่อาจขอถอนบันทึกถ้อยคำนั้น บันทึกถ้อยคำนั้นเมื่อพยานเบิกความรับรองแล้วให้ถือว่าเป็นส่วนหนึ่งของคำเบิกความตอบคำซักถาม ให้ผู้ให้ถ้อยคำมาศาลเพื่อเบิกความตอบคำซักถามเพิ่มเติม ตอบคำถามค้าน และคำถามติงของคู่ความ หากผู้ให้ถ้อยคำไม่มาศาล ให้ศาลปฏิเสธที่จะรับฟังบันทึกถ้อยคำของผู้นั้นเป็นพยานหลักฐานในคดี แต่ถ้าศาลเห็นว่าเป็นกรณีจำเป็นหรือมีเหตุสุดวิสัยที่ผู้ให้ถ้อยคำไม่สามารถมาศาลได้ และเพื่อประโยชน์แห่งความยุติธรรม จะรับฟังบันทึกถ้อยคำที่ผู้ให้ถ้อยคำมิได้มาศาลนั้นประกอบพยานหลักฐานอื่นก็ได้ ในกรณีที่คู่ความตกลงกันให้ผู้ให้ถ้อยคำไม่ต้องมาศาล หรือคู่ความอีกฝ่ายหนึ่งยินยอมหรือไม่ติดใจถามค้าน ให้ศาลรับฟังบันทึกถ้อยคำดังกล่าวเป็นพยานหลักฐานในคดีได้"],"text":"เมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำร้องและคู่ความอีกฝ่ายไม่คัดค้าน และศาลเห็นสมควรศาลอาจอนุญาตให้คู่ความฝ่ายที่มีคำร้องเสนอบันทึกถ้อยคำทั้งหมดหรือแต่บางส่วนของผู้ที่ตนประสงค์จะอ้างเป็นพยานยืนยันข้อเท็จจริงหรือความเห็นของผู้ให้ถ้อยคำต่อศาลแทนการซักถามผู้ให้ถ้อยคำเป็นพยานต่อหน้าศาลได้ คู่ความที่ประสงค์จะเสนอบันทึกถ้อยคำแทนการซักถามพยานดังกล่าวตามวรรคหนึ่ง จะต้องยื่นคำร้องแสดงความจำนงพร้อมเหตุผลต่อศาลก่อนวันชี้สองสถาน หรือก่อนวันสืบพยาน ในกรณีที่ไม่มีการชี้สองสถาน และให้ศาลพิจารณากำหนดระยะเวลาที่คู่ความจะต้องยื่นบันทึกถ้อยคำดังกล่าวต่อศาล และส่งสำเนาบันทึกถ้อยคำนั้นให้คู่ความอีกฝ่ายหนึ่งทราบล่วงหน้าไม่น้อยกว่าเจ็ดวันก่อนวันสืบพยานคนนั้น เมื่อมีการยื่นบันทึกถ้อยคำต่อศาลแล้วคู่ความที่ยื่นไม่อาจขอถอนบันทึกถ้อยคำนั้น บันทึกถ้อยคำนั้นเมื่อพยานเบิกความรับรองแล้วให้ถือว่าเป็นส่วนหนึ่งของคำเบิกความตอบคำซักถาม ให้ผู้ให้ถ้อยคำมาศาลเพื่อเบิกความตอบคำซักถามเพิ่มเติม ตอบคำถามค้าน และคำถามติงของคู่ความ หากผู้ให้ถ้อยคำไม่มาศาล ให้ศาลปฏิเสธที่จะรับฟังบันทึกถ้อยคำของผู้นั้นเป็นพยานหลักฐานในคดี แต่ถ้าศาลเห็นว่าเป็นกรณีจำเป็นหรือมีเหตุสุดวิสัยที่ผู้ให้ถ้อยคำไม่สามารถมาศาลได้ และเพื่อประโยชน์แห่งความยุติธรรม จะรับฟังบันทึกถ้อยคำที่ผู้ให้ถ้อยคำมิได้มาศาลนั้นประกอบพยานหลักฐานอื่นก็ได้ ในกรณีที่คู่ความตกลงกันให้ผู้ให้ถ้อยคำไม่ต้องมาศาล หรือคู่ความอีกฝ่ายหนึ่งยินยอมหรือไม่ติดใจถามค้าน ให้ศาลรับฟังบันทึกถ้อยคำดังกล่าวเป็นพยานหลักฐานในคดีได้"},{"id":"๑๒๐_๒","num":"มาตรา ๑๒๐/๒","num_ara":"๑๒๐/๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["เมื่อคู่ความมีคำร้องร่วมกันและศาลเห็นสมควร ศาลอาจอนุญาตให้เสนอบันทึกถ้อยคำยืนยันข้อเท็จจริงหรือความเห็นของผู้ให้ถ้อยคำซึ่งมีถิ่นที่อยู่ในต่างประเทศต่อศาลแทนการนำพยานบุคคลมาเบิกความต่อหน้าศาลได้ แต่ทั้งนี้ ไม่ตัดสิทธิผู้ให้ถ้อยคำที่จะมาศาลเพื่อให้การเพิ่มเติม สำหรับลายมือชื่อของผู้ให้ถ้อยคำให้นำมาตรา ๔๗ วรรคสาม มาใช้บังคับโดยอนุโลม"],"text":"เมื่อคู่ความมีคำร้องร่วมกันและศาลเห็นสมควร ศาลอาจอนุญาตให้เสนอบันทึกถ้อยคำยืนยันข้อเท็จจริงหรือความเห็นของผู้ให้ถ้อยคำซึ่งมีถิ่นที่อยู่ในต่างประเทศต่อศาลแทนการนำพยานบุคคลมาเบิกความต่อหน้าศาลได้ แต่ทั้งนี้ ไม่ตัดสิทธิผู้ให้ถ้อยคำที่จะมาศาลเพื่อให้การเพิ่มเติม สำหรับลายมือชื่อของผู้ให้ถ้อยคำให้นำมาตรา ๔๗ วรรคสาม มาใช้บังคับโดยอนุโลม"},{"id":"๑๒๐_๓","num":"มาตรา ๑๒๐/๓","num_ara":"๑๒๐/๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["บันทึกถ้อยคำตามมาตรา ๑๒๐/๑ และมาตรา ๑๒๐/๒ ให้มีรายการดังต่อไปนี้","(๑) ชื่อศาลและเลขคดี (๒) วัน เดือน ปี และสถานที่ที่ทำบันทึกถ้อยคำ (๓) ชื่อและสกุลของคู่ความ (๔) ชื่อ สกุล อายุ ที่อยู่ และอาชีพ ของผู้ให้ถ้อยคำ และความเกี่ยวพันกับคู่ความ (๕) รายละเอียดแห่งข้อเท็จจริง หรือความเห็นของผู้ให้ถ้อยคำ (๖) ลายมือชื่อของผู้ให้ถ้อยคำและคู่ความฝ่ายผู้เสนอบันทึกถ้อยคำ ห้ามมิให้แก้ไขเพิ่มเติมบันทึกถ้อยคำที่ได้ยื่นไว้แล้วต่อศาล เว้นแต่เป็นการแก้ไขข้อผิดพลาดหรือผิดหลงเล็กน้อย"],"text":"บันทึกถ้อยคำตามมาตรา ๑๒๐/๑ และมาตรา ๑๒๐/๒ ให้มีรายการดังต่อไปนี้\n\n(๑) ชื่อศาลและเลขคดี (๒) วัน เดือน ปี และสถานที่ที่ทำบันทึกถ้อยคำ (๓) ชื่อและสกุลของคู่ความ (๔) ชื่อ สกุล อายุ ที่อยู่ และอาชีพ ของผู้ให้ถ้อยคำ และความเกี่ยวพันกับคู่ความ (๕) รายละเอียดแห่งข้อเท็จจริง หรือความเห็นของผู้ให้ถ้อยคำ (๖) ลายมือชื่อของผู้ให้ถ้อยคำและคู่ความฝ่ายผู้เสนอบันทึกถ้อยคำ ห้ามมิให้แก้ไขเพิ่มเติมบันทึกถ้อยคำที่ได้ยื่นไว้แล้วต่อศาล เว้นแต่เป็นการแก้ไขข้อผิดพลาดหรือผิดหลงเล็กน้อย"},{"id":"๑๒๐_๔","num":"มาตรา ๑๒๐/๔","num_ara":"๑๒๐/๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["คู่ความฝ่ายใดฝ่ายหนึ่งอาจขอให้ศาลทำการสืบพยานบุคคลที่อยู่นอกศาลโดยระบบการประชุมทางจอภาพได้ โดยคู่ความฝ่ายที่อ้างพยานต้องเป็นผู้รับผิดชอบในเรื่องค่าใช้จ่าย หากศาลเห็นว่า เพื่อประโยชน์แห่งความยุติธรรมศาลจะอนุญาตตามคำร้องนั้นก็ได้ โดยให้ศาลดำเนินกระบวนพิจารณาไปตามข้อกำหนดแนวทางการสืบพยานของประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ของศาลฎีกาที่ออกตามมาตรา ๑๐๓/๓ รวมทั้งระบุวิธีการสืบพยาน สถานที่ และสักขีพยานในการสืบพยานตามข้อกำหนดของประธานศาลฎีกาดังกล่าว และไม่ถือว่าค่าใช้จ่ายนั้นเป็นค่าฤชาธรรมเนียมในการดำเนินคดี การเบิกความตามวรรคหนึ่งให้ถือว่าพยานเบิกความในห้องพิจารณาของศาล"],"text":"คู่ความฝ่ายใดฝ่ายหนึ่งอาจขอให้ศาลทำการสืบพยานบุคคลที่อยู่นอกศาลโดยระบบการประชุมทางจอภาพได้ โดยคู่ความฝ่ายที่อ้างพยานต้องเป็นผู้รับผิดชอบในเรื่องค่าใช้จ่าย หากศาลเห็นว่า เพื่อประโยชน์แห่งความยุติธรรมศาลจะอนุญาตตามคำร้องนั้นก็ได้ โดยให้ศาลดำเนินกระบวนพิจารณาไปตามข้อกำหนดแนวทางการสืบพยานของประธานศาลฎีกาโดยความเห็นชอบของที่ประชุมใหญ่ของศาลฎีกาที่ออกตามมาตรา ๑๐๓/๓ รวมทั้งระบุวิธีการสืบพยาน สถานที่ และสักขีพยานในการสืบพยานตามข้อกำหนดของประธานศาลฎีกาดังกล่าว และไม่ถือว่าค่าใช้จ่ายนั้นเป็นค่าฤชาธรรมเนียมในการดำเนินคดี การเบิกความตามวรรคหนึ่งให้ถือว่าพยานเบิกความในห้องพิจารณาของศาล"},{"id":"๑๒๑","num":"มาตรา ๑๒๑","num_ara":"๑๒๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๒ ว่าด้วยการมาศาลของพยานและการซักถามพยาน","subsection":"","paragraphs":["ในการนั่งพิจารณาทุกครั้ง เมื่อพยานคนใดเบิกความแล้ว ให้ศาลอ่านคำเบิกความนั้นให้พยานฟัง และให้พยานลงลายมือชื่อไว้ดังที่บัญญัติไว้ในมาตรา ๔๙ และ ๕๐ ความในวรรคหนึ่งไม่ใช้บังคับกับกรณีที่มีการใช้บันทึกถ้อยคำแทนการเบิกความของพยานตามมาตรา ๑๒๐/๑ หรือมาตรา ๑๒๐/๒ หรือกรณีที่มีการสืบพยานโดยใช้ระบบการประชุมทางจอภาพตามมาตรา ๑๒๐/๔ หรือกรณีที่มีการบันทึกการเบิกความของพยานโดยใช้วิธีการบันทึกลงในวัสดุ ซึ่งสามารถถ่ายทอดออกเป็นภาพหรือเสียงหรือโดยใช้วิธีการอื่นใดซึ่งคู่ความและพยานสามารถตรวจสอบถึงความถูกต้องของบันทึกการเบิกความนั้นได้ แต่ถ้าคู่ความฝ่ายใดฝ่ายหนึ่งหรือพยานขอตรวจดูบันทึกการเบิกความของพยานนั้น ให้ศาลจัดให้มีการตรวจดูบันทึกการเบิกความนั้น"],"text":"ในการนั่งพิจารณาทุกครั้ง เมื่อพยานคนใดเบิกความแล้ว ให้ศาลอ่านคำเบิกความนั้นให้พยานฟัง และให้พยานลงลายมือชื่อไว้ดังที่บัญญัติไว้ในมาตรา ๔๙ และ ๕๐ ความในวรรคหนึ่งไม่ใช้บังคับกับกรณีที่มีการใช้บันทึกถ้อยคำแทนการเบิกความของพยานตามมาตรา ๑๒๐/๑ หรือมาตรา ๑๒๐/๒ หรือกรณีที่มีการสืบพยานโดยใช้ระบบการประชุมทางจอภาพตามมาตรา ๑๒๐/๔ หรือกรณีที่มีการบันทึกการเบิกความของพยานโดยใช้วิธีการบันทึกลงในวัสดุ ซึ่งสามารถถ่ายทอดออกเป็นภาพหรือเสียงหรือโดยใช้วิธีการอื่นใดซึ่งคู่ความและพยานสามารถตรวจสอบถึงความถูกต้องของบันทึกการเบิกความนั้นได้ แต่ถ้าคู่ความฝ่ายใดฝ่ายหนึ่งหรือพยานขอตรวจดูบันทึกการเบิกความของพยานนั้น ให้ศาลจัดให้มีการตรวจดูบันทึกการเบิกความนั้น"},{"id":"๑๒๒","num":"มาตรา ๑๒๒","num_ara":"๑๒๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๓ การนำพยานเอกสารมาสืบ","subsection":"","paragraphs":["เมื่อคู่ความฝ่ายใดอ้างอิงเอกสารฉบับใดเป็นพยานหลักฐานและคู่ความอีกฝ่ายหนึ่งคัดค้านเอกสารนั้นตามที่บัญญัติไว้ในมาตรา ๑๒๕ ถ้าต้นฉบับเอกสารอยู่ในความครอบครองของคู่ความฝ่ายที่อ้างเอกสาร ให้คู่ความฝ่ายนั้นนำต้นฉบับเอกสารมาแสดงต่อศาลในวันสืบพยาน ไม่ว่าเวลาใด ๆ ก่อนมีคำพิพากษา ถ้าศาลได้กำหนดให้คู่ความฝ่ายที่อ้างเอกสารส่งต้นฉบับต่อศาล โดยที่ศาลเห็นสมควร หรือโดยที่คู่ความอีกฝ่ายหนึ่งยื่นคำขอ ให้คู่ความฝ่ายนั้นส่งต้นฉบับเอกสารต่อศาล เพื่อศาลหรือคู่ความอีกฝ่ายหนึ่งจะตรวจดูได้ตามเงื่อนไขซึ่งจะได้กำหนดไว้ในกฎกระทรวงว่าด้วยการนั้น หรือตามที่ศาลจะได้กำหนด แต่","(๑) ถ้าไม่สามารถจะนำมาหรือยื่นต้นฉบับเอกสารดังกล่าวข้างต้น คู่ความฝ่ายนั้นอาจยื่นคำขอโดยทำเป็นคำร้องต่อศาลในวันหรือก่อนวันที่กำหนดให้นำมาหรือให้ยื่นต้นฉบับเอกสารนั้น แถลงให้ทราบถึงความไม่สามารถที่จะปฏิบัติตามได้พร้อมทั้งเหตุผล ถ้าศาลเห็นว่าผู้ยื่นคำขอไม่สามารถที่จะนำมาหรือยื่นต้นฉบับเอกสารได้ ศาลจะมีคำสั่งอนุญาตให้นำต้นฉบับเอกสารมาในวันต่อไป หรือจะสั่งเป็นอย่างอื่นตามที่เห็นสมควรเพื่อประโยชน์แห่งความยุติธรรมก็ได้ ในกรณีผู้ยื่นคำขอมีความประสงค์เพียงให้ศาลขยายระยะเวลาที่ตนจะต้องนำมาหรือยื่นต้นฉบับเอกสารนั้น คำขอนั้นจะทำเป็นคำขอฝ่ายเดียวก็ได้ (๒) ถ้าการที่จะนำมาหรือยื่นต้นฉบับเอกสารต่อศาลนั้น จะเป็นเหตุให้เกิดการสูญหาย หรือบุบสลายหรือมีข้อขัดข้องโดยอุปสรรคสำคัญหรือความลำบากยากยิ่งใด ๆ คู่ความฝ่ายที่อ้างอิงเอกสารอาจยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องต่อศาล ในวันหรือก่อนวันสืบพยาน แถลงให้ทราบถึงเหตุเสียหาย อุปสรรค หรือความลำบากเช่นว่านั้น ถ้าศาลเห็นว่าต้นฉบับเอกสารนั้นไม่อาจนำมาหรือยื่นต่อศาลได้ ศาลจะมีคำสั่งให้ยื่นต้นฉบับเอกสารนั้น ณ สถานที่ใดต่อเจ้าพนักงานคนใด และภายในเงื่อนไขใด ๆ ตามที่เห็นสมควรก็ได้ หรือจะมีคำสั่งให้คัดสำเนาที่รับรองว่าถูกต้องทั้งฉบับหรือเฉพาะส่วนที่เกี่ยวแก่เรื่องมายื่นแทนต้นฉบับก็ได้"],"text":"เมื่อคู่ความฝ่ายใดอ้างอิงเอกสารฉบับใดเป็นพยานหลักฐานและคู่ความอีกฝ่ายหนึ่งคัดค้านเอกสารนั้นตามที่บัญญัติไว้ในมาตรา ๑๒๕ ถ้าต้นฉบับเอกสารอยู่ในความครอบครองของคู่ความฝ่ายที่อ้างเอกสาร ให้คู่ความฝ่ายนั้นนำต้นฉบับเอกสารมาแสดงต่อศาลในวันสืบพยาน ไม่ว่าเวลาใด ๆ ก่อนมีคำพิพากษา ถ้าศาลได้กำหนดให้คู่ความฝ่ายที่อ้างเอกสารส่งต้นฉบับต่อศาล โดยที่ศาลเห็นสมควร หรือโดยที่คู่ความอีกฝ่ายหนึ่งยื่นคำขอ ให้คู่ความฝ่ายนั้นส่งต้นฉบับเอกสารต่อศาล เพื่อศาลหรือคู่ความอีกฝ่ายหนึ่งจะตรวจดูได้ตามเงื่อนไขซึ่งจะได้กำหนดไว้ในกฎกระทรวงว่าด้วยการนั้น หรือตามที่ศาลจะได้กำหนด แต่\n\n(๑) ถ้าไม่สามารถจะนำมาหรือยื่นต้นฉบับเอกสารดังกล่าวข้างต้น คู่ความฝ่ายนั้นอาจยื่นคำขอโดยทำเป็นคำร้องต่อศาลในวันหรือก่อนวันที่กำหนดให้นำมาหรือให้ยื่นต้นฉบับเอกสารนั้น แถลงให้ทราบถึงความไม่สามารถที่จะปฏิบัติตามได้พร้อมทั้งเหตุผล ถ้าศาลเห็นว่าผู้ยื่นคำขอไม่สามารถที่จะนำมาหรือยื่นต้นฉบับเอกสารได้ ศาลจะมีคำสั่งอนุญาตให้นำต้นฉบับเอกสารมาในวันต่อไป หรือจะสั่งเป็นอย่างอื่นตามที่เห็นสมควรเพื่อประโยชน์แห่งความยุติธรรมก็ได้ ในกรณีผู้ยื่นคำขอมีความประสงค์เพียงให้ศาลขยายระยะเวลาที่ตนจะต้องนำมาหรือยื่นต้นฉบับเอกสารนั้น คำขอนั้นจะทำเป็นคำขอฝ่ายเดียวก็ได้ (๒) ถ้าการที่จะนำมาหรือยื่นต้นฉบับเอกสารต่อศาลนั้น จะเป็นเหตุให้เกิดการสูญหาย หรือบุบสลายหรือมีข้อขัดข้องโดยอุปสรรคสำคัญหรือความลำบากยากยิ่งใด ๆ คู่ความฝ่ายที่อ้างอิงเอกสารอาจยื่นคำขอฝ่ายเดียวโดยทำเป็นคำร้องต่อศาล ในวันหรือก่อนวันสืบพยาน แถลงให้ทราบถึงเหตุเสียหาย อุปสรรค หรือความลำบากเช่นว่านั้น ถ้าศาลเห็นว่าต้นฉบับเอกสารนั้นไม่อาจนำมาหรือยื่นต่อศาลได้ ศาลจะมีคำสั่งให้ยื่นต้นฉบับเอกสารนั้น ณ สถานที่ใดต่อเจ้าพนักงานคนใด และภายในเงื่อนไขใด ๆ ตามที่เห็นสมควรก็ได้ หรือจะมีคำสั่งให้คัดสำเนาที่รับรองว่าถูกต้องทั้งฉบับหรือเฉพาะส่วนที่เกี่ยวแก่เรื่องมายื่นแทนต้นฉบับก็ได้"},{"id":"๑๒๓","num":"มาตรา ๑๒๓","num_ara":"๑๒๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๓ การนำพยานเอกสารมาสืบ","subsection":"","paragraphs":["ถ้าต้นฉบับเอกสารซึ่งคู่ความฝ่ายหนึ่งอ้างอิงเป็นพยานหลักฐานนั้นอยู่ในความครอบครองของคู่ความอีกฝ่ายหนึ่ง คู่ความฝ่ายที่อ้างจะยื่นคำขอโดยทำเป็นคำร้องต่อศาลขอให้สั่งคู่ความอีกฝ่ายหนึ่งส่งต้นฉบับเอกสารแทนการที่ตนจะต้องส่งสำเนาเอกสารนั้นก็ได้ ถ้าศาลเห็นว่าเอกสารนั้นเป็นพยานหลักฐานสำคัญ และคำร้องนั้นฟังได้ ให้ศาลมีคำสั่งให้คู่ความอีกฝ่ายหนึ่งยื่นต้นฉบับเอกสารต่อศาลภายในเวลาอันสมควรแล้วแต่ศาลจะกำหนด ถ้าคู่ความอีกฝ่ายหนึ่งมีต้นฉบับเอกสารอยู่ในครอบครองไม่ปฏิบัติตามคำสั่งเช่นว่านั้น ให้ถือว่าข้อเท็จจริงแห่งข้ออ้างที่ผู้ขอจะต้องนำสืบโดยเอกสารนั้น คู่ความอีกฝ่ายหนึ่งได้ยอมรับแล้ว ถ้าต้นฉบับเอกสารอยู่ในความครอบครองของบุคคลภายนอก หรือในครอบครองของทางราชการ หรือของเจ้าหน้าที่ซึ่งคู่ความที่อ้างไม่อาจร้องขอโดยตรงให้ส่งเอกสารนั้นมาได้ ให้นำบทบัญญัติในวรรคก่อนว่าด้วยการที่คู่ความฝ่ายที่อ้างเอกสารยื่นคำขอ และการที่ศาลมีคำสั่งมาใช้บังคับโดยอนุโลม แต่ทั้งนี้ ฝ่ายที่อ้างต้องส่งคำสั่งศาลแก่ผู้ครอบครองเอกสารนั้นล่วงหน้าอย่างน้อยเจ็ดวัน ถ้าไม่ได้เอกสารนั้นมาสืบตามกำหนด เมื่อศาลเห็นสมควร ก็ให้ศาลสืบพยานต่อไปตามที่บทบัญญัติไว้ในมาตรา ๙๓ (๒)"],"text":"ถ้าต้นฉบับเอกสารซึ่งคู่ความฝ่ายหนึ่งอ้างอิงเป็นพยานหลักฐานนั้นอยู่ในความครอบครองของคู่ความอีกฝ่ายหนึ่ง คู่ความฝ่ายที่อ้างจะยื่นคำขอโดยทำเป็นคำร้องต่อศาลขอให้สั่งคู่ความอีกฝ่ายหนึ่งส่งต้นฉบับเอกสารแทนการที่ตนจะต้องส่งสำเนาเอกสารนั้นก็ได้ ถ้าศาลเห็นว่าเอกสารนั้นเป็นพยานหลักฐานสำคัญ และคำร้องนั้นฟังได้ ให้ศาลมีคำสั่งให้คู่ความอีกฝ่ายหนึ่งยื่นต้นฉบับเอกสารต่อศาลภายในเวลาอันสมควรแล้วแต่ศาลจะกำหนด ถ้าคู่ความอีกฝ่ายหนึ่งมีต้นฉบับเอกสารอยู่ในครอบครองไม่ปฏิบัติตามคำสั่งเช่นว่านั้น ให้ถือว่าข้อเท็จจริงแห่งข้ออ้างที่ผู้ขอจะต้องนำสืบโดยเอกสารนั้น คู่ความอีกฝ่ายหนึ่งได้ยอมรับแล้ว ถ้าต้นฉบับเอกสารอยู่ในความครอบครองของบุค
