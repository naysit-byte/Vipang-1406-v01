agraphs":["บุคคลใดทำให้ต้องเสียค่าฤชาธรรมเนียมในการบังคับคดีส่วนใดโดยไม่จำเป็น หรือมีลักษณะประวิงการบังคับคดี หรือที่ต้องดำเนินไปเพราะความผิดหรือความประมาทเลินเล่ออย่างร้ายแรง หรือเพราะบังคับคดีไปโดยไม่สุจริตก่อนการบังคับคดีได้เสร็จลง ผู้ที่ได้รับความเสียหายหรือลูกหนี้ตามคำพิพากษา แล้วแต่กรณี อาจยื่นคำร้องต่อศาลภายในเจ็ดวันนับแต่วันทราบพฤติการณ์อันเป็นมูลแห่งข้ออ้างนั้น เพื่อให้ศาลมีคำสั่งให้บุคคลเช่นว่านั้นรับผิดในค่าฤชาธรรมเนียมดังกล่าว คำสั่งของศาลตามมาตรานี้ให้อุทธรณ์ไปยังศาลอุทธรณ์ได้ และคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ให้เป็นที่สุด"],"text":"บุคคลใดทำให้ต้องเสียค่าฤชาธรรมเนียมในการบังคับคดีส่วนใดโดยไม่จำเป็น หรือมีลักษณะประวิงการบังคับคดี หรือที่ต้องดำเนินไปเพราะความผิดหรือความประมาทเลินเล่ออย่างร้ายแรง หรือเพราะบังคับคดีไปโดยไม่สุจริตก่อนการบังคับคดีได้เสร็จลง ผู้ที่ได้รับความเสียหายหรือลูกหนี้ตามคำพิพากษา แล้วแต่กรณี อาจยื่นคำร้องต่อศาลภายในเจ็ดวันนับแต่วันทราบพฤติการณ์อันเป็นมูลแห่งข้ออ้างนั้น เพื่อให้ศาลมีคำสั่งให้บุคคลเช่นว่านั้นรับผิดในค่าฤชาธรรมเนียมดังกล่าว คำสั่งของศาลตามมาตรานี้ให้อุทธรณ์ไปยังศาลอุทธรณ์ได้ และคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ให้เป็นที่สุด"},{"id":"๑๗๐","num":"มาตรา ๑๗๐","num_ara":"๑๗๐","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["ห้ามมิให้ฟ้อง พิจารณาและชี้ขาดตัดสินคดีเป็นครั้งแรกในศาลหรือโดยศาลอื่นนอกจากศาลชั้นต้น เว้นแต่จะมีกฎหมายบัญญัติไว้ชัดแจ้งเป็นอย่างอื่น ภายใต้บังคับแห่งบทบัญญัติในภาคนี้ว่าด้วยคดีไม่มีข้อพิพาท คดีโม่นาสาเร่ คดีขาดนัด และคดีที่มอบให้อนุญาโตตุลาการชี้ขาด การฟ้อง การพิจารณาและชี้ขาดตัดสินคดีในศาลชั้นต้น นอกจากจะต้องบังคับตามบทบัญญัติทั่วไปแห่งภาค ๑ แล้ว ให้บังคับตามบทบัญญัติในลักษณะนี้ด้วย"],"text":"ห้ามมิให้ฟ้อง พิจารณาและชี้ขาดตัดสินคดีเป็นครั้งแรกในศาลหรือโดยศาลอื่นนอกจากศาลชั้นต้น เว้นแต่จะมีกฎหมายบัญญัติไว้ชัดแจ้งเป็นอย่างอื่น ภายใต้บังคับแห่งบทบัญญัติในภาคนี้ว่าด้วยคดีไม่มีข้อพิพาท คดีโม่นาสาเร่ คดีขาดนัด และคดีที่มอบให้อนุญาโตตุลาการชี้ขาด การฟ้อง การพิจารณาและชี้ขาดตัดสินคดีในศาลชั้นต้น นอกจากจะต้องบังคับตามบทบัญญัติทั่วไปแห่งภาค ๑ แล้ว ให้บังคับตามบทบัญญัติในลักษณะนี้ด้วย"},{"id":"๑๗๑","num":"มาตรา ๑๗๑","num_ara":"๑๗๑","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["คดีที่ประมวลกฎหมายนี้บัญญัติว่าจะฟ้องยังศาลชั้นต้น หรือจะเสนอปัญหาต่อศาลชั้นต้นเพื่อชี้ขาดตัดสิน โดยทำเป็นคำร้องขอก็ได้นั้น ให้นำบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยสิทธิและหน้าที่ของโจทก์และจำเลย และวิธีพิจารณาที่ต่อจากการยื่นคำฟ้องมาใช้บังคับแก่ผู้ยื่นคำขอและคู่ความอีกฝ่ายหนึ่ง ถ้าหากมี และบังคับแก่วิธีพิจารณาที่ต่อจากการยื่นคำร้องขอด้วยโดยอนุโลม"],"text":"คดีที่ประมวลกฎหมายนี้บัญญัติว่าจะฟ้องยังศาลชั้นต้น หรือจะเสนอปัญหาต่อศาลชั้นต้นเพื่อชี้ขาดตัดสิน โดยทำเป็นคำร้องขอก็ได้นั้น ให้นำบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยสิทธิและหน้าที่ของโจทก์และจำเลย และวิธีพิจารณาที่ต่อจากการยื่นคำฟ้องมาใช้บังคับแก่ผู้ยื่นคำขอและคู่ความอีกฝ่ายหนึ่ง ถ้าหากมี และบังคับแก่วิธีพิจารณาที่ต่อจากการยื่นคำร้องขอด้วยโดยอนุโลม"},{"id":"๑๗๒","num":"มาตรา ๑๗๒","num_ara":"๑๗๒","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["ภายใต้บังคับบทบัญญัติมาตรา ๕๗ ให้โจทก์เสนอข้อหาของตนโดยทำคำฟ้องเป็นหนังสือยื่นต่อศาลชั้นต้น คำฟ้องต้องแสดงโดยแจ้งชัดซึ่งสภาพแห่งข้อหาของโจทก์และคำขอบังคับ ทั้งข้ออ้างที่อาศัยเป็นหลักแห่งข้อหาเช่นว่านั้น ให้ศาลตรวจคำฟ้องนั้นแล้วสั่งให้รับไว้ หรือให้ยกเสียหรือให้คืนไป ตามที่บัญญัติไว้ในมาตรา ๑๘"],"text":"ภายใต้บังคับบทบัญญัติมาตรา ๕๗ ให้โจทก์เสนอข้อหาของตนโดยทำคำฟ้องเป็นหนังสือยื่นต่อศาลชั้นต้น คำฟ้องต้องแสดงโดยแจ้งชัดซึ่งสภาพแห่งข้อหาของโจทก์และคำขอบังคับ ทั้งข้ออ้างที่อาศัยเป็นหลักแห่งข้อหาเช่นว่านั้น ให้ศาลตรวจคำฟ้องนั้นแล้วสั่งให้รับไว้ หรือให้ยกเสียหรือให้คืนไป ตามที่บัญญัติไว้ในมาตรา ๑๘"},{"id":"๑๗๓","num":"มาตรา ๑๗๓","num_ara":"๑๗๓","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["เมื่อศาลได้รับคำฟ้องแล้ว ให้ศาลออกหมายส่งสำเนาคำฟ้องให้แก่จำเลยเพื่อแก้คดี และภายในกำหนดเจ็ดวันนับแต่วันยื่นคำฟ้อง ให้โจทก์ร้องขอต่อพนักงานเจ้าหน้าที่เพื่อให้ส่งหมายนั้น นับแต่เวลาที่ได้ยื่นคำฟ้องแล้ว คดีนั้นอยู่ในระหว่างพิจารณา และผลแห่งการนี้","(๑) ห้ามไม่ให้โจทก์ยื่นคำฟ้องเรื่องเดียวกันนั้นต่อศาลเดียวกัน หรือต่อศาลอื่นและ (๒) ถ้ามีเหตุเปลี่ยนแปลงเกิดขึ้นในพฤติการณ์อันเกี่ยวด้วยการยื่นฟ้องคดีต่อศาลที่มีเขตศาลเหนือคดีนั้น เช่นการเปลี่ยนแปลงภูมิลำเนาของจำเลย การเปลี่ยนแปลงเช่นว่านี้หาตัดอำนาจศาลที่รับฟ้องคดีไว้ในอันที่จะพิจารณาและชี้ขาดตัดสินคดีนั้นไม่"],"text":"เมื่อศาลได้รับคำฟ้องแล้ว ให้ศาลออกหมายส่งสำเนาคำฟ้องให้แก่จำเลยเพื่อแก้คดี และภายในกำหนดเจ็ดวันนับแต่วันยื่นคำฟ้อง ให้โจทก์ร้องขอต่อพนักงานเจ้าหน้าที่เพื่อให้ส่งหมายนั้น นับแต่เวลาที่ได้ยื่นคำฟ้องแล้ว คดีนั้นอยู่ในระหว่างพิจารณา และผลแห่งการนี้\n\n(๑) ห้ามไม่ให้โจทก์ยื่นคำฟ้องเรื่องเดียวกันนั้นต่อศาลเดียวกัน หรือต่อศาลอื่นและ (๒) ถ้ามีเหตุเปลี่ยนแปลงเกิดขึ้นในพฤติการณ์อันเกี่ยวด้วยการยื่นฟ้องคดีต่อศาลที่มีเขตศาลเหนือคดีนั้น เช่นการเปลี่ยนแปลงภูมิลำเนาของจำเลย การเปลี่ยนแปลงเช่นว่านี้หาตัดอำนาจศาลที่รับฟ้องคดีไว้ในอันที่จะพิจารณาและชี้ขาดตัดสินคดีนั้นไม่"},{"id":"๑๗๔","num":"มาตรา ๑๗๔","num_ara":"๑๗๔","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["ในกรณีต่อไปนี้ให้ถือว่าโจทก์ได้ทิ้งฟ้อง คือ","(๑) ภายหลังที่ได้เสนอคำฟ้องแล้ว โจทก์เพิกเฉยไม่ร้องขอต่อพนักงานเจ้าหน้าที่เพื่อให้ส่งหมายเรียกให้แก้คดีแก่จำเลย และไม่แจ้งให้ศาลทราบเหตุแห่งการเพิกเฉยเช่นว่านั้นภายในกำหนดเจ็ดวันนับแต่วันยื่นคำฟ้อง (๒) โจทก์เพิกเฉยไม่ดำเนินคดีภายในเวลาตามที่ศาลเห็นสมควรกำหนดไว้เพื่อการนั้นโดยได้ส่งคำสั่งให้แก่โจทก์โดยชอบแล้ว"],"text":"ในกรณีต่อไปนี้ให้ถือว่าโจทก์ได้ทิ้งฟ้อง คือ\n\n(๑) ภายหลังที่ได้เสนอคำฟ้องแล้ว โจทก์เพิกเฉยไม่ร้องขอต่อพนักงานเจ้าหน้าที่เพื่อให้ส่งหมายเรียกให้แก้คดีแก่จำเลย และไม่แจ้งให้ศาลทราบเหตุแห่งการเพิกเฉยเช่นว่านั้นภายในกำหนดเจ็ดวันนับแต่วันยื่นคำฟ้อง (๒) โจทก์เพิกเฉยไม่ดำเนินคดีภายในเวลาตามที่ศาลเห็นสมควรกำหนดไว้เพื่อการนั้นโดยได้ส่งคำสั่งให้แก่โจทก์โดยชอบแล้ว"},{"id":"๑๗๕","num":"มาตรา ๑๗๕","num_ara":"๑๗๕","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["ก่อนจำเลยยื่นคำให้การ โจทก์อาจถอนคำฟ้องได้โดยยื่นคำบอกกล่าวเป็นหนังสือต่อศาล ภายหลังจำเลยยื่นคำให้การแล้ว โจทก์อาจยื่นคำขอโดยทำเป็นคำร้องต่อศาลชั้นต้น เพื่ออนุญาตให้โจทก์ถอนคำฟ้องได้ ศาลจะอนุญาตหรือไม่อนุญาตหรืออนุญาตภายในเงื่อนไขตามที่เห็นสมควรก็ได้ แต่","(๑) ห้ามไม่ให้ศาลให้อนุญาต โดยมิได้ฟังจำเลยหรือผู้ร้องสอด ถ้าหากมี ก่อน (๒) ในกรณีที่โจทก์ถอนคำฟ้อง เนื่องจากมีข้อตกลงหรือประนีประนอมยอมความกับจำเลย ให้ศาลอนุญาตไปตามคำขอนั้น"],"text":"ก่อนจำเลยยื่นคำให้การ โจทก์อาจถอนคำฟ้องได้โดยยื่นคำบอกกล่าวเป็นหนังสือต่อศาล ภายหลังจำเลยยื่นคำให้การแล้ว โจทก์อาจยื่นคำขอโดยทำเป็นคำร้องต่อศาลชั้นต้น เพื่ออนุญาตให้โจทก์ถอนคำฟ้องได้ ศาลจะอนุญาตหรือไม่อนุญาตหรืออนุญาตภายในเงื่อนไขตามที่เห็นสมควรก็ได้ แต่\n\n(๑) ห้ามไม่ให้ศาลให้อนุญาต โดยมิได้ฟังจำเลยหรือผู้ร้องสอด ถ้าหากมี ก่อน (๒) ในกรณีที่โจทก์ถอนคำฟ้อง เนื่องจากมีข้อตกลงหรือประนีประนอมยอมความกับจำเลย ให้ศาลอนุญาตไปตามคำขอนั้น"},{"id":"๑๗๖","num":"มาตรา ๑๗๖","num_ara":"๑๗๖","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["การทิ้งคำฟ้องหรือถอนคำฟ้องย่อมลบล้างผลแห่งการยื่นคำฟ้องนั้น รวมทั้งกระบวนพิจารณาอื่น ๆ อันมีมาต่อภายหลังยื่นคำฟ้อง และกระทำให้คู่ความกลับคืนเข้าสู่ฐานะเดิมเสมือนหนึ่งมิได้มีการยื่นฟ้องเลย แต่ว่าคำฟ้องใด ๆ ที่ได้ทิ้งหรือถอนแล้ว อาจยื่นใหม่ได้ ภายใต้บังคับแห่งบทบัญญัติของกฎหมายว่าด้วยอายุความ"],"text":"การทิ้งคำฟ้องหรือถอนคำฟ้องย่อมลบล้างผลแห่งการยื่นคำฟ้องนั้น รวมทั้งกระบวนพิจารณาอื่น ๆ อันมีมาต่อภายหลังยื่นคำฟ้อง และกระทำให้คู่ความกลับคืนเข้าสู่ฐานะเดิมเสมือนหนึ่งมิได้มีการยื่นฟ้องเลย แต่ว่าคำฟ้องใด ๆ ที่ได้ทิ้งหรือถอนแล้ว อาจยื่นใหม่ได้ ภายใต้บังคับแห่งบทบัญญัติของกฎหมายว่าด้วยอายุความ"},{"id":"๑๗๗","num":"มาตรา ๑๗๗","num_ara":"๑๗๗","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["เมื่อได้ส่งหมายเรียกและคำฟ้องให้จำเลยแล้ว ให้จำเลยทำคำให้การเป็นหนังสือยื่นต่อศาลภายในสิบห้าวัน ให้จำเลยแสดงโดยชัดแจงในคำให้การว่า จำเลยยอมรับหรือปฏิเสธข้ออ้างของโจทก์ทั้งสิ้นหรือแต่บางส่วน รวมทั้งเหตุแห่งการนั้น จำเลยจะฟ้องแย้งมาในคำให้การก็ได้ แต่ถ้าฟ้องแย้งนั้นเป็นเรื่องอื่นไม่เกี่ยวกับคำฟ้องเดิมแล้ว ให้ศาลสั่งให้จำเลยฟ้องเป็นคดีต่างหาก ให้ศาลตรวจดูคำให้การนั้นแล้วสั่งให้รับไว้ หรือให้คืนไปหรือสั่งไม่รับตามที่บัญญัติไว้ในมาตรา ๑๘ บทบัญญัติแห่งมาตรานี้ ให้ใช้บังคับแก่บุคคลภายนอกที่ถูกเรียกเข้ามาเป็นผู้ร้องสอดตามมาตรา ๕๗ (๓) โดยอนุโลม"],"text":"เมื่อได้ส่งหมายเรียกและคำฟ้องให้จำเลยแล้ว ให้จำเลยทำคำให้การเป็นหนังสือยื่นต่อศาลภายในสิบห้าวัน ให้จำเลยแสดงโดยชัดแจงในคำให้การว่า จำเลยยอมรับหรือปฏิเสธข้ออ้างของโจทก์ทั้งสิ้นหรือแต่บางส่วน รวมทั้งเหตุแห่งการนั้น จำเลยจะฟ้องแย้งมาในคำให้การก็ได้ แต่ถ้าฟ้องแย้งนั้นเป็นเรื่องอื่นไม่เกี่ยวกับคำฟ้องเดิมแล้ว ให้ศาลสั่งให้จำเลยฟ้องเป็นคดีต่างหาก ให้ศาลตรวจดูคำให้การนั้นแล้วสั่งให้รับไว้ หรือให้คืนไปหรือสั่งไม่รับตามที่บัญญัติไว้ในมาตรา ๑๘ บทบัญญัติแห่งมาตรานี้ ให้ใช้บังคับแก่บุคคลภายนอกที่ถูกเรียกเข้ามาเป็นผู้ร้องสอดตามมาตรา ๕๗ (๓) โดยอนุโลม"},{"id":"๑๗๘","num":"มาตรา ๑๗๘","num_ara":"๑๗๘","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["ถ้าจำเลยฟ้องแย้งรวมในคำให้การ ให้โจทก์ทำคำให้การแก้ฟ้องแย้งยื่นต่อศาลภายในสิบห้าวันนับแต่วันที่ได้ส่งคำให้การถึงโจทก์ บทบัญญัติแห่งมาตราก่อน ให้ใช้บังคับแก่คำให้การแก้ฟ้องแย้งนี้โดยอนุโลม"],"text":"ถ้าจำเลยฟ้องแย้งรวมในคำให้การ ให้โจทก์ทำคำให้การแก้ฟ้องแย้งยื่นต่อศาลภายในสิบห้าวันนับแต่วันที่ได้ส่งคำให้การถึงโจทก์ บทบัญญัติแห่งมาตราก่อน ให้ใช้บังคับแก่คำให้การแก้ฟ้องแย้งนี้โดยอนุโลม"},{"id":"๑๗๙","num":"มาตรา ๑๗๙","num_ara":"๑๗๙","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["โจทก์หรือจำเลยจะแก้ไขข้อหา ข้อต่อสู้ข้ออ้าง หรือข้อเถียง อันกล่าวไว้ในคำฟ้องหรือคำให้การที่เสนอต่อศาลแต่แรกก็ได้ การแก้ไขนั้น โดยเฉพาะอาจเป็นการแก้ไขในข้อต่อไปนี้","(๑) เพิ่ม หรือลด จำนวนทุนทรัพย์ หรือราคาทรัพย์สินที่พิพาทในฟ้องเดิม หรือ (๒) สละข้อหาในฟ้องเดิมเสียบางข้อ หรือเพิ่มเติมฟ้องเดิมให้บริบูรณ์โดยวิธีเสนอคำฟ้องเพิ่มเติม หรือเสนอคำฟ้องเพื่อคุ้มครองสิทธิของตนในระหว่างการพิจารณาหรือเพื่อบังคับตามคำพิพากษาหรือคำสั่ง หรือ (๓) ยกข้อต่อสู้ขึ้นใหม่ เป็นข้อแก้ข้อหาเดิม หรือที่ยื่นภายหลัง หรือเปลี่ยนแปลงแก้ไขข้ออ้าง หรือข้อเถียงเพื่อสนับสนุนข้อหา หรือเพื่อหักล้างข้อหาของคู่ความอีกฝ่ายหนึ่ง แต่ห้ามมิให้คู่ความฝ่ายใดเสนอคำฟ้องใดต่อศาล ไม่ว่าโดยวิธีฟ้องเพิ่มเติมหรือฟ้องแย้ง ภายหลังที่ได้ยื่นคำฟ้องเดิมต่อศาลแล้ว เว้นแต่คำฟ้องเดิมและคำฟ้องภายหลังนี้จะเกี่ยวข้องกันพอที่จะรวมการพิจารณาและชี้ขาดตัดสินเข้าด้วยกันได้"],"text":"โจทก์หรือจำเลยจะแก้ไขข้อหา ข้อต่อสู้ข้ออ้าง หรือข้อเถียง อันกล่าวไว้ในคำฟ้องหรือคำให้การที่เสนอต่อศาลแต่แรกก็ได้ การแก้ไขนั้น โดยเฉพาะอาจเป็นการแก้ไขในข้อต่อไปนี้\n\n(๑) เพิ่ม หรือลด จำนวนทุนทรัพย์ หรือราคาทรัพย์สินที่พิพาทในฟ้องเดิม หรือ (๒) สละข้อหาในฟ้องเดิมเสียบางข้อ หรือเพิ่มเติมฟ้องเดิมให้บริบูรณ์โดยวิธีเสนอคำฟ้องเพิ่มเติม หรือเสนอคำฟ้องเพื่อคุ้มครองสิทธิของตนในระหว่างการพิจารณาหรือเพื่อบังคับตามคำพิพากษาหรือคำสั่ง หรือ (๓) ยกข้อต่อสู้ขึ้นใหม่ เป็นข้อแก้ข้อหาเดิม หรือที่ยื่นภายหลัง หรือเปลี่ยนแปลงแก้ไขข้ออ้าง หรือข้อเถียงเพื่อสนับสนุนข้อหา หรือเพื่อหักล้างข้อหาของคู่ความอีกฝ่ายหนึ่ง แต่ห้ามมิให้คู่ความฝ่ายใดเสนอคำฟ้องใดต่อศาล ไม่ว่าโดยวิธีฟ้องเพิ่มเติมหรือฟ้องแย้ง ภายหลังที่ได้ยื่นคำฟ้องเดิมต่อศาลแล้ว เว้นแต่คำฟ้องเดิมและคำฟ้องภายหลังนี้จะเกี่ยวข้องกันพอที่จะรวมการพิจารณาและชี้ขาดตัดสินเข้าด้วยกันได้"},{"id":"๑๘๐","num":"มาตรา ๑๘๐","num_ara":"๑๘๐","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["การแก้ไขคำฟ้องหรือคำให้การที่คู่ความเสนอต่อศาลไว้แล้ว ให้ทำเป็นคำร้องยื่นต่อศาลก่อนวันชี้สองสถาน หรือก่อนวันสืบพยานไม่น้อยกว่าเจ็ดวัน ในกรณีที่ไม่มีการชี้สองสถาน เว้นแต่มีเหตุอันสมควรที่ไม่อาจยื่นคำร้องได้ก่อนนั้นหรือเป็นการขอแก้ไขในเรื่องที่เกี่ยวกับความสงบเรียบร้อยของประชาชน หรือเป็นการแก้ไขข้อผิดพลาดเล็กน้อยหรือข้อผิดหลงเล็กน้อย"],"text":"การแก้ไขคำฟ้องหรือคำให้การที่คู่ความเสนอต่อศาลไว้แล้ว ให้ทำเป็นคำร้องยื่นต่อศาลก่อนวันชี้สองสถาน หรือก่อนวันสืบพยานไม่น้อยกว่าเจ็ดวัน ในกรณีที่ไม่มีการชี้สองสถาน เว้นแต่มีเหตุอันสมควรที่ไม่อาจยื่นคำร้องได้ก่อนนั้นหรือเป็นการขอแก้ไขในเรื่องที่เกี่ยวกับความสงบเรียบร้อยของประชาชน หรือเป็นการแก้ไขข้อผิดพลาดเล็กน้อยหรือข้อผิดหลงเล็กน้อย"},{"id":"๑๘๑","num":"มาตรา ๑๘๑","num_ara":"๑๘๑","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["เว้นแต่ในกรณีที่คำร้องนั้นอาจทำได้แต่ฝ่ายเดียว","(๑) ห้ามไม่ให้มีคำสั่งยอมรับการแก้ไข เว้นแต่จะได้ส่งสำเนาคำร้องให้แก่คู่ความอีกฝ่ายหนึ่งทราบล่วงหน้าอย่างน้อยสามวัน ก่อนกำหนดนัดพิจารณาคำร้องนั้น (๒) ห้ามมิให้ศาลพิพากษาหรือมีคำสั่งชี้ขาดในประเด็นที่คู่ความได้แก้ไขคำฟ้อง หรือคำให้การ เว้นแต่คู่ความอีกฝ่ายหนึ่งจะได้มีโอกาสบริบูรณ์ในอันที่จะตรวจโต้แย้งและหักล้างข้อหาหรือข้อต่อสู้ใหม่ หรือข้ออ้าง หรือข้อเถียงใหม่ที่กล่าวไว้ในคำร้องขอแก้ไขนั้น"],"text":"เว้นแต่ในกรณีที่คำร้องนั้นอาจทำได้แต่ฝ่ายเดียว\n\n(๑) ห้ามไม่ให้มีคำสั่งยอมรับการแก้ไข เว้นแต่จะได้ส่งสำเนาคำร้องให้แก่คู่ความอีกฝ่ายหนึ่งทราบล่วงหน้าอย่างน้อยสามวัน ก่อนกำหนดนัดพิจารณาคำร้องนั้น (๒) ห้ามมิให้ศาลพิพากษาหรือมีคำสั่งชี้ขาดในประเด็นที่คู่ความได้แก้ไขคำฟ้อง หรือคำให้การ เว้นแต่คู่ความอีกฝ่ายหนึ่งจะได้มีโอกาสบริบูรณ์ในอันที่จะตรวจโต้แย้งและหักล้างข้อหาหรือข้อต่อสู้ใหม่ หรือข้ออ้าง หรือข้อเถียงใหม่ที่กล่าวไว้ในคำร้องขอแก้ไขนั้น"},{"id":"๑๘๒","num":"มาตรา ๑๘๒","num_ara":"๑๘๒","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["เมื่อได้ยื่นคำฟ้อง คำให้การ และคำให้การแก้ฟ้องแย้ง ถ้าหากมี แล้วให้ศาลทำการชี้สองสถานโดยแจ้งกำหนดวันชี้สองสถานให้คู่ความทราบล่วงหน้าไม่น้อยกว่าสิบห้าวัน เว้นแต่ในกรณีดังต่อไปนี้","(๑) จำเลยคนใดคนหนึ่งขาดนัดยื่นคำให้การ (๒) คำให้การของจำเลยเป็นการยอมรับโดยชัดแจ้งตามคำฟ้องโจทก์ทั้งสิ้น (๓) คำให้การของจำเลยเป็นคำให้การปฏิเสธข้ออ้างของโจทก์ทั้งสิ้น โดยไม่มีเหตุแห่งการปฏิเสธ ซึ่งศาลเห็นว่าไม่จำเป็นต้องมีการชี้สองสถาน (๔) ศาลเห็นสมควรวินิจฉัยชี้ขาดคดีให้เสร็จไปทั้งเรื่องโดยไม่ต้องสืบพยาน (๕) คดีมโนสาเร่ตามมาตรา ๑๘๙ หรือคดีไม่มีข้อยุ่งยากตามมาตรา ๑๙๖ (๖) คดีที่ศาลเห็นว่ามีประเด็นข้อพิพาทไม่ยุ่งยากหรือไม่จำเป็นที่จะต้องชี้สองสถาน ในกรณีที่ไม่ต้องมีการชี้สองสถาน ให้ศาลมีคำสั่งงดการชี้สองสถานและกำหนดวันสืบพยาน ถ้าหากมี แล้วให้ส่งคำสั่งดังกล่าวให้คู่ความทราบตามมาตรา ๑๘๔ เว้นแต่คู่ความฝ่ายใดจะได้ทราบหรือถือว่าได้ทราบคำสั่งดังกล่าวแล้ว คู่ความอาจตกลงกันกะประเด็นข้อพิพาทโดยยื่นคำแถลงร่วมกันต่อศาลในกรณีเช่นว่านี้ ให้กำหนดประเด็นข้อพิพาทไปตามนั้น แต่ถ้าศาลเห็นว่าคำแถลงนั้นไม่ถูกต้อง ก็ให้ศาลมีอำนาจที่จะมีคำสั่งยกคำแถลงนั้น แล้วดำเนินการชี้สองสถานไปตามมาตรา ๑๘๓"],"text":"เมื่อได้ยื่นคำฟ้อง คำให้การ และคำให้การแก้ฟ้องแย้ง ถ้าหากมี แล้วให้ศาลทำการชี้สองสถานโดยแจ้งกำหนดวันชี้สองสถานให้คู่ความทราบล่วงหน้าไม่น้อยกว่าสิบห้าวัน เว้นแต่ในกรณีดังต่อไปนี้\n\n(๑) จำเลยคนใดคนหนึ่งขาดนัดยื่นคำให้การ (๒) คำให้การของจำเลยเป็นการยอมรับโดยชัดแจ้งตามคำฟ้องโจทก์ทั้งสิ้น (๓) คำให้การของจำเลยเป็นคำให้การปฏิเสธข้ออ้างของโจทก์ทั้งสิ้น โดยไม่มีเหตุแห่งการปฏิเสธ ซึ่งศาลเห็นว่าไม่จำเป็นต้องมีการชี้สองสถาน (๔) ศาลเห็นสมควรวินิจฉัยชี้ขาดคดีให้เสร็จไปทั้งเรื่องโดยไม่ต้องสืบพยาน (๕) คดีมโนสาเร่ตามมาตรา ๑๘๙ หรือคดีไม่มีข้อยุ่งยากตามมาตรา ๑๙๖ (๖) คดีที่ศาลเห็นว่ามีประเด็นข้อพิพาทไม่ยุ่งยากหรือไม่จำเป็นที่จะต้องชี้สองสถาน ในกรณีที่ไม่ต้องมีการชี้สองสถาน ให้ศาลมีคำสั่งงดการชี้สองสถานและกำหนดวันสืบพยาน ถ้าหากมี แล้วให้ส่งคำสั่งดังกล่าวให้คู่ความทราบตามมาตรา ๑๘๔ เว้นแต่คู่ความฝ่ายใดจะได้ทราบหรือถือว่าได้ทราบคำสั่งดังกล่าวแล้ว คู่ความอาจตกลงกันกะประเด็นข้อพิพาทโดยยื่นคำแถลงร่วมกันต่อศาลในกรณีเช่นว่านี้ ให้กำหนดประเด็นข้อพิพาทไปตามนั้น แต่ถ้าศาลเห็นว่าคำแถลงนั้นไม่ถูกต้อง ก็ให้ศาลมีอำนาจที่จะมีคำสั่งยกคำแถลงนั้น แล้วดำเนินการชี้สองสถานไปตามมาตรา ๑๘๓"},{"id":"๑๘๒_ทวิ","num":"มาตรา ๑๘๒ ทวิ","num_ara":"๑๘๒ ทวิ","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["(ยกเลิก)"],"text":"(ยกเลิก)"},{"id":"๑๘๓","num":"มาตรา ๑๘๓","num_ara":"๑๘๓","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["ในวันชี้สองสถาน ให้คู่ความมาศาล และให้ศาลตรวจคำคู่ความและคำแถลงของคู่ความ แล้วนำข้ออ้าง ข้อเถียง ที่ปรากฏในคำคู่ความและคำแถลงของคู่ความเทียบกันดู และสอบถามคู่ความทุกฝ่ายถึงข้ออ้าง ข้อเถียง และพยานหลักฐานที่จะยื่นต่อศาลว่าฝ่ายใดยอมรับหรือโต้แย้งข้ออ้าง ข้อเถียงนั้นอย่างไร ข้อเท็จจริงใดที่คู่ความยอมรับกันก็เป็นอันยุติไปตามนั้น ส่วนข้อกฎหมายหรือข้อเท็จจริงที่คู่ความฝ่ายหนึ่งยกขึ้นอ้างแต่คู่ความฝ่ายอื่นไม่รับและเกี่ยวเนื่องโดยตรงกับประเด็นข้อพิพาทตามคำคู่ความให้ศาลกำหนดไว้เป็นประเด็นข้อพิพาท และกำหนดให้คู่ความฝ่ายใดนำพยานหลักฐานมาสืบในประเด็นข้อใดก่อนหรือหลังก็ได้ ในการสอบถามคู่ความตามวรรคหนึ่ง คู่ความแต่ละฝ่ายต้องตอบคำถามที่ศาลถามเองหรือถามตามคำขอของคู่ความฝ่ายอื่น เกี่ยวกับข้อเท็จจริงที่คู่ความฝ่ายอื่นยกขึ้นเป็นข้ออ้าง ข้อเถียง และพยานหลักฐานต่าง ๆ ที่คู่ความจะยื่นต่อศาล ถ้าคู่ความฝ่ายใดไม่ตอบคำถามเกี่ยวกับข้อเท็จจริงใด หรือปฏิเสธข้อเท็จจริงใดโดยไม่มีเหตุผลอันสมควร ให้ถือว่ายอมรับข้อเท็จจริงนั้นแล้ว เว้นแต่คู่ความฝ่ายนั้นไม่อยู่ในวิสัยที่จะตอบหรือแสดงเหตุผลแห่งการปฏิเสธได้ในขณะนั้น คู่ความมีสิทธิคัดค้านว่าประเด็นข้อพิพาทหรือหน้าที่นำสืบที่ศาลกำหนดไว้นั้นไม่ถูกต้อง โดยแถลงด้วยวาจาต่อศาลในขณะนั้นหรือยื่นคำร้องต่อศาลภายในเจ็ดวันนับแต่วันที่ศาลสั่งกำหนดประเด็นข้อพิพาทหรือหน้าที่นำสืบ ให้ศาลชี้ขาดคำคัดค้านนั้นก่อนวันสืบพยาน คำชี้ขาดคำคัดค้านดังกล่าวให้อยู่ภายใต้บังคับมาตรา ๒๒๖"],"text":"ในวันชี้สองสถาน ให้คู่ความมาศาล และให้ศาลตรวจคำคู่ความและคำแถลงของคู่ความ แล้วนำข้ออ้าง ข้อเถียง ที่ปรากฏในคำคู่ความและคำแถลงของคู่ความเทียบกันดู และสอบถามคู่ความทุกฝ่ายถึงข้ออ้าง ข้อเถียง และพยานหลักฐานที่จะยื่นต่อศาลว่าฝ่ายใดยอมรับหรือโต้แย้งข้ออ้าง ข้อเถียงนั้นอย่างไร ข้อเท็จจริงใดที่คู่ความยอมรับกันก็เป็นอันยุติไปตามนั้น ส่วนข้อกฎหมายหรือข้อเท็จจริงที่คู่ความฝ่ายหนึ่งยกขึ้นอ้างแต่คู่ความฝ่ายอื่นไม่รับและเกี่ยวเนื่องโดยตรงกับประเด็นข้อพิพาทตามคำคู่ความให้ศาลกำหนดไว้เป็นประเด็นข้อพิพาท และกำหนดให้คู่ความฝ่ายใดนำพยานหลักฐานมาสืบในประเด็นข้อใดก่อนหรือหลังก็ได้ ในการสอบถามคู่ความตามวรรคหนึ่ง คู่ความแต่ละฝ่ายต้องตอบคำถามที่ศาลถามเองหรือถามตามคำขอของคู่ความฝ่ายอื่น เกี่ยวกับข้อเท็จจริงที่คู่ความฝ่ายอื่นยกขึ้นเป็นข้ออ้าง ข้อเถียง และพยานหลักฐานต่าง ๆ ที่คู่ความจะยื่นต่อศาล ถ้าคู่ความฝ่ายใดไม่ตอบคำถามเกี่ยวกับข้อเท็จจริงใด หรือปฏิเสธข้อเท็จจริงใดโดยไม่มีเหตุผลอันสมควร ให้ถือว่ายอมรับข้อเท็จจริงนั้นแล้ว เว้นแต่คู่ความฝ่ายนั้นไม่อยู่ในวิสัยที่จะตอบหรือแสดงเหตุผลแห่งการปฏิเสธได้ในขณะนั้น คู่ความมีสิทธิคัดค้านว่าประเด็นข้อพิพาทหรือหน้าที่นำสืบที่ศาลกำหนดไว้นั้นไม่ถูกต้อง โดยแถลงด้วยวาจาต่อศาลในขณะนั้นหรือยื่นคำร้องต่อศาลภายในเจ็ดวันนับแต่วันที่ศาลสั่งกำหนดประเด็นข้อพิพาทหรือหน้าที่นำสืบ ให้ศาลชี้ขาดคำคัดค้านนั้นก่อนวันสืบพยาน คำชี้ขาดคำคัดค้านดังกล่าวให้อยู่ภายใต้บังคับมาตรา ๒๒๖"},{"id":"๑๘๓_ทวิ","num":"มาตรา ๑๘๓ ทวิ","num_ara":"๑๘๓ ทวิ","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["ในกรณีที่คู่ความทุกฝ่ายหรือฝ่ายใดฝ่ายหนึ่งไม่มาศาลในวันชี้สองสถาน ให้ศาลทำการชี้สองสถานโดยให้ถือว่าคู่ความที่ไม่มาศาลได้ทราบกระบวนพิจารณาในวันนั้นแล้ว คู่ความที่ไม่มาศาลนั้นไม่มีสิทธิคัดค้านว่าประเด็นข้อพิพาทและหน้าที่นำสืบที่ศาลกำหนดไว้นั้นไม่ถูกต้อง เว้นแต่เป็นกรณีที่ไม่สามารถมาศาลได้ในวันชี้สองสถาน เพราะเหตุจำเป็นอันไม่อาจก้าวล่วงได้ หรือเป็นการคัดค้านในเรื่องที่เกี่ยวกับความสงบเรียบร้อยของประชาชน ในกรณีเช่นนี้ให้นำมาตรา ๑๘๓ วรรคสาม มาใช้บังคับโดยอนุโลม"],"text":"ในกรณีที่คู่ความทุกฝ่ายหรือฝ่ายใดฝ่ายหนึ่งไม่มาศาลในวันชี้สองสถาน ให้ศาลทำการชี้สองสถานโดยให้ถือว่าคู่ความที่ไม่มาศาลได้ทราบกระบวนพิจารณาในวันนั้นแล้ว คู่ความที่ไม่มาศาลนั้นไม่มีสิทธิคัดค้านว่าประเด็นข้อพิพาทและหน้าที่นำสืบที่ศาลกำหนดไว้นั้นไม่ถูกต้อง เว้นแต่เป็นกรณีที่ไม่สามารถมาศาลได้ในวันชี้สองสถาน เพราะเหตุจำเป็นอันไม่อาจก้าวล่วงได้ หรือเป็นการคัดค้านในเรื่องที่เกี่ยวกับความสงบเรียบร้อยของประชาชน ในกรณีเช่นนี้ให้นำมาตรา ๑๘๓ วรรคสาม มาใช้บังคับโดยอนุโลม"},{"id":"๑๘๓_ตรี","num":"มาตรา ๑๘๓ ตรี","num_ara":"๑๘๓ ตรี","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["(ยกเลิก)"],"text":"(ยกเลิก)"},{"id":"๑๘๓_จัตวา","num":"มาตรา ๑๘๓ จัตวา","num_ara":"๑๘๓ จัตวา","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["(ยกเลิก)"],"text":"(ยกเลิก)"},{"id":"๑๘๔","num":"มาตรา ๑๘๔","num_ara":"๑๘๔","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["ในกรณีที่มีการชี้สองสถาน ให้ศาลกำหนดวันสืบพยานซึ่งมีระยะเวลาไม่น้อยกว่าสิบวันนับแต่วันชี้สองสถาน ในกรณีที่ไม่มีการชี้สองสถาน ให้ศาลออกกฎหมายกำหนดวันสืบพยานส่งให้แก่คู่ความทราบล่วงหน้าไม่น้อยกว่าสิบวัน"],"text":"ในกรณีที่มีการชี้สองสถาน ให้ศาลกำหนดวันสืบพยานซึ่งมีระยะเวลาไม่น้อยกว่าสิบวันนับแต่วันชี้สองสถาน ในกรณีที่ไม่มีการชี้สองสถาน ให้ศาลออกกฎหมายกำหนดวันสืบพยานส่งให้แก่คู่ความทราบล่วงหน้าไม่น้อยกว่าสิบวัน"},{"id":"๑๘๕","num":"มาตรา ๑๘๕","num_ara":"๑๘๕","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["ในวันนัดสืบพยาน เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอ ศาลจะอ่านให้คู่ความฟังซึ่งคำฟ้อง คำให้การ และคำให้การแก้ฟ้องแย้ง ถ้าหากมี หรือรายงานพิสดารแห่งการชี้สองสถาน แล้วแต่กรณี และคำร้องขอแก้ไขเพิ่มเติม (ที่ได้ยื่นต่อศาลและส่งไปให้แก่คู่ความแล้วโดยชอบ) ก็ได้ ภายใต้บังคับแห่งบทบัญญัติสามมาตราต่อไปนี้ ให้ศาลสืบพยานตามประเด็นในข้อพิพาทตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยพยานหลักฐาน และฟังคำแถลงการณ์ด้วยวาจาของคู่ความทั้งปวง"],"text":"ในวันนัดสืบพยาน เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งมีคำขอ ศาลจะอ่านให้คู่ความฟังซึ่งคำฟ้อง คำให้การ และคำให้การแก้ฟ้องแย้ง ถ้าหากมี หรือรายงานพิสดารแห่งการชี้สองสถาน แล้วแต่กรณี และคำร้องขอแก้ไขเพิ่มเติม (ที่ได้ยื่นต่อศาลและส่งไปให้แก่คู่ความแล้วโดยชอบ) ก็ได้ ภายใต้บังคับแห่งบทบัญญัติสามมาตราต่อไปนี้ ให้ศาลสืบพยานตามประเด็นในข้อพิพาทตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยพยานหลักฐาน และฟังคำแถลงการณ์ด้วยวาจาของคู่ความทั้งปวง"},{"id":"๑๘๖","num":"มาตรา ๑๘๖","num_ara":"๑๘๖","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["เมื่อสืบพยานเสร็จแล้วให้ศาลอนุญาตให้โจทก์แถลงการณ์ด้วยวาจาก่อน แล้วจึงให้จำเลยแถลงการณ์ด้วยวาจาทบทวน ข้อเถียง แสดงผลแห่งพยานหลักฐานในประเด็นที่พิพาท ต่อจากนี้ให้ศาลอนุญาตให้โจทก์แถลงตอบจำเลยได้อีกครั้งหนึ่ง นอกจากนี้ห้ามไม่ให้คู่ความแถลงการณ์ด้วยวาจาอย่างใดอีก เว้นแต่จะได้รับอนุญาตจากศาล ก่อนพิพากษาคดี ไม่ว่าคู่ความฝ่ายใดจะได้แถลงการณ์ด้วยวาจาแล้วหรือไม่ คู่ความฝ่ายนั้นจะยื่นคำแถลงการณ์เป็นหนังสือต่อศาลก็ได้ แต่ต้องส่งสำเนานั้น ๆ ไปยังคู่ความอื่น ๆ"],"text":"เมื่อสืบพยานเสร็จแล้วให้ศาลอนุญาตให้โจทก์แถลงการณ์ด้วยวาจาก่อน แล้วจึงให้จำเลยแถลงการณ์ด้วยวาจาทบทวน ข้อเถียง แสดงผลแห่งพยานหลักฐานในประเด็นที่พิพาท ต่อจากนี้ให้ศาลอนุญาตให้โจทก์แถลงตอบจำเลยได้อีกครั้งหนึ่ง นอกจากนี้ห้ามไม่ให้คู่ความแถลงการณ์ด้วยวาจาอย่างใดอีก เว้นแต่จะได้รับอนุญาตจากศาล ก่อนพิพากษาคดี ไม่ว่าคู่ความฝ่ายใดจะได้แถลงการณ์ด้วยวาจาแล้วหรือไม่ คู่ความฝ่ายนั้นจะยื่นคำแถลงการณ์เป็นหนังสือต่อศาลก็ได้ แต่ต้องส่งสำเนานั้น ๆ ไปยังคู่ความอื่น ๆ"},{"id":"๑๘๗","num":"มาตรา ๑๘๗","num_ara":"๑๘๗","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["เมื่อได้สืบพยานตามที่จำเป็นและคู่ความได้แถลงการณ์ ถ้าหากมี เสร็จแล้ว ให้ถือว่าการพิจารณาเป็นอันสิ้นสุด แต่ตราบใดที่ยังมิได้มีคำพิพากษา ศาลอาจทำการพิจารณาต่อไปอีกได้ตามที่เห็นสมควร เพื่อประโยชน์แห่งความยุติธรรม"],"text":"เมื่อได้สืบพยานตามที่จำเป็นและคู่ความได้แถลงการณ์ ถ้าหากมี เสร็จแล้ว ให้ถือว่าการพิจารณาเป็นอันสิ้นสุด แต่ตราบใดที่ยังมิได้มีคำพิพากษา ศาลอาจทำการพิจารณาต่อไปอีกได้ตามที่เห็นสมควร เพื่อประโยชน์แห่งความยุติธรรม"},{"id":"๑๘๘","num":"มาตรา ๑๘๘","num_ara":"๑๘๘","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๑ วิธีพิจารณาสามัญในศาลชั้นต้น","section":"","subsection":"","paragraphs":["ในคดีที่ไม่มีข้อพิพาท ให้ใช้ข้อบังคับต่อไปนี้","(๑) ให้เริ่มคดีโดยยื่นคำร้องขอต่อศาล (๒) ศาลอาจเรียกพยานมาสืบได้เองตามที่เห็นจำเป็นและวินิจฉัยชี้ขาดตามที่เห็นสมควรและยุติธรรม (๓) ทางแก้แห่งคำพิพากษาหรือคำสั่งของศาลนั้นให้ใช้ได้แต่โดยวิธียื่นอุทธรณ์หรือฎีกาเท่านั้น และให้อุทธรณ์ฎีกาได้แต่เฉพาะในสองกรณีต่อไปนี้ (ก) ถ้าศาลได้ยกคำร้องขอของคู่ความฝ่ายที่เริ่มคดีเสียทั้งหมดหรือแต่บางส่วน หรือ (ข) ในเหตุที่มิได้ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการพิจารณาหรือพิพากษาหรือคำสั่ง (๔) ถ้าบุคคลอื่นใดนอกจากคู่ความที่ได้ยื่นฟ้องคดีอันไม่มีข้อพิพาทได้เข้ามาเกี่ยวข้องในคดีโดยตรงหรือโดยอ้อม ให้ถือว่าบุคคลเช่นว่ามานี้เป็นคู่ความ และให้ดำเนินคดีไปตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยคดีอันมีข้อพิพาท แต่ในคดีที่ยื่นคำร้องขอต่อศาล เพื่อให้ศาลมีคำพิพากษาหรือคำสั่งให้คำอนุญาตที่ผู้แทนโดยชอบธรรมได้ปฏิเสธเสีย หรือให้ศาลมีคำพิพากษาหรือคำสั่งถอนคืนคำอนุญาตอันได้ให้ไว้แก่ผู้ไร้ความสามารถนั้น ให้ถือว่าเป็นคดีไม่มีข้อพิพาท แม้ถึงว่าผู้แทนโดยชอบธรรมหรือผู้ไร้ความสามารถนั้นจะได้มาศาล และแสดงข้อคัดค้านในการให้คำอนุญาตหรือถอนคืนคำอนุญาตเช่นว่านั้น"],"text":"ในคดีที่ไม่มีข้อพิพาท ให้ใช้ข้อบังคับต่อไปนี้\n\n(๑) ให้เริ่มคดีโดยยื่นคำร้องขอต่อศาล (๒) ศาลอาจเรียกพยานมาสืบได้เองตามที่เห็นจำเป็นและวินิจฉัยชี้ขาดตามที่เห็นสมควรและยุติธรรม (๓) ทางแก้แห่งคำพิพากษาหรือคำสั่งของศาลนั้นให้ใช้ได้แต่โดยวิธียื่นอุทธรณ์หรือฎีกาเท่านั้น และให้อุทธรณ์ฎีกาได้แต่เฉพาะในสองกรณีต่อไปนี้ (ก) ถ้าศาลได้ยกคำร้องขอของคู่ความฝ่ายที่เริ่มคดีเสียทั้งหมดหรือแต่บางส่วน หรือ (ข) ในเหตุที่มิได้ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการพิจารณาหรือพิพากษาหรือคำสั่ง (๔) ถ้าบุคคลอื่นใดนอกจากคู่ความที่ได้ยื่นฟ้องคดีอันไม่มีข้อพิพาทได้เข้ามาเกี่ยวข้องในคดีโดยตรงหรือโดยอ้อม ให้ถือว่าบุคคลเช่นว่ามานี้เป็นคู่ความ และให้ดำเนินคดีไปตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยคดีอันมีข้อพิพาท แต่ในคดีที่ยื่นคำร้องขอต่อศาล เพื่อให้ศาลมีคำพิพากษาหรือคำสั่งให้คำอนุญาตที่ผู้แทนโดยชอบธรรมได้ปฏิเสธเสีย หรือให้ศาลมีคำพิพากษาหรือคำสั่งถอนคืนคำอนุญาตอันได้ให้ไว้แก่ผู้ไร้ความสามารถนั้น ให้ถือว่าเป็นคดีไม่มีข้อพิพาท แม้ถึงว่าผู้แทนโดยชอบธรรมหรือผู้ไร้ความสามารถนั้นจะได้มาศาล และแสดงข้อคัดค้านในการให้คำอนุญาตหรือถอนคืนคำอนุญาตเช่นว่านั้น"},{"id":"๑๘๙","num":"มาตรา ๑๘๙","num_ara":"๑๘๙","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["คดีมโนสาเร่ คือ","(๑) คดีที่มีคำขอให้ปลดเปลื้องทุกข์อันอาจคำนวณเป็นราคาเงินได้ไม่เกินสี่หมื่นบาทหรือไม่เกินจำนวนที่กำหนดในพระราชกฤษฎีกา (๒) คดีฟ้องขับไล่บุคคลใด ๆ ออกจากอสังหาริมทรัพย์อันมีค่าเช่าหรืออาจให้เช่าได้ในขณะยื่นคำฟ้องไม่เกินเดือนละสี่พันบาทหรือไม่เกินจำนวนที่กำหนดในพระราชกฤษฎีกา"],"text":"คดีมโนสาเร่ คือ\n\n(๑) คดีที่มีคำขอให้ปลดเปลื้องทุกข์อันอาจคำนวณเป็นราคาเงินได้ไม่เกินสี่หมื่นบาทหรือไม่เกินจำนวนที่กำหนดในพระราชกฤษฎีกา (๒) คดีฟ้องขับไล่บุคคลใด ๆ ออกจากอสังหาริมทรัพย์อันมีค่าเช่าหรืออาจให้เช่าได้ในขณะยื่นคำฟ้องไม่เกินเดือนละสี่พันบาทหรือไม่เกินจำนวนที่กำหนดในพระราชกฤษฎีกา"},{"id":"๑๙๐","num":"มาตรา ๑๙๐","num_ara":"๑๙๐","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["จำนวนทุนทรัพย์หรือราคาอันพิพาทกันในคดีนั้น ให้คำนวณดังนี้","(๑) จำนวนทุนทรัพย์หรือราคานั้นให้คำนวณตามคำเรียกร้องของโจทก์ ส่วนดอกผลอันมิถึงกำหนดเกิดขึ้นในเวลายื่นคำฟ้องหรือค่าธรรมเนียมศาลซึ่งอาจเป็นอุปกรณ์รวมอยู่ในคำเรียกร้อง ห้ามไม่ให้คำนวณรวมเข้าด้วย (๒) ในกรณีมีข้อสงสัยหรือมีข้อโต้แย้ง จำนวนทุนทรัพย์หรือราคานั้น ให้ศาลกะประมาณตามที่เป็นอยู่ในเวลายื่นฟ้องคดี (๓) คดีอันเกี่ยวด้วยทรัพย์สินที่มีข้อหาหลายข้อ อันมีจำนวนทุนทรัพย์หรือราคาไม่เกินสี่หมื่นบาท หรือไม่เกินจำนวนที่กำหนดในพระราชกฤษฎีกา ให้รวมจำนวนทุนทรัพย์หรือราคาเหล่านั้นเข้าด้วยกัน แต่ถ้าข้อหาเหล่านั้นจะต้องเรียกร้องเอาแก่จำเลยหลายคน ถึงแม้ว่าถ้ารวมความรับผิดของจำเลยหลายคนนั้นเข้าด้วยกันแล้วจะไม่เป็นคดีมโนสาเร่ก็ตาม ให้ถือเอาจำนวนที่เรียกร้องเอาจากจำเลยคนหนึ่ง ๆ นั้น เป็นประมาณแก่การที่จะถือว่าคดีนั้นเป็นคดีมโนสาเร่หรือไม่"],"text":"จำนวนทุนทรัพย์หรือราคาอันพิพาทกันในคดีนั้น ให้คำนวณดังนี้\n\n(๑) จำนวนทุนทรัพย์หรือราคานั้นให้คำนวณตามคำเรียกร้องของโจทก์ ส่วนดอกผลอันมิถึงกำหนดเกิดขึ้นในเวลายื่นคำฟ้องหรือค่าธรรมเนียมศาลซึ่งอาจเป็นอุปกรณ์รวมอยู่ในคำเรียกร้อง ห้ามไม่ให้คำนวณรวมเข้าด้วย (๒) ในกรณีมีข้อสงสัยหรือมีข้อโต้แย้ง จำนวนทุนทรัพย์หรือราคานั้น ให้ศาลกะประมาณตามที่เป็นอยู่ในเวลายื่นฟ้องคดี (๓) คดีอันเกี่ยวด้วยทรัพย์สินที่มีข้อหาหลายข้อ อันมีจำนวนทุนทรัพย์หรือราคาไม่เกินสี่หมื่นบาท หรือไม่เกินจำนวนที่กำหนดในพระราชกฤษฎีกา ให้รวมจำนวนทุนทรัพย์หรือราคาเหล่านั้นเข้าด้วยกัน แต่ถ้าข้อหาเหล่านั้นจะต้องเรียกร้องเอาแก่จำเลยหลายคน ถึงแม้ว่าถ้ารวมความรับผิดของจำเลยหลายคนนั้นเข้าด้วยกันแล้วจะไม่เป็นคดีมโนสาเร่ก็ตาม ให้ถือเอาจำนวนที่เรียกร้องเอาจากจำเลยคนหนึ่ง ๆ นั้น เป็นประมาณแก่การที่จะถือว่าคดีนั้นเป็นคดีมโนสาเร่หรือไม่"},{"id":"๑๙๐_ทวิ","num":"มาตรา ๑๙๐ ทวิ","num_ara":"๑๙๐ ทวิ","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["ในคดีมโนสาเร่ ให้ศาลดำเนินกระบวนพิจารณาไปตามบทบัญญัติในหมวดนี้"],"text":"ในคดีมโนสาเร่ ให้ศาลดำเนินกระบวนพิจารณาไปตามบทบัญญัติในหมวดนี้"},{"id":"๑๙๐_ตรี","num":"มาตรา ๑๙๐ ตรี","num_ara":"๑๙๐ ตรี","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["ในคดีมโนสาเร่ ให้ศาลมีอำนาจที่จะออกคำสั่งขยายหรือย่นระยะเวลาตามที่กำหนดไว้ในประมวลกฎหมายนี้หรือตามที่ศาลได้กำหนดไว้ หรือระยะเวลาที่เกี่ยวด้วยวิธีพิจารณาความแพ่งอันกำหนดไว้ในกฎหมายอื่น เพื่อให้ดำเนินหรือมิให้ดำเนินกระบวนพิจารณาใด ๆ ก่อนสิ้นระยะเวลานั้นได้ เมื่อมีความจำเป็นเพื่อประโยชน์แห่งความยุติธรรม"],"text":"ในคดีมโนสาเร่ ให้ศาลมีอำนาจที่จะออกคำสั่งขยายหรือย่นระยะเวลาตามที่กำหนดไว้ในประมวลกฎหมายนี้หรือตามที่ศาลได้กำหนดไว้ หรือระยะเวลาที่เกี่ยวด้วยวิธีพิจารณาความแพ่งอันกำหนดไว้ในกฎหมายอื่น เพื่อให้ดำเนินหรือมิให้ดำเนินกระบวนพิจารณาใด ๆ ก่อนสิ้นระยะเวลานั้นได้ เมื่อมีความจำเป็นเพื่อประโยชน์แห่งความยุติธรรม"},{"id":"๑๙๐_จัตวา","num":"มาตรา ๑๙๐ จัตวา","num_ara":"๑๙๐ จัตวา","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["ในคดีมโนสาเร่ ให้โจทก์เสียค่าขึ้นศาลตามตาราง ๑ ท้ายประมวลกฎหมายนี้ แต่ค่าขึ้นศาลรวมกันแล้วไม่เกินหนึ่งพันบาท ค่าขึ้นศาลในชั้นอุทธรณ์หรือฎีกานั้น ให้ผู้อุทธรณ์หรือผู้ฎีกาเสียตามจำนวนทุนทรัพย์ หรือราคาทรัพย์สินที่พิพาทกันในชั้นอุทธรณ์หรือฎีกา แล้วแต่กรณี"],"text":"ในคดีมโนสาเร่ ให้โจทก์เสียค่าขึ้นศาลตามตาราง ๑ ท้ายประมวลกฎหมายนี้ แต่ค่าขึ้นศาลรวมกันแล้วไม่เกินหนึ่งพันบาท ค่าขึ้นศาลในชั้นอุทธรณ์หรือฎีกานั้น ให้ผู้อุทธรณ์หรือผู้ฎีกาเสียตามจำนวนทุนทรัพย์ หรือราคาทรัพย์สินที่พิพาทกันในชั้นอุทธรณ์หรือฎีกา แล้วแต่กรณี"},{"id":"๑๙๑","num":"มาตรา ๑๙๑","num_ara":"๑๙๑","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["วิธีฟ้องคดีมโนสาเร่นั้น โจทก์อาจยื่นคำฟ้องเป็นหนังสือหรือมาแถลงข้อหาด้วยวาจาต่อศาลก็ได้ ในกรณีที่โจทก์ยื่นคำฟ้องเป็นหนังสือ หากศาลเห็นว่าคำฟ้องดังกล่าวไม่ถูกต้อง หรือขาดสาระสำคัญบางเรื่อง ศาลอาจมีคำสั่งให้โจทก์แก้ไขคำฟ้องในส่วนนั้นให้ถูกต้องหรือชัดเจนขึ้นก็ได้ ถ้าโจทก์มาแถลงข้อหาด้วยวาจาดังกล่าวแล้ว ให้ศาลบันทึกรายการแห่งข้อหาเหล่านั้นไว้ อ่านให้โจทก์ฟัง แล้วให้โจทก์ลงลายมือชื่อไว้เป็นสำคัญ"],"text":"วิธีฟ้องคดีมโนสาเร่นั้น โจทก์อาจยื่นคำฟ้องเป็นหนังสือหรือมาแถลงข้อหาด้วยวาจาต่อศาลก็ได้ ในกรณีที่โจทก์ยื่นคำฟ้องเป็นหนังสือ หากศาลเห็นว่าคำฟ้องดังกล่าวไม่ถูกต้อง หรือขาดสาระสำคัญบางเรื่อง ศาลอาจมีคำสั่งให้โจทก์แก้ไขคำฟ้องในส่วนนั้นให้ถูกต้องหรือชัดเจนขึ้นก็ได้ ถ้าโจทก์มาแถลงข้อหาด้วยวาจาดังกล่าวแล้ว ให้ศาลบันทึกรายการแห่งข้อหาเหล่านั้นไว้ อ่านให้โจทก์ฟัง แล้วให้โจทก์ลงลายมือชื่อไว้เป็นสำคัญ"},{"id":"๑๙๒","num":"มาตรา ๑๙๒","num_ara":"๑๙๒","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["เมื่อศาลเห็นว่าคดีที่ฟ้องไม่ใช่คดีมโนสาเร่และศาลนั้นมีเขตอำนาจที่จะพิจารณาคดีนั้นอย่างคดีสามัญได้ ถ้าคดีนั้นได้ฟ้องโดยคำแถลงด้วยวาจา ก็ให้ศาลมีคำสั่งให้โจทก์ยื่นคำฟ้องเป็นหนังสืออย่างคดีสามัญ แต่ถ้าคดีนั้นได้ยื่นคำฟ้องเป็นหนังสืออยู่แล้ว ห้ามมิให้ศาลออกหมายเรียกอย่างอื่นนอกจากที่บัญญัติไว้สำหรับคดีสามัญ ถ้าคดีนั้นไม่เป็นคดีมโนสาเร่ต่อไป เนื่องจากได้มีคำฟ้องเพิ่มเติมยื่นเข้ามาภายหลัง และศาลนั้นมีเขตอำนาจที่จะพิจารณาคดีนั้นอย่างคดีสามัญได้ ก็ให้ศาลดำเนินการพิจารณาไปอย่างคดีสามัญ ในกรณีใดกรณีหนึ่งดังกล่าวมาแล้ว ถ้าศาลไม่มีเขตอำนาจพิจารณาคดีนั้นอย่างคดีสามัญ ให้ศาลมีคำสั่งคืนคำฟ้องนั้นไปเพื่อยื่นต่อศาลที่มีเขตอำนาจ ในกรณีที่จำเลยฟ้องแย้งเข้ามาในคดีมโนสาเร่และฟ้องแย้งนั้นมิใช่คดีมโนสาเร่ หรือในกรณีที่ศาลมีคำสั่งให้พิจารณาคดีสามัญรวมกับคดีมโนสาเร่ ให้ศาลดำเนินการพิจารณาคดีมโนสาเร่ไปอย่างคดีสามัญ แต่เมื่อศาลพิจารณาถึงจำนวนทุนทรัพย์ ลักษณะคดี สถานะของคู่ความ หรือเหตุสมควรประการอื่นแล้วเห็นว่า การนำบทบัญญัติในหมวดนี้ไปใช้บังคับแก่คดีในส่วนของฟ้องแย้งหรือคดีสามัญเช่นว่านั้นจะทำให้การดำเนินคดีเป็นไปด้วยความรวดเร็วและเป็นธรรมแก่คู่ความทุกฝ่าย ก็ให้ศาลมีอำนาจพิจารณาคดีในส่วนของฟ้องแย้งหรือคดีสามัญนั้นอย่างคดีมโนสาเร่ได้ คำสั่งอย่างใดอย่างหนึ่งของศาลตามวรรคสี่ ไม่กระทบถึงค่าขึ้นศาลที่คู่ความแต่ละฝ่ายต้องชำระอยู่ก่อนที่ศาลจะมีคำสั่งเช่นว่านั้น"],"text":"เมื่อศาลเห็นว่าคดีที่ฟ้องไม่ใช่คดีมโนสาเร่และศาลนั้นมีเขตอำนาจที่จะพิจารณาคดีนั้นอย่างคดีสามัญได้ ถ้าคดีนั้นได้ฟ้องโดยคำแถลงด้วยวาจา ก็ให้ศาลมีคำสั่งให้โจทก์ยื่นคำฟ้องเป็นหนังสืออย่างคดีสามัญ แต่ถ้าคดีนั้นได้ยื่นคำฟ้องเป็นหนังสืออยู่แล้ว ห้ามมิให้ศาลออกหมายเรียกอย่างอื่นนอกจากที่บัญญัติไว้สำหรับคดีสามัญ ถ้าคดีนั้นไม่เป็นคดีมโนสาเร่ต่อไป เนื่องจากได้มีคำฟ้องเพิ่มเติมยื่นเข้ามาภายหลัง และศาลนั้นมีเขตอำนาจที่จะพิจารณาคดีนั้นอย่างคดีสามัญได้ ก็ให้ศาลดำเนินการพิจารณาไปอย่างคดีสามัญ ในกรณีใดกรณีหนึ่งดังกล่าวมาแล้ว ถ้าศาลไม่มีเขตอำนาจพิจารณาคดีนั้นอย่างคดีสามัญ ให้ศาลมีคำสั่งคืนคำฟ้องนั้นไปเพื่อยื่นต่อศาลที่มีเขตอำนาจ ในกรณีที่จำเลยฟ้องแย้งเข้ามาในคดีมโนสาเร่และฟ้องแย้งนั้นมิใช่คดีมโนสาเร่ หรือในกรณีที่ศาลมีคำสั่งให้พิจารณาคดีสามัญรวมกับคดีมโนสาเร่ ให้ศาลดำเนินการพิจารณาคดีมโนสาเร่ไปอย่างคดีสามัญ แต่เมื่อศาลพิจารณาถึงจำนวนทุนทรัพย์ ลักษณะคดี สถานะของคู่ความ หรือเหตุสมควรประการอื่นแล้วเห็นว่า การนำบทบัญญัติในหมวดนี้ไปใช้บังคับแก่คดีในส่วนของฟ้องแย้งหรือคดีสามัญเช่นว่านั้นจะทำให้การดำเนินคดีเป็นไปด้วยความรวดเร็วและเป็นธรรมแก่คู่ความทุกฝ่าย ก็ให้ศาลมีอำนาจพิจารณาคดีในส่วนของฟ้องแย้งหรือคดีสามัญนั้นอย่างคดีมโนสาเร่ได้ คำสั่งอย่างใดอย่างหนึ่งของศาลตามวรรคสี่ ไม่กระทบถึงค่าขึ้นศาลที่คู่ความแต่ละฝ่ายต้องชำระอยู่ก่อนที่ศาลจะมีคำสั่งเช่นว่านั้น"},{"id":"๑๙๓","num":"มาตรา ๑๙๓","num_ara":"๑๙๓","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["ในคดีมโนสาเร่ ให้ศาลกำหนดวันนัดพิจารณาโดยเร็วและออกหมายเรียกไปยังจำเลย ในหมายนั้นให้จดแจ้งประเด็นแห่งคดีและจำนวนทุนทรัพย์หรือราคาที่เรียกร้อง และข้อความว่าให้จำเลยมาศาลเพื่อการไกล่เกลี่ย ให้การ และสืบพยานในวันเดียวกัน และให้ศาลสั่งให้โจทก์มาศาลในวันนัดพิจารณานั้นด้วย ในวันนัดพิจารณา เมื่อโจทก์และจำเลยมาพร้อมกันแล้ว ให้ศาลไกล่เกลี่ยให้คู่ความได้ตกลงกันหรือประนีประนอมยอมความกันในข้อที่พิพาทนั้นก่อน ถ้าคู่ความไม่อาจตกลงกันหรือไม่อาจประนีประนอมยอมความกันได้และจำเลยยังไม่ได้ยื่นคำให้การ ให้ศาลสอบถามคำให้การของจำเลย โดยจำเลยจะยื่นคำให้การเป็นหนังสือ หรือจะให้การด้วยวาจาก็ได้ ในกรณียื่นคำให้การเป็นหนังสือให้นำมาตรา ๑๙๑ วรรคสอง มาใช้บังคับโดยอนุโลม ในกรณีให้การด้วยวาจา ให้ศาลบันทึกคำให้การรวมทั้งเหตุแห่งการนั้นไว้ อ่านให้จำเลยฟัง แล้วให้จำเลยลงลายมือชื่อไว้เป็นสำคัญ ถ้าจำเลยไม่ให้การตามวรรคสาม ให้ศาลมีอำนาจใช้ดุลพินิจมีคำสั่งไม่ยอมเลื่อนเวลาให้จำเลยยื่นคำให้การ โดยให้ถือว่าจำเลยขาดนัดยื่นคำให้การ และให้ศาลมีคำพิพากษาหรือคำสั่งชี้ขาดโดยนำมาตรา ๑๙๘ ทวิ มาใช้บังคับโดยอนุโลม แต่ในกรณีที่ศาลมีคำสั่งให้สืบพยาน ก็ให้ศาลดำเนินการต่อไปตามมาตรา ๑๙๓ ตรี มาตรา ๑๙๓ จัตวา และมาตรา ๑๙๓ เบญจ"],"text":"ในคดีมโนสาเร่ ให้ศาลกำหนดวันนัดพิจารณาโดยเร็วและออกหมายเรียกไปยังจำเลย ในหมายนั้นให้จดแจ้งประเด็นแห่งคดีและจำนวนทุนทรัพย์หรือราคาที่เรียกร้อง และข้อความว่าให้จำเลยมาศาลเพื่อการไกล่เกลี่ย ให้การ และสืบพยานในวันเดียวกัน และให้ศาลสั่งให้โจทก์มาศาลในวันนัดพิจารณานั้นด้วย ในวันนัดพิจารณา เมื่อโจทก์และจำเลยมาพร้อมกันแล้ว ให้ศาลไกล่เกลี่ยให้คู่ความได้ตกลงกันหรือประนีประนอมยอมความกันในข้อที่พิพาทนั้นก่อน ถ้าคู่ความไม่อาจตกลงกันหรือไม่อาจประนีประนอมยอมความกันได้และจำเลยยังไม่ได้ยื่นคำให้การ ให้ศาลสอบถามคำให้การข ังกล่าว ให้ถือว่าจำเลยขาดนัดพิจารณา และให้บังคับตามมาตรา ๒๐๔ มาตรา ๒๐๕ มาตรา ๒๐๖ และมาตรา ๒๐๗ และไม่ว่าจะเป็นกรณีใด ถ้าศาลมีคำสั่งให้สืบพยานก็ให้ศาลดำเนินการต่อไปตามมาตรา ๑๙๓ ตรี มาตรา ๑๙๓ จัตวา และมาตรา ๑๙๓ เบญจ"},{"id":"๑๙๓_ตรี","num":"มาตรา ๑๙๓ ตรี","num_ara":"๑๙๓ ตรี","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["เมื่อศาลได้รับคำให้การของจำเลยตามมาตรา ๑๙๓ วรรคสาม หรือศาลมีคำสั่งให้สืบพยานตามมาตรา ๑๙๓ วรรคสี่ หรือมาตรา ๑๙๓ ทวิ วรรคสอง ให้ศาลดำเนินการพิจารณาคดีต่อไปโดยเร็ว และให้ศาลสอบถามคู่ความฝ่ายที่จะต้องนำพยานเข้าสืบว่าประสงค์จะอ้างอิงพยานหลักฐานใดแล้วบันทึกไว้ หรือสั่งให้คู่ความจัดทำบัญชีระบุพยานยื่นต่อศาลภายในระยะเวลาตามที่เห็นสมควร โดยในกรณีที่มิใช่การพิจารณาคดีฝ่ายเดียว ศาลจะกำหนดให้คู่ความฝ่ายใดนำพยานหลักฐานมาสืบก่อนหรือหลังก็ได้"],"text":"เมื่อศาลได้รับคำให้การของจำเลยตามมาตรา ๑๙๓ วรรคสาม หรือศาลมีคำสั่งให้สืบพยานตามมาตรา ๑๙๓ วรรคสี่ หรือมาตรา ๑๙๓ ทวิ วรรคสอง ให้ศาลดำเนินการพิจารณาคดีต่อไปโดยเร็ว และให้ศาลสอบถามคู่ความฝ่ายที่จะต้องนำพยานเข้าสืบว่าประสงค์จะอ้างอิงพยานหลักฐานใดแล้วบันทึกไว้ หรือสั่งให้คู่ความจัดทำบัญชีระบุพยานยื่นต่อศาลภายในระยะเวลาตามที่เห็นสมควร โดยในกรณีที่มิใช่การพิจารณาคดีฝ่ายเดียว ศาลจะกำหนดให้คู่ความฝ่ายใดนำพยานหลักฐานมาสืบก่อนหรือหลังก็ได้"},{"id":"๑๙๓_จัตวา","num":"มาตรา ๑๙๓ จัตวา","num_ara":"๑๙๓ จัตวา","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["ในคดีมโนสาเร่ เพื่อประโยชน์แห่งความยุติธรรมให้ศาลมีอำนาจเรียกพยานหลักฐานมาสืบได้เองตามที่เห็นสมควร ในการสืบพยานไม่ว่าจะเป็นพยานที่คู่ความฝ่ายใดอ้างหรือที่ศาลเรียกมาเอง ให้ศาลเป็นผู้ซักถามพยานก่อน เสร็จแล้วจึงให้ตัวความหรือทนายความซักถามเพิ่มเติมได้ ให้ศาลมีอำนาจซักถามพยานเกี่ยวกับข้อเท็จจริงใด ๆ ที่เกี่ยวเนื่องกับคดี แม้จะไม่มีคู่ความฝ่ายใดยกขึ้นอ้างก็ตาม ในการบันทึกคำเบิกความของพยาน เมื่อศาลเห็นสมควร จะบันทึกข้อความแต่โดยย่อก็ได้ แล้วให้พยานลงลายมือชื่อไว้"],"text":"ในคดีมโนสาเร่ เพื่อประโยชน์แห่งความยุติธรรมให้ศาลมีอำนาจเรียกพยานหลักฐานมาสืบได้เองตามที่เห็นสมควร ในการสืบพยานไม่ว่าจะเป็นพยานที่คู่ความฝ่ายใดอ้างหรือที่ศาลเรียกมาเอง ให้ศาลเป็นผู้ซักถามพยานก่อน เสร็จแล้วจึงให้ตัวความหรือทนายความซักถามเพิ่มเติมได้ ให้ศาลมีอำนาจซักถามพยานเกี่ยวกับข้อเท็จจริงใด ๆ ที่เกี่ยวเนื่องกับคดี แม้จะไม่มีคู่ความฝ่ายใดยกขึ้นอ้างก็ตาม ในการบันทึกคำเบิกความของพยาน เมื่อศาลเห็นสมควร จะบันทึกข้อความแต่โดยย่อก็ได้ แล้วให้พยานลงลายมือชื่อไว้"},{"id":"๑๙๓_เบญจ","num":"มาตรา ๑๙๓ เบญจ","num_ara":"๑๙๓ เบญจ","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["ในคดีมโนสาเร่ ให้ศาลนั่งพิจารณาคดีติดต่อกันไปโดยไม่ต้องเลื่อน เว้นแต่มีเหตุจำเป็น ศาลจะมีคำสั่งเลื่อนได้ครั้งละไม่เกินเจ็ดวัน"],"text":"ในคดีมโนสาเร่ ให้ศาลนั่งพิจารณาคดีติดต่อกันไปโดยไม่ต้องเลื่อน เว้นแต่มีเหตุจำเป็น ศาลจะมีคำสั่งเลื่อนได้ครั้งละไม่เกินเจ็ดวัน"},{"id":"๑๙๔","num":"มาตรา ๑๙๔","num_ara":"๑๙๔","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["คดีมโนสาเร่นั้น ให้ศาลมีอำนาจออกคำสั่งหรือคำพิพากษาด้วยวาจาดังที่บัญญัติไว้ในมาตรา ๑๔๑"],"text":"คดีมโนสาเร่นั้น ให้ศาลมีอำนาจออกคำสั่งหรือคำพิพากษาด้วยวาจาดังที่บัญญัติไว้ในมาตรา ๑๔๑"},{"id":"๑๙๕","num":"มาตรา ๑๙๕","num_ara":"๑๙๕","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["นอกจากที่บัญญัติมาแล้ว ให้นำบทบัญญัติอื่นในประมวลกฎหมายนี้มาใช้บังคับแก่การพิจารณาและการชี้ขาดตัดสินคดีมโนสาเร่ด้วยโดยอนุโลม"],"text":"นอกจากที่บัญญัติมาแล้ว ให้นำบทบัญญัติอื่นในประมวลกฎหมายนี้มาใช้บังคับแก่การพิจารณาและการชี้ขาดตัดสินคดีมโนสาเร่ด้วยโดยอนุโลม"},{"id":"๑๙๖","num":"มาตรา ๑๙๖","num_ara":"๑๙๖","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๑ วิธีพิจารณาคดีมโนสาเร่","subsection":"","paragraphs":["ในคดีสามัญซึ่งโจทก์ฟ้องเพียงขอให้ชำระเงินจำนวนแน่นอนตามตั๋วเงิน ซึ่งการรับรองหรือการชำระเงินตามตั๋วเงินนั้นได้ถูกปฏิเสธ หรือตามสัญญาเป็นหนังสือซึ่งปรากฏในเบื้องต้นว่าเป็นสัญญาอันแท้จริงมีความสมบูรณ์และบังคับได้ตามกฎหมาย โจทก์จะยื่นคำขอโดยทำเป็นคำร้องต่อศาลพร้อมกับคำฟ้องขอให้ศาลพิจารณาคดีนั้นโดยรวบรัดก็ได้ ถ้าศาลเห็นว่าคดีตามวรรคหนึ่งนั้นปรากฏในเบื้องต้นว่าเป็นคดีไม่มีข้อยุ่งยาก ไม่ว่าโจทก์จะได้ยื่นคำขอตามวรรคหนึ่งหรือไม่ ให้ศาลมีคำสั่งให้นำบทบัญญัติในหมวดนี้ว่าด้วยวิธีพิจารณาคดีมโนสาเร่ เว้นแต่มาตรา ๑๙๐ จัตวา มาใช้บังคับแก่คดีเช่นว่านั้นได้ ถ้าในระหว่างการพิจารณาปรากฏว่าคดีไม่ตกอยู่ภายใต้บังคับแห่งมาตรานี้ ศาลอาจมีคำสั่งเพิกถอนคำสั่งเดิมแล้วดำเนินการพิจารณาต่อไปตามข้อบังคับแห่งคดีสามัญได้"],"text":"ในคดีสามัญซึ่งโจทก์ฟ้องเพียงขอให้ชำระเงินจำนวนแน่นอนตามตั๋วเงิน ซึ่งการรับรองหรือการชำระเงินตามตั๋วเงินนั้นได้ถูกปฏิเสธ หรือตามสัญญาเป็นหนังสือซึ่งปรากฏในเบื้องต้นว่าเป็นสัญญาอันแท้จริงมีความสมบูรณ์และบังคับได้ตามกฎหมาย โจทก์จะยื่นคำขอโดยทำเป็นคำร้องต่อศาลพร้อมกับคำฟ้องขอให้ศาลพิจารณาคดีนั้นโดยรวบรัดก็ได้ ถ้าศาลเห็นว่าคดีตามวรรคหนึ่งนั้นปรากฏในเบื้องต้นว่าเป็นคดีไม่มีข้อยุ่งยาก ไม่ว่าโจทก์จะได้ยื่นคำขอตามวรรคหนึ่งหรือไม่ ให้ศาลมีคำสั่งให้นำบทบัญญัติในหมวดนี้ว่าด้วยวิธีพิจารณาคดีมโนสาเร่ เว้นแต่มาตรา ๑๙๐ จัตวา มาใช้บังคับแก่คดีเช่นว่านั้นได้ ถ้าในระหว่างการพิจารณาปรากฏว่าคดีไม่ตกอยู่ภายใต้บังคับแห่งมาตรานี้ ศาลอาจมีคำสั่งเพิกถอนคำสั่งเดิมแล้วดำเนินการพิจารณาต่อไปตามข้อบังคับแห่งคดีสามัญได้"},{"id":"๑๙๗","num":"มาตรา ๑๙๗","num_ara":"๑๙๗","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๑ การขาดนัดยื่นคำให้การ","paragraphs":["เมื่อจำเลยได้รับหมายเรียกให้ยื่นคำให้การแล้ว จำเลยมิได้ยื่นคำให้การภายในระยะเวลาที่กำหนดไว้ตามกฎหมายหรือตามคำสั่งศาล ให้ถือว่าจำเลยขาดนัดยื่นคำให้การ"],"text":"เมื่อจำเลยได้รับหมายเรียกให้ยื่นคำให้การแล้ว จำเลยมิได้ยื่นคำให้การภายในระยะเวลาที่กำหนดไว้ตามกฎหมายหรือตามคำสั่งศาล ให้ถือว่าจำเลยขาดนัดยื่นคำให้การ"},{"id":"๑๙๘","num":"มาตรา ๑๙๘","num_ara":"๑๙๘","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๑ การขาดนัดยื่นคำให้การ","paragraphs":["ถ้าจำเลยขาดนัดยื่นคำให้การ ให้โจทก์มีคำขอต่อศาลภายในสิบห้าวันนับแต่ระยะเวลาที่กำหนดให้จำเลยยื่นคำให้การได้สิ้นสุดลง เพื่อให้ศาลมีคำพิพากษาหรือคำสั่งชี้ขาดให้ตนเป็นฝ่ายชนะคดีโดยขาดนัด ถ้าโจทก์ไม่ยื่นคำขอต่อศาลภายในกำหนดระยะเวลาดังกล่าวแล้ว ให้ศาลมีคำสั่งจำหน่ายคดีนั้นเสียจากสารบบความ ถ้าโจทก์ยื่นคำขอต่อศาลภายในกำหนดระยะเวลาดังกล่าวแล้ว ให้ศาลมีคำพิพากษาหรือคำสั่งชี้ขาดคดีโดยขาดนัดไปตามมาตรา ๑๙๘ ทวิ แต่ถ้าศาลมีเหตุสงสัยว่าจำเลยจะไม่ทราบหมายเรียกให้ยื่นคำให้การ ก็ให้ศาลมีคำสั่งให้มีการส่งหมายเรียกใหม่ โดยวิธีส่งหมายธรรมดาหรือโดยวิธีอื่นแทน และจะกำหนดเงื่อนไขอย่างใดตามที่เห็นสมควรเพื่อให้จำเลยได้ทราบหมายเรียกนั้นก็ได้"],"text":"ถ้าจำเลยขาดนัดยื่นคำให้การ ให้โจทก์มีคำขอต่อศาลภายในสิบห้าวันนับแต่ระยะเวลาที่กำหนดให้จำเลยยื่นคำให้การได้สิ้นสุดลง เพื่อให้ศาลมีคำพิพากษาหรือคำสั่งชี้ขาดให้ตนเป็นฝ่ายชนะคดีโดยขาดนัด ถ้าโจทก์ไม่ยื่นคำขอต่อศาลภายในกำหนดระยะเวลาดังกล่าวแล้ว ให้ศาลมีคำสั่งจำหน่ายคดีนั้นเสียจากสารบบความ ถ้าโจทก์ยื่นคำขอต่อศาลภายในกำหนดระยะเวลาดังกล่าวแล้ว ให้ศาลมีคำพิพากษาหรือคำสั่งชี้ขาดคดีโดยขาดนัดไปตามมาตรา ๑๙๘ ทวิ แต่ถ้าศาลมีเหตุสงสัยว่าจำเลยจะไม่ทราบหมายเรียกให้ยื่นคำให้การ ก็ให้ศาลมีคำสั่งให้มีการส่งหมายเรียกใหม่ โดยวิธีส่งหมายธรรมดาหรือโดยวิธีอื่นแทน และจะกำหนดเงื่อนไขอย่างใดตามที่เห็นสมควรเพื่อให้จำเลยได้ทราบหมายเรียกนั้นก็ได้"},{"id":"๑๙๘_ทวิ","num":"มาตรา ๑๙๘ ทวิ","num_ara":"๑๙๘ ทวิ","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๑ การขาดนัดยื่นคำให้การ","paragraphs":["ศาลจะมีคำพิพากษาหรือคำสั่งชี้ขาดให้โจทก์เป็นฝ่ายชนะคดีโดยจำเลยขาดนัดยื่นคำให้การมิได้ เว้นแต่ศาลเห็นว่าคำฟ้องของโจทก์มีมูลและไม่ขัดต่อกฎหมาย ในการนี้ ศาลจะยกขึ้นอ้างโดยลำพังซึ่งข้อกฎหมายอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชนก็ได้ เพื่อประโยชน์ในการพิพากษาหรือมีคำสั่งชี้ขาดคดีตามวรรคหนึ่ง ศาลอาจสืบพยานเกี่ยวกับข้ออ้างของโจทก์หรือพยานหลักฐานอื่นไปฝ่ายเดียวตามที่เห็นว่าจำเป็นก็ได้ แต่ในคดีเกี่ยวด้วยสิทธิแห่งสภาพบุคคล สิทธิในครอบครัวหรือคดีพิพาทเกี่ยวด้วยกรรมสิทธิ์ในอสังหาริมทรัพย์ ให้ศาลสืบพยานหลักฐานโจทก์ไปฝ่ายเดียว และศาลอาจเรียกพยานหลักฐานอื่นมาสืบได้เองตามที่เห็นว่าจำเป็นเพื่อประโยชน์แห่งความยุติธรรม ในการกำหนดจำนวนเงินตามคำขอบังคับของโจทก์ ให้ศาลปฏิบัติดังนี้","(๑) ในกรณีที่โจทก์มีคำขอบังคับให้จำเลยชำระหนี้เป็นเงินจำนวนแน่นอน ให้ศาลมีคำสั่งให้โจทก์ส่งพยานเอกสารตามที่ศาลเห็นว่าจำเป็นแทนการสืบพยาน (๒) ในกรณีที่โจทก์มีคำขอบังคับให้จำเลยชำระหนี้เป็นเงินอันไม่อาจกำหนดจำนวนได้โดยแน่นอน ให้ศาลสืบพยานหลักฐานโจทก์ไปฝ่ายเดียว และศาลอาจเรียกพยานหลักฐานอื่นมาสืบได้เองตามที่เห็นว่าจำเป็น ถ้าจำเลยที่ขาดนัดยื่นคำให้การไม่มาศาลในวันสืบพยานตามมาตรานี้ มิให้ถือว่าจำเลยนั้นขาดนัดพิจารณา ถ้าโจทก์ไม่นำพยานหลักฐานมาสืบตามความในมาตรานี้ภายในระยะเวลาที่ศาลกำหนด ให้ถือว่าคดีของโจทก์ไม่มีมูล และให้ศาลยกฟ้องของโจทก์"],"text":"ศาลจะมีคำพิพากษาหรือคำสั่งชี้ขาดให้โจทก์เป็นฝ่ายชนะคดีโดยจำเลยขาดนัดยื่นคำให้การมิได้ เว้นแต่ศาลเห็นว่าคำฟ้องของโจทก์มีมูลและไม่ขัดต่อกฎหมาย ในการนี้ ศาลจะยกขึ้นอ้างโดยลำพังซึ่งข้อกฎหมายอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชนก็ได้ เพื่อประโยชน์ในการพิพากษาหรือมีคำสั่งชี้ขาดคดีตามวรรคหนึ่ง ศาลอาจสืบพยานเกี่ยวกับข้ออ้างของโจทก์หรือพยานหลักฐานอื่นไปฝ่ายเดียวตามที่เห็นว่าจำเป็นก็ได้ แต่ในคดีเกี่ยวด้วยสิทธิแห่งสภาพบุคคล สิทธิในครอบครัวหรือคดีพิพาทเกี่ยวด้วยกรรมสิทธิ์ในอสังหาริมทรัพย์ ให้ศาลสืบพยานหลักฐานโจทก์ไปฝ่ายเดียว และศาลอาจเรียกพยานหลักฐานอื่นมาสืบได้เองตามที่เห็นว่าจำเป็นเพื่อประโยชน์แห่งความยุติธรรม ในการกำหนดจำนวนเงินตามคำขอบังคับของโจทก์ ให้ศาลปฏิบัติดังนี้\n\n(๑) ในกรณีที่โจทก์มีคำขอบังคับให้จำเลยชำระหนี้เป็นเงินจำนวนแน่นอน ให้ศาลมีคำสั่งให้โจทก์ส่งพยานเอกสารตามที่ศาลเห็นว่าจำเป็นแทนการสืบพยาน (๒) ในกรณีที่โจทก์มีคำขอบังคับให้จำเลยชำระหนี้เป็นเงินอันไม่อาจกำหนดจำนวนได้โดยแน่นอน ให้ศาลสืบพยานหลักฐานโจทก์ไปฝ่ายเดียว และศาลอาจเรียกพยานหลักฐานอื่นมาสืบได้เองตามที่เห็นว่าจำเป็น ถ้าจำเลยที่ขาดนัดยื่นคำให้การไม่มาศาลในวันสืบพยานตามมาตรานี้ มิให้ถือว่าจำเลยนั้นขาดนัดพิจารณา ถ้าโจทก์ไม่นำพยานหลักฐานมาสืบตามความในมาตรานี้ภายในระยะเวลาที่ศาลกำหนด ให้ถือว่าคดีของโจทก์ไม่มีมูล และให้ศาลยกฟ้องของโจทก์"},{"id":"๑๙๘_ตรี","num":"มาตรา ๑๙๘ ตรี","num_ara":"๑๙๘ ตรี","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๑ การขาดนัดยื่นคำให้การ","paragraphs":["ในคดีที่จำเลยบางคนขาดนัดยื่นคำให้การ ให้ศาลมีคำพิพากษาหรือคำสั่งชี้ขาดคดีโดยขาดนัดยื่นคำให้การระหว่างโจทก์กับจำเลยที่ขาดนัดยื่นคำให้การนั้นไปก่อนและดำเนินการพิจารณาคดีระหว่างโจทก์กับจำเลยที่ยื่นคำให้การต่อไป แต่ถ้ามูลความแห่งคดีนั้นเป็นการชำระหนี้ซึ่งแบ่งแยกจากกันมิได้ ให้ศาลรอการพิพากษาหรือมีคำสั่งชี้ขาดคดีโดยขาดนัดยื่นคำให้การไว้ก่อน เมื่อศาลดำเนินการพิจารณาสำหรับจำเลยที่ยื่นคำให้การเสร็จสิ้นแล้ว ก็ให้ศาลมีคำพิพากษาหรือคำสั่งชี้ขาดคดีไปตามรูปคดีสำหรับจำเลยทุกคน ในกรณีที่จำเลยที่ขาดนัดยื่นคำให้การไม่มาศาลในวันสืบพยานของคู่ความอื่นมิให้ถือว่าจำเลยนั้นขาดนัดพิจารณา"],"text":"ในคดีที่จำเลยบางคนขาดนัดยื่นคำให้การ ให้ศาลมีคำพิพากษาหรือคำสั่งชี้ขาดคดีโดยขาดนัดยื่นคำให้การระหว่างโจทก์กับจำเลยที่ขาดนัดยื่นคำให้การนั้นไปก่อนและดำเนินการพิจารณาคดีระหว่างโจทก์กับจำเลยที่ยื่นคำให้การต่อไป แต่ถ้ามูลความแห่งคดีนั้นเป็นการชำระหนี้ซึ่งแบ่งแยกจากกันมิได้ ให้ศาลรอการพิพากษาหรือมีคำสั่งชี้ขาดคดีโดยขาดนัดยื่นคำให้การไว้ก่อน เมื่อศาลดำเนินการพิจารณาสำหรับจำเลยที่ยื่นคำให้การเสร็จสิ้นแล้ว ก็ให้ศาลมีคำพิพากษาหรือคำสั่งชี้ขาดคดีไปตามรูปคดีสำหรับจำเลยทุกคน ในกรณีที่จำเลยที่ขาดนัดยื่นคำให้การไม่มาศาลในวันสืบพยานของคู่ความอื่นมิให้ถือว่าจำเลยนั้นขาดนัดพิจารณา"},{"id":"๑๙๙","num":"มาตรา ๑๙๙","num_ara":"๑๙๙","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๑ การขาดนัดยื่นคำให้การ","paragraphs":["ถ้าจำเลยที่ขาดนัดยื่นคำให้การมาศาลก่อนศาลวินิจฉัยชี้ขาดคดีและแจ้งต่อศาลในโอกาสแรกว่าตนประสงค์จะต่อสู้คดี เมื่อศาลเห็นว่าการขาดนัดยื่นคำให้การนั้นมิได้เป็นไปโดยจงใจหรือมีเหตุอันสมควร ให้ศาลมีคำสั่งอนุญาตให้จำเลยยื่นคำให้การภายในกำหนดเวลาตามที่ศาลเห็นสมควร และดำเนินกระบวนพิจารณาใหม่ตั้งแต่เวลาที่จำเลยขาดนัดยื่นคำให้การ ในกรณีตามวรรคหนึ่ง ถ้าจำเลยที่ขาดนัดยื่นคำให้การมิได้แจ้งต่อศาลก็ดี หรือศาลเห็นว่าการขาดนัดยื่นคำให้การนั้นเป็นไปโดยจงใจหรือไม่มีเหตุอันสมควรก็ดี ให้ศาลดำเนินกระบวนพิจารณาต่อไป ในกรณีเช่นนี้ จำเลยอาจถามค้านพยานโจทก์ที่อยู่ระหว่างการสืบได้ แต่จะนำสืบพยานหลักฐานของตนไม่ได้ ในกรณีที่จำเลยมิได้ยื่นคำให้การภายในกำหนดเวลาตามวรรคหนึ่ง หรือศาลไม่อนุญาตให้จำเลยยื่นคำให้การตามวรรคสอง หรือศาลเคยมีคำสั่งให้พิจารณาคดีใหม่ ตามคำขอของจำเลยที่ขาดนัดยื่นคำให้การตามมาตรา ๑๙๙ ตรี มาก่อน จำเลยนั้นจะขอยื่นคำให้การตามมาตรานี้อีกหรือจะร้องขอให้พิจารณาคดีใหม่ไม่ได้"],"text":"ถ้าจำเลยที่ขาดนัดยื่นคำให้การมาศาลก่อนศาลวินิจฉัยชี้ขาดคดีและแจ้งต่อศาลในโอกาสแรกว่าตนประสงค์จะต่อสู้คดี เมื่อศาลเห็นว่าการขาดนัดยื่นคำให้การนั้นมิได้เป็นไปโดยจงใจหรือมีเหตุอันสมควร ให้ศาลมีคำสั่งอนุญาตให้จำเลยยื่นคำให้การภายในกำหนดเวลาตามที่ศาลเห็นสมควร และดำเนินกระบวนพิจารณาใหม่ตั้งแต่เวลาที่จำเลยขาดนัดยื่นคำให้การ ในกรณีตามวรรคหนึ่ง ถ้าจำเลยที่ขาดนัดยื่นคำให้การมิได้แจ้งต่อศาลก็ดี หรือศาลเห็นว่าการขาดนัดยื่นคำให้การนั้นเป็นไปโดยจงใจหรือไม่มีเหตุอันสมควรก็ดี ให้ศาลดำเนินกระบวนพิจารณาต่อไป ในกรณีเช่นนี้ จำเลยอาจถามค้านพยานโจทก์ที่อยู่ระหว่างการสืบได้ แต่จะนำสืบพยานหลักฐานของตนไม่ได้ ในกรณีที่จำเลยมิได้ยื่นคำให้การภายในกำหนดเวลาตามวรรคหนึ่ง หรือศาลไม่อนุญาตให้จำเลยยื่นคำให้การตามวรรคสอง หรือศาลเคยมีคำสั่งให้พิจารณาคดีใหม่ ตามคำขอของจำเลยที่ขาดนัดยื่นคำให้การตามมาตรา ๑๙๙ ตรี มาก่อน จำเลยนั้นจะขอยื่นคำให้การตามมาตรานี้อีกหรือจะร้องขอให้พิจารณาคดีใหม่ไม่ได้"},{"id":"๑๙๙_ทวิ","num":"มาตรา ๑๙๙ ทวิ","num_ara":"๑๙๙ ทวิ","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๑ การขาดนัดยื่นคำให้การ","paragraphs":["เมื่อศาลพิพากษาให้จำเลยที่ขาดนัดยื่นคำให้การแพ้คดี ศาลอาจกำหนดการอย่างใด ตามที่เห็นสมควรเพื่อส่งคำบังคับตามคำพิพากษาหรือคำสั่งให้แก่จำเลยที่ขาดนัดยื่นคำให้การ โดยวิธีส่งหมายธรรมดาหรือโดยวิธีอื่นแทน หรือศาลจะให้เลื่อนการบังคับตามคำพิพากษาหรือคำสั่งเช่นว่านั้นไปภายในระยะเวลาที่ศาลเห็นสมควรก็ได้ การบังคับตามคำพิพากษาหรือคำสั่งแก่จำเลยที่ขาดนัดยื่นคำให้การนั้นให้บังคับตามมาตรา ๒๗๓ มาตรา ๒๘๙ และมาตรา ๓๓๘"],"text":"เมื่อศาลพิพากษาให้จำเลยที่ขาดนัดยื่นคำให้การแพ้คดี ศาลอาจกำหนดการอย่างใด ตามที่เห็นสมควรเพื่อส่งคำบังคับตามคำพิพากษาหรือคำสั่งให้แก่จำเลยที่ขาดนัดยื่นคำให้การ โดยวิธีส่งหมายธรรมดาหรือโดยวิธีอื่นแทน หรือศาลจะให้เลื่อนการบังคับตามคำพิพากษาหรือคำสั่งเช่นว่านั้นไปภายในระยะเวลาที่ศาลเห็นสมควรก็ได้ การบังคับตามคำพิพากษาหรือคำสั่งแก่จำเลยที่ขาดนัดยื่นคำให้การนั้นให้บังคับตามมาตรา ๒๗๓ มาตรา ๒๘๙ และมาตรา ๓๓๘"},{"id":"๑๙๙_ตรี","num":"มาตรา ๑๙๙ ตรี","num_ara":"๑๙๙ ตรี","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๑ การขาดนัดยื่นคำให้การ","paragraphs":["จำเลยซึ่งศาลมีคำพิพากษาหรือคำสั่งชี้ขาดให้แพ้คดีโดยขาดนัดยื่นคำให้การ ถ้ามิได้ยื่นอุทธรณ์คำพิพากษาหรือคำสั่งนั้น จำเลยนั้นอาจมีคำขอให้พิจารณาคดีใหม่ได้ เว้นแต่","(๑) ศาลเคยมีคำสั่งให้พิจารณาคดีนั้นใหม่มาครั้งหนึ่งแล้ว (๒) คำขอให้พิจารณาคดีใหม่นั้นต้องห้ามตามกฎหมาย"],"text":"จำเลยซึ่งศาลมีคำพิพากษาหรือคำสั่งชี้ขาดให้แพ้คดีโดยขาดนัดยื่นคำให้การ ถ้ามิได้ยื่นอุทธรณ์คำพิพากษาหรือคำสั่งนั้น จำเลยนั้นอาจมีคำขอให้พิจารณาคดีใหม่ได้ เว้นแต่\n\n(๑) ศาลเคยมีคำสั่งให้พิจารณาคดีนั้นใหม่มาครั้งหนึ่งแล้ว (๒) คำขอให้พิจารณาคดีใหม่นั้นต้องห้ามตามกฎหมาย"},{"id":"๑๙๙_จัตวา","num":"มาตรา ๑๙๙ จัตวา","num_ara":"๑๙๙ จัตวา","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๑ การขาดนัดยื่นคำให้การ","paragraphs":["คำขอให้พิจารณาคดีใหม่นั้น ให้ยื่นต่อศาลภายในสิบห้าวันนับจากวันที่ได้ส่งคำบังคับตามคำพิพากษาหรือคำสั่งให้แก่จำเลยที่ขาดนัดยื่นคำให้การ แต่ถ้าศาลได้กำหนดการอย่างใด ๆ เพื่อส่งคำบังคับเช่นว่านี้โดยวิธีส่งหมายธรรมดาหรือโดยวิธีอื่นแทน จะต้องได้มีการปฏิบัติตามข้อกำหนดนั้นแล้ว ในกรณีที่จำเลยที่ขาดนัดยื่นคำให้การไม่สามารถยื่นคำขอภายในระยะเวลาที่กำหนดโดยพฤติการณ์นอกเหนือไม่อาจบังคับได้ จำเลยนั้นอาจยื่นคำขอให้พิจารณาคดีใหม่ได้ภายในกำหนดสิบห้าวันนับแต่วันที่พฤติการณ์นั้นได้สิ้นสุดลง แต่กรณีจะเป็นอย่างไรก็ตามห้ามมิให้ยื่นคำขอเช่นว่านี้เมื่อพ้นกำหนดหกเดือนนับแต่วันที่ได้ยึดทรัพย์หรือได้มีการบังคับตามคำพิพากษาหรือคำสั่งโดยวิธีอื่น คำขอตามวรรคหนึ่งให้กล่าวโดยชัดแจ้งซึ่งเหตุที่จำเลยได้ขาดนัดยื่นคำให้การและข้อคัดค้านคำตัดสินชี้ขาดของศาลที่แสดงให้เห็นว่าหากศาลได้พิจารณาคดีนั้นใหม่ตนอาจเป็นฝ่ายชนะ และในกรณีที่ยื่นคำขอล่าช้า ให้แสดงเหตุแห่งการที่ล่าช้านั้นด้วย"],"text":"คำขอให้พิจารณาคดีใหม่นั้น ให้ยื่นต่อศาลภายในสิบห้าวันนับจากวันที่ได้ส่งคำบังคับตามคำพิพากษาหรือคำสั่งให้แก่จำเลยที่ขาดนัดยื่นคำให้การ แต่ถ้าศาลได้กำหนดการอย่างใด ๆ เพื่อส่งคำบังคับเช่นว่านี้โดยวิธีส่งหมายธรรมดาหรือโดยวิธีอื่นแทน จะต้องได้มีการปฏิบัติตามข้อกำหนดนั้นแล้ว ในกรณีที่จำเลยที่ขาดนัดยื่นคำให้การไม่สามารถยื่นคำขอภายในระยะเวลาที่กำหนดโดยพฤติการณ์นอกเหนือไม่อาจบังคับได้ จำเลยนั้นอาจยื่นคำขอให้พิจารณาคดีใหม่ได้ภายในกำหนดสิบห้าวันนับแต่วันที่พฤติการณ์นั้นได้สิ้นสุดลง แต่กรณีจะเป็นอย่างไรก็ตามห้ามมิให้ยื่นคำขอเช่นว่านี้เมื่อพ้นกำหนดหกเดือนนับแต่วันที่ได้ยึดทรัพย์หรือได้มีการบังคับตามคำพิพากษาหรือคำสั่งโดยวิธีอื่น คำขอตามวรรคหนึ่งให้กล่าวโดยชัดแจ้งซึ่งเหตุที่จำเลยได้ขาดนัดยื่นคำให้การและข้อคัดค้านคำตัดสินชี้ขาดของศาลที่แสดงให้เห็นว่าหากศาลได้พิจารณาคดีนั้นใหม่ตนอาจเป็นฝ่ายชนะ และในกรณีที่ยื่นคำขอล่าช้า ให้แสดงเหตุแห่งการที่ล่าช้านั้นด้วย"},{"id":"๑๙๙_เบญจ","num":"มาตรา ๑๙๙ เบญจ","num_ara":"๑๙๙ เบญจ","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๑ การขาดนัดยื่นคำให้การ","paragraphs":["เมื่อศาลได้รับคำขอให้พิจารณาคดีใหม่แล้ว หากเห็นสมควรศาลจะมีคำสั่งให้งดการบังคับคดีไว้ก่อนก็ได้ ในกรณีเช่นนี้ ให้ศาลแจ้งคำสั่งให้เจ้าพนักงานบังคับคดีทราบ ในการพิจารณาคำขอให้พิจารณาคดีใหม่ ถ้ามีเหตุควรเชื่อว่าการขาดนัดยื่นคำให้การนั้นมิได้เป็นไปโดยจงใจหรือมีเหตุอันสมควร และศาลเห็นว่าเหตุผลที่อ้างมาในคำขอนั้นผู้ขออาจมีทางชนะคดีได้ ทั้งในกรณีที่ยื่นคำขอล่าช้านั้นผู้ขอได้ยื่นภายในระยะเวลาที่กำหนด ให้ศาลมีคำสั่งอนุญาตตามคำขอ ในกรณีเช่นนี้ ถ้ามีการอุทธรณ์หรือฎีกาคำพิพากษาหรือคำสั่งที่ให้คู่ความฝ่ายที่ขาดนัดยื่นคำให้การแพ้คดี ให้ศาลแจ้งคำสั่งดังกล่าวให้ศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี ทราบด้วย เมื่อศาลได้มีคำสั่งอนุญาตตามคำขอให้พิจารณาคดีใหม่ตามวรรคสอง คำพิพากษาหรือคำสั่งของศาลโดยจำเลยขาดนัดยื่นคำให้การและคำพิพากษาหรือคำสั่งอื่น ๆ ของศาลอุทธรณ์หรือศาลฎีกาในคดีเดียวกันนั้น และวิธีการบังคับคดีที่ได้ดำเนินไปแล้ว ให้ถือว่าเป็นอันเพิกถอนไปในตัว และให้ศาลแจ้งให้เจ้าพนักงานบังคับคดีทราบ แต่ถ้าเป็นการพ้นวิสัยที่จะให้คู่ความกลับคืนสู่ฐานะเดิมดังเช่นก่อนบังคับคดีได้ หรือเมื่อศาลเห็นว่าไม่จำเป็นที่จะบังคับเช่นนั้น เพื่อประโยชน์แก่คู่ความหรือบุคคลภายนอก ให้ศาลมีอำนาจสั่งอย่างใด ๆ ตามที่เห็นสมควร แล้วให้ศาลพิจารณาคดีนั้นใหม่ตั้งแต่เวลาที่จำเลยขาดนัดยื่นคำให้การ โดยให้จำเลยยื่นคำให้การภายในกำหนดเวลาตามที่ศาลเห็นสมควร คำสั่งศาลที่อนุญาตให้พิจารณาคดีใหม่ให้เป็นที่สุด แต่ในกรณีที่ศาลมีคำสั่งไม่อนุญาตผู้ขออาจอุทธรณ์คำสั่งดังกล่าวได้ คำพิพากษาของศาลอุทธรณ์ให้เป็นที่สุด ถ้าจำเลยขาดนัดยื่นคำให้การโดยจงใจหรือไม่มีเหตุอันสมควรเป็นเหตุให้คู่ความอีกฝ่ายหนึ่งต้องเสียค่าฤชาธรรมเนียมมากกว่าที่ควรจะต้องเสีย ค่าฤชาธรรมที่เพิ่มขึ้นนั้นให้ถือว่าเป็นค่าฤชาธรรมเนียมอันไม่จำเป็นตามความหมายแห่งมาตรา ๑๖๖"],"text":"เมื่อศาลได้รับคำขอให้พิจารณาคดีใหม่แล้ว หากเห็นสมควรศาลจะมีคำสั่งให้งดการบังคับคดีไว้ก่อนก็ได้ ในกรณีเช่นนี้ ให้ศาลแจ้งคำสั่งให้เจ้าพนักงานบังคับคดีทราบ ในการพิจารณาคำขอให้พิจารณาคดีใหม่ ถ้ามีเหตุควรเชื่อว่าการขาดนัดยื่นคำให้การนั้นมิได้เป็นไปโดยจงใจหรือมีเหตุอันสมควร และศาลเห็นว่าเหตุผลที่อ้างมาในคำขอนั้นผู้ขออาจมีทางชนะคดีได้ ทั้งในกรณีที่ยื่นคำขอล่าช้านั้นผู้ขอได้ยื่นภายในระยะเวลาที่กำหนด ให้ศาลมีคำสั่งอนุญาตตามคำขอ ในกรณีเช่นนี้ ถ้ามีการอุทธรณ์หรือฎีกาคำพิพากษาหรือคำสั่งที่ให้คู่ความฝ่ายที่ขาดนัดยื่นคำให้การแพ้คดี ให้ศาลแจ้งคำสั่งดังกล่าวให้ศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี ทราบด้วย เมื่อศาลได้มีคำสั่งอนุญาตตามคำขอให้พิจารณาคดีใหม่ตามวรรคสอง คำพิพากษาหรือคำสั่งของศาลโดยจำเลยขาดนัดยื่นคำให้การและคำพิพากษาหรือคำสั่งอื่น ๆ ของศาลอุทธรณ์หรือศาลฎีกาในคดีเดียวกันนั้น และวิธีการบังคับคดีที่ได้ดำเนินไปแล้ว ให้ถือว่าเป็นอันเพิกถอนไปในตัว และให้ศาลแจ้งให้เจ้าพนักงานบังคับคดีทราบ แต่ถ้าเป็นการพ้นวิสัยที่จะให้คู่ความกลับคืนสู่ฐานะเดิมดังเช่นก่อนบังคับคดีได้ หรือเมื่อศาลเห็นว่าไม่จำเป็นที่จะบังคับเช่นนั้น เพื่อประโยชน์แก่คู่ความหรือบุคคลภายนอก ให้ศาลมีอำนาจสั่งอย่างใด ๆ ตามที่เห็นสมควร แล้วให้ศาลพิจารณาคดีนั้นใหม่ตั้งแต่เวลาที่จำเลยขาดนัดยื่นคำให้การ โดยให้จำเลยยื่นคำให้การภายในกำหนดเวลาตามที่ศาลเห็นสมควร คำสั่งศาลที่อนุญาตให้พิจารณาคดีใหม่ให้เป็นที่สุด แต่ในกรณีที่ศาลมีคำสั่งไม่อนุญาตผู้ขออาจอุทธรณ์คำสั่งดังกล่าวได้ คำพิพากษาของศาลอุทธรณ์ให้เป็นที่สุด ถ้าจำเลยขาดนัดยื่นคำให้การโดยจงใจหรือไม่มีเหตุอันสมควรเป็นเหตุให้คู่ความอีกฝ่ายหนึ่งต้องเสียค่าฤชาธรรมเนียมมากกว่าที่ควรจะต้องเสีย ค่าฤชาธรรมที่เพิ่มขึ้นนั้นให้ถือว่าเป็นค่าฤชาธรรมเนียมอันไม่จำเป็นตามความหมายแห่งมาตรา ๑๖๖"},{"id":"๑๙๙_ฉ","num":"มาตรา ๑๙๙ ฉ","num_ara":"๑๙๙ ฉ","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๑ การขาดนัดยื่นคำให้การ","paragraphs":["ในกรณีที่โจทก์มิได้ให้การแก้ฟ้องแย้งของจำเลยภายในระยะเวลาที่กำหนดไว้ ให้นำบทบัญญัติในส่วนที่ ๑ นี้มาใช้บังคับเพียงเท่าที่เกี่ยวกับฟ้องแย้งเช่นว่านั้นโดยอนุโลม"],"text":"ในกรณีที่โจทก์มิได้ให้การแก้ฟ้องแย้งของจำเลยภายในระยะเวลาที่กำหนดไว้ ให้นำบทบัญญัติในส่วนที่ ๑ นี้มาใช้บังคับเพียงเท่าที่เกี่ยวกับฟ้องแย้งเช่นว่านั้นโดยอนุโลม"},{"id":"๒๐๐","num":"มาตรา ๒๐๐","num_ara":"๒๐๐","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๒ การขาดนัดพิจารณา","paragraphs":["ภายใต้บังคับมาตรา ๑๙๘ ทวิ และมาตรา ๑๙๘ ตรี ถ้าคู่ความฝ่ายใดฝ่ายหนึ่งไม่มาศาลในวันสืบพยาน และไม่ได้รับอนุญาตจากศาลให้เลื่อนคดี ให้ถือว่าคู่ความฝ่ายนั้นขาดนัดพิจารณา ถ้าคู่ความฝ่ายใดไม่มาศาลในวันนัดอื่นที่มิใช่วันสืบพยาน ให้ถือว่าคู่ความฝ่ายนั้นสละสิทธิการดำเนินกระบวนพิจารณาของตนในนัดนั้น และทราบกระบวนพิจารณาที่ศาลได้ดำเนินไปในนัดนั้นด้วยแล้ว"],"text":"ภายใต้บังคับมาตรา ๑๙๘ ทวิ และมาตรา ๑๙๘ ตรี ถ้าคู่ความฝ่ายใดฝ่ายหนึ่งไม่มาศาลในวันสืบพยาน และไม่ได้รับอนุญาตจากศาลให้เลื่อนคดี ให้ถือว่าคู่ความฝ่ายนั้นขาดนัดพิจารณา ถ้าคู่ความฝ่ายใดไม่มาศาลในวันนัดอื่นที่มิใช่วันสืบพยาน ให้ถือว่าคู่ความฝ่ายนั้นสละสิทธิการดำเนินกระบวนพิจารณาของตนในนัดนั้น และทราบกระบวนพิจารณาที่ศาลได้ดำเนินไปในนัดนั้นด้วยแล้ว"},{"id":"๒๐๑","num":"มาตรา ๒๐๑","num_ara":"๒๐๑","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๒ การขาดนัดพิจารณา","paragraphs":["ถ้าคู่ความทั้งสองฝ่ายขาดนัดพิจารณา ให้ศาลมีคำสั่งจำหน่ายคดีนั้นเสียจากสารบบความ"],"text":"ถ้าคู่ความทั้งสองฝ่ายขาดนัดพิจารณา ให้ศาลมีคำสั่งจำหน่ายคดีนั้นเสียจากสารบบความ"},{"id":"๒๐๒","num":"มาตรา ๒๐๒","num_ara":"๒๐๒","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๒ การขาดนัดพิจารณา","paragraphs":["ถ้าโจทก์ขาดนัดพิจารณา ให้ศาลมีคำสั่งจำหน่ายคดีนั้นเสียจากสารบบความ เว้นแต่จำเลยจะได้แจ้งต่อศาลในวันสืบพยานขอให้ดำเนินการพิจารณาคดีต่อไป ก็ให้ศาลพิจารณาและชี้ขาดตัดสินคดีนั้นไปฝ่ายเดียว"],"text":"ถ้าโจทก์ขาดนัดพิจารณา ให้ศาลมีคำสั่งจำหน่ายคดีนั้นเสียจากสารบบความ เว้นแต่จำเลยจะได้แจ้งต่อศาลในวันสืบพยานขอให้ดำเนินการพิจารณาคดีต่อไป ก็ให้ศาลพิจารณาและชี้ขาดตัดสินคดีนั้นไปฝ่ายเดียว"},{"id":"๒๐๓","num":"มาตรา ๒๐๓","num_ara":"๒๐๓","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๒ การขาดนัดพิจารณา","paragraphs":["ห้ามมิให้โจทก์อุทธรณ์คำสั่งจำหน่ายคดีตามมาตรา ๒๐๑ และมาตรา ๒๐๒ แต่ภายใต้บังคับบทบัญญัติแห่งกฎหมายว่าด้วยอายุความ คำสั่งเช่นว่านี้ไม่ตัดสิทธิโจทก์ที่จะเสนอคำฟ้องของตนใหม่"],"text":"ห้ามมิให้โจทก์อุทธรณ์คำสั่งจำหน่ายคดีตามมาตรา ๒๐๑ และมาตรา ๒๐๒ แต่ภายใต้บังคับบทบัญญัติแห่งกฎหมายว่าด้วยอายุความ คำสั่งเช่นว่านี้ไม่ตัดสิทธิโจทก์ที่จะเสนอคำฟ้องของตนใหม่"},{"id":"๒๐๔","num":"มาตรา ๒๐๔","num_ara":"๒๐๔","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๒ การขาดนัดพิจารณา","paragraphs":["ถ้าจำเลยขาดนัดพิจารณา ให้ศาลพิจารณาและชี้ขาดตัดสินคดีนั้นไปฝ่ายเดียว"],"text":"ถ้าจำเลยขาดนัดพิจารณา ให้ศาลพิจารณาและชี้ขาดตัดสินคดีนั้นไปฝ่ายเดียว"},{"id":"๒๐๕","num":"มาตรา ๒๐๕","num_ara":"๒๐๕","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๒ การขาดนัดพิจารณา","paragraphs":["ในกรณีดังกล่าวมาในมาตรา ๒๐๒ และมาตรา ๒๐๔ ถ้ายังไม่เป็นที่พอใจของศาลว่าได้ส่งหมายกำหนดวันนัดสืบพยานไปให้คู่ความฝ่ายที่ขาดนัดทราบโดยชอบแล้ว ให้ศาลมีคำสั่งเลื่อนวันสืบพยานไป และกำหนดวิธีการอย่างใดตามที่เห็นสมควร เพื่อให้มีการส่งหมายกำหนดวันนัดสืบพยานใหม่แก่คู่ความฝ่ายที่ขาดนัดพิจารณาโดยวิธีส่งหมายธรรมดาหรือโดยวิธีอื่นแทน ถ้าได้กระทำดังเช่นว่ามาแล้ว คู่ความฝ่ายนั้นยังไม่มาศาลก่อนเริ่มสืบพยานในวันที่กำหนดไว้ในหมายนั้น ก็ให้ศาลดำเนินคดีนั้นไปดังที่บัญญัติไว้ในมาตรา ๒๐๒ หรือมาตรา ๒๐๔ แล้วแต่กรณี"],"text":"ในกรณีดังกล่าวมาในมาตรา ๒๐๒ และมาตรา ๒๐๔ ถ้ายังไม่เป็นที่พอใจของศาลว่าได้ส่งหมายกำหนดวันนัดสืบพยานไปให้คู่ความฝ่ายที่ขาดนัดทราบโดยชอบแล้ว ให้ศาลมีคำสั่งเลื่อนวันสืบพยานไป และกำหนดวิธีการอย่างใดตามที่เห็นสมควร เพื่อให้มีการส่งหมายกำหนดวันนัดสืบพยานใหม่แก่คู่ความฝ่ายที่ขาดนัดพิจารณาโดยวิธีส่งหมายธรรมดาหรือโดยวิธีอื่นแทน ถ้าได้กระทำดังเช่นว่ามาแล้ว คู่ความฝ่ายนั้นยังไม่มาศาลก่อนเริ่มสืบพยานในวันที่กำหนดไว้ในหมายนั้น ก็ให้ศาลดำเนินคดีนั้นไปดังที่บัญญัติไว้ในมาตรา ๒๐๒ หรือมาตรา ๒๐๔ แล้วแต่กรณี"},{"id":"๒๐๖","num":"มาตรา ๒๐๖","num_ara":"๒๐๖","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๒ การขาดนัดพิจารณา","paragraphs":["คู่ความฝ่ายใดฝ่ายหนึ่งจะร้องต่อศาลให้วินิจฉัยชี้ขาดคดีให้ตนเป็นฝ่ายชนะโดยอาศัยเหตุแต่เพียงว่าคู่ความอีกฝ่ายหนึ่งขาดนัดพิจารณานั้นหาได้ไม่ ให้ศาลวินิจฉัยชี้ขาดคดีให้คู่ความที่มาศาลเป็นฝ่ายชนะต่อเมื่อศาลเห็นว่าข้ออ้างของคู่ความเช่นว่านี้มีมูลและไม่ขัดต่อกฎหมาย ในการนี้ ศาลจะยกขึ้นอ้างโดยลำพัง ซึ่งข้อกฎหมายอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชนก็ได้ เพื่อประโยชน์ในการวินิจฉัยชี้ขาดคดีตามวรรคหนึ่ง ให้นำบทบัญญัติมาตรา ๑๙๘ ทวิ วรรคสอง และวรรคสาม มาใช้บังคับแก่คดีของคู่ความฝ่ายที่มาศาลโดยอนุโลม ในระหว่างการพิจารณาคดีฝ่ายเดียว ถ้าคู่ความฝ่ายที่ขาดนัดพิจารณามาศาลภายหลังที่เริ่มต้นสืบพยานไปบ้างแล้ว และแจ้งต่อศาลในโอกาสแรกว่าตนประสงค์จะดำเนินคดี เมื่อศาลเห็นว่าการขาดนัดพิจารณานั้นมิได้เป็นไปโดยจงใจหรือมีเหตุอันสมควรและศาลไม่เคยมีคำสั่งให้พิจารณาคดีใหม่ตามคำขอของคู่ความฝ่ายนั้นมาก่อนตามมาตรา ๑๙๙ ตรี ซึ่งให้นำมาใช้บังคับกับการขาดนัดพิจารณาตามมาตรา ๒๐๗ ด้วย ให้ศาลมีคำสั่งให้พิจารณาคดีนั้นใหม่ ในกรณีเช่นนี้ หากคู่ความนั้นขาดนัดพิจารณาอีก จะขอให้พิจารณาคดีใหม่ตามมาตรานี้ไม่ได้ ในกรณีตามวรรคสาม ถ้าคู่ความฝ่ายที่ขาดนัดพิจารณามิได้แจ้งต่อศาลก็ดีหรือศาลเห็นว่าการขาดนัดพิจารณานั้นเป็นไปโดยจงใจหรือไม่มีเหตุอันสมควรก็ดี หรือคำขอให้พิจารณาคดีใหม่นั้นต้องห้ามตามกฎหมายก็ดี ให้ศาลดำเนินกระบวนพิจารณาต่อไป แต่","(๑) ห้ามไม่ให้ศาลอนุญาตให้คู่ความที่ขาดนัดพิจารณานำพยานเข้าสืบถ้าคู่ความนั้นมาศาลเมื่อพ้นเวลาที่จะนำพยานของตนเข้าสืบแล้ว (๒) ถ้าคู่ความที่ขาดนัดพิจารณามาศาลเมื่อคู่ความอีกฝ่ายหนึ่งได้นำพยานหลักฐานเข้าสืบไปแล้ว ห้ามไม่ให้ศาลยอมให้คู่ความที่ขาดนัดพิจารณาคัดค้านพยานหลักฐานเช่นว่านั้น โดยวิธีถามค้านพยานของคู่ความอีกฝ่ายหนึ่งที่ได้สืบไปแล้วหรือโดยวิธีคัดค้านการระบุเอกสารหรือคัดค้านคำขอที่ให้ศาลไปทำการตรวจหรือให้ตั้งผู้เชี่ยวชาญของศาล แต่ถ้าคู่ความอีกฝ่ายหนึ่งนำพยานหลักฐานเข้าสืบยังไม่บริบูรณ์ ให้ศาลอนุญาตให้คู่ความที่ขาดนัดพิจารณาหักล้างได้แต่เฉพาะพยานหลักฐานที่นำสืบภายหลังที่ตนมาศาล (๓) ในกรณีเช่นนี้ คู่ความที่ขาดนัดพิจารณาไม่มีสิทธิที่จะร้องขอให้พิจารณาคดีใหม่"],"text":"คู่ความฝ่ายใดฝ่ายหนึ่งจะร้องต่อศาลให้วินิจฉัยชี้ขาดคดีให้ตนเป็นฝ่ายชนะโดยอาศัยเหตุแต่เพียงว่าคู่ความอีกฝ่ายหนึ่งขาดนัดพิจารณานั้นหาได้ไม่ ให้ศาลวินิจฉัยชี้ขาดคดีให้คู่ความที่มาศาลเป็นฝ่ายชนะต่อเมื่อศาลเห็นว่าข้ออ้างของคู่ความเช่นว่านี้มีมูลและไม่ขัดต่อกฎหมาย ในการนี้ ศาลจะยกขึ้นอ้างโดยลำพัง ซึ่งข้อกฎหมายอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชนก็ได้ เพื่อประโยชน์ในการวินิจฉัยชี้ขาดคดีตามวรรคหนึ่ง ให้นำบทบัญญัติมาตรา ๑๙๘ ทวิ วรรคสอง และวรรคสาม มาใช้บังคับแก่คดีของคู่ความฝ่ายที่มาศาลโดยอนุโลม ในระหว่างการพิจารณาคดีฝ่ายเดียว ถ้าคู่ความฝ่ายที่ขาดนัดพิจารณามาศาลภายหลังที่เริ่มต้นสืบพยานไปบ้างแล้ว และแจ้งต่อศาลในโอกาสแรกว่าตนประสงค์จะดำเนินคดี เมื่อศาลเห็นว่าการขาดนัดพิจารณานั้นมิได้เป็นไปโดยจงใจหรือมีเหตุอันสมควรและศาลไม่เคยมีคำสั่งให้พิจารณาคดีใหม่ตามคำขอของคู่ความฝ่ายนั้นมาก่อนตามมาตรา ๑๙๙ ตรี ซึ่งให้นำมาใช้บังคับกับการขาดนัดพิจารณาตามมาตรา ๒๐๗ ด้วย ให้ศาลมีคำสั่งให้พิจารณาคดีนั้นใหม่ ในกรณีเช่นนี้ หากคู่ความนั้นขาดนัดพิจารณาอีก จะขอให้พิจารณาคดีใหม่ตามมาตรานี้ไม่ได้ ในกรณีตามวรรคสาม ถ้าคู่ความฝ่ายที่ขาดนัดพิจารณามิได้แจ้งต่อศาลก็ดีหรือศาลเห็นว่าการขาดนัดพิจารณานั้นเป็นไปโดยจงใจหรือไม่มีเหตุอันสมควรก็ดี หรือคำขอให้พิจารณาคดีใหม่นั้นต้องห้ามตามกฎหมายก็ดี ให้ศาลดำเนินกระบวนพิจารณาต่อไป แต่\n\n(๑) ห้ามไม่ให้ศาลอนุญาตให้คู่ความที่ขาดนัดพิจารณานำพยานเข้าสืบถ้าคู่ความนั้นมาศาลเมื่อพ้นเวลาที่จะนำพยานของตนเข้าสืบแล้ว (๒) ถ้าคู่ความที่ขาดนัดพิจารณามาศาลเมื่อคู่ความอีกฝ่ายหนึ่งได้นำพยานหลักฐานเข้าสืบไปแล้ว ห้ามไม่ให้ศาลยอมให้คู่ความที่ขาดนัดพิจารณาคัดค้านพยานหลักฐานเช่นว่านั้น โดยวิธีถามค้านพยานของคู่ความอีกฝ่ายหนึ่งที่ได้สืบไปแล้วหรือโดยวิธีคัดค้านการระบุเอกสารหรือคัดค้านคำขอที่ให้ศาลไปทำการตรวจหรือให้ตั้งผู้เชี่ยวชาญของศาล แต่ถ้าคู่ความอีกฝ่ายหนึ่งนำพยานหลักฐานเข้าสืบยังไม่บริบูรณ์ ให้ศาลอนุญาตให้คู่ความที่ขาดนัดพิจารณาหักล้างได้แต่เฉพาะพยานหลักฐานที่นำสืบภายหลังที่ตนมาศาล (๓) ในกรณีเช่นนี้ คู่ความที่ขาดนัดพิจารณาไม่มีสิทธิที่จะร้องขอให้พิจารณาคดีใหม่"},{"id":"๒๐๗","num":"มาตรา ๒๐๗","num_ara":"๒๐๗","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๒ การขาดนัดพิจารณา","paragraphs":["เมื่อศาลพิพากษาให้คู่ความฝ่ายที่ขาดนัดพิจารณาแพ้คดี ให้นำบทบัญญัติมาตรา ๑๙๙ ทวิ มาใช้บังคับโดยอนุโลม และคู่ความฝ่ายนั้นอาจมีคำขอให้พิจารณาคดีใหม่ได้ ทั้งนี้ ให้นำบทบัญญัติมาตรา ๑๙๙ ตรี มาตรา ๑๙๙ จัตวา และมาตรา ๑๙๙ เบญจ มาใช้บังคับโดยอนุโลม"],"text":"เมื่อศาลพิพากษาให้คู่ความฝ่ายที่ขาดนัดพิจารณาแพ้คดี ให้นำบทบัญญัติมาตรา ๑๙๙ ทวิ มาใช้บังคับโดยอนุโลม และคู่ความฝ่ายนั้นอาจมีคำขอให้พิจารณาคดีใหม่ได้ ทั้งนี้ ให้นำบทบัญญัติมาตรา ๑๙๙ ตรี มาตรา ๑๙๙ จัตวา และมาตรา ๑๙๙ เบญจ มาใช้บังคับโดยอนุโลม"},{"id":"๒๐๘","num":"มาตรา ๒๐๘","num_ara":"๒๐๘","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๒ การขาดนัดพิจารณา","paragraphs":["(ยกเลิก)"],"text":"(ยกเลิก)"},{"id":"๒๐๙","num":"มาตรา ๒๐๙","num_ara":"๒๐๙","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๒ การพิจารณาโดยขาดนัด","subsection":"ส่วนที่ ๒ การขาดนัดพิจารณา","paragraphs":["(ยกเลิก)"],"text":"(ยกเลิก)"},{"id":"๒๑๐","num":"มาตรา ๒๑๐","num_ara":"๒๑๐","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["บรรดาคดีทั้งปวงซึ่งอยู่ในระหว่างพิจารณาของศาลชั้นต้น คู่ความจะตกลงกันเสนอข้อพิพาทอันเกี่ยวกับประเด็นทั้งปวงหรือแต่ข้อใดข้อหนึ่ง ให้อนุญาโตตุลาการคนเดียวหรือหลายคนเป็นผู้ชี้ขาดก็ได้ โดยยื่นคำขอร่วมกันกล่าวถึงข้อความแห่งข้อตกลงเช่นว่านั้นต่อศาล ถ้าศาลเห็นว่าข้อตกลงนั้นไม่ผิดกฎหมาย ให้ศาลอนุญาตตามคำขอนั้น"],"text":"บรรดาคดีทั้งปวงซึ่งอยู่ในระหว่างพิจารณาของศาลชั้นต้น คู่ความจะตกลงกันเสนอข้อพิพาทอันเกี่ยวกับประเด็นทั้งปวงหรือแต่ข้อใดข้อหนึ่ง ให้อนุญาโตตุลาการคนเดียวหรือหลายคนเป็นผู้ชี้ขาดก็ได้ โดยยื่นคำขอร่วมกันกล่าวถึงข้อความแห่งข้อตกลงเช่นว่านั้นต่อศาล ถ้าศาลเห็นว่าข้อตกลงนั้นไม่ผิดกฎหมาย ให้ศาลอนุญาตตามคำขอนั้น"},{"id":"๒๑๑","num":"มาตรา ๒๑๑","num_ara":"๒๑๑","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["ถ้าในข้อตกลงมิได้กำหนดข้อความไว้เป็นอย่างอื่น การตั้งอนุญาโตตุลาการให้ใช้ข้อบังคับดังต่อไปนี้","(๑) คู่ความชอบที่จะตั้งอนุญาโตตุลาการได้ฝ่ายละคน แต่ถ้าคดีมีโจทก์ร่วมหรือจำเลยร่วมหลายคน ให้ตั้งอนุญาโตตุลาการเพียงคนหนึ่งแทนโจทก์ร่วมทั้งหมดและคนหนึ่งแทนจำเลยร่วมทั้งหมด (๒) ถ้าคู่ความจะตั้งอนุญาโตตุลาการคนเดียวหรือหลายคน ด้วยความเห็นชอบพร้อมกัน การตั้งเช่นว่านี้ให้ทำเป็นหนังสือ ลงวัน เดือน ปี และให้คู่ความลงลายมือชื่อไว้เป็นสำคัญ (๓) ถ้าตกลงกันให้คู่ความฝ่ายหนึ่ง หรือบุคคลภายนอกเป็นผู้ตั้งอนุญาโตตุลาการ การตั้งเช่นว่านี้ ให้ทำเป็นหนังสือ ลงวัน เดือน ปี และลงลายมือชื่อของคู่ความหรือบุคคลภายนอกนั้น แล้วส่งไปให้คู่ความอื่น ๆ (๔) ถ้าศาลไม่เห็นชอบด้วยบุคคลที่คู่ความตั้งหรือที่เสนอตั้งเป็นอนุญาโตตุลาการให้ศาลสั่งให้คู่ความตั้งบุคคลอื่นหรือเสนอบุคคลอื่นตั้งเป็นอนุญาโตตุลาการ ถ้าคู่ความมิได้ตั้งหรือเสนอให้ตั้งบุคคลใดเป็นอนุญาโตตุลาการ ให้ศาลมีอำนาจตั้งบุคคลใดเป็นอนุญาโตตุลาการได้ตามที่เห็นสมควรแล้วให้ศาลส่งคำสั่งเช่นว่านี้ไปยังอนุญาโตตุลาการที่ตั้งขึ้นและคู่ความที่เกี่ยวข้องโดยทางเจ้าพนักงานศาล"],"text":"ถ้าในข้อตกลงมิได้กำหนดข้อความไว้เป็นอย่างอื่น การตั้งอนุญาโตตุลาการให้ใช้ข้อบังคับดังต่อไปนี้\n\n(๑) คู่ความชอบที่จะตั้งอนุญาโตตุลาการได้ฝ่ายละคน แต่ถ้าคดีมีโจทก์ร่วมหรือจำเลยร่วมหลายคน ให้ตั้งอนุญาโตตุลาการเพียงคนหนึ่งแทนโจทก์ร่วมทั้งหมดและคนหนึ่งแทนจำเลยร่วมทั้งหมด (๒) ถ้าคู่ความจะตั้งอนุญาโตตุลาการคนเดียวหรือหลายคน ด้วยความเห็นชอบพร้อมกัน การตั้งเช่นว่านี้ให้ทำเป็นหนังสือ ลงวัน เดือน ปี และให้คู่ความลงลายมือชื่อไว้เป็นสำคัญ (๓) ถ้าตกลงกันให้คู่ความฝ่ายหนึ่ง หรือบุคคลภายนอกเป็นผู้ตั้งอนุญาโตตุลาการ การตั้งเช่นว่านี้ ให้ทำเป็นหนังสือ ลงวัน เดือน ปี และลงลายมือชื่อของคู่ความหรือบุคคลภายนอกนั้น แล้วส่งไปให้คู่ความอื่น ๆ (๔) ถ้าศาลไม่เห็นชอบด้วยบุคคลที่คู่ความตั้งหรือที่เสนอตั้งเป็นอนุญาโตตุลาการให้ศาลสั่งให้คู่ความตั้งบุคคลอื่นหรือเสนอบุคคลอื่นตั้งเป็นอนุญาโตตุลาการ ถ้าคู่ความมิได้ตั้งหรือเสนอให้ตั้งบุคคลใดเป็นอนุญาโตตุลาการ ให้ศาลมีอำนาจตั้งบุคคลใดเป็นอนุญาโตตุลาการได้ตามที่เห็นสมควรแล้วให้ศาลส่งคำสั่งเช่นว่านี้ไปยังอนุญาโตตุลาการที่ตั้งขึ้นและคู่ความที่เกี่ยวข้องโดยทางเจ้าพนักงานศาล"},{"id":"๒๑๒","num":"มาตรา ๒๑๒","num_ara":"๒๑๒","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["ข้อความในหมวดนี้มิได้ให้อำนาจศาลที่จะตั้งบุคคลใดเป็นอนุญาโตตุลาการโดยมิได้รับความยินยอมจากบุคคลนั้น"],"text":"ข้อความในหมวดนี้มิได้ให้อำนาจศาลที่จะตั้งบุคคลใดเป็นอนุญาโตตุลาการโดยมิได้รับความยินยอมจากบุคคลนั้น"},{"id":"๒๑๓","num":"มาตรา ๒๑๓","num_ara":"๒๑๓","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["เมื่อบุคคลหรือคู่ความที่มีสิทธิ ได้ตั้งอนุญาโตตุลาการขึ้นแล้ว ห้ามมิให้บุคคลหรือคู่ความนั้นถอนการตั้งเสีย เว้นแต่คู่ความอีกฝ่ายหนึ่งจะได้ยินยอมด้วย อนุญาโตตุลาการที่ตั้งขึ้นโดยชอบนั้น ถ้าเป็นกรณีที่ศาลหรือบุคคลภายนอกเป็นผู้ตั้ง คู่ความฝ่ายใดฝ่ายหนึ่งจะคัดค้านก็ได้ หรือถ้าเป็นกรณีที่คู่ความฝ่ายหนึ่งเป็นผู้ตั้ง คู่ความอีกฝ่ายหนึ่งจะคัดค้านก็ได้ โดยอาศัยเหตุดังที่บัญญัติไว้ในมาตรา ๑๑ หรือเหตุที่อนุญาโตตุลาการนั้นเป็นผู้ไร้ความสามารถ หรือไม่สามารถทำหน้าที่อนุญาโตตุลาการได้ ในกรณีที่มีการคัดค้านอนุญาโตตุลาการดังว่านี้ ให้นำบทบัญญัติว่าด้วยการคัดค้านผู้พิพากษามาใช้บังคับโดยอนุโลม ถ้าการคัดค้านอนุญาโตตุลาการนั้นฟังขึ้น ให้ตั้งอนุญาโตตุลาการขึ้นใหม่"],"text":"เมื่อบุคคลหรือคู่ความที่มีสิทธิ ได้ตั้งอนุญาโตตุลาการขึ้นแล้ว ห้ามมิให้บุคคลหรือคู่ความนั้นถอนการตั้งเสีย เว้นแต่คู่ความอีกฝ่ายหนึ่งจะได้ยินยอมด้วย อนุญาโตตุลาการที่ตั้งขึ้นโดยชอบนั้น ถ้าเป็นกรณีที่ศาลหรือบุคคลภายนอกเป็นผู้ตั้ง คู่ความฝ่ายใดฝ่ายหนึ่งจะคัดค้านก็ได้ หรือถ้าเป็นกรณีที่คู่ความฝ่ายหนึ่งเป็นผู้ตั้ง คู่ความอีกฝ่ายหนึ่งจะคัดค้านก็ได้ โดยอาศัยเหตุดังที่บัญญัติไว้ในมาตรา ๑๑ หรือเหตุที่อนุญาโตตุลาการนั้นเป็นผู้ไร้ความสามารถ หรือไม่สามารถทำหน้าที่อนุญาโตตุลาการได้ ในกรณีที่มีการคัดค้านอนุญาโตตุลาการดังว่านี้ ให้นำบทบัญญัติว่าด้วยการคัดค้านผู้พิพากษามาใช้บังคับโดยอนุโลม ถ้าการคัดค้านอนุญาโตตุลาการนั้นฟังขึ้น ให้ตั้งอนุญาโตตุลาการขึ้นใหม่"},{"id":"๒๑๔","num":"มาตรา ๒๑๔","num_ara":"๒๑๔","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["ถ้าในข้อตกลงมิได้กำหนดค่าธรรมเนียมอนุญาโตตุลาการไว้ อนุญาโตตุลาการชอบที่จะเสนอความข้อนี้ต่อศาลโดยทำเป็นคำร้อง และให้ศาลมีอำนาจมีคำสั่งให้ชำระค่าธรรมเนียมตามที่เห็นสมควร"],"text":"ถ้าในข้อตกลงมิได้กำหนดค่าธรรมเนียมอนุญาโตตุลาการไว้ อนุญาโตตุลาการชอบที่จะเสนอความข้อนี้ต่อศาลโดยทำเป็นคำร้อง และให้ศาลมีอำนาจมีคำสั่งให้ชำระค่าธรรมเนียมตามที่เห็นสมควร"},{"id":"๒๑๕","num":"มาตรา ๒๑๕","num_ara":"๒๑๕","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["เมื่อได้ตั้งอนุญาโตตุลาการขึ้นแล้ว ถ้าในข้อตกลงหรือในคำสั่งศาล แล้วแต่กรณี มิได้กำหนดประเด็นข้อพิพาทไว้ ให้อนุญาโตตุลาการกำหนดประเด็นข้อพิพาทเหล่านั้น แล้วจดลงในรายงานพิสดารกลัดไว้ในสำนวนคดีอนุญาโตตุลาการ"],"text":"เมื่อได้ตั้งอนุญาโตตุลาการขึ้นแล้ว ถ้าในข้อตกลงหรือในคำสั่งศาล แล้วแต่กรณี มิได้กำหนดประเด็นข้อพิพาทไว้ ให้อนุญาโตตุลาการกำหนดประเด็นข้อพิพาทเหล่านั้น แล้วจดลงในรายงานพิสดารกลัดไว้ในสำนวนคดีอนุญาโตตุลาการ"},{"id":"๒๑๖","num":"มาตรา ๒๑๖","num_ara":"๒๑๖","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["ก่อนที่จะทำคำชี้ขาด ให้อนุญาโตตุลาการฟังคู่ความทั้งปวงและอาจทำการไต่สวนตามที่เห็นสมควรในข้อพิพาทอันเสนอมาให้พิจารณานั้น อนุญาโตตุลาการ อาจตรวจเอกสารทั้งปวงที่ยื่นขึ้นมาและฟังพยาน หรือผู้เชี่ยวชาญซึ่งเต็มใจมาให้การ ถ้าอนุญาโตตุลาการขอให้ศาลส่งคำคู่ความ หรือบรรดาเอกสารอื่น ๆ ในสำนวนเช่นว่านี้มาให้ตรวจดู ให้ศาลจัดการให้ตามคำร้องขอนั้น ถ้าอนุญาโตตุลาการเห็นว่าจำต้องดำเนินกระบวนพิจารณาอย่างใด ที่ต้องดำเนินทางศาล (เช่น หมายเรียกพยานหรือให้พยานสาบานตน หรือให้ส่งเอกสาร) อนุญาโตตุลาการอาจยื่นคำขอโดยทำเป็นคำร้องต่อศาล ให้ศาลดำเนินกระบวนพิจารณาเช่นว่านั้น ถ้าศาลเห็นว่ากระบวนพิจารณานั้นอยู่ในอำนาจศาลและพึงรับทำให้ได้แล้ว ให้ศาลจัดการให้ตามคำขอเช่นว่านี้ โดยเรียกค่าธรรมเนียมศาลตามอัตราที่กำหนดไว้สำหรับกระบวนพิจารณาที่ขอให้จัดการนั้นจากอนุญาโตตุลาการ ภายใต้บังคับบทบัญญัติมาตรา ๒๑๕ และมาตรานี้ อนุญาโตตุลาการมีอำนาจที่จะดำเนินตามวิธีพิจารณาใด ๆ ตามที่เห็นสมควรก็ได้ เว้นแต่ในข้อตกลงจะกำหนดไว้เป็นอย่างอื่น"],"text":"ก่อนที่จะทำคำชี้ขาด ให้อนุญาโตตุลาการฟังคู่ความทั้งปวงและอาจทำการไต่สวนตามที่เห็นสมควรในข้อพิพาทอันเสนอมาให้พิจารณานั้น อนุญาโตตุลาการ อาจตรวจเอกสารทั้งปวงที่ยื่นขึ้นมาและฟังพยาน หรือผู้เชี่ยวชาญซึ่งเต็มใจมาให้การ ถ้าอนุญาโตตุลาการขอให้ศาลส่งคำคู่ความ หรือบรรดาเอกสารอื่น ๆ ในสำนวนเช่นว่านี้มาให้ตรวจดู ให้ศาลจัดการให้ตามคำร้องขอนั้น ถ้าอนุญาโตตุลาการเห็นว่าจำต้องดำเนินกระบวนพิจารณาอย่างใด ที่ต้องดำเนินทางศาล (เช่น หมายเรียกพยานหรือให้พยานสาบานตน หรือให้ส่งเอกสาร) อนุญาโตตุลาการอาจยื่นคำขอโดยทำเป็นคำร้องต่อศาล ให้ศาลดำเนินกระบวนพิจารณาเช่นว่านั้น ถ้าศาลเห็นว่ากระบวนพิจารณานั้นอยู่ในอำนาจศาลและพึงรับทำให้ได้แล้ว ให้ศาลจัดการให้ตามคำขอเช่นว่านี้ โดยเรียกค่าธรรมเนียมศาลตามอัตราที่กำหนดไว้สำหรับกระบวนพิจารณาที่ขอให้จัดการนั้นจากอนุญาโตตุลาการ ภายใต้บังคับบทบัญญัติมาตรา ๒๑๕ และมาตรานี้ อนุญาโตตุลาการมีอำนาจที่จะดำเนินตามวิธีพิจารณาใด ๆ ตามที่เห็นสมควรก็ได้ เว้นแต่ในข้อตกลงจะกำหนดไว้เป็นอย่างอื่น"},{"id":"๒๑๗","num":"มาตรา ๒๑๗","num_ara":"๒๑๗","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["ถ้าในข้อตกลงมิได้กำหนดไว้เป็นอย่างอื่น คำชี้ขาดของอนุญาโตตุลาการนั้นให้อยู่ภายในบังคับต่อไปนี้","(๑) ในกรณีที่มีอนุญาโตตุลาการหลายคน ให้ชี้ขาดตามคะแนนเสียงฝ่ายข้างมาก (๒) ถ้าคะแนนเสียงเท่ากัน ให้อนุญาโตตุลาการตั้งบุคคลภายนอกเป็นประธานขึ้นคนหนึ่ง เพื่อออกคะแนนเสียงชี้ขาด ถ้าอนุญาโตตุลาการไม่ตกลงกันในการตั้งประธาน ให้ยื่นคำขอโดยทำเป็นคำร้องต่อศาลให้มีคำสั่งตั้งประธาน"],"text":"ถ้าในข้อตกลงมิได้กำหนดไว้เป็นอย่างอื่น คำชี้ขาดของอนุญาโตตุลาการนั้นให้อยู่ภายในบังคับต่อไปนี้\n\n(๑) ในกรณีที่มีอนุญาโตตุลาการหลายคน ให้ชี้ขาดตามคะแนนเสียงฝ่ายข้างมาก (๒) ถ้าคะแนนเสียงเท่ากัน ให้อนุญาโตตุลาการตั้งบุคคลภายนอกเป็นประธานขึ้นคนหนึ่ง เพื่อออกคะแนนเสียงชี้ขาด ถ้าอนุญาโตตุลาการไม่ตกลงกันในการตั้งประธาน ให้ยื่นคำขอโดยทำเป็นคำร้องต่อศาลให้มีคำสั่งตั้งประธาน"},{"id":"๒๑๘","num":"มาตรา ๒๑๘","num_ara":"๒๑๘","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["ให้นำบทบัญญัติมาตรา ๑๔๐, ๑๔๑ และ ๑๔๒ ว่าด้วยคำพิพากษาและคำสั่งของศาลมาใช้บังคับแก่คำชี้ขาดของอนุญาโตตุลาการโดยอนุโลม ให้อนุญาโตตุลาการยื่นคำชี้ขาดของตนต่อศาล และให้ศาลพิพากษาตามคำชี้ขาดนั้น แต่ถ้าศาลเห็นว่า คำชี้ขาดของอนุญาโตตุลาการขัดต่อกฎหมายประการใดประการหนึ่ง ให้ศาลมีอำนาจทำคำสั่งปฏิเสธไม่ยอมพิพากษาตามคำชี้ขาดนั้น แต่ถ้าคำชี้ขาดนั้นอาจแก้ไขให้ถูกต้องได้ ศาลอาจให้อนุญาโตตุลาการหรือคู่ความที่เกี่ยวข้องแก้ไขเสียก่อนภายในเวลาอันสมควรที่ศาลจะกำหนดไว้"],"text":"ให้นำบทบัญญัติมาตรา ๑๔๐, ๑๔๑ และ ๑๔๒ ว่าด้วยคำพิพากษาและคำสั่งของศาลมาใช้บังคับแก่คำชี้ขาดของอนุญาโตตุลาการโดยอนุโลม ให้อนุญาโตตุลาการยื่นคำชี้ขาดของตนต่อศาล และให้ศาลพิพากษาตามคำชี้ขาดนั้น แต่ถ้าศาลเห็นว่า คำชี้ขาดของอนุญาโตตุลาการขัดต่อกฎหมายประการใดประการหนึ่ง ให้ศาลมีอำนาจทำคำสั่งปฏิเสธไม่ยอมพิพากษาตามคำชี้ขาดนั้น แต่ถ้าคำชี้ขาดนั้นอาจแก้ไขให้ถูกต้องได้ ศาลอาจให้อนุญาโตตุลาการหรือคู่ความที่เกี่ยวข้องแก้ไขเสียก่อนภายในเวลาอันสมควรที่ศาลจะกำหนดไว้"},{"id":"๒๑๙","num":"มาตรา ๒๑๙","num_ara":"๒๑๙","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["ถ้าในข้อตกลงมิได้กำหนดข้อความไว้เป็นอย่างอื่น ในกรณีที่ไม่อาจดำเนินตามข้อตกลง เสนอข้อพิพาทให้อนุญาโตตุลาการชี้ขาด เพราะบุคคลภายนอกซึ่งรับมอบหมายให้เป็นผู้ตั้งอนุญาโตตุลาการมิได้ตั้งอนุญาโตตุลาการขึ้น หรืออนุญาโตตุลาการที่ตั้งขึ้นคนเดียวหรือหลายคนนั้นปฏิเสธไม่ยอมรับหน้าที่ หรือตายเสียก่อน หรือตกเป็นผู้ไร้ความสามารถ หรือด้วยเหตุประการอื่นไม่อาจที่จะปฏิบัติหน้าที่ของตนได้ก่อนให้คำชี้ขาด หรือปฏิเสธ หรือเพิกเฉยไม่กระทำตามหน้าที่ของตนภายในเวลาอันสมควร ถ้าคู่ความไม่สามารถทำความตกลงกันเป็นอย่างอื่น ให้ถือว่าข้อตกลงนั้นเป็นอันสิ้นสุด"],"text":"ถ้าในข้อตกลงมิได้กำหนดข้อความไว้เป็นอย่างอื่น ในกรณีที่ไม่อาจดำเนินตามข้อตกลง เสนอข้อพิพาทให้อนุญาโตตุลาการชี้ขาด เพราะบุคคลภายนอกซึ่งรับมอบหมายให้เป็นผู้ตั้งอนุญาโตตุลาการมิได้ตั้งอนุญาโตตุลาการขึ้น หรืออนุญาโตตุลาการที่ตั้งขึ้นคนเดียวหรือหลายคนนั้นปฏิเสธไม่ยอมรับหน้าที่ หรือตายเสียก่อน หรือตกเป็นผู้ไร้ความสามารถ หรือด้วยเหตุประการอื่นไม่อาจที่จะปฏิบัติหน้าที่ของตนได้ก่อนให้คำชี้ขาด หรือปฏิเสธ หรือเพิกเฉยไม่กระทำตามหน้าที่ของตนภายในเวลาอันสมควร ถ้าคู่ความไม่สามารถทำความตกลงกันเป็นอย่างอื่น ให้ถือว่าข้อตกลงนั้นเป็นอันสิ้นสุด"},{"id":"๒๒๐","num":"มาตรา ๒๒๐","num_ara":"๒๒๐","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["ถ้ามีข้อพิพาทเกิดขึ้นเนื่องจากการดำเนินตามข้อตกลงเสนอข้อพิพาทให้อนุญาโตตุลาการชี้ขาด หรือมีข้อพิพาทกันว่า ข้อตกลงนั้นได้สิ้นสุดลงตามมาตราก่อนแล้วหรือหาไม่ ข้อพิพาทนั้นให้เสนอต่อศาลที่เห็นชอบด้วยข้อตกลงดังกล่าวแล้ว"],"text":"ถ้ามีข้อพิพาทเกิดขึ้นเนื่องจากการดำเนินตามข้อตกลงเสนอข้อพิพาทให้อนุญาโตตุลาการชี้ขาด หรือมีข้อพิพาทกันว่า ข้อตกลงนั้นได้สิ้นสุดลงตามมาตราก่อนแล้วหรือหาไม่ ข้อพิพาทนั้นให้เสนอต่อศาลที่เห็นชอบด้วยข้อตกลงดังกล่าวแล้ว"},{"id":"๒๒๑","num":"มาตรา ๒๒๑","num_ara":"๒๒๑","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["การเสนอข้อพิพาทให้อนุญาโตตุลาการชี้ขาดนอกศาล ให้เป็นไปตามกฎหมายว่าด้วยอนุญาโตตุลาการ"],"text":"การเสนอข้อพิพาทให้อนุญาโตตุลาการชี้ขาดนอกศาล ให้เป็นไปตามกฎหมายว่าด้วยอนุญาโตตุลาการ"},{"id":"๒๒๒","num":"มาตรา ๒๒๒","num_ara":"๒๒๒","part":"ภาค ๒ วิธีพิจารณาในศาลชั้นต้น","chapter":"ลักษณะ ๒ วิธีพิจารณาวิสามัญในศาลชั้นต้น","section":"หมวด ๓ อนุญาโตตุลาการ","subsection":"","paragraphs":["ห้ามมิให้อุทธรณ์คำสั่งศาลซึ่งปฏิเสธไม่ยอมพิพากษาตามคำชี้ขาดของอนุญาโตตุลาการ หรือคำพิพากษาของศาลตามคำชี้ขาดของอนุญาโตตุลาการ เว้นแต่ในเหตุต่อไปนี้","(๑) เมื่อมีข้ออ้างแสดงว่าอนุญาโตตุลาการหรือประธานมิได้กระทำการโดยสุจริต หรือคู่ความฝ่ายใดฝ่ายหนึ่งใช้กลฉ้อฉล (๒) เมื่อคำสั่งหรือคำพิพากษานั้นฝ่าฝืนต่อบทกฎหมายอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชน (๓) เมื่อคำพิพากษานั้นไม่ตรงกับคำชี้ขาดของอนุญาโตตุลาการ"],"text":"ห้ามมิให้อุทธรณ์คำสั่งศาลซึ่งปฏิเสธไม่ยอมพิพาก
