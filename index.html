คลภายนอก หรือในครอบครองของทางราชการ หรือของเจ้าหน้าที่ซึ่งคู่ความที่อ้างไม่อาจร้องขอโดยตรงให้ส่งเอกสารนั้นมาได้ ให้นำบทบัญญัติในวรรคก่อนว่าด้วยการที่คู่ความฝ่ายที่อ้างเอกสารยื่นคำขอ และการที่ศาลมีคำสั่งมาใช้บังคับโดยอนุโลม แต่ทั้งนี้ ฝ่ายที่อ้างต้องส่งคำสั่งศาลแก่ผู้ครอบครองเอกสารนั้นล่วงหน้าอย่างน้อยเจ็ดวัน ถ้าไม่ได้เอกสารนั้นมาสืบตามกำหนด เมื่อศาลเห็นสมควร ก็ให้ศาลสืบพยานต่อไปตามที่บทบัญญัติไว้ในมาตรา ๙๓ (๒)"},{"id":"๑๒๔","num":"มาตรา ๑๒๔","num_ara":"๑๒๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๓ การนำพยานเอกสารมาสืบ","subsection":"","paragraphs":["ถ้าคู่ความฝ่ายที่อ้างเอกสารไม่ยอมนำมาหรือยื่นต้นฉบับเอกสาร หรือถ้าคู่ความฝ่ายนั้นได้ทำให้เสียหาย ทำลาย ปิดบัง หรือทำด้วยประการอื่นใด ให้เอกสารนั้นไร้ประโยชน์โดยมุ่งหมายที่จะกีดกันไม่ให้คู่ความอีกฝ่ายหนึ่งอ้างอิงเอกสารนั้นเป็นพยานหลักฐาน ให้ถือว่าข้อเท็จจริงแห่งข้ออ้างที่คู่ความอีกฝ่ายหนึ่งจะต้องนำสืบโดยเอกสารนั้น คู่ความฝ่ายที่ไม่นำมาหรือยื่นเอกสารดังกล่าวข้างต้นนั้นได้ยอมรับแล้ว"],"text":"ถ้าคู่ความฝ่ายที่อ้างเอกสารไม่ยอมนำมาหรือยื่นต้นฉบับเอกสาร หรือถ้าคู่ความฝ่ายนั้นได้ทำให้เสียหาย ทำลาย ปิดบัง หรือทำด้วยประการอื่นใด ให้เอกสารนั้นไร้ประโยชน์โดยมุ่งหมายที่จะกีดกันไม่ให้คู่ความอีกฝ่ายหนึ่งอ้างอิงเอกสารนั้นเป็นพยานหลักฐาน ให้ถือว่าข้อเท็จจริงแห่งข้ออ้างที่คู่ความอีกฝ่ายหนึ่งจะต้องนำสืบโดยเอกสารนั้น คู่ความฝ่ายที่ไม่นำมาหรือยื่นเอกสารดังกล่าวข้างต้นนั้นได้ยอมรับแล้ว"},{"id":"๑๒๕","num":"มาตรา ๑๒๕","num_ara":"๑๒๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๓ การนำพยานเอกสารมาสืบ","subsection":"","paragraphs":["คู่ความฝ่ายที่ถูกอีกฝ่ายหนึ่งอ้างอิงเอกสารมาเป็นพยานหลักฐานยันตนอาจคัดค้านการนำเอกสารนั้นมาสืบโดยเหตุที่ว่าไม่มีต้นฉบับหรือต้นฉบับนั้นปลอมทั้งฉบับหรือบางส่วนหรือสำเนานั้นไม่ถูกต้องกับต้นฉบับ โดยคัดค้านต่อศาลก่อนการสืบพยานเอกสารนั้นเสร็จ ถ้าคู่ความซึ่งประสงค์จะคัดค้านมีเหตุผลอันสมควรที่ไม่อาจทราบได้ก่อนการสืบพยานเอกสารนั้นเสร็จว่าต้นฉบับเอกสารนั้นไม่มี หรือเอกสารนั้นปลอม หรือสำเนาไม่ถูกต้อง คู่ความนั้นอาจยื่นคำร้องขออนุญาตคัดค้านการอ้างเอกสารมาสืบดังกล่าวข้างต้นต่อศาล ไม่ว่าเวลาใดก่อนศาลพิพากษา ถ้าศาลเห็นว่าคู่ความนั้นไม่อาจยกข้อคัดค้านได้ก่อนนั้น และคำขอนั้นมีเหตุผลฟังได้ ก็ให้ศาลมีคำสั่งอนุญาตตามคำขอ ถ้าคู่ความซึ่งประสงค์จะคัดค้านไม่คัดค้านการอ้างเอกสารเสียก่อนการสืบพยานเอกสารนั้นเสร็จ หรือศาลไม่อนุญาตให้คัดค้านภายหลังนั้น ห้ามมิให้คู่ความนั้นคัดค้านการมีอยู่ และความแท้จริงของเอกสารนั้น หรือความถูกต้องแห่งสำเนาเอกสารนั้น แต่ทั้งนี้ ไม่ตัดอำนาจของศาลในอันที่จะไต่สวนและชี้ขาดในเรื่องการมีอยู่ ความแท้จริง หรือความถูกต้องเช่นว่านั้น ในเมื่อศาลเห็นสมควร และไม่ตัดสิทธิของคู่ความนั้นที่จะอ้างว่าสัญญาหรือหนี้ที่ระบุไว้ในเอกสารนั้นไม่สมบูรณ์หรือคู่ความอีกฝ่ายหนึ่งตีความหมายผิด"],"text":"คู่ความฝ่ายที่ถูกอีกฝ่ายหนึ่งอ้างอิงเอกสารมาเป็นพยานหลักฐานยันตนอาจคัดค้านการนำเอกสารนั้นมาสืบโดยเหตุที่ว่าไม่มีต้นฉบับหรือต้นฉบับนั้นปลอมทั้งฉบับหรือบางส่วนหรือสำเนานั้นไม่ถูกต้องกับต้นฉบับ โดยคัดค้านต่อศาลก่อนการสืบพยานเอกสารนั้นเสร็จ ถ้าคู่ความซึ่งประสงค์จะคัดค้านมีเหตุผลอันสมควรที่ไม่อาจทราบได้ก่อนการสืบพยานเอกสารนั้นเสร็จว่าต้นฉบับเอกสารนั้นไม่มี หรือเอกสารนั้นปลอม หรือสำเนาไม่ถูกต้อง คู่ความนั้นอาจยื่นคำร้องขออนุญาตคัดค้านการอ้างเอกสารมาสืบดังกล่าวข้างต้นต่อศาล ไม่ว่าเวลาใดก่อนศาลพิพากษา ถ้าศาลเห็นว่าคู่ความนั้นไม่อาจยกข้อคัดค้านได้ก่อนนั้น และคำขอนั้นมีเหตุผลฟังได้ ก็ให้ศาลมีคำสั่งอนุญาตตามคำขอ ถ้าคู่ความซึ่งประสงค์จะคัดค้านไม่คัดค้านการอ้างเอกสารเสียก่อนการสืบพยานเอกสารนั้นเสร็จ หรือศาลไม่อนุญาตให้คัดค้านภายหลังนั้น ห้ามมิให้คู่ความนั้นคัดค้านการมีอยู่ และความแท้จริงของเอกสารนั้น หรือความถูกต้องแห่งสำเนาเอกสารนั้น แต่ทั้งนี้ ไม่ตัดอำนาจของศาลในอันที่จะไต่สวนและชี้ขาดในเรื่องการมีอยู่ ความแท้จริง หรือความถูกต้องเช่นว่านั้น ในเมื่อศาลเห็นสมควร และไม่ตัดสิทธิของคู่ความนั้นที่จะอ้างว่าสัญญาหรือหนี้ที่ระบุไว้ในเอกสารนั้นไม่สมบูรณ์หรือคู่ความอีกฝ่ายหนึ่งตีความหมายผิด"},{"id":"๑๒๖","num":"มาตรา ๑๒๖","num_ara":"๑๒๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๓ การนำพยานเอกสารมาสืบ","subsection":"","paragraphs":["ภายใต้บังคับแห่งบทบัญญัติมาตราต่อไปนี้ ถ้าคู่ความที่ถูกอีกฝ่ายหนึ่งอ้างอิงเอกสารมาเป็นพยานหลักฐานยันแก่ตน ปฏิเสธความแท้จริงของเอกสารนั้น หรือความถูกต้องแห่งสำเนาเอกสารนั้น และคู่ความฝ่ายที่อ้างยังคงยืนยันความแท้จริงหรือความถูกต้องแห่งสำเนาของเอกสาร ถ้าศาลเห็นสมควร ให้ศาลชี้ขาดข้อโต้เถียงนั้นได้ทันทีในเมื่อเห็นว่าไม่จำเป็นต้องสืบพยานหลักฐานต่อไป หรือมิฉะนั้นให้ชี้ขาดในเมื่อได้สืบพยานตามวิธีต่อไปนี้ทั้งหมดหรือโดยวิธีใดวิธีหนึ่ง คือ","(๑) ตรวจสอบบรรดาเอกสารที่มิได้ถูกคัดค้านแล้วจดลงไว้ซึ่งการมีอยู่หรือข้อความแห่งเอกสารที่ถูกคัดค้าน (๒) ซักถามพยานที่ทราบการมีอยู่หรือข้อความแห่งเอกสารที่ถูกคัดค้าน หรือพยานผู้ที่สามารถเบิกความในข้อความแท้จริงแห่งเอกสาร หรือความถูกต้องแห่งสำเนา (๓) ให้ผู้เชี่ยวชาญตรวจสอบเอกสารที่ถูกคัดค้านนั้น ในระหว่างที่ยังมิได้ชี้ขาดตัดสินคดี ให้ศาลยึดเอกสารที่สงสัยว่าปลอมหรือไม่ถูกต้องไว้ แต่ความข้อนี้ไม่บังคับถึงเอกสารราชการซึ่งทางราชการเรียกคืนไป"],"text":"ภายใต้บังคับแห่งบทบัญญัติมาตราต่อไปนี้ ถ้าคู่ความที่ถูกอีกฝ่ายหนึ่งอ้างอิงเอกสารมาเป็นพยานหลักฐานยันแก่ตน ปฏิเสธความแท้จริงของเอกสารนั้น หรือความถูกต้องแห่งสำเนาเอกสารนั้น และคู่ความฝ่ายที่อ้างยังคงยืนยันความแท้จริงหรือความถูกต้องแห่งสำเนาของเอกสาร ถ้าศาลเห็นสมควร ให้ศาลชี้ขาดข้อโต้เถียงนั้นได้ทันทีในเมื่อเห็นว่าไม่จำเป็นต้องสืบพยานหลักฐานต่อไป หรือมิฉะนั้นให้ชี้ขาดในเมื่อได้สืบพยานตามวิธีต่อไปนี้ทั้งหมดหรือโดยวิธีใดวิธีหนึ่ง คือ\n\n(๑) ตรวจสอบบรรดาเอกสารที่มิได้ถูกคัดค้านแล้วจดลงไว้ซึ่งการมีอยู่หรือข้อความแห่งเอกสารที่ถูกคัดค้าน (๒) ซักถามพยานที่ทราบการมีอยู่หรือข้อความแห่งเอกสารที่ถูกคัดค้าน หรือพยานผู้ที่สามารถเบิกความในข้อความแท้จริงแห่งเอกสาร หรือความถูกต้องแห่งสำเนา (๓) ให้ผู้เชี่ยวชาญตรวจสอบเอกสารที่ถูกคัดค้านนั้น ในระหว่างที่ยังมิได้ชี้ขาดตัดสินคดี ให้ศาลยึดเอกสารที่สงสัยว่าปลอมหรือไม่ถูกต้องไว้ แต่ความข้อนี้ไม่บังคับถึงเอกสารราชการซึ่งทางราชการเรียกคืนไป"},{"id":"๑๒๗","num":"มาตรา ๑๒๗","num_ara":"๑๒๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๓ การนำพยานเอกสารมาสืบ","subsection":"","paragraphs":["เอกสารมหาชนซึ่งพนักงานเจ้าหน้าที่ได้ทำขึ้นหรือรับรอง หรือสำเนาอันรับรองถูกต้องแห่งเอกสารนั้น และเอกสารเอกชนที่มีคำพิพากษาแสดงว่าเป็นของแท้จริงและถูกต้องนั้น ให้สันนิษฐานไว้ก่อนว่าเป็นของแท้จริงและถูกต้อง เป็นหน้าที่ของคู่ความฝ่ายที่ถูกอ้างเอกสารนั้นมายัน ต้องนำสืบความไม่บริสุทธิ์หรือความไม่ถูกต้องแห่งเอกสาร"],"text":"เอกสารมหาชนซึ่งพนักงานเจ้าหน้าที่ได้ทำขึ้นหรือรับรอง หรือสำเนาอันรับรองถูกต้องแห่งเอกสารนั้น และเอกสารเอกชนที่มีคำพิพากษาแสดงว่าเป็นของแท้จริงและถูกต้องนั้น ให้สันนิษฐานไว้ก่อนว่าเป็นของแท้จริงและถูกต้อง เป็นหน้าที่ของคู่ความฝ่ายที่ถูกอ้างเอกสารนั้นมายัน ต้องนำสืบความไม่บริสุทธิ์หรือความไม่ถูกต้องแห่งเอกสาร"},{"id":"๑๒๗_ทวิ","num":"มาตรา ๑๒๗ ทวิ","num_ara":"๑๒๗ ทวิ","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๓ การนำพยานเอกสารมาสืบ","subsection":"","paragraphs":["ต้นฉบับพยานเอกสารหรือพยานวัตถุอันสำคัญที่คู่ความได้ยื่นต่อศาลหรือที่บุคคลภายนอกได้ยื่นต่อศาล หากผู้ที่ยื่นต้องใช้เป็นประจำหรือตามความจำเป็นหรือมีความสำคัญในการเก็บรักษา ศาลจะอนุญาตให้ผู้ที่ยื่นรับคืนไป โดยให้คู่ความตรวจดู และให้ผู้ที่ยื่นส่งสำเนาหรือภาพถ่ายไว้แทน หรือจะมีคำสั่งอย่างใดตามที่เห็นสมควรก็ได้"],"text":"ต้นฉบับพยานเอกสารหรือพยานวัตถุอันสำคัญที่คู่ความได้ยื่นต่อศาลหรือที่บุคคลภายนอกได้ยื่นต่อศาล หากผู้ที่ยื่นต้องใช้เป็นประจำหรือตามความจำเป็นหรือมีความสำคัญในการเก็บรักษา ศาลจะอนุญาตให้ผู้ที่ยื่นรับคืนไป โดยให้คู่ความตรวจดู และให้ผู้ที่ยื่นส่งสำเนาหรือภาพถ่ายไว้แทน หรือจะมีคำสั่งอย่างใดตามที่เห็นสมควรก็ได้"},{"id":"๑๒๘","num":"มาตรา ๑๒๘","num_ara":"๑๒๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๔ การตรวจและการแต่งตั้งผู้เชี่ยวชาญโดยศาล","subsection":"","paragraphs":["ถ้าพยานหลักฐานที่ศาลจะทำการตรวจนั้นเป็นบุคคลหรือสังหาริมทรัพย์ซึ่งอาจนำมาศาลได้ ให้คู่ความฝ่ายที่ได้รับอนุญาตให้นำสืบพยานหลักฐานเช่นว่านั้นนำบุคคลหรือทรัพย์นั้นมาในวันสืบพยาน หรือวันอื่นใดที่ศาลจะได้กำหนดให้นำมา ถ้าการตรวจไม่สามารถกระทำได้ในศาล ให้ศาลทำการตรวจสถานที่ เวลา และภายในเงื่อนไข ตามที่ศาลจะเห็นสมควรแล้วแต่สภาพแห่งการตรวจนั้น ๆ"],"text":"ถ้าพยานหลักฐานที่ศาลจะทำการตรวจนั้นเป็นบุคคลหรือสังหาริมทรัพย์ซึ่งอาจนำมาศาลได้ ให้คู่ความฝ่ายที่ได้รับอนุญาตให้นำสืบพยานหลักฐานเช่นว่านั้นนำบุคคลหรือทรัพย์นั้นมาในวันสืบพยาน หรือวันอื่นใดที่ศาลจะได้กำหนดให้นำมา ถ้าการตรวจไม่สามารถกระทำได้ในศาล ให้ศาลทำการตรวจสถานที่ เวลา และภายในเงื่อนไข ตามที่ศาลจะเห็นสมควรแล้วแต่สภาพแห่งการตรวจนั้น ๆ"},{"id":"๑๒๘_๑","num":"มาตรา ๑๒๘/๑","num_ara":"๑๒๘/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๔ การตรวจและการแต่งตั้งผู้เชี่ยวชาญโดยศาล","subsection":"","paragraphs":["ในกรณีที่จำเป็นต้องใช้พยานหลักฐานทางวิทยาศาสตร์เพื่อพิสูจน์ข้อเท็จจริงใดที่เป็นประเด็นสำคัญแห่งคดี เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งร้องขอ ศาลมีอำนาจสั่งให้ทำการตรวจพิสูจน์บุคคล วัตถุหรือเอกสารใด ๆ โดยวิธีการทางวิทยาศาสตร์ได้ ในกรณีที่พยานหลักฐานทางวิทยาศาสตร์จะสามารถพิสูจน์ให้เห็นถึงข้อเท็จจริงที่ทำให้ศาลวินิจฉัยชี้ขาดคดีได้โดยไม่ต้องสืบพยานหลักฐานอื่นอีก เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งร้องขอ ศาลอาจสั่งให้ทำการตรวจพิสูจน์ตามวรรคหนึ่งโดยไม่ต้องรอให้ถึงวันสืบพยานตามปกติก็ได้ ในกรณีที่การตรวจพิสูจน์ตามวรรคหนึ่งหรือวรรคสองจำเป็นต้องเก็บตัวอย่าง เลือด เนื้อเยื่อ ผิวหนัง เส้นผมหรือขน ปัสสาวะ อุจจาระ น้ำลายหรือสารคัดหลั่งอื่น สารพันธุกรรม หรือส่วนประกอบอื่นของร่างกาย หรือสิ่งที่อยู่ในร่างกายจากคู่ความหรือบุคคลใด ศาลอาจให้คู่ความหรือบุคคลใดรับการตรวจพิสูจน์จากแพทย์หรือผู้เชี่ยวชาญอื่นได้ แต่ต้องกระทำเพียงเท่าที่จำเป็นและสมควร ทั้งนี้ ถือเป็นสิทธิของคู่ความหรือบุคคลนั้นที่จะยินยอมหรือไม่ก็ได้ ในกรณีที่คู่ความฝ่ายใดไม่ยินยอมหรือไม่ให้ความร่วมมือต่อการตรวจพิสูจน์ตามวรรคหนึ่งหรือวรรคสอง หรือไม่ให้ความยินยอมหรือกระทำการขัดขวางมิให้บุคคลที่เกี่ยวข้องให้ความยินยอมต่อการตรวจเก็บตัวอย่างส่วนประกอบของร่างกายตามวรรคสาม ก็ให้สันนิษฐานไว้ก่อนว่าข้อเท็จจริงเป็นไปตามที่คู่ความฝ่ายตรงข้ามกล่าวอ้าง ค่าใช้จ่ายในการตรวจพิสูจน์ตามมาตรานี้ ให้คู่ความฝ่ายที่ร้องขอให้ตรวจพิสูจน์เป็นผู้รับผิดชอบโดยให้ถือว่าเป็นส่วนหนึ่งของค่าฤชาธรรมเนียม แต่ถ้าผู้ร้องขอไม่สามารถเสียค่าใช้จ่ายได้หรือเป็นกรณีที่ศาลเป็นผู้สั่งให้ตรวจพิสูจน์ ให้ศาลสั่งจ่ายตามระเบียบที่คณะกรรมการบริหารศาลยุติธรรมกำหนด ส่วนความรับผิดในค่าใช้จ่ายดังกล่าวให้เป็นไปตามมาตรา ๑๕๘ หรือมาตรา ๑๖๑"],"text":"ในกรณีที่จำเป็นต้องใช้พยานหลักฐานทางวิทยาศาสตร์เพื่อพิสูจน์ข้อเท็จจริงใดที่เป็นประเด็นสำคัญแห่งคดี เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งร้องขอ ศาลมีอำนาจสั่งให้ทำการตรวจพิสูจน์บุคคล วัตถุหรือเอกสารใด ๆ โดยวิธีการทางวิทยาศาสตร์ได้ ในกรณีที่พยานหลักฐานทางวิทยาศาสตร์จะสามารถพิสูจน์ให้เห็นถึงข้อเท็จจริงที่ทำให้ศาลวินิจฉัยชี้ขาดคดีได้โดยไม่ต้องสืบพยานหลักฐานอื่นอีก เมื่อศาลเห็นสมควรหรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่งร้องขอ ศาลอาจสั่งให้ทำการตรวจพิสูจน์ตามวรรคหนึ่งโดยไม่ต้องรอให้ถึงวันสืบพยานตามปกติก็ได้ ในกรณีที่การตรวจพิสูจน์ตามวรรคหนึ่งหรือวรรคสองจำเป็นต้องเก็บตัวอย่าง เลือด เนื้อเยื่อ ผิวหนัง เส้นผมหรือขน ปัสสาวะ อุจจาระ น้ำลายหรือสารคัดหลั่งอื่น สารพันธุกรรม หรือส่วนประกอบอื่นของร่างกาย หรือสิ่งที่อยู่ในร่างกายจากคู่ความหรือบุคคลใด ศาลอาจให้คู่ความหรือบุคคลใดรับการตรวจพิสูจน์จากแพทย์หรือผู้เชี่ยวชาญอื่นได้ แต่ต้องกระทำเพียงเท่าที่จำเป็นและสมควร ทั้งนี้ ถือเป็นสิทธิของคู่ความหรือบุคคลนั้นที่จะยินยอมหรือไม่ก็ได้ ในกรณีที่คู่ความฝ่ายใดไม่ยินยอมหรือไม่ให้ความร่วมมือต่อการตรวจพิสูจน์ตามวรรคหนึ่งหรือวรรคสอง หรือไม่ให้ความยินยอมหรือกระทำการขัดขวางมิให้บุคคลที่เกี่ยวข้องให้ความยินยอมต่อการตรวจเก็บตัวอย่างส่วนประกอบของร่างกายตามวรรคสาม ก็ให้สันนิษฐานไว้ก่อนว่าข้อเท็จจริงเป็นไปตามที่คู่ความฝ่ายตรงข้ามกล่าวอ้าง ค่าใช้จ่ายในการตรวจพิสูจน์ตามมาตรานี้ ให้คู่ความฝ่ายที่ร้องขอให้ตรวจพิสูจน์เป็นผู้รับผิดชอบโดยให้ถือว่าเป็นส่วนหนึ่งของค่าฤชาธรรมเนียม แต่ถ้าผู้ร้องขอไม่สามารถเสียค่าใช้จ่ายได้หรือเป็นกรณีที่ศาลเป็นผู้สั่งให้ตรวจพิสูจน์ ให้ศาลสั่งจ่ายตามระเบียบที่คณะกรรมการบริหารศาลยุติธรรมกำหนด ส่วนความรับผิดในค่าใช้จ่ายดังกล่าวให้เป็นไปตามมาตรา ๑๕๘ หรือมาตรา ๑๖๑"},{"id":"๑๒๙","num":"มาตรา ๑๒๙","num_ara":"๑๒๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๔ การตรวจและการแต่งตั้งผู้เชี่ยวชาญโดยศาล","subsection":"","paragraphs":["ในการที่ศาลจะมีคำสั่งให้แต่งตั้งผู้เชี่ยวชาญดังกล่าวมาในมาตรา ๙๙ โดยที่ศาลเห็นสมควรหรือโดยที่คู่ความฝ่ายใดฝ่ายหนึ่งร้องขอนั้น","(๑) การแต่งตั้งผู้เชี่ยวชาญเช่นว่านั้นให้อยู่ในดุลพินิจของศาล แต่ศาลจะเรียกคู่ความมาให้ตกลงกันกำหนดตัวผู้เชี่ยวชาญที่จะแต่งตั้งนั้นก็ได้ แต่ศาลจะบังคับบุคคลใดให้เป็นผู้เชี่ยวชาญไม่ได้ นอกจากบุคคลนั้นได้ยินยอมลงชื่อเป็นผู้เชี่ยวชาญไว้ในทะเบียนผู้เชี่ยวชาญของศาลแล้ว (๒) ผู้เชี่ยวชาญที่ศาลแต่งตั้งอาจถูกคัดค้านได้และต้องสาบานหรือปฏิญาณตน ทั้งมีสิทธิที่จะได้รับค่าธรรมเนียมและรับชดใช้ค่าใช้จ่ายที่ได้ออกไปตามที่กำหนดไว้ในกฎกระทรวงว่าด้วยการนั้น"],"text":"ในการที่ศาลจะมีคำสั่งให้แต่งตั้งผู้เชี่ยวชาญดังกล่าวมาในมาตรา ๙๙ โดยที่ศาลเห็นสมควรหรือโดยที่คู่ความฝ่ายใดฝ่ายหนึ่งร้องขอนั้น\n\n(๑) การแต่งตั้งผู้เชี่ยวชาญเช่นว่านั้นให้อยู่ในดุลพินิจของศาล แต่ศาลจะเรียกคู่ความมาให้ตกลงกันกำหนดตัวผู้เชี่ยวชาญที่จะแต่งตั้งนั้นก็ได้ แต่ศาลจะบังคับบุคคลใดให้เป็นผู้เชี่ยวชาญไม่ได้ นอกจากบุคคลนั้นได้ยินยอมลงชื่อเป็นผู้เชี่ยวชาญไว้ในทะเบียนผู้เชี่ยวชาญของศาลแล้ว (๒) ผู้เชี่ยวชาญที่ศาลแต่งตั้งอาจถูกคัดค้านได้และต้องสาบานหรือปฏิญาณตน ทั้งมีสิทธิที่จะได้รับค่าธรรมเนียมและรับชดใช้ค่าใช้จ่ายที่ได้ออกไปตามที่กำหนดไว้ในกฎกระทรวงว่าด้วยการนั้น"},{"id":"๑๓๐","num":"มาตรา ๑๓๐","num_ara":"๑๓๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๕ พยานหลักฐาน","section":"หมวด ๔ การตรวจและการแต่งตั้งผู้เชี่ยวชาญโดยศาล","subsection":"","paragraphs":["ผู้เชี่ยวชาญที่ศาลแต่งตั้งอาจแสดงความเห็นด้วยวาจาหรือเป็นหนังสือก็ได้ แล้วแต่ศาลจะต้องการ ถ้าศาลยังไม่เป็นที่พอใจในความเห็นของผู้เชี่ยวชาญที่ทำเป็นหนังสือนั้น หรือเมื่อคู่ความฝ่ายใดเรียกร้องโดยทำเป็นคำร้อง ให้ศาลเรียกให้ผู้เชี่ยวชาญทำความเห็นเพิ่มเติมเป็นหนังสือ หรือเรียกให้มาศาลเพื่ออธิบายด้วยวาจา หรือให้ตั้งผู้เชี่ยวชาญคนอื่นอีก ถ้าผู้เชี่ยวชาญที่ศาลตั้งจะต้องแสดงความเห็นด้วยวาจาหรือต้องมาศาลเพื่ออธิบายด้วยวาจา ให้นำบทบัญญัติในลักษณะนี้ว่าด้วยพยานบุคคลมาใช้บังคับโดยอนุโลม"],"text":"ผู้เชี่ยวชาญที่ศาลแต่งตั้งอาจแสดงความเห็นด้วยวาจาหรือเป็นหนังสือก็ได้ แล้วแต่ศาลจะต้องการ ถ้าศาลยังไม่เป็นที่พอใจในความเห็นของผู้เชี่ยวชาญที่ทำเป็นหนังสือนั้น หรือเมื่อคู่ความฝ่ายใดเรียกร้องโดยทำเป็นคำร้อง ให้ศาลเรียกให้ผู้เชี่ยวชาญทำความเห็นเพิ่มเติมเป็นหนังสือ หรือเรียกให้มาศาลเพื่ออธิบายด้วยวาจา หรือให้ตั้งผู้เชี่ยวชาญคนอื่นอีก ถ้าผู้เชี่ยวชาญที่ศาลตั้งจะต้องแสดงความเห็นด้วยวาจาหรือต้องมาศาลเพื่ออธิบายด้วยวาจา ให้นำบทบัญญัติในลักษณะนี้ว่าด้วยพยานบุคคลมาใช้บังคับโดยอนุโลม"},{"id":"๑๓๑","num":"มาตรา ๑๓๑","num_ara":"๑๓๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๑ หลักทั่วไปว่าด้วยการชี้ขาดตัดสินคดี","subsection":"","paragraphs":["คดีที่ยื่นฟ้องต่อศาลนั้น ให้ศาลปฏิบัติดังนี้","(๑) ในเรื่องคำขอซึ่งคู่ความยื่นในระหว่างการพิจารณาคดีนั้น โดยทำเป็นคำร้องหรือขอด้วยวาจาก็ดี ให้ศาลมีคำสั่งอนุญาตหรือยกเสียซึ่งคำขอเช่นว่านั้น โดยทำเป็นหนังสือหรือด้วยวาจาก็ได้ แต่ถ้าศาลมีคำสั่งด้วยวาจาให้ศาลจดคำสั่งนั้นไว้ในรายงานพิสดาร (๒) ในเรื่องประเด็นแห่งคดี ให้ศาลวินิจฉัยชี้ขาดโดยทำเป็นคำพิพากษาหรือคำสั่ง หรือให้จำหน่ายคดีเสียจากสารบบความตามที่บัญญัติไว้ในลักษณะนี้"],"text":"คดีที่ยื่นฟ้องต่อศาลนั้น ให้ศาลปฏิบัติดังนี้\n\n(๑) ในเรื่องคำขอซึ่งคู่ความยื่นในระหว่างการพิจารณาคดีนั้น โดยทำเป็นคำร้องหรือขอด้วยวาจาก็ดี ให้ศาลมีคำสั่งอนุญาตหรือยกเสียซึ่งคำขอเช่นว่านั้น โดยทำเป็นหนังสือหรือด้วยวาจาก็ได้ แต่ถ้าศาลมีคำสั่งด้วยวาจาให้ศาลจดคำสั่งนั้นไว้ในรายงานพิสดาร (๒) ในเรื่องประเด็นแห่งคดี ให้ศาลวินิจฉัยชี้ขาดโดยทำเป็นคำพิพากษาหรือคำสั่ง หรือให้จำหน่ายคดีเสียจากสารบบความตามที่บัญญัติไว้ในลักษณะนี้"},{"id":"๑๓๒","num":"มาตรา ๑๓๒","num_ara":"๑๓๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๑ หลักทั่วไปว่าด้วยการชี้ขาดตัดสินคดี","subsection":"","paragraphs":["ให้ศาลมีคำสั่งให้จำหน่ายคดีเสียจากสารบบความได้ โดยไม่ต้องมีคำวินิจฉัยชี้ขาดในประเด็นเรื่องนั้น และให้กำหนดเงื่อนไขในเรื่องค่าฤชาธรรมเนียมตามที่เห็นสมควร","(๑) เมื่อโจทก์ทิ้งฟ้อง ถอนฟ้อง หรือไม่มาศาลในวันนัดพิจารณา ดังที่บัญญัติไว้ในมาตรา ๑๗๔ มาตรา ๑๗๕ และมาตรา ๑๙๓ ทวิ (๒) เมื่อโจทก์ไม่หาประกันมาให้ดังที่บัญญัติไว้ในมาตรา ๒๕๓ และมาตรา ๓๒๓ หรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่ง หรือทั้งสองฝ่ายขาดนัดดังที่บัญญัติไว้ในมาตรา ๑๙๘ มาตรา ๒๐๐ และมาตรา ๒๐๑ (๓) ถ้าความมรณะของคู่ความฝ่ายใดฝ่ายหนึ่งยังให้คดีนั้นไม่มีประโยชน์ต่อไป หรือถ้าไม่มีผู้ใดเข้ามาแทนที่คู่ความฝ่ายที่มรณะดังที่บัญญัติไว้ในมาตรา ๔๒ (๔) เมื่อศาลได้มีคำสั่งให้พิจารณาคดีรวมกันหรือให้แยกกัน ซึ่งเป็นเหตุให้ต้องโอนคดีไปยังอีกศาลหนึ่งดังที่บัญญัติไว้ในมาตรา ๒๘ และ ๒๙"],"text":"ให้ศาลมีคำสั่งให้จำหน่ายคดีเสียจากสารบบความได้ โดยไม่ต้องมีคำวินิจฉัยชี้ขาดในประเด็นเรื่องนั้น และให้กำหนดเงื่อนไขในเรื่องค่าฤชาธรรมเนียมตามที่เห็นสมควร\n\n(๑) เมื่อโจทก์ทิ้งฟ้อง ถอนฟ้อง หรือไม่มาศาลในวันนัดพิจารณา ดังที่บัญญัติไว้ในมาตรา ๑๗๔ มาตรา ๑๗๕ และมาตรา ๑๙๓ ทวิ (๒) เมื่อโจทก์ไม่หาประกันมาให้ดังที่บัญญัติไว้ในมาตรา ๒๕๓ และมาตรา ๓๒๓ หรือเมื่อคู่ความฝ่ายใดฝ่ายหนึ่ง หรือทั้งสองฝ่ายขาดนัดดังที่บัญญัติไว้ในมาตรา ๑๙๘ มาตรา ๒๐๐ และมาตรา ๒๐๑ (๓) ถ้าความมรณะของคู่ความฝ่ายใดฝ่ายหนึ่งยังให้คดีนั้นไม่มีประโยชน์ต่อไป หรือถ้าไม่มีผู้ใดเข้ามาแทนที่คู่ความฝ่ายที่มรณะดังที่บัญญัติไว้ในมาตรา ๔๒ (๔) เมื่อศาลได้มีคำสั่งให้พิจารณาคดีรวมกันหรือให้แยกกัน ซึ่งเป็นเหตุให้ต้องโอนคดีไปยังอีกศาลหนึ่งดังที่บัญญัติไว้ในมาตรา ๒๘ และ ๒๙"},{"id":"๑๓๓","num":"มาตรา ๑๓๓","num_ara":"๑๓๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๑ หลักทั่วไปว่าด้วยการชี้ขาดตัดสินคดี","subsection":"","paragraphs":["เมื่อศาลมิได้จำหน่ายคดีออกจากสารบบความดังที่บัญญัติไว้ในมาตราก่อน ให้ศาลชี้ขาดคดีนั้นโดยทำเป็นคำพิพากษาหรือคำสั่งในวันที่สิ้นการพิจารณา แต่เพื่อการที่จะพิเคราะห์คดีต่อไป ศาลจะเลื่อนการพิพากษาหรือการทำคำสั่งต่อไปในวันหลังก็ได้ตามที่เห็นสมควรเพื่อประโยชน์แห่งความยุติธรรม"],"text":"เมื่อศาลมิได้จำหน่ายคดีออกจากสารบบความดังที่บัญญัติไว้ในมาตราก่อน ให้ศาลชี้ขาดคดีนั้นโดยทำเป็นคำพิพากษาหรือคำสั่งในวันที่สิ้นการพิจารณา แต่เพื่อการที่จะพิเคราะห์คดีต่อไป ศาลจะเลื่อนการพิพากษาหรือการทำคำสั่งต่อไปในวันหลังก็ได้ตามที่เห็นสมควรเพื่อประโยชน์แห่งความยุติธรรม"},{"id":"๑๓๔","num":"มาตรา ๑๓๔","num_ara":"๑๓๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๑ หลักทั่วไปว่าด้วยการชี้ขาดตัดสินคดี","subsection":"","paragraphs":["ไม่ว่าในกรณีใด ๆ ห้ามมิให้ศาลที่รับฟ้องคดีไว้ ปฏิเสธไม่ยอมพิพากษาหรือมีคำสั่งชี้ขาดคดีโดยอ้างว่า ไม่มีบทบัญญัติแห่งกฎหมายที่จะใช้บังคับแก่คดี หรือว่าบทบัญญัติแห่งกฎหมายที่จะใช้บังคับนั้นเคลือบคลุมหรือไม่บริบูรณ์"],"text":"ไม่ว่าในกรณีใด ๆ ห้ามมิให้ศาลที่รับฟ้องคดีไว้ ปฏิเสธไม่ยอมพิพากษาหรือมีคำสั่งชี้ขาดคดีโดยอ้างว่า ไม่มีบทบัญญัติแห่งกฎหมายที่จะใช้บังคับแก่คดี หรือว่าบทบัญญัติแห่งกฎหมายที่จะใช้บังคับนั้นเคลือบคลุมหรือไม่บริบูรณ์"},{"id":"๑๓๕","num":"มาตรา ๑๓๕","num_ara":"๑๓๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๑ หลักทั่วไปว่าด้วยการชี้ขาดตัดสินคดี","subsection":"","paragraphs":["ในคดีที่เรียกร้องให้ชำระหนี้เป็นเงินหรือมีการเรียกร้องให้ชำระหนี้เป็นเงินรวมอยู่ด้วย ไม่ว่าเวลาใด ๆ ก่อนมีคำพิพากษา จำเลยจะนำเงินมาวางศาลเต็มจำนวนที่เรียกร้อง หรือแต่บางส่วน หรือตามจำนวนเท่าที่ตนคิดว่าพอแก่จำนวนที่โจทก์มีสิทธิเรียกร้องก็ได้ ทั้งนี้ โดยยอมรับผิดหรือไม่ยอมรับผิดก็ได้"],"text":"ในคดีที่เรียกร้องให้ชำระหนี้เป็นเงินหรือมีการเรียกร้องให้ชำระหนี้เป็นเงินรวมอยู่ด้วย ไม่ว่าเวลาใด ๆ ก่อนมีคำพิพากษา จำเลยจะนำเงินมาวางศาลเต็มจำนวนที่เรียกร้อง หรือแต่บางส่วน หรือตามจำนวนเท่าที่ตนคิดว่าพอแก่จำนวนที่โจทก์มีสิทธิเรียกร้องก็ได้ ทั้งนี้ โดยยอมรับผิดหรือไม่ยอมรับผิดก็ได้"},{"id":"๑๓๖","num":"มาตรา ๑๓๖","num_ara":"๑๓๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๑ หลักทั่วไปว่าด้วยการชี้ขาดตัดสินคดี","subsection":"","paragraphs":["ในกรณีที่จำเลยวางเงินต่อศาลโดยยอมรับผิด ถ้าโจทก์พอใจยอมรับเงินที่จำเลยวางโดยไม่ติดใจเรียกร้องมากกว่านั้น และคดีไม่มีประเด็นที่จะต้องวินิจฉัยต่อไปอีก ให้ศาลพิพากษาคดีไปตามนั้น คำพิพากษานั้นเป็นที่สุด แต่ถ้าโจทก์ไม่พอใจในจำนวนเงินที่จำเลยวาง และยังติดใจที่จะดำเนินคดีเพื่อให้จำเลยต้องรับผิดในจำนวนเงินตามที่เรียกร้องต่อไปอีก จำเลยมีสิทธิถอนเงินที่วางไว้นั้นได้ โดยให้ถือเสมือนว่ามิได้มีการวางเงิน หรือจำเลยจะยอมให้โจทก์รับเงินนั้นไปก็ได้ ในกรณีหลังนี้ โจทก์จะรับเงินไปหรือไม่ก็ตาม จำเลยไม่ต้องเสียดอกเบี้ยในจำนวนเงินที่วาง แม้ว่าจำเลยมีความรับผิดตามกฎหมายจะต้องเสีย ทั้งนี้ นับแต่วันที่จำเลยยอมให้โจทก์รับเงินไป ในกรณีที่จำเลยวางเงินต่อศาลโดยไม่ยอมรับผิด จำเลยจะรับเงินนั้นคืนไปก่อนที่มีคำพิพากษาว่าจำเลยไม่ต้องรับผิดไม่ได้ การวางเงินเช่นว่านี้ ไม่เป็นเหตุระงับการเสียดอกเบี้ย หากจำเลยมีความรับผิดตามกฎหมายจะต้องเสีย"],"text":"ในกรณีที่จำเลยวางเงินต่อศาลโดยยอมรับผิด ถ้าโจทก์พอใจยอมรับเงินที่จำเลยวางโดยไม่ติดใจเรียกร้องมากกว่านั้น และคดีไม่มีประเด็นที่จะต้องวินิจฉัยต่อไปอีก ให้ศาลพิพากษาคดีไปตามนั้น คำพิพากษานั้นเป็นที่สุด แต่ถ้าโจทก์ไม่พอใจในจำนวนเงินที่จำเลยวาง และยังติดใจที่จะดำเนินคดีเพื่อให้จำเลยต้องรับผิดในจำนวนเงินตามที่เรียกร้องต่อไปอีก จำเลยมีสิทธิถอนเงินที่วางไว้นั้นได้ โดยให้ถือเสมือนว่ามิได้มีการวางเงิน หรือจำเลยจะยอมให้โจทก์รับเงินนั้นไปก็ได้ ในกรณีหลังนี้ โจทก์จะรับเงินไปหรือไม่ก็ตาม จำเลยไม่ต้องเสียดอกเบี้ยในจำนวนเงินที่วาง แม้ว่าจำเลยมีความรับผิดตามกฎหมายจะต้องเสีย ทั้งนี้ นับแต่วันที่จำเลยยอมให้โจทก์รับเงินไป ในกรณีที่จำเลยวางเงินต่อศาลโดยไม่ยอมรับผิด จำเลยจะรับเงินนั้นคืนไปก่อนที่มีคำพิพากษาว่าจำเลยไม่ต้องรับผิดไม่ได้ การวางเงินเช่นว่านี้ ไม่เป็นเหตุระงับการเสียดอกเบี้ย หากจำเลยมีความรับผิดตามกฎหมายจะต้องเสีย"},{"id":"๑๓๗","num":"มาตรา ๑๓๗","num_ara":"๑๓๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๑ หลักทั่วไปว่าด้วยการชี้ขาดตัดสินคดี","subsection":"","paragraphs":["ในคดีที่เรียกร้องให้ชำระหนี้อย่างอื่นนอกจากให้ชำระเงิน จำเลยชอบที่จะทำการชำระหนี้นั้นได้โดยแจ้งให้ศาลทราบในคำให้การหรือแถลงโดยหนังสือเป็นส่วนหนึ่งต่างหากก็ได้ ถ้าโจทก์ยอมรับการชำระหนี้นั้นเป็นการพอใจเต็มตามที่เรียกร้องแล้ว ให้ศาลพิพากษาคดีไปตามนั้น และคำพิพากษานั้นให้เป็นที่สุด ถ้าโจทก์ไม่พอใจในการชำระหนี้เช่นว่านั้น โจทก์ชอบที่จะดำเนินคดีนั้นต่อไปได้"],"text":"ในคดีที่เรียกร้องให้ชำระหนี้อย่างอื่นนอกจากให้ชำระเงิน จำเลยชอบที่จะทำการชำระหนี้นั้นได้โดยแจ้งให้ศาลทราบในคำให้การหรือแถลงโดยหนังสือเป็นส่วนหนึ่งต่างหากก็ได้ ถ้าโจทก์ยอมรับการชำระหนี้นั้นเป็นการพอใจเต็มตามที่เรียกร้องแล้ว ให้ศาลพิพากษาคดีไปตามนั้น และคำพิพากษานั้นให้เป็นที่สุด ถ้าโจทก์ไม่พอใจในการชำระหนี้เช่นว่านั้น โจทก์ชอบที่จะดำเนินคดีนั้นต่อไปได้"},{"id":"๑๓๘","num":"มาตรา ๑๓๘","num_ara":"๑๓๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๑ หลักทั่วไปว่าด้วยการชี้ขาดตัดสินคดี","subsection":"","paragraphs":["ในคดีที่คู่ความตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดีโดยมิได้มีการถอนคำฟ้องนั้น และข้อตกลงหรือการประนีประนอมยอมความกันนั้นไม่เป็นการฝ่าฝืนต่อกฎหมาย ให้ศาลจดรายงานพิสดารแสดงข้อความแห่งข้อตกลงหรือการประนีประนอมยอมความเหล่านั้นไว้ แล้วพิพากษาไปตามนั้น ห้ามมิให้อุทธรณ์คำพิพากษาเช่นว่านี้ เว้นแต่ในเหตุต่อไปนี้","(๑) เมื่อมีข้อกล่าวอ้างว่าคู่ความฝ่ายใดฝ่ายหนึ่งฉ้อฉล (๒) เมื่อคำพิพากษานั้นถูกกล่าวอ้างว่าเป็นการละเมิดต่อบทบัญญัติแห่งกฎหมายอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชน (๓) เมื่อคำพิพากษาคดีนั้นถูกกล่าวอ้างว่ามิได้เป็นไปตามข้อตกลงหรือการประนีประนอมยอมความ ถ้าคู่ความตกลงกันเพียงแต่ให้เสนอคดีต่ออนุญาโตตุลาการ ให้นำบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยอนุญาโตตุลาการมาใช้บังคับ"],"text":"ในคดีที่คู่ความตกลงกันหรือประนีประนอมยอมความกันในประเด็นแห่งคดีโดยมิได้มีการถอนคำฟ้องนั้น และข้อตกลงหรือการประนีประนอมยอมความกันนั้นไม่เป็นการฝ่าฝืนต่อกฎหมาย ให้ศาลจดรายงานพิสดารแสดงข้อความแห่งข้อตกลงหรือการประนีประนอมยอมความเหล่านั้นไว้ แล้วพิพากษาไปตามนั้น ห้ามมิให้อุทธรณ์คำพิพากษาเช่นว่านี้ เว้นแต่ในเหตุต่อไปนี้\n\n(๑) เมื่อมีข้อกล่าวอ้างว่าคู่ความฝ่ายใดฝ่ายหนึ่งฉ้อฉล (๒) เมื่อคำพิพากษานั้นถูกกล่าวอ้างว่าเป็นการละเมิดต่อบทบัญญัติแห่งกฎหมายอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชน (๓) เมื่อคำพิพากษาคดีนั้นถูกกล่าวอ้างว่ามิได้เป็นไปตามข้อตกลงหรือการประนีประนอมยอมความ ถ้าคู่ความตกลงกันเพียงแต่ให้เสนอคดีต่ออนุญาโตตุลาการ ให้นำบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยอนุญาโตตุลาการมาใช้บังคับ"},{"id":"๑๓๙","num":"มาตรา ๑๓๙","num_ara":"๑๓๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๑ หลักทั่วไปว่าด้วยการชี้ขาดตัดสินคดี","subsection":"","paragraphs":["เมื่อคดีสองเรื่องหรือกว่านั้นขึ้นไปได้พิจารณารวมกันเพื่อสะดวกแก่การพิจารณา ศาลจะพิพากษาคดีเหล่านั้นเรื่องใดเรื่องหนึ่งซึ่งเสร็จการพิจารณาแล้ว จึงพิพากษาเรื่องอื่น ๆ ต่อไปภายหลังก็ได้"],"text":"เมื่อคดีสองเรื่องหรือกว่านั้นขึ้นไปได้พิจารณารวมกันเพื่อสะดวกแก่การพิจารณา ศาลจะพิพากษาคดีเหล่านั้นเรื่องใดเรื่องหนึ่งซึ่งเสร็จการพิจารณาแล้ว จึงพิพากษาเรื่องอื่น ๆ ต่อไปภายหลังก็ได้"},{"id":"๑๔๐","num":"มาตรา ๑๔๐","num_ara":"๑๔๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๒ ข้อความและผลแห่งคำพิพากษาและคำสั่ง","subsection":"","paragraphs":["การทำคำพิพากษาหรือคำสั่งของศาลให้ดำเนินตามข้อบังคับต่อไปนี้","(๑) ศาลจะต้องประกอบครบถ้วนตามบทบัญญัติแห่งกฎหมายว่าด้วยเขตอำนาจศาล และอำนาจผู้พิพากษา (๒) ภายใต้บังคับบทบัญญัติมาตรา ๑๓ ถ้าคำพิพากษาหรือคำสั่งจะต้องทำโดยผู้พิพากษาหลายคน คำพิพากษาหรือคำสั่งนั้นจะต้องบังคับตามความเห็นของฝ่ายข้างมาก ในศาลชั้นต้นและศาลชั้นอุทธรณ์ ถ้าผู้พิพากษาคนใดมีความเห็นแย้งก็ให้ผู้พิพากษาคนนั้นเขียนใจความแห่งความเห็นแย้งและเหตุผลของตนกลัดไว้ในสำนวน ในศาลชั้นอุทธรณ์หรือศาลฎีกา ถ้าประธานของศาลชั้นอุทธรณ์หรือประธานศาลฎีกา แล้วแต่กรณี เห็นสมควร จะให้มีการวินิจฉัยปัญหาใดในคดีเรื่องใดโดยที่ประชุมใหญ่หรือที่ประชุมแผนกคดีก็ได้ หรือถ้ามีกฎหมายกำหนดให้วินิจฉัยปัญหาใดหรือคดีเรื่องใดโดยที่ประชุมใหญ่หรือที่ประชุมแผนกคดีก็ให้วินิจฉัยโดยที่ประชุมใหญ่หรือที่ประชุมแผนกคดี แล้วแต่กรณี ภายใต้บังคับบทบัญญัติมาตรา ๑๓ ในกรณีที่ไม่มีกฎหมายบัญญัติไว้เป็นอย่างอื่น ที่ประชุมใหญ่หรือที่ประชุมแผนกคดีของศาลชั้นอุทธรณ์หรือศาลฎีกานั้น ให้ประกอบด้วยผู้พิพากษาทุกคนซึ่งอยู่ปฏิบัติหน้าที่ แต่ต้องไม่น้อยกว่ากึ่งหนึ่งของจำนวนผู้พิพากษาในศาลนั้นหรือในแผนกคดีที่มีการประชุม และให้ประธานของศาลชั้นอุทธรณ์หรือประธานศาลฎีกา ประธานแผนกคดีของศาลชั้นอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี หรือผู้ทำการแทน เป็นประธาน คำวินิจฉัยของที่ประชุมใหญ่หรือที่ประชุมแผนกคดีให้เป็นไปตามเสียงข้างมาก และถ้ามีคะแนนเสียงเท่ากัน ให้ประธานแห่งที่ประชุมออกเสียงเพิ่มขึ้นอีกเสียงหนึ่งเป็นเสียงชี้ขาด ในคดีซึ่งที่ประชุมใหญ่หรือที่ประชุมแผนกคดีได้วินิจฉัยปัญหาแล้ว คำพิพากษาหรือคำสั่งต้องเป็นไปตามคำวินิจฉัยของที่ประชุมใหญ่หรือที่ประชุมแผนกคดี และต้องระบุไว้ด้วยว่าปัญหาข้อใดได้วินิจฉัยโดยที่ประชุมใหญ่หรือที่ประชุมแผนกคดี ผู้พิพากษาที่เข้าประชุมแม้มิใช่เป็นผู้นั่งพิจารณาก็ให้มีอำนาจพิพากษาหรือทำคำสั่งในคดีนั้นได้ และเฉพาะในศาลชั้นอุทธรณ์ให้ทำความเห็นแย้งพร้อมเหตุผลได้ด้วย ในกรณีที่ปัญหาใดในคดีเรื่องใด ได้มีคำวินิจฉัยโดยที่ประชุมแผนกคดีแล้ว หากประธานของศาลชั้นอุทธรณ์หรือประธานศาลฎีกา แล้วแต่กรณี เห็นสมควรจะให้มีการวินิจฉัยปัญหาดังกล่าวโดยที่ประชุมใหญ่อีกก็ได้ (๓) การอ่านคำพิพากษาหรือคำสั่ง ให้อ่านข้อความทั้งหมดในศาลโดยเปิดเผย ตามเวลาที่กำหนดไว้ในประมวลกฎหมายนี้ ต่อหน้าคู่ความทั้งสองฝ่าย หรือฝ่ายใดฝ่ายหนึ่ง ในกรณีเช่นว่านี้ ให้ศาลจดลงไว้ในคำพิพากษาหรือคำสั่งหรือในรายงานซึ่งการอ่านนั้น และให้คู่ความที่มาศาลลงลายมือชื่อไว้เป็นสำคัญ ถ้าคู่ความไม่มาศาล ศาลจะงดการการอ่านคำพิพากษาหรือคำสั่งก็ได้ ในกรณีเช่นว่านี้ ให้ศาลจดแจ้งไว้ในรายงาน และให้ถือว่าคำพิพากษาหรือคำสั่งนั้นได้อ่านตามกฎหมายแล้ว เมื่อศาลที่พิพากษาคดี หรือที่ได้รับคำสั่งจากศาลสูงให้อ่านคำพิพากษาหรือคำสั่ง ได้อ่านคำพิพากษาหรือคำสั่งตามบทบัญญัติในมาตรานี้วันใด ให้ถือว่าวันนั้นเป็นวันที่พิพากษาหรือมีคำสั่งคดีนั้น"],"text":"การทำคำพิพากษาหรือคำสั่งของศาลให้ดำเนินตามข้อบังคับต่อไปนี้\n\n(๑) ศาลจะต้องประกอบครบถ้วนตามบทบัญญัติแห่งกฎหมายว่าด้วยเขตอำนาจศาล และอำนาจผู้พิพากษา (๒) ภายใต้บังคับบทบัญญัติมาตรา ๑๓ ถ้าคำพิพากษาหรือคำสั่งจะต้องทำโดยผู้พิพากษาหลายคน คำพิพากษาหรือคำสั่งนั้นจะต้องบังคับตามความเห็นของฝ่ายข้างมาก ในศาลชั้นต้นและศาลชั้นอุทธรณ์ ถ้าผู้พิพากษาคนใดมีความเห็นแย้งก็ให้ผู้พิพากษาคนนั้นเขียนใจความแห่งความเห็นแย้งและเหตุผลของตนกลัดไว้ในสำนวน ในศาลชั้นอุทธรณ์หรือศาลฎีกา ถ้าประธานของศาลชั้นอุทธรณ์หรือประธานศาลฎีกา แล้วแต่กรณี เห็นสมควร จะให้มีการวินิจฉัยปัญหาใดในคดีเรื่องใดโดยที่ประชุมใหญ่หรือที่ประชุมแผนกคดีก็ได้ หรือถ้ามีกฎหมายกำหนดให้วินิจฉัยปัญหาใดหรือคดีเรื่องใดโดยที่ประชุมใหญ่หรือที่ประชุมแผนกคดีก็ให้วินิจฉัยโดยที่ประชุมใหญ่หรือที่ประชุมแผนกคดี แล้วแต่กรณี ภายใต้บังคับบทบัญญัติมาตรา ๑๓ ในกรณีที่ไม่มีกฎหมายบัญญัติไว้เป็นอย่างอื่น ที่ประชุมใหญ่หรือที่ประชุมแผนกคดีของศาลชั้นอุทธรณ์หรือศาลฎีกานั้น ให้ประกอบด้วยผู้พิพากษาทุกคนซึ่งอยู่ปฏิบัติหน้าที่ แต่ต้องไม่น้อยกว่ากึ่งหนึ่งของจำนวนผู้พิพากษาในศาลนั้นหรือในแผนกคดีที่มีการประชุม และให้ประธานของศาลชั้นอุทธรณ์หรือประธานศาลฎีกา ประธานแผนกคดีของศาลชั้นอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี หรือผู้ทำการแทน เป็นประธาน คำวินิจฉัยของที่ประชุมใหญ่หรือที่ประชุมแผนกคดีให้เป็นไปตามเสียงข้างมาก และถ้ามีคะแนนเสียงเท่ากัน ให้ประธานแห่งที่ประชุมออกเสียงเพิ่มขึ้นอีกเสียงหนึ่งเป็นเสียงชี้ขาด ในคดีซึ่งที่ประชุมใหญ่หรือที่ประชุมแผนกคดีได้วินิจฉัยปัญหาแล้ว คำพิพากษาหรือคำสั่งต้องเป็นไปตามคำวินิจฉัยของที่ประชุมใหญ่หรือที่ประชุมแผนกคดี และต้องระบุไว้ด้วยว่าปัญหาข้อใดได้วินิจฉัยโดยที่ประชุมใหญ่หรือที่ประชุมแผนกคดี ผู้พิพากษาที่เข้าประชุมแม้มิใช่เป็นผู้นั่งพิจารณาก็ให้มีอำนาจพิพากษาหรือทำคำสั่งในคดีนั้นได้ และเฉพาะในศาลชั้นอุทธรณ์ให้ทำความเห็นแย้งพร้อมเหตุผลได้ด้วย ในกรณีที่ปัญหาใดในคดีเรื่องใด ได้มีคำวินิจฉัยโดยที่ประชุมแผนกคดีแล้ว หากประธานของศาลชั้นอุทธรณ์หรือประธานศาลฎีกา แล้วแต่กรณี เห็นสมควรจะให้มีการวินิจฉัยปัญหาดังกล่าวโดยที่ประชุมใหญ่อีกก็ได้ (๓) การอ่านคำพิพากษาหรือคำสั่ง ให้อ่านข้อความทั้งหมดในศาลโดยเปิดเผย ตามเวลาที่กำหนดไว้ในประมวลกฎหมายนี้ ต่อหน้าคู่ความทั้งสองฝ่าย หรือฝ่ายใดฝ่ายหนึ่ง ในกรณีเช่นว่านี้ ให้ศาลจดลงไว้ในคำพิพากษาหรือคำสั่งหรือในรายงานซึ่งการอ่านนั้น และให้คู่ความที่มาศาลลงลายมือชื่อไว้เป็นสำคัญ ถ้าคู่ความไม่มาศาล ศาลจะงดการการอ่านคำพิพากษาหรือคำสั่งก็ได้ ในกรณีเช่นว่านี้ ให้ศาลจดแจ้งไว้ในรายงาน และให้ถือว่าคำพิพากษาหรือคำสั่งนั้นได้อ่านตามกฎหมายแล้ว เมื่อศาลที่พิพากษาคดี หรือที่ได้รับคำสั่งจากศาลสูงให้อ่านคำพิพากษาหรือคำสั่ง ได้อ่านคำพิพากษาหรือคำสั่งตามบทบัญญัติในมาตรานี้วันใด ให้ถือว่าวันนั้นเป็นวันที่พิพากษาหรือมีคำสั่งคดีนั้น"},{"id":"๑๔๑","num":"มาตรา ๑๔๑","num_ara":"๑๔๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๒ ข้อความและผลแห่งคำพิพากษาและคำสั่ง","subsection":"","paragraphs":["คำพิพากษาหรือคำสั่งของศาลให้ทำเป็นหนังสือ และต้องกล่าวหรือแสดง","(๑) ชื่อศาลที่พิพากษาคดีนั้น (๒) ชื่อคู่ความทุกฝ่ายและผู้แทนโดยชอบธรรมหรือผู้แทน ถ้าหากมี (๓) รายการแห่งคดี (๔) เหตุผลแห่งคำวินิจฉัยทั้งปวง (๕) คำวินิจฉัยของศาลในประเด็นแห่งคดีตลอดทั้งค่าฤชาธรรมเนียม คำพิพากษาหรือคำสั่งนั้นต้องลงลายมือชื่อผู้พิพากษาที่พิพากษาหรือทำคำสั่ง หรือถ้าผู้พิพากษาคนใดลงลายมือชื่อไม่ได้ ก็ให้ผู้พิพากษาอื่นที่พิพากษาหรือทำคำสั่งคดีนั้นหรืออธิบดีผู้พิพากษา แล้วแต่กรณี จดแจ้งเหตุที่ผู้พิพากษาคนนั้นมิได้ลงลายมือชื่อและมีความเห็นพ้องด้วยคำพิพากษาหรือคำสั่งนั้น แล้วกลัดไว้ในสำนวนความ ในกรณีที่ศาลมีอำนาจทำคำสั่งหรือพิพากษาคดีได้ด้วยวาจา การที่ศาลจะต้องทำรายงานเกี่ยวด้วยคำสั่งหรือคำพิพากษานั้นไม่จำต้องจดแจ้งรายการแห่งคดีหรือเหตุผลแห่งคำวินิจฉัย แต่เมื่อคู่ความฝ่ายใดแจ้งความจำนงที่จะอุทธรณ์หรือได้ยื่นอุทธรณ์ขึ้นมา ให้ศาลมีอำนาจทำคำชี้แจงแสดงรายการข้อสำคัญ หรือเหตุผลแห่งคำวินิจฉัยกลัดไว้กับบันทึกนั้นภายในเวลาอันสมควร"],"text":"คำพิพากษาหรือคำสั่งของศาลให้ทำเป็นหนังสือ และต้องกล่าวหรือแสดง\n\n(๑) ชื่อศาลที่พิพากษาคดีนั้น (๒) ชื่อคู่ความทุกฝ่ายและผู้แทนโดยชอบธรรมหรือผู้แทน ถ้าหากมี (๓) รายการแห่งคดี (๔) เหตุผลแห่งคำวินิจฉัยทั้งปวง (๕) คำวินิจฉัยของศาลในประเด็นแห่งคดีตลอดทั้งค่าฤชาธรรมเนียม คำพิพากษาหรือคำสั่งนั้นต้องลงลายมือชื่อผู้พิพากษาที่พิพากษาหรือทำคำสั่ง หรือถ้าผู้พิพากษาคนใดลงลายมือชื่อไม่ได้ ก็ให้ผู้พิพากษาอื่นที่พิพากษาหรือทำคำสั่งคดีนั้นหรืออธิบดีผู้พิพากษา แล้วแต่กรณี จดแจ้งเหตุที่ผู้พิพากษาคนนั้นมิได้ลงลายมือชื่อและมีความเห็นพ้องด้วยคำพิพากษาหรือคำสั่งนั้น แล้วกลัดไว้ในสำนวนความ ในกรณีที่ศาลมีอำนาจทำคำสั่งหรือพิพากษาคดีได้ด้วยวาจา การที่ศาลจะต้องทำรายงานเกี่ยวด้วยคำสั่งหรือคำพิพากษานั้นไม่จำต้องจดแจ้งรายการแห่งคดีหรือเหตุผลแห่งคำวินิจฉัย แต่เมื่อคู่ความฝ่ายใดแจ้งความจำนงที่จะอุทธรณ์หรือได้ยื่นอุทธรณ์ขึ้นมา ให้ศาลมีอำนาจทำคำชี้แจงแสดงรายการข้อสำคัญ หรือเหตุผลแห่งคำวินิจฉัยกลัดไว้กับบันทึกนั้นภายในเวลาอันสมควร"},{"id":"๑๔๒","num":"มาตรา ๑๔๒","num_ara":"๑๔๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๒ ข้อความและผลแห่งคำพิพากษาและคำสั่ง","subsection":"","paragraphs":["คำพิพากษาหรือคำสั่งของศาลที่ชี้ขาดคดีต้องตัดสินตามข้อหาในคำฟ้องทุกข้อ แต่ห้ามมิให้พิพากษาหรือทำคำสั่งให้สิ่งใด ๆ เกินไปกว่าหรือนอกจากที่ปรากฏในคำฟ้อง เว้นแต่","(๑) ในคดีฟ้องเรียกอสังหาริมทรัพย์ ให้พึงเข้าใจว่าเป็นประเภทเดียวกับฟ้องขอให้ขับไล่จำเลย ถ้าศาลพิพากษาให้โจทก์ชนะคดี เมื่อศาลเห็นสมควรศาลจะมีคำสั่งให้ขับไล่จำเลยก็ได้ คำสั่งเช่นว่านี้ให้ใช้บังคับตลอดถึงวงศ์ญาติทั้งหลายและบริวารของจำเลยที่อยู่บนอสังหาริมทรัพย์นั้นซึ่งไม่สามารถแสดงอำนาจพิเศษให้ศาลเห็นได้ (๒) ในคดีที่โจทก์ฟ้องเรียกทรัพย์ใด ๆ เป็นของตนทั้งหมด แต่พิจารณาได้ความว่าโจทก์ควรได้แต่ส่วนแบ่ง เมื่อศาลเห็นสมควร ศาลจะพิพากษาให้โจทก์ได้รับแต่ส่วนแบ่งนั้นก็ได้ (๓) ในคดีที่โจทก์ฟ้องขอให้ชำระเงินพร้อมด้วยดอกเบี้ยจนถึงวันฟ้อง เมื่อศาลเห็นสมควร ศาลจะพิพากษาให้จำเลยชำระดอกเบี้ยจนถึงวันที่ได้ชำระเสร็จตามคำพิพากษาก็ได้ (๔) ในคดีที่โจทก์ฟ้องเรียกค่าเช่าหรือค่าเสียหายอันต่อเนื่องคำนวณถึงวันฟ้อง เมื่อศาลเห็นสมควร ศาลจะพิพากษาให้ชำระค่าเช่าและค่าเสียหายเช่นว่านี้จนถึงวันที่ได้ชำระเสร็จตามคำพิพากษาก็ได้ (๕) ในคดีที่อาจยกข้อกฎหมายอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชนขึ้นอ้างได้นั้น เมื่อศาลเห็นสมควรศาลจะยกข้อเหล่านั้นขึ้นวินิจฉัยแล้วพิพากษาคดีไปก็ได้ (๖) ในคดีที่โจทก์ฟ้องขอให้ชำระเงินพร้อมด้วยดอกเบี้ยซึ่งมิได้มีข้อตกลงกำหนดอัตราดอกเบี้ยกันไว้ เมื่อศาลเห็นสมควรโดยคำนึงถึงเหตุสมควรและความสุจริตในการสู้ความหรือการดำเนินคดี ศาลจะพิพากษาให้จำเลยชำระดอกเบี้ยในอัตราที่สูงขึ้นกว่าที่โจทก์มีสิทธิได้รับตามกฎหมายแต่ไม่เกินร้อยละสิบห้าต่อปีนับตั้งแต่วันฟ้องหรือวันอื่นหลังจากนั้นก็ได้"],"text":"คำพิพากษาหรือคำสั่งของศาลที่ชี้ขาดคดีต้องตัดสินตามข้อหาในคำฟ้องทุกข้อ แต่ห้ามมิให้พิพากษาหรือทำคำสั่งให้สิ่งใด ๆ เกินไปกว่าหรือนอกจากที่ปรากฏในคำฟ้อง เว้นแต่\n\n(๑) ในคดีฟ้องเรียกอสังหาริมทรัพย์ ให้พึงเข้าใจว่าเป็นประเภทเดียวกับฟ้องขอให้ขับไล่จำเลย ถ้าศาลพิพากษาให้โจทก์ชนะคดี เมื่อศาลเห็นสมควรศาลจะมีคำสั่งให้ขับไล่จำเลยก็ได้ คำสั่งเช่นว่านี้ให้ใช้บังคับตลอดถึงวงศ์ญาติทั้งหลายและบริวารของจำเลยที่อยู่บนอสังหาริมทรัพย์นั้นซึ่งไม่สามารถแสดงอำนาจพิเศษให้ศาลเห็นได้ (๒) ในคดีที่โจทก์ฟ้องเรียกทรัพย์ใด ๆ เป็นของตนทั้งหมด แต่พิจารณาได้ความว่าโจทก์ควรได้แต่ส่วนแบ่ง เมื่อศาลเห็นสมควร ศาลจะพิพากษาให้โจทก์ได้รับแต่ส่วนแบ่งนั้นก็ได้ (๓) ในคดีที่โจทก์ฟ้องขอให้ชำระเงินพร้อมด้วยดอกเบี้ยจนถึงวันฟ้อง เมื่อศาลเห็นสมควร ศาลจะพิพากษาให้จำเลยชำระดอกเบี้ยจนถึงวันที่ได้ชำระเสร็จตามคำพิพากษาก็ได้ (๔) ในคดีที่โจทก์ฟ้องเรียกค่าเช่าหรือค่าเสียหายอันต่อเนื่องคำนวณถึงวันฟ้อง เมื่อศาลเห็นสมควร ศาลจะพิพากษาให้ชำระค่าเช่าและค่าเสียหายเช่นว่านี้จนถึงวันที่ได้ชำระเสร็จตามคำพิพากษาก็ได้ (๕) ในคดีที่อาจยกข้อกฎหมายอันเกี่ยวด้วยความสงบเรียบร้อยของประชาชนขึ้นอ้างได้นั้น เมื่อศาลเห็นสมควรศาลจะยกข้อเหล่านั้นขึ้นวินิจฉัยแล้วพิพากษาคดีไปก็ได้ (๖) ในคดีที่โจทก์ฟ้องขอให้ชำระเงินพร้อมด้วยดอกเบี้ยซึ่งมิได้มีข้อตกลงกำหนดอัตราดอกเบี้ยกันไว้ เมื่อศาลเห็นสมควรโดยคำนึงถึงเหตุสมควรและความสุจริตในการสู้ความหรือการดำเนินคดี ศาลจะพิพากษาให้จำเลยชำระดอกเบี้ยในอัตราที่สูงขึ้นกว่าที่โจทก์มีสิทธิได้รับตามกฎหมายแต่ไม่เกินร้อยละสิบห้าต่อปีนับตั้งแต่วันฟ้องหรือวันอื่นหลังจากนั้นก็ได้"},{"id":"๑๔๓","num":"มาตรา ๑๔๓","num_ara":"๑๔๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๒ ข้อความและผลแห่งคำพิพากษาและคำสั่ง","subsection":"","paragraphs":["ถ้าในคำพิพากษาหรือคำสั่งใด มีข้อผิดพลาดเล็กน้อยหรือข้อผิดหลงเล็กน้อยอื่นๆ และมิได้มีการอุทธรณ์หรือฎีกาคัดค้านคำพิพากษาหรือคำสั่งนั้น เมื่อศาลที่ได้พิพากษาหรือมีคำสั่งนั้นเห็นสมควร หรือเมื่อคู่ความที่เกี่ยวข้องร้องขอ ศาลจะมีคำสั่งเพิ่มเติมแก้ไขข้อผิดพลาดหรือข้อผิดหลงเช่นว่านั้นให้ถูกก็ได้ แต่ถ้าได้มีการอุทธรณ์หรือฎีกาคัดค้านคำพิพากษาหรือคำสั่งนั้น อำนาจที่จะแก้ไขข้อผิดพลาดหรือข้อผิดหลงนั้น ย่อมอยู่แก่ศาลอุทธรณ์หรือศาลฎีกาแล้วแต่กรณี คำขอให้แก้ไขข้อผิดพลาดหรือข้อผิดหลงนั้น ให้ยื่นต่อศาลดังกล่าวแล้ว โดยกล่าวไว้ในฟ้องอุทธรณ์หรือฎีกา หรือโดยทำเป็นคำร้องส่วนหนึ่งต่างหาก การทำคำสั่งเพิ่มเติมตามมาตรานี้ จะต้องไม่เป็นการกลับหรือแก้คำวินิจฉัยในคำพิพากษาหรือคำสั่งเดิม เมื่อได้ทำคำสั่งเช่นว่านั้นแล้ว ห้ามไม่ให้คัดสำเนาคำพิพากษาหรือคำสั่งเดิม เว้นแต่จะได้คัดสำเนาคำสั่งเพิ่มเติมนั้นรวมไปด้วย"],"text":"ถ้าในคำพิพากษาหรือคำสั่งใด มีข้อผิดพลาดเล็กน้อยหรือข้อผิดหลงเล็กน้อยอื่นๆ และมิได้มีการอุทธรณ์หรือฎีกาคัดค้านคำพิพากษาหรือคำสั่งนั้น เมื่อศาลที่ได้พิพากษาหรือมีคำสั่งนั้นเห็นสมควร หรือเมื่อคู่ความที่เกี่ยวข้องร้องขอ ศาลจะมีคำสั่งเพิ่มเติมแก้ไขข้อผิดพลาดหรือข้อผิดหลงเช่นว่านั้นให้ถูกก็ได้ แต่ถ้าได้มีการอุทธรณ์หรือฎีกาคัดค้านคำพิพากษาหรือคำสั่งนั้น อำนาจที่จะแก้ไขข้อผิดพลาดหรือข้อผิดหลงนั้น ย่อมอยู่แก่ศาลอุทธรณ์หรือศาลฎีกาแล้วแต่กรณี คำขอให้แก้ไขข้อผิดพลาดหรือข้อผิดหลงนั้น ให้ยื่นต่อศาลดังกล่าวแล้ว โดยกล่าวไว้ในฟ้องอุทธรณ์หรือฎีกา หรือโดยทำเป็นคำร้องส่วนหนึ่งต่างหาก การทำคำสั่งเพิ่มเติมตามมาตรานี้ จะต้องไม่เป็นการกลับหรือแก้คำวินิจฉัยในคำพิพากษาหรือคำสั่งเดิม เมื่อได้ทำคำสั่งเช่นว่านั้นแล้ว ห้ามไม่ให้คัดสำเนาคำพิพากษาหรือคำสั่งเดิม เว้นแต่จะได้คัดสำเนาคำสั่งเพิ่มเติมนั้นรวมไปด้วย"},{"id":"๑๔๔","num":"มาตรา ๑๔๔","num_ara":"๑๔๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๒ ข้อความและผลแห่งคำพิพากษาและคำสั่ง","subsection":"","paragraphs":["เมื่อศาลใดมีคำพิพากษา หรือคำสั่งวินิจฉัยชี้ขาดคดีหรือในประเด็นข้อใดแห่งคดีแล้ว ห้ามมิให้ดำเนินกระบวนพิจารณาในศาลนั้นอันเกี่ยวกับคดีหรือประเด็นที่ได้วินิจฉัยชี้ขาดแล้วนั้น เว้นแต่กรณีจะอยู่ภายใต้บังคับบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วย","(๑) การแก้ไขข้อผิดพลาดเล็กน้อยหรือข้อผิดหลงเล็กน้อยอื่น ๆ ตามมาตรา ๑๔๓ (๒) การพิจารณาใหม่แห่งคดีซึ่งได้พิจารณาและชี้ขาดตัดสินไปฝ่ายเดียว ตามมาตรา ๒๐๙ และคดีที่เอกสารได้สูญหายหรือบุบสลายตามมาตรา ๕๓ (๓) การยื่น การยอมรับ หรือไม่ยอมรับ ซึ่งอุทธรณ์หรือฎีกาตามมาตรา ๒๒๙ และ ๒๔๗ และการดำเนินวิธีบังคับชั่วคราวในระหว่างการยื่นอุทธรณ์ หรือฎีกาตามมาตรา ๒๕๔ วรรคสุดท้าย (๔) การที่ศาลฎีกาหรือศาลอุทธรณ์ส่งคดีคืนไปยังศาลล่างที่ได้พิจารณาและชี้ขาดตัดสินคดีนั้น เพื่อให้พิพากษาใหม่หรือพิจารณาและพิพากษาใหม่ตามมาตรา ๒๔๓ (๕) การบังคับคดีตามคำพิพากษาหรือคำสั่งตามมาตรา ๒๗๑ ทั้งนี้ ไม่เป็นการตัดสิทธิในอันที่จะบังคับตามบทบัญญัติแห่งมาตรา ๑๖ และ ๒๔๐ ว่าด้วยการดำเนินกระบวนพิจารณาโดยศาลอื่นแต่งตั้ง"],"text":"เมื่อศาลใดมีคำพิพากษา หรือคำสั่งวินิจฉัยชี้ขาดคดีหรือในประเด็นข้อใดแห่งคดีแล้ว ห้ามมิให้ดำเนินกระบวนพิจารณาในศาลนั้นอันเกี่ยวกับคดีหรือประเด็นที่ได้วินิจฉัยชี้ขาดแล้วนั้น เว้นแต่กรณีจะอยู่ภายใต้บังคับบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วย\n\n(๑) การแก้ไขข้อผิดพลาดเล็กน้อยหรือข้อผิดหลงเล็กน้อยอื่น ๆ ตามมาตรา ๑๔๓ (๒) การพิจารณาใหม่แห่งคดีซึ่งได้พิจารณาและชี้ขาดตัดสินไปฝ่ายเดียว ตามมาตรา ๒๐๙ และคดีที่เอกสารได้สูญหายหรือบุบสลายตามมาตรา ๕๓ (๓) การยื่น การยอมรับ หรือไม่ยอมรับ ซึ่งอุทธรณ์หรือฎีกาตามมาตรา ๒๒๙ และ ๒๔๗ และการดำเนินวิธีบังคับชั่วคราวในระหว่างการยื่นอุทธรณ์ หรือฎีกาตามมาตรา ๒๕๔ วรรคสุดท้าย (๔) การที่ศาลฎีกาหรือศาลอุทธรณ์ส่งคดีคืนไปยังศาลล่างที่ได้พิจารณาและชี้ขาดตัดสินคดีนั้น เพื่อให้พิพากษาใหม่หรือพิจารณาและพิพากษาใหม่ตามมาตรา ๒๔๓ (๕) การบังคับคดีตามคำพิพากษาหรือคำสั่งตามมาตรา ๒๗๑ ทั้งนี้ ไม่เป็นการตัดสิทธิในอันที่จะบังคับตามบทบัญญัติแห่งมาตรา ๑๖ และ ๒๔๐ ว่าด้วยการดำเนินกระบวนพิจารณาโดยศาลอื่นแต่งตั้ง"},{"id":"๑๔๕","num":"มาตรา ๑๔๕","num_ara":"๑๔๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๒ ข้อความและผลแห่งคำพิพากษาและคำสั่ง","subsection":"","paragraphs":["ภายใต้บังคับบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการอุทธรณ์ฎีกา และการพิจารณาใหม่ คำพิพากษาหรือคำสั่งใด ๆ ให้ถือว่าผูกพันคู่ความในกระบวนพิจารณาของศาลที่พิพากษาหรือมีคำสั่ง นับตั้งแต่วันที่ได้พิพากษาหรือมีคำสั่ง จนถึงวันที่คำพิพากษาหรือคำสั่งนั้นได้ถูกเปลี่ยนแปลง แก้ไข กลับหรืองดเสีย ถ้าหากมี ถึงแม้ศาลจะได้กล่าวไว้โดยทั่วไปว่าให้ใช้คำพิพากษาบังคับแก่บุคคลภายนอกซึ่งมิได้เป็นคู่ความในกระบวนพิจารณาของศาลด้วยก็ดี คำพิพากษาหรือคำสั่งนั้นย่อมไม่ผูกพันบุคคลภายนอก เว้นแต่ที่บัญญัติไว้ในมาตรา ๑๔๒ (๑) มาตรา ๒๔๕ และมาตรา ๓๖๖ และในข้อต่อไปนี้","(๑) คำพิพากษาเกี่ยวด้วยฐานะหรือความสามารถของบุคคล หรือคำพิพากษาสั่งให้เลิกนิติบุคคล หรือคำสั่งเรื่องล้มละลายเหล่านี้ บุคคลภายนอกจะยกขึ้นอ้างอิงหรือจะใช้ยันแก่บุคคลภายนอกก็ได้ (๒) คำพิพากษาที่วินิจฉัยถึงกรรมสิทธิ์แห่งทรัพย์สินใด ๆ เป็นคุณแก่คู่ความฝ่ายใดฝ่ายหนึ่งอาจใช้ยันแก่บุคคลภายนอกได้ เว้นแต่บุคคลภายนอกนั้นจะพิสูจน์ได้ว่าตนมีสิทธิดีกว่า"],"text":"ภายใต้บังคับบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการอุทธรณ์ฎีกา และการพิจารณาใหม่ คำพิพากษาหรือคำสั่งใด ๆ ให้ถือว่าผูกพันคู่ความในกระบวนพิจารณาของศาลที่พิพากษาหรือมีคำสั่ง นับตั้งแต่วันที่ได้พิพากษาหรือมีคำสั่ง จนถึงวันที่คำพิพากษาหรือคำสั่งนั้นได้ถูกเปลี่ยนแปลง แก้ไข กลับหรืองดเสีย ถ้าหากมี ถึงแม้ศาลจะได้กล่าวไว้โดยทั่วไปว่าให้ใช้คำพิพากษาบังคับแก่บุคคลภายนอกซึ่งมิได้เป็นคู่ความในกระบวนพิจารณาของศาลด้วยก็ดี คำพิพากษาหรือคำสั่งนั้นย่อมไม่ผูกพันบุคคลภายนอก เว้นแต่ที่บัญญัติไว้ในมาตรา ๑๔๒ (๑) มาตรา ๒๔๕ และมาตรา ๓๖๖ และในข้อต่อไปนี้\n\n(๑) คำพิพากษาเกี่ยวด้วยฐานะหรือความสามารถของบุคคล หรือคำพิพากษาสั่งให้เลิกนิติบุคคล หรือคำสั่งเรื่องล้มละลายเหล่านี้ บุคคลภายนอกจะยกขึ้นอ้างอิงหรือจะใช้ยันแก่บุคคลภายนอกก็ได้ (๒) คำพิพากษาที่วินิจฉัยถึงกรรมสิทธิ์แห่งทรัพย์สินใด ๆ เป็นคุณแก่คู่ความฝ่ายใดฝ่ายหนึ่งอาจใช้ยันแก่บุคคลภายนอกได้ เว้นแต่บุคคลภายนอกนั้นจะพิสูจน์ได้ว่าตนมีสิทธิดีกว่า"},{"id":"๑๔๖","num":"มาตรา ๑๔๖","num_ara":"๑๔๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๒ ข้อความและผลแห่งคำพิพากษาและคำสั่ง","subsection":"","paragraphs":["เมื่อมีคำพิพากษาหรือคำสั่งอันเป็นที่สุดของสองศาลซึ่งต่างชั้นกัน ต่างกล่าวถึงการปฏิบัติชำระหนี้อันแบ่งแยกจากกันไม่ได้ และคำพิพากษาหรือคำสั่งนั้นขัดกัน ให้ถือตามคำพิพากษาหรือคำสั่งของศาลที่สูงกว่า ถ้าศาลชั้นต้นศาลเดียวกัน หรือศาลชั้นต้นสองศาลในลำดับชั้นเดียวกัน หรือศาลอุทธรณ์ ได้พิพากษาหรือมีคำสั่งดังกล่าวมาแล้ว คู่ความในกระบวนพิจารณาแห่งคดีที่มีคำพิพากษาหรือคำสั่งนั้น ชอบที่จะยื่นคำร้องขอต่อศาลที่อยู่ในลำดับสูงขึ้นไปให้มีคำสั่งกำหนดว่าจะให้ถือตามคำพิพากษาหรือคำสั่งใด คำสั่งเช่นว่านี้ให้เป็นที่สุด"],"text":"เมื่อมีคำพิพากษาหรือคำสั่งอันเป็นที่สุดของสองศาลซึ่งต่างชั้นกัน ต่างกล่าวถึงการปฏิบัติชำระหนี้อันแบ่งแยกจากกันไม่ได้ และคำพิพากษาหรือคำสั่งนั้นขัดกัน ให้ถือตามคำพิพากษาหรือคำสั่งของศาลที่สูงกว่า ถ้าศาลชั้นต้นศาลเดียวกัน หรือศาลชั้นต้นสองศาลในลำดับชั้นเดียวกัน หรือศาลอุทธรณ์ ได้พิพากษาหรือมีคำสั่งดังกล่าวมาแล้ว คู่ความในกระบวนพิจารณาแห่งคดีที่มีคำพิพากษาหรือคำสั่งนั้น ชอบที่จะยื่นคำร้องขอต่อศาลที่อยู่ในลำดับสูงขึ้นไปให้มีคำสั่งกำหนดว่าจะให้ถือตามคำพิพากษาหรือคำสั่งใด คำสั่งเช่นว่านี้ให้เป็นที่สุด"},{"id":"๑๔๗","num":"มาตรา ๑๔๗","num_ara":"๑๔๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๒ ข้อความและผลแห่งคำพิพากษาและคำสั่ง","subsection":"","paragraphs":["คำพิพากษาหรือคำสั่งใด ซึ่งตามกฎหมายจะอุทธรณ์หรือฎีกาหรือมีคำขอให้พิจารณาใหม่ไม่ได้นั้น ให้ถือว่าเป็นที่สุดตั้งแต่วันที่ได้อ่านเป็นต้นไป คำพิพากษาหรือคำสั่งใด ซึ่งอาจอุทธรณ์ฎีกา หรือมีคำขอให้พิจารณาใหม่ได้นั้น ถ้ามิได้อุทธรณ์ ฎีกาหรือร้องขอให้พิจารณาใหม่ภายในเวลาที่กำหนดไว้ ให้ถือว่าเป็นที่สุดตั้งแต่ระยะเวลาเช่นว่านั้นได้สิ้นสุดลง ถ้าได้มีอุทธรณ์ ฎีกา หรือมีคำขอให้พิจารณาใหม่ และศาลอุทธรณ์หรือศาลฎีกาหรือศาลชั้นต้นซึ่งพิจารณาคดีเรื่องนั้นใหม่ มีคำสั่งให้จำหน่ายคดีเสียจากสารบบความตามที่บัญญัติไว้ในมาตรา ๑๓๒ คำพิพากษาหรือคำสั่งเช่นว่านั้นให้ถือว่าเป็นที่สุดตั้งแต่วันที่มีคำสั่งให้จำหน่ายคดีจากสารบบความ คู่ความฝ่ายหนึ่งฝ่ายใดอาจยื่นคำขอต่อศาลชั้นต้นซึ่งพิจารณาคดีนั้น ให้ออกใบสำคัญแสดงว่าคำพิพากษาหรือคำสั่งในคดีนั้นได้ถึงที่สุดแล้ว"],"text":"คำพิพากษาหรือคำสั่งใด ซึ่งตามกฎหมายจะอุทธรณ์หรือฎีกาหรือมีคำขอให้พิจารณาใหม่ไม่ได้นั้น ให้ถือว่าเป็นที่สุดตั้งแต่วันที่ได้อ่านเป็นต้นไป คำพิพากษาหรือคำสั่งใด ซึ่งอาจอุทธรณ์ฎีกา หรือมีคำขอให้พิจารณาใหม่ได้นั้น ถ้ามิได้อุทธรณ์ ฎีกาหรือร้องขอให้พิจารณาใหม่ภายในเวลาที่กำหนดไว้ ให้ถือว่าเป็นที่สุดตั้งแต่ระยะเวลาเช่นว่านั้นได้สิ้นสุดลง ถ้าได้มีอุทธรณ์ ฎีกา หรือมีคำขอให้พิจารณาใหม่ และศาลอุทธรณ์หรือศาลฎีกาหรือศาลชั้นต้นซึ่งพิจารณาคดีเรื่องนั้นใหม่ มีคำสั่งให้จำหน่ายคดีเสียจากสารบบความตามที่บัญญัติไว้ในมาตรา ๑๓๒ คำพิพากษาหรือคำสั่งเช่นว่านั้นให้ถือว่าเป็นที่สุดตั้งแต่วันที่มีคำสั่งให้จำหน่ายคดีจากสารบบความ คู่ความฝ่ายหนึ่งฝ่ายใดอาจยื่นคำขอต่อศาลชั้นต้นซึ่งพิจารณาคดีนั้น ให้ออกใบสำคัญแสดงว่าคำพิพากษาหรือคำสั่งในคดีนั้นได้ถึงที่สุดแล้ว"},{"id":"๑๔๘","num":"มาตรา ๑๔๘","num_ara":"๑๔๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๒ ข้อความและผลแห่งคำพิพากษาและคำสั่ง","subsection":"","paragraphs":["คดีที่ได้มีคำพิพากษาหรือคำสั่งถึงที่สุดแล้ว ห้ามมิให้คู่ความเดียวกันรื้อร้องฟ้องกันอีก ในประเด็นที่ได้วินิจฉัยโดยอาศัยเหตุอย่างเดียวกัน เว้นแต่ในกรณีต่อไปนี้","(๑) เมื่อเป็นกระบวนพิจารณาชั้นบังคับคดีตามคำพิพากษาหรือคำสั่งของศาล (๒) เมื่อคำพิพากษาหรือคำสั่งได้กำหนดวิธีการชั่วคราวให้อยู่ภายในบังคับที่จะแก้ไขเปลี่ยนแปลงหรือยกเลิกเสียได้ตามพฤติการณ์ (๓) เมื่อคำพิพากษาหรือคำสั่งนั้นให้ยกคำฟ้องเสียโดยไม่ตัดสิทธิโจทก์ที่จะนำคำฟ้องมายื่นใหม่ ในศาลเดียวกันหรือในศาลอื่น ภายใต้บังคับแห่งบทบัญญัติของกฎหมายว่าด้วยอายุความ"],"text":"คดีที่ได้มีคำพิพากษาหรือคำสั่งถึงที่สุดแล้ว ห้ามมิให้คู่ความเดียวกันรื้อร้องฟ้องกันอีก ในประเด็นที่ได้วินิจฉัยโดยอาศัยเหตุอย่างเดียวกัน เว้นแต่ในกรณีต่อไปนี้\n\n(๑) เมื่อเป็นกระบวนพิจารณาชั้นบังคับคดีตามคำพิพากษาหรือคำสั่งของศาล (๒) เมื่อคำพิพากษาหรือคำสั่งได้กำหนดวิธีการชั่วคราวให้อยู่ภายในบังคับที่จะแก้ไขเปลี่ยนแปลงหรือยกเลิกเสียได้ตามพฤติการณ์ (๓) เมื่อคำพิพากษาหรือคำสั่งนั้นให้ยกคำฟ้องเสียโดยไม่ตัดสิทธิโจทก์ที่จะนำคำฟ้องมายื่นใหม่ ในศาลเดียวกันหรือในศาลอื่น ภายใต้บังคับแห่งบทบัญญัติของกฎหมายว่าด้วยอายุความ"},{"id":"๑๔๙","num":"มาตรา ๑๔๙","num_ara":"๑๔๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["ค่าฤชาธรรมเนียม ได้แก่ ค่าธรรมเนียมศาล ค่าสืบพยานหลักฐานนอกศาล ค่าป่วยการ ค่าพาหนะเดินทาง และค่าเช่าที่พักของพยาน ผู้เชี่ยวชาญ ล่าม และเจ้าพนักงานศาล ค่าทนายความ ค่าใช้จ่ายในการดำเนินคดี ตลอดจนค่าธรรมเนียมหรือค่าใช้จ่ายอื่น ๆ บรรดาที่กฎหมายบังคับให้ชำระ ภายใต้บังคับบทบัญญัติแห่งประมวลกฎหมายนี้หรือกฎหมายอื่น ว่าด้วยการยกเว้นค่าธรรมเนียมศาล ค่าธรรมเนียมศาลที่เป็นค่าขึ้นศาล ให้คู่ความผู้ยื่นคำฟ้องเป็นผู้ชำระเมื่อยื่นคำฟ้อง ค่าธรรมเนียมศาลนั้น ให้ชำระหรือนำมาวางศาลเป็นเงินสดหรือเช็คซึ่งธนาคารรับรอง โดยเจ้าพนักงานศาลออกใบรับให้ หรือตามวิธีการที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกา คำฟ้อง คำฟ้องอุทธรณ์ คำฟ้องฎีกา คำร้องสอด คำให้การ หรือคำร้องคำขออื่นซึ่งได้ยื่นต่อศาลพร้อมคำร้องขอยกเว้นค่าธรรมเนียมศาลตามมาตรา ๑๕๖ ตลอดจนการดำเนินกระบวนพิจารณาในชั้นไต่สวนคำร้องดังกล่าว ไม่ต้องนำเงินค่าธรรมเนียมศาลและเงินวางศาลมาชำระ เว้นแต่ศาลจะได้ยกคำร้องนั้นเสีย"],"text":"ค่าฤชาธรรมเนียม ได้แก่ ค่าธรรมเนียมศาล ค่าสืบพยานหลักฐานนอกศาล ค่าป่วยการ ค่าพาหนะเดินทาง และค่าเช่าที่พักของพยาน ผู้เชี่ยวชาญ ล่าม และเจ้าพนักงานศาล ค่าทนายความ ค่าใช้จ่ายในการดำเนินคดี ตลอดจนค่าธรรมเนียมหรือค่าใช้จ่ายอื่น ๆ บรรดาที่กฎหมายบังคับให้ชำระ ภายใต้บังคับบทบัญญัติแห่งประมวลกฎหมายนี้หรือกฎหมายอื่น ว่าด้วยการยกเว้นค่าธรรมเนียมศาล ค่าธรรมเนียมศาลที่เป็นค่าขึ้นศาล ให้คู่ความผู้ยื่นคำฟ้องเป็นผู้ชำระเมื่อยื่นคำฟ้อง ค่าธรรมเนียมศาลนั้น ให้ชำระหรือนำมาวางศาลเป็นเงินสดหรือเช็คซึ่งธนาคารรับรอง โดยเจ้าพนักงานศาลออกใบรับให้ หรือตามวิธีการที่กำหนดไว้ในข้อกำหนดของประธานศาลฎีกา คำฟ้อง คำฟ้องอุทธรณ์ คำฟ้องฎีกา คำร้องสอด คำให้การ หรือคำร้องคำขออื่นซึ่งได้ยื่นต่อศาลพร้อมคำร้องขอยกเว้นค่าธรรมเนียมศาลตามมาตรา ๑๕๖ ตลอดจนการดำเนินกระบวนพิจารณาในชั้นไต่สวนคำร้องดังกล่าว ไม่ต้องนำเงินค่าธรรมเนียมศาลและเงินวางศาลมาชำระ เว้นแต่ศาลจะได้ยกคำร้องนั้นเสีย"},{"id":"๑๕๐","num":"มาตรา ๑๕๐","num_ara":"๑๕๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["ในคดีที่คำขอให้ปลดเปลื้องทุกข์นั้นอาจคำนวณเป็นราคาเงินได้ ให้โจทก์เสียค่าขึ้นศาลในศาลชั้นต้นตามจำนวนทุนทรัพย์ที่เรียกร้องหรือราคาทรัพย์สินที่พิพาท ค่าขึ้นศาลในชั้นอุทธรณ์หรือฎีกานั้น ถ้าจำนวนทุนทรัพย์ที่เรียกร้องหรือราคาทรัพย์สินที่พิพาทกันในชั้นอุทธรณ์หรือฎีกาเป็นอย่างเดียวกับในศาลชั้นต้น ให้ผู้อุทธรณ์หรือผู้ฎีกาเสียตามจำนวนทุนทรัพย์หรือราคาเช่นเดียวกับในศาลชั้นต้น แต่ถ้าผู้อุทธรณ์หรือผู้ฎีกาได้รับความพอใจแต่บางส่วนตามคำพิพากษาหรือคำสั่งของศาลล่างแล้ว และจำนวนทุนทรัพย์หรือราคาทรัพย์ที่พิพาทในชั้นอุทธรณ์หรือฎีกาต่ำกว่าในศาลชั้นต้น ให้ผู้อุทธรณ์หรือผู้ฎีกาเสียค่าขึ้นศาลตามจำนวนทุนทรัพย์หรือราคาต่ำนั้น เมื่อได้ชำระค่าขึ้นศาลแล้ว ถ้าทุนทรัพย์แห่งคำฟ้องหรือคำฟ้องอุทธรณ์หรือคำฟ้องฎีกาทวีขึ้นโดยการยื่นคำฟ้องเพิ่มเติมหรือโดยประการอื่น ให้เรียกค่าขึ้นศาลเพิ่มขึ้นตามที่บัญญัติไว้ในตารางท้ายประมวลกฎหมายนี้เมื่อยื่นคำฟ้องเพิ่มเติมหรือภายในระยะเวลาที่ศาลเห็นสมควร แล้วแต่กรณี ถ้าเนื่องจากศาลได้มีคำสั่งให้พิจารณาคดีรวมกันหรือให้แยกคดีกัน คำฟ้องใดหรือข้อหาอันมีอยู่ในคำฟ้องใดจะต้องโอนไปยังศาลอื่น หรือจะต้องกลับยื่นต่อศาลนั้นใหม่ หรือต่อศาลอื่นเป็นคดีเรื่องหนึ่งต่างหาก ให้โจทก์ได้รับผ่อนผันไม่ต้องเสียค่าขึ้นศาลในการยื่น หรือกลับยื่นคำฟ้องหรือข้อหาเช่นว่านั้น เว้นแต่จำนวนทุนทรัพย์หรือราคาทรัพย์แห่งคำฟ้อง หรือข้อหานั้นจะได้ทวีขึ้น ในกรณีเช่นนี้ ค่าขึ้นศาลเฉพาะที่ทวีขึ้นให้คำนวณและชำระตามที่บัญญัติไว้ในวรรคก่อน ในกรณีที่บุคคลซึ่งเป็นคู่ความร่วมในคดีที่มูลความแห่งคดีเป็นการชำระหนี้อันไม่อาจแบ่งแยกได้ต่างยื่นอุทธรณ์หรือฎีกาแยกกัน โดยต่างได้เสียค่าขึ้นศาลในชั้นอุทธรณ์หรือฎีกาตามความในวรรคสอง หากค่าขึ้นศาลดังกล่าวเมื่อรวมกันแล้วมีจำนวนสูงกว่าค่าขึ้นศาลที่คู่ความเหล่านั้นต้องชำระในกรณีที่ยื่นอุทธรณ์หรือฎีการ่วมกัน ให้ศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี มีคำสั่งคืนค่าขึ้นศาลส่วนที่เกินแก่คู่ความเหล่านั้นตามส่วนของค่าขึ้นศาลที่คู่ความแต่ละคนได้ชำระไปในเวลาที่ศาลนั้นมีคำพิพากษาหรือคำสั่ง"],"text":"ในคดีที่คำขอให้ปลดเปลื้องทุกข์นั้นอาจคำนวณเป็นราคาเงินได้ ให้โจทก์เสียค่าขึ้นศาลในศาลชั้นต้นตามจำนวนทุนทรัพย์ที่เรียกร้องหรือราคาทรัพย์สินที่พิพาท ค่าขึ้นศาลในชั้นอุทธรณ์หรือฎีกานั้น ถ้าจำนวนทุนทรัพย์ที่เรียกร้องหรือราคาทรัพย์สินที่พิพาทกันในชั้นอุทธรณ์หรือฎีกาเป็นอย่างเดียวกับในศาลชั้นต้น ให้ผู้อุทธรณ์หรือผู้ฎีกาเสียตามจำนวนทุนทรัพย์หรือราคาเช่นเดียวกับในศาลชั้นต้น แต่ถ้าผู้อุทธรณ์หรือผู้ฎีกาได้รับความพอใจแต่บางส่วนตามคำพิพากษาหรือคำสั่งของศาลล่างแล้ว และจำนวนทุนทรัพย์หรือราคาทรัพย์ที่พิพาทในชั้นอุทธรณ์หรือฎีกาต่ำกว่าในศาลชั้นต้น ให้ผู้อุทธรณ์หรือผู้ฎีกาเสียค่าขึ้นศาลตามจำนวนทุนทรัพย์หรือราคาต่ำนั้น เมื่อได้ชำระค่าขึ้นศาลแล้ว ถ้าทุนทรัพย์แห่งคำฟ้องหรือคำฟ้องอุทธรณ์หรือคำฟ้องฎีกาทวีขึ้นโดยการยื่นคำฟ้องเพิ่มเติมหรือโดยประการอื่น ให้เรียกค่าขึ้นศาลเพิ่มขึ้นตามที่บัญญัติไว้ในตารางท้ายประมวลกฎหมายนี้เมื่อยื่นคำฟ้องเพิ่มเติมหรือภายในระยะเวลาที่ศาลเห็นสมควร แล้วแต่กรณี ถ้าเนื่องจากศาลได้มีคำสั่งให้พิจารณาคดีรวมกันหรือให้แยกคดีกัน คำฟ้องใดหรือข้อหาอันมีอยู่ในคำฟ้องใดจะต้องโอนไปยังศาลอื่น หรือจะต้องกลับยื่นต่อศาลนั้นใหม่ หรือต่อศาลอื่นเป็นคดีเรื่องหนึ่งต่างหาก ให้โจทก์ได้รับผ่อนผันไม่ต้องเสียค่าขึ้นศาลในการยื่น หรือกลับยื่นคำฟ้องหรือข้อหาเช่นว่านั้น เว้นแต่จำนวนทุนทรัพย์หรือราคาทรัพย์แห่งคำฟ้อง หรือข้อหานั้นจะได้ทวีขึ้น ในกรณีเช่นนี้ ค่าขึ้นศาลเฉพาะที่ทวีขึ้นให้คำนวณและชำระตามที่บัญญัติไว้ในวรรคก่อน ในกรณีที่บุคคลซึ่งเป็นคู่ความร่วมในคดีที่มูลความแห่งคดีเป็นการชำระหนี้อันไม่อาจแบ่งแยกได้ต่างยื่นอุทธรณ์หรือฎีกาแยกกัน โดยต่างได้เสียค่าขึ้นศาลในชั้นอุทธรณ์หรือฎีกาตามความในวรรคสอง หากค่าขึ้นศาลดังกล่าวเมื่อรวมกันแล้วมีจำนวนสูงกว่าค่าขึ้นศาลที่คู่ความเหล่านั้นต้องชำระในกรณีที่ยื่นอุทธรณ์หรือฎีการ่วมกัน ให้ศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี มีคำสั่งคืนค่าขึ้นศาลส่วนที่เกินแก่คู่ความเหล่านั้นตามส่วนของค่าขึ้นศาลที่คู่ความแต่ละคนได้ชำระไปในเวลาที่ศาลนั้นมีคำพิพากษาหรือคำสั่ง"},{"id":"๑๕๑","num":"มาตรา ๑๕๑","num_ara":"๑๕๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["ในกรณีที่ศาลมีคำสั่งไม่รับคำฟ้องหรือในกรณีที่มีการอุทธรณ์ หรือฎีกาหรือมีคำขอให้พิจารณาใหม่ ถ้าศาลไม่รับอุทธรณ์หรือฎีกาหรือคำขอให้พิจารณาใหม่ หรือศาลอุทธรณ์หรือศาลฎีกามีคำสั่งให้ยกอุทธรณ์หรือฎีกาโดยยังมิได้วินิจฉัยประเด็นแห่งอุทธรณ์หรือฎีกานั้น ให้ศาลมีคำสั่งให้คืนค่าขึ้นศาลทั้งหมด เมื่อได้มีการถอนคำฟ้อง หรือเมื่อศาลได้ตัดสินให้ยกคำฟ้องโดยไม่ตัดสิทธิโจทก์ที่จะฟ้องคดีใหม่ หรือเมื่อคดีนั้นได้เสร็จเด็ดขาดลงโดยสัญญาหรือการประนีประนอมยอมความหรือการพิพากษาตามคำชี้ขาดของอนุญาโตตุลาการ ให้ศาลมีอำนาจที่จะสั่งคืนค่าขึ้นศาลทั้งหมด หรือบางส่วนแก่คู่ความซึ่งได้เสียไว้ได้ตามที่เห็นสมควร ในกรณีที่มีการทิ้งฟ้องหรือศาลสั่งจำหน่ายคดีในกรณีอื่น ให้ศาลมีอำนาจที่จะสั่งคืนค่าขึ้นศาลบางส่วนได้ตามที่เห็นสมควร ถ้าศาลอุทธรณ์หรือศาลฎีกามีคำสั่งให้ส่งสำนวนความคืนไปยังศาลล่างเพื่อตัดสินใหม่หรือเพื่อพิจารณาใหม่ทั้งหมดหรือแต่บางส่วนตามที่บัญญัติไว้ในมาตรา ๒๔๓ ศาลอุทธรณ์หรือศาลฎีกามีอำนาจที่จะยกเว้นมิให้คู่ความต้องเสียค่าธรรมเนียมศาลในการดำเนินกระบวนพิจารณาใหม่หรือในการที่จะยื่นอุทธรณ์หรือฎีกาคัดค้านคำพิพากษาใหม่ของศาลล่างได้ตามที่เห็นสมควร"],"text":"ในกรณีที่ศาลมีคำสั่งไม่รับคำฟ้องหรือในกรณีที่มีการอุทธรณ์ หรือฎีกาหรือมีคำขอให้พิจารณาใหม่ ถ้าศาลไม่รับอุทธรณ์หรือฎีกาหรือคำขอให้พิจารณาใหม่ หรือศาลอุทธรณ์หรือศาลฎีกามีคำสั่งให้ยกอุทธรณ์หรือฎีกาโดยยังมิได้วินิจฉัยประเด็นแห่งอุทธรณ์หรือฎีกานั้น ให้ศาลมีคำสั่งให้คืนค่าขึ้นศาลทั้งหมด เมื่อได้มีการถอนคำฟ้อง หรือเมื่อศาลได้ตัดสินให้ยกคำฟ้องโดยไม่ตัดสิทธิโจทก์ที่จะฟ้องคดีใหม่ หรือเมื่อคดีนั้นได้เสร็จเด็ดขาดลงโดยสัญญาหรือการประนีประนอมยอมความหรือการพิพากษาตามคำชี้ขาดของอนุญาโตตุลาการ ให้ศาลมีอำนาจที่จะสั่งคืนค่าขึ้นศาลทั้งหมด หรือบางส่วนแก่คู่ความซึ่งได้เสียไว้ได้ตามที่เห็นสมควร ในกรณีที่มีการทิ้งฟ้องหรือศาลสั่งจำหน่ายคดีในกรณีอื่น ให้ศาลมีอำนาจที่จะสั่งคืนค่าขึ้นศาลบางส่วนได้ตามที่เห็นสมควร ถ้าศาลอุทธรณ์หรือศาลฎีกามีคำสั่งให้ส่งสำนวนความคืนไปยังศาลล่างเพื่อตัดสินใหม่หรือเพื่อพิจารณาใหม่ทั้งหมดหรือแต่บางส่วนตามที่บัญญัติไว้ในมาตรา ๒๔๓ ศาลอุทธรณ์หรือศาลฎีกามีอำนาจที่จะยกเว้นมิให้คู่ความต้องเสียค่าธรรมเนียมศาลในการดำเนินกระบวนพิจารณาใหม่หรือในการที่จะยื่นอุทธรณ์หรือฎีกาคัดค้านคำพิพากษาใหม่ของศาลล่างได้ตามที่เห็นสมควร"},{"id":"๑๕๒","num":"มาตรา ๑๕๒","num_ara":"๑๕๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["ค่าฤชาธรรมเนียมอื่นนอกจากค่าขึ้นศาล ให้คู่ความผู้ดำเนินกระบวนพิจารณาเป็นผู้ชำระเมื่อมีการดำเนินกระบวนพิจารณานั้นหรือภายในเวลาที่กฎหมายกำหนดหรือที่ศาลมีคำสั่ง ถ้าศาลเป็นผู้สั่งให้ดำเนินกระบวนพิจารณาใด ให้ศาลกำหนดผู้ซึ่งจะต้องชำระค่าฤชาธรรมเนียมในการดำเนินกระบวนพิจารณานั้น รวมทั้งระยะเวลาที่ต้องชำระไว้ด้วย ถ้าผู้ซึ่งจะต้องชำระค่าฤชาธรรมเนียมตามวรรคหนึ่งไม่ชำระ ศาลจะสั่งให้งดหรือเพิกถอนกระบวนพิจารณานั้น หรือจะสั่งให้คู่ความฝ่ายอื่นเป็นผู้ชำระค่าฤชาธรรมเนียมดังกล่าวก็ได้หากคู่ความฝ่ายนั้นยินยอม"],"text":"ค่าฤชาธรรมเนียมอื่นนอกจากค่าขึ้นศาล ให้คู่ความผู้ดำเนินกระบวนพิจารณาเป็นผู้ชำระเมื่อมีการดำเนินกระบวนพิจารณานั้นหรือภายในเวลาที่กฎหมายกำหนดหรือที่ศาลมีคำสั่ง ถ้าศาลเป็นผู้สั่งให้ดำเนินกระบวนพิจารณาใด ให้ศาลกำหนดผู้ซึ่งจะต้องชำระค่าฤชาธรรมเนียมในการดำเนินกระบวนพิจารณานั้น รวมทั้งระยะเวลาที่ต้องชำระไว้ด้วย ถ้าผู้ซึ่งจะต้องชำระค่าฤชาธรรมเนียมตามวรรคหนึ่งไม่ชำระ ศาลจะสั่งให้งดหรือเพิกถอนกระบวนพิจารณานั้น หรือจะสั่งให้คู่ความฝ่ายอื่นเป็นผู้ชำระค่าฤชาธรรมเนียมดังกล่าวก็ได้หากคู่ความฝ่ายนั้นยินยอม"},{"id":"๑๕๓","num":"มาตรา ๑๕๓","num_ara":"๑๕๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["ค่าฤชาธรรมเนียมในการบังคับคดี ได้แก่ ค่าธรรมเนียมในการบังคับคดี ค่าป่วยการ ค่าพาหนะเดินทาง และค่าเช่าที่พักของเจ้าพนักงานบังคับคดีตลอดจนค่าใช้จ่ายอื่น ๆ ในการบังคับคดีบรรดาที่กฎหมายบังคับให้ชำระ ค่าฤชาธรรมเนียมในการบังคับคดี ให้เจ้าหนี้ผู้ขอบังคับคดีนั้นเป็นผู้ชำระ การชำระค่าธรรมเนียมในการบังคับคดี ให้เจ้าพนักงานบังคับคดีออกใบรับให้ ในกรณีที่มีการเข้าดำเนินการบังคับคดีต่อไปตามมาตรา ๓๒๗ หรือมาตรา ๓๒๙ (๒) ให้เจ้าหนี้ผู้เข้าดำเนินการบังคับคดีต่อไปเป็นผู้ชำระค่าฤชาธรรมเนียมในการบังคับคดีเฉพาะทรัพย์สินในส่วนที่ดำเนินการบังคับคดีต่อไป"],"text":"ค่าฤชาธรรมเนียมในการบังคับคดี ได้แก่ ค่าธรรมเนียมในการบังคับคดี ค่าป่วยการ ค่าพาหนะเดินทาง และค่าเช่าที่พักของเจ้าพนักงานบังคับคดีตลอดจนค่าใช้จ่ายอื่น ๆ ในการบังคับคดีบรรดาที่กฎหมายบังคับให้ชำระ ค่าฤชาธรรมเนียมในการบังคับคดี ให้เจ้าหนี้ผู้ขอบังคับคดีนั้นเป็นผู้ชำระ การชำระค่าธรรมเนียมในการบังคับคดี ให้เจ้าพนักงานบังคับคดีออกใบรับให้ ในกรณีที่มีการเข้าดำเนินการบังคับคดีต่อไปตามมาตรา ๓๒๗ หรือมาตรา ๓๒๙ (๒) ให้เจ้าหนี้ผู้เข้าดำเนินการบังคับคดีต่อไปเป็นผู้ชำระค่าฤชาธรรมเนียมในการบังคับคดีเฉพาะทรัพย์สินในส่วนที่ดำเนินการบังคับคดีต่อไป"},{"id":"๑๕๓_๑","num":"มาตรา ๑๕๓/๑","num_ara":"๑๕๓/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["ค่าฤชาธรรมเนียมตามมาตรา ๑๔๙ และค่าฤชาธรรมเนียมในการบังคับคดีตามมาตรา ๑๕๓ ให้ชำระตามวิธีการและอัตราที่บัญญัติไว้ในประมวลกฎหมายนี้หรือตามวิธีการและอัตราที่มีกฎหมายอื่นบังคับไว้"],"text":"ค่าฤชาธรรมเนียมตามมาตรา ๑๔๙ และค่าฤชาธรรมเนียมในการบังคับคดีตามมาตรา ๑๕๓ ให้ชำระตามวิธีการและอัตราที่บัญญัติไว้ในประมวลกฎหมายนี้หรือตามวิธีการและอัตราที่มีกฎหมายอื่นบังคับไว้"},{"id":"๑๕๔","num":"มาตรา ๑๕๔","num_ara":"๑๕๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["เจ้าพนักงานบังคับคดีมีอำนาจที่จะสั่งให้เจ้าหนี้ผู้ขอบังคับคดีวางเงินค่าใช้จ่าย เพื่อปฏิบัติตามวิธีการเพื่อคุ้มครองสิทธิของคู่ความในระหว่างการพิจารณา หรือวางเงินค่าใช้จ่ายเพื่อบังคับให้เป็นไปตามคำพิพากษาหรือคำสั่งได้ตามจำนวนที่เห็นจำเป็นถ้าเจ้าพนักงานบังคับคดีเห็นว่าจำนวนเงินที่วางไว้นั้นจะไม่พอ ก็ให้แจ้งให้เจ้าหนี้ผู้ขอบังคับคดีวางเงินเพิ่มขึ้นอีกได้ ถ้าเจ้าหนี้ผู้ขอบังคับคดีเห็นว่าการวางเงินตามวรรคหนึ่งไม่จำเป็นหรือมากเกินไป ก็อาจยื่นคำร้องต่อศาลภายในเจ็ดวันนับแต่วันที่ได้รับแจ้งเพื่อขอให้ศาลมีคำสั่งได้ คำสั่งดังกล่าวให้เป็นที่สุด ถ้าเจ้าหนี้ผู้ขอบังคับคดีไม่ปฏิบัติตามวรรคหนึ่งหรือไม่ปฏิบัติตามคำสั่งศาลตามวรรคสอง ให้เจ้าพนักงานบังคับคดีงดการบังคับคดีไว้จนกว่าเจ้าหนี้ผู้ขอบังคับคดีนั้นจะได้ปฏิบัติตามคำสั่งของเจ้าพนักงานบังคับคดีหรือศาล แล้วแต่กรณี บทบัญญัติมาตรานี้ให้ใช้บังคับแก่เจ้าหนี้ผู้เข้าดำเนินการบังคับคดีต่อไปตามมาตรา ๓๒๗ และมาตรา ๓๒๙ (๒) โดยอนุโลม"],"text":"เจ้าพนักงานบังคับคดีมีอำนาจที่จะสั่งให้เจ้าหนี้ผู้ขอบังคับคดีวางเงินค่าใช้จ่าย เพื่อปฏิบัติตามวิธีการเพื่อคุ้มครองสิทธิของคู่ความในระหว่างการพิจารณา หรือวางเงินค่าใช้จ่ายเพื่อบังคับให้เป็นไปตามคำพิพากษาหรือคำสั่งได้ตามจำนวนที่เห็นจำเป็นถ้าเจ้าพนักงานบังคับคดีเห็นว่าจำนวนเงินที่วางไว้นั้นจะไม่พอ ก็ให้แจ้งให้เจ้าหนี้ผู้ขอบังคับคดีวางเงินเพิ่มขึ้นอีกได้ ถ้าเจ้าหนี้ผู้ขอบังคับคดีเห็นว่าการวางเงินตามวรรคหนึ่งไม่จำเป็นหรือมากเกินไป ก็อาจยื่นคำร้องต่อศาลภายในเจ็ดวันนับแต่วันที่ได้รับแจ้งเพื่อขอให้ศาลมีคำสั่งได้ คำสั่งดังกล่าวให้เป็นที่สุด ถ้าเจ้าหนี้ผู้ขอบังคับคดีไม่ปฏิบัติตามวรรคหนึ่งหรือไม่ปฏิบัติตามคำสั่งศาลตามวรรคสอง ให้เจ้าพนักงานบังคับคดีงดการบังคับคดีไว้จนกว่าเจ้าหนี้ผู้ขอบังคับคดีนั้นจะได้ปฏิบัติตามคำสั่งของเจ้าพนักงานบังคับคดีหรือศาล แล้วแต่กรณี บทบัญญัติมาตรานี้ให้ใช้บังคับแก่เจ้าหนี้ผู้เข้าดำเนินการบังคับคดีต่อไปตามมาตรา ๓๒๗ และมาตรา ๓๒๙ (๒) โดยอนุโลม"},{"id":"๑๕๕","num":"มาตรา ๑๕๕","num_ara":"๑๕๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["คู่ความซึ่งไม่สามารถเสียค่าธรรมเนียมศาลอาจยื่นคำร้องต่อศาลขอให้ยกเว้นค่าธรรมเนียมศาลในการฟ้องหรือต่อสู้คดีในศาลชั้นต้นหรือชั้นอุทธรณ์หรือชั้นฎีกาตามที่บัญญัติไว้ในมาตรา ๑๕๖ และมาตรา ๑๕๖/๑"],"text":"คู่ความซึ่งไม่สามารถเสียค่าธรรมเนียมศาลอาจยื่นคำร้องต่อศาลขอให้ยกเว้นค่าธรรมเนียมศาลในการฟ้องหรือต่อสู้คดีในศาลชั้นต้นหรือชั้นอุทธรณ์หรือชั้นฎีกาตามที่บัญญัติไว้ในมาตรา ๑๕๖ และมาตรา ๑๕๖/๑"},{"id":"๑๕๖","num":"มาตรา ๑๕๖","num_ara":"๑๕๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["ผู้ใดมีความจำนงจะขอยกเว้นค่าธรรมเนียมศาลในการฟ้องหรือต่อสู้คดี ให้ยื่นคำร้องต่อศาลชั้นต้นที่จะฟ้องหรือได้ฟ้องคดีไว้นั้นพร้อมกับคำฟ้อง คำฟ้องอุทธรณ์ คำฟ้องฎีกา คำร้องสอด หรือคำให้การ แล้วแต่กรณี แต่ถ้าบุคคลนั้นตกเป็นผู้ไม่สามารถเสียค่าธรรมเนียมศาลในภายหลัง จะยื่นคำร้องในเวลาใด ๆ ก็ได้ การยื่นคำร้องตามวรรคหนึ่ง ผู้ร้องอาจเสนอพยานหลักฐานไปพร้อมคำร้องและหากศาลเห็นสมควรไต่สวนพยานหลักฐานเพิ่มเติมก็ให้ดำเนินการไต่สวนโดยเร็วเท่าที่จำเป็น ทั้งนี้ ศาลจะมีคำสั่งให้งดการดำเนินกระบวนพิจารณาคดีนั้นไว้ทั้งหมดหรือแต่บางส่วนเป็นการชั่วคราวจนกว่าการพิจารณาสั่งคำร้องขอยกเว้นค่าธรรมเนียมศาลจะถึงที่สุดก็ได้ตามที่ศาลเห็นสมควร"],"text":"ผู้ใดมีความจำนงจะขอยกเว้นค่าธรรมเนียมศาลในการฟ้องหรือต่อสู้คดี ให้ยื่นคำร้องต่อศาลชั้นต้นที่จะฟ้องหรือได้ฟ้องคดีไว้นั้นพร้อมกับคำฟ้อง คำฟ้องอุทธรณ์ คำฟ้องฎีกา คำร้องสอด หรือคำให้การ แล้วแต่กรณี แต่ถ้าบุคคลนั้นตกเป็นผู้ไม่สามารถเสียค่าธรรมเนียมศาลในภายหลัง จะยื่นคำร้องในเวลาใด ๆ ก็ได้ การยื่นคำร้องตามวรรคหนึ่ง ผู้ร้องอาจเสนอพยานหลักฐานไปพร้อมคำร้องและหากศาลเห็นสมควรไต่สวนพยานหลักฐานเพิ่มเติมก็ให้ดำเนินการไต่สวนโดยเร็วเท่าที่จำเป็น ทั้งนี้ ศาลจะมีคำสั่งให้งดการดำเนินกระบวนพิจารณาคดีนั้นไว้ทั้งหมดหรือแต่บางส่วนเป็นการชั่วคราวจนกว่าการพิจารณาสั่งคำร้องขอยกเว้นค่าธรรมเนียมศาลจะถึงที่สุดก็ได้ตามที่ศาลเห็นสมควร"},{"id":"๑๕๖_๑","num":"มาตรา ๑๕๖/๑","num_ara":"๑๕๖/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["เมื่อศาลพิจารณาคำร้องขอยกเว้นค่าธรรมเนียมศาลเสร็จแล้วให้ศาลมีคำสั่งโดยเร็ว โดยศาลจะมีคำสั่งอนุญาตทั้งหมดหรือแต่เฉพาะบางส่วน หรือยกคำร้องนั้นเสียก็ได้ ห้ามมิให้ศาลอนุญาตตามคำร้องเช่นว่านั้น เว้นแต่จะเป็นที่เชื่อได้ว่าผู้ร้องไม่มีทรัพย์สินพอที่จะเสียค่าธรรมเนียมศาลหรือหากผู้ร้องไม่ได้รับยกเว้นค่าธรรมเนียมศาลจะได้รับความเดือดร้อนเกินสมควรเมื่อพิจารณาถึงสถานะของผู้ร้อง และในกรณีผู้ร้องเป็นโจทก์หรือผู้อุทธรณ์หรือฎีกา การฟ้องร้องหรืออุทธรณ์หรือฎีกานั้นมีเหตุผลอันสมควรด้วย เมื่อคู่ความคนใดได้รับยกเว้นค่าธรรมเนียมศาลในการฟ้องหรือต่อสู้คดีในศาลชั้นต้นแล้วยื่นคำร้องเช่นว่านั้นในชั้นอุทธรณ์หรือฎีกา แล้วแต่กรณี อีก ให้ถือว่าคู่ความนั้นยังคงไม่มีทรัพย์สินพอจะเสียค่าธรรมเนียมศาลหรือหากไม่ได้รับยกเว้นค่าธรรมเนียมศาลแล้วจะได้รับความเดือดร้อนเกินสมควรอยู่ เว้นแต่จะปรากฏต่อศาลเป็นอย่างอื่น ในกรณีที่ศาลมีคำสั่งอนุญาตให้ยกเว้นค่าธรรมเนียมศาลให้แต่เฉพาะบางส่วน หรือมีคำสั่งให้ยกคำร้อง ผู้ขออาจอุทธรณ์คำสั่งนั้นต่อศาลได้ภายในกำหนดเจ็ดวันนับแต่วันมีคำสั่ง คำสั่งของศาลอุทธรณ์เช่นว่านี้ให้เป็นที่สุด"],"text":"เมื่อศาลพิจารณาคำร้องขอยกเว้นค่าธรรมเนียมศาลเสร็จแล้วให้ศาลมีคำสั่งโดยเร็ว โดยศาลจะมีคำสั่งอนุญาตทั้งหมดหรือแต่เฉพาะบางส่วน หรือยกคำร้องนั้นเสียก็ได้ ห้ามมิให้ศาลอนุญาตตามคำร้องเช่นว่านั้น เว้นแต่จะเป็นที่เชื่อได้ว่าผู้ร้องไม่มีทรัพย์สินพอที่จะเสียค่าธรรมเนียมศาลหรือหากผู้ร้องไม่ได้รับยกเว้นค่าธรรมเนียมศาลจะได้รับความเดือดร้อนเกินสมควรเมื่อพิจารณาถึงสถานะของผู้ร้อง และในกรณีผู้ร้องเป็นโจทก์หรือผู้อุทธรณ์หรือฎีกา การฟ้องร้องหรืออุทธรณ์หรือฎีกานั้นมีเหตุผลอันสมควรด้วย เมื่อคู่ความคนใดได้รับยกเว้นค่าธรรมเนียมศาลในการฟ้องหรือต่อสู้คดีในศาลชั้นต้นแล้วยื่นคำร้องเช่นว่านั้นในชั้นอุทธรณ์หรือฎีกา แล้วแต่กรณี อีก ให้ถือว่าคู่ความนั้นยังคงไม่มีทรัพย์สินพอจะเสียค่าธรรมเนียมศาลหรือหากไม่ได้รับยกเว้นค่าธรรมเนียมศาลแล้วจะได้รับความเดือดร้อนเกินสมควรอยู่ เว้นแต่จะปรากฏต่อศาลเป็นอย่างอื่น ในกรณีที่ศาลมีคำสั่งอนุญาตให้ยกเว้นค่าธรรมเนียมศาลให้แต่เฉพาะบางส่วน หรือมีคำสั่งให้ยกคำร้อง ผู้ขออาจอุทธรณ์คำสั่งนั้นต่อศาลได้ภายในกำหนดเจ็ดวันนับแต่วันมีคำสั่ง คำสั่งของศาลอุทธรณ์เช่นว่านี้ให้เป็นที่สุด"},{"id":"๑๕๗","num":"มาตรา ๑๕๗","num_ara":"๑๕๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["เมื่อศาลอนุญาตให้บุคคลใดได้รับยกเว้นค่าธรรมเนียมศาลในศาลใด บุคคลนั้นไม่ต้องเสียค่าธรรมเนียมศาลในการดำเนินกระบวนพิจารณาในศาลนั้น ค่าธรรมเนียมเช่นว่านี้ให้รวมถึงเงินวางศาลในการยื่นฟ้องอุทธรณ์หรือฎีกา ถ้าเป็นกรณีที่ศาลอนุญาตในระหว่างการพิจารณา การยกเว้นไม่ต้องเสียค่าธรรมเนียมศาลนั้นให้ใช้บังคับแต่เฉพาะค่าธรรมเนียมศาลและเงินวางศาลที่จะต้องเสียหรือวางภายหลังคำสั่งอนุญาตเท่านั้น ส่วนค่าธรรมเนียมศาลหรือเงินวางศาลที่เสียหรือวางไว้ก่อนคำสั่งเช่นว่านั้นเป็นอันไม่ต้องคืน"],"text":"เมื่อศาลอนุญาตให้บุคคลใดได้รับยกเว้นค่าธรรมเนียมศาลในศาลใด บุคคลนั้นไม่ต้องเสียค่าธรรมเนียมศาลในการดำเนินกระบวนพิจารณาในศาลนั้น ค่าธรรมเนียมเช่นว่านี้ให้รวมถึงเงินวางศาลในการยื่นฟ้องอุทธรณ์หรือฎีกา ถ้าเป็นกรณีที่ศาลอนุญาตในระหว่างการพิจารณา การยกเว้นไม่ต้องเสียค่าธรรมเนียมศาลนั้นให้ใช้บังคับแต่เฉพาะค่าธรรมเนียมศาลและเงินวางศาลที่จะต้องเสียหรือวางภายหลังคำสั่งอนุญาตเท่านั้น ส่วนค่าธรรมเนียมศาลหรือเงินวางศาลที่เสียหรือวางไว้ก่อนคำสั่งเช่นว่านั้นเป็นอันไม่ต้องคืน"},{"id":"๑๕๘","num":"มาตรา ๑๕๘","num_ara":"๑๕๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["ถ้าศาลเห็นว่าคู่ความอีกฝ่ายหนึ่งจะต้องเป็นผู้รับผิดเสียค่าฤชาธรรมเนียมทั้งหมดหรือแต่บางส่วนของคู่ความทั้งสองฝ่าย ให้ศาลพิพากษาในเรื่องค่าฤชาธรรมเนียม โดยสั่งให้คู่ความอีกฝ่ายหนึ่งนั้นชำระต่อศาลในนามของผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาลซึ่งค่าธรรมเนียมศาลที่ผู้นั้นได้รับยกเว้นทั้งหมดหรือแต่บางส่วนตามที่ศาลเห็นสมควร"],"text":"ถ้าศาลเห็นว่าคู่ความอีกฝ่ายหนึ่งจะต้องเป็นผู้รับผิดเสียค่าฤชาธรรมเนียมทั้งหมดหรือแต่บางส่วนของคู่ความทั้งสองฝ่าย ให้ศาลพิพากษาในเรื่องค่าฤชาธรรมเนียม โดยสั่งให้คู่ความอีกฝ่ายหนึ่งนั้นชำระต่อศาลในนามของผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาลซึ่งค่าธรรมเนียมศาลที่ผู้นั้นได้รับยกเว้นทั้งหมดหรือแต่บางส่วนตามที่ศาลเห็นสมควร"},{"id":"๑๕๙","num":"มาตรา ๑๕๙","num_ara":"๑๕๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["ถ้าปรากฏต่อศาลว่าผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาลนั้นสามารถเสียค่าธรรมเนียมศาลได้ตั้งแต่เวลาที่ยื่นคำร้องตามมาตรา ๑๕๖ หรือในภายหลังก่อนศาลวินิจฉัยชี้ขาดคดี ให้ศาลมีคำสั่งให้บุคคลนั้นชำระค่าธรรมเนียมศาลที่ได้รับยกเว้นต่อศาลภายในระยะเวลาที่ศาลเห็นสมควรกำหนดก็ได้ หากไม่ปฏิบัติตาม ให้ศาลมีคำสั่งยึดหรืออายัดทรัพย์สินของผู้ได้รับยกเว้นค่าธรรมเนียมศาลนั้นทั้งหมดหรือแต่บางส่วนไว้รอคำวินิจฉัยชี้ขาดในเรื่องค่าฤชาธรรมเนียม ในกรณีตามวรรคหนึ่ง ถ้าศาลเห็นว่า","(๑) ค่าฤชาธรรมเนียมจะเป็นพับแก่คู่ความทั้งสองฝ่าย ให้ศาลมีคำสั่งให้เอาชำระค่าธรรมเนียมศาลที่ผู้นั้นได้รับยกเว้น จากทรัพย์สินที่ยึดหรืออายัดดังที่กล่าวไว้ในวรรคหนึ่งตามจำนวนที่ศาลเห็นสมควร (๒) คู่ความอีกฝ่ายหนึ่งจะต้องชำระค่าฤชาธรรมเนียมทั้งหมดหรือแต่บางส่วนแทนผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาล ให้ศาลมีคำสั่งให้คู่ความอีกฝ่ายหนึ่งนั้นชำระค่าธรรมเนียมศาลต่อศาลในนามของผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาล แต่ถ้าคู่ความอีกฝ่ายหนึ่งนั้นไม่ปฏิบัติตามคำสั่ง ให้ศาลเอาชำระค่าธรรมเนียมศาลนั้นจากทรัพย์สินที่ยึดหรืออายัดดังที่กล่าวไว้ในวรรคหนึ่งตามจำนวนที่ศาลเห็นสมควร หรือ (๓) ผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาลจะต้องชำระค่าฤชาธรรมเนียมทั้งหมดหรือแต่บางส่วนแทนคู่ความอีกฝ่ายหนึ่ง ให้ศาลมีคำสั่งให้เอาชำระค่าฤชาธรรมเนียมนั้นจากทรัพย์สินที่ยึดหรืออายัดดังที่กล่าวไว้ในวรรคหนึ่ง ส่วนค่าธรรมเนียมศาลที่ผู้นั้นได้รับยกเว้น ให้เอาชำระจากทรัพย์สินที่เหลือ ถ้าหากมี ตามจำนวนที่ศาลเห็นสมควร"],"text":"ถ้าปรากฏต่อศาลว่าผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาลนั้นสามารถเสียค่าธรรมเนียมศาลได้ตั้งแต่เวลาที่ยื่นคำร้องตามมาตรา ๑๕๖ หรือในภายหลังก่อนศาลวินิจฉัยชี้ขาดคดี ให้ศาลมีคำสั่งให้บุคคลนั้นชำระค่าธรรมเนียมศาลที่ได้รับยกเว้นต่อศาลภายในระยะเวลาที่ศาลเห็นสมควรกำหนดก็ได้ หากไม่ปฏิบัติตาม ให้ศาลมีคำสั่งยึดหรืออายัดทรัพย์สินของผู้ได้รับยกเว้นค่าธรรมเนียมศาลนั้นทั้งหมดหรือแต่บางส่วนไว้รอคำวินิจฉัยชี้ขาดในเรื่องค่าฤชาธรรมเนียม ในกรณีตามวรรคหนึ่ง ถ้าศาลเห็นว่า\n\n(๑) ค่าฤชาธรรมเนียมจะเป็นพับแก่คู่ความทั้งสองฝ่าย ให้ศาลมีคำสั่งให้เอาชำระค่าธรรมเนียมศาลที่ผู้นั้นได้รับยกเว้น จากทรัพย์สินที่ยึดหรืออายัดดังที่กล่าวไว้ในวรรคหนึ่งตามจำนวนที่ศาลเห็นสมควร (๒) คู่ความอีกฝ่ายหนึ่งจะต้องชำระค่าฤชาธรรมเนียมทั้งหมดหรือแต่บางส่วนแทนผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาล ให้ศาลมีคำสั่งให้คู่ความอีกฝ่ายหนึ่งนั้นชำระค่าธรรมเนียมศาลต่อศาลในนามของผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาล แต่ถ้าคู่ความอีกฝ่ายหนึ่งนั้นไม่ปฏิบัติตามคำสั่ง ให้ศาลเอาชำระค่าธรรมเนียมศาลนั้นจากทรัพย์สินที่ยึดหรืออายัดดังที่กล่าวไว้ในวรรคหนึ่งตามจำนวนที่ศาลเห็นสมควร หรือ (๓) ผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาลจะต้องชำระค่าฤชาธรรมเนียมทั้งหมดหรือแต่บางส่วนแทนคู่ความอีกฝ่ายหนึ่ง ให้ศาลมีคำสั่งให้เอาชำระค่าฤชาธรรมเนียมนั้นจากทรัพย์สินที่ยึดหรืออายัดดังที่กล่าวไว้ในวรรคหนึ่ง ส่วนค่าธรรมเนียมศาลที่ผู้นั้นได้รับยกเว้น ให้เอาชำระจากทรัพย์สินที่เหลือ ถ้าหากมี ตามจำนวนที่ศาลเห็นสมควร"},{"id":"๑๖๐","num":"มาตรา ๑๖๐","num_ara":"๑๖๐","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๑ การกำหนดและการชำระค่าฤชาธรรมเนียม และการยกเว้นค่าธรรมเนียมศาล","paragraphs":["ถ้าผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาลประพฤติตนไม่เรียบร้อย เช่น ดำเนินกระบวนพิจารณาในทางก่อความรำคาญถึงขนาด หรือกระทำความผิดฐานละเมิดอำนาจศาลหรือจงใจประวิงความเรื่องนั้น ศาลจะถอนการอนุญาตเสียในเวลาใด ๆ ก็ได้ และบุคคลเช่นว่านั้นจำต้องรับผิดเสียค่าฤชาธรรมเนียมสำหรับกระบวนพิจารณาภายหลังที่ศาลได้ถอนการอนุญาตนั้นแล้ว"],"text":"ถ้าผู้ที่ได้รับยกเว้นค่าธรรมเนียมศาลประพฤติตนไม่เรียบร้อย เช่น ดำเนินกระบวนพิจารณาในทางก่อความรำคาญถึงขนาด หรือกระทำความผิดฐานละเมิดอำนาจศาลหรือจงใจประวิงความเรื่องนั้น ศาลจะถอนการอนุญาตเสียในเวลาใด ๆ ก็ได้ และบุคคลเช่นว่านั้นจำต้องรับผิดเสียค่าฤชาธรรมเนียมสำหรับกระบวนพิจารณาภายหลังที่ศาลได้ถอนการอนุญาตนั้นแล้ว"},{"id":"๑๖๑","num":"มาตรา ๑๖๑","num_ara":"๑๖๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","paragraphs":["ภายใต้บังคับบทบัญญัติห้ามาตราต่อไปนี้ ให้คู่ความฝ่ายที่แพ้คดีเป็นผู้รับผิดในชั้นที่สุดสำหรับค่าฤชาธรรมเนียมทั้งปวง แต่ไม่ว่าคู่ความฝ่ายใดจะชนะคดีเต็มตามข้อหาหรือแต่บางส่วน ศาลมีอำนาจที่จะพิพากษาให้คู่ความฝ่ายที่ชนะคดีนั้นรับผิดในค่าฤชาธรรมเนียมทั้งปวง หรือให้คู่ความแต่ละฝ่ายรับผิดในค่าฤชาธรรมเนียมส่วนของตนหรือตามส่วนแห่งค่าฤชาธรรมเนียมซึ่งคู่ความทุกฝ่ายได้เสียไปก่อนได้ตามที่ศาลจะใช้ดุลพินิจ โดยคำนึงถึงเหตุสมควรและความสุจริตในการดำเนินคดี คดีที่ไม่มีข้อพิพาทให้ฝ่ายเริ่มคดีเป็นผู้เสียค่าฤชาธรรมเนียม"],"text":"ภายใต้บังคับบทบัญญัติห้ามาตราต่อไปนี้ ให้คู่ความฝ่ายที่แพ้คดีเป็นผู้รับผิดในชั้นที่สุดสำหรับค่าฤชาธรรมเนียมทั้งปวง แต่ไม่ว่าคู่ความฝ่ายใดจะชนะคดีเต็มตามข้อหาหรือแต่บางส่วน ศาลมีอำนาจที่จะพิพากษาให้คู่ความฝ่ายที่ชนะคดีนั้นรับผิดในค่าฤชาธรรมเนียมทั้งปวง หรือให้คู่ความแต่ละฝ่ายรับผิดในค่าฤชาธรรมเนียมส่วนของตนหรือตามส่วนแห่งค่าฤชาธรรมเนียมซึ่งคู่ความทุกฝ่ายได้เสียไปก่อนได้ตามที่ศาลจะใช้ดุลพินิจ โดยคำนึงถึงเหตุสมควรและความสุจริตในการดำเนินคดี คดีที่ไม่มีข้อพิพาทให้ฝ่ายเริ่มคดีเป็นผู้เสียค่าฤชาธรรมเนียม"},{"id":"๑๖๒","num":"มาตรา ๑๖๒","num_ara":"๑๖๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","paragraphs":["บุคคลที่เป็นโจทก์ร่วมกันหรือจำเลยร่วมกันนั้น หาต้องรับผิดร่วมกันในค่าฤชาธรรมเนียมไม่ หากต้องรับผิดเป็นส่วนเท่า ๆ กัน เว้นแต่จะได้เป็นเจ้าหนี้ร่วมหรือลูกหนี้ร่วม หรือศาลได้มีคำสั่งเป็นอย่างอื่น"],"text":"บุคคลที่เป็นโจทก์ร่วมกันหรือจำเลยร่วมกันนั้น หาต้องรับผิดร่วมกันในค่าฤชาธรรมเนียมไม่ หากต้องรับผิดเป็นส่วนเท่า ๆ กัน เว้นแต่จะได้เป็นเจ้าหนี้ร่วมหรือลูกหนี้ร่วม หรือศาลได้มีคำสั่งเป็นอย่างอื่น"},{"id":"๑๖๓","num":"มาตรา ๑๖๓","num_ara":"๑๖๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","paragraphs":["ถ้าคดีได้เสร็จเด็ดขาดลงโดยการตกลงหรือการประนีประนอมยอมความหรืออนุญาโตตุลาการ คู่ความแต่ละฝ่ายย่อมรับผิดในค่าฤชาธรรมเนียมในส่วนการดำเนินกระบวนพิจารณาของตน เว้นแต่คู่ความจะได้ตกลงกันไว้เป็นอย่างอื่น"],"text":"ถ้าคดีได้เสร็จเด็ดขาดลงโดยการตกลงหรือการประนีประนอมยอมความหรืออนุญาโตตุลาการ คู่ความแต่ละฝ่ายย่อมรับผิดในค่าฤชาธรรมเนียมในส่วนการดำเนินกระบวนพิจารณาของตน เว้นแต่คู่ความจะได้ตกลงกันไว้เป็นอย่างอื่น"},{"id":"๑๖๔","num":"มาตรา ๑๖๔","num_ara":"๑๖๔","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","paragraphs":["ในกรณีที่วางเงินต่อศาลตามมาตรา ๑๓๕, ๑๓๖ นั้น จำเลยไม่ต้องรับผิดในค่าฤชาธรรมเนียมแห่งจำนวนเงินที่วางนั้นอันเกิดขึ้นภายหลัง ถ้าโจทย์ยอมรับเงินที่วางต่อศาลเป็นการพอใจเต็มตามที่เรียกร้องแล้ว จำเลยต้องเป็นผู้รับผิดในค่าฤชาธรรมเนียม ถ้าโจทย์ยอมรับเงินที่วางต่อศาลนั้นเป็นการพอใจเพียงส่วนหนึ่งแห่งจำนวนเงินที่เรียกร้อง และดำเนินคดีต่อไป จำเลยต้องรับผิดในค่าฤชาธรรมเนียม เว้นแต่ศาลจะได้พิพากษาให้โจทก์แพ้คดี ในกรณีเช่นนี้โจทก์ต้องเป็นผู้รับผิดในค่าฤชาธรรมเนียมทั้งสิ้นอันเกิดแต่การที่ตนไม่ยอมรับเงินที่วางต่อศาลเป็นการพอใจตามที่เรียกร้อง"],"text":"ในกรณีที่วางเงินต่อศาลตามมาตรา ๑๓๕, ๑๓๖ นั้น จำเลยไม่ต้องรับผิดในค่าฤชาธรรมเนียมแห่งจำนวนเงินที่วางนั้นอันเกิดขึ้นภายหลัง ถ้าโจทย์ยอมรับเงินที่วางต่อศาลเป็นการพอใจเต็มตามที่เรียกร้องแล้ว จำเลยต้องเป็นผู้รับผิดในค่าฤชาธรรมเนียม ถ้าโจทย์ยอมรับเงินที่วางต่อศาลนั้นเป็นการพอใจเพียงส่วนหนึ่งแห่งจำนวนเงินที่เรียกร้อง และดำเนินคดีต่อไป จำเลยต้องรับผิดในค่าฤชาธรรมเนียม เว้นแต่ศาลจะได้พิพากษาให้โจทก์แพ้คดี ในกรณีเช่นนี้โจทก์ต้องเป็นผู้รับผิดในค่าฤชาธรรมเนียมทั้งสิ้นอันเกิดแต่การที่ตนไม่ยอมรับเงินที่วางต่อศาลเป็นการพอใจตามที่เรียกร้อง"},{"id":"๑๖๕","num":"มาตรา ๑๖๕","num_ara":"๑๖๕","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","paragraphs":["ในกรณีที่มีการชำระหนี้ ดังบัญญัติไว้ในมาตรา ๑๓๗ ถ้าโจทก์ยอมรับการชำระหนี้นั้นเป็นการพอใจเต็มตามที่เรียกร้องแล้ว จำเลยต้องเป็นผู้รับผิดในค่าฤชาธรรมเนียม เว้นแต่ศาลจะเห็นสมควรมีคำสั่งเป็นอย่างอื่น ถ้าโจทก์ไม่พอใจในการชำระหนี้เช่นว่านั้น และดำเนินคดีต่อไป ค่าฤชาธรรมเนียมให้อยู่ในดุลพินิจของศาล แต่ถ้าศาลเห็นว่าการชำระหนี้นั้นเป็นการพอใจเต็มตามที่โจทก์เรียกร้องแล้ว ค่าฤชาธรรมเนียมทั้งสิ้นอันเกิดแต่การที่โจทก์ปฏิเสธไม่ยอมรับชำระหนี้นั้น โจทก์ต้องเป็นผู้รับผิด"],"text":"ในกรณีที่มีการชำระหนี้ ดังบัญญัติไว้ในมาตรา ๑๓๗ ถ้าโจทก์ยอมรับการชำระหนี้นั้นเป็นการพอใจเต็มตามที่เรียกร้องแล้ว จำเลยต้องเป็นผู้รับผิดในค่าฤชาธรรมเนียม เว้นแต่ศาลจะเห็นสมควรมีคำสั่งเป็นอย่างอื่น ถ้าโจทก์ไม่พอใจในการชำระหนี้เช่นว่านั้น และดำเนินคดีต่อไป ค่าฤชาธรรมเนียมให้อยู่ในดุลพินิจของศาล แต่ถ้าศาลเห็นว่าการชำระหนี้นั้นเป็นการพอใจเต็มตามที่โจทก์เรียกร้องแล้ว ค่าฤชาธรรมเนียมทั้งสิ้นอันเกิดแต่การที่โจทก์ปฏิเสธไม่ยอมรับชำระหนี้นั้น โจทก์ต้องเป็นผู้รับผิด"},{"id":"๑๖๖","num":"มาตรา ๑๖๖","num_ara":"๑๖๖","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","paragraphs":["คู่ความฝ่ายใดทำให้ต้องเสียค่าฤชาธรรมเนียมในกระบวนพิจารณาใด ๆ ที่ได้ดำเนินไปโดยไม่จำเป็น หรือมีลักษณะประวิงคดี หรือที่ต้องดำเนินไปเพราะความผิดหรือความประมาทเลินเล่ออย่างร้ายแรง คู่ความฝ่ายนั้นต้องรับผิดในค่าฤชาธรรมเนียมนั้น โดยมิพักคำนึงว่าคู่ความฝ่ายนั้นจักได้ชนะคดีหรือไม่"],"text":"คู่ความฝ่ายใดทำให้ต้องเสียค่าฤชาธรรมเนียมในกระบวนพิจารณาใด ๆ ที่ได้ดำเนินไปโดยไม่จำเป็น หรือมีลักษณะประวิงคดี หรือที่ต้องดำเนินไปเพราะความผิดหรือความประมาทเลินเล่ออย่างร้ายแรง คู่ความฝ่ายนั้นต้องรับผิดในค่าฤชาธรรมเนียมนั้น โดยมิพักคำนึงว่าคู่ความฝ่ายนั้นจักได้ชนะคดีหรือไม่"},{"id":"๑๖๗","num":"มาตรา ๑๖๗","num_ara":"๑๖๗","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","paragraphs":["คำสั่งในเรื่องค่าฤชาธรรมเนียมนั้น ไม่ว่าคู่ความทั้งปวงหรือแต่ฝ่ายใดฝ่ายหนึ่ง จักมีคำขอหรือไม่ก็ดี ให้ศาลสั่งลงไว้ในคำพิพากษาหรือคำสั่งชี้ขาดหรือในคำสั่งจำหน่ายคดีออกจากสารบบความแล้วแต่กรณี แต่ถ้าเพื่อชี้ขาดตัดสินคดีใด ศาลได้มีคำสั่งอย่างใดในระหว่างการพิจารณา ศาลจะมีคำสั่งเรื่องค่าฤชาธรรมเนียมสำหรับกระบวนพิจารณาที่เสร็จไปในคำสั่งฉบับนั้น หรือในคำพิพากษาหรือคำสั่งชี้ขาดคดีก็ได้แล้วแต่จะเลือก ในกรณีที่มีข้อพิพาทในเรื่องที่ไม่เป็นประเด็นในคดี ให้ศาลมีคำสั่งในเรื่องค่าฤชาธรรมเนียมสำหรับข้อพิพาทเช่นว่านี้ในคำสั่งชี้ขาดข้อพิพาทนั้น ในกรณีที่มีการพิจารณาใหม่ ให้ศาลมีอำนาจที่จะสั่งเรื่องค่าฤชาธรรมเนียมสำหรับการพิจารณาครั้งแรก และการพิจารณาใหม่ในคำพิพากษาหรือคำสั่งได้"],"text":"คำสั่งในเรื่องค่าฤชาธรรมเนียมนั้น ไม่ว่าคู่ความทั้งปวงหรือแต่ฝ่ายใดฝ่ายหนึ่ง จักมีคำขอหรือไม่ก็ดี ให้ศาลสั่งลงไว้ในคำพิพากษาหรือคำสั่งชี้ขาดหรือในคำสั่งจำหน่ายคดีออกจากสารบบความแล้วแต่กรณี แต่ถ้าเพื่อชี้ขาดตัดสินคดีใด ศาลได้มีคำสั่งอย่างใดในระหว่างการพิจารณา ศาลจะมีคำสั่งเรื่องค่าฤชาธรรมเนียมสำหรับกระบวนพิจารณาที่เสร็จไปในคำสั่งฉบับนั้น หรือในคำพิพากษาหรือคำสั่งชี้ขาดคดีก็ได้แล้วแต่จะเลือก ในกรณีที่มีข้อพิพาทในเรื่องที่ไม่เป็นประเด็นในคดี ให้ศาลมีคำสั่งในเรื่องค่าฤชาธรรมเนียมสำหรับข้อพิพาทเช่นว่านี้ในคำสั่งชี้ขาดข้อพิพาทนั้น ในกรณีที่มีการพิจารณาใหม่ ให้ศาลมีอำนาจที่จะสั่งเรื่องค่าฤชาธรรมเนียมสำหรับการพิจารณาครั้งแรก และการพิจารณาใหม่ในคำพิพากษาหรือคำสั่งได้"},{"id":"๑๖๘","num":"มาตรา ๑๖๘","num_ara":"๑๖๘","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","paragraphs":["ในกรณีที่คู่ความอาจอุทธรณ์ หรือฎีกาคำพิพากษาหรือคำสั่งของศาลได้นั้น ห้ามมิให้คู่ความอุทธรณ์หรือฎีกาในปัญหาเรื่องค่าฤชาธรรมเนียมแต่อย่างเดียว เว้นแต่อุทธรณ์หรือฎีกานั้นจะได้ยกเหตุว่า ค่าฤชาธรรมเนียมนั้นมิได้กำหนดหรือคำนวณให้ถูกต้องตามกฎหมาย"],"text":"ในกรณีที่คู่ความอาจอุทธรณ์ หรือฎีกาคำพิพากษาหรือคำสั่งของศาลได้นั้น ห้ามมิให้คู่ความอุทธรณ์หรือฎีกาในปัญหาเรื่องค่าฤชาธรรมเนียมแต่อย่างเดียว เว้นแต่อุทธรณ์หรือฎีกานั้นจะได้ยกเหตุว่า ค่าฤชาธรรมเนียมนั้นมิได้กำหนดหรือคำนวณให้ถูกต้องตามกฎหมาย"},{"id":"๑๖๙","num":"มาตรา ๑๖๙","num_ara":"๑๖๙","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","paragraphs":["เมื่อมีคำวินิจฉัยชี้ขาดในเรื่องค่าฤชาธรรมเนียมแล้ว ให้หัวหน้าสำนักงานประจำศาลยุติธรรมชั้นต้นทำบัญชีแสดงค่าฤชาธรรมเนียมที่คู่ความทุกฝ่ายได้เสียไปโดยลำดับและจำนวนที่คู่ความฝ่ายใดฝ่ายหนึ่งหรือทั้งสองฝ่ายจะต้องรับผิดตามคำวินิจฉัยชี้ขาดของศาล คู่ความหรือบุคคลที่เกี่ยวข้องอาจขอสำเนาบัญชีเช่นว่านั้นได้"],"text":"เมื่อมีคำวินิจฉัยชี้ขาดในเรื่องค่าฤชาธรรมเนียมแล้ว ให้หัวหน้าสำนักงานประจำศาลยุติธรรมชั้นต้นทำบัญชีแสดงค่าฤชาธรรมเนียมที่คู่ความทุกฝ่ายได้เสียไปโดยลำดับและจำนวนที่คู่ความฝ่ายใดฝ่ายหนึ่งหรือทั้งสองฝ่ายจะต้องรับผิดตามคำวินิจฉัยชี้ขาดของศาล คู่ความหรือบุคคลที่เกี่ยวข้องอาจขอสำเนาบัญชีเช่นว่านั้นได้"},{"id":"๑๖๙_๑","num":"มาตรา ๑๖๙/๑","num_ara":"๑๖๙/๑","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","paragraphs":["ถ้าบุคคลซึ่งต้องชำระค่าฤชาธรรมเนียมค้างชำระค่าฤชาธรรมเนียมต่อศาลก็ดี หรือต่อเจ้าพนักงานบังคับคดีก็ดี หรือต่อบุคคลอื่นที่มิใช่เจ้าหนี้ตามคำพิพากษาก็ดี ศาล เจ้าพนักงานบังคับคดี หรือบุคคลเช่นว่านั้นอาจบังคับเอาแก่ทรัพย์สินของบุคคลนั้นเสมือนหนึ่งเป็นลูกหนี้ตามคำพิพากษาเพื่อชำระค่าฤชาธรรมเนียมดังกล่าวได้ ในกรณีเช่นนี้ ให้ถือว่าหัวหน้าสำนักงานประจำศาลยุติธรรมชั้นต้น เจ้าพนักงานบังคับคดี หรือบุคคลที่มีสิทธิได้รับค่าฤชาธรรมเนียมนั้น แล้วแต่กรณี เป็นเจ้าหนี้ตามคำพิพากษา การบังคับคดีตามวรรคหนึ่ง ให้ได้รับยกเว้นค่าฤชาธรรมเนียมในการบังคับคดีทั้งปวง แต่หากยังมีเงินที่ได้จากการบังคับคดีคงเหลือภายหลังชำระให้แก่ผู้มีสิทธิได้รับ ให้หักค่าฤชาธรรมเนียมที่ได้รับยกเว้นดังกล่าวไว้จากเงินนั้น"],"text":"ถ้าบุคคลซึ่งต้องชำระค่าฤชาธรรมเนียมค้างชำระค่าฤชาธรรมเนียมต่อศาลก็ดี หรือต่อเจ้าพนักงานบังคับคดีก็ดี หรือต่อบุคคลอื่นที่มิใช่เจ้าหนี้ตามคำพิพากษาก็ดี ศาล เจ้าพนักงานบังคับคดี หรือบุคคลเช่นว่านั้นอาจบังคับเอาแก่ทรัพย์สินของบุคคลนั้นเสมือนหนึ่งเป็นลูกหนี้ตามคำพิพากษาเพื่อชำระค่าฤชาธรรมเนียมดังกล่าวได้ ในกรณีเช่นนี้ ให้ถือว่าหัวหน้าสำนักงานประจำศาลยุติธรรมชั้นต้น เจ้าพนักงานบังคับคดี หรือบุคคลที่มีสิทธิได้รับค่าฤชาธรรมเนียมนั้น แล้วแต่กรณี เป็นเจ้าหนี้ตามคำพิพากษา การบังคับคดีตามวรรคหนึ่ง ให้ได้รับยกเว้นค่าฤชาธรรมเนียมในการบังคับคดีทั้งปวง แต่หากยังมีเงินที่ได้จากการบังคับคดีคงเหลือภายหลังชำระให้แก่ผู้มีสิทธิได้รับ ให้หักค่าฤชาธรรมเนียมที่ได้รับยกเว้นดังกล่าวไว้จากเงินนั้น"},{"id":"๑๖๙_๒","num":"มาตรา ๑๖๙/๒","num_ara":"๑๖๙/๒","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","paragraphs":["ภายใต้บังคับแห่งบทบัญญัติมาตรา ๑๖๙/๓ ให้ลูกหนี้ตามคำพิพากษาเป็นผู้รับผิดในค่าฤชาธรรมเนียมในการบังคับคดี โดยให้หักออกจากเงินที่ได้จากการยึด อายัด ขาย หรือจำหน่ายทรัพย์สินของลูกหนี้ตามคำพิพากษาหรือจากเงินที่ลูกหนี้ตามคำพิพากษาได้วางไว้ ในกรณีที่มีการบังคับคดีแก่ผู้ประกันในศาล ค่าฤชาธรรมเนียมในการบังคับคดีในส่วนนั้นให้หักออกจากเงินที่ได้จากการบังคับคดีตามสัญญาประกัน ในกรณีที่มีการบังคับคดีตามคำพิพากษาให้แบ่งกรรมสิทธิ์รวมหรือมรดกให้เจ้าของรวมหรือทายาทผู้ได้รับส่วนแบ่งทุกคนเป็นผู้รับผิดในค่าฤชาธรรมเนียมในการบังคับคดีโดยให้หักออกจากเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินอันเป็นกรรมสิทธิ์รวมหรือทรัพย์มรดกนั้น ในกรณีที่มีการถอนการบังคับคดีนอกจากกรณีตามมาตรา ๒๙๒ (๑) และ (๕) ให้เจ้าหนี้ตามคำพิพากษาผู้ขอยึดหรืออายัดทรัพย์สินเป็นผู้รับผิดในค่าฤชาธรรมเนียมในการบังคับคดี"],"text":"ภายใต้บังคับแห่งบทบัญญัติมาตรา ๑๖๙/๓ ให้ลูกหนี้ตามคำพิพากษาเป็นผู้รับผิดในค่าฤชาธรรมเนียมในการบังคับคดี โดยให้หักออกจากเงินที่ได้จากการยึด อายัด ขาย หรือจำหน่ายทรัพย์สินของลูกหนี้ตามคำพิพากษาหรือจากเงินที่ลูกหนี้ตามคำพิพากษาได้วางไว้ ในกรณีที่มีการบังคับคดีแก่ผู้ประกันในศาล ค่าฤชาธรรมเนียมในการบังคับคดีในส่วนนั้นให้หักออกจากเงินที่ได้จากการบังคับคดีตามสัญญาประกัน ในกรณีที่มีการบังคับคดีตามคำพิพากษาให้แบ่งกรรมสิทธิ์รวมหรือมรดกให้เจ้าของรวมหรือทายาทผู้ได้รับส่วนแบ่งทุกคนเป็นผู้รับผิดในค่าฤชาธรรมเนียมในการบังคับคดีโดยให้หักออกจากเงินที่ได้จากการขายหรือจำหน่ายทรัพย์สินอันเป็นกรรมสิทธิ์รวมหรือทรัพย์มรดกนั้น ในกรณีที่มีการถอนการบังคับคดีนอกจากกรณีตามมาตรา ๒๙๒ (๑) และ (๕) ให้เจ้าหนี้ตามคำพิพากษาผู้ขอยึดหรืออายัดทรัพย์สินเป็นผู้รับผิดในค่าฤชาธรรมเนียมในการบังคับคดี"},{"id":"๑๖๙_๓","num":"มาตรา ๑๖๙/๓","num_ara":"๑๖๙/๓","part":"ภาค ๑ บททั่วไป","chapter":"ลักษณะ ๖ คำพิพากษาและคำสั่ง","section":"หมวด ๓ ค่าฤชาธรรมเนียม","subsection":"ส่วนที่ ๒ ความรับผิดชั้นที่สุดในค่าฤชาธรรมเนียม","par
