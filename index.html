ั่งชี้ขาดตัดสินคดีนั้นเป็นต้นไป เพื่อประโยชน์แห่งมาตรานี้ ไม่ว่าศาลจะได้มีคำสั่งให้รับคำฟ้องไว้แล้วหรือไม่ ให้ถือว่าคำสั่งอย่างใดอย่างหนึ่งของศาลนับตั้งแต่มีการยื่นคำฟ้องต่อศาลนอกจากที่ระบุไว้ในมาตรา ๒๒๗ และ ๒๒๘ เป็นคำสั่งระหว่างพิจารณา"},{"id":"๒๒๗","num":"มาตรา ๒๒๗","num_ara":"๒๒๗","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["คำสั่งของศาลชั้นต้นที่ไม่รับหรือให้คืนคำคู่ความตามมาตรา ๑๘ หรือคำสั่งวินิจฉัยชี้ขาดเบื้องต้นตามมาตรา ๒๔ ซึ่งทำให้คดีเสร็จไปทั้งเรื่องนั้น มิให้ถือว่าเป็นคำสั่งในระหว่างพิจารณา และให้อยู่ภายในข้อบังคับของการอุทธรณ์คำพิพากษาหรือคำสั่งชี้ขาดตัดสินคดี"],"text":"คำสั่งของศาลชั้นต้นที่ไม่รับหรือให้คืนคำคู่ความตามมาตรา ๑๘ หรือคำสั่งวินิจฉัยชี้ขาดเบื้องต้นตามมาตรา ๒๔ ซึ่งทำให้คดีเสร็จไปทั้งเรื่องนั้น มิให้ถือว่าเป็นคำสั่งในระหว่างพิจารณา และให้อยู่ภายในข้อบังคับของการอุทธรณ์คำพิพากษาหรือคำสั่งชี้ขาดตัดสินคดี"},{"id":"๒๒๘","num":"มาตรา ๒๒๘","num_ara":"๒๒๘","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ก่อนศาลชี้ขาดตัดสินคดี ถ้าศาลมีคำสั่งอย่างใดอย่างหนึ่งดังต่อไปนี้ คือ","(๑) ให้กักขัง หรือปรับไหม หรือจำขัง ผู้ใด ตามประมวลกฎหมายนี้ (๒) มีคำสั่งอันเกี่ยวด้วยคำขอเพื่อคุ้มครองประโยชน์ของคู่ความในระหว่างการพิจารณา หรือมีคำสั่งอันเกี่ยวด้วยคำขอเพื่อจะบังคับคดีตามคำพิพากษาต่อไป หรือ (๓) ไม่รับหรือคืนคำคู่ความตามมาตรา ๑๘ หรือวินิจฉัยชี้ขาดเบื้องต้นตามมาตรา ๒๔ ซึ่งมิได้ทำให้คดีเสร็จไปทั้งเรื่อง หากเสร็จไปเฉพาะแต่ประเด็นบางข้อ คำสั่งเช่นว่านี้ คู่ความย่อมอุทธรณ์ได้ภายในกำหนดหนึ่งเดือน นับแต่วันมีคำสั่งเป็นต้นไป แม้ถึงว่าจะมีอุทธรณ์ในระหว่างพิจารณา ให้ศาลดำเนินคดีต่อไป และมีคำพิพากษาหรือคำสั่งชี้ขาดตัดสินคดีนั้น แต่ถ้าในระหว่างพิจารณา คู่ความอุทธรณ์คำสั่งชนิดที่ระบุไว้ในอนุมาตรา (๓) ถ้าศาลอุทธรณ์เห็นว่า การกลับหรือแก้ไขคำสั่งที่คู่ความอุทธรณ์นั้น จะเป็นการวินิจฉัยชี้ขาดคดี หรือวินิจฉัยชี้ขาดประเด็นข้อใดที่ศาลล่างมิได้วินิจฉัยไว้ ให้ศาลอุทธรณ์มีอำนาจทำคำสั่งให้ศาลล่างงดการพิจารณาไว้ในระหว่างอุทธรณ์ หรืองดการวินิจฉัยคดีไว้จนกว่าศาลอุทธรณ์จะได้วินิจฉัยชี้ขาดอุทธรณ์นั้น ถ้าคู่ความมิได้อุทธรณ์คำสั่งในระหว่างพิจารณาตามที่บัญญัติไว้ในมาตรานี้ ก็ให้อุทธรณ์ได้ในเมื่อศาลพิพากษาคดีแล้วตามความในมาตรา ๒๒๓"],"text":"ก่อนศาลชี้ขาดตัดสินคดี ถ้าศาลมีคำสั่งอย่างใดอย่างหนึ่งดังต่อไปนี้ คือ\n\n(๑) ให้กักขัง หรือปรับไหม หรือจำขัง ผู้ใด ตามประมวลกฎหมายนี้ (๒) มีคำสั่งอันเกี่ยวด้วยคำขอเพื่อคุ้มครองประโยชน์ของคู่ความในระหว่างการพิจารณา หรือมีคำสั่งอันเกี่ยวด้วยคำขอเพื่อจะบังคับคดีตามคำพิพากษาต่อไป หรือ (๓) ไม่รับหรือคืนคำคู่ความตามมาตรา ๑๘ หรือวินิจฉัยชี้ขาดเบื้องต้นตามมาตรา ๒๔ ซึ่งมิได้ทำให้คดีเสร็จไปทั้งเรื่อง หากเสร็จไปเฉพาะแต่ประเด็นบางข้อ คำสั่งเช่นว่านี้ คู่ความย่อมอุทธรณ์ได้ภายในกำหนดหนึ่งเดือน นับแต่วันมีคำสั่งเป็นต้นไป แม้ถึงว่าจะมีอุทธรณ์ในระหว่างพิจารณา ให้ศาลดำเนินคดีต่อไป และมีคำพิพากษาหรือคำสั่งชี้ขาดตัดสินคดีนั้น แต่ถ้าในระหว่างพิจารณา คู่ความอุทธรณ์คำสั่งชนิดที่ระบุไว้ในอนุมาตรา (๓) ถ้าศาลอุทธรณ์เห็นว่า การกลับหรือแก้ไขคำสั่งที่คู่ความอุทธรณ์นั้น จะเป็นการวินิจฉัยชี้ขาดคดี หรือวินิจฉัยชี้ขาดประเด็นข้อใดที่ศาลล่างมิได้วินิจฉัยไว้ ให้ศาลอุทธรณ์มีอำนาจทำคำสั่งให้ศาลล่างงดการพิจารณาไว้ในระหว่างอุทธรณ์ หรืองดการวินิจฉัยคดีไว้จนกว่าศาลอุทธรณ์จะได้วินิจฉัยชี้ขาดอุทธรณ์นั้น ถ้าคู่ความมิได้อุทธรณ์คำสั่งในระหว่างพิจารณาตามที่บัญญัติไว้ในมาตรานี้ ก็ให้อุทธรณ์ได้ในเมื่อศาลพิพากษาคดีแล้วตามความในมาตรา ๒๒๓"},{"id":"๒๒๙","num":"มาตรา ๒๒๙","num_ara":"๒๒๙","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["การอุทธรณ์นั้นให้ทำเป็นหนังสือยื่นต่อศาลชั้นต้นซึ่งมีคำพิพากษาหรือคำสั่งภายในกำหนดหนึ่งเดือนนับแต่วันที่ได้อ่านคำพิพากษาหรือคำสั่งนั้น และผู้อุทธรณ์ต้องนำเงินค่าธรรมเนียมซึ่งจะต้องใช้แก่คู่ความอีกฝ่ายหนึ่งตามคำพิพากษาหรือคำสั่งมาวางศาลพร้อมกับอุทธรณ์นั้นด้วย ให้ผู้อุทธรณ์ยื่นสำเนาอุทธรณ์ต่อศาล เพื่อส่งให้แก่จำเลยอุทธรณ์ (คือฝ่ายโจทก์หรือจำเลยความเดิมซึ่งเป็นฝ่ายที่มิได้อุทธรณ์ความนั้น) ตามที่บัญญัติไว้ในมาตรา ๒๓๕ และ ๒๓๖"],"text":"การอุทธรณ์นั้นให้ทำเป็นหนังสือยื่นต่อศาลชั้นต้นซึ่งมีคำพิพากษาหรือคำสั่งภายในกำหนดหนึ่งเดือนนับแต่วันที่ได้อ่านคำพิพากษาหรือคำสั่งนั้น และผู้อุทธรณ์ต้องนำเงินค่าธรรมเนียมซึ่งจะต้องใช้แก่คู่ความอีกฝ่ายหนึ่งตามคำพิพากษาหรือคำสั่งมาวางศาลพร้อมกับอุทธรณ์นั้นด้วย ให้ผู้อุทธรณ์ยื่นสำเนาอุทธรณ์ต่อศาล เพื่อส่งให้แก่จำเลยอุทธรณ์ (คือฝ่ายโจทก์หรือจำเลยความเดิมซึ่งเป็นฝ่ายที่มิได้อุทธรณ์ความนั้น) ตามที่บัญญัติไว้ในมาตรา ๒๓๕ และ ๒๓๖"},{"id":"๒๓๐","num":"มาตรา ๒๓๐","num_ara":"๒๓๐","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["คดีตามมาตรา ๒๒๔ ถ้าคู่ความอุทธรณ์ในข้อเท็จจริง ให้ศาลชั้นต้นตรวจเสียก่อนว่าฟ้องอุทธรณ์นั้นจะรับไว้พิจารณาได้หรือไม่ ถ้าผู้พิพากษาที่ได้พิจารณาคดีนั้นมีความเห็นแย้ง หรือได้รับรองไว้แล้ว หรือรับรองในเวลาที่ตรวจอุทธรณ์นั้นว่ามีเหตุอันควรอุทธรณ์ในปัญหาข้อเท็จจริงนั้นได้ ก็ให้ศาลมีคำสั่งรับอุทธรณ์นั้นไว้พิจารณาในปัญหาข้อเท็จจริงดังกล่าวแล้ว ถ้าไม่มีความเห็นแย้งหรือคำรับรองเช่นว่านั้น ให้ศาลมีคำสั่งไม่รับอุทธรณ์ในปัญหาข้อเท็จจริงที่กล่าวแล้ว ในกรณีเช่นนี้ ถ้าอธิบดีผู้พิพากษาหรืออธิบดีผู้พิพากษาภาคมิได้เป็นคณะในคำสั่งนั้น ผู้อุทธรณ์ชอบที่จะยื่นคำร้องต่อศาลถึงอธิบดีผู้พิพากษาหรืออธิบดีผู้พิพากษาภาคภายในเจ็ดวัน เมื่อศาลได้รับคำร้องเช่นว่านั้น ให้ศาลส่งคำร้องนั้นพร้อมด้วยสำนวนความไปยังอธิบดีผู้พิพากษาหรืออธิบดีผู้พิพากษาภาคเพื่อมีคำสั่งยืนตามหรือกลับคำสั่งของศาลนั้น คำสั่งของอธิบดีผู้พิพากษา หรืออธิบดีผู้พิพากษาภาค เช่นว่านี้ ให้เป็นที่สุด บทบัญญัติแห่งมาตรานี้ ไม่ห้ามศาลในอันที่จะมีคำสั่งตามมาตรา ๒๓๒ ปฏิเสธไม่ส่งอุทธรณ์ในเหตุอื่น หรือในอันที่ศาลจะมีคำสั่งให้ส่งอุทธรณ์นั้นไปเท่าที่เป็นอุทธรณ์ในข้อกฎหมาย"],"text":"คดีตามมาตรา ๒๒๔ ถ้าคู่ความอุทธรณ์ในข้อเท็จจริง ให้ศาลชั้นต้นตรวจเสียก่อนว่าฟ้องอุทธรณ์นั้นจะรับไว้พิจารณาได้หรือไม่ ถ้าผู้พิพากษาที่ได้พิจารณาคดีนั้นมีความเห็นแย้ง หรือได้รับรองไว้แล้ว หรือรับรองในเวลาที่ตรวจอุทธรณ์นั้นว่ามีเหตุอันควรอุทธรณ์ในปัญหาข้อเท็จจริงนั้นได้ ก็ให้ศาลมีคำสั่งรับอุทธรณ์นั้นไว้พิจารณาในปัญหาข้อเท็จจริงดังกล่าวแล้ว ถ้าไม่มีความเห็นแย้งหรือคำรับรองเช่นว่านั้น ให้ศาลมีคำสั่งไม่รับอุทธรณ์ในปัญหาข้อเท็จจริงที่กล่าวแล้ว ในกรณีเช่นนี้ ถ้าอธิบดีผู้พิพากษาหรืออธิบดีผู้พิพากษาภาคมิได้เป็นคณะในคำสั่งนั้น ผู้อุทธรณ์ชอบที่จะยื่นคำร้องต่อศาลถึงอธิบดีผู้พิพากษาหรืออธิบดีผู้พิพากษาภาคภายในเจ็ดวัน เมื่อศาลได้รับคำร้องเช่นว่านั้น ให้ศาลส่งคำร้องนั้นพร้อมด้วยสำนวนความไปยังอธิบดีผู้พิพากษาหรืออธิบดีผู้พิพากษาภาคเพื่อมีคำสั่งยืนตามหรือกลับคำสั่งของศาลนั้น คำสั่งของอธิบดีผู้พิพากษา หรืออธิบดีผู้พิพากษาภาค เช่นว่านี้ ให้เป็นที่สุด บทบัญญัติแห่งมาตรานี้ ไม่ห้ามศาลในอันที่จะมีคำสั่งตามมาตรา ๒๓๒ ปฏิเสธไม่ส่งอุทธรณ์ในเหตุอื่น หรือในอันที่ศาลจะมีคำสั่งให้ส่งอุทธรณ์นั้นไปเท่าที่เป็นอุทธรณ์ในข้อกฎหมาย"},{"id":"๒๓๑","num":"มาตรา ๒๓๑","num_ara":"๒๓๑","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["การยื่นอุทธรณ์ย่อมไม่เป็นการทุเลาการบังคับตามคำพิพากษาหรือคำสั่งของศาลชั้นต้น แต่คู่ความที่ยื่นอุทธรณ์อาจยื่นคำขอต่อศาลอุทธรณ์ไม่ว่าเวลาใด ๆ ก่อนพิพากษา โดยทำเป็นคำร้องชี้แจงเหตุผลอันสมควรแห่งการขอ ให้ศาลอุทธรณ์ทุเลาการบังคับไว้ คำขอเช่นว่านั้น ให้ผู้อุทธรณ์ยื่นต่อศาลชั้นต้นได้จนถึงเวลาที่ศาลมีคำสั่งอนุญาตให้อุทธรณ์ ถ้าภายหลังศาลได้มีคำสั่งเช่นว่านี้แล้ว ให้ยื่นตรงต่อศาลอุทธรณ์ ถ้าได้ยื่นคำขอต่อศาลชั้นต้นก็ให้ศาลรีบส่งคำขอนั้นไปยังศาลอุทธรณ์ ในกรณีที่มีเหตุฉุกเฉินอย่างยิ่ง เมื่อศาลชั้นต้นได้รับคำขอไว้ก็ให้มีอำนาจทำคำสั่งให้ทุเลาการบังคับไว้รอคำวินิจฉัยชี้ขาดของศาลอุทธรณ์ในคำขอเช่นว่านั้น ถ้าผู้อุทธรณ์วางเงินต่อศาลชั้นต้นเป็นจำนวนพอชำระหนี้ตามคำพิพากษารวมทั้งค่าฤชาธรรมเนียมในการฟ้องร้องและการบังคับคดี หรือได้หาประกันมาให้สำหรับเงินจำนวนเช่นว่านี้จนเป็นที่พอใจของศาล ให้ศาลที่กล่าวมาแล้วงดการบังคับคดีไว้ดังที่บัญญัติไว้ในมาตรา ๒๙๒ (๑) เมื่อได้รับคำขอเช่นว่านี้ ศาลอุทธรณ์จะอนุญาตให้ทุเลาการบังคับไว้ในกรณีที่มีเหตุฉุกเฉินก็ได้ โดยมิต้องฟังคู่ความอีกฝ่ายหนึ่ง แต่ในกรณีเช่นว่านี้ ให้ถือว่าคำสั่งนี้เป็นการชั่วคราวจนกว่าศาลจะได้ฟังคู่ความอีกฝ่ายหนึ่งในภายหลัง ถ้าศาลมีคำสั่งให้ทุเลาการบังคับไว้ตามที่ขอ คำสั่งนี้อาจอยู่ภายใต้บังคับเงื่อนไขใด ๆ หรือไม่ก็ได้ ศาลจะมีคำสั่งให้ผู้อุทธรณ์ทำทัณฑ์บนว่าจะไม่ยักย้ายจำหน่ายทรัพย์สินของตนในระหว่างอุทธรณ์ หรือให้หาประกันมาให้ศาลให้พอกับเงินที่ต้องใช้ตามคำพิพากษาหรือจะให้วางเงินจำนวนนั้นต่อศาลก็ได้ ถ้าผู้อุทธรณ์ไม่ปฏิบัติตามคำสั่งนั้น ศาลจะสั่งให้ยึดหรืออายัดทรัพย์สินของผู้อุทธรณ์นั้นก็ได้ และถ้าทรัพย์สินเช่นว่านั้น หรือส่วนใดส่วนหนึ่งเป็นสังหาริมทรัพย์ ศาลอาจมีคำสั่งให้เอาออกขายทอดตลาดก็ได้ ถ้าปรากฏว่าการขายนั้นเป็นการจำเป็นและสมควร เพราะทรัพย์สินนั้นมีสภาพเป็นของเสียได้ง่ายหรือว่าการเก็บรักษาไว้ในระหว่างอุทธรณ์น่าจะนำไปสู่ความยุ่งยากหรือจะต้องเสียค่าใช้จ่ายเป็นจำนวนมาก"],"text":"การยื่นอุทธรณ์ย่อมไม่เป็นการทุเลาการบังคับตามคำพิพากษาหรือคำสั่งของศาลชั้นต้น แต่คู่ความที่ยื่นอุทธรณ์อาจยื่นคำขอต่อศาลอุทธรณ์ไม่ว่าเวลาใด ๆ ก่อนพิพากษา โดยทำเป็นคำร้องชี้แจงเหตุผลอันสมควรแห่งการขอ ให้ศาลอุทธรณ์ทุเลาการบังคับไว้ คำขอเช่นว่านั้น ให้ผู้อุทธรณ์ยื่นต่อศาลชั้นต้นได้จนถึงเวลาที่ศาลมีคำสั่งอนุญาตให้อุทธรณ์ ถ้าภายหลังศาลได้มีคำสั่งเช่นว่านี้แล้ว ให้ยื่นตรงต่อศาลอุทธรณ์ ถ้าได้ยื่นคำขอต่อศาลชั้นต้นก็ให้ศาลรีบส่งคำขอนั้นไปยังศาลอุทธรณ์ ในกรณีที่มีเหตุฉุกเฉินอย่างยิ่ง เมื่อศาลชั้นต้นได้รับคำขอไว้ก็ให้มีอำนาจทำคำสั่งให้ทุเลาการบังคับไว้รอคำวินิจฉัยชี้ขาดของศาลอุทธรณ์ในคำขอเช่นว่านั้น ถ้าผู้อุทธรณ์วางเงินต่อศาลชั้นต้นเป็นจำนวนพอชำระหนี้ตามคำพิพากษารวมทั้งค่าฤชาธรรมเนียมในการฟ้องร้องและการบังคับคดี หรือได้หาประกันมาให้สำหรับเงินจำนวนเช่นว่านี้จนเป็นที่พอใจของศาล ให้ศาลที่กล่าวมาแล้วงดการบังคับคดีไว้ดังที่บัญญัติไว้ในมาตรา ๒๙๒ (๑) เมื่อได้รับคำขอเช่นว่านี้ ศาลอุทธรณ์จะอนุญาตให้ทุเลาการบังคับไว้ในกรณีที่มีเหตุฉุกเฉินก็ได้ โดยมิต้องฟังคู่ความอีกฝ่ายหนึ่ง แต่ในกรณีเช่นว่านี้ ให้ถือว่าคำสั่งนี้เป็นการชั่วคราวจนกว่าศาลจะได้ฟังคู่ความอีกฝ่ายหนึ่งในภายหลัง ถ้าศาลมีคำสั่งให้ทุเลาการบังคับไว้ตามที่ขอ คำสั่งนี้อาจอยู่ภายใต้บังคับเงื่อนไขใด ๆ หรือไม่ก็ได้ ศาลจะมีคำสั่งให้ผู้อุทธรณ์ทำทัณฑ์บนว่าจะไม่ยักย้ายจำหน่ายทรัพย์สินของตนในระหว่างอุทธรณ์ หรือให้หาประกันมาให้ศาลให้พอกับเงินที่ต้องใช้ตามคำพิพากษาหรือจะให้วางเงินจำนวนนั้นต่อศาลก็ได้ ถ้าผู้อุทธรณ์ไม่ปฏิบัติตามคำสั่งนั้น ศาลจะสั่งให้ยึดหรืออายัดทรัพย์สินของผู้อุทธรณ์นั้นก็ได้ และถ้าทรัพย์สินเช่นว่านั้น หรือส่วนใดส่วนหนึ่งเป็นสังหาริมทรัพย์ ศาลอาจมีคำสั่งให้เอาออกขายทอดตลาดก็ได้ ถ้าปรากฏว่าการขายนั้นเป็นการจำเป็นและสมควร เพราะทรัพย์สินนั้นมีสภาพเป็นของเสียได้ง่ายหรือว่าการเก็บรักษาไว้ในระหว่างอุทธรณ์น่าจะนำไปสู่ความยุ่งยากหรือจะต้องเสียค่าใช้จ่ายเป็นจำนวนมาก"},{"id":"๒๓๒","num":"มาตรา ๒๓๒","num_ara":"๒๓๒","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["เมื่อได้รับอุทธรณ์แล้ว ให้ศาลชั้นต้นตรวจอุทธรณ์และมีคำสั่งให้ส่งหรือปฏิเสธไม่ส่งอุทธรณ์นั้นไปยังศาลอุทธรณ์ตามบทบัญญัติแห่งประมวลกฎหมายนี้ ถ้าศาลปฏิเสธไม่ส่ง ให้ศาลแสดงเหตุที่ไม่ส่งนั้นไว้ในคำสั่งทุกเรื่องไป ถ้าคู่ความทั้งสองฝ่ายได้ยื่นอุทธรณ์ ศาลจะวินิจฉัยอุทธรณ์ทั้งสองฉบับนั้นในคำสั่งฉบับเดียวกันก็ได้"],"text":"เมื่อได้รับอุทธรณ์แล้ว ให้ศาลชั้นต้นตรวจอุทธรณ์และมีคำสั่งให้ส่งหรือปฏิเสธไม่ส่งอุทธรณ์นั้นไปยังศาลอุทธรณ์ตามบทบัญญัติแห่งประมวลกฎหมายนี้ ถ้าศาลปฏิเสธไม่ส่ง ให้ศาลแสดงเหตุที่ไม่ส่งนั้นไว้ในคำสั่งทุกเรื่องไป ถ้าคู่ความทั้งสองฝ่ายได้ยื่นอุทธรณ์ ศาลจะวินิจฉัยอุทธรณ์ทั้งสองฉบับนั้นในคำสั่งฉบับเดียวกันก็ได้"},{"id":"๒๓๓","num":"มาตรา ๒๓๓","num_ara":"๒๓๓","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ถ้าศาลยอมรับอุทธรณ์และมีความเห็นว่าการอุทธรณ์นั้นคู่ความที่ศาลพิพากษาให้ชนะจะต้องเสียค่าฤชาธรรมเนียมเพิ่มขึ้น ให้ศาลมีอำนาจกำหนดไว้ในคำสั่งให้ผู้อุทธรณ์นำเงินมาวางศาลอีกให้พอกับจำนวนค่าฤชาธรรมเนียมซึ่งจะต้องเสียดังกล่าวแล้ว ตามอัตราที่ใช้บังคับอยู่ในเวลานั้น ก่อนสิ้นระยะเวลาอุทธรณ์หรือภายในระยะเวลาตามที่ศาลจะเห็นสมควรอนุญาต หรือตามแต่ผู้อุทธรณ์จะมีคำขอขึ้นมาไม่เกินสิบวันนับแต่สิ้นระยะเวลาอุทธรณ์นั้น ถ้าผู้อุทธรณ์ไม่นำเงินจำนวนที่กล่าวข้างต้นมาวางศาลภายในกำหนดเวลาที่อนุญาตไว้ก็ให้ศาลยกอุทธรณ์นั้นเสีย"],"text":"ถ้าศาลยอมรับอุทธรณ์และมีความเห็นว่าการอุทธรณ์นั้นคู่ความที่ศาลพิพากษาให้ชนะจะต้องเสียค่าฤชาธรรมเนียมเพิ่มขึ้น ให้ศาลมีอำนาจกำหนดไว้ในคำสั่งให้ผู้อุทธรณ์นำเงินมาวางศาลอีกให้พอกับจำนวนค่าฤชาธรรมเนียมซึ่งจะต้องเสียดังกล่าวแล้ว ตามอัตราที่ใช้บังคับอยู่ในเวลานั้น ก่อนสิ้นระยะเวลาอุทธรณ์หรือภายในระยะเวลาตามที่ศาลจะเห็นสมควรอนุญาต หรือตามแต่ผู้อุทธรณ์จะมีคำขอขึ้นมาไม่เกินสิบวันนับแต่สิ้นระยะเวลาอุทธรณ์นั้น ถ้าผู้อุทธรณ์ไม่นำเงินจำนวนที่กล่าวข้างต้นมาวางศาลภายในกำหนดเวลาที่อนุญาตไว้ก็ให้ศาลยกอุทธรณ์นั้นเสีย"},{"id":"๒๓๔","num":"มาตรา ๒๓๔","num_ara":"๒๓๔","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ถ้าศาลชั้นต้นไม่รับอุทธรณ์ ผู้อุทธรณ์อาจอุทธรณ์คำสั่งศาลนั้น ไปยังศาลอุทธรณ์โดยยื่นคำขอเป็นคำร้องต่อศาลชั้นต้น และนำค่าฤชาธรรมเนียมทั้งปวงมาวางศาลและนำเงินมาชำระตามคำพิพากษาหรือหาประกันให้ไว้ต่อศาลภายในกำหนดสิบห้าวันนับแต่วันที่ศาลได้มีคำสั่ง"],"text":"ถ้าศาลชั้นต้นไม่รับอุทธรณ์ ผู้อุทธรณ์อาจอุทธรณ์คำสั่งศาลนั้น ไปยังศาลอุทธรณ์โดยยื่นคำขอเป็นคำร้องต่อศาลชั้นต้น และนำค่าฤชาธรรมเนียมทั้งปวงมาวางศาลและนำเงินมาชำระตามคำพิพากษาหรือหาประกันให้ไว้ต่อศาลภายในกำหนดสิบห้าวันนับแต่วันที่ศาลได้มีคำสั่ง"},{"id":"๒๓๕","num":"มาตรา ๒๓๕","num_ara":"๒๓๕","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["เมื่อศาลชั้นต้นได้รับอุทธรณ์แล้วให้ส่งสำเนาอุทธรณ์นั้นให้แก่จำเลยอุทธรณ์ภายในกำหนดเจ็ดวันนับแต่วันที่จำเลยอุทธรณ์ยื่นคำแก้อุทธรณ์ หรือถ้าจำเลยอุทธรณ์ไม่ยื่นคำแก้อุทธรณ์ ภายในกำหนดเจ็ดวันนับแต่ระยะเวลาที่กำหนดไว้ในมาตรา ๒๓๗ สำหรับการยื่นคำแก้อุทธรณ์ได้สิ้นสุดลง ให้ศาลส่งอุทธรณ์และคำแก้อุทธรณ์ถ้าหากมี พร้อมทั้งสำนวนและหลักฐานต่าง ๆ ไปยังศาลอุทธรณ์ เมื่อศาลอุทธรณ์ได้รับฟ้องอุทธรณ์และสำนวนความไว้แล้วให้นำคดีลงสารบบความของศาลอุทธรณ์โดยพลัน"],"text":"เมื่อศาลชั้นต้นได้รับอุทธรณ์แล้วให้ส่งสำเนาอุทธรณ์นั้นให้แก่จำเลยอุทธรณ์ภายในกำหนดเจ็ดวันนับแต่วันที่จำเลยอุทธรณ์ยื่นคำแก้อุทธรณ์ หรือถ้าจำเลยอุทธรณ์ไม่ยื่นคำแก้อุทธรณ์ ภายในกำหนดเจ็ดวันนับแต่ระยะเวลาที่กำหนดไว้ในมาตรา ๒๓๗ สำหรับการยื่นคำแก้อุทธรณ์ได้สิ้นสุดลง ให้ศาลส่งอุทธรณ์และคำแก้อุทธรณ์ถ้าหากมี พร้อมทั้งสำนวนและหลักฐานต่าง ๆ ไปยังศาลอุทธรณ์ เมื่อศาลอุทธรณ์ได้รับฟ้องอุทธรณ์และสำนวนความไว้แล้วให้นำคดีลงสารบบความของศาลอุทธรณ์โดยพลัน"},{"id":"๒๓๖","num":"มาตรา ๒๓๖","num_ara":"๒๓๖","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["เมื่อคู่ความยื่นคำร้องอุทธรณ์คำสั่งศาลที่ปฏิเสธไม่ยอมรับอุทธรณ์ ให้ศาลส่งคำร้องเช่นว่านั้นไปยังศาลอุทธรณ์โดยไม่ชักช้าพร้อมด้วยคำพิพากษาหรือคำสั่งชี้ขาดคดีของศาลชั้นต้นและฟ้องอุทธรณ์ ถ้าศาลอุทธรณ์เห็นเป็นการจำเป็นที่จะต้องตรวจสำนวน ให้มีคำสั่งให้ศาลชั้นต้นส่งสำนวนไปยังศาลอุทธรณ์ ในกรณีเช่นนี้ให้ศาลอุทธรณ์พิจารณาคำร้อง แล้วมีคำสั่งยืนตามคำปฏิเสธของศาลชั้นต้นหรือมีคำสั่งให้รับอุทธรณ์ คำสั่งนี้ให้เป็นที่สุดแล้วส่งไปให้ศาลชั้นต้นอ่าน เมื่อได้อ่านคำสั่งศาลอุทธรณ์ให้รับอุทธรณ์แล้ว ให้ศาลชั้นต้นส่งสำเนาอุทธรณ์แก่จำเลยอุทธรณ์ และภายในกำหนดเจ็ดวันนับแต่วันที่จำเลยอุทธรณ์ยื่นคำแก้อุทธรณ์ หรือนับแต่ระยะเวลาที่กำหนดไว้ในมาตรา ๒๓๗ สำหรับการยื่นคำแก้อุทธรณ์ได้สิ้นสุดลง ให้ศาลส่งคำแก้อุทธรณ์ไปยังศาลอุทธรณ์หรือแจ้งให้ทราบว่าไม่มีคำแก้อุทธรณ์ เมื่อศาลอุทธรณ์ได้รับคำแก้อุทธรณ์หรือแจ้งความเช่นว่าแล้วให้นำคดีลงสารบบความของศาลอุทธรณ์โดยพลัน"],"text":"เมื่อคู่ความยื่นคำร้องอุทธรณ์คำสั่งศาลที่ปฏิเสธไม่ยอมรับอุทธรณ์ ให้ศาลส่งคำร้องเช่นว่านั้นไปยังศาลอุทธรณ์โดยไม่ชักช้าพร้อมด้วยคำพิพากษาหรือคำสั่งชี้ขาดคดีของศาลชั้นต้นและฟ้องอุทธรณ์ ถ้าศาลอุทธรณ์เห็นเป็นการจำเป็นที่จะต้องตรวจสำนวน ให้มีคำสั่งให้ศาลชั้นต้นส่งสำนวนไปยังศาลอุทธรณ์ ในกรณีเช่นนี้ให้ศาลอุทธรณ์พิจารณาคำร้อง แล้วมีคำสั่งยืนตามคำปฏิเสธของศาลชั้นต้นหรือมีคำสั่งให้รับอุทธรณ์ คำสั่งนี้ให้เป็นที่สุดแล้วส่งไปให้ศาลชั้นต้นอ่าน เมื่อได้อ่านคำสั่งศาลอุทธรณ์ให้รับอุทธรณ์แล้ว ให้ศาลชั้นต้นส่งสำเนาอุทธรณ์แก่จำเลยอุทธรณ์ และภายในกำหนดเจ็ดวันนับแต่วันที่จำเลยอุทธรณ์ยื่นคำแก้อุทธรณ์ หรือนับแต่ระยะเวลาที่กำหนดไว้ในมาตรา ๒๓๗ สำหรับการยื่นคำแก้อุทธรณ์ได้สิ้นสุดลง ให้ศาลส่งคำแก้อุทธรณ์ไปยังศาลอุทธรณ์หรือแจ้งให้ทราบว่าไม่มีคำแก้อุทธรณ์ เมื่อศาลอุทธรณ์ได้รับคำแก้อุทธรณ์หรือแจ้งความเช่นว่าแล้วให้นำคดีลงสารบบความของศาลอุทธรณ์โดยพลัน"},{"id":"๒๓๗","num":"มาตรา ๒๓๗","num_ara":"๒๓๗","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["จำเลยอุทธรณ์อาจยื่นคำแก้อุทธรณ์ต่อศาลชั้นต้นได้ภายในกำหนดสิบห้าวันนับแต่วันส่งสำเนาอุทธรณ์ ไม่ว่ากรณีใด ๆ ห้ามมิให้ศาลแสดงว่า จำเลยอุทธรณ์ขาดนัดเพราะไม่ยื่นคำแก้อุทธรณ์"],"text":"จำเลยอุทธรณ์อาจยื่นคำแก้อุทธรณ์ต่อศาลชั้นต้นได้ภายในกำหนดสิบห้าวันนับแต่วันส่งสำเนาอุทธรณ์ ไม่ว่ากรณีใด ๆ ห้ามมิให้ศาลแสดงว่า จำเลยอุทธรณ์ขาดนัดเพราะไม่ยื่นคำแก้อุทธรณ์"},{"id":"๒๓๘","num":"มาตรา ๒๓๘","num_ara":"๒๓๘","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ภายใต้บังคับมาตรา ๒๔๓ (๓) ในคดีที่อุทธรณ์ได้แต่เฉพาะในปัญหาข้อกฎหมายนั้น การวินิจฉัยปัญหาเช่นว่านี้ ศาลอุทธรณ์จำต้องถือตามข้อเท็จจริงที่ศาลชั้นต้นได้วินิจฉัยจากพยานหลักฐานในสำนวน"],"text":"ภายใต้บังคับมาตรา ๒๔๓ (๓) ในคดีที่อุทธรณ์ได้แต่เฉพาะในปัญหาข้อกฎหมายนั้น การวินิจฉัยปัญหาเช่นว่านี้ ศาลอุทธรณ์จำต้องถือตามข้อเท็จจริงที่ศาลชั้นต้นได้วินิจฉัยจากพยานหลักฐานในสำนวน"},{"id":"๒๓๙","num":"มาตรา ๒๓๙","num_ara":"๒๓๙","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["อุทธรณ์คำสั่งนั้นจะต้องพิจารณาก่อนอุทธรณ์คำพิพากษาเท่าที่สามารถจะทำได้ แม้ถึงว่าอุทธรณ์คำพิพากษานั้นจะได้ลงไว้ในสารบบความของศาลอุทธรณ์ก่อนอุทธรณ์คำสั่งนั้นก็ดี"],"text":"อุทธรณ์คำสั่งนั้นจะต้องพิจารณาก่อนอุทธรณ์คำพิพากษาเท่าที่สามารถจะทำได้ แม้ถึงว่าอุทธรณ์คำพิพากษานั้นจะได้ลงไว้ในสารบบความของศาลอุทธรณ์ก่อนอุทธรณ์คำสั่งนั้นก็ดี"},{"id":"๒๔๐","num":"มาตรา ๒๔๐","num_ara":"๒๔๐","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ศาลอุทธรณ์มีอำนาจที่จะวินิจฉัยคดีโดยเพียงแต่พิจารณาฟ้องอุทธรณ์ คำแก้อุทธรณ์ เอกสาร และหลักฐานทั้งปวง ในสำนวนความซึ่งศาลชั้นต้นส่งขึ้นมา เว้นแต่","(๑) ศาลอุทธรณ์ได้นัดฟังคำแถลงการณ์ด้วยวาจาตามที่บัญญัติไว้ในมาตรา ๒๔๑ แต่ถ้าคู่ความฝ่ายใดหรือทั้งสองฝ่ายไม่มาศาลในวันกำหนดนัด ศาลอุทธรณ์อาจดำเนินคดีไปได้ และคำพิพากษาหรือคำสั่งของศาลอุทธรณ์นั้น ไม่ให้ถือเป็นคำพิพากษาโดยขาดนัด (๒) ถ้าศาลอุทธรณ์ยังไม่เป็นที่พอใจในการพิจารณาฟ้องอุทธรณ์ คำแก้อุทธรณ์ และพยานหลักฐาน ที่ปรากฏในสำนวน ภายใต้บังคับแห่งมาตรา ๒๓๘ และเฉพาะในปัญหาที่อุทธรณ์ให้ศาลมีอำนาจที่จะกำหนดประเด็นทำการสืบพยานที่สืบมาแล้ว หรือพยานที่เห็นควรสืบต่อไป และพิจารณาคดีโดยทั่ว ๆ ไป ดังที่บัญญัติไว้ในประมวลกฎหมายนี้สำหรับการพิจารณาในศาลชั้นต้น และให้นำบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการพิจารณาในศาลชั้นต้น มาใช้บังคับด้วยโดยอนุโลม (๓) ในคดีที่คู่ความอุทธรณ์ในปัญหาข้อกฎหมาย ถ้าศาลอุทธรณ์เห็นว่าศาลชั้นต้นยังมิได้พิจารณาหรือวินิจฉัยปัญหาข้อเท็จจริงอันเป็นสาระสำคัญในประเด็นให้ศาลอุทธรณ์มีอำนาจทำคำสั่งให้ศาลชั้นต้นพิจารณาปัญหาข้อเท็จจริงเช่นว่านั้น แล้วพิพากษาไปตามรูปความ"],"text":"ศาลอุทธรณ์มีอำนาจที่จะวินิจฉัยคดีโดยเพียงแต่พิจารณาฟ้องอุทธรณ์ คำแก้อุทธรณ์ เอกสาร และหลักฐานทั้งปวง ในสำนวนความซึ่งศาลชั้นต้นส่งขึ้นมา เว้นแต่\n\n(๑) ศาลอุทธรณ์ได้นัดฟังคำแถลงการณ์ด้วยวาจาตามที่บัญญัติไว้ในมาตรา ๒๔๑ แต่ถ้าคู่ความฝ่ายใดหรือทั้งสองฝ่ายไม่มาศาลในวันกำหนดนัด ศาลอุทธรณ์อาจดำเนินคดีไปได้ และคำพิพากษาหรือคำสั่งของศาลอุทธรณ์นั้น ไม่ให้ถือเป็นคำพิพากษาโดยขาดนัด (๒) ถ้าศาลอุทธรณ์ยังไม่เป็นที่พอใจในการพิจารณาฟ้องอุทธรณ์ คำแก้อุทธรณ์ และพยานหลักฐาน ที่ปรากฏในสำนวน ภายใต้บังคับแห่งมาตรา ๒๓๘ และเฉพาะในปัญหาที่อุทธรณ์ให้ศาลมีอำนาจที่จะกำหนดประเด็นทำการสืบพยานที่สืบมาแล้ว หรือพยานที่เห็นควรสืบต่อไป และพิจารณาคดีโดยทั่ว ๆ ไป ดังที่บัญญัติไว้ในประมวลกฎหมายนี้สำหรับการพิจารณาในศาลชั้นต้น และให้นำบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการพิจารณาในศาลชั้นต้น มาใช้บังคับด้วยโดยอนุโลม (๓) ในคดีที่คู่ความอุทธรณ์ในปัญหาข้อกฎหมาย ถ้าศาลอุทธรณ์เห็นว่าศาลชั้นต้นยังมิได้พิจารณาหรือวินิจฉัยปัญหาข้อเท็จจริงอันเป็นสาระสำคัญในประเด็นให้ศาลอุทธรณ์มีอำนาจทำคำสั่งให้ศาลชั้นต้นพิจารณาปัญหาข้อเท็จจริงเช่นว่านั้น แล้วพิพากษาไปตามรูปความ"},{"id":"๒๔๑","num":"มาตรา ๒๔๑","num_ara":"๒๔๑","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ถ้าคู่ความฝ่ายใดประสงค์จะมาแถลงการณ์ด้วยวาจาในชั้นศาลอุทธรณ์ ให้ขอมาในตอนท้ายคำฟ้องอุทธรณ์ หรือคำแก้อุทธรณ์ แล้วแต่กรณี และให้ศาลอุทธรณ์กำหนดนัดฟังคำแถลงการณ์ด้วยวาจานั้น เว้นแต่ศาลอุทธรณ์จะพิจารณาเห็นว่าการแถลงการณ์ด้วยวาจาไม่จำเป็นแก่คดี จะสั่งงดฟังคำแถลงการณ์เสียก็ได้ ในกรณีที่ศาลอุทธรณ์นัดฟังคำแถลงการณ์ด้วยวาจา คู่ความอีกฝ่ายหนึ่งชอบที่จะไปแถลงการณ์ด้วยวาจาในชั้นศาลอุทธรณ์ได้ด้วย ถึงแม้ว่าตนจะมิได้แสดงความประสงค์ไว้ การแถลงการณ์ด้วยวาจา ผู้ขอแถลง เป็นผู้แถลงก่อนแล้วอีกฝ่ายหนึ่งแถลงแก้ แล้วผู้ขอแถลง แถลงได้อีกครั้งหนึ่ง ถ้าขอแถลงทั้งสองฝ่าย ให้ผู้อุทธรณ์แถลงก่อน ถ้าทั้งสองฝ่ายอุทธรณ์และต่างขอแถลง ให้ศาลอุทธรณ์พิจารณาสั่ง"],"text":"ถ้าคู่ความฝ่ายใดประสงค์จะมาแถลงการณ์ด้วยวาจาในชั้นศาลอุทธรณ์ ให้ขอมาในตอนท้ายคำฟ้องอุทธรณ์ หรือคำแก้อุทธรณ์ แล้วแต่กรณี และให้ศาลอุทธรณ์กำหนดนัดฟังคำแถลงการณ์ด้วยวาจานั้น เว้นแต่ศาลอุทธรณ์จะพิจารณาเห็นว่าการแถลงการณ์ด้วยวาจาไม่จำเป็นแก่คดี จะสั่งงดฟังคำแถลงการณ์เสียก็ได้ ในกรณีที่ศาลอุทธรณ์นัดฟังคำแถลงการณ์ด้วยวาจา คู่ความอีกฝ่ายหนึ่งชอบที่จะไปแถลงการณ์ด้วยวาจาในชั้นศาลอุทธรณ์ได้ด้วย ถึงแม้ว่าตนจะมิได้แสดงความประสงค์ไว้ การแถลงการณ์ด้วยวาจา ผู้ขอแถลง เป็นผู้แถลงก่อนแล้วอีกฝ่ายหนึ่งแถลงแก้ แล้วผู้ขอแถลง แถลงได้อีกครั้งหนึ่ง ถ้าขอแถลงทั้งสองฝ่าย ให้ผู้อุทธรณ์แถลงก่อน ถ้าทั้งสองฝ่ายอุทธรณ์และต่างขอแถลง ให้ศาลอุทธรณ์พิจารณาสั่ง"},{"id":"๒๔๒","num":"มาตรา ๒๔๒","num_ara":"๒๔๒","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["เมื่อศาลอุทธรณ์ได้ตรวจสำนวนความและฟังคู่ความทั้งปวง หรือสืบพยานต่อไปดังบัญญัติไว้ในมาตรา ๒๔๐ เสร็จแล้ว ให้ศาลอุทธรณ์ชี้ขาดตัดสินอุทธรณ์โดยประการใดประการหนึ่งในสี่ประการนี้","(๑) ถ้าศาลอุทธรณ์เห็นว่า อุทธรณ์นั้นต้องห้ามตามกฎหมาย ก็ให้ยกอุทธรณ์นั้นเสียโดยไม่ต้องวินิจฉัยในประเด็นแห่งอุทธรณ์ (๒) ถ้าศาลอุทธรณ์เห็นว่า คำวินิจฉัยของศาลชั้นต้นถูกต้อง ไม่ว่าโดยเหตุเดียวกันหรือเหตุอื่น ก็ให้พิพากษายืนตามศาลชั้นต้นนั้น (๓) ถ้าศาลอุทธรณ์เห็นว่า คำชี้ขาดของศาลชั้นต้นไม่ถูกต้อง ให้กลับคำพิพากษาของศาลชั้นต้นเสีย และพิพากษาในปัญหาเหล่านั้นใหม่ (๔) ถ้าศาลอุทธรณ์เห็นว่า คำวินิจฉัยของศาลชั้นต้นถูกแต่บางส่วน และผิดบางส่วน ก็ให้แก้คำพิพากษาศาลชั้นต้นไปตามนั้น โดยพิพากษายืนบางส่วน กลับบางส่วน และมีคำพิพากษาใหม่แทนส่วนที่กลับนั้น"],"text":"เมื่อศาลอุทธรณ์ได้ตรวจสำนวนความและฟังคู่ความทั้งปวง หรือสืบพยานต่อไปดังบัญญัติไว้ในมาตรา ๒๔๐ เสร็จแล้ว ให้ศาลอุทธรณ์ชี้ขาดตัดสินอุทธรณ์โดยประการใดประการหนึ่งในสี่ประการนี้\n\n(๑) ถ้าศาลอุทธรณ์เห็นว่า อุทธรณ์นั้นต้องห้ามตามกฎหมาย ก็ให้ยกอุทธรณ์นั้นเสียโดยไม่ต้องวินิจฉัยในประเด็นแห่งอุทธรณ์ (๒) ถ้าศาลอุทธรณ์เห็นว่า คำวินิจฉัยของศาลชั้นต้นถูกต้อง ไม่ว่าโดยเหตุเดียวกันหรือเหตุอื่น ก็ให้พิพากษายืนตามศาลชั้นต้นนั้น (๓) ถ้าศาลอุทธรณ์เห็นว่า คำชี้ขาดของศาลชั้นต้นไม่ถูกต้อง ให้กลับคำพิพากษาของศาลชั้นต้นเสีย และพิพากษาในปัญหาเหล่านั้นใหม่ (๔) ถ้าศาลอุทธรณ์เห็นว่า คำวินิจฉัยของศาลชั้นต้นถูกแต่บางส่วน และผิดบางส่วน ก็ให้แก้คำพิพากษาศาลชั้นต้นไปตามนั้น โดยพิพากษายืนบางส่วน กลับบางส่วน และมีคำพิพากษาใหม่แทนส่วนที่กลับนั้น"},{"id":"๒๔๓","num":"มาตรา ๒๔๓","num_ara":"๒๔๓","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ให้ศาลอุทธรณ์มีอำนาจดังต่อไปนี้ด้วย คือ","(๑) เมื่อคดีปรากฏเหตุที่มิได้ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยคำพิพากษาและคำสั่ง และศาลอุทธรณ์เห็นว่ามีเหตุอันสมควร ก็ให้ศาลอุทธรณ์มีคำสั่งยกคำพิพากษาหรือคำสั่งศาลชั้นต้นนั้นเสีย แล้วส่งสำนวนคืนไปยังศาลชั้นต้นเพื่อให้พิพากษาหรือมีคำสั่งใหม่ ในกรณีเช่นนี้ศาลชั้นต้นอาจประกอบด้วยผู้พิพากษาอื่นนอกจากที่ได้พิพากษาหรือมีคำสั่งมาแล้ว และคำพิพากษาหรือคำสั่งใหม่นี้อาจวินิจฉัยชี้ขาดคดีเป็นอย่างอื่นนอกจากคำพิพากษาหรือคำสั่งที่ถูกยกได้ (๒) เมื่อคดีปรากฏว่าเหตุที่มิได้ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการพิจารณาหรือมีเหตุที่ศาลได้ปฏิเสธไม่สืบพยานตามที่ผู้ขออุทธรณ์ร้องขอ และศาลอุทธรณ์เห็นว่ามีเหตุอันสมควร ก็ให้ศาลอุทธรณ์มีคำสั่งยกคำพิพากษาหรือคำสั่งศาลชั้นต้นนั้นแล้วกำหนดให้ศาลชั้นต้นซึ่งประกอบด้วยผู้พิพากษาคณะเดิมหรือผู้พิพากษาอื่น หรือศาลชั้นต้นอื่นใดตามที่ศาลอุทธรณ์จะเห็นสมควร พิจารณาคดีนั้นใหม่ทั้งหมดหรือบางส่วน และพิพากษาหรือมีคำสั่งใหม่ (๓) ในกรณีที่ศาลอุทธรณ์จำต้องถือตามข้อเท็จจริงของศาลชั้นต้น ถ้าปรากฏว่า (ก) การที่ศาลชั้นต้นวินิจฉัยข้อเท็จจริงนั้นผิดต่อกฎหมาย ศาลอุทธรณ์อาจฟังข้อเท็จจริงใหม่แทนข้อเท็จจริงของศาลชั้นต้น แล้วมีคำพิพากษาหรือคำสั่งชี้ขาดตัดสินคดีไปตามนั้น หรือ (ข) ข้อเท็จจริงที่ศาลชั้นต้นฟังมาไม่พอแก่การวินิจฉัยข้อกฎหมาย ศาลอุทธรณ์อาจทำคำสั่งให้ยกคำพิพากษาหรือคำสั่งศาลชั้นต้นนั้นเสีย แล้วกำหนดให้ศาลชั้นต้นซึ่งประกอบด้วยผู้พิพากษาคณะเดิม หรือผู้พิพากษาอื่น หรือศาลชั้นต้นอื่นใด ตามที่ศาลอุทธรณ์เห็นสมควร พิจารณาคดีนั้นใหม่ทั้งหมดหรือบางส่วน โดยดำเนินตามคำชี้ขาดของศาลอุทธรณ์แล้วมีคำพิพากษาหรือคำสั่งวินิจฉัยชี้ขาดคดีไปตามรูปความ ทั้งนี้ ไม่ว่าจะปรากฏจากการอุทธรณ์หรือไม่ ในคดีทั้งปวงที่ศาลชั้นต้นได้มีคำพิพากษาหรือคำสั่งใหม่ตามมาตรานี้ คู่ความชอบที่จะอุทธรณ์คำพิพากษาหรือคำสั่งใหม่เช่นว่านี้ไปยังศาลอุทธรณ์ได้ตามบทบัญญัติแห่งลักษณะนี้"],"text":"ให้ศาลอุทธรณ์มีอำนาจดังต่อไปนี้ด้วย คือ\n\n(๑) เมื่อคดีปรากฏเหตุที่มิได้ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยคำพิพากษาและคำสั่ง และศาลอุทธรณ์เห็นว่ามีเหตุอันสมควร ก็ให้ศาลอุทธรณ์มีคำสั่งยกคำพิพากษาหรือคำสั่งศาลชั้นต้นนั้นเสีย แล้วส่งสำนวนคืนไปยังศาลชั้นต้นเพื่อให้พิพากษาหรือมีคำสั่งใหม่ ในกรณีเช่นนี้ศาลชั้นต้นอาจประกอบด้วยผู้พิพากษาอื่นนอกจากที่ได้พิพากษาหรือมีคำสั่งมาแล้ว และคำพิพากษาหรือคำสั่งใหม่นี้อาจวินิจฉัยชี้ขาดคดีเป็นอย่างอื่นนอกจากคำพิพากษาหรือคำสั่งที่ถูกยกได้ (๒) เมื่อคดีปรากฏว่าเหตุที่มิได้ปฏิบัติตามบทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการพิจารณาหรือมีเหตุที่ศาลได้ปฏิเสธไม่สืบพยานตามที่ผู้ขออุทธรณ์ร้องขอ และศาลอุทธรณ์เห็นว่ามีเหตุอันสมควร ก็ให้ศาลอุทธรณ์มีคำสั่งยกคำพิพากษาหรือคำสั่งศาลชั้นต้นนั้นแล้วกำหนดให้ศาลชั้นต้นซึ่งประกอบด้วยผู้พิพากษาคณะเดิมหรือผู้พิพากษาอื่น หรือศาลชั้นต้นอื่นใดตามที่ศาลอุทธรณ์จะเห็นสมควร พิจารณาคดีนั้นใหม่ทั้งหมดหรือบางส่วน และพิพากษาหรือมีคำสั่งใหม่ (๓) ในกรณีที่ศาลอุทธรณ์จำต้องถือตามข้อเท็จจริงของศาลชั้นต้น ถ้าปรากฏว่า (ก) การที่ศาลชั้นต้นวินิจฉัยข้อเท็จจริงนั้นผิดต่อกฎหมาย ศาลอุทธรณ์อาจฟังข้อเท็จจริงใหม่แทนข้อเท็จจริงของศาลชั้นต้น แล้วมีคำพิพากษาหรือคำสั่งชี้ขาดตัดสินคดีไปตามนั้น หรือ (ข) ข้อเท็จจริงที่ศาลชั้นต้นฟังมาไม่พอแก่การวินิจฉัยข้อกฎหมาย ศาลอุทธรณ์อาจทำคำสั่งให้ยกคำพิพากษาหรือคำสั่งศาลชั้นต้นนั้นเสีย แล้วกำหนดให้ศาลชั้นต้นซึ่งประกอบด้วยผู้พิพากษาคณะเดิม หรือผู้พิพากษาอื่น หรือศาลชั้นต้นอื่นใด ตามที่ศาลอุทธรณ์เห็นสมควร พิจารณาคดีนั้นใหม่ทั้งหมดหรือบางส่วน โดยดำเนินตามคำชี้ขาดของศาลอุทธรณ์แล้วมีคำพิพากษาหรือคำสั่งวินิจฉัยชี้ขาดคดีไปตามรูปความ ทั้งนี้ ไม่ว่าจะปรากฏจากการอุทธรณ์หรือไม่ ในคดีทั้งปวงที่ศาลชั้นต้นได้มีคำพิพากษาหรือคำสั่งใหม่ตามมาตรานี้ คู่ความชอบที่จะอุทธรณ์คำพิพากษาหรือคำสั่งใหม่เช่นว่านี้ไปยังศาลอุทธรณ์ได้ตามบทบัญญัติแห่งลักษณะนี้"},{"id":"๒๔๔","num":"มาตรา ๒๔๔","num_ara":"๒๔๔","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ศาลอุทธรณ์จะอ่านคำพิพากษานั้นเองหรือจะส่งไปให้ศาลชั้นต้นอ่านก็ได้ ในกรณีเหล่านี้ให้ศาลที่อ่านคำพิพากษามีคำสั่งกำหนดนัดวันอ่านส่งให้แก่คู่ความอุทธรณ์ทุกฝ่าย"],"text":"ศาลอุทธรณ์จะอ่านคำพิพากษานั้นเองหรือจะส่งไปให้ศาลชั้นต้นอ่านก็ได้ ในกรณีเหล่านี้ให้ศาลที่อ่านคำพิพากษามีคำสั่งกำหนดนัดวันอ่านส่งให้แก่คู่ความอุทธรณ์ทุกฝ่าย"},{"id":"๒๔๔_๑","num":"มาตรา ๒๔๔/๑","num_ara":"๒๔๔/๑","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["ภายใต้บังคับมาตรา ๒๔๗ คำพิพากษาหรือคำสั่งของศาลอุทธรณ์ให้เป็นที่สุด"],"text":"ภายใต้บังคับมาตรา ๒๔๗ คำพิพากษาหรือคำสั่งของศาลอุทธรณ์ให้เป็นที่สุด"},{"id":"๒๔๕","num":"มาตรา ๒๔๕","num_ara":"๒๔๕","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["คำพิพากษาหรือคำสั่งชั้นอุทธรณ์ให้มีผลเฉพาะระหว่างคู่ความชั้นอุทธรณ์ เว้นแต่ในกรณีต่อไปนี้","(๑) ถ้าคำพิพากษาหรือคำสั่งที่อุทธรณ์นั้นเกี่ยวด้วยการชำระหนี้อันไม่อาจแบ่งแยกได้ และคู่ความแต่บางฝ่ายเป็นผู้อุทธรณ์ซึ่งทำให้คำพิพากษาหรือคำสั่งนั้นมีผลเป็นที่สุด ระหว่างคู่ความอื่น ๆ ถ้าศาลอุทธรณ์เห็นว่าควรกลับคำพิพากษาหรือคำสั่งที่อุทธรณ์ ให้ศาลอุทธรณ์มีอำนาจชี้ขาดว่าคำพิพากษาหรือคำสั่งศาลอุทธรณ์ ให้มีผลระหว่างคู่ความทุกฝ่ายในคดีในศาลชั้นต้นด้วย (๒) ถ้าได้มีการอนุญาตให้ผู้ร้องสอดเข้ามาในคดีแทนคู่ความฝ่ายใด คำพิพากษาศาลอุทธรณ์ย่อมมีผลบังคับแก่คู่ความฝ่ายนั้นด้วย"],"text":"คำพิพากษาหรือคำสั่งชั้นอุทธรณ์ให้มีผลเฉพาะระหว่างคู่ความชั้นอุทธรณ์ เว้นแต่ในกรณีต่อไปนี้\n\n(๑) ถ้าคำพิพากษาหรือคำสั่งที่อุทธรณ์นั้นเกี่ยวด้วยการชำระหนี้อันไม่อาจแบ่งแยกได้ และคู่ความแต่บางฝ่ายเป็นผู้อุทธรณ์ซึ่งทำให้คำพิพากษาหรือคำสั่งนั้นมีผลเป็นที่สุด ระหว่างคู่ความอื่น ๆ ถ้าศาลอุทธรณ์เห็นว่าควรกลับคำพิพากษาหรือคำสั่งที่อุทธรณ์ ให้ศาลอุทธรณ์มีอำนาจชี้ขาดว่าคำพิพากษาหรือคำสั่งศาลอุทธรณ์ ให้มีผลระหว่างคู่ความทุกฝ่ายในคดีในศาลชั้นต้นด้วย (๒) ถ้าได้มีการอนุญาตให้ผู้ร้องสอดเข้ามาในคดีแทนคู่ความฝ่ายใด คำพิพากษาศาลอุทธรณ์ย่อมมีผลบังคับแก่คู่ความฝ่ายนั้นด้วย"},{"id":"๒๔๖","num":"มาตรา ๒๔๖","num_ara":"๒๔๖","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๑ อุทธรณ์","section":"","subsection":"","paragraphs":["เว้นแต่ที่ได้บัญญัติไว้ดังกล่าวมาข้างต้น บทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการพิจารณาและการชี้ขาดตัดสินคดีในศาลชั้นต้นนั้น ให้ใช้บังคับแก่การพิจารณาและการชี้ขาดตัดสินคดีในชั้นศาลอุทธรณ์ได้โดยอนุโลม"],"text":"เว้นแต่ที่ได้บัญญัติไว้ดังกล่าวมาข้างต้น บทบัญญัติแห่งประมวลกฎหมายนี้ว่าด้วยการพิจารณาและการชี้ขาดตัดสินคดีในศาลชั้นต้นนั้น ให้ใช้บังคับแก่การพิจารณาและการชี้ขาดตัดสินคดีในชั้นศาลอุทธรณ์ได้โดยอนุโลม"},{"id":"๒๔๗","num":"มาตรา ๒๔๗","num_ara":"๒๔๗","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๒ ฎีกา","section":"","subsection":"","paragraphs":["การฎีกาคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ ให้กระทำได้เมื่อได้รับอนุญาตจากศาลฎีกา การขออนุญาตฎีกา ให้ยื่นคำร้องพร้อมกับคำฟ้องฎีกาต่อศาลชั้นต้นที่มีคำพิพากษาหรือคำสั่งในคดีนั้นภายในกำหนดหนึ่งเดือนนับแต่วันที่ได้อ่านคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ แล้วให้ศาลชั้นต้นรีบส่งคำร้องพร้อมคำฟ้องฎีกาดังกล่าวไปยังศาลฎีกา และให้ศาลฎีกาพิจารณาวินิจฉัยคำร้องให้เสร็จสิ้นโดยเร็ว"],"text":"การฎีกาคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ ให้กระทำได้เมื่อได้รับอนุญาตจากศาลฎีกา การขออนุญาตฎีกา ให้ยื่นคำร้องพร้อมกับคำฟ้องฎีกาต่อศาลชั้นต้นที่มีคำพิพากษาหรือคำสั่งในคดีนั้นภายในกำหนดหนึ่งเดือนนับแต่วันที่ได้อ่านคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ แล้วให้ศาลชั้นต้นรีบส่งคำร้องพร้อมคำฟ้องฎีกาดังกล่าวไปยังศาลฎีกา และให้ศาลฎีกาพิจารณาวินิจฉัยคำร้องให้เสร็จสิ้นโดยเร็ว"},{"id":"๒๔๘","num":"มาตรา ๒๔๘","num_ara":"๒๔๘","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๒ ฎีกา","section":"","subsection":"","paragraphs":["คำร้องตามมาตรา ๒๔๗ ให้พิจารณาและวินิจฉัยโดยองค์คณะผู้พิพากษาที่ประธานศาลฎีกาแต่งตั้ง ซึ่งประกอบด้วยรองประธานศาลฎีกาและผู้พิพากษาในศาลฎีกาซึ่งดำรงตำแหน่งไม่ต่ำกว่าผู้พิพากษาศาลฎีกาอีกอย่างน้อยสามคน การวินิจฉัยให้เป็นไปตามเสียงข้างมาก ถ้าคะแนนเสียงเท่ากันให้บังคับตามความเห็นของฝ่ายที่เห็นควรอนุญาตให้ฎีกา"],"text":"คำร้องตามมาตรา ๒๔๗ ให้พิจารณาและวินิจฉัยโดยองค์คณะผู้พิพากษาที่ประธานศาลฎีกาแต่งตั้ง ซึ่งประกอบด้วยรองประธานศาลฎีกาและผู้พิพากษาในศาลฎีกาซึ่งดำรงตำแหน่งไม่ต่ำกว่าผู้พิพากษาศาลฎีกาอีกอย่างน้อยสามคน การวินิจฉัยให้เป็นไปตามเสียงข้างมาก ถ้าคะแนนเสียงเท่ากันให้บังคับตามความเห็นของฝ่ายที่เห็นควรอนุญาตให้ฎีกา"},{"id":"๒๔๙","num":"มาตรา ๒๔๙","num_ara":"๒๔๙","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๒ ฎีกา","section":"","subsection":"","paragraphs":["ให้ศาลฎีกาพิจารณาอนุญาตให้ฎีกาตามมาตรา ๒๔๗ ได้ เมื่อเห็นว่าปัญหาตามฎีกานั้นเป็นปัญหาสำคัญที่ศาลฎีกาควรวินิจฉัย ปัญหาสำคัญตามวรรคหนึ่ง ให้รวมถึงกรณีดังต่อไปนี้","(๑) ปัญหาที่เกี่ยวพันกับประโยชน์สาธารณะ หรือความสงบเรียบร้อยของประชาชน (๒) เมื่อคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ได้วินิจฉัยข้อกฎหมายที่สำคัญขัดกันหรือขัดกับแนวบรรทัดฐานของคำพิพากษาหรือคำสั่งของศาลฎีกา (๓) คำพิพากษาหรือคำสั่งของศาลอุทธรณ์ได้วินิจฉัยข้อกฎหมายที่สำคัญซึ่งยังไม่มีแนวคำพิพากษาหรือคำสั่งของศาลฎีกามาก่อน (๔) เมื่อคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ขัดกับคำพิพากษาหรือคำสั่งอันถึงที่สุดของศาลอื่น (๕) เพื่อเป็นการพัฒนาการตีความกฎหมาย (๖) ปัญหาสำคัญอื่นตามข้อกำหนดของประธานศาลฎีกา ข้อกำหนดของประธานศาลฎีกาตามวรรคสอง (๖) เมื่อได้รับความเห็นชอบจากที่ประชุมใหญ่ศาลฎีกาและประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้ ในกรณีที่ศาลฎีกามีคำสั่งไม่อนุญาตให้ฎีกา ให้คำพิพากษาหรือคำสั่งของศาลอุทธรณ์เป็นที่สุดตั้งแต่วันที่ได้อ่านคำพิพากษาหรือคำสั่งนั้น"],"text":"ให้ศาลฎีกาพิจารณาอนุญาตให้ฎีกาตามมาตรา ๒๔๗ ได้ เมื่อเห็นว่าปัญหาตามฎีกานั้นเป็นปัญหาสำคัญที่ศาลฎีกาควรวินิจฉัย ปัญหาสำคัญตามวรรคหนึ่ง ให้รวมถึงกรณีดังต่อไปนี้\n\n(๑) ปัญหาที่เกี่ยวพันกับประโยชน์สาธารณะ หรือความสงบเรียบร้อยของประชาชน (๒) เมื่อคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ได้วินิจฉัยข้อกฎหมายที่สำคัญขัดกันหรือขัดกับแนวบรรทัดฐานของคำพิพากษาหรือคำสั่งของศาลฎีกา (๓) คำพิพากษาหรือคำสั่งของศาลอุทธรณ์ได้วินิจฉัยข้อกฎหมายที่สำคัญซึ่งยังไม่มีแนวคำพิพากษาหรือคำสั่งของศาลฎีกามาก่อน (๔) เมื่อคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ขัดกับคำพิพากษาหรือคำสั่งอันถึงที่สุดของศาลอื่น (๕) เพื่อเป็นการพัฒนาการตีความกฎหมาย (๖) ปัญหาสำคัญอื่นตามข้อกำหนดของประธานศาลฎีกา ข้อกำหนดของประธานศาลฎีกาตามวรรคสอง (๖) เมื่อได้รับความเห็นชอบจากที่ประชุมใหญ่ศาลฎีกาและประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้ ในกรณีที่ศาลฎีกามีคำสั่งไม่อนุญาตให้ฎีกา ให้คำพิพากษาหรือคำสั่งของศาลอุทธรณ์เป็นที่สุดตั้งแต่วันที่ได้อ่านคำพิพากษาหรือคำสั่งนั้น"},{"id":"๒๕๐","num":"มาตรา ๒๕๐","num_ara":"๒๕๐","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๒ ฎีกา","section":"","subsection":"","paragraphs":["หลักเกณฑ์และวิธีการในการยื่นคำร้อง การพิจารณาวินิจฉัยและระยะเวลาในการพิจารณาคำร้องตามมาตรา ๒๔๗ การตรวจรับฎีกา การแก้ฎีกา การพิจารณา และการพิพากษาคดี รวมทั้งการสั่งคืนค่าฤชาธรรมเนียม ให้เป็นไปตามข้อกำหนดของประธานศาลฎีกา ข้อกำหนดของประธานศาลฎีกาตามวรรคหนึ่ง เมื่อได้รับความเห็นชอบจากที่ประชุมใหญ่ศาลฎีกาและประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"],"text":"หลักเกณฑ์และวิธีการในการยื่นคำร้อง การพิจารณาวินิจฉัยและระยะเวลาในการพิจารณาคำร้องตามมาตรา ๒๔๗ การตรวจรับฎีกา การแก้ฎีกา การพิจารณา และการพิพากษาคดี รวมทั้งการสั่งคืนค่าฤชาธรรมเนียม ให้เป็นไปตามข้อกำหนดของประธานศาลฎีกา ข้อกำหนดของประธานศาลฎีกาตามวรรคหนึ่ง เมื่อได้รับความเห็นชอบจากที่ประชุมใหญ่ศาลฎีกาและประกาศในราชกิจจานุเบกษาแล้วให้ใช้บังคับได้"},{"id":"๒๕๑","num":"มาตรา ๒๕๑","num_ara":"๒๕๑","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๒ ฎีกา","section":"","subsection":"","paragraphs":["ในคดีที่ได้รับอนุญาตให้ฎีกาที่มีแต่เฉพาะปัญหาข้อกฎหมาย หากศาลฎีกาเห็นว่าคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ไม่ถูกต้องไม่ว่าทั้งหมดหรือบางส่วน ศาลฎีกาจะมีคำวินิจฉัยในปัญหาข้อกฎหมายนั้นและยกคำพิพากษาหรือคำสั่งของศาลอุทธรณ์หรือศาลชั้นต้น แล้วมีคำสั่งให้ศาลอุทธรณ์หรือศาลชั้นต้น แล้วแต่กรณี ทำคำพิพากษาหรือคำสั่งใหม่ภายใต้กรอบคำวินิจฉัยของศาลฎีกาก็ได้"],"text":"ในคดีที่ได้รับอนุญาตให้ฎีกาที่มีแต่เฉพาะปัญหาข้อกฎหมาย หากศาลฎีกาเห็นว่าคำพิพากษาหรือคำสั่งของศาลอุทธรณ์ไม่ถูกต้องไม่ว่าทั้งหมดหรือบางส่วน ศาลฎีกาจะมีคำวินิจฉัยในปัญหาข้อกฎหมายนั้นและยกคำพิพากษาหรือคำสั่งของศาลอุทธรณ์หรือศาลชั้นต้น แล้วมีคำสั่งให้ศาลอุทธรณ์หรือศาลชั้นต้น แล้วแต่กรณี ทำคำพิพากษาหรือคำสั่งใหม่ภายใต้กรอบคำวินิจฉัยของศาลฎีกาก็ได้"},{"id":"๒๕๒","num":"มาตรา ๒๕๒","num_ara":"๒๕๒","part":"ภาค ๓ อุทธรณ์และฎีกา","chapter":"ลักษณะ ๒ ฎีกา","section":"","subsection":"","paragraphs":["ในกรณีที่ไม่มีข้อกำหนดของประธานศาลฎีกาตามมาตรา ๒๕๐ กำหนดไว้เป็นอย่างอื่น ให้นำบทบัญญัติในลักษณะ ๑ ว่าด้วยอุทธรณ์มาใช้บังคับโดยอนุโลม"],"text":"ในกรณีที่ไม่มีข้อกำหนดของประธานศาลฎีกาตามมาตรา ๒๕๐ กำหนดไว้เป็นอย่างอื่น ให้นำบทบัญญัติในลักษณะ ๑ ว่าด้วยอุทธรณ์มาใช้บังคับโดยอนุโลม"},{"id":"๒๕๓","num":"มาตรา ๒๕๓","num_ara":"๒๕๓","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ถ้าโจทก์มิได้มีภูมิลำเนาหรือสำนักทำการงานอยู่ในราชอาณาจักรและไม่มีทรัพย์สินที่อาจถูกบังคับคดีได้อยู่ในราชอาณาจักร หรือถ้าเป็นที่เชื่อได้ว่าเมื่อโจทก์แพ้คดีแล้วจะหลีกเลี่ยงไม่ชำระค่าฤชาธรรมเนียมและค่าใช้จ่าย จำเลยอาจยื่นคำร้องต่อศาลไม่ว่าเวลาใด ๆ ก่อนพิพากษาขอให้ศาลมีคำสั่งให้โจทก์วางเงินต่อศาลหรือหาประกันมาให้เพื่อการชำระค่าฤชาธรรมเนียมและค่าใช้จ่ายดังกล่าวได้ ถ้าศาลไต่สวนแล้วเห็นว่า มีเหตุอันสมควรหรือมีเหตุเป็นที่เชื่อได้ แล้วแต่กรณี ก็ให้ศาลมีคำสั่งให้โจทก์วางเงินต่อศาลหรือหาประกันมาให้ตามจำนวนและภายในระยะเวลาที่กำหนด โดยจะกำหนดเงื่อนไขใด ๆ ตามที่เห็นสมควรก็ได้ ถ้าโจทก์มิได้ปฏิบัติตามคำสั่งศาลตามวรรคสอง ให้ศาลมีคำสั่งจำหน่ายคดีออกจากสารบบความ เว้นแต่จำเลยจะขอให้ดำเนินการพิจารณาต่อไป หรือมีการอุทธรณ์คำสั่งศาลตามวรรคสอง"],"text":"ถ้าโจทก์มิได้มีภูมิลำเนาหรือสำนักทำการงานอยู่ในราชอาณาจักรและไม่มีทรัพย์สินที่อาจถูกบังคับคดีได้อยู่ในราชอาณาจักร หรือถ้าเป็นที่เชื่อได้ว่าเมื่อโจทก์แพ้คดีแล้วจะหลีกเลี่ยงไม่ชำระค่าฤชาธรรมเนียมและค่าใช้จ่าย จำเลยอาจยื่นคำร้องต่อศาลไม่ว่าเวลาใด ๆ ก่อนพิพากษาขอให้ศาลมีคำสั่งให้โจทก์วางเงินต่อศาลหรือหาประกันมาให้เพื่อการชำระค่าฤชาธรรมเนียมและค่าใช้จ่ายดังกล่าวได้ ถ้าศาลไต่สวนแล้วเห็นว่า มีเหตุอันสมควรหรือมีเหตุเป็นที่เชื่อได้ แล้วแต่กรณี ก็ให้ศาลมีคำสั่งให้โจทก์วางเงินต่อศาลหรือหาประกันมาให้ตามจำนวนและภายในระยะเวลาที่กำหนด โดยจะกำหนดเงื่อนไขใด ๆ ตามที่เห็นสมควรก็ได้ ถ้าโจทก์มิได้ปฏิบัติตามคำสั่งศาลตามวรรคสอง ให้ศาลมีคำสั่งจำหน่ายคดีออกจากสารบบความ เว้นแต่จำเลยจะขอให้ดำเนินการพิจารณาต่อไป หรือมีการอุทธรณ์คำสั่งศาลตามวรรคสอง"},{"id":"๒๕๓_ทวิ","num":"มาตรา ๒๕๓ ทวิ","num_ara":"๒๕๓ ทวิ","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ในกรณีที่โจทก์ได้ยื่นอุทธรณ์หรือฎีกาคัดค้านคำพิพากษาถ้ามีเหตุใดเหตุหนึ่งตามมาตรา ๒๕๓ วรรคหนึ่ง จำเลยอาจยื่นคำร้องต่อศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี ไม่ว่าเวลาใด ๆ ก่อนพิพากษา ขอให้ศาลมีคำสั่งให้โจทก์วางเงินต่อศาลหรือหาประกันมาให้เพื่อการชำระค่าฤชาธรรมเนียมและค่าใช้จ่ายดังกล่าวได้ ในระหว่างที่ศาลชั้นต้นยังมิได้ส่งสำนวนความไปยังศาลอุทธรณ์หรือศาลฎีกา คำร้องตามวรรคหนึ่งให้ยื่นต่อศาลชั้นต้น และให้ศาลชั้นต้นทำการไต่สวน แล้วส่งคำร้องนั้นพร้อมด้วยสำนวนความไปให้ศาลอุทธรณ์หรือศาลฎีกาสั่ง ให้นำความในมาตรา ๒๕๓ วรรคสองและวรรคสาม มาใช้บังคับแก่การพิจารณาในชั้นอุทธรณ์และฎีกาโดยอนุโลม"],"text":"ในกรณีที่โจทก์ได้ยื่นอุทธรณ์หรือฎีกาคัดค้านคำพิพากษาถ้ามีเหตุใดเหตุหนึ่งตามมาตรา ๒๕๓ วรรคหนึ่ง จำเลยอาจยื่นคำร้องต่อศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี ไม่ว่าเวลาใด ๆ ก่อนพิพากษา ขอให้ศาลมีคำสั่งให้โจทก์วางเงินต่อศาลหรือหาประกันมาให้เพื่อการชำระค่าฤชาธรรมเนียมและค่าใช้จ่ายดังกล่าวได้ ในระหว่างที่ศาลชั้นต้นยังมิได้ส่งสำนวนความไปยังศาลอุทธรณ์หรือศาลฎีกา คำร้องตามวรรคหนึ่งให้ยื่นต่อศาลชั้นต้น และให้ศาลชั้นต้นทำการไต่สวน แล้วส่งคำร้องนั้นพร้อมด้วยสำนวนความไปให้ศาลอุทธรณ์หรือศาลฎีกาสั่ง ให้นำความในมาตรา ๒๕๓ วรรคสองและวรรคสาม มาใช้บังคับแก่การพิจารณาในชั้นอุทธรณ์และฎีกาโดยอนุโลม"},{"id":"๒๕๔","num":"มาตรา ๒๕๔","num_ara":"๒๕๔","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ในคดีอื่น ๆ นอกจากคดีมโนสาเร่ โจทก์ชอบที่จะยื่นต่อศาลพร้อมกับคำฟ้องหรือในเวลาใด ๆ ก่อนพิพากษา ซึ่งคำขอฝ่ายเดียว ร้องขอให้ศาลมีคำสั่งภายในบังคับแห่งเงื่อนไขซึ่งจะกล่าวต่อไป เพื่อจัดให้มีวิธีคุ้มครองใด ๆ ดังต่อไปนี้","(๑) ให้ยึดหรืออายัดทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยทั้งหมดหรือบางส่วนไว้ก่อนพิพากษา รวมทั้งจำนวนเงินหรือทรัพย์สินของบุคคลภายนอกซึ่งถึงกำหนดชำระแก่จำเลย (๒) ให้ศาลมีคำสั่งห้ามชั่วคราวมิให้จำเลยกระทำซ้ำหรือกระทำต่อไป ซึ่งการละเมิดหรือการผิดสัญญาหรือการกระทำที่ถูกฟ้องร้อง หรือมีคำสั่งอื่นใดในอันที่จะบรรเทาความเดือดร้อนเสียหายที่โจทก์อาจได้รับต่อไปเนื่องจากการกระทำของจำเลยหรือมีคำสั่งห้ามชั่วคราวมิให้จำเลยโอน ขาย ยักย้ายหรือจำหน่ายซึ่งทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลย หรือมีคำสั่งให้หยุดหรือป้องกันการเปลืองไปเปล่าหรือการบุบสลายซึ่งทรัพย์สินดังกล่าว ทั้งนี้ จนกว่าคดีจะถึงที่สุดหรือศาลจะมีคำสั่งเป็นอย่างอื่น (๓) ให้ศาลมีคำสั่งให้นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมาย ระงับการจดทะเบียน การแก้ไขเปลี่ยนแปลงทางทะเบียน หรือการเพิกถอน การจดทะเบียนที่เกี่ยวกับทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยหรือที่เกี่ยวกับการกระทำที่ถูกฟ้องร้องไว้ชั่วคราวจนกว่าคดีจะถึงที่สุดหรือศาลจะมีคำสั่งเป็นอย่างอื่น ทั้งนี้ เท่าที่ไม่ขัดหรือแย้งต่อบทบัญญัติแห่งกฎหมายที่เกี่ยวข้อง (๔) ให้จับกุมและกักขังจำเลยไว้ชั่วคราว ในระหว่างระยะเวลานับแต่ศาลชั้นต้นหรือศาลอุทธรณ์ได้อ่านคำพิพากษา หรือคำสั่งชี้ขาดคดี หรือชี้ขาดอุทธรณ์ไปจนถึงเวลาที่ศาลชั้นต้นได้ส่งสำนวนความที่อุทธรณ์หรือฎีกาไปยังศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี คำขอตามมาตรานี้ให้ยื่นต่อศาลชั้นต้น ให้ศาลชั้นต้นมีอำนาจที่จะสั่งอนุญาตหรือยกคำขอเช่นว่านี้"],"text":"ในคดีอื่น ๆ นอกจากคดีมโนสาเร่ โจทก์ชอบที่จะยื่นต่อศาลพร้อมกับคำฟ้องหรือในเวลาใด ๆ ก่อนพิพากษา ซึ่งคำขอฝ่ายเดียว ร้องขอให้ศาลมีคำสั่งภายในบังคับแห่งเงื่อนไขซึ่งจะกล่าวต่อไป เพื่อจัดให้มีวิธีคุ้มครองใด ๆ ดังต่อไปนี้\n\n(๑) ให้ยึดหรืออายัดทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยทั้งหมดหรือบางส่วนไว้ก่อนพิพากษา รวมทั้งจำนวนเงินหรือทรัพย์สินของบุคคลภายนอกซึ่งถึงกำหนดชำระแก่จำเลย (๒) ให้ศาลมีคำสั่งห้ามชั่วคราวมิให้จำเลยกระทำซ้ำหรือกระทำต่อไป ซึ่งการละเมิดหรือการผิดสัญญาหรือการกระทำที่ถูกฟ้องร้อง หรือมีคำสั่งอื่นใดในอันที่จะบรรเทาความเดือดร้อนเสียหายที่โจทก์อาจได้รับต่อไปเนื่องจากการกระทำของจำเลยหรือมีคำสั่งห้ามชั่วคราวมิให้จำเลยโอน ขาย ยักย้ายหรือจำหน่ายซึ่งทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลย หรือมีคำสั่งให้หยุดหรือป้องกันการเปลืองไปเปล่าหรือการบุบสลายซึ่งทรัพย์สินดังกล่าว ทั้งนี้ จนกว่าคดีจะถึงที่สุดหรือศาลจะมีคำสั่งเป็นอย่างอื่น (๓) ให้ศาลมีคำสั่งให้นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมาย ระงับการจดทะเบียน การแก้ไขเปลี่ยนแปลงทางทะเบียน หรือการเพิกถอน การจดทะเบียนที่เกี่ยวกับทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยหรือที่เกี่ยวกับการกระทำที่ถูกฟ้องร้องไว้ชั่วคราวจนกว่าคดีจะถึงที่สุดหรือศาลจะมีคำสั่งเป็นอย่างอื่น ทั้งนี้ เท่าที่ไม่ขัดหรือแย้งต่อบทบัญญัติแห่งกฎหมายที่เกี่ยวข้อง (๔) ให้จับกุมและกักขังจำเลยไว้ชั่วคราว ในระหว่างระยะเวลานับแต่ศาลชั้นต้นหรือศาลอุทธรณ์ได้อ่านคำพิพากษา หรือคำสั่งชี้ขาดคดี หรือชี้ขาดอุทธรณ์ไปจนถึงเวลาที่ศาลชั้นต้นได้ส่งสำนวนความที่อุทธรณ์หรือฎีกาไปยังศาลอุทธรณ์หรือศาลฎีกา แล้วแต่กรณี คำขอตามมาตรานี้ให้ยื่นต่อศาลชั้นต้น ให้ศาลชั้นต้นมีอำนาจที่จะสั่งอนุญาตหรือยกคำขอเช่นว่านี้"},{"id":"๒๕๕","num":"มาตรา ๒๕๕","num_ara":"๒๕๕","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ในการพิจารณาอนุญาตตามคำขอที่ยื่นไว้ตามมาตรา ๒๕๔ ต้องให้เป็นที่พอใจของศาลว่า คำฟ้องมีมูลและมีเหตุเพียงพอที่จะนำวิธีคุ้มครองตามที่ขอนั้นมาใช้ได้ตามหลักเกณฑ์ดังต่อไปนี้","(๑) ในกรณีที่ยื่นคำขอให้ศาลมีคำสั่งตามมาตรา ๒๕๔ (๑) ต้องให้เป็นที่พอใจของศาลว่า (ก) จำเลยตั้งใจจะยักย้ายทรัพย์สินที่พิพาทหรือทรัพย์สินของตนทั้งหมดหรือแต่บางส่วนไปให้พ้นจากอำนาจศาล หรือจะโอน ขายหรือจำหน่ายทรัพย์สินดังกล่าวเพื่อประวิงหรือขัดขวางต่อการบังคับตามคำบังคับใด ๆ ซึ่งอาจจะออกบังคับเอาแก่จำเลยหรือเพื่อจะทำให้โจทก์เสียเปรียบ หรือ (ข) มีเหตุจำเป็นอื่นใดตามที่ศาลจะพิเคราะห์เห็นเป็นการยุติธรรมและสมควร (๒) ในกรณีที่ยื่นคำขอให้ศาลมีคำสั่งตามมาตรา ๒๕๔ (๒) ต้องให้เป็นที่พอใจของศาลว่า (ก) จำเลยตั้งใจจะกระทำซ้ำหรือกระทำต่อไปซึ่งการละเมิด การผิดสัญญา หรือการกระทำที่ถูกฟ้องร้อง (ข) โจทก์จะได้รับความเดือดร้อนเสียหายต่อไปเนื่องจากการกระทำของจำเลย (ค) ทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยนั้นมีพฤติการณ์ว่าจะมีการกระทำให้เปลืองไปเปล่าหรือบุบสลายหรือโอนไปยังผู้อื่น หรือ (ง) มีเหตุตาม (๑) (ก) หรือ (ข) (๓) ในกรณีที่ยื่นคำขอให้ศาลมีคำสั่งตามมาตรา ๒๕๔ (๓) ต้องให้เป็นที่พอใจของศาลว่า (ก) เป็นที่เกรงว่าจำเลยจะดำเนินการให้มีการจดทะเบียน แก้ไขเปลี่ยนแปลงทางทะเบียน หรือเพิกถอนการจดทะเบียนเกี่ยวกับทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยหรือที่เกี่ยวกับการกระทำที่ถูกฟ้องร้อง ซึ่งการดำเนินการดังกล่าวจะก่อให้เกิดความเสียหายแก่โจทก์ หรือ (ข) มีเหตุตาม (๑) (ข) (๔) ในกรณีที่ยื่นคำขอให้ศาลมีคำสั่งตามมาตรา ๒๕๔ (๔) ต้องให้เป็นที่พอใจของศาลว่า เพื่อที่จะประวิงหรือขัดขวางต่อการพิจารณาคดีหรือการบังคับตามคำบังคับใด ๆ ซึ่งอาจจะออกบังคับเอาแก่จำเลย หรือเพื่อจะทำให้โจทก์เสียเปรียบ (ก) จำเลยซ่อนตัวเพื่อจะไม่รับหมายเรียกหรือคำสั่งของศาล (ข) จำเลยได้ยักย้ายไปให้พ้นอำนาจศาลหรือซุกซ่อนเอกสารใด ๆ ซึ่งพอจะเห็นได้ว่าจะใช้เป็นพยานหลักฐานยันจำเลยในคดีที่อยู่ในระหว่างพิจารณา หรือทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยทั้งหมดหรือแต่บางส่วน หรือเป็นที่เกรงว่าจำเลยจะจำหน่ายหรือทำลายเอกสารหรือทรัพย์สินเช่นว่านั้น หรือ (ค) ปรากฏตามกิริยาหรือตามวิธีที่จำเลยประกอบการงานหรือการค้าของตนว่าจำเลยจะหลีกหนีหรือพอเห็นได้ว่าจะหลีกหนีไปให้พ้นอำนาจศาล"],"text":"ในการพิจารณาอนุญาตตามคำขอที่ยื่นไว้ตามมาตรา ๒๕๔ ต้องให้เป็นที่พอใจของศาลว่า คำฟ้องมีมูลและมีเหตุเพียงพอที่จะนำวิธีคุ้มครองตามที่ขอนั้นมาใช้ได้ตามหลักเกณฑ์ดังต่อไปนี้\n\n(๑) ในกรณีที่ยื่นคำขอให้ศาลมีคำสั่งตามมาตรา ๒๕๔ (๑) ต้องให้เป็นที่พอใจของศาลว่า (ก) จำเลยตั้งใจจะยักย้ายทรัพย์สินที่พิพาทหรือทรัพย์สินของตนทั้งหมดหรือแต่บางส่วนไปให้พ้นจากอำนาจศาล หรือจะโอน ขายหรือจำหน่ายทรัพย์สินดังกล่าวเพื่อประวิงหรือขัดขวางต่อการบังคับตามคำบังคับใด ๆ ซึ่งอาจจะออกบังคับเอาแก่จำเลยหรือเพื่อจะทำให้โจทก์เสียเปรียบ หรือ (ข) มีเหตุจำเป็นอื่นใดตามที่ศาลจะพิเคราะห์เห็นเป็นการยุติธรรมและสมควร (๒) ในกรณีที่ยื่นคำขอให้ศาลมีคำสั่งตามมาตรา ๒๕๔ (๒) ต้องให้เป็นที่พอใจของศาลว่า (ก) จำเลยตั้งใจจะกระทำซ้ำหรือกระทำต่อไปซึ่งการละเมิด การผิดสัญญา หรือการกระทำที่ถูกฟ้องร้อง (ข) โจทก์จะได้รับความเดือดร้อนเสียหายต่อไปเนื่องจากการกระทำของจำเลย (ค) ทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยนั้นมีพฤติการณ์ว่าจะมีการกระทำให้เปลืองไปเปล่าหรือบุบสลายหรือโอนไปยังผู้อื่น หรือ (ง) มีเหตุตาม (๑) (ก) หรือ (ข) (๓) ในกรณีที่ยื่นคำขอให้ศาลมีคำสั่งตามมาตรา ๒๕๔ (๓) ต้องให้เป็นที่พอใจของศาลว่า (ก) เป็นที่เกรงว่าจำเลยจะดำเนินการให้มีการจดทะเบียน แก้ไขเปลี่ยนแปลงทางทะเบียน หรือเพิกถอนการจดทะเบียนเกี่ยวกับทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยหรือที่เกี่ยวกับการกระทำที่ถูกฟ้องร้อง ซึ่งการดำเนินการดังกล่าวจะก่อให้เกิดความเสียหายแก่โจทก์ หรือ (ข) มีเหตุตาม (๑) (ข) (๔) ในกรณีที่ยื่นคำขอให้ศาลมีคำสั่งตามมาตรา ๒๕๔ (๔) ต้องให้เป็นที่พอใจของศาลว่า เพื่อที่จะประวิงหรือขัดขวางต่อการพิจารณาคดีหรือการบังคับตามคำบังคับใด ๆ ซึ่งอาจจะออกบังคับเอาแก่จำเลย หรือเพื่อจะทำให้โจทก์เสียเปรียบ (ก) จำเลยซ่อนตัวเพื่อจะไม่รับหมายเรียกหรือคำสั่งของศาล (ข) จำเลยได้ยักย้ายไปให้พ้นอำนาจศาลหรือซุกซ่อนเอกสารใด ๆ ซึ่งพอจะเห็นได้ว่าจะใช้เป็นพยานหลักฐานยันจำเลยในคดีที่อยู่ในระหว่างพิจารณา หรือทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยทั้งหมดหรือแต่บางส่วน หรือเป็นที่เกรงว่าจำเลยจะจำหน่ายหรือทำลายเอกสารหรือทรัพย์สินเช่นว่านั้น หรือ (ค) ปรากฏตามกิริยาหรือตามวิธีที่จำเลยประกอบการงานหรือการค้าของตนว่าจำเลยจะหลีกหนีหรือพอเห็นได้ว่าจะหลีกหนีไปให้พ้นอำนาจศาล"},{"id":"๒๕๖","num":"มาตรา ๒๕๖","num_ara":"๒๕๖","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ในกรณีที่ยื่นคำขอให้ศาลมีคำสั่งตามมาตรา ๒๕๔ (๒) หรือ (๓) ถ้าศาลเห็นว่าหากให้โอกาสจำเลยคัดค้านก่อนจะไม่เสียหายแก่โจทก์ ก็ให้ศาลแจ้งกำหนดวันนั่งพิจารณาพร้อมทั้งส่งสำเนาคำขอให้แก่จำเลยโดยทางเจ้าพนักงานศาล จำเลยจะเสนอข้อคัดค้านของตนในการที่ศาลนั่งพิจารณาคำขอนั้นก็ได้"],"text":"ในกรณีที่ยื่นคำขอให้ศาลมีคำสั่งตามมาตรา ๒๕๔ (๒) หรือ (๓) ถ้าศาลเห็นว่าหากให้โอกาสจำเลยคัดค้านก่อนจะไม่เสียหายแก่โจทก์ ก็ให้ศาลแจ้งกำหนดวันนั่งพิจารณาพร้อมทั้งส่งสำเนาคำขอให้แก่จำเลยโดยทางเจ้าพนักงานศาล จำเลยจะเสนอข้อคัดค้านของตนในการที่ศาลนั่งพิจารณาคำขอนั้นก็ได้"},{"id":"๒๕๗","num":"มาตรา ๒๕๗","num_ara":"๒๕๗","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["ให้ศาลมีอำนาจที่จะสั่งอนุญาตตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ ได้ภายในขอบเขตหรือโดยมีเงื่อนไขอย่างใดก็ได้ แล้วแต่จะเห็นสมควร ในกรณีที่ศาลมีคำสั่งอนุญาตตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๒) ให้ศาลแจ้งคำสั่งนั้นให้จำเลยทราบ ในกรณีที่ศาลมีคำสั่งห้ามชั่วคราวมิให้จำเลยโอน ขาย ยักย้าย หรือจำหน่ายซึ่งทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลย ศาลจะกำหนดวิธีการโฆษณาตามที่เห็นสมควรเพื่อป้องกันการฉ้อฉลก็ได้ ในกรณีที่ศาลมีคำสั่งห้ามชั่วคราวมิให้จำเลยโอน ขาย ยักย้าย หรือจำหน่ายซึ่งทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยที่กฎหมายกำหนดไว้ให้จดทะเบียน หรือมีคำสั่งให้นายทะเบียน พนักงานเจ้าหน้าที่หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมาย ระงับการจดทะเบียน การแก้ไขเปลี่ยนแปลงทางทะเบียน หรือการเพิกถอนการจดทะเบียนที่เกี่ยวกับทรัพย์สินดังกล่าวหรือที่เกี่ยวกับการกระทำที่ถูกฟ้องร้อง ให้ศาลแจ้งคำสั่งนั้นให้นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมายทราบ และให้บุคคลดังกล่าวบันทึกคำสั่งของศาลไว้ในทะเบียน ไม่ว่าในกรณีใด ๆ ก่อนที่ศาลจะออกหมายยึด หมายอายัด หมายห้ามชั่วคราว หมายจับ หรือคำสั่งใด ๆ ศาลจะสั่งให้ผู้ขอนำเงินหรือหาประกันตามจำนวนที่เห็นสมควรมาวางศาลเพื่อการชำระค่าสินไหมทดแทนซึ่งจำเลยอาจได้รับตามมาตรา ๒๖๓ ก็ได้"],"text":"ให้ศาลมีอำนาจที่จะสั่งอนุญาตตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ ได้ภายในขอบเขตหรือโดยมีเงื่อนไขอย่างใดก็ได้ แล้วแต่จะเห็นสมควร ในกรณีที่ศาลมีคำสั่งอนุญาตตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๒) ให้ศาลแจ้งคำสั่งนั้นให้จำเลยทราบ ในกรณีที่ศาลมีคำสั่งห้ามชั่วคราวมิให้จำเลยโอน ขาย ยักย้าย หรือจำหน่ายซึ่งทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลย ศาลจะกำหนดวิธีการโฆษณาตามที่เห็นสมควรเพื่อป้องกันการฉ้อฉลก็ได้ ในกรณีที่ศาลมีคำสั่งห้ามชั่วคราวมิให้จำเลยโอน ขาย ยักย้าย หรือจำหน่ายซึ่งทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยที่กฎหมายกำหนดไว้ให้จดทะเบียน หรือมีคำสั่งให้นายทะเบียน พนักงานเจ้าหน้าที่หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมาย ระงับการจดทะเบียน การแก้ไขเปลี่ยนแปลงทางทะเบียน หรือการเพิกถอนการจดทะเบียนที่เกี่ยวกับทรัพย์สินดังกล่าวหรือที่เกี่ยวกับการกระทำที่ถูกฟ้องร้อง ให้ศาลแจ้งคำสั่งนั้นให้นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมายทราบ และให้บุคคลดังกล่าวบันทึกคำสั่งของศาลไว้ในทะเบียน ไม่ว่าในกรณีใด ๆ ก่อนที่ศาลจะออกหมายยึด หมายอายัด หมายห้ามชั่วคราว หมายจับ หรือคำสั่งใด ๆ ศาลจะสั่งให้ผู้ขอนำเงินหรือหาประกันตามจำนวนที่เห็นสมควรมาวางศาลเพื่อการชำระค่าสินไหมทดแทนซึ่งจำเลยอาจได้รับตามมาตรา ๒๖๓ ก็ได้"},{"id":"๒๕๘","num":"มาตรา ๒๕๘","num_ara":"๒๕๘","part":"ภาค ๔ วิธีการชั่วคราวก่อนพิพากษาและการบังคับตามคำพิพากษาหรือคำสั่ง","chapter":"ลักษณะ ๑ วิธีการชั่วคราวก่อนพิพากษา","section":"หมวด ๑ หลักทั่วไป","subsection":"","paragraphs":["คำสั่งศาลซึ่งอนุญาตตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๑) นั้น ให้บังคับจำเลยได้ทันทีแล้วแจ้งคำสั่งนั้นให้จำเลยทราบโดยไม่ชักช้าแต่จะใช้บังคับบุคคลภายนอก ซึ่งพิสูจน์ได้ว่าได้รับโอนโดยสุจริตและเสียค่าตอบแทนก่อนการแจ้งคำสั่งให้จำเลยทราบมิได้ คำสั่งศาลซึ่งอนุญาตตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๒) นั้น ให้บังคับจำเลยได้ทันที ถึงแม้ว่าจำเลยจะยังมิได้รับแจ้งคำสั่งเช่นว่านั้นก็ตาม เว้นแต่ศาลจะได้พิเคราะห์พฤติการณ์แห่งคดีแล้วเห็นสมควรให้คำสั่งมีผลบังคับเมื่อจำเลยได้รับแจ้งคำสั่งเช่นว่านั้นแล้ว คำสั่งศาลซึ่งอนุญาตตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๓) ที่เกี่ยวกับทรัพย์สินที่พิพาทหรือทรัพย์สินของจำเลยนั้น ให้มีผลใช้บังคับได้ทันที ถึงแม้ว่านายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลอื่น ผู้มีอำนาจหน้าที่ตามกฎหมายจะยังมิได้รับแจ้งคำสั่งเช่นว่านั้นก็ตาม เว้นแต่ศาลจะได้พิเคราะห์พฤติการณ์แห่งคดีแล้วเห็นสมควรให้คำสั่งมีผลบังคับเมื่อบุคคลดังกล่าวได้รับแจ้งคำสั่งเช่นว่านั้นแล้ว คำสั่งศาลซึ่งอนุญาตตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๓) ที่เกี่ยวกับการกระทำที่ถูกฟ้องร้องให้มีผลใช้บังคับแก่นายทะเบียน พนักงานเจ้าหน้าที่ หรือบุคคลอื่นผู้มีอำนาจหน้าที่ตามกฎหมายต่อเมื่อบุคคลดังกล่าวได้รับแจ้งคำสั่งเช่นว่านั้นแล้ว หมายจับจำเลยที่ศาลได้ออกตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๔) ให้บังคับได้ทั่วราชอาณาจักร การกักขังตามหมายจับเช่นว่านี้ ห้ามมิให้กระทำเกินหกเดือนนับแต่วันจับ"],"text":"คำสั่งศาลซึ่งอนุญาตตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๑) นั้น ให้บังคับจำเลยได้ทันทีแล้วแจ้งคำสั่งนั้นให้จำเลยทราบโดยไม่ชักช้าแต่จะใช้บังคับบุคคลภายนอก ซึ่งพิสูจน์ได้ว่าได้รับโอนโดยสุจริตและเสียค่าตอบแทนก่อนการแจ้งคำสั่งให้จำเลยทราบมิได้ คำสั่งศาลซึ่งอนุญาตตามคำขอที่ได้ยื่นตามมาตรา ๒๕๔ (๒) นั้น ให้บังคับจำเลยได้ทันที ถึงแม้ว่าจำเลยจะยังมิได้รับแจ้งคำสั่งเช่นว่านั้นก็ตาม เว้
